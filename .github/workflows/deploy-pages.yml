name: Deploy app/ to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Health check 2026-07-15: production deploy is GATED on the same auditors that run in
  # the local git hooks. A structural break, dead button, ghost table, missing-RLS
  # migration or committed secret now fails the deploy instead of reaching the pilot
  # kitchen. Local hooks can be skipped (--no-verify); this job cannot.
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Python lint (pyflakes)
        run: |
          pip3 install --quiet pyflakes
          python3 -m pyflakes scripts/*.py
      - name: DB migration audit (tenant scoping, RLS, destructive statements)
        run: python3 scripts/audit_db.py
      - name: App audit (structure, dead buttons, ghost tables, secrets, mutation ratchet)
        run: python3 scripts/audit_app.py
      - name: UI invariants (static guards on past UI bugs — pill, sheet z-index, cost log, scroll)
        run: python3 scripts/ui_invariants.py
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Calculation unit tests (recipe cost, payroll hours, shift hours — money paths)
        run: node scripts/calc_unit_test.js
      - name: Internal-Docs inline JS parses (the class that blanked Poznámky)
        run: python3 scripts/docs_js_check.py

      # ---- DEPLOY GATE (Engineering Standard §1, Richard 22.7.) ----
      # The CANDIDATE build — the app exactly as in THIS commit — is served locally and the
      # full lock suite runs against it BEFORE production sees anything. Any locked module
      # failing stops the deploy right here; production stays untouched; the failing module +
      # root cause land in the job summary. Never bypass this gate. (The post-deploy tile-locks
      # run stays as production drift detection — this gate is what keeps regressions OUT.)
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install Playwright
        run: |
          pip3 install --quiet playwright
          python3 -m playwright install --with-deps chromium
      - name: Serve the candidate build on localhost
        run: |
          (cd app && python3 -m http.server 8080 &)
          for i in $(seq 1 40); do curl -sf http://127.0.0.1:8080/index.html >/dev/null && break; sleep 0.5; done
          curl -sf http://127.0.0.1:8080/index.html >/dev/null || { echo "candidate build did not start"; exit 1; }
      - name: LOCK GATE — full lock suite against the candidate build
        env:
          SAUTERO_QA_EMAIL: ${{ secrets.SAUTERO_QA_EMAIL }}
          SAUTERO_QA_PASSWORD: ${{ secrets.SAUTERO_QA_PASSWORD }}
          SAUTERO_QA_MEMBER_EMAIL: ${{ secrets.SAUTERO_QA_MEMBER_EMAIL }}
          SAUTERO_QA_MEMBER_PASSWORD: ${{ secrets.SAUTERO_QA_MEMBER_PASSWORD }}
          SAUTERO_QA_ADMIN_EMAIL: ${{ secrets.SAUTERO_QA_ADMIN_EMAIL }}
          SAUTERO_QA_ADMIN_PASSWORD: ${{ secrets.SAUTERO_QA_ADMIN_PASSWORD }}
          SAUTERO_QA_MAIN_EMAIL: ${{ secrets.SAUTERO_QA_MAIN_EMAIL }}
          SAUTERO_QA_MAIN_PASSWORD: ${{ secrets.SAUTERO_QA_MAIN_PASSWORD }}
        run: python3 scripts/tile_lock_test.py --url http://127.0.0.1:8080
      - name: UX GATE — real-browser regression suite against the candidate build
        # Behavioural UX that source checks can't see (e.g. a recipe must open at its top —
        # depends on the live <body> scroller, not window). Same QA account as the lock suite.
        env:
          SAUTERO_QA_EMAIL: ${{ secrets.SAUTERO_QA_EMAIL }}
          SAUTERO_QA_PASSWORD: ${{ secrets.SAUTERO_QA_PASSWORD }}
        run: python3 scripts/ui_regression_test.py --url http://127.0.0.1:8080
      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lock-failure-screenshots
          path: |
            lock_fail_*.png
            ui_fail_*.png
          if-no-files-found: ignore

  deploy:
    needs: checks
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
      # app/ stays at the site root exactly as before (app.sautero.ch/index.html etc.,
      # unchanged). visual data/ (backlog, status, monetization...) additionally gets copied
      # into an unlisted, unlinked subpath (Richard, 16.7. — needed a way to open these on his
      # phone, since a locally-shared file opens in a no-JS previewer and none of the
      # filters/search/percentage work). This is obscurity, not real access control: nothing
      # requires a login, anyone who learns/guesses the path can view it — chosen deliberately
      # over adding real auth for a same-day fix, revisit if that stops being good enough.
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Generate fresh Health Report dashboard (so the deployed report matches live code)
        run: python3 scripts/health_report.py
      - name: Build combined Pages artifact
        run: |
          mkdir -p _site
          cp -r app/. _site/
          mkdir -p "_site/x7n2k9"
          cp -r "visual data/." "_site/x7n2k9/"
      - name: Stamp the build version (auto-fresh — beats the max-age=600 index.html cache)
        run: |
          SHA=$(git rev-parse --short HEAD)
          printf '%s' "$SHA" > _site/version.txt
          # replace the placeholder in the DEPLOYED copy only (the committed app/ stays buildless)
          sed -i "s/__BUILD_VERSION__/$SHA/g" _site/index.html
          echo "stamped build $SHA"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
