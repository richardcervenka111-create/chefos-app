name: Health checks

# Health check 2026-07-15: run the Sautero auditors on EVERY push and pull request, on
# every branch — not just main. This is the layer that cannot be skipped locally.
on:
  push:
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        # work_hours --check now validates the docs against the committed snapshot
        # (scripts/work_hours_data.json, derived from the local Claude Code session logs on
        # --write) — it no longer reads git log, so the default shallow clone is fine.
      - name: Python lint (pyflakes — catches undefined names before the Playwright robots do)
        run: |
          pip3 install --quiet pyflakes
          python3 -m pyflakes scripts/*.py
      - name: DB migration audit (tenant scoping, RLS, destructive statements)
        run: python3 scripts/audit_db.py
      - name: App audit (structure, dead buttons, ghost tables, secrets, mutation ratchet)
        run: python3 scripts/audit_app.py
      - name: UI invariants (static guards on past UI bugs — pill, sheet z-index, cost log, scroll)
        run: python3 scripts/ui_invariants.py
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Calculation unit tests (recipe cost, payroll hours, shift hours — money paths)
        run: node scripts/calc_unit_test.js
      - name: Internal-Docs inline JS parses (the class that blanked Poznámky)
        run: python3 scripts/docs_js_check.py
      - name: Worked-hours consistency (WORK_HOURS in docs must match the committed session-log snapshot)
        run: python3 scripts/work_hours.py --check
      - name: Every Internal Doc carries a date stamp (docs_autofix guard)
        run: python3 scripts/docs_autofix.py --check
      - name: Changelog covers every commit (nothing that happened goes unrecorded)
        run: python3 scripts/docs_changelog.py --check
      - name: Auto-sections in the docs are current (robot roster, etc.)
        run: python3 scripts/docs_autosection.py --check
