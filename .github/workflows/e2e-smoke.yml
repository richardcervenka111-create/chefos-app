name: E2E smoke test

# Golden-path browser test against the live app (Richard, 20.7.2026) — separate from
# health-checks.yml (which is static/instant and runs on every push): this one drives a
# real browser against app.sautero.ch, so it runs on a schedule + manual trigger instead,
# not on every commit. Needs SAUTERO_QA_EMAIL / SAUTERO_QA_PASSWORD as repo secrets — a
# dedicated QA account (Settings → My Profile & Security → set a password), never one of
# the 3 real test accounts. See scripts/e2e_smoke_test.py for what it actually checks.
on:
  schedule:
    - cron: '0 6 * * *'    # 06:00 UTC — morning check (08:00 Bern)
    - cron: '0 16 * * *'   # 16:00 UTC — afternoon check (18:00 Bern). 2×/day (Richard, 21.7.)
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install Playwright
        run: |
          pip3 install playwright
          python3 -m playwright install --with-deps chromium
      # One secret pair per ROLE (20.7. evening — Richard: cover team-member and admin
      # accounts too, not just the solo user). Pairs that aren't set yet are skipped by the
      # script with a note, so roles can be added one at a time as their QA accounts are
      # created. All are dedicated QA accounts (Proton +aliases of the QA mailbox), never
      # real daily accounts.
      - name: Run smoke test
        env:
          SAUTERO_QA_EMAIL: ${{ secrets.SAUTERO_QA_EMAIL }}
          SAUTERO_QA_PASSWORD: ${{ secrets.SAUTERO_QA_PASSWORD }}
          SAUTERO_QA_MEMBER_EMAIL: ${{ secrets.SAUTERO_QA_MEMBER_EMAIL }}
          SAUTERO_QA_MEMBER_PASSWORD: ${{ secrets.SAUTERO_QA_MEMBER_PASSWORD }}
          SAUTERO_QA_ADMIN_EMAIL: ${{ secrets.SAUTERO_QA_ADMIN_EMAIL }}
          SAUTERO_QA_ADMIN_PASSWORD: ${{ secrets.SAUTERO_QA_ADMIN_PASSWORD }}
          SAUTERO_QA_MAIN_EMAIL: ${{ secrets.SAUTERO_QA_MAIN_EMAIL }}
          SAUTERO_QA_MAIN_PASSWORD: ${{ secrets.SAUTERO_QA_MAIN_PASSWORD }}
        run: python3 scripts/e2e_smoke_test.py
