name: Set Pages custom domain (one-off)

# One-off (Richard, 18.7. — domain migration to sautero.ch). Runs ONLY when this file
# changes, so it never fires on normal deploys. Sets the Pages custom domain via the repo's
# own GITHUB_TOKEN, since a fine-grained PAT can't. Delete after the migration is confirmed.
on:
  push:
    branches: [main]
    paths: ['.github/workflows/set-domain.yml']
  workflow_dispatch:

permissions:
  pages: write
  administration: write
  id-token: write

jobs:
  set-domain:
    runs-on: ubuntu-latest
    steps:
      - name: PUT Pages custom domain -> app.sautero.ch
        run: |
          code=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"cname":"app.sautero.ch"}')
          echo "HTTP $code"
          cat /tmp/resp.txt || true
          test "$code" -lt 300
