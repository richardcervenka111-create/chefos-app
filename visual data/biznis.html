.pro p').forEach((el,i)=>setEl(el, T.pro[i]));\n    if(T.con) q('.m-col.con p').forEach((el,i)=>setEl(el, T.con[i]));\n    if(T.verdict) q('.m-verdict').forEach((el,i)=>setEl(el, T.verdict[i]));\n    if(T.flags) q('.flag').forEach((el,i)=>setEl(el, T.flags[i]));\n    if(T.gflagH) q('.gflag h3').forEach((el,i)=>setEl(el, T.gflagH[i]));\n    if(T.gflagP) q('.gflag p').forEach((el,i)=>setEl(el, T.gflagP[i]));\n    if(T.aTitle) q('.a-title').forEach((el,i)=>setEl(el, T.aTitle[i]));\n    if(T.aDesc) q('.a-desc').forEach((el,i)=>setEl(el, T.aDesc[i]));\n    if(T.rName) q('.r-name').forEach((el,i)=>setEl(el, T.rName[i]));\n    if(T.rWhen) q('.r-when').forEach((el,i)=>setEl(el, T.rWhen[i]));\n  };\n})();\n/* Shared SK/EN toggle (same sautero_doc_lang key as every doc). */\n(function(){\n  let lang = localStorage.getItem('sautero_doc_lang') || 'sk';\n  function apply(){\n    document.querySelectorAll('[data-sk]').forEach(el=>{\n      const val = lang === 'sk' ? el.getAttribute('data-sk') : (el.getAttribute('data-en') || el.getAttribute('data-sk'));\n      if(val.indexOf('\u003c') !== -1) el.innerHTML = val; else el.textContent = val;\n    });\n    const b = document.getElementById('sauteroLangFab');\n    if(b) b.textContent = lang === 'sk' ? 'EN' : 'SK';\n    document.documentElement.lang = lang;\n    if(window.applyMonetContent) window.applyMonetContent(lang);\n  }\n  window.sauteroToggleLang = function(){\n    lang = lang === 'sk' ? 'en' : 'sk';\n    localStorage.setItem('sautero_doc_lang', lang);\n    apply();\n  };\n  if(!document.getElementById('sauteroLangFab')){\n    const b = document.createElement('button');\n    b.id = 'sauteroLangFab'; b.textContent = 'EN'; b.onclick = window.sauteroToggleLang;\n    b.style.cssText = 'position:fixed;top:12px;right:12px;z-index:60;background:var(--paper);border:1px solid var(--rule);color:var(--ink);font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;cursor:pointer;';\n    document.body.appendChild(b);\n  }\n  apply();\n})();\n\u003c/script>\n\u003c/body>\n\u003c/html>\n", "\u003c!DOCTYPE html>\n\u003chtml lang=\"sk\">\n\u003chead>\n\u003cmeta charset=\"UTF-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n\u003cmeta http-equiv=\"Cache-Control\" content=\"no-cache, no-store, must-revalidate\">\n\u003cmeta http-equiv=\"Pragma\" content=\"no-cache\">\n\u003cmeta http-equiv=\"Expires\" content=\"0\">\n\u003ctitle>Sautero — Automatizácie a náklady\u003c/title>\n\u003cstyle>\n  :root{\n    --bg:#0A1A2F; --paper:#122845; --paper-raised:#0f2340;\n    --ink:#fff; --ink-dim:#9C949E; --ink-faint:rgba(156,148,158,0.6);\n    --rule:#223d57; --accent:#34F7D7; --accent-dim:rgba(52,247,215,0.4);\n    --gold:#F7C948; --gold-dim:rgba(247,201,72,0.4);\n    --danger:#FF7A68; --danger-dim:rgba(255,122,104,0.4);\n    --shadow:0 8px 28px rgba(0,0,0,0.45);\n  }\n  *{ box-sizing:border-box; }\n  html,body{ margin:0; padding:0; }\n  body{\n    background:var(--bg); color:var(--ink);\n    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;\n    -webkit-font-smoothing:antialiased; line-height:1.5;\n  }\n  .wrap{ max-width:1040px; margin:0 auto; padding:0 24px 100px 24px; }\n\n  header.hero{ padding:48px 0 34px 0; border-bottom:1px solid var(--rule); }\n  .topline{ display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; }\n  .brandmark{ display:flex; align-items:center; gap:9px; }\n  .brandmark .word{ font-size:15px; font-weight:700; letter-spacing:0.02em; color:var(--accent); }\n  .lang-toggle{\n    background:var(--paper); border:1px solid var(--rule); color:var(--ink-dim);\n    font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;\n    padding:6px 12px; border-radius:20px; cursor:pointer; transition:border-color .15s, color .15s;\n  }\n  .lang-toggle:hover{ border-color:var(--accent-dim); color:var(--accent); }\n  .kicker{ color:var(--accent); font-size:12px; letter-spacing:0.18em; text-transform:uppercase; font-weight:600; margin-bottom:10px; }\n  h1.title{ font-size:34px; font-weight:700; margin:0 0 14px 0; line-height:1.15; }\n  .lede{ color:var(--ink-dim); font-size:15px; max-width:68ch; line-height:1.65; }\n  .meta-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:26px; }\n  @media (max-width:720px){ .meta-row{ grid-template-columns:1fr 1fr; } }\n  .meta-card{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:14px 16px; }\n  .meta-label{ font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-dim); margin-bottom:4px; }\n  .meta-value{ font-family:\"SF Mono\",Menlo,monospace; font-size:16px; font-weight:700; color:var(--ink); }\n  .meta-card.clickable{ cursor:pointer; transition:border-color .15s; }\n  .meta-card.clickable:hover{ border-color:var(--accent-dim); }\n  .expand-hint{ font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif; font-size:10.5px; font-weight:600; color:var(--accent); text-transform:none; }\n  .timeline-panel{ display:none; margin-top:14px; }\n  .timeline-panel.open{ display:block; }\n  .tl-row{ display:flex; justify-content:space-between; align-items:baseline; padding:10px 0; border-top:1px solid var(--rule); gap:12px; }\n  .tl-row:first-child{ border-top:none; }\n  .tl-what{ font-size:13px; color:var(--ink); }\n  .tl-what .meta{ display:block; font-size:11px; color:var(--ink-dim); margin-top:2px; }\n  .tl-amount{ font-family:\"SF Mono\",Menlo,monospace; font-size:13.5px; font-weight:700; color:var(--ink); flex:none; font-variant-numeric:tabular-nums; }\n\n  section{ padding:40px 0; border-bottom:1px solid var(--rule); }\n  section:last-of-type{ border-bottom:none; }\n  .section-label{ display:flex; align-items:baseline; gap:12px; margin-bottom:22px; }\n  .section-label .n{ font-family:\"SF Mono\",Menlo,monospace; color:var(--accent); font-size:13px; }\n  .section-label h2{ font-size:13px; text-transform:uppercase; letter-spacing:0.12em; color:var(--ink); margin:0; font-weight:700; }\n  .section-label .rule{ flex:1; height:1px; background:var(--rule); }\n\n  /* ---------- Task cards ---------- */\n  .task-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }\n  @media (max-width:860px){ .task-grid{ grid-template-columns:1fr; } }\n  .autotask{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:18px; display:flex; flex-direction:column; gap:10px; }\n  .autotask .icon{ font-size:24px; }\n  .autotask h3{ margin:0; font-size:15px; color:var(--ink); }\n  .autotask .when{ display:inline-block; font-size:10.5px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:var(--accent); background:rgba(52,247,215,0.1); border:1px solid var(--accent-dim); padding:3px 9px; border-radius:20px; width:fit-content; }\n  .autotask p{ margin:0; font-size:12.5px; color:var(--ink-dim); line-height:1.6; }\n  .autotask .out{ font-size:11.5px; color:var(--ink-dim); border-top:1px solid var(--rule); padding-top:9px; margin-top:2px; }\n  .autotask .out code{ background:rgba(0,0,0,0.25); padding:1px 6px; border-radius:4px; color:var(--accent); font-size:11px; }\n  .autotask.cancelled{ opacity:.55; }\n  .autotask .when.off{ color:var(--danger); background:rgba(255,122,104,0.1); border-color:var(--danger-dim); }\n  .autotask .cost{ font-family:\"SF Mono\",Menlo,monospace; font-size:13px; font-weight:700; color:var(--gold); }\n\n  /* ---------- Cost log ---------- */\n  .spend-row{ display:flex; justify-content:space-between; align-items:baseline; padding:10px 0; border-top:1px solid var(--rule); gap:12px; }\n  .spend-row:first-child{ border-top:none; }\n  .spend-what{ font-size:13px; color:var(--ink); }\n  .spend-what .meta{ display:block; font-size:11px; color:var(--ink-dim); margin-top:2px; }\n  .spend-amount{ font-family:\"SF Mono\",Menlo,monospace; font-size:13.5px; font-weight:700; color:var(--ink); flex:none; font-variant-numeric:tabular-nums; }\n  .spend-total{ display:flex; justify-content:space-between; align-items:baseline; padding:14px 0 2px 0; margin-top:6px; border-top:1px solid var(--rule); }\n  .spend-total .spend-amount{ color:var(--accent); font-size:17px; }\n  .log-card{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:6px 18px 4px 18px; }\n  /* Spend chart (17.7.) */\n  .spend-chart{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:16px 18px 10px 18px; }\n  .sc-title{ font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-dim); font-weight:700; margin-bottom:10px; }\n  .sc-row{ display:flex; align-items:center; gap:10px; padding:5px 0; }\n  .sc-name{ flex:0 0 240px; min-width:0; font-size:12px; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }\n  .sc-bar{ flex:1; height:12px; background:var(--paper-raised); border:1px solid var(--rule); border-radius:99px; overflow:hidden; display:flex; }\n  .sc-fill{ height:100%; background:var(--gold); }\n  .sc-amount{ flex:none; font-family:\"SF Mono\",Menlo,monospace; font-size:11px; font-weight:700; color:var(--gold); min-width:78px; text-align:right; }\n  @media(max-width:640px){ .sc-name{ flex-basis:130px; } }\n\n  .callout{ border:1px solid var(--rule); background:var(--paper); border-radius:10px; padding:16px 18px; margin-top:16px; }\n  .callout .k{ font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:var(--ink-dim); font-weight:700; margin-bottom:7px; }\n  .callout p{ margin:0; font-size:13.5px; color:var(--ink-dim); line-height:1.65; }\n  .callout code{ background:rgba(0,0,0,0.25); padding:1px 6px; border-radius:4px; font-size:12px; color:var(--accent); }\n\n  footer.foot{ text-align:center; font-size:11.5px; color:var(--ink-faint); padding:40px 0 20px 0; }\n\n  /* ---------- Sautero stamp + language fab (Richard, 15.7.: every /visual data/ document\n     carries a last-updated-to-Sautero-state badge and an SK/EN toggle) ---------- */\n  .sautero-stamp{\n    position:fixed; bottom:14px; right:14px; z-index:90;\n    background:rgba(15,35,64,0.92); border:1px solid rgba(52,247,215,0.4); color:#34F7D7;\n    font-size:10.5px; font-weight:700; font-family:\"SF Mono\",Menlo,Consolas,monospace;\n    padding:6px 12px; border-radius:999px;\n    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); pointer-events:none;\n  }\n  .sautero-lang-fab{\n    position:fixed; bottom:14px; left:14px; z-index:90;\n    background:rgba(15,35,64,0.92); border:1px solid #223d57; color:#9C949E;\n    font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;\n    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;\n    padding:7px 14px; border-radius:999px; cursor:pointer;\n    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);\n    transition:border-color .15s, color .15s;\n  }\n  .sautero-lang-fab:hover{ border-color:rgba(52,247,215,0.4); color:#34F7D7; }\n  @media print{ .sautero-stamp, .sautero-lang-fab{ display:none; } }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\u003cheader class=\"hero\">\n  \u003cdiv class=\"wrap\" style=\"padding:0; border:none;\">\n    \u003cdiv class=\"topline\">\n      \u003cdiv class=\"brandmark\">\n        \u003csvg width=\"24\" height=\"24\" viewBox=\"0 0 68 68\">\u003cpath d=\"M 46.8 42.3 A 18 18 0 1 1 46.8 21.7\" fill=\"none\" stroke=\"#34F7D7\" stroke-width=\"7\" stroke-linecap=\"round\"/>\u003ccircle cx=\"34\" cy=\"34\" r=\"3\" fill=\"#34F7D7\"/>\u003c/svg>\n        \u003cspan class=\"word\">Sautero\u003c/span>\n      \u003c/div>\n      \u003cbutton class=\"lang-toggle\" id=\"langBtn\" onclick=\"toggleLang()\">EN\u003c/button>\n    \u003c/div>\n    \u003cdiv class=\"kicker\" data-sk=\"Automatizácie · Náklady\" data-en=\"Automation · Costs\">\u003c/div>\n    \u003ch1 class=\"title\" data-sk=\"Čo beží samo, kedy, a za koľko\" data-en=\"What runs on its own, when, and for how much\">\u003c/h1>\n    \u003cp class=\"lede\" data-sk=\"Každá opakujúca sa úloha, ktorú appka/Claude spúšťa bez toho, aby si o to musel požiadať — čo presne robí, kedy sa spúšťa, kam ukladá výsledok, a self-reported odhad ceny. Nič skryté, nič bez stropu.\" data-en=\"Every recurring task the app/Claude runs on its own without you having to ask — exactly what it does, when it runs, where the result lands, and a self-reported cost estimate. Nothing hidden, nothing uncapped.\">\u003c/p>\n    \u003cdiv class=\"meta-row\">\n      \u003cdiv class=\"meta-card\">\u003cdiv class=\"meta-label\" data-sk=\"Aktívne automatizácie (všetky zadarmo)\" data-en=\"Active automations (all free)\">\u003c/div>\u003cdiv class=\"meta-value\">6\u003c/div>\u003c/div>\n      \u003cdiv class=\"meta-card\">\u003cdiv class=\"meta-label\" data-sk=\"Platené AI úlohy — všetky ZRUŠENÉ 22.7.\" data-en=\"Paid AI tasks — all CANCELLED Jul 22\">\u003c/div>\u003cdiv class=\"meta-value\">CHF 0\u003c/div>\u003c/div>\n      \u003cdiv class=\"meta-card clickable\" onclick=\"toggleTimeline()\" id=\"totalCard\">\n        \u003cdiv class=\"meta-label\" data-sk=\"Celkový beh projektu (self-reported)\" data-en=\"Total project run (self-reported)\">\u003c/div>\n        \u003cdiv class=\"meta-value\">~CHF 238.73 \u003cspan class=\"expand-hint\" data-sk=\"▸ rozklikni\" data-en=\"▸ click to expand\">\u003c/span>\u003c/div>\n      \u003c/div>\n    \u003c/div>\n\n    \u003cdiv class=\"timeline-panel\" id=\"timelinePanel\">\n      \u003cp class=\"lede\" style=\"margin:8px 0 12px 0; font-size:12.5px;\" data-sk=\"Denný záznam existuje až od 15.7.2026 (docs/automation_cost_log.md). Všetko pred tým je jeden spätný hrubý odhad — nedá sa to rozdeliť po dňoch spätne s istotou.\" data-en=\"A real daily log only exists from Jul 15, 2026 onward (docs/automation_cost_log.md). Everything before that is one retroactive rough estimate — it can't be reliably split day-by-day after the fact.\">\u003c/p>\n      \u003cdiv class=\"log-card\" id=\"timelineList\">\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/header>\n\n\u003cdiv class=\"wrap\">\n\n  \u003csection>\n    \u003cdiv class=\"section-label\">\u003cspan class=\"n\">01\u003c/span>\u003ch2 data-sk=\"Odkiaľ presne berieme tento rozpočet\" data-en=\"Where this budget actually comes from\">\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n    \u003cdiv class=\"callout\">\n      \u003cdiv class=\"k\" data-sk=\"Nie je to samostatný vrecko peňazí\" data-en=\"Not a separate pot of money\">\u003c/div>\n      \u003cp data-sk='Tieto 4 opakujúce sa úlohy bežia cez ten istý \u003ccode>Claude (Max plán)\u003c/code> účet, ktorý používaš práve teraz v tomto chate — nie cez nejaký oddelený rozpočet. Max plán je jeden pevný mesačný poplatok (už započítaný v odhade CHF 130 nižšie) s limitom na množstvo použitia, nie platba za token. Takže \"CHF 30/mesiac\" tu nie je reálna faktúra navyše — je to \u003cb style=\"color:var(--ink);\">self-reported odhad rovnocennej ceny\u003c/b>, keby si to platil per-token, aby si mal predstavu o rozsahu/námahe jednotlivých úloh. Skutočné riziko nie je \"minieme peniaze\" — je to, že tieto úlohy bežiace na pozadí vyčerpajú tvoj Max limit natoľko, že by to obmedzilo tvoje vlastné rozhovory so mnou. Ak by k tomu niekedy došlo, riešenie je znížiť frekvenciu úloh, nie \"dobiť si kredit\".' data-en='These 4 recurring tasks run through the same \u003ccode>Claude (Max plan)\u003c/code> account you\\'re using right now in this chat — not a separate budget. Max is one flat monthly fee (already counted in the ~CHF 135 estimate below) with a usage limit, not per-token billing. So \"CHF 30/month\" here isn\\'t a real extra invoice — it\\'s a \u003cb style=\"color:var(--ink);\">self-reported estimate\u003c/b> of what the equivalent pay-per-token cost would be, just so you have a sense of each task\\'s scale/effort. The real risk isn\\'t \"we spend money\" — it\\'s that these background tasks eat enough of your Max usage limit to crowd out your own conversations with me. If that ever happens, the fix is lowering task frequency, not \"topping up a balance.\"'>\u003c/p>\n    \u003c/div>\n    \u003cdiv class=\"callout\" style=\"margin-top:12px;\">\n      \u003cdiv class=\"k\" data-sk=\"Kde sa PLATÍ naozaj po tokenoch\" data-en=\"Where real per-token billing DOES happen\">\u003c/div>\n      \u003cp data-sk=\"Appka Sautero samotná (fotoscan, Chef's Assistant, generovanie receptov) používa TVOJ VLASTNÝ Anthropic API kľúč, ktorý si zadal v nastaveniach appky — to sa účtuje priamo z tvojho Anthropic Console účtu, oddelene od Max predplatného použitého tu na tieto 4 úlohy.\" data-en=\"The Sautero app itself (photo scan, Chef's Assistant, recipe generation) uses YOUR OWN Anthropic API key, entered in the app's settings — that's billed directly from your Anthropic Console account, separate from the Max subscription used here for these 4 tasks.\">\u003c/p>\n    \u003c/div>\n  \u003c/section>\n\n  \u003csection>\n    \u003cdiv class=\"section-label\">\u003cspan class=\"n\">02\u003c/span>\u003ch2 data-sk=\"Aktívne automatizácie\" data-en=\"Active automations\">\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n\n    \u003cdiv class=\"task-grid\">\n      \u003cdiv class=\"autotask cancelled\">\n        \u003cdiv class=\"icon\">🩺\u003c/div>\n        \u003ch3 data-sk=\"Denná kontrola zdravia appky\" data-en=\"Daily feature health check\">\u003c/h3>\n        \u003cspan class=\"when off\" data-sk=\"ZRUŠENÉ 22.7. — úlohu prevzal Health Report zadarmo (CI)\" data-en=\"CANCELLED Jul 22 — superseded by the free Health Report (CI)\">\u003c/span>\n        \u003cp data-sk=\"Statický code-audit — nie živé testovanie (agent nemá prehliadač ani telefón). Kontroluje: zhodu tlačidiel s funkciami, tabuľky v kóde vs. migrácie, štrukturálnu integritu súborov, zastarané nespustené migrácie.\" data-en=\"Static code audit — not live testing (the agent has no browser or phone). Checks: button-to-function matches, tables referenced in code vs. migrations, file structural integrity, aging unrun migrations.\">\u003c/p>\n        \u003cdiv class=\"out\">\u003cspan data-sk=\"Výstup: \" data-en=\"Output: \">\u003c/span>\u003ccode>visual data/feature_status.html\u003c/code> \u003cspan data-sk=\"(features.html zrušený 17.7. pri konsolidácii dokumentov)\" data-en=\"(features.html retired Jul 17 in the docs consolidation)\">\u003c/span>\u003c/div>\n        \u003cdiv class=\"cost\" data-sk=\"~CHF 0.02–0.08 / beh\" data-en=\"~CHF 0.02–0.08 / run\">\u003c/div>\n      \u003c/div>\n\n      \u003cdiv class=\"autotask\">\n        \u003cdiv class=\"icon\">🛡️\u003c/div>\n        \u003ch3 data-sk=\"Trvalé audítory pri každom commite\" data-en=\"Permanent auditors on every commit\">\u003c/h3>\n        \u003cspan class=\"when\" data-sk=\"Pri každom commite + CI (zadarmo — žiadne AI)\" data-en=\"Every commit + CI (free — no AI involved)\">\u003c/span>\n        \u003cp data-sk=\"audit_db.py + audit_app.py — strážia triedy chýb, ktoré reálne nastali: RLS rekurzia, tabuľka bez RLS/kitchen_id, deštruktívne SQL bez priznania, mŕtve tlačidlá, tajné kľúče, tiché mutácie, a od 17.7. aj verejné storage buckety (únik zmlúv) a odstránenie XSS escapera pre cudzí obsah. Commit s takou chybou jednoducho neprejde.\" data-en=\"audit_db.py + audit_app.py — guard the bug classes that actually happened: RLS recursion, tables without RLS/kitchen_id, unacknowledged destructive SQL, dead buttons, leaked secrets, silent mutations, and since Jul 17 also public storage buckets (the contract-leak class) and removal of the foreign-content XSS escaper. A commit with one of these simply fails.\">\u003c/p>\n        \u003cdiv class=\"out\">\u003cspan data-sk=\"Výstup: \" data-en=\"Output: \">\u003c/span>\u003cspan data-sk=\"zablokovaný commit s presným popisom chyby\" data-en=\"a blocked commit with the exact violation\">\u003c/span>\u003c/div>\n        \u003cdiv class=\"cost\" data-sk=\"CHF 0 / beh\" data-en=\"CHF 0 / run\">\u003c/div>\n      \u003c/div>\n\n      \u003cdiv class=\"autotask cancelled\">\n        \u003cdiv class=\"icon\">🤖\u003c/div>\n        \u003ch3 data-sk=\"Denný ingredient agent\" data-en=\"Daily ingredient agent\">\u003c/h3>\n        \u003cspan class=\"when off\" data-sk=\"ZRUŠENÉ 22.7. — bežal 15.–21.7.\" data-en=\"CANCELLED Jul 22 — ran Jul 15–21\">\u003c/span>\n        \u003cp data-sk=\"Sám si vyberie jedno malé vylepšenie ingrediencií (overí ceny, doplní chýbajúce polia, alebo pridá chýbajúce položky) a zapíše ho ako novú SQL migráciu — nikdy priamo do produkcie.\" data-en=\"Picks one small ingredient improvement itself (verifies prices, fills missing fields, or adds missing items) and writes it as a new SQL migration — never straight to production.\">\u003c/p>\n        \u003cdiv class=\"out\">\u003cspan data-sk=\"Výstup: \" data-en=\"Output: \">\u003c/span>\u003ccode>db/*.sql\u003c/code> + \u003ccode>docs/ingredient_agent_log.md\u003c/code>\u003c/div>\n        \u003cdiv class=\"cost\" data-sk=\"~CHF 0.05–1.50 / beh · strop CHF 30/mesiac\" data-en=\"~CHF 0.05–1.50 / run · cap CHF 30/month\">\u003c/div>\n      \u003c/div>\n\n      \u003cdiv class=\"autotask cancelled\">\n        \u003cdiv class=\"icon\">📸\u003c/div>\n        \u003ch3 data-sk=\"Nedeľný snapshot\" data-en=\"Sunday snapshot\">\u003c/h3>\n        \u003cspan class=\"when off\" data-sk=\"ZRUŠENÉ 22.7. — nahradený /audit na požiadanie\" data-en=\"CANCELLED Jul 22 — replaced by on-demand /audit\">\u003c/span>\n        \u003cp data-sk=\"Poskladá celý obsah app/, docs/ a git históriu do jedného dátovaného súboru — surový podklad, z ktorého Claude následne píše samotný infografický Critical Review (docs/CRITICAL_REVIEW_&lt;dátum&gt;.html), na Richardovu žiadosť od 15.7.2026.\" data-en=\"Assembles the full content of app/, docs/, and git history into one dated file — the raw material Claude then uses to write the actual infographic Critical Review itself (docs/CRITICAL_REVIEW_&lt;date&gt;.html), at Richard's request as of Jul 15, 2026.\">\u003c/p>\n        \u003cdiv class=\"out\">\u003cspan data-sk=\"Výstup: \" data-en=\"Output: \">\u003c/span>\u003ccode>docs/snapshots/&lt;dátum&gt;.md\u003c/code>\u003c/div>\n        \u003cdiv class=\"cost\" data-sk=\"~CHF 0.05–0.20 / beh\" data-en=\"~CHF 0.05–0.20 / run\">\u003c/div>\n      \u003c/div>\n\n      \u003cdiv class=\"autotask cancelled\">\n        \u003cdiv class=\"icon\">🚨\u003c/div>\n        \u003ch3 data-sk=\"Pondelková kontrola deadline\" data-en=\"Monday deadline check\">\u003c/h3>\n        \u003cspan class=\"when off\" data-sk=\"ZRUŠENÉ 22.7. — bežala do 21.7.\" data-en=\"CANCELLED Jul 22 — ran until Jul 21\">\u003c/span>\n        \u003cp data-sk=\"Skontroluje, či dnes pribudol nový Critical Review — ak nie, zvýrazneným 🚨 blokom pripomenie zmeškaný 14:30 deadline. Len číta, nič nezapisuje okrem nákladového riadku.\" data-en=\"Checks whether a new Critical Review appeared today — if not, a highlighted 🚨 block flags the missed 14:30 deadline. Read-only, except for the cost line.\">\u003c/p>\n        \u003cdiv class=\"out\">\u003cspan data-sk=\"Výstup: \" data-en=\"Output: \">\u003c/span>\u003cspan data-sk=\"upozornenie v chate\" data-en=\"a chat alert\">\u003c/span>\u003c/div>\n        \u003cdiv class=\"cost\" data-sk=\"~CHF 0.01–0.03 / beh\" data-en=\"~CHF 0.01–0.03 / run\">\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003csection>\n    \u003cdiv class=\"section-label\">\u003cspan class=\"n\">🤖\u003c/span>\u003ch2 data-sk=\"Živý zoznam robotov (auto — generuje sa sám)\" data-en=\"Live robot roster (auto — generates itself)\">\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n    \u003c!--AUTO:START:robot_roster-->\n\u003cp style=\"color:var(--ink-dim); font-size:12px; margin:0 0 10px;\" data-sk=\"Živý zoznam — generovaný automaticky zo skutočných skriptov a workflowov (23 spolu). Nový robot sa sem doplní sám.\" data-en=\"Live list — generated automatically from the actual scripts and workflows (23 total). A new robot is added here by itself.\">Živý zoznam — generovaný automaticky zo skutočných skriptov a workflowov (23 spolu). Nový robot sa sem doplní sám.\u003c/p>\n\u003cp style=\"font-size:12px; font-weight:700; margin:8px 0 4px; color:var(--accent);\">scripts/\u003c/p>\n\u003cul style=\"margin:0 0 12px; padding-left:18px; font-size:13px; line-height:1.6;\">\u003cli>\u003ccode>audit_app.py\u003c/code> — Sautero app auditor.\u003c/li>\u003cli>\u003ccode>audit_db.py\u003c/code> — Sautero DB migration auditor.\u003c/li>\u003cli>\u003ccode>ui_invariants.py\u003c/code> — UI/UX invariants.\u003c/li>\u003cli>\u003ccode>calc_unit_test.js\u003c/code> — Money-path unit tests.\u003c/li>\u003cli>\u003ccode>tile_lock_test.py\u003c/code> — Sautero tile-lock runner.\u003c/li>\u003cli>\u003ccode>ui_regression_test.py\u003c/code> — UI/UX regression suite.\u003c/li>\u003cli>\u003ccode>unauth_gates_test.py\u003c/code> — Sautero unauthenticated-gates E2E test.\u003c/li>\u003cli>\u003ccode>e2e_smoke_test.py\u003c/code> — Sautero end-to-end smoke test.\u003c/li>\u003cli>\u003ccode>docs_qa_test.py\u003c/code> — Sautero Internal-Docs QA robot.\u003c/li>\u003cli>\u003ccode>coverage_manifest.py\u003c/code> — Sautero QA coverage manifest.\u003c/li>\u003cli>\u003ccode>health_report.py\u003c/code> — Sautero Health Report.\u003c/li>\u003cli>\u003ccode>work_hours.py\u003c/code> — Sautero work-hours meter.\u003c/li>\u003cli>\u003ccode>docs_autofix.py\u003c/code> — Sautero docs auto-fixer.\u003c/li>\u003cli>\u003ccode>docs_changelog.py\u003c/code> — Auto-generated changelog.\u003c/li>\u003cli>\u003ccode>docs_autosection.py\u003c/code> — Auto-maintained SECTIONS inside the existing Internal Docs.\u003c/li>\u003cli>\u003ccode>docs_js_check.py\u003c/code> — JS syntax guard for the Internal Docs' inline scripts.\u003c/li>\u003c/ul>\n\u003cp style=\"font-size:12px; font-weight:700; margin:8px 0 4px; color:var(--accent);\">.github/workflows/\u003c/p>\n\u003cul style=\"margin:0; padding-left:18px; font-size:13px; line-height:1.6;\">\u003cli>\u003ccode>deploy-pages.yml\u003c/code> — Deploy app/ to GitHub Pages\u003c/li>\u003cli>\u003ccode>docs-qa.yml\u003c/code> — Internal-Docs QA (one robot per document)\u003c/li>\u003cli>\u003ccode>e2e-smoke.yml\u003c/code> — E2E smoke test\u003c/li>\u003cli>\u003ccode>health-checks.yml\u003c/code> — Health checks\u003c/li>\u003cli>\u003ccode>qa-checks.yml\u003c/code> — QA checks (auditors + tenant isolation)\u003c/li>\u003cli>\u003ccode>rollback.yml\u003c/code> — ⏪ Rollback production\u003c/li>\u003cli>\u003ccode>tile-locks.yml\u003c/code> — Tile locks (behavioural guards on locked tiles)\u003c/li>\u003c/ul>\n\u003c!--AUTO:END:robot_roster-->\n  \u003c/section>\n\n  \u003csection>\n    \u003cdiv class=\"section-label\">\u003cspan class=\"n\">02+\u003c/span>\u003ch2 data-sk=\"Testy &amp; CI roboti (od 18.7. — zadarmo, žiadne AI)\" data-en=\"Tests &amp; CI robots (from Jul 18 — free, no AI)\">\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n    \u003cp class=\"lede\" style=\"margin:0 0 16px 0; font-size:12.5px;\" data-sk=\"Táto vrstva vznikla 18.–21.7. Nič z nej nestojí ani cent — sú to skripty a GitHub Actions roboti, žiadne AI tokeny. Chránia appku aj tieto dokumenty pred tým, aby sa niečo tíško pokazilo alebo aby dáta zastarali.\" data-en=\"This layer was built Jul 18–21. None of it costs a cent — plain scripts and GitHub Actions robots, no AI tokens. They protect the app and these very documents from silently breaking or going stale.\">\u003c/p>\n    \u003cdiv class=\"autotasks\">\n      \u003cdiv class=\"autotask\">\n        \u003cdiv class=\"icon\">🛡️\u003c/div>\n        \u003ch3 data-sk=\"Gaty pri každom commite\" data-en=\"Gates on every commit\">\u003c/h3>\n        \u003cspan class=\"when\" data-sk=\"Každý commit + pred nasadením\" data-en=\"Every commit + before deploy\">\u003c/span>\n        \u003cp data-sk=\"Blokujú nasadenie: audit_app + audit_db (štruktúra, RLS, tajomstvá, XSS, DB-kontrakt), UI invarianty (bublina, z-index okien, logovanie nákladov, scroll na vrch, prepínač Personal/Company), money-path unit testy (cena receptu, výplatné + rozvrhové hodiny) a kontrola odpracovaných hodín (musia sedieť s gitom). Chyba, čo raz spadla, sa už nedostane ku kuchyni.\" data-en=\"Block the deploy: audit_app + audit_db (structure, RLS, secrets, XSS, DB-contract), UI invariants (status pill, sheet z-index, cost logging, scroll-to-top, Personal/Company toggle), money-path unit tests (recipe cost, payroll + shift hours) and the worked-hours check (must match git). A bug that fell once can't reach the kitchen again.\">\u003c/p>\n        \u003cdiv class=\"out\">\u003cspan data-sk=\"Výstup: \" data-en=\"Output: \">\u003c/span>\u003cspan data-sk=\"zablokovaný commit/deploy s presnou chybou\" data-en=\"a blocked commit/deploy with the exact violation\">\u003c/span>\u003c/div>\n        \u003cdiv class=\"cost\" data-sk=\"CHF 0 / beh\" data-en=\"CHF 0 / run\">\u003c/div>\n      \u003c/div>\n\n      \u003cdiv class=\"autotask\">\n        \u003cdiv class=\"icon\">🔒\u003c/div>\n        \u003ch3 data-sk=\"Únikový test medzi kuchyňami\" data-en=\"Cross-kitchen leak test\">\u003c/h3>\n        \u003cspan class=\"when\" data-sk=\"2×/deň (08:00 + 18:00)\" data-en=\"2×/day (08:00 + 18:00)\">\u003c/span>\n        \u003cp data-sk=\"Preukáže hlasným zlyhaním, že užívateľ jednej kuchyne nevidí ani jeden riadok inej kuchyne — naprieč 36 tabuľkami. Číta cez impersonáciu ako reálny prihlásený user, v transakcii ktorá sa zahodí.\" data-en=\"Proves with a loud failure that a user of one kitchen cannot read a single row of another — across 36 tables. Reads via impersonation like a real logged-in user, in a rolled-back transaction.\">\u003c/p>\n        \u003cdiv class=\"out\">\u003cspan data-sk=\"Výstup: \" data-en=\"Output: \">\u003c/span>\u003ccode>tenant_isolation_test.sql\u003c/code>\u003c/div>\n        \u003cdiv class=\"cost\" data-sk=\"CHF 0 / beh\" data-en=\"CHF 0 / run\">\u003c/div>\n      \u003c/div>\n\n      \u003cdiv class=\"autotask\">\n        \u003cdiv class=\"icon\">🚪\u003c/div>\n        \u003ch3 data-sk=\"Roboti na prihlásenie + dlaždice\" data-en=\"Login + tiles robots\">\u003c/h3>\n        \u003cspan class=\"when\" data-sk=\"2×/deň\" data-en=\"2×/day\">\u003c/span>\n        \u003cp data-sk=\"Živý prehliadač: kontrola neprihlásených brán (coming-soon stena, „mám účet\", prepínač heslo/kód, bezpečné zlyhanie loginu — bez hesiel) a smoke test prihlásených dlaždíc naprieč rolami (obrazovka sa otvorí, žiadna JS chyba / 5xx).\" data-en=\"Live browser: pre-login gates (coming-soon wall, 'already have an account', password/code toggle, safe failing login — no secrets) plus a smoke test of the logged-in tiles across roles (screen opens, no JS error / 5xx).\">\u003c/p>\n        \u003cdiv class=\"out\">\u003cspan data-sk=\"Výstup: \" data-en=\"Output: \">\u003c/span>\u003ccode>unauth_gates_test.py\u003c/code> · \u003ccode>e2e_smoke_test.py\u003c/code>\u003c/div>\n        \u003cdiv class=\"cost\" data-sk=\"CHF 0 / beh\" data-en=\"CHF 0 / run\">\u003c/div>\n      \u003c/div>\n\n      \u003cdiv class=\"autotask\">\n        \u003cdiv class=\"icon\">🎯\u003c/div>\n        \u003ch3 data-sk=\"UI/UX guardy (od 22.7.)\" data-en=\"UI/UX guards (from Jul 22)\">\u003c/h3>\n        \u003cspan class=\"when\" data-sk=\"Pri nasadení (blokuje) + 2×/deň\" data-en=\"On deploy (blocks) + 2×/day\">\u003c/span>\n        \u003cp data-sk=\"Dve vrstvy proti tomu, aby sa opravený UI bug vrátil. Statické guardy zo zdrojáku (na každom pushi): bublina stavu neprepíše okraj, okno „Save where?\" sa otvorí navrchu, náklad AI fotky sa vždy zaloguje, a otvorenie receptu resetuje skutočný scroller. Plus reálny prehliadačový test: recept sa VŽDY otvorí na vrchu (aj pri skoku recept→recept) — chytá runtime UX chyby, ktoré statická kontrola nevidí. Regresia zablokuje nasadenie.\" data-en=\"Two layers that stop a fixed UI bug from returning. Static source guards (every push): the status pill never overflows its edge, the 'Save where?' sheet opens on top, an AI photo's cost is always logged, and opening a recipe resets the real scroller. Plus a real-browser test: a recipe ALWAYS opens at its top (even on a recipe→recipe jump) — catching runtime UX bugs a static check can't see. A regression blocks the deploy.\">\u003c/p>\n        \u003cdiv class=\"out\">\u003cspan data-sk=\"Výstup: \" data-en=\"Output: \">\u003c/span>\u003ccode>ui_invariants.py\u003c/code> · \u003ccode>ui_regression_test.py\u003c/code> · \u003ccode>tile_lock_test.py\u003c/code>\u003c/div>\n        \u003cdiv class=\"cost\" data-sk=\"CHF 0 / beh\" data-en=\"CHF 0 / run\">\u003c/div>\n      \u003c/div>\n\n      \u003cdiv class=\"autotask\">\n        \u003cdiv class=\"icon\">🩺\u003c/div>\n        \u003ch3 data-sk=\"Health Report\" data-en=\"Health Report\">\u003c/h3>\n        \u003cspan class=\"when\" data-sk=\"Pri nasadení + 2×/deň\" data-en=\"On deploy + 2×/day\">\u003c/span>\n        \u003cp data-sk=\"Štyri automatické audity nad reálnym kódom (architektúra, bezpečnosť, dokumentácia, technický dlh) → známkovaný dashboard. Čísla sú počítané, nie ručné; generuje sa pri každom nasadení, nech vždy sedí s tým, čo je naživo.\" data-en=\"Four automated audits over the real code (architecture, security, documentation, technical debt) → a graded dashboard. Numbers are computed, not hand-entered; regenerated on every deploy so it always matches what's live.\">\u003c/p>\n        \u003cdiv class=\"out\">\u003cspan data-sk=\"Výstup: \" data-en=\"Output: \">\u003c/span>\u003ccode>visual data/health.html\u003c/code>\u003c/div>\n        \u003cdiv class=\"cost\" data-sk=\"CHF 0 / beh\" data-en=\"CHF 0 / run\">\u003c/div>\n      \u003c/div>\n\n      \u003cdiv class=\"autotask\">\n        \u003cdiv class=\"icon\">📄\u003c/div>\n        \u003ch3 data-sk=\"Flotila docs-robotov (1 na dokument)\" data-en=\"Docs robot fleet (1 per document)\">\u003c/h3>\n        \u003cspan class=\"when\" data-sk=\"2×/deň, paralelne\" data-en=\"2×/day, in parallel\">\u003c/span>\n        \u003cp data-sk=\"Jeden robot na každý dokument v Internal Docs. Každý vykreslí dokument na mobile aj desktope a stráži tri veci: nič nelieta (žiadne pretekanie), EN/SK prepínač je vo vrchnej lište a nič ho neprekrýva, a nechýbajú dáta (undefined/NaN/jednostranný preklad). Plus coverage manifest — stráži, že žiadny modul nevypadne z pokrytia.\" data-en=\"One robot per Internal Docs page. Each renders the doc on mobile and desktop and guards three things: nothing flies (no overflow), the EN/SK toggle is in the top bar and not overlapped, and no missing data (undefined/NaN/one-sided translation). Plus the coverage manifest — guards that no module drops out of coverage.\">\u003c/p>\n        \u003cdiv class=\"out\">\u003cspan data-sk=\"Výstup: \" data-en=\"Output: \">\u003c/span>\u003ccode>docs_qa_test.py\u003c/code> · \u003ccode>coverage_manifest.py\u003c/code>\u003c/div>\n        \u003cdiv class=\"cost\" data-sk=\"CHF 0 / beh\" data-en=\"CHF 0 / run\">\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003csection>\n    \u003cdiv class=\"section-label\">\u003cspan class=\"n\">03\u003c/span>\u003ch2 data-sk=\"Náklady — posledné záznamy\" data-en=\"Costs — recent entries\">\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n    \u003c!-- Spend chart (Richard, 17.7.): same entries as the timeline, visually proportional. -->\n    \u003cdiv class=\"spend-chart\" id=\"spendChart\" style=\"margin-bottom:14px;\">\u003c/div>\n    \u003cdiv class=\"log-card\">\n      \u003cdiv class=\"spend-row\">\n        \u003cdiv class=\"spend-what\">\u003cspan data-sk=\"Zatiaľ žiadny automatický beh\" data-en=\"No automated run yet\">\u003c/span>\u003cspan class=\"meta\" data-sk=\"Prvý beh denného ingredient agenta: 15.7.2026 ráno. Plný priebežný záznam: docs/automation_cost_log.md\" data-en=\"First daily ingredient-agent run: morning of Jul 15, 2026. Full running log: docs/automation_cost_log.md\">\u003c/span>\u003c/div>\n        \u003cdiv class=\"spend-amount\">CHF 0.00\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"spend-total\">\n        \u003cdiv class=\"spend-what\" data-sk=\"Súčet z automatizácií (mesiac)\" data-en=\"Automation total (this month)\">\u003c/div>\n        \u003cdiv class=\"spend-amount\">CHF 0.00\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003csection>\n    \u003cdiv class=\"section-label\">\u003cspan class=\"n\">04\u003c/span>\u003ch2 data-sk=\"Ako to čítať\" data-en=\"How to read this\">\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n    \u003cdiv class=\"callout\">\n      \u003cdiv class=\"k\" data-sk=\"Self-reported, nie auditované\" data-en=\"Self-reported, not audited\">\u003c/div>\n      \u003cp data-sk='Každá cena tu je odhad, ktorý si úloha sama zapísala pri behu — nie výpis z účtu. Presné čísla vždy v \u003ccode>Anthropic Console\u003c/code> alebo bankovom výpise. Ak sa čísla rozídu, ver tým skutočným, nie tejto stránke.' data-en='Every price here is an estimate the task wrote about itself while running — not a billing statement. Exact figures always in the \u003ccode>Anthropic Console\u003c/code> or bank statement. If the numbers ever disagree, trust those, not this page.'>\u003c/p>\n    \u003c/div>\n  \u003c/section>\n\n\u003c/div>\n\u003cfooter class=\"foot\" data-sk=\"Sautero — automatizácie a náklady · aktualizuje sa pri každom behu · 15. 7. 2026\" data-en=\"Sautero — automations and costs · updates with every run · Jul 15, 2026\">\u003c/footer>\n\n\u003cscript>\nlet _autoLang = localStorage.getItem('sautero_doc_lang') || 'sk';\nfunction applyAutoLang(){\n  document.querySelectorAll('[data-sk]').forEach(el=>{\n    const val = _autoLang === 'sk' ? el.getAttribute('data-sk') : (el.getAttribute('data-en') || el.getAttribute('data-sk'));\n    if(val.indexOf('\u003c') !== -1) el.innerHTML = val; else el.textContent = val;\n  });\n  const btn = document.getElementById('langBtn');\n  if(btn) btn.textContent = _autoLang === 'sk' ? 'EN' : 'SK';\n  document.documentElement.lang = _autoLang;\n}\nwindow.toggleLang = function(){\n  _autoLang = _autoLang === 'sk' ? 'en' : 'sk';\n  localStorage.setItem('sautero_doc_lang', _autoLang);\n  applyAutoLang();\n  renderTimeline();\n};\napplyAutoLang();\n\n/* ---------- Total-run timeline — click the meta-card to unroll. Only ONE real dated entry\n   exists so far (the retroactive lump estimate); from 2026-07-15 onward, real per-run lines\n   come from docs/automation_cost_log.md and should be added here as they accumulate. */\nconst SPEND_TIMELINE = [\n  { sk:'15.7.2026 — doména chefos.ch (Hostpoint)', en:'Jul 15, 2026 — domain chefos.ch (Hostpoint)',\n    note_sk:'Prvý rok so zľavou; obnova ~CHF 15/rok od druhého roka. Bez Domain Shield doplnku.', note_en:'First-year discount; renews at ~CHF 15/year from year 2. No Domain Shield add-on.',\n    amount:'CHF 5.00' },\n  { sk:'8.7.–14.7.2026 (spred denného logu)', en:'Jul 8–14, 2026 (before the daily log existed)',\n    note_sk:'Hrubý spätný odhad za celý prvý týždeň buildu — API kredity + Claude predplatné dohromady, nerozpočítané po dňoch.', note_en:'A rough retroactive estimate for the whole first build week — API credits + Claude subscription combined, not split by day.',\n    amount:'~CHF 135' },\n  { sk:'15.7.2026 — prvý beh denného ingredient agenta', en:'Jul 15, 2026 — first daily ingredient-agent run',\n    note_sk:'Self-reported odhad z docs/ingredient_agent_log.md (overenie 16 základných surovín, db/67).', note_en:'Self-reported estimate from docs/ingredient_agent_log.md (verified 16 staple items, db/67).',\n    amount:'~CHF 1.20' },\n  { sk:'15.7.2026 (noc) — nové náklady na projekt', en:'Jul 15, 2026 (late night) — new project costs',\n    note_sk:'Nahlásené priamo Richardom — presné zaradenie/účel zatiaľ neupresnené v tomto zázname.', note_en:'Reported directly by Richard — exact category/purpose not yet specified in this entry.',\n    amount:'CHF 97.73' },\n];\nfunction renderTimeline(){\n  const el = document.getElementById('timelineList');\n  if(!el) return;\n  el.innerHTML = SPEND_TIMELINE.map(row=>`\n    \u003cdiv class=\"tl-row\">\n      \u003cdiv class=\"tl-what\">${_autoLang==='sk'?row.sk:row.en}\u003cspan class=\"meta\">${_autoLang==='sk'?row.note_sk:row.note_en}\u003c/span>\u003c/div>\n      \u003cdiv class=\"tl-amount\">${row.amount}\u003c/div>\n    \u003c/div>\n  `).join('') + `\u003cdiv class=\"tl-row\">\u003cdiv class=\"tl-what\">${_autoLang==='sk'?'Od 15.7. — pozri docs/automation_cost_log.md pre reálne dátumované riadky':'From Jul 15 — see docs/automation_cost_log.md for real dated lines'}\u003c/div>\u003cdiv class=\"tl-amount\">–\u003c/div>\u003c/div>`;\n}\nwindow.toggleTimeline = function(){\n  document.getElementById('timelinePanel').classList.toggle('open');\n  renderTimeline();\n};\nrenderTimeline();\n\n/* Spend chart (Richard, 17.7.) — the same SPEND_TIMELINE entries as horizontal bars, so the\n   proportions are visible at a glance (log scale would hide the story; linear tells it:\n   the first build week dwarfs the daily agent runs). */\n(function(){\n  const el = document.getElementById('spendChart');\n  if(!el) return;\n  const rows = SPEND_TIMELINE.map(r=>({ ...r, val: parseFloat(String(r.amount).replace(/[^0-9.]/g,'')) || 0 }));\n  const max = Math.max(...rows.map(r=>r.val));\n  el.innerHTML = '\u003cdiv class=\"sc-title\">' + (_autoLang==='sk' ? 'Výdavky podľa záznamov — vizuálne porovnanie' : 'Spend entries — visual comparison') + '\u003c/div>' +\n    rows.map(r=>`\n      \u003cdiv class=\"sc-row\">\n        \u003cspan class=\"sc-name\" title=\"${(_autoLang==='sk'?r.sk:r.en).replace(/\"/g,'&quot;')}\">${_autoLang==='sk'?r.sk:r.en}\u003c/span>\n        \u003cspan class=\"sc-bar\">\u003cspan class=\"sc-fill\" style=\"width:${max ? Math.max(1.5, r.val/max*100) : 0}%\">\u003c/span>\u003c/span>\n        \u003cspan class=\"sc-amount\">${r.amount}\u003c/span>\n      \u003c/div>`).join('');\n})();\n\u003c/script>\n\n\u003cdiv class=\"sautero-stamp\" data-sk=\"🔄 Stav Sautero k 22. 7. 2026, 00:36\" data-en=\"🔄 Sautero state as of Jul 22, 2026, 00:36\">🔄 Stav Sautero k 22. 7. 2026, 00:36\u003c/div>\n\u003c/body>\n\u003c/html>\n", "\u003c!DOCTYPE html>\n\u003chtml lang=\"sk\">\n\u003chead>\n\u003cmeta charset=\"UTF-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n\u003cmeta http-equiv=\"Cache-Control\" content=\"no-cache, no-store, must-revalidate\">\n\u003cmeta http-equiv=\"Pragma\" content=\"no-cache\">\n\u003cmeta http-equiv=\"Expires\" content=\"0\">\n\u003ctitle>Sautero — Náklady\u003c/title>\n\u003cstyle>\n  /* Sautero visual identity (standing rule): dark navy + teal, mono for numbers. */\n  :root{\n    --bg:#0A1A2F; --paper:#122845; --paper2:#0E2138; --ink:#FFFFFF; --ink-dim:#9C949E;\n    --ink-faint:#5E6B7A; --rule:#223d57; --accent:#34F7D7; --gold:#E8C468; --danger:#FF7A68;\n    --mono:'SF Mono',SFMono-Regular,ui-monospace,Menlo,monospace;\n  }\n  *{ box-sizing:border-box; min-width:0; }\n  html,body{ overflow-x:hidden; }\n  body{ margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif; padding:20px 16px 80px 16px; }\n  .wrap{ max-width:860px; margin:0 auto; }\n  h1{ font-size:24px; margin:0 0 4px 0; }\n  .lede{ font-size:13px; color:var(--ink-dim); line-height:1.55; margin:0 0 18px 0; }\n  .lang-toggle{ position:fixed; top:12px; right:12px; z-index:50; background:var(--paper); border:1px solid var(--rule); color:var(--ink); font-size:12px; font-weight:700; padding:6px 12px; border-radius:999px; cursor:pointer; }\n  .section-label{ display:flex; align-items:center; gap:10px; margin:26px 0 10px 0; }\n  .section-label .n{ font-family:var(--mono); font-size:11px; color:var(--accent); }\n  .section-label h2{ font-size:15px; margin:0; }\n  .section-label .rule{ flex:1; height:1px; background:var(--rule); }\n  .card{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:16px; }\n  .spend-legend{ display:flex; flex-direction:column; gap:7px; font-size:12px; color:var(--ink-dim); }\n  .spend-legend span.item{ display:inline-flex; align-items:center; gap:8px; cursor:pointer; border-radius:8px; padding:2px 6px; margin:-2px -6px; }\n  .spend-legend span.item:hover{ background:var(--paper2); }\n  .spend-legend i{ width:10px; height:10px; border-radius:3px; display:inline-block; flex:none; }\n  .spend-row{ display:flex; justify-content:space-between; align-items:baseline; padding:10px 0; border-top:1px solid var(--rule); gap:12px; flex-wrap:wrap; cursor:pointer; }\n  .spend-row:first-child{ border-top:none; }\n  .spend-row:hover{ background:var(--paper2); border-radius:8px; }\n  .spend-row.active{ outline:1px solid var(--accent); border-radius:10px; padding-left:8px; padding-right:8px; }\n  .spend-what{ font-size:13px; color:var(--ink); flex:1 1 240px; }\n  .spend-what .meta{ display:block; font-size:11px; color:var(--ink-dim); margin-top:2px; line-height:1.5; }\n  .spend-amount{ font-family:var(--mono); font-size:13.5px; font-weight:700; color:var(--ink); flex:none; font-variant-numeric:tabular-nums; }\n  .spend-total{ display:flex; justify-content:space-between; padding:12px 0 0 0; border-top:2px solid var(--accent); margin-top:6px; font-weight:700; font-size:13px; gap:12px; flex-wrap:wrap; }\n  .gran-chips{ display:flex; gap:6px; flex-wrap:wrap; }\n  .gran-chips button{ background:var(--paper2); border:1px solid var(--rule); color:var(--ink-dim); font-size:11.5px; font-weight:700; padding:5px 12px; border-radius:999px; cursor:pointer; font-family:inherit; }\n  .gran-chips button.active{ background:var(--accent); border-color:var(--accent); color:#0A1A2F; }\n  .tl-scroll{ overflow-x:auto; margin-top:10px; -webkit-overflow-scrolling:touch; }\n  .tl-note{ font-size:11px; color:var(--ink-dim); margin:8px 0 0 0; line-height:1.5; }\n  #timelineCard{ display:none; border-color:var(--accent); }\n  .tl-head{ display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:4px; }\n  .tl-title{ font-size:13.5px; font-weight:700; }\n  .tl-close{ background:none; border:none; color:var(--ink-dim); font-size:16px; cursor:pointer; padding:2px 6px; }\n  .sautero-stamp{ position:fixed; bottom:14px; right:14px; z-index:90; background:rgba(15,35,64,0.92); border:1px solid rgba(52,247,215,0.4); color:#34F7D7; font-size:10.5px; font-weight:700; font-family:'SF Mono',Menlo,Consolas,monospace; padding:6px 12px; border-radius:999px; pointer-events:none; }\n  @media print{ .sautero-stamp, .lang-toggle{ display:none; } }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\u003cbutton class=\"lang-toggle\" id=\"langBtn\" onclick=\"toggleLang()\">EN\u003c/button>\n\u003cdiv class=\"wrap\">\n\n  \u003ch1 data-sk=\"💸 Náklady\" data-en=\"💸 Costs\">\u003c/h1>\n  \u003cp class=\"lede\" data-sk=\"Všetky peniaze a čas, ktoré Sautero doteraz stál, aj to, čo je naplánované. Klikni na ktorúkoľvek položku (v koláči, legende alebo zozname) a otvorí sa jej časová línia od začiatku projektu — s prepínačom deň / týždeň / mesiac / rok. Self-reported, nie auditované; čas zakladateľa = 45 CHF/h z merača hodín.\" data-en=\"All the money and time Sautero has cost so far, plus what's planned. Click any item (pie, legend or list) to open its timeline since project start — with a day / week / month / year toggle. Self-reported, not audited; founder time = CHF 45/h from the hours meter.\">\u003c/p>\n\n  \u003cdiv class=\"section-label\">\u003cspan class=\"n\">01\u003c/span>\u003ch2 data-sk=\"Koláč — všetky doterajšie aj budúce náklady\" data-en=\"Pie — all costs to date and upcoming\">\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n  \u003cdiv class=\"card\" style=\"display:flex; flex-wrap:wrap; gap:20px; align-items:center;\">\n    \u003csvg id=\"spendDonut\" width=\"170\" height=\"170\" viewBox=\"0 0 120 120\" style=\"flex:none;\">\u003c/svg>\n    \u003cdiv id=\"spendDonutLegend\" class=\"spend-legend\" style=\"flex:1 1 230px;\">\u003c/div>\n  \u003c/div>\n\n  \u003cdiv class=\"card\" id=\"timelineCard\" style=\"margin-top:12px;\">\n    \u003cdiv class=\"tl-head\">\n      \u003cdiv class=\"tl-title\" id=\"tlTitle\">\u003c/div>\n      \u003cdiv style=\"display:flex; gap:8px; align-items:center; flex-wrap:wrap;\">\n        \u003cdiv class=\"gran-chips\" id=\"granChips\">\u003c/div>\n        \u003cbutton class=\"tl-close\" onclick=\"closeSpendTimeline()\" title=\"Close\">✕\u003c/button>\n      \u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"tl-scroll\">\u003cdiv id=\"tlChart\">\u003c/div>\u003c/div>\n    \u003cp class=\"tl-note\" id=\"tlNote\">\u003c/p>\n  \u003c/div>\n\n  \u003cdiv class=\"section-label\">\u003cspan class=\"n\">02\u003c/span>\u003ch2 data-sk=\"Položky — klikni pre časovú líniu\" data-en=\"Line items — click for the timeline\">\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n  \u003cdiv class=\"card\" id=\"spendRows\">\u003c/div>\n\n  \u003cdiv class=\"section-label\">\u003cspan class=\"n\">03\u003c/span>\u003ch2 data-sk=\"AI spotreba — kto koľko minie\" data-en=\"AI spend — who spends what\">\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n  \u003cdiv class=\"card\">\n    \u003cp class=\"lede\" style=\"margin:0 0 10px 0;\" data-sk=\"Claude Platform dashboard vidí len jeden spoločný Sautero kľúč — rozdelenie per užívateľ nikdy ukázať nevie. Preto od 17. 7. 2026 server (claude-proxy) zapisuje každé AI volanie: kto, ktorá funkcia, koľko tokenov a vypočítaná cena. Živý prehľad: Admin → 📈 AI Usage v appke — Head Admin vidí všetkých, Kitchen Admin svoj tím; rozklik na užívateľa ukáže koláč jeho AI funkcií. Do tohto dokumentu sa súhrn prenáša pri každom doc-synce.\" data-en=\"The Claude Platform dashboard only sees Sautero's one shared key — it can never show a per-user split. So since Jul 17, 2026 the server (claude-proxy) logs every AI call: who, which feature, token counts and computed cost. Live view: Admin → 📈 AI Usage in the app — Head Admin sees everyone, a Kitchen Admin their own team; tapping a user opens a pie of their AI functions. A summary lands in this document with every doc-sync.\">\u003c/p>\n    \u003cdiv class=\"spend-row\" style=\"cursor:default;\">\n      \u003cdiv class=\"spend-what\">\u003cspan data-sk=\"Celkové AI výdavky tento mesiac (celá organizácia)\" data-en=\"Total AI spend this month (whole org)\">\u003c/span>\u003cspan class=\"meta\" data-sk=\"z Claude Platform dashboardu 17.7.: $2.22 minutých, $2.79 kreditov zostáva, 388K tokenov za 7 dní. Čerpá z už zaplatených kreditov v položkách vyššie — nezapočítava sa druhýkrát.\" data-en=\"from the Claude Platform dashboard Jul 17: $2.22 spent, $2.79 credits left, 388K tokens in 7 days. Draws on the already-paid credits above — not double-counted.\">\u003c/span>\u003c/div>\n      \u003cdiv class=\"spend-amount\">$2.22\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"spend-row\" style=\"cursor:default;\">\n      \u003cdiv class=\"spend-what\">\u003cspan data-sk=\"Per užívateľ (z ai_usage tabuľky)\" data-en=\"Per user (from the ai_usage table)\">\u003c/span>\u003cspan class=\"meta\" data-sk=\"meranie beží od 17. 7. — prvé volania sa objavia pri najbližšom použití AI funkcie\" data-en=\"metering live since Jul 17 — the first calls will appear the next time anyone uses an AI feature\">\u003c/span>\u003c/div>\n      \u003cdiv class=\"spend-amount\">—\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\n\u003c/div>\n\u003cdiv class=\"sautero-stamp\" data-sk=\"🔄 Stav Sautero k 22. 7. 2026, 00:10\" data-en=\"🔄 Sautero state as of Jul 22, 2026, 00:10\">\u003c/div>\n\u003cscript>\n/* Shared doc-language key — same as every other visual data document. */\nlet _lang = localStorage.getItem('sautero_doc_lang') || 'sk';\nfunction applyLang(){\n  document.querySelectorAll('[data-sk]').forEach(el=>{\n    const val = el.getAttribute(_lang === 'sk' ? 'data-sk' : 'data-en');\n    if(val === null) return;\n    if(val.indexOf('\u003c') !== -1) el.innerHTML = val; else el.textContent = val;\n  });\n  const btn = document.getElementById('langBtn');\n  if(btn) btn.textContent = _lang === 'sk' ? 'EN' : 'SK';\n  document.documentElement.lang = _lang;\n}\nfunction L(sk,en){ return _lang==='sk' ? sk : en; }\nfunction toggleLang(){\n  _lang = _lang === 'sk' ? 'en' : 'sk';\n  localStorage.setItem('sautero_doc_lang', _lang);\n  applyLang();\n  renderSpendDonut();\n  renderSpendRows();\n  if(_tlKey) renderSpendTimeline();\n}\n\n/* ---------- Data (Richard, 17.7.: every item clickable → timeline since project start).\n   One place to update: SPEND_ITEMS. Founder time events come from the work-hours meter\n   (WORK_HOURS × 45 CHF/h) — refresh with every doc-sync. Payment dates for the early\n   API/subscription spends were reported as a running total, not itemized — those event\n   dates are honest estimates and say so in the item note. ---------- */\nconst PROJECT_START = '2026-07-08';\nconst SPEND_RATE = 45;\nconst WORK_HOURS = { '2026-07-08':6.1, '2026-07-09':4.7, '2026-07-10':5.6, '2026-07-11':0.2, '2026-07-12':16.3, '2026-07-13':2.6, '2026-07-14':11.0, '2026-07-15':12.7, '2026-07-16':17.0, '2026-07-17':7.4, '2026-07-18':13.9, '2026-07-19':5.0, '2026-07-20':17.6, '2026-07-21':11.4, '2026-07-22':6.1 };\n/* Founder time is COMPUTED from WORK_HOURS, which work_hours.py derives from the REAL Claude Code\n   session logs — every second the app was open on this project — on every commit and freezes into\n   scripts/work_hours_data.json. No estimates, no manual upkeep: the label/amount/total can never\n   drift from the История hours (Richard, 22.7.: \"všetok čas pri projekte, vždy ber dáta z toho\"). */\nconst FOUNDER_H = Object.values(WORK_HOURS).reduce((a,h)=>a+h,0);\nconst FOUNDER_CHF = Math.round(FOUNDER_H * SPEND_RATE);\nconst fmtHsk = h => h.toFixed(1).replace('.', ',');\nconst fmtChf = v => v.toLocaleString('de-CH');\nconst SPEND_ITEMS = [\n  { key:'time', color:'#8B93FF',\n    sk:`⏱️ Čas zakladateľa — ${fmtHsk(FOUNDER_H)} h × 45 CHF/h`, en:`⏱️ Founder time — ${FOUNDER_H.toFixed(1)} h × CHF 45/h`,\n    meta_sk:`Celý reálny čas pri projekte — každá sekunda, keď bola Claude Code appka otvorená — z Claude Code session logov (od 8.7.); počíta sa živo, ručne sa neudržiava. Hodnota času, nie hotovosť.`,\n    meta_en:`All the real time on the project — every second the Claude Code app was open — from the Claude Code session logs (since Jul 8); computed live, never hand-maintained. Value of time, not cash.`,\n    amount:`~CHF ${fmtChf(FOUNDER_CHF)}`,\n    events: Object.entries(WORK_HOURS).map(([d,h])=>({ date:d, chf: h*SPEND_RATE })),\n    note_sk:'Denné hodiny × 45 CHF. Odvodené z reálnych Claude Code session logov (aktívne okno appky; prestávky nad 30 min sa nepočítajú), nie odhad.',\n    note_en:'Daily hours × CHF 45. Derived from the real Claude Code session logs (the active app window; breaks over 30 min are not counted), not an estimate.' },\n  { key:'api', color:'var(--accent)',\n    sk:'API kredity + Claude predplatné', en:'API credits + Claude subscriptions',\n    meta_sk:'8.7.–14.7.2026, self-reported (~$45 kredity+Pro, $5 dobitie, $80 ďalšie predplatné)',\n    meta_en:'Jul 8–14, 2026, self-reported (~$45 credits+Pro, $5 top-up, $80 another subscription)',\n    amount:'~CHF 135',\n    events:[ { date:'2026-07-08', chf:45 }, { date:'2026-07-10', chf:5 }, { date:'2026-07-12', chf:85 } ],\n    note_sk:'Nahlásené súhrnne, presné dátumy jednotlivých platieb sa neevidovali — rozloženie na 8./10./12.7. je poctivý odhad, súčet ~135 CHF sedí.',\n    note_en:'Reported as a running total; exact payment dates were not recorded — the 8/10/12 Jul split is an honest estimate, the ~CHF 135 total is right.' },\n  { key:'new15', color:'#2BB8A3',\n    sk:'Claude predplatné (platba 15.7.)', en:'Claude subscription (Jul 15 payment)',\n    meta_sk:'upresnené Richardom 17.7. — platba za Claude predplatné; spolu s položkou vyššie je celkovo v Claude/API ~CHF 233',\n    meta_en:'clarified by Richard Jul 17 — a Claude subscription payment; together with the item above, total Claude/API spend is ~CHF 233',\n    amount:'CHF 97.73',\n    events:[ { date:'2026-07-15', chf:97.73 } ],\n    note_sk:'Platba za Claude predplatné, 15.7.2026.', note_en:'Claude subscription payment, Jul 15, 2026.' },\n  { key:'gamma', color:'#1E7F73',\n    sk:'Gamma (prezentačný nástroj)', en:'Gamma (presentation tool)',\n    meta_sk:'nahlásené Richardom 17.7.', meta_en:'reported by Richard Jul 17',\n    amount:'CHF 20.00',\n    events:[ { date:'2026-07-17', chf:20 } ],\n    note_sk:'Jednorazovo, 17.7.2026.', note_en:'One-off, Jul 17, 2026.' },\n  { key:'domain', color:'#6EE7D0',\n    sk:'Doména chefos.ch (Hostpoint, 1. rok)', en:'Domain chefos.ch (Hostpoint, year 1)',\n    meta_sk:'15.7.2026 — zľava na prvý rok, obnova ~CHF 15/rok od druhého roka',\n    meta_en:'Jul 15, 2026 — first-year discount, renews at ~CHF 15/year from year 2',\n    amount:'CHF 5.00',\n    events:[ { date:'2026-07-15', chf:5 } ],\n    note_sk:'Jednorazovo 15.7.2026; ďalší výdavok príde pri obnove (~15 CHF/rok).',\n    note_en:'One-off Jul 15, 2026; next spend at renewal (~CHF 15/year).' },\n  { key:'domain_sautero', color:'#4FD1B8',\n    sk:'Domény sautero.ch + sautero.com (Hostpoint, 1. rok)', en:'Domains sautero.ch + sautero.com (Hostpoint, year 1)',\n    meta_sk:'18.7.2026 — kúpené Richardom pri rebrande na Sautero',\n    meta_en:'Jul 18, 2026 — bought by Richard for the Sautero rebrand',\n    amount:'CHF 15.00',\n    events:[ { date:'2026-07-18', chf:15 } ],\n    note_sk:'Jednorazovo 18.7.2026, obe domény spolu; obnova nasledujúci rok.',\n    note_en:'One-off Jul 18, 2026, both domains together; renews next year.' },\n  { key:'agent', color:'var(--danger)',\n    sk:'Denný ingredient agent', en:'Daily ingredient agent',\n    meta_sk:'strop CHF 30/mesiac, denný log: docs/ingredient_agent_log.md',\n    meta_en:'cap CHF 30/month, daily log: docs/ingredient_agent_log.md',\n    amount:'~CHF 1.20',\n    events:[ { date:'2026-07-14', chf:1.2 } ],\n    note_sk:'Zatiaľ 1 zaznamenaný beh (14.7., samo-nahlásené). Denné behy sa budú pripisovať sem.',\n    note_en:'1 recorded run so far (Jul 14, self-reported). Daily runs will accrue here.' },\n  { key:'printer', color:'var(--gold)', future:true,\n    sk:'🔜 Tlačiareň štítkov Brother QL-820NWB', en:'🔜 Brother QL-820NWB label printer',\n    meta_sk:'odporúčanie hotové (docs/LABEL_PRINTER_RESEARCH.md), zatiaľ nekúpená',\n    meta_en:'recommendation ready (docs/LABEL_PRINTER_RESEARCH.md), not yet purchased',\n    amount:'~CHF 130',\n    events:[],\n    note_sk:'Plánovaný nákup — zatiaľ žiadne výdavky; časová línia sa naplní po kúpe.',\n    note_en:'Planned purchase — no spend yet; the timeline fills in after buying.' },\n  { key:'sensor', color:'#C9A24B', future:true,\n    sk:'🔜 SensorPush senzor + WiFi brána', en:'🔜 SensorPush sensor + WiFi gateway',\n    meta_sk:'~$55 senzor + ~$100 brána, bez mesačných poplatkov — jediná budget možnosť s cloud API',\n    meta_en:'~$55 sensor + ~$100 gateway, no monthly fee — the only budget option with a cloud API',\n    amount:'~CHF 125',\n    events:[],\n    note_sk:'Plánovaný nákup — zatiaľ žiadne výdavky.', note_en:'Planned purchase — no spend yet.' },\n  { key:'supabase', color:'#7FB3FF', recurring:true,\n    sk:'🔁 Supabase Pro (mesačne, beží)', en:'🔁 Supabase Pro (monthly, ongoing)',\n    meta_sk:'potvrdené Richardom 15.7. — denné zálohy v cene; začiatok predplatného neevidovaný',\n    meta_en:'confirmed by Richard Jul 15 — daily backups included; subscription start not recorded',\n    amount:'~USD 25/mes',\n    events:[ { date:'2026-07-13', chf:22 } ],\n    note_sk:'Mesačné predplatné ~25 USD (~22 CHF); prvá platba priradená k 13.7. (upgrade na Pro), presný fakturačný deň neevidovaný.',\n    note_en:'Monthly ~USD 25 (~CHF 22); first charge shown on Jul 13 (Pro upgrade), exact billing day not recorded.' },\n];\n\nfunction renderSpendRows(){\n  const el = document.getElementById('spendRows');\n  el.innerHTML = SPEND_ITEMS.map(it=>`\n    \u003cdiv class=\"spend-row\" id=\"row_${it.key}\" onclick=\"openSpendTimeline('${it.key}')\">\n      \u003cdiv class=\"spend-what\">\u003cspan>${L(it.sk, it.en)}\u003c/span>\u003cspan class=\"meta\">${L(it.meta_sk, it.meta_en)} · \u003cb style=\"color:var(--accent);\">${L('📈 časová línia','📈 timeline')}\u003c/b>\u003c/span>\u003c/div>\n      \u003cdiv class=\"spend-amount\">${it.amount}\u003c/div>\n    \u003c/div>`).join('') + `\n    \u003cdiv class=\"spend-total\">\n      \u003cdiv class=\"spend-what\" style=\"cursor:default;\">${L('Hotovosť doteraz ~CHF 296 (vrátane 1. mesiaca Supabase + domén sautero.ch/.com) · s časom zakladateľa ~CHF ' + fmtChf(FOUNDER_CHF) + ' · plánované nákupy ~CHF 255','Cash to date ~CHF 296 (incl. first Supabase month + sautero.ch/.com domains) · incl. founder time ~CHF ' + fmtChf(FOUNDER_CHF) + ' · planned purchases ~CHF 255')}\u003c/div>\n    \u003c/div>`;\n}\n\n/* ---------- Donut with include/exclude filter (Richard, 17.7. večer: \"kliknutím na položku\n   ju odrátať/prirátať k tomu koláču — celkové náklady s filtrom\"). Legend click toggles the\n   item in/out of the pie and the centre total recomputes; excluded items go dim with a\n   strikethrough (filter-visibility standard: never opacity-only — they also lose their color\n   chip to a hollow outline). Donut arcs and the section-02 rows still open the timeline. */\nlet _spendExcluded = new Set();\nfunction toggleSpendFilter(key){\n  if(_spendExcluded.has(key)) _spendExcluded.delete(key); else _spendExcluded.add(key);\n  renderSpendDonut();\n}\nfunction renderSpendDonut(){\n  const svg = document.getElementById('spendDonut');\n  const valOf = s => s.future ? parseFloat(s.amount.replace(/[^0-9.]/g,'')) : s.events.reduce((a,e)=>a+e.chf,0);\n  const included = SPEND_ITEMS.filter(s=>!_spendExcluded.has(s.key));\n  const total = included.reduce((s,x)=>s + valOf(x), 0);\n  const R = 44, C = 2 * Math.PI * R;\n  let off = 0;\n  svg.innerHTML = included.map(s=>{\n    const val = valOf(s);\n    const frac = total ? val / total : 0;\n    const label = L(s.sk, s.en);\n    const c = `\u003ccircle cx=\"60\" cy=\"60\" r=\"${R}\" fill=\"none\" stroke=\"${s.color}\" stroke-width=\"17\" style=\"cursor:pointer;\"\n      stroke-dasharray=\"${(frac*C).toFixed(2)} ${(C-frac*C).toFixed(2)}\" stroke-dashoffset=\"${(-off*C).toFixed(2)}\"\n      transform=\"rotate(-90 60 60)\" onclick=\"openSpendTimeline('${s.key}')\">\u003ctitle>${label}: ~CHF ${Math.round(val).toLocaleString('de-CH')}\u003c/title>\u003c/circle>`;\n    off += frac;\n    return c;\n  }).join('') +\n    `\u003ctext x=\"60\" y=\"56\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"var(--ink)\">~${Math.round(total).toLocaleString('de-CH')}\u003c/text>` +\n    `\u003ctext x=\"60\" y=\"70\" text-anchor=\"middle\" font-size=\"7\" fill=\"var(--ink-dim)\">${_spendExcluded.size\n      ? L(`CHF s filtrom (${included.length}/${SPEND_ITEMS.length} položiek)`, `CHF filtered (${included.length}/${SPEND_ITEMS.length} items)`)\n      : L('CHF spolu, vrátane času a plánu','CHF total, incl. time and planned')}\u003c/text>`;\n  document.getElementById('spendDonutLegend').innerHTML = SPEND_ITEMS.map(s=>{\n    const val = valOf(s);\n    const excluded = _spendExcluded.has(s.key);\n    const amt = '~CHF ' + val.toLocaleString('de-CH',{maximumFractionDigits: val \u003c 10 ? 2 : 0});\n    return `\u003cspan class=\"item\" onclick=\"toggleSpendFilter('${s.key}')\" title=\"${L('Klik = odrátať/prirátať ku koláču','Click = subtract/add to the pie')}\" style=\"${excluded ? 'opacity:.45; text-decoration:line-through;' : ''}\">\n      \u003ci style=\"${excluded ? `background:none; border:1.5px solid ${s.color};` : `background:${s.color};`}\">\u003c/i>\n      \u003cspan>${L(s.sk,s.en)} — \u003cb style=\"font-family:var(--mono);\">${amt}\u003c/b>\u003c/span>\u003c/span>`;\n  }).join('') + `\u003cspan style=\"font-size:11px; color:var(--ink-dim); margin-top:4px;\">${L('Klik v legende = filter koláča · klik na výsek alebo riadok nižšie = časová línia','Legend click = pie filter · arc or row below = timeline')}\u003c/span>`;\n}\n\n/* ---------- Timeline with day/week/month/year granularity (Richard, 17.7.) ---------- */\nlet _tlKey = null, _tlGran = 'day';\nconst GRANS = [ ['day','Deň','Day'], ['week','Týždeň','Week'], ['month','Mesiac','Month'], ['year','Rok','Year'] ];\nfunction bernToday(){ return new Intl.DateTimeFormat('en-CA', { timeZone:'Europe/Zurich' }).format(new Date()); }\nfunction dateRange(){\n  const out = []; const end = bernToday();\n  let d = new Date(PROJECT_START + 'T12:00:00');\n  while(true){\n    const s = d.toISOString().slice(0,10);\n    out.push(s);\n    if(s >= end) break;\n    d.setDate(d.getDate()+1);\n  }\n  return out;\n}\nfunction bucketOf(dateStr, gran){\n  if(gran === 'day') return dateStr;\n  const d = new Date(dateStr + 'T12:00:00');\n  if(gran === 'year') return dateStr.slice(0,4);\n  if(gran === 'month') return dateStr.slice(0,7);\n  const day = (d.getDay()+6)%7; const mon = new Date(d); mon.setDate(d.getDate()-day);\n  return mon.toISOString().slice(0,10);\n}\nfunction bucketLabel(b, gran){\n  if(gran === 'day'){ const p = b.split('-'); return String(Number(p[2])) + '.' + String(Number(p[1])) + '.'; }\n  if(gran === 'week'){ const p = b.split('-'); return L('týž. od ','wk of ') + String(Number(p[2])) + '.' + String(Number(p[1])) + '.'; }\n  if(gran === 'month'){ const m = Number(b.split('-')[1]); return (_lang==='sk' ? ['jan','feb','mar','apr','máj','jún','júl','aug','sep','okt','nov','dec'] : ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'])[m-1] + ' ' + b.slice(0,4); }\n  return b;\n}\nfunction setGran(g){ _tlGran = g; renderSpendTimeline(); }\nfunction openSpendTimeline(key){\n  _tlKey = key;\n  document.querySelectorAll('.spend-row').forEach(r=>r.classList.remove('active'));\n  const row = document.getElementById('row_' + key);\n  if(row) row.classList.add('active');\n  document.getElementById('timelineCard').style.display = 'block';\n  renderSpendTimeline();\n  document.getElementById('timelineCard').scrollIntoView({ behavior:'smooth', block:'nearest' });\n}\nfunction closeSpendTimeline(){\n  _tlKey = null;\n  document.getElementById('timelineCard').style.display = 'none';\n  document.querySelectorAll('.spend-row').forEach(r=>r.classList.remove('active'));\n}\nfunction renderSpendTimeline(){\n  const it = SPEND_ITEMS.find(x=>x.key === _tlKey);\n  if(!it) return;\n  document.getElementById('tlTitle').textContent = L(it.sk, it.en) + ' — ' + L('od začiatku projektu (8.7.2026)','since project start (Jul 8, 2026)');\n  document.getElementById('granChips').innerHTML = GRANS.map(([g,sk,en])=>\n    `\u003cbutton class=\"${_tlGran===g?'active':''}\" onclick=\"setGran('${g}')\">${L(sk,en)}\u003c/button>`).join('');\n  document.getElementById('tlNote').textContent = L(it.note_sk, it.note_en);\n  // zero-filled buckets over the whole project range, events summed into their bucket\n  const buckets = [];\n  const seen = {};\n  dateRange().forEach(d=>{ const b = bucketOf(d, _tlGran); if(!seen[b]){ seen[b] = { label: bucketLabel(b, _tlGran), chf: 0 }; buckets.push(seen[b]); } });\n  it.events.forEach(e=>{ const b = bucketOf(e.date, _tlGran); if(seen[b]) seen[b].chf += e.chf; });\n  const max = Math.max(1, ...buckets.map(b=>b.chf));\n  let cum = 0;\n  const BW = 44, GAP = 14, H = 150, TOP = 24, LBL = 34;\n  const W = Math.max(buckets.length * (BW + GAP) + GAP, 300);\n  const bars = buckets.map((b,i)=>{\n    cum += b.chf;\n    const h = b.chf > 0 ? Math.max(3, Math.round(b.chf / max * H)) : 0;\n    const y = TOP + H - h;\n    const x = GAP + i * (BW + GAP);\n    return `\u003cg>${h ? `\u003crect x=\"${x}\" y=\"${y}\" width=\"${BW}\" height=\"${h}\" rx=\"3\" fill=\"${it.color}\">\u003ctitle>${b.label}: CHF ${b.chf.toFixed(2)} · ${L('spolu dovtedy','running total')} CHF ${cum.toFixed(2)}\u003c/title>\u003c/rect>\n      \u003ctext x=\"${x+BW/2}\" y=\"${y-6}\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"700\" fill=\"var(--ink)\">${b.chf \u003c 10 ? b.chf.toFixed(1) : Math.round(b.chf)}\u003c/text>` : `\u003crect x=\"${x}\" y=\"${TOP+H-1}\" width=\"${BW}\" height=\"1\" fill=\"var(--rule)\"/>`}\n      \u003ctext x=\"${x+BW/2}\" y=\"${TOP+H+16}\" text-anchor=\"middle\" font-size=\"9\" fill=\"var(--ink-dim)\">${b.label}\u003c/text>\u003c/g>`;\n  }).join('');\n  const totalLine = `\u003ctext x=\"${GAP}\" y=\"14\" font-size=\"10.5\" fill=\"var(--ink-dim)\">${L('Spolu doteraz','Total to date')}: \u003ctspan font-weight=\"700\" fill=\"var(--ink)\">CHF ${cum.toLocaleString('de-CH',{maximumFractionDigits:2})}\u003c/tspan>${it.future ? ' · ' + L('plánované','planned') + ': ' + it.amount : ''}\u003c/text>`;\n  document.getElementById('tlChart').innerHTML = `\u003csvg width=\"${W}\" height=\"${TOP+H+LBL}\" viewBox=\"0 0 ${W} ${TOP+H+LBL}\">${totalLine}${bars}\u003c/svg>`;\n}\n\napplyLang();\nrenderSpendDonut();\nrenderSpendRows();\n\u003c/script>\n\u003c/body>\n\u003c/html>\n"];
const frames = [];
/* Anchor links inside an embedded doc MUST be intercepted (Richard's 19.7. phone video — every
   tap on the inner jump-nav stacked another copy of this shell's banner): a srcdoc iframe
   inherits its base URL from THIS page, so a plain href="#timeline" resolves to plan.html#…
   and NAVIGATES the iframe to the whole shell — recursively nesting banner inside banner.
   Same-origin srcdoc means we can reach in: hash links become in-iframe smooth scrolls, real
   links (automation.html, …) escape to the top window instead of loading inside the tab. */
function patchInnerLinks(f){
  try{
    const doc = f.contentDocument;
    doc.addEventListener('click', (e)=>{
      const a = e.target.closest ? e.target.closest('a[href]') : null;
      if(!a) return;
      const href = a.getAttribute('href');
      if(href.startsWith('#')){
        e.preventDefault();
        const el = href.length > 1 ? doc.getElementById(href.slice(1)) : null;
        // Instant, not behavior:'smooth' — smooth scrolling inside a srcdoc iframe silently
        // no-ops in some engines (verified live 19.7.); a guaranteed jump beats a pretty maybe.
        if(el) el.scrollIntoView();
      } else if(!a.target){
        a.target = '_top';
      }
    }, true);
  } catch(err){}
}
let currentTab = 0;
function openTab(n){
  currentTab = n;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active', i===n));
  frames.forEach(f=>f && f.classList.remove('show'));
  if(!frames[n]){
    const f = document.createElement('iframe');
    f.addEventListener('load', ()=>patchInnerLinks(f));
    f.srcdoc = DOCS[n];
    document.getElementById('frames').appendChild(f);
    frames[n] = f;
  }
  frames[n].classList.add('show');
}
openTab(0);
/* Shell language: the ONE EN/SK toggle lives in this top bar (Richard, 21.7. — "prepínač vždy
   vo vrchnej lište pre všetky dokumenty"). It flips the shared sautero_doc_lang key, re-applies
   the shell chrome, and RELOADS the loaded inner iframes so each embedded doc re-renders in the
   new language (they read the key on load, whatever their own mechanism). The inner docs' own
   toggles still work and write the same key, so the two never disagree. */
function applyShellLang(){
  const lang = localStorage.getItem('sautero_doc_lang') || 'sk';
  document.querySelectorAll('[data-sk]').forEach(el=>{
    el.textContent = lang === 'sk' ? el.getAttribute('data-sk') : (el.getAttribute('data-en') || el.getAttribute('data-sk'));
  });
  const en = document.getElementById('lcEn'), sk = document.getElementById('lcSk');
  if(en && sk){ en.className = lang==='en'?'on':'off'; sk.className = lang==='sk'?'on':'off'; }
  document.documentElement.lang = lang;
}
function toggleShellLang(){
  const cur = localStorage.getItem('sautero_doc_lang') === 'en' ? 'en' : 'sk';
  localStorage.setItem('sautero_doc_lang', cur === 'en' ? 'sk' : 'en');
  applyShellLang();
  frames.forEach(f=>{ if(f){ const s = f.srcdoc; f.srcdoc = s; } });  // reload inner docs into the new language
}
window.addEventListener('storage', e=>{ if(!e || !e.key || e.key === 'sautero_doc_lang') applyShellLang(); });
setInterval(applyShellLang, 1500);
applyShellLang();
</script>
