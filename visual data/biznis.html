const DOCS = ["\u003c!DOCTYPE html>\n\u003chtml lang=\"sk\">\n\u003chead>\n\u003cmeta charset=\"UTF-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n\u003cmeta http-equiv=\"Cache-Control\" content=\"no-cache, no-store, must-revalidate\">\n\u003cmeta http-equiv=\"Pragma\" content=\"no-cache\">\n\u003cmeta http-equiv=\"Expires\" content=\"0\">\n\u003ctitle>Sautero — Monetizácia: 11 modelov + akčný plán\u003c/title>\n\u003cstyle>\n  /* Sautero standing visual identity — same tokens as presentation.html / planning.html /\n     tasklist.html / status.html / backlog.html. */\n  :root{\n    --bg:#0A1A2F; --paper:#122845; --paper-raised:#0f2340;\n    --ink:#fff; --ink-dim:#9C949E; --ink-faint:rgba(156,148,158,0.6);\n    --rule:#223d57; --accent:#34F7D7; --accent-dim:rgba(52,247,215,0.4);\n    --gold:#F7C948; --gold-dim:rgba(247,201,72,0.4);\n    --danger:#FF7A68; --danger-dim:rgba(255,122,104,0.4);\n  }\n  *{box-sizing:border-box;}\n  html,body{margin:0;padding:0;}\n  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.55;padding-bottom:70px;}\n  .wrap{max-width:940px;margin:0 auto;padding:0 20px;}\n\n  header{padding:40px 20px 28px;border-bottom:1px solid var(--rule);}\n  header .inner{max-width:940px;margin:0 auto;}\n  .brandmark{display:flex;align-items:center;gap:9px;margin-bottom:18px;}\n  .brandmark .word{font-size:15px;font-weight:700;letter-spacing:0.02em;color:var(--accent);}\n  .kicker{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:8px;}\n  h1{font-weight:700;font-size:clamp(26px,5vw,38px);margin:0 0 10px;line-height:1.12;}\n  h1 em{font-style:italic;color:var(--accent);}\n  .dek{font-size:14.5px;color:var(--ink-dim);max-width:660px;margin:0 0 20px;}\n  .panel{display:flex;gap:8px;flex-wrap:wrap;}\n  .panel span{font-size:10.5px;text-transform:uppercase;letter-spacing:0.08em;padding:4px 10px;border-radius:20px;background:var(--paper-raised);border:1px solid var(--rule);color:var(--ink-dim);font-weight:600;}\n\n  .legend{display:flex;gap:16px;flex-wrap:wrap;margin:28px 0 8px;}\n  .legend .l{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-dim);}\n  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}\n  .d-green{background:var(--accent);} .d-amber{background:var(--gold);} .d-red{background:var(--danger);}\n\n  .model{background:var(--paper);border:1px solid var(--rule);border-radius:14px;margin-top:22px;overflow:hidden;}\n  .model.mine{border-left:3px solid var(--gold);}\n  .m-head{display:flex;align-items:flex-start;gap:14px;padding:18px 20px 12px;}\n  .m-num{font-family:\"SF Mono\",Menlo,monospace;font-style:italic;font-size:28px;color:var(--accent);line-height:1;min-width:44px;}\n  .m-title-wrap{flex:1;}\n  .m-title{font-size:16.5px;font-weight:700;color:var(--ink);margin:0 0 2px;}\n  .m-sub{font-size:12.5px;color:var(--ink-dim);font-style:italic;}\n  .fit{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}\n  .fit-badge{font-size:10px;text-transform:uppercase;letter-spacing:0.07em;padding:3px 9px;border-radius:20px;font-weight:700;white-space:nowrap;}\n  .f-now{background:rgba(52,247,215,0.16);color:var(--accent);}\n  .f-later{background:rgba(247,201,72,0.16);color:var(--gold);}\n  .f-avoid{background:rgba(255,122,104,0.16);color:var(--danger);}\n  .stars{font-size:12px;color:var(--accent);letter-spacing:2px;}\n\n  .m-body{padding:0 20px 16px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}\n  @media(max-width:640px){.m-body{grid-template-columns:1fr;}}\n  .m-col h4{font-size:10.5px;text-transform:uppercase;letter-spacing:0.1em;margin:0 0 6px;font-weight:700;}\n  .m-col.pro h4{color:var(--accent);} .m-col.con h4{color:var(--danger);}\n  .m-col p{margin:0;font-size:13px;color:var(--ink-dim);}\n  .m-col b{color:var(--ink);font-weight:600;}\n\n  .m-verdict{padding:12px 20px;border-top:1px solid var(--rule);background:var(--paper-raised);font-size:12.5px;color:var(--ink-dim);}\n  .m-verdict b{color:var(--accent);}\n  .flag{margin:0 20px 14px;border:1px solid var(--danger-dim);background:rgba(255,122,104,0.08);border-radius:10px;padding:11px 14px;font-size:12.5px;color:var(--ink-dim);}\n  .flag b{color:var(--danger);display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:0.09em;margin-bottom:3px;}\n  .flag.amber{border-color:var(--gold-dim);background:rgba(247,201,72,0.07);}\n  .flag.amber b{color:var(--gold);}\n\n  .sec{margin:56px 0 6px;display:flex;align-items:baseline;gap:12px;}\n  .sec h2{font-weight:700;font-size:20px;margin:0;}\n  .sec .rule{flex:1;height:1px;background:var(--rule);}\n\n  .gflag{background:var(--paper);border:1px solid var(--rule);border-left:3px solid var(--danger);border-radius:10px;padding:14px 18px;margin-top:12px;}\n  .gflag.amber{border-left-color:var(--gold);}\n  .gflag.green{border-left-color:var(--accent);}\n  .gflag h3{margin:0 0 4px;font-size:13.5px;color:var(--ink);}\n  .gflag.green h3{color:var(--accent);}\n  .gflag p{margin:0;font-size:12.5px;color:var(--ink-dim);}\n  .gflag b{color:var(--ink);}\n\n  .rank{background:var(--paper);border:1px solid var(--rule);border-radius:14px;margin-top:16px;overflow:hidden;}\n  .r-row{display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid var(--rule);font-size:13px;}\n  .r-row:last-child{border-bottom:none;}\n  .r-pos{font-family:\"SF Mono\",Menlo,monospace;font-style:italic;color:var(--accent);min-width:26px;font-size:16px;}\n  .r-name{flex:1;color:var(--ink);font-weight:600;}\n  .r-when{font-size:11px;color:var(--ink-dim);white-space:nowrap;}\n\n  /* ACTION PLAN */\n  .action{background:var(--paper);border:1px solid var(--accent-dim);border-radius:14px;margin-top:16px;overflow:hidden;}\n  .a-row{display:flex;gap:12px;padding:13px 18px;border-bottom:1px solid var(--rule);align-items:flex-start;}\n  .a-row:last-child{border-bottom:none;}\n  .a-who{font-size:10px;text-transform:uppercase;letter-spacing:0.07em;padding:3px 9px;border-radius:20px;font-weight:700;white-space:nowrap;flex:none;margin-top:2px;}\n  .a-you{background:rgba(247,201,72,0.16);color:var(--gold);}\n  .a-me{background:rgba(52,247,215,0.16);color:var(--accent);}\n  .a-done{background:rgba(52,247,215,0.28);color:var(--accent);}\n  .a-body{flex:1;}\n  .a-title{font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:2px;}\n  .a-desc{font-size:12.5px;color:var(--ink-dim);}\n\n  footer{margin-top:56px;padding-top:18px;border-top:1px solid var(--rule);font-size:11px;color:var(--ink-faint);}\n\n  /* ---------- Overview matrix (2026-07-15 redesign) ---------- */\n  .matrix{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:16px; }\n  @media(max-width:640px){ .matrix{ grid-template-columns:1fr; } }\n  .mx-row{\n    display:flex; align-items:center; gap:10px; text-decoration:none;\n    background:var(--paper); border:1px solid var(--rule); border-radius:10px; padding:10px 14px;\n    transition:border-color .15s, transform .15s;\n  }\n  .mx-row:hover{ border-color:var(--accent-dim); transform:translateY(-1px); }\n  .mx-num{ font-family:\"SF Mono\",Menlo,monospace; font-style:italic; font-size:15px; color:var(--accent); min-width:26px; }\n  .mx-name{ flex:1; font-size:12.5px; font-weight:600; color:var(--ink); line-height:1.3; }\n  .mx-side{ display:flex; flex-direction:column; align-items:flex-end; gap:3px; flex:none; }\n  .mx-stars{ font-size:10px; color:var(--accent); letter-spacing:1.5px; }\n  /* Ratings chart (17.7.) */\n  .ratings-chart{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:16px 18px 10px 18px; margin-top:16px; }\n  .rc-title{ font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-dim); font-weight:700; margin-bottom:10px; }\n  .rc-row{ display:flex; align-items:center; gap:10px; padding:5px 0; cursor:pointer; }\n  .rc-row:hover .rc-name{ color:var(--accent); }\n  .rc-name{ flex:0 0 220px; min-width:0; font-size:12px; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }\n  .rc-bar{ flex:1; height:12px; background:var(--paper-raised); border:1px solid var(--rule); border-radius:99px; overflow:hidden; display:flex; }\n  .rc-fill{ height:100%; background:var(--accent); }\n  .rc-stars{ flex:none; font-size:11px; color:var(--accent); letter-spacing:1.5px; min-width:64px; text-align:right; }\n  @media(max-width:640px){ .rc-name{ flex-basis:130px; } }\n  /* Mobile alignment fix (Richard, 17.7.): the fit badges had white-space:nowrap and overflowed\n     the phone screen — on narrow widths they wrap instead, rows keep their edges, and nothing\n     can push the page into horizontal scroll. */\n  @media(max-width:640px){\n    body{ overflow-x:hidden; }\n    .fit-badge{ white-space:normal; text-align:right; line-height:1.35; }\n    .mx-row{ min-width:0; }\n    .mx-name{ min-width:0; }\n    .mx-side{ max-width:46%; }\n    .m-head{ flex-wrap:wrap; }\n    .fit{ flex-direction:row; align-items:center; gap:8px; width:100%; justify-content:flex-start; }\n    .fit .fit-badge{ text-align:left; }\n    .r-when{ white-space:normal; text-align:right; }\n  }\n\n  /* ---------- Sautero stamp + language fab (Richard, 15.7.: every /visual data/ document\n     carries a last-updated-to-Sautero-state badge and an SK/EN toggle) ---------- */\n  .sautero-stamp{\n    position:fixed; bottom:14px; right:14px; z-index:90;\n    background:rgba(15,35,64,0.92); border:1px solid rgba(52,247,215,0.4); color:#34F7D7;\n    font-size:10.5px; font-weight:700; font-family:\"SF Mono\",Menlo,Consolas,monospace;\n    padding:6px 12px; border-radius:999px;\n    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); pointer-events:none;\n  }\n  .sautero-lang-fab{\n    position:fixed; top:14px; right:14px; z-index:90;\n    background:rgba(15,35,64,0.92); border:1px solid #223d57; color:#9C949E;\n    font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;\n    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;\n    padding:7px 14px; border-radius:999px; cursor:pointer;\n    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);\n    transition:border-color .15s, color .15s;\n  }\n  .sautero-lang-fab:hover{ border-color:rgba(52,247,215,0.4); color:#34F7D7; }\n  @media print{ .sautero-stamp, .sautero-lang-fab{ display:none; } }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\n\u003cheader>\n  \u003cdiv class=\"inner\">\n    \u003cdiv class=\"brandmark\">\n      \u003csvg width=\"22\" height=\"22\" viewBox=\"0 0 68 68\">\u003cpath d=\"M 46.8 42.3 A 18 18 0 1 1 46.8 21.7\" fill=\"none\" stroke=\"#34F7D7\" stroke-width=\"7\" stroke-linecap=\"round\"/>\u003ccircle cx=\"34\" cy=\"34\" r=\"3\" fill=\"#34F7D7\"/>\u003c/svg>\n      \u003cspan class=\"word\">Sautero\u003c/span>\n    \u003c/div>\n    \u003cdiv class=\"kicker\" data-sk=\"Monetizačný workshop · v2 s akčným plánom\" data-en=\"Monetization workshop · v2 with action plan\">Monetizačný workshop · v2 s akčným plánom\u003c/div>\n    \u003ch1 data-sk=\"14 modelov, ako z Sautero spraviť \u003cem>príjem\u003c/em>\" data-en=\"14 models for turning Sautero into \u003cem>revenue\u003c/em>\">14 modelov, ako z Sautero spraviť \u003cem>príjem\u003c/em>\u003c/h1>\n    \u003cp class=\"dek\">Výsledok panelovej diskusie piatich pohľadov nad všetkými projektovými dokumentmi (roadmap, MVP, pilot agreement, legal.html, pracovné zmluvy). Každý model má hodnotenie vhodnosti pre tvoju konkrétnu situáciu — sólo founder, pred-GmbH, zamestnaný na plný úväzok, 1 pilotná kuchyňa, trh: profesionálne kuchyne 5–25 ľudí vo Švajčiarsku. Model 11-12 a akčný plán doplnil Claude 13.7.; model 13 je Richardov vlastný nápad, 15.7.; model 14 (gamifikácia free tieru) navrhnutý na Richardovu žiadosť 15.7.\u003c/p>\n    \u003cdiv class=\"panel\">\n      \u003cspan>CTO — technická realizovateľnosť\u003c/span>\n      \u003cspan>CFO — cash flow &amp; marže\u003c/span>\n      \u003cspan>Právnik — CH právo &amp; zmluvy\u003c/span>\n      \u003cspan>SaaS CEO ×2 — GTM &amp; pricing\u003c/span>\n    \u003c/div>\n    \u003cdiv class=\"legend\">\n      \u003cdiv class=\"l\">\u003cspan class=\"dot d-green\">\u003c/span>\u003cspan data-sk=\"Spustiteľné teraz / po triale\" data-en=\"Launchable now / after the trial\">Spustiteľné teraz / po triale\u003c/span>\u003c/div>\n      \u003cdiv class=\"l\">\u003cspan class=\"dot d-amber\">\u003c/span>\u003cspan data-sk=\"Neskôr — potrebuje škálu alebo predpoklady\" data-en=\"Later — needs scale or prerequisites\">Neskôr — potrebuje škálu alebo predpoklady\u003c/span>\u003c/div>\n      \u003cdiv class=\"l\">\u003cspan class=\"dot d-red\">\u003c/span>\u003cspan data-sk=\"Neodporúčané / vysoké riziko\" data-en=\"Not recommended / high risk\">Neodporúčané / vysoké riziko\u003c/span>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/header>\n\n\u003cdiv class=\"wrap\">\n\n  \u003c!-- Overview matrix — built by JS from the 13 model cards below, so it can never disagree\n     with them. One glance answers \"which models, how good, when\" before any scrolling. -->\n  \u003cdiv class=\"sec\" style=\"margin-top:34px;\">\u003ch2 data-sk=\"Prehľad na jeden pohľad\" data-en=\"At-a-glance overview\">Prehľad na jeden pohľad\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n  \u003cdiv class=\"matrix\" id=\"modelMatrix\">\u003c/div>\n\n  \u003c!-- Ratings chart (Richard, 17.7.): every model's fit rating as a bar — click to jump. -->\n  \u003cdiv class=\"ratings-chart\" id=\"ratingsChart\">\u003c/div>\n\n\n  \u003c!-- 1 -->\n  \u003cdiv class=\"model\" id=\"model-01\">\n    \u003cdiv class=\"m-head\">\n      \u003cdiv class=\"m-num\">01\u003c/div>\n      \u003cdiv class=\"m-title-wrap\">\n        \u003cdiv class=\"m-title\">Predplatné na kuchyňu (flat SaaS)\u003c/div>\n        \u003cdiv class=\"m-sub\">Jedna cena za kuchyňu/mesiac, neobmedzený počet členov tímu — napr. Chef Pro CHF 49, Restaurant CHF 149\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"fit\">\u003cspan class=\"fit-badge f-now\">Primárny model\u003c/span>\u003cspan class=\"stars\">★★★★★\u003c/span>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-body\">\n      \u003cdiv class=\"m-col pro\">\u003ch4>Panel za\u003c/h4>\u003cp>\u003cb>CFO:\u003c/b> predvídateľný MRR, jednoduché účtovníctvo. \u003cb>SaaS CEO:\u003c/b> \"per kitchen\" sedí na to, ako reštaurácie nakupujú — šéfkuchár nechce počítať licencie pre brigádnikov. \u003cb>CTO:\u003c/b> multi-tenant architektúra už existuje, netreba nič dostavať okrem billing vrstvy.\u003c/p>\u003c/div>\n      \u003cdiv class=\"m-col con\">\u003ch4>Panel proti\u003c/h4>\u003cp>\u003cb>CFO:\u003c/b> flat cena necháva peniaze na stole pri veľkých kuchyniach (25 ľudí platí ako 5). \u003cb>SaaS CEO:\u003c/b> churn v gastre je brutálny — reštaurácie zatvárajú; treba rátať s 3–5 % mesačne.\u003c/p>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-verdict\">\u003cb>Verdikt panelu:\u003c/b> Toto je chrbtica. Dve úrovne (Chef Pro solo / Restaurant team) presne kopírujú existujúce Level 2/3 tiery z FEATURE_ROADMAP. Všetko ostatné v tomto dokumente sú doplnky k tomuto základu.\u003c/div>\n  \u003c/div>\n\n  \u003c!-- 2 -->\n  \u003cdiv class=\"model\" id=\"model-02\">\n    \u003cdiv class=\"m-head\">\n      \u003cdiv class=\"m-num\">02\u003c/div>\n      \u003cdiv class=\"m-title-wrap\">\n        \u003cdiv class=\"m-title\">Founding-member pre-sale\u003c/div>\n        \u003cdiv class=\"m-sub\">Prvých 10–20 kuchýň zaplatí ročné predplatné vopred so zľavou (napr. CHF 490/rok namiesto 588) + doživotná founding cena\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"fit\">\u003cspan class=\"fit-badge f-now\">Prvý príjem\u003c/span>\u003cspan class=\"stars\">★★★★★\u003c/span>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-body\">\n      \u003cdiv class=\"m-col pro\">\u003ch4>Panel za\u003c/h4>\u003cp>\u003cb>CFO:\u003c/b> cash vopred bez dlhu a bez investora — presne mechanizmus, ktorý si už dávnejšie zvolil ako prvý zdroj príjmu a potom z dokumentov zmizol. \u003cb>SaaS CEO:\u003c/b> najlepšia validácia — človek, čo zaplatí rok dopredu za betu, je skutočný zákazník, nie zdvorilý tester.\u003c/p>\u003c/div>\n      \u003cdiv class=\"m-col con\">\u003ch4>Panel proti\u003c/h4>\u003cp>\u003cb>Právnik:\u003c/b> predávaš sľub — ak produkt nedodáš, vzniká nárok na vrátenie. Peniaze drž oddelene, kým nie je odslúžené. \u003cb>SaaS CEO:\u003c/b> \"doživotná cena\" znie lákavo, ale definuj presne, čo pokrýva (moduly dneška, nie všetko budúce).\u003c/p>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"flag\">\u003cb>⚠ Právny blok — Nebenerwerb\u003c/b>Toto je prvý moment, kedy Sautero \"dem Erwerbszweck dient\". Podľa Personalreglementu (a takmer isto aj podobnej klauzuly v Burrito Bandito zmluve) potrebuješ PÍSOMNÝ súhlas zamestnávateľa so zárobkovou vedľajšou činnosťou SKÔR, než prijmeš prvú platbu. Toto je podmienka pre modely 1–11 bez výnimky.\u003c/div>\n    \u003cdiv class=\"flag amber\">\u003cb>⚠ Fakturačný subjekt\u003c/b>Pred prvou faktúrou treba rozhodnúť právnu formu: Einzelfirma stačí na začiatok (rýchla, lacná), GmbH podľa plánu \"po príjme\" — ale prvá faktúra JE príjem, takže minimálne Einzelfirma + AHV registrácia ako samostatná zárobková činnosť musí existovať pri prvej platbe.\u003c/div>\n    \u003cdiv class=\"m-verdict\">\u003cb>Verdikt panelu:\u003c/b> Spusti počas/po auguste. Trial s 25 ľuďmi je presne publikum na otázku \"chceš founding cenu?\". Cieľ: 5 platiacich founding kuchýň = validácia + prvý cash.\u003c/div>\n  \u003c/div>\n\n  \u003c!-- 3 -->\n  \u003cdiv class=\"model\" id=\"model-03\">\n    \u003cdiv class=\"m-head\">\n      \u003cdiv class=\"m-num\">03\u003c/div>\n      \u003cdiv class=\"m-title-wrap\">\n        \u003cdiv class=\"m-title\">Modulárne predplatné (à la carte)\u003c/div>\n        \u003cdiv class=\"m-sub\">Základ lacno (recepty + Check List), moduly za príplatok: Working Time +CHF 20, Food Cost +CHF 30, AI +CHF 20...\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"fit\">\u003cspan class=\"fit-badge f-later\">Fáza 3+\u003c/span>\u003cspan class=\"stars\">★★★☆☆\u003c/span>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-body\">\n      \u003cdiv class=\"m-col pro\">\u003ch4>Panel za\u003c/h4>\u003cp>\u003cb>CFO:\u003c/b> expanzia príjmu bez získavania nových zákazníkov — kuchyňa začne s basic a dokupuje. \u003cb>SaaS CEO:\u003c/b> nízka vstupná bariéra pre skeptických šéfkuchárov.\u003c/p>\u003c/div>\n      \u003cdiv class=\"m-col con\">\u003ch4>Panel proti\u003c/h4>\u003cp>\u003cb>SaaS CEO 2:\u003c/b> pre sólo foundera je to pricing komplexita, ktorá zabíja — 5 modulov × zľavy × kombinácie = support peklo. \u003cb>CTO:\u003c/b> feature-gating v single-file appke = ďalšia vrstva kódu, ktorú teraz nepotrebuješ.\u003c/p>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-verdict\">\u003cb>Verdikt panelu:\u003c/b> Dobrá evolúcia modelu 01, keď bude 30+ zákazníkov a uvidí sa, čo reálne používajú. Nie na štart.\u003c/div>\n  \u003c/div>\n\n  \u003c!-- 4 -->\n  \u003cdiv class=\"model\" id=\"model-04\">\n    \u003cdiv class=\"m-head\">\n      \u003cdiv class=\"m-num\">04\u003c/div>\n      \u003cdiv class=\"m-title-wrap\">\n        \u003cdiv class=\"m-title\">Onboarding ako platená služba\u003c/div>\n        \u003cdiv class=\"m-sub\">\"Digitalizujeme vám celú kuchyňu\" — jednorazovo CHF 500–2000: AI sken všetkých receptov, nastavenie staníc, prep sheets, zaškolenie\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"fit\">\u003cspan class=\"fit-badge f-now\">Okamžitý doplnok\u003c/span>\u003cspan class=\"stars\">★★★★☆\u003c/span>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-body\">\n      \u003cdiv class=\"m-col pro\">\u003ch4>Panel za\u003c/h4>\u003cp>\u003cb>SaaS CEO:\u003c/b> rieši najväčšiu bariéru adopcie (nikto nechce prepisovať 200 receptov) a zaplatí ju zákazník. \u003cb>CFO:\u003c/b> vysoká marža — AI sken robí väčšinu práce, ty kontroluješ. Jednorazový cash hneď. \u003cb>Unikátna výhoda:\u003c/b> si šéfkuchár — konkurenčné SaaS firmy si túto službu nemôžu dovoliť robiť dôveryhodne.\u003c/p>\u003c/div>\n      \u003cdiv class=\"m-col con\">\u003ch4>Panel proti\u003c/h4>\u003cp>\u003cb>CFO:\u003c/b> neškáluje — je to tvoj čas, ktorého máš s novou prácou málo. \u003cb>CTO:\u003c/b> závislosť na Anthropic API nákladoch — pri veľkých kuchyniach si spočítaj cenu skenu vopred.\u003c/p>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-verdict\">\u003cb>Verdikt panelu:\u003c/b> Ideálny \"klin\" — kuchyňa zaplatí onboarding, dostane hotový systém, a predplatné (model 01) je potom prirodzené pokračovanie. Kombinuj: onboarding CHF 990 + prvý rok founding cena.\u003c/div>\n  \u003c/div>\n\n  \u003c!-- 5 -->\n  \u003cdiv class=\"model\" id=\"model-05\">\n    \u003cdiv class=\"m-head\">\n      \u003cdiv class=\"m-num\">05\u003c/div>\n      \u003cdiv class=\"m-title-wrap\">\n        \u003cdiv class=\"m-title\">AI kredity / metered AI\u003c/div>\n        \u003cdiv class=\"m-sub\">Základné predplatné + AI funkcie (Chef's Assistant, sken, generovanie) účtované podľa spotreby alebo v balíčkoch kreditov\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"fit\">\u003cspan class=\"fit-badge f-later\">Keď AI náklady porastú\u003c/span>\u003cspan class=\"stars\">★★★☆☆\u003c/span>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-body\">\n      \u003cdiv class=\"m-col pro\">\u003ch4>Panel za\u003c/h4>\u003cp>\u003cb>CFO:\u003c/b> jediný model, kde variabilné náklady (Anthropic API) presne kopíruje príjem — nulové riziko, že ťa \"power user\" prežerie. \u003cb>CTO:\u003c/b> usage log už de facto existuje v analytike.\u003c/p>\u003c/div>\n      \u003cdiv class=\"m-col con\">\u003ch4>Panel proti\u003c/h4>\u003cp>\u003cb>SaaS CEO:\u003c/b> kuchári neznášajú taxameter — neistota ceny zabíja používanie presne tých funkcií, ktoré ťa odlišujú. \u003cb>SaaS CEO 2:\u003c/b> AI náklady sú zatiaľ zanedbateľné — riešiš problém, ktorý nemáš.\u003c/p>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-verdict\">\u003cb>Verdikt panelu:\u003c/b> Drž v zálohe. Zabuduj do predplatného \"fair use\" limit (napr. 500 AI akcií/mes) a metered model vytiahni, až keď dáta ukážu, že to treba.\u003c/div>\n  \u003c/div>\n\n  \u003c!-- 6 -->\n  \u003cdiv class=\"model\" id=\"model-06\">\n    \u003cdiv class=\"m-head\">\n      \u003cdiv class=\"m-num\">06\u003c/div>\n      \u003cdiv class=\"m-title-wrap\">\n        \u003cdiv class=\"m-title\">Hardware bundle — label printer + spotrebný materiál\u003c/div>\n        \u003cdiv class=\"m-sub\">Sautero predá/prenajme Brother QL + marža na kotúčoch štítkov (CHF 200–1000/rok na kuchyňu podľa vlastného výskumu)\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"fit\">\u003cspan class=\"fit-badge f-later\">Až s viac kuchyňami\u003c/span>\u003cspan class=\"stars\">★★☆☆☆\u003c/span>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-body\">\n      \u003cdiv class=\"m-col pro\">\u003ch4>Panel za\u003c/h4>\u003cp>\u003cb>CFO:\u003c/b> opakovaný príjem zo spotrebného materiálu je krásny biznis (LABEL_PRINTER_RESEARCH ukazuje, že kotúče stoja viac než tlačiareň). \u003cb>SaaS CEO:\u003c/b> hardware v kuchyni = fyzická kotva proti churnu.\u003c/p>\u003c/div>\n      \u003cdiv class=\"m-col con\">\u003ch4>Panel proti\u003c/h4>\u003cp>\u003cb>CFO:\u003c/b> logistika, sklad, reklamácie, kapitál viazaný v tovare — pre sólo foundera nočná mora. \u003cb>Právnik:\u003c/b> ako predajca hardvéru máš záručné povinnosti (2 roky CH). \u003cb>Ironické:\u003c/b> vlastný research varuje kuchyne pred consumables lock-in — nebuď ten vendor, pred ktorým si sám varoval.\u003c/p>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"flag amber\">\u003cb>⚠ HACCP zodpovednosť\u003c/b>Ak predávaš hardvér + softvér ako \"HACCP riešenie\", posilňuješ dojem, že ručíš za food-safety výstup. Disclaimer z PILOT_AGREEMENT (čl. 3) musí prežiť aj do komerčných zmlúv a over si poistenie profesijnej zodpovednosti skôr, než toto spustíš.\u003c/div>\n    \u003cdiv class=\"m-verdict\">\u003cb>Verdikt panelu:\u003c/b> Zatiaľ len odporúčaj tlačiareň (affiliate link na digitec = drobný príjem bez rizika). Vlastný predaj hardvéru až pri 20+ kuchyniach, ak vôbec.\u003c/div>\n  \u003c/div>\n\n  \u003c!-- 7 -->\n  \u003cdiv class=\"model\" id=\"model-07\">\n    \u003cdiv class=\"m-head\">\n      \u003cdiv class=\"m-num\">07\u003c/div>\n      \u003cdiv class=\"m-title-wrap\">\n        \u003cdiv class=\"m-title\">Enterprise / multi-location licencia\u003c/div>\n        \u003cdiv class=\"m-sub\">Reťazce (Nooch, 10+ pobočiek): centrálna správa receptov, per-location cena so zľavou, ročná zmluva, SLA\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"fit\">\u003cspan class=\"fit-badge f-later\">Fáza 6 (multi-location)\u003c/span>\u003cspan class=\"stars\">★★★★☆\u003c/span>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-body\">\n      \u003cdiv class=\"m-col pro\">\u003ch4>Panel za\u003c/h4>\u003cp>\u003cb>CFO:\u003c/b> jeden podpis = 10× MRR, ročné platby vopred. \u003cb>SaaS CEO:\u003c/b> Nooch je už identifikovaný cieľ — centrálny recept push na pobočky je presne ich bolesť.\u003c/p>\u003c/div>\n      \u003cdiv class=\"m-col con\">\u003ch4>Panel proti\u003c/h4>\u003cp>\u003cb>CTO:\u003c/b> multi-location v appke NEEXISTUJE (Fáza 6) — nepredávaj, čo nevieš dodať. \u003cb>Právnik:\u003c/b> enterprise zákazník bude chcieť DPA, SLA, poistenie, security audit — nič z toho zatiaľ nie je. \u003cb>SaaS CEO 2:\u003c/b> enterprise sales cyklus = 6–12 mesiacov tvojho času.\u003c/p>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-verdict\">\u003cb>Verdikt panelu:\u003c/b> Správny cieľ na rok 2027, nie 2026. Ale: začni s JEDNOU Nooch pobočkou ako normálnym Restaurant zákazníkom (model 01) — trojský kôň do reťazca.\u003c/div>\n  \u003c/div>\n\n  \u003c!-- 8 -->\n  \u003cdiv class=\"model\" id=\"model-08\">\n    \u003cdiv class=\"m-head\">\n      \u003cdiv class=\"m-num\">08\u003c/div>\n      \u003cdiv class=\"m-title-wrap\">\n        \u003cdiv class=\"m-title\">Provízie od dodávateľov / objednávkový marketplace\u003c/div>\n        \u003cdiv class=\"m-sub\">Order List sa prepojí na dodávateľov (Transgourmet, Saviva...) — Sautero berie % z objednávok alebo poplatok za integráciu\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"fit\">\u003cspan class=\"fit-badge f-later\">Dlhodobá vízia\u003c/span>\u003cspan class=\"stars\">★★★☆☆\u003c/span>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-body\">\n      \u003cdiv class=\"m-col pro\">\u003ch4>Panel za\u003c/h4>\u003cp>\u003cb>CFO:\u003c/b> potenciálne najväčší model zo všetkých — % z food nákupu kuchyne je rádovo viac než predplatné. \u003cb>SaaS CEO:\u003c/b> presne takto vyrástli MarketMan a Choco.\u003c/p>\u003c/div>\n      \u003cdiv class=\"m-col con\">\u003ch4>Panel proti\u003c/h4>\u003cp>\u003cb>CTO:\u003c/b> vyžaduje partnerstvá a API veľkých dodávateľov — mesiace rokovaní, na ktoré sólo founder nemá páky bez užívateľskej bázy. \u003cb>Právnik:\u003c/b> provízny konflikt záujmov — ak ti platí dodávateľ, komu slúži tvoje \"cost optimization\" odporúčanie? Treba transparentne priznať v podmienkach.\u003c/p>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-verdict\">\u003cb>Verdikt panelu:\u003c/b> Zapíš do vízie pre investorov (skvelý \"TAM expansion\" slide), nechaj tak do 50+ kuchýň.\u003c/div>\n  \u003c/div>\n\n  \u003c!-- 9 -->\n  \u003cdiv class=\"model\" id=\"model-09\">\n    \u003cdiv class=\"m-head\">\n      \u003cdiv class=\"m-num\">09\u003c/div>\n      \u003cdiv class=\"m-title-wrap\">\n        \u003cdiv class=\"m-title\">Benchmarking &amp; data insights\u003c/div>\n        \u003cdiv class=\"m-sub\">Anonymizované reporty naprieč kuchyňami: \"tvoj food cost vs. medián podobných podnikov\", trendy cien ingrediencií\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"fit\">\u003cspan class=\"fit-badge f-avoid\">Vysoké právne riziko teraz\u003c/span>\u003cspan class=\"stars\">★★☆☆☆\u003c/span>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-body\">\n      \u003cdiv class=\"m-col pro\">\u003ch4>Panel za\u003c/h4>\u003cp>\u003cb>SaaS CEO:\u003c/b> dáta sú jediný moat, ktorý konkurencia nedobehne. Pre kuchyne reálne cenné (nikto nevie, či je jeho food cost dobrý).\u003c/p>\u003c/div>\n      \u003cdiv class=\"m-col con\">\u003ch4>Panel proti\u003c/h4>\u003cp>\u003cb>Právnik — DÔLEŽITÉ:\u003c/b> legal.html aj PILOT_AGREEMENT dnes výslovne sľubujú, že dáta kuchyne sa nepoužijú na nič iné než beh appky. Monetizácia dát by porušila vlastný písomný sľub. Vyžaduje: zmenu podmienok, explicitný opt-in, skutočnú anonymizáciu (pri 10 kuchyniach v Berne je \"anonymné\" ľahko spätne identifikovateľné). \u003cb>CFO:\u003c/b> pri malej vzorke sú benchmarky aj tak štatisticky bezcenné.\u003c/p>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"flag\">\u003cb>⚠ Konflikt s existujúcimi sľubmi\u003c/b>Nespúšťať, kým: (1) nie je 100+ kuchýň pre reálnu anonymitu, (2) podmienky neprejdú právnikom, (3) nie je opt-in mechanizmus. Súčasné dokumenty tento model dnes výslovne zakazujú — a to je správne.\u003c/div>\n    \u003cdiv class=\"m-verdict\">\u003cb>Verdikt panelu:\u003c/b> Rok 2028+. Dovtedy buduj dáta čisto, s dôverou — tá je cennejšia než predčasný data biznis.\u003c/div>\n  \u003c/div>\n\n  \u003c!-- 10 -->\n  \u003cdiv class=\"model\" id=\"model-10\">\n    \u003cdiv class=\"m-head\">\n      \u003cdiv class=\"m-num\">10\u003c/div>\n      \u003cdiv class=\"m-title-wrap\">\n        \u003cdiv class=\"m-title\">Obsahová vrstva — recepty &amp; technika ako prémiový obsah\u003c/div>\n        \u003cdiv class=\"m-sub\">173 profesionálnych receptov + video library (Fáza 6+) ako platený \"Sautero Library\" add-on alebo samostatný produkt pre Level 1 (home cook)\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"fit\">\u003cspan class=\"fit-badge f-later\">Vedľajší kanál\u003c/span>\u003cspan class=\"stars\">★★☆☆☆\u003c/span>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-body\">\n      \u003cdiv class=\"m-col pro\">\u003ch4>Panel za\u003c/h4>\u003cp>\u003cb>SaaS CEO:\u003c/b> obsah existuje zadarmo — už je hotový. Marketingová hodnota (SEO, ukážka kvality) aj keby nezarobil priamo. \u003cb>CFO:\u003c/b> nulové marginálne náklady.\u003c/p>\u003c/div>\n      \u003cdiv class=\"m-col con\">\u003ch4>Panel proti\u003c/h4>\u003cp>\u003cb>SaaS CEO 2:\u003c/b> home cook trh si sám v MVP_DEFINITION označil ako preplnený a nízkomaržový — a mal si pravdu. Nenechaj sa ním rozptýliť. \u003cb>Právnik:\u003c/b> over pôvod všetkých 173 receptov — recepty z pôsobenia v predchádzajúcich podnikoch môžu narážať na mlčanlivosť (Geheimhaltungspflicht platí aj po skončení pomeru).\u003c/p>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-verdict\">\u003cb>Verdikt panelu:\u003c/b> Nie ako biznis, áno ako marketing — pár receptov verejne zadarmo ako výkladná skriňa kvality Sautero.\u003c/div>\n  \u003c/div>\n\n  \u003c!-- 11 — Claude's addition -->\n  \u003cdiv class=\"model mine\" id=\"model-11\">\n    \u003cdiv class=\"m-head\">\n      \u003cdiv class=\"m-num\">11\u003c/div>\n      \u003cdiv class=\"m-title-wrap\">\n        \u003cdiv class=\"m-title\">Školenia &amp; workshopy — \"digitálna kuchyňa\" naživo\u003c/div>\n        \u003cdiv class=\"m-sub\">Platené poldňové workshopy pre kuchynské tímy: digitalizácia prevádzky, food cost v praxi, HACCP dokumentácia — s Sautero ako nástrojom, ale hodnotou je know-how šéfkuchára. CHF 500–1500 za workshop. \u003cb style=\"color:var(--gold);\">Doplnil Claude 13.7.\u003c/b>\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"fit\">\u003cspan class=\"fit-badge f-now\">Spustiteľné pred produktom\u003c/span>\u003cspan class=\"stars\">★★★☆☆\u003c/span>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-body\">\n      \u003cdiv class=\"m-col pro\">\u003ch4>Za\u003c/h4>\u003cp>\u003cb>Jediný model, ktorý nezávisí od hotového produktu\u003c/b> — predávaš znalosti, ktoré už máš, Sautero je \"iba\" demo nástroj v ruke. Rovnaká unikátna výhoda ako pri modeli 04 (šéfkuchár, nie programátor), ale bez čakania na trial. Každý workshop je zároveň predajný kanál: účastníci sú presne cieľovka pre founding-member ponuku. Gastro asociácie a odborné školy vo Švajčiarsku takéto témy aktívne hľadajú.\u003c/p>\u003c/div>\n      \u003cdiv class=\"m-col con\">\u003ch4>Proti\u003c/h4>\u003cp>Neškáluje — tvoj čas, ktorého je s plným úväzkom málo (rovnaký problém ako model 04, ale horší: workshop nemôžeš robiť večer z gauča). Vyžaduje ten istý Nebenerwerb súhlas ako všetko ostatné. Riziko rozptýlenia: ak workshopy zarábajú, je lákavé stať sa školiteľom namiesto foundera.\u003c/p>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-verdict\">\u003cb>Verdikt:\u003c/b> Drž ako doplnok k modelu 04, nie samostatný biznis — napr. onboarding balík \"Premium\" = digitalizácia + poldňový workshop pre tím za príplatok. Jeden workshop za štvrťrok ako marketing + priamy príjem, viac nie.\u003c/div>\n  \u003c/div>\n\n  \u003c!-- 12 — Claude's addition -->\n  \u003cdiv class=\"model mine\" id=\"model-12\">\n    \u003cdiv class=\"m-head\">\n      \u003cdiv class=\"m-num\">12\u003c/div>\n      \u003cdiv class=\"m-title-wrap\">\n        \u003cdiv class=\"m-title\">Sponzorované umiestnenie lokálnych dodávateľov\u003c/div>\n        \u003cdiv class=\"m-sub\">Miestny dodávateľ (napr. lokálna syráreň, Caviezel, Gourmador) zaplatí za zvýraznené umiestnenie pri ingredienciách, ktoré dodáva — \"odporúčaný lokálny dodávateľ\" štítok v Ingredients/Order List, jasne označený ako sponzorovaný. \u003cb style=\"color:var(--gold);\">Doplnil Claude 13.7., na otázku foundera.\u003c/b>\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"fit\">\u003cspan class=\"fit-badge f-later\">Po tom, ako existuje reálne používanie\u003c/span>\u003cspan class=\"stars\">★★★☆☆\u003c/span>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-body\">\n      \u003cdiv class=\"m-col pro\">\u003ch4>Za\u003c/h4>\u003cp>\u003cb>CTO:\u003c/b> technicky triviálne oproti modelu 08 (marketplace) — netreba API integráciu s dodávateľom, žiadne objednávkové workflow, len štítok/banner pri zhode ingrediencie s dodávateľovým sortimentom. Dáta na to už staviame práve teraz (origin pole, ingrediencie s reálnym dodávateľom a číslom artiklu z db/46, db/58). \u003cb>SaaS CEO:\u003c/b> hyperlokálna relevancia je presne to, čo veľké reklamné siete nevedia ponúknuť — dodávateľ z Thurgau vie osloviť presne kuchyne, čo aktívne plánujú menu s jeho syrom v zozname ingrediencií.\u003c/p>\u003c/div>\n      \u003cdiv class=\"m-col con\">\u003ch4>Proti\u003c/h4>\u003cp>\u003cb>SaaS CEO 2:\u003c/b> bez reálneho objemu (desiatky aktívnych kuchýň) nemá čo predávať — nulová návštevnosť = nulová hodnota pre inzerenta, predávať to teraz by bolo predčasné. \u003cb>CFO:\u003c/b> platený nástroj + reklama v ňom pôsobí lacno, ak to nie je jasne rámcované ako \"užitočná informácia\", nie vtieravá reklama. \u003cb>Právnik:\u003c/b> musí byť zreteľne označené ako sponzorované/platené umiestnenie (švajčiarsky UWG — zákon proti nekalej súťaži vyžaduje rozlíšiteľnosť reklamy od organického obsahu).\u003c/p>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-verdict\">\u003cb>Verdikt:\u003c/b> Dobrý nápad, zlý moment. Odlož, kým appka nemá reálne aktívne kuchyne z trialu (aspoň 20-30) — vtedy sa dá dodávateľom ponúknuť konkrétne číslo (\"tvoj produkt uvidí X profesionálnych kuchýň týždenne pri plánovaní menu\"). Do tej doby priprav pôdu zadarmo: ukazovať \"Dodávateľ: Caviezel Giovanettoni, artikel č. XXXXX\" pri ingredienciách už teraz buduje presne tie vzťahy s lokálnymi dodávateľmi, ktoré neskôr platia za zvýraznenie.\u003c/div>\n  \u003c/div>\n\n  \u003c!-- 13 — Richard's idea, 15.7. -->\n  \u003cdiv class=\"model mine\" id=\"model-13\">\n    \u003cdiv class=\"m-head\">\n      \u003cdiv class=\"m-num\">13\u003c/div>\n      \u003cdiv class=\"m-title-wrap\">\n        \u003cdiv class=\"m-title\">Chef's Assistant ako celý \"office tím\" pre mikro-reštaurácie\u003c/div>\n        \u003cdiv class=\"m-sub\">Namiesto predaja appky ako receptového/prep nástroja, polohovať vyšší tier appky ako náhradu za office/admin prácu, ktorú si mikro-reštaurácia (1-3 ľudia v kuchyni, žiadny dedikovaný admin) inak nemôže dovoliť: food cost, sledovanie cien dodávateľov, plánovanie prep, jednoduchá mzdová evidencia (Working Time) — jedna AI + appka namiesto účtovníka/office manažéra na čiastočný úväzok. \u003cb style=\"color:var(--gold);\">Richardov nápad, 15.7.\u003c/b>\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"fit\">\u003cspan class=\"fit-badge f-later\">Po trial validácii cenníka\u003c/span>\u003cspan class=\"stars\">★★★★☆\u003c/span>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-body\">\n      \u003cdiv class=\"m-col pro\">\u003ch4>Za\u003c/h4>\u003cp>\u003cb>SaaS CEO:\u003c/b> mení predajný rámec z \"ďalší kuchynský nástroj, ktorý si musíš osvojiť\" na \"ušetríš si najatie office manažéra\" — oveľa silnejší dôvod platiť CHF 149/mesiac za Restaurant tier, keďže sa porovnáva proti reálnej mzde, nie proti nule. \u003cb>CTO:\u003c/b> appka už má takmer všetky stavebné kamene (cost engine, Ingredients, Working Time, Chef's Assistant) — toto je hlavne otázka polohovania/marketingu, nie nová funkcia. Presne cieľovka mikro-reštaurácií (5-25 ľudí) je aj dnešný trh, takže sa nemení kto kupuje, len prečo.\u003c/p>\u003c/div>\n      \u003cdiv class=\"m-col con\">\u003ch4>Proti\u003c/h4>\u003cp>\u003cb>CFO:\u003c/b> \"nahrádza office manažéra\" je silné tvrdenie, ktoré appka dnes reálne nesplní — chýba skutočná mzdová/účtovná integrácia (Working Time zbiera dáta, ale nevypočíta výplatu ani neodošle nikam). Prehnaný marketing tu môže sklamať presne najhodnotnejších zákazníkov. \u003cb>Právnik:\u003c/b> ak appka začne pôsobiť ako \"nahrádza účtovníka\", hranica k poskytovaniu regulovaných finančných/mzdových služieb sa môže priblížiť — treba jasne komunikovať, že ide o organizačný nástroj, nie účtovný/mzdový softvér.\u003c/p>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-verdict\">\u003cb>Verdikt:\u003c/b> Silná myšlienka pre POLOHOVANIE Restaurant tieru po tom, ako trial ukáže, že si to ľudia reálne myslia (sleduj, či si zákazníci sami appku takto opisujú). Nestavaj mzdovú/účtovnú funkcionalitu len kvôli tomuto — najprv over posolstvo cez copy/marketing na existujúcom produkte, funkcie doplň až keď dopyt potvrdí smer.\u003c/div>\n  \u003c/div>\n\n  \u003c!-- 14 -->\n  \u003cdiv class=\"model mine\" id=\"model-14\">\n    \u003cdiv class=\"m-head\">\n      \u003cdiv class=\"m-num\">14\u003c/div>\n      \u003cdiv class=\"m-title-wrap\">\n        \u003cdiv class=\"m-title\">Gamifikácia pre neplatiacich — dátový flywheel\u003c/div>\n        \u003cdiv class=\"m-sub\">Free užívatelia si \"zarábajú\" používanie prispievaním hodnoty: body/tokeny za vyplnený Yield %, overenú cenu, HACCP log, pridaný recept — míňajú ich na AI funkcie a prémiový obsah\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"fit\">\u003cspan class=\"fit-badge f-later\">Po triale\u003c/span>\u003cspan class=\"stars\">★★★★☆\u003c/span>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-body\">\n      \u003cdiv class=\"m-col pro\">\u003ch4>Panel za\u003c/h4>\u003cp>\u003cb>SaaS CEO:\u003c/b> toto nie je \"hra pre zábavu\" — je to dátový flywheel: free užívatelia svojimi príspevkami budujú presne to aktívum (overené ceny, reálne yieldy, HACCP benchmark dáta), ktoré robí platené tiery a budúcu B2B vrstvu predajnými. \u003cb>PM:\u003c/b> zjednocuje tri Richardove existujúce nápady do jedného systému — odmeny za Yield % (t44), tokeny za \"trénovanie appky\" (t71) a Chef Challenge (už postavený). Mechanika: XP a úrovne (Commis → Chef de Partie → Sous → Head Chef), denné série za check-iny, odznaky, mesačné Chef Challenge súťaže, tokeny na AI skeny. \u003cb>CFO:\u003c/b> free tier prestáva byť čistý náklad — AI použitie je kryté token stropom, takže neplatiaci nikdy nespália viac, než \"odpracovali\".\u003c/p>\u003c/div>\n      \u003cdiv class=\"m-col con\">\u003ch4>Panel proti\u003c/h4>\u003cp>\u003cb>UX/šéfkuchár:\u003c/b> gamifikácia v profesionálnom nástroji vie pôsobiť lacno — kuchár pri servise nechce konfety; musí to byť decentné (tichý bodový účet, nie animácie). \u003cb>CTO:\u003c/b> gamifikované vstupy = riziko kvality dát (ľudia vyplnia hocičo pre body) — potrebná validácia (napr. yield mimo rozumného pásma sa nepočíta). \u003cb>Právnik:\u003c/b> vo Švajčiarsku pozor na verejné porovnávanie výkonu jednotlivcov na pracovisku — rebríčky len opt-in a na úrovni tímu/kuchyne, nie menovite jednotlivci (Art. 328 OR súvislosť, rovnaká ako pri mental-health téme).\u003c/p>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"m-verdict\">\u003cb>Verdikt panelu:\u003c/b> Postaviť PO triale ako retenčnú vrstvu free tieru a dátový motor — nie ako náhradu príjmu (chrbticou ostávajú modely 1+2). Prvý krok je lacný: tichý bodový účet za Yield % + overené ceny, tokeny míňateľné na AI skeny. Rebríčky a úrovne až keď dáta ukážu, že to ľudí drží. Bod pre investora: \"free užívatelia nám budujú datovú bázu\" je silnejší príbeh než \"free tier je marketing\".\u003c/div>\n  \u003c/div>\n\n  \u003c!-- GLOBAL LEGAL -->\n  \u003cdiv class=\"sec\">\u003ch2 data-sk=\"Prierezové právne prekážky — platia pre všetky modely\" data-en=\"Cross-cutting legal blockers — apply to every model\">Prierezové právne prekážky — platia pre všetky modely\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n\n  \u003cdiv class=\"gflag\">\n    \u003ch3>1. Nebenerwerb — písomný súhlas zamestnávateľa PRED prvou platbou\u003c/h3>\n    \u003cp>Personalreglement SHB (čl. 3.6) zakazuje bez písomného súhlasu vedľajšiu činnosť slúžiacu zárobkovému účelu — a obdobnú klauzulu čakaj aj v Burrito Bandito zmluve. Kým je Sautero neplatený trial, si v šedej zóne; prvý prijatý frank ju opúšťa. Riešenie: krátka písomná žiadosť novému zamestnávateľovi (\"softvér pre kuchyne, nekonkuruje reštaurácii, mimo pracovného času\"). \u003cb>Návrh žiadosti je pripravený v docs/NEBENERWERB_REQUEST.md — stačí doplniť meno zamestnávateľa a poslať.\u003c/b> \u003cb style=\"color:var(--gold);\">Stav k 17.7.: Richard sa 16.7. zaviazal oba blokátory (Nebenerwerb aj Einzelfirma/AHV) vyriešiť do 20.7.2026 — pripravené podklady čakajú v priečinku „VYRIEŠIŤ DO 20.7.2026/\".\u003c/b>\u003c/p>\n  \u003c/div>\n  \u003cdiv class=\"gflag\">\n    \u003ch3>2. Právna forma a fakturácia\u003c/h3>\n    \u003cp>\"GmbH po príjme\" je v poriadku ako cieľ, ale fakturovať nemôže nikto — pri prvom príjme potrebuješ minimálne Einzelfirmu (samostatná zárobková činnosť, registrácia AHV ako selbständig; zápis do obchodného registra povinný až od CHF 100k obratu). DPH registrácia až od CHF 100k obratu — dovtedy fakturuješ bez DPH. Pri predaji do EÚ neskôr zváž Merchant-of-Record (Paddle/Lemon Squeezy), ktorý DPH rieši za teba.\u003c/p>\n  \u003c/div>\n  \u003cdiv class=\"gflag\">\n    \u003ch3>3. HACCP zodpovednosť pri prechode na platený produkt\u003c/h3>\n    \u003cp>Disclaimer v PILOT_AGREEMENT čl. 3 je dobrý štart, ale platí pre bezplatný pilot. Pri platenom produkte súd posudzuje zodpovednosť prísnejšie (\"zaplatil som za nástroj, ktorý mi počíta dátumy spotreby\"). Pred komerčným launchom: právnikom overené obchodné podmienky + poistenie profesijnej zodpovednosti (Berufshaftpflicht, pre softvér rádovo stovky CHF/rok).\u003c/p>\n  \u003c/div>\n  \u003cdiv class=\"gflag amber\">\n    \u003ch3>4. Working Time dáta = mzdová agenda zákazníka\u003c/h3>\n    \u003cp>Akonáhle kuchyňa platí a používa Working Time na výpočet miezd, Sautero spracúva osobné údaje zamestnancov v mene zamestnávateľa — pri komerčnom vzťahu to štandardne vyžaduje zmluvu o spracovaní údajov (ADV/DPA) ako prílohu obchodných podmienok. legal.html je na trial úrovni v poriadku, na platený produkt treba upgrade.\u003c/p>\n  \u003c/div>\n  \u003cdiv class=\"gflag amber\">\n    \u003ch3>5. Anthropic API náklady vs. \"neobmedzené AI\"\u003c/h3>\n    \u003cp>Nikdy nesľubuj neobmedzené AI v flat cene bez fair-use klauzuly. Jedna kuchyňa skenujúca 500 receptov denne vie prežrať maržu. Odporúčanie panelu: fair-use limit v podmienkach + cost alert na Anthropic účte (už je v task liste).\u003c/p>\n  \u003c/div>\n\n  \u003c!-- RANKING -->\n  \u003cdiv class=\"sec\">\u003ch2 data-sk=\"Odporúčané poradie spúšťania\" data-en=\"Recommended launch order\">Odporúčané poradie spúšťania\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n  \u003cdiv class=\"rank\">\n    \u003cdiv class=\"r-row\">\u003cspan class=\"r-pos\">1.\u003c/span>\u003cspan class=\"r-name\">Founding-member pre-sale (02)\u003c/span>\u003cspan class=\"r-when\">august–september 2026, po súhlase zamestnávateľa\u003c/span>\u003c/div>\n    \u003cdiv class=\"r-row\">\u003cspan class=\"r-pos\">2.\u003c/span>\u003cspan class=\"r-name\">Onboarding služba (04) + workshopy (11) ako premium variant\u003c/span>\u003cspan class=\"r-when\">súbežne — klin do každej novej kuchyne\u003c/span>\u003c/div>\n    \u003cdiv class=\"r-row\">\u003cspan class=\"r-pos\">3.\u003c/span>\u003cspan class=\"r-name\">Flat SaaS predplatné (01)\u003c/span>\u003cspan class=\"r-when\">Q4 2026 — verejný cenník po úspešnom triale\u003c/span>\u003c/div>\n    \u003cdiv class=\"r-row\">\u003cspan class=\"r-pos\">4.\u003c/span>\u003cspan class=\"r-name\">Modulárne add-ony (03) + AI fair-use → metered (05)\u003c/span>\u003cspan class=\"r-when\">2027, pri 30+ zákazníkoch\u003c/span>\u003c/div>\n    \u003cdiv class=\"r-row\">\u003cspan class=\"r-pos\">5.\u003c/span>\u003cspan class=\"r-name\">Enterprise/Nooch (07)\u003c/span>\u003cspan class=\"r-when\">2027, po multi-location (Fáza 6)\u003c/span>\u003c/div>\n    \u003cdiv class=\"r-row\">\u003cspan class=\"r-pos\">6.\u003c/span>\u003cspan class=\"r-name\">Sponzorovaní dodávatelia (12) — po 20-30 aktívnych kuchyniach z trialu\u003c/span>\u003cspan class=\"r-when\">Koniec 2026 / začiatok 2027, závisí od objemu\u003c/span>\u003c/div>\n    \u003cdiv class=\"r-row\">\u003cspan class=\"r-pos\">7.\u003c/span>\u003cspan class=\"r-name\">Marketplace provízie (08), benchmarking (09), obsah (10), hardvér (06)\u003c/span>\u003cspan class=\"r-when\">2028+ alebo nikdy — vízia pre investorov, nie plán\u003c/span>\u003c/div>\n  \u003c/div>\n\n  \u003cdiv class=\"gflag green\" style=\"margin-top:28px;\">\n    \u003ch3>Jednohlasný záver panelu\u003c/h3>\n    \u003cp>Nevymýšľaj exotiku. Kombinácia \u003cb>onboarding CHF ~990 + founding ročné predplatné\u003c/b> je celý monetizačný plán na najbližších 12 mesiacov — jednoduchý na vysvetlenie, jednoduchý na fakturáciu, a využíva tvoju unikátnu výhodu (šéfkuchár, ktorý digitalizuje kuchyne, nie programátor, ktorý sa hrá na kuchára). Všetko ostatné je slide do investor decku. Jediné dve veci, ktoré ťa reálne blokujú, nie sú produktové: \u003cb>písomný súhlas zamestnávateľa a založenie Einzelfirmy.\u003c/b>\u003c/p>\n  \u003c/div>\n\n  \u003c!-- ACTION PLAN (Claude's addition) -->\n  \u003cdiv class=\"sec\">\u003ch2 data-sk=\"Akčný plán — čo sa deje hneď (doplnené 13.7.)\" data-en=\"Action plan — what happens right now (added 13.7.)\">Akčný plán — čo sa deje hneď (doplnené 13.7.)\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n  \u003cdiv class=\"action\">\n    \u003cdiv class=\"a-row\">\u003cspan class=\"a-who a-done\">Pripravené\u003c/span>\u003cdiv class=\"a-body\">\u003cdiv class=\"a-title\">Návrh žiadosti o Nebenerwerb súhlas\u003c/div>\u003cdiv class=\"a-desc\">docs/NEBENERWERB_REQUEST.md — dvojjazyčný návrh (DE + SK vysvetlenie), stačí doplniť meno zamestnávateľa, vytlačiť/poslať. Toto je blokátor č. 1 pre akýkoľvek príjem.\u003c/div>\u003c/div>\u003c/div>\n    \u003cdiv class=\"a-row\">\u003cspan class=\"a-who a-done\">Pripravené\u003c/span>\u003cdiv class=\"a-body\">\u003cdiv class=\"a-title\">Návrh founding-member ponuky\u003c/div>\u003cdiv class=\"a-desc\">docs/FOUNDING_OFFER.md — kompletná ponuka (čo dostane founding kuchyňa, cena CHF 490/rok + onboarding CHF 990, čo \"doživotná cena\" presne pokrýva a nepokrýva, podmienky vrátenia peňazí) — draft na tvoju úpravu cien a právnu kontrolu.\u003c/div>\u003c/div>\u003c/div>\n    \u003cdiv class=\"a-row\">\u003cspan class=\"a-who a-you\">TY\u003c/span>\u003cdiv class=\"a-body\">\u003cdiv class=\"a-title\">Poslať žiadosť o súhlas zamestnávateľovi (Burrito Bandito)\u003c/div>\u003cdiv class=\"a-desc\">Bez tohto sa nesmie prijať prvá platba. Odhad: 10 minút tvojho času + čakanie na podpis.\u003c/div>\u003c/div>\u003c/div>\n    \u003cdiv class=\"a-row\">\u003cspan class=\"a-who a-you\">TY\u003c/span>\u003cdiv class=\"a-body\">\u003cdiv class=\"a-title\">Registrácia Einzelfirma / AHV selbständig\u003c/div>\u003cdiv class=\"a-desc\">Online cez AHV kompenzačnú kasu kantónu Bern. Zápis do obchodného registra netreba (do CHF 100k). Odhad: 1–2 hodiny + poplatky rádovo desiatky CHF.\u003c/div>\u003c/div>\u003c/div>\n    \u003cdiv class=\"a-row\">\u003cspan class=\"a-who a-you\">TY\u003c/span>\u003cdiv class=\"a-body\">\u003cdiv class=\"a-title\">Rozhodnúť finálne ceny (founding + onboarding)\u003c/div>\u003cdiv class=\"a-desc\">Návrh v FOUNDING_OFFER.md je CHF 490/rok founding + CHF 990 onboarding — uprav podľa citu, ty poznáš trh.\u003c/div>\u003c/div>\u003c/div>\n    \u003cdiv class=\"a-row\">\u003cspan class=\"a-who a-me\">CLAUDE\u003c/span>\u003cdiv class=\"a-body\">\u003cdiv class=\"a-title\">Po súhlase: founding ponuka priamo do appky\u003c/div>\u003cdiv class=\"a-desc\">Jednoduchá \"Founding member\" stránka/karta v appke pre trial užívateľov — uvidia ponuku, kliknú \"mám záujem\", tebe príde email. Žiadna platobná brána na štart — faktúru pošleš ručne (do 20 kuchýň úplne stačí a vyhneš sa Stripe poplatkom aj integrácii).\u003c/div>\u003c/div>\u003c/div>\n    \u003cdiv class=\"a-row\">\u003cspan class=\"a-who a-me\">CLAUDE\u003c/span>\u003cdiv class=\"a-body\">\u003cdiv class=\"a-title\">Fair-use klauzula do legal.html\u003c/div>\u003cdiv class=\"a-desc\">Krátky odsek o AI limitoch — pripraví pôdu pre platený produkt, nič nemení pre trial.\u003c/div>\u003c/div>\u003c/div>\n  \u003c/div>\n\n  \u003cfooter>Sautero — monetizačný workshop · panel: CTO / CFO / právnik CH / 2× SaaS CEO · model 11 + akčný plán: Claude · podklady: ROADMAP, MVP_DEFINITION, FEATURE_ROADMAP, ARCHITECTURE, PILOT_AGREEMENT, legal.html, REGRESSION_CHECKLIST, LABEL_PRINTER_RESEARCH, pracovná zmluva + Personalreglement SHB · 13. 7. 2026, redizajn 15. 7. 2026 · nejde o právne poradenstvo — kľúčové kroky over s právnikom\u003c/footer>\n\u003c/div>\n\n\n\u003cscript>\n/* Overview matrix — reads number, title, fit badge and stars straight out of each .model card,\n   so the summary can never drift from the detailed cards. Clicking a row jumps to the card. */\n(function(){\n  const rows = [...document.querySelectorAll('.model')].map(card=>{\n    const num = card.querySelector('.m-num').textContent.trim();\n    const title = card.querySelector('.m-title').textContent.trim();\n    const badge = card.querySelector('.fit-badge');\n    const stars = card.querySelector('.stars');\n    return `\n      \u003ca class=\"mx-row\" href=\"#${card.id}\">\n        \u003cspan class=\"mx-num\">${num}\u003c/span>\n        \u003cspan class=\"mx-name\">${title}\u003c/span>\n        \u003cspan class=\"mx-side\">${badge ? badge.outerHTML : ''}${stars ? `\u003cspan class=\"mx-stars\">${stars.textContent}\u003c/span>` : ''}\u003c/span>\n      \u003c/a>\n    `;\n  }).join('');\n  document.getElementById('modelMatrix').innerHTML = rows;\n})();\n\u003c/script>\n\n\u003cdiv class=\"sautero-stamp\" data-sk=\"🔄 Stav Sautero k 21. 7. 2026, 20:13\" data-en=\"🔄 Sautero state as of Jul 21, 2026, 20:13\">🔄 Stav Sautero k 21. 7. 2026, 20:13\u003c/div>\n\u003cbutton class=\"sautero-lang-fab\" id=\"sauteroLangFab\" onclick=\"sauteroToggleLang()\">EN\u003c/button>\n\n\u003cscript>\n/* Shared SK/EN toggle for /visual data/ docs without their own — same sautero_doc_lang key as\n   the rest, so one switch follows you across every document. Translates [data-sk]/[data-en]\n   pairs (chrome + stamp); untagged content stays in its original language. */\n(function(){\n  let lang = localStorage.getItem('sautero_doc_lang') || 'sk';\n  function apply(){\n    document.querySelectorAll('[data-sk]').forEach(el=>{\n      const val = lang === 'sk' ? el.getAttribute('data-sk') : (el.getAttribute('data-en') || el.getAttribute('data-sk'));\n      if(val.indexOf('\u003c') !== -1) el.innerHTML = val; else el.textContent = val;\n    });\n    const b = document.getElementById('sauteroLangFab');\n    if(b) b.textContent = lang === 'sk' ? 'EN' : 'SK';\n    document.documentElement.lang = lang;\n  }\n  window.sauteroToggleLang = function(){\n    lang = lang === 'sk' ? 'en' : 'sk';\n    localStorage.setItem('sautero_doc_lang', lang);\n    apply();\n  };\n  apply();\n})();\n\n/* Ratings chart (Richard, 17.7.) — reads each model card's stars from the DOM (single source\n   of truth stays the cards themselves), draws a sorted bar per model, click jumps to it. */\n(function(){\n  const wrap = document.getElementById('ratingsChart');\n  if(!wrap) return;\n  const rows = [...document.querySelectorAll('.model')].map(card=>{\n    const stars = (card.querySelector('.stars')?.textContent.match(/★/g) || []).length;\n    return { id: card.id, name: card.querySelector('.m-title')?.textContent || card.id, stars };\n  }).filter(r=>r.stars > 0).sort((a,b)=>b.stars - a.stars);\n  wrap.innerHTML = '\u003cdiv class=\"rc-title\">Rebríček modelov podľa hodnotenia — klikni pre skok na kartu\u003c/div>' +\n    rows.map(r=>`\n      \u003cdiv class=\"rc-row\" onclick=\"document.getElementById('${r.id}').scrollIntoView({behavior:'smooth', block:'start'})\">\n        \u003cspan class=\"rc-name\" title=\"${r.name.replace(/\"/g,'&quot;')}\">${r.name}\u003c/span>\n        \u003cspan class=\"rc-bar\">\u003cspan class=\"rc-fill\" style=\"width:${r.stars/5*100}%\">\u003c/span>\u003c/span>\n        \u003cspan class=\"rc-stars\">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}\u003c/span>\n      \u003c/div>`).join('');\n})();\n\u003c/script>\n\u003cscript>\n/* t174 (18.7.): full SK/EN for monetization. The walker stashes the Slovak innerHTML on first\n   run and swaps by index arrays — the HTML body stays single-source (SK), EN lives here.\n   New models/sections must extend these arrays. */\n(function(){\n  const T = {\n    dek: `The outcome of a five-perspective panel discussion over all project documents (roadmap, MVP, pilot agreement, legal.html, employment contracts). Every model carries a fit rating for your exact situation — solo founder, pre-GmbH, employed full-time, 1 pilot kitchen, market: professional kitchens of 5–25 people in Switzerland. Models 11-12 and the action plan added by Claude 13 Jul; model 13 is Richard's own idea, 15 Jul; model 14 (free-tier gamification) proposed at Richard's request 15 Jul.`,\n    mTitle: [\n      'Per-kitchen subscription (flat SaaS)','Founding-member pre-sale','Modular subscription (à la carte)','Onboarding as a paid service','AI credits / metered AI','Hardware bundle — label printer + consumables','Enterprise / multi-location licence','Supplier commissions / an ordering marketplace','Benchmarking &amp; data insights','Content layer — recipes &amp; technique as premium content','Training &amp; workshops — the \"digital kitchen\" live','Sponsored placement of local suppliers',`Chef's Assistant as a whole \"office team\" for micro-restaurants`,'Gamification for non-payers — a data flywheel'\n    ],\n    mSub: [\n      'One price per kitchen/month, unlimited team members — e.g. Chef Pro CHF 49, Restaurant CHF 149',\n      'The first 10–20 kitchens pay a year up front at a discount (e.g. CHF 490/yr instead of 588) + a lifetime founding price',\n      'The base cheap (recipes + Check List), modules as add-ons: Working Time +CHF 20, Food Cost +CHF 30, AI +CHF 20…',\n      '\"We digitise your whole kitchen\" — a one-off CHF 500–2000: an AI scan of all recipes, station setup, prep sheets, training',\n      `A base subscription + AI features (Chef's Assistant, scanning, generation) billed by consumption or in credit packs`,\n      'Sautero sells/rents the Brother QL + a margin on label rolls (CHF 200–1000/yr per kitchen per our own research)',\n      'Chains (Nooch, 10+ locations): central recipe management, a discounted per-location price, an annual contract, an SLA',\n      'The Order List connects to suppliers (Transgourmet, Saviva…) — Sautero takes a % of orders or an integration fee',\n      `Anonymised cross-kitchen reports: \"your food cost vs. the median of similar venues\", ingredient price trends`,\n      '173 professional recipes + a video library (Phase 6+) as a paid \"Sautero Library\" add-on or a standalone Level 1 (home cook) product',\n      `Paid half-day workshops for kitchen teams: digitising operations, food cost in practice, HACCP documentation — with Sautero as the tool, but the chef's know-how as the value. CHF 500–1500 per workshop. \u003cb style=\"color:var(--gold);\">Added by Claude 13 Jul.\u003c/b>`,\n      `A local supplier (e.g. a local cheese dairy, Caviezel, Gourmador) pays for highlighted placement on the ingredients it supplies — a \"recommended local supplier\" tag in Ingredients/Order List, clearly marked as sponsored. \u003cb style=\"color:var(--gold);\">Added by Claude 13 Jul, at the founder's question.\u003c/b>`,\n      `Instead of selling the app as a recipe/prep tool, position the higher tier as a replacement for the office/admin work a micro-restaurant (1-3 people in the kitchen, no dedicated admin) otherwise can't afford: food cost, supplier price tracking, prep planning, simple hours records (Working Time) — one AI + app instead of a part-time bookkeeper/office manager. \u003cb style=\"color:var(--gold);\">Richard's idea, 15 Jul.\u003c/b>`,\n      `Free users \"earn\" their usage by contributing value: points/tokens for a filled Yield %, a verified price, a HACCP log, an added recipe — spent on AI features and premium content`\n    ],\n    h4: { 'Panel za':'Panel for', 'Panel proti':'Panel against', 'Za':'For', 'Proti':'Against' },\n    badges: {\n      'Primárny model':'Primary model','Prvý príjem':'First revenue','Po triale':'After the trial','Po trial validácii cenníka':'After trial price validation','Okamžitý doplnok':'Immediate add-on','Keď AI náklady porastú':'Once AI costs grow','Vedľajší kanál':'Side channel','Fáza 6 (multi-location)':'Phase 6 (multi-location)','Fáza 3+':'Phase 3+','Vysoké právne riziko teraz':'High legal risk now','Dlhodobá vízia':'Long-term vision','Spustiteľné pred produktom':'Launchable before the product','Až s viac kuchyňami':'Only with more kitchens','Po tom, ako existuje reálne používanie':'Once real usage exists'\n    },\n    rcTitle: 'Model ranking by rating — click to jump to the card',\n  };\n  Object.assign(window.__monetT || T, {\n    pro: [\n      `\u003cb>CFO:\u003c/b> predictable MRR, simple accounting. \u003cb>SaaS CEO:\u003c/b> \"per kitchen\" fits how restaurants buy — a chef doesn't want to count licences for temps. \u003cb>CTO:\u003c/b> the multi-tenant architecture already exists, nothing to build except the billing layer.`,\n      `\u003cb>CFO:\u003c/b> cash up front with no debt and no investor — exactly the mechanism you chose long ago as the first revenue source before it vanished from the documents. \u003cb>SaaS CEO:\u003c/b> the best validation — someone paying a year ahead for a beta is a real customer, not a polite tester.`,\n      `\u003cb>CFO:\u003c/b> revenue expansion without acquiring new customers — a kitchen starts basic and buys more. \u003cb>SaaS CEO:\u003c/b> a low entry barrier for sceptical chefs.`,\n      `\u003cb>SaaS CEO:\u003c/b> solves the biggest adoption barrier (nobody wants to retype 200 recipes) and the customer pays for it. \u003cb>CFO:\u003c/b> high margin — the AI scan does most of the work, you review. One-off cash immediately. \u003cb>Unique edge:\u003c/b> you are a chef — competing SaaS firms can't credibly offer this service.`,\n      `\u003cb>CFO:\u003c/b> the only model where variable costs (the Anthropic API) exactly track revenue — zero risk of a \"power user\" eating you. \u003cb>CTO:\u003c/b> the usage log de facto already exists in analytics.`,\n      `\u003cb>CFO:\u003c/b> recurring consumables revenue is a beautiful business (LABEL_PRINTER_RESEARCH shows the rolls cost more than the printer). \u003cb>SaaS CEO:\u003c/b> hardware in the kitchen = a physical anchor against churn.`,\n      `\u003cb>CFO:\u003c/b> one signature = 10× MRR, annual payments up front. \u003cb>SaaS CEO:\u003c/b> Nooch is already an identified target — a central recipe push to locations is exactly their pain.`,\n      `\u003cb>CFO:\u003c/b> potentially the biggest model of all — a % of a kitchen's food purchasing is an order of magnitude more than a subscription. \u003cb>SaaS CEO:\u003c/b> this is exactly how MarketMan and Choco grew.`,\n      `\u003cb>SaaS CEO:\u003c/b> data is the only moat competitors can't catch up with. Genuinely valuable to kitchens (nobody knows whether their food cost is good).`,\n      `\u003cb>SaaS CEO:\u003c/b> the content exists for free — it's already done. Marketing value (SEO, a showcase of quality) even if it never earns directly. \u003cb>CFO:\u003c/b> zero marginal cost.`,\n      `\u003cb>The only model that doesn't depend on a finished product\u003c/b> — you sell knowledge you already have, Sautero is \"just\" the demo tool in hand. The same unique edge as model 04 (a chef, not a programmer), but without waiting for the trial. Every workshop is also a sales channel: the participants are exactly the audience for the founding-member offer. Swiss gastro associations and trade schools actively look for these topics.`,\n      `\u003cb>CTO:\u003c/b> technically trivial compared to model 08 (the marketplace) — no supplier API integration, no ordering workflow, just a tag/banner when an ingredient matches a supplier's range. We're building the data for it right now (the origin field, ingredients with a real supplier and article number from db/46, db/58). \u003cb>SaaS CEO:\u003c/b> hyperlocal relevance is exactly what big ad networks can't offer — a Thurgau supplier can reach precisely the kitchens actively planning a menu with its cheese in the ingredient list.`,\n      `\u003cb>SaaS CEO:\u003c/b> changes the sales frame from \"another kitchen tool you must learn\" to \"you save hiring an office manager\" — a far stronger reason to pay CHF 149/month for the Restaurant tier, since it compares against a real wage, not against zero. \u003cb>CTO:\u003c/b> the app already has nearly all the building blocks (the cost engine, Ingredients, Working Time, Chef's Assistant) — this is mostly positioning/marketing, not a new feature. The micro-restaurant audience (5-25 people) is also today's market, so who buys doesn't change — only why.`,\n      `\u003cb>SaaS CEO:\u003c/b> this is not a \"game for fun\" — it's a data flywheel: free users build with their contributions exactly the asset (verified prices, real yields, HACCP benchmark data) that makes the paid tiers and the future B2B layer sellable. \u003cb>PM:\u003c/b> unifies three of Richard's existing ideas into one system — Yield % rewards (t44), tokens for \"training the app\" (t71) and Chef Challenge (already built). Mechanics: XP and levels (Commis → Chef de Partie → Sous → Head Chef), daily streaks for check-ins, badges, monthly Chef Challenge contests, tokens for AI scans. \u003cb>CFO:\u003c/b> the free tier stops being pure cost — AI usage is covered by the token cap, so a non-payer never burns more than they \"worked off\".`\n    ],\n    con: [\n      `\u003cb>CFO:\u003c/b> a flat price leaves money on the table with big kitchens (25 people pay like 5). \u003cb>SaaS CEO:\u003c/b> churn in gastronomy is brutal — restaurants close; budget for 3–5% monthly.`,\n      `\u003cb>Lawyer:\u003c/b> you're selling a promise — if the product isn't delivered, a refund claim arises. Keep the money separate until it's earned. \u003cb>SaaS CEO:\u003c/b> a \"lifetime price\" sounds tempting, but define exactly what it covers (today's modules, not everything future).`,\n      `\u003cb>SaaS CEO 2:\u003c/b> for a solo founder this is pricing complexity that kills — 5 modules × discounts × combinations = support hell. \u003cb>CTO:\u003c/b> feature-gating in a single-file app = another code layer you don't need now.`,\n      `\u003cb>CFO:\u003c/b> doesn't scale — it's your time, which is scarce with the new job. \u003cb>CTO:\u003c/b> a dependency on Anthropic API costs — for big kitchens, price the scan in advance.`,\n      `\u003cb>SaaS CEO:\u003c/b> chefs hate the taximeter — price uncertainty kills usage of exactly the features that differentiate you. \u003cb>SaaS CEO 2:\u003c/b> AI costs are negligible so far — you're solving a problem you don't have.`,\n      `\u003cb>CFO:\u003c/b> logistics, stock, returns, capital tied up in goods — a nightmare for a solo founder. \u003cb>Lawyer:\u003c/b> as a hardware seller you carry warranty duties (2 years in CH). \u003cb>Ironic:\u003c/b> your own research warns kitchens about consumables lock-in — don't be the vendor you warned against.`,\n      `\u003cb>CTO:\u003c/b> multi-location does NOT exist in the app (Phase 6) — don't sell what you can't deliver. \u003cb>Lawyer:\u003c/b> an enterprise customer will want a DPA, SLA, insurance, a security audit — none of that exists yet. \u003cb>SaaS CEO 2:\u003c/b> an enterprise sales cycle = 6–12 months of your time.`,\n      `\u003cb>CTO:\u003c/b> requires partnerships and the big suppliers' APIs — months of negotiations a solo founder has no leverage for without a user base. \u003cb>Lawyer:\u003c/b> a commission conflict of interest — if the supplier pays you, whom does your \"cost optimisation\" advice serve? Must be transparently admitted in the terms.`,\n      `\u003cb>Lawyer — IMPORTANT:\u003c/b> legal.html and the PILOT_AGREEMENT today explicitly promise kitchen data won't be used for anything but running the app. Monetising data would break your own written promise. Requires: changed terms, an explicit opt-in, real anonymisation (with 10 kitchens in Bern, \"anonymous\" is easily re-identifiable). \u003cb>CFO:\u003c/b> with a small sample the benchmarks are statistically worthless anyway.`,\n      `\u003cb>SaaS CEO 2:\u003c/b> you yourself marked the home-cook market as crowded and low-margin in MVP_DEFINITION — and you were right. Don't be distracted by it. \u003cb>Lawyer:\u003c/b> verify the origin of all 173 recipes — recipes from previous workplaces can hit confidentiality (Geheimhaltungspflicht survives the end of employment).`,\n      `Doesn't scale — your time, which is scarce with a full-time job (the same problem as model 04, but worse: you can't run a workshop from the couch at night). Requires the same side-business consent as everything else. A distraction risk: if workshops earn, it's tempting to become a trainer instead of a founder.`,\n      `\u003cb>SaaS CEO 2:\u003c/b> without real volume (dozens of active kitchens) there's nothing to sell — zero traffic = zero value to an advertiser; selling it now would be premature. \u003cb>CFO:\u003c/b> a paid tool with ads in it looks cheap unless clearly framed as \"useful information\", not intrusive advertising. \u003cb>Lawyer:\u003c/b> must be clearly marked as sponsored/paid placement (the Swiss UWG — unfair-competition law requires ads to be distinguishable from organic content).`,\n      `\u003cb>CFO:\u003c/b> \"replaces an office manager\" is a strong claim the app can't truly meet today — real payroll/accounting integration is missing (Working Time collects data but computes no wage and sends nothing anywhere). Overselling here can disappoint exactly the most valuable customers. \u003cb>Lawyer:\u003c/b> if the app starts looking like it \"replaces a bookkeeper\", the line to providing regulated financial/payroll services gets closer — communicate clearly that it's an organisational tool, not accounting/payroll software.`,\n      `\u003cb>UX/chef:\u003c/b> gamification in a professional tool can look cheap — a chef mid-service doesn't want confetti; it must be subtle (a quiet points account, not animations). \u003cb>CTO:\u003c/b> gamified inputs = a data-quality risk (people enter anything for points) — validation needed (e.g. a yield outside a sane band doesn't count). \u003cb>Lawyer:\u003c/b> in Switzerland beware public comparison of individuals' performance at work — leaderboards opt-in only and at team/kitchen level, not by name (the Art. 328 OR context, same as the mental-health topic).`\n    ],\n    verdict: [\n      `\u003cb>Panel verdict:\u003c/b> This is the backbone. Two tiers (Chef Pro solo / Restaurant team) exactly mirror the existing Level 2/3 tiers from FEATURE_ROADMAP. Everything else in this document is an add-on to this base.`,\n      `\u003cb>Panel verdict:\u003c/b> Launch during/after August. The 25-person trial is exactly the audience for \"want the founding price?\". Goal: 5 paying founding kitchens = validation + first cash.`,\n      `\u003cb>Panel verdict:\u003c/b> A good evolution of model 01 once there are 30+ customers and it's clear what they actually use. Not for the start.`,\n      `\u003cb>Panel verdict:\u003c/b> The ideal \"wedge\" — a kitchen pays for onboarding, gets a ready system, and the subscription (model 01) is the natural continuation. Combine: onboarding CHF 990 + a founding first year.`,\n      `\u003cb>Panel verdict:\u003c/b> Keep in reserve. Build a \"fair use\" cap into the subscription (e.g. 500 AI actions/month) and pull out the metered model only once data shows it's needed.`,\n      `\u003cb>Panel verdict:\u003c/b> For now just recommend the printer (an affiliate link on digitec = small risk-free income). Selling hardware yourself only at 20+ kitchens, if at all.`,\n      `\u003cb>Panel verdict:\u003c/b> The right goal for 2027, not 2026. But: start with ONE Nooch location as a normal Restaurant customer (model 01) — a Trojan horse into the chain.`,\n      `\u003cb>Panel verdict:\u003c/b> Write it into the investor vision (a great \"TAM expansion\" slide), leave it until 50+ kitchens.`,\n      `\u003cb>Panel verdict:\u003c/b> 2028+. Until then build the data cleanly, with trust — that's worth more than a premature data business.`,\n      `\u003cb>Panel verdict:\u003c/b> Not as a business, yes as marketing — a few recipes publicly free as a showcase of Sautero quality.`,\n      `\u003cb>Verdict:\u003c/b> Keep as an add-on to model 04, not a standalone business — e.g. a \"Premium\" onboarding bundle = digitisation + a half-day team workshop for a surcharge. One workshop per quarter as marketing + direct income, no more.`,\n      `\u003cb>Verdict:\u003c/b> A good idea, the wrong moment. Postpone until the app has genuinely active kitchens from the trial (at least 20-30) — then you can offer suppliers a concrete number (\"your product is seen by X professional kitchens weekly while planning menus\"). Until then, prepare the ground for free: showing \"Supplier: Caviezel Giovanettoni, article no. XXXXX\" on ingredients already builds exactly the local-supplier relationships that later pay for placement.`,\n      `\u003cb>Verdict:\u003c/b> A strong idea for POSITIONING the Restaurant tier once the trial shows people genuinely think of it this way (watch whether customers describe the app like this themselves). Don't build payroll/accounting features just for this — first prove the message via copy/marketing on the existing product, add features once demand confirms the direction.`,\n      `\u003cb>Panel verdict:\u003c/b> Build AFTER the trial as the free tier's retention layer and data engine — not as a revenue replacement (models 1+2 remain the backbone). The first step is cheap: a quiet points account for Yield % + verified prices, tokens spendable on AI scans. Leaderboards and levels only once data shows it retains people. The investor point: \"free users build our data base\" is a stronger story than \"the free tier is marketing\".`\n    ],\n    flags: [\n      `\u003cb>⚠ Legal block — side business\u003c/b>This is the first moment Sautero \"dem Erwerbszweck dient\". Under the Personalreglement (and almost certainly a similar clause in the Burrito Bandito contract) you need the employer's WRITTEN consent to gainful side work BEFORE accepting the first payment. This is a condition for models 1–11 without exception.`,\n      `\u003cb>⚠ Invoicing entity\u003c/b>Before the first invoice the legal form must be decided: a sole proprietorship suffices at the start (fast, cheap), the GmbH per the \"after revenue\" plan — but the first invoice IS revenue, so at minimum the sole proprietorship + AHV registration as self-employed must exist at the first payment.`,\n      `\u003cb>⚠ HACCP liability\u003c/b>If you sell hardware + software as a \"HACCP solution\", you strengthen the impression that you vouch for the food-safety outcome. The PILOT_AGREEMENT disclaimer (art. 3) must survive into commercial contracts, and check professional liability insurance before launching this.`,\n      `\u003cb>⚠ Conflict with existing promises\u003c/b>Do not launch until: (1) there are 100+ kitchens for real anonymity, (2) the terms pass a lawyer, (3) an opt-in mechanism exists. Today's documents explicitly forbid this model — and rightly so.`\n    ],\n    gflagH: [\n      '1. Side business — the employer\\'s written consent BEFORE the first payment',\n      '2. Legal form and invoicing',\n      '3. HACCP liability when going paid',\n      '4. Working Time data = the customer\\'s payroll agenda',\n      '5. Anthropic API costs vs. \"unlimited AI\"',\n      'The panel\\'s unanimous conclusion'\n    ],\n    gflagP: [\n      `The SHB Personalreglement (art. 3.6) forbids gainful side work without written consent — and expect a similar clause in the Burrito Bandito contract. While Sautero is an unpaid trial you're in a grey zone; the first franc received leaves it. The solution: a short written request to the new employer (\"kitchen software, doesn't compete with the restaurant, outside working hours\"). \u003cb>The draft request is ready in docs/NEBENERWERB_REQUEST.md — just fill in the employer's name and send.\u003c/b> \u003cb style=\"color:var(--gold);\">As of 17 Jul: on 16 Jul Richard committed to both blockers (the consent and the sole proprietorship/AHV).\u003c/b>`,\n      `\"A GmbH after revenue\" is fine as a goal, but nobody can invoice without an entity — at the first revenue you need at least a sole proprietorship (self-employment, AHV registration as selbständig; the commercial-register entry only becomes mandatory from CHF 100k turnover). VAT registration only from CHF 100k turnover — until then you invoice without VAT. For later EU sales consider a Merchant-of-Record (Paddle/Lemon Squeezy) that handles VAT for you.`,\n      `The disclaimer in PILOT_AGREEMENT art. 3 is a good start, but it covers a free pilot. With a paid product a court judges liability more strictly (\"I paid for a tool that computes my use-by dates\"). Before the commercial launch: lawyer-checked commercial terms + professional liability insurance (Berufshaftpflicht, for software in the hundreds of CHF/yr).`,\n      `As soon as a kitchen pays and uses Working Time to compute wages, Sautero processes employees' personal data on the employer's behalf — in a commercial relationship that normally requires a data-processing agreement (ADV/DPA) attached to the terms. legal.html is fine at trial level; the paid product needs an upgrade.`,\n      `Never promise unlimited AI at a flat price without a fair-use clause. One kitchen scanning 500 recipes a day can eat the margin. The panel's recommendation: a fair-use cap in the terms + a cost alert on the Anthropic account (already on the task list).`,\n      `Don't invent exotica. The combination \u003cb>onboarding CHF ~990 + a founding annual subscription\u003c/b> is the entire monetisation plan for the next 12 months — simple to explain, simple to invoice, and it uses your unique edge (a chef who digitises kitchens, not a programmer playing chef). Everything else is a slide for the investor deck. The only two things genuinely blocking you aren't product ones: \u003cb>the employer's written consent and founding the sole proprietorship.\u003c/b>`\n    ],\n    aTitle: [\n      'Draft of the side-business consent request','Draft of the founding-member offer','Send the consent request to the employer (Burrito Bandito)','Sole proprietorship / AHV registration','Decide the final prices (founding + onboarding)','After consent: the founding offer right in the app','A fair-use clause into legal.html'\n    ],\n    aDesc: [\n      `docs/NEBENERWERB_REQUEST.md — a bilingual draft (DE + an SK explanation); fill in the employer's name, print/send. This is blocker #1 for any revenue.`,\n      `docs/FOUNDING_OFFER.md — the complete offer (what a founding kitchen gets, the CHF 490/yr price + CHF 990 onboarding, what the \"lifetime price\" exactly covers and doesn't, the refund terms) — a draft for your price edits and legal review.`,\n      `Without this no first payment may be accepted. Estimate: 10 minutes of your time + waiting for the signature.`,\n      `Online via the AHV compensation office of canton Bern. No commercial-register entry needed (below CHF 100k). Estimate: 1–2 hours + fees in the tens of CHF.`,\n      `The proposal in FOUNDING_OFFER.md is CHF 490/yr founding + CHF 990 onboarding — adjust by feel, you know the market.`,\n      `A simple \"Founding member\" page/card in the app for trial users — they see the offer, tap \"I'm interested\", you get an email. No payment gateway at the start — you send the invoice manually (up to 20 kitchens it's plenty and you skip Stripe fees and integration).`,\n      `A short paragraph about AI limits — prepares the ground for the paid product, changes nothing for the trial.`\n    ],\n    rName: [\n      'Founding-member pre-sale (02)','Onboarding service (04) + workshops (11) as the premium variant','Flat SaaS subscription (01)','Modular add-ons (03) + AI fair-use → metered (05)','Enterprise/Nooch (07)','Sponsored suppliers (12) — after 20-30 active trial kitchens','Marketplace commissions (08), benchmarking (09), content (10), hardware (06)'\n    ],\n    rWhen: [\n      'August–September 2026, after the employer\\'s consent','in parallel — the wedge into every new kitchen','Q4 2026 — a public price list after a successful trial','2027, at 30+ customers','2027, after multi-location (Phase 6)','end of 2026 / early 2027, depends on volume','2028+ or never — investor vision, not a plan'\n    ],\n  });\n  window.__monetT = T;\n  function setEl(el, en){\n    if(!el) return;\n    if(!el.dataset.skHtml) el.dataset.skHtml = el.innerHTML;\n    el.innerHTML = (window.__monetLang === 'sk') ? el.dataset.skHtml : (en || el.dataset.skHtml);\n  }\n  window.applyMonetContent = function(lang){\n    window.__monetLang = lang;\n    const q = sel => Array.from(document.querySelectorAll(sel));\n    setEl(document.querySelector('.dek'), T.dek);\n    q('.m-title').forEach((el,i)=>setEl(el, T.mTitle[i]));\n    q('.m-sub').forEach((el,i)=>setEl(el, T.mSub[i]));\n    q('.m-col h4').forEach(el=>{\n      if(!el.dataset.skHtml) el.dataset.skHtml = el.innerHTML;\n      el.innerHTML = lang==='sk' ? el.dataset.skHtml : (T.h4[el.dataset.skHtml.trim()] || el.dataset.skHtml);\n    });\n    q('.fit-badge').forEach(el=>{\n      if(!el.dataset.skHtml) el.dataset.skHtml = el.innerHTML;\n      const key = el.dataset.skHtml.trim();\n      el.innerHTML = lang==='sk' ? el.dataset.skHtml : (T.badges[key] || el.dataset.skHtml);\n    });\n    const rt = document.querySelector('.rc-title'); if(rt) setEl(rt, T.rcTitle);\n    if(T.pro) q('.m-col
