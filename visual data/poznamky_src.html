  *{ box-sizing:border-box; min-width:0; }
  html,body{ overflow-x:hidden; }

  .wrap{ max-width:920px; margin:0 auto; }
  .kicker{ color:var(--accent); font-size:12px; letter-spacing:0.16em; text-transform:uppercase; font-weight:700; margin-bottom:8px; }

  .lede{ font-size:13.5px; color:var(--ink-dim); margin:0 0 20px 0; max-width:70ch; }
  .lang-toggle{ position:fixed; top:12px; right:12px; z-index:50; background:var(--paper); border:1px solid var(--rule); color:var(--ink); font-size:12px; font-weight:700; padding:6px 12px; border-radius:999px; cursor:pointer; }
  .section-label{ display:flex; align-items:center; gap:10px; margin:26px 0 12px 0; }
  .section-label .n{ font-family:var(--mono); font-size:11px; color:var(--accent); }
  .section-label h2{ font-size:15px; margin:0; }
  .section-label .rule{ flex:1; height:1px; background:var(--rule); }
  .note{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:14px 16px; margin:10px 0; display:flex; gap:12px; align-items:flex-start; cursor:pointer; transition:border-color .15s, transform .1s; }
  .note:hover{ border-color:rgba(52,247,215,.5); }
  .note:active{ transform:scale(.99); }
  .note .ico{ flex:none; font-size:18px; }
  .note .t{ font-size:14px; font-weight:700; }
  .note .m{ font-size:12px; color:var(--ink-dim); margin-top:2px; }
  .note .tap-hint{ font-family:var(--mono); font-size:10px; color:var(--ink-faint); flex:none; align-self:center; }
  .badge{ font-family:var(--mono); font-size:10px; font-weight:700; border-radius:999px; padding:2px 9px; flex:none; align-self:center; }
  .badge.do{ background:var(--gold); color:#0A1A2F; }
  .badge.idea{ border:1px solid var(--rule); color:var(--ink-dim); }
  .badge.you{ background:var(--danger); color:#0A1A2F; }
  .badge.done{ background:var(--ok); color:#0A1A2F; }
  .badge.lesson{ background:var(--danger); color:#0A1A2F; }
  .chefos-stamp{ position:fixed; bottom:12px; left:12px; z-index:50; background:var(--paper); border:1px solid var(--rule); color:var(--ink-dim); font-size:10.5px; padding:5px 10px; border-radius:999px; }

  .modal-backdrop.open{ display:flex; }
  .modal{ background:var(--paper); border:1px solid var(--rule); border-bottom:none; border-radius:20px 20px 0 0; width:100%; max-width:560px; max-height:82vh; overflow-y:auto; padding:14px 20px calc(24px + env(safe-area-inset-bottom,0px)) 20px; }

  .modal h3{ font-size:19px; margin:0 0 4px 0; }
  .modal .sub{ font-size:12px; color:var(--accent); font-family:var(--mono); margin-bottom:10px; }
  .modal .body{ font-size:13.5px; color:var(--ink-dim); line-height:1.65; }

  .modal .close{ width:100%; margin-top:14px; min-height:46px; border-radius:12px; border:1px solid var(--rule); background:none; color:var(--ink); font-size:14px; font-weight:700; cursor:pointer; }
  @media print{ .chefos-stamp, .lang-toggle{ display:none; } }
</style>

let _lang = localStorage.getItem('chefos_doc_lang') || 'sk';
function applyLangAttrs(){
  document.querySelectorAll('[data-sk]').forEach(el => { el.innerHTML = el.dataset[_lang] || el.dataset.sk; });
  document.getElementById('langBtn').textContent = _lang === 'sk' ? 'EN' : 'SK';
}
function toggleLang(){
  _lang = _lang === 'sk' ? 'en' : 'sk';
  localStorage.setItem('chefos_doc_lang', _lang);
  applyLangAttrs();
  renderNotes();
  closeNote();
}
function L(x){ return x[_lang] || x.sk; }

function renderNotes(){
  const secs = { do:'secDo', idea:'secIdea', you:'secYou', lesson:'secLesson' };
  Object.entries(secs).forEach(([k, id])=>{
    document.getElementById(id).innerHTML = NOTES.filter(n=>n.sec===k).map((n)=>`
      <div class="note" onclick="openNote(${NOTES.indexOf(n)})">
        <span class="ico">${n.icon}</span>
        <span style="flex:1;"><span class="t">${L(n.t)}</span><div class="m">${L(n.m)}</div></span>
        <span class="badge ${n.badgeCls}">${L(n.badge)}</span>
        <span class="tap-hint">${_lang==='sk' ? 'ťukni ›' : 'tap ›'}</span>
      </div>`).join('');
  });
}
function openNote(i){
  const n = NOTES[i];
  document.getElementById('nm_t').textContent = n.icon + ' ' + L(n.t);
  document.getElementById('nm_s').textContent = L(n.s);
  document.getElementById('nm_b').innerHTML = L(n.b);
  document.getElementById('noteModal').classList.add('open');
}
function closeNote(){ document.getElementById('noteModal').classList.remove('open'); }
applyLangAttrs();
renderNotes();
</script>
</body>
</html>
