nual + AI order scan, Today|Tomorrow, the 🎭 demo toggle (the new standard for demos); the 6-point batch: admin time locks (db/150), custom button labels (db/151), time sync, HACCP for everyone + who ticked + demo (db/149), collapsible dishes, Add Company = instant admin (db/148)',\n    '🆕 New rule: Claude runs SQL in Supabase itself (via the logged-in Chrome, staging-first, every migration verified afterwards); finding: staging is an empty dead copy → resync into the plan',\n    '🗄️ Consolidation: CLAUDE.md + SUPABASE_CONSOLIDATION_PLAN.md (49→~24), Phase 1 (db/157) + step 2.1 (db/158, icons→JSONB, 20+3 exact) done; AI Details + Invoice Scan restored for admins on the Sautero shelf',\n    '🔍 Night sweep: the 398-item 🔍 Complete Check document built for real (16 modules, tap-for-detail, a separate Personal/Company/👥 Interaction toggle since the two app modes have a different feature count)',\n    '🔐 5+1 more privacy leaks found and fixed with the same pattern as Order List: Events (db/161), ingredient lists and recipe lists (db/162 — resolved Richard\\'s earlier reported bug \"a new category in personal mode is visible to everyone\"), dishes/tasks INSIDE a personal Check List project plus a personal ingredient\\'s price history (db/163, the worst one — until now anyone in the kitchen could not just see but edit or delete them); all 38 kitchen_id tables checked, no further leak found; every fix verified with tenant_isolation_test.sql live on production',\n    '☕ Working Time: a real running break stopwatch (5/10/15/30 min) logged precisely into the day detail; 🎭 demo mode unified across 3 test accounts (not one global switch — every tile keeps its own)',\n    '👤 Admin in demo Schedule can tap a team member and see their last 30 days (orders, printed labels, recipes added, time stopped in Check List)',\n    '🩺 A forgotten HACCP admin-gate bug fixed — it blocked regular members even though HACCP has been open to everyone since Jul 18'\n  ]},\n  '2026-07-20': { h_en:'RESILIENCE & SIGN-IN DAY: the app runs on old phones and without a CDN, the login gates fixed, the first E2E smoke test \"like real SaaS companies\"', a_en:[\n    '🌐 No more third-party CDN dependency: Supabase + jsQR vendored locally — a CDN outage can no longer cause a total lockout (found on Huawei); sign-in never hangs on \"Signing in…\" (20s timeout); Supabase pinned to v2.86.0 for Chrome 83 (old phones)',\n    '📲 The Android/Huawei keyboard no longer covers form fields — a visualViewport lift + resizes-content (5 attempts, diagnosed from a photo of the sautero_android device)',\n    '🚪 Login gates: \"Already have an account? Sign in\" on the coming-soon wall defaulting to a password (not a code) + fixed password-recovery links (the app had zero handling before)',\n    '🧪 The first E2E smoke test across 4 roles (solo/member/kitchen admin/head admin) — the tile opens, no JS error/5xx; + an Error Logs admin viewer',\n    '🎭 HACCP demo mode extended to every tile; tutorials lingering on the wrong screen fixed; invite tokens guarded by a UUID-shape check',\n    '🏢 Started the offer-accept company-admin onboarding (db/164 super-admin update, db/165 renaming your own kitchen) — finished 21 Jul'\n  ], p_en:'Finish the company-admin onboarding end-to-end + the branded email; a general audit with regression testing.' },\n  '2026-07-21': { h_en:'COMPANY-ADMIN FINISHED + THE WHOLE SAAS TESTING LAYER: onboarding end-to-end with the branded email, the rebrand fallout found and locked, robots guarding the app and the docs 2×/day', a_en:[\n    '🏢 The offer-accept onboarding finished end-to-end: an offer by email + notification, they accept and name their company themselves; the branded email made to work (the RESEND_API_KEY secret was missing — added, \"we\\'re live!!!\"); the Company Report for every company admin (db/168); the silent admin-save failure fixed (db/164 + a .select() check)',\n    '🛡️ Rebrand fallout: the sweep had silently renamed 4 LIVE DB identifiers (recipes wouldn\\'t save — shared_with_chefos; shelves — shelf \\'chefos\\'; AI sharing — recipe_chefos in the app and the edge function; a real Proton account in an allowlist) — all reverted and LOCKED by the check_db_contract guard',\n    '🤖 The SaaS testing layer: money-path unit tests (yield-adjusted recipe cost, payroll + shift hours) block the deploy on every commit; a credential-free login-gates test 2×/day; the tenant test expanded 21→36 tables and run for real (the first run caught a false \"leak\" = the intentional Public shelf → test calibrated); a pyflakes lint gate',\n    '📄 A fleet of 11 docs robots (one per document, 2×/day): nothing flies, the EN/SK toggle in the top bar, no missing data; the EN/SK toggle deployed into the top bar of all 5 shells (it switches the inner content too)',\n    '🩺 The Health Report — 4 automated audits (architecture 75 / security 94 / documentation 100 / debt 92 = 90/100 A), generated on every deploy, in Internal Docs',\n    '⏱️ Worked hours now write themselves from git into every document on every commit (backfilled the missing 20 Jul = 17.3h and 21 Jul) + a freshness guard for the day-log docs; the diary completed with the missing 20 Jul and this session',\n    '🎨 The investor deck + Manifesto + Visual Guide rebuilt to investor grade (6 streams, precise data, nothing \"flying\"); automation.html backfilled with the whole CI layer'\n  ], p_en:'Behavioural money-path E2E (the QA accounts and the DB secret are ready); native dialogs into the Sautero identity; the personal split of lists.' },\n};\nfunction dayHeadline(day){\n  const alt = DAYS_I18N[day.date] || {};\n  return _lang==='sk' ? (alt.h_sk || day.headline) : (alt.h_en || day.headline);\n}\nfunction dayBullets(day){\n  const alt = DAYS_I18N[day.date] || {};\n  return _lang==='sk' ? (alt.a_sk || day.accomplished) : (alt.a_en || day.accomplished);\n}\nfunction isoWeekLabel(dateStr){\n  const d=new Date(dateStr+'T00:00:00');\n  const day=(d.getDay()+6)%7;\n  const monday=new Date(d); monday.setDate(d.getDate()-day);\n  const sunday=new Date(monday); sunday.setDate(monday.getDate()+6);\n  const locale = _lang==='sk' ? 'sk-SK' : 'en-GB';\n  const fmt=x=>x.toLocaleDateString(locale,{day:'numeric',month:'short'});\n  return { key:monday.toISOString().slice(0,10), label:(_lang==='sk'?'Týždeň od ':'Week of ')+fmt(monday)+' – '+fmt(sunday)+', '+sunday.getFullYear() };\n}\nfunction monthLabel(dateStr){\n  const d=new Date(dateStr+'T00:00:00');\n  const locale = _lang==='sk' ? 'sk-SK' : 'en-GB';\n  return { key:dateStr.slice(0,7), label:d.toLocaleDateString(locale,{month:'long',year:'numeric'}) };\n}\nfunction weekdayShort(dateStr){\n  const locale = _lang==='sk' ? 'sk-SK' : 'en-GB';\n  return new Date(dateStr+'T00:00:00').toLocaleDateString(locale,{weekday:'short'});\n}\nfunction renderTimeline(){\n  const wasOpen = new Set([...document.querySelectorAll('.open')].map(el=>el.dataset.id));\n  const daysDesc=DAYS.slice().sort((a,b)=>b.date.localeCompare(a.date));\n  const months=[];\n  daysDesc.forEach(day=>{\n    const m=monthLabel(day.date);\n    let me=months.find(x=>x.key===m.key);\n    if(!me){ me={key:m.key,label:m.label,weeks:[]}; months.push(me); }\n    const w=isoWeekLabel(day.date);\n    let we=me.weeks.find(x=>x.key===w.key);\n    if(!we){ we={key:w.key,label:w.label,days:[]}; me.weeks.push(we); }\n    we.days.push(day);\n  });\n  document.getElementById('timelineRoot').innerHTML=months.map((m,mi)=>{\n    const totalDays=m.weeks.reduce((n,w)=>n+w.days.length,0);\n    const dayWord = totalDays===1 ? L('deň','day') : L('dní','days');\n    const weeksHtml=m.weeks.map(w=>{\n      const wDayWord = w.days.length===1 ? L('deň','day') : L('dní','days');\n      const daysHtml=w.days.map((day,di)=>{\n        const accList=dayBullets(day);\n  const acc=accList.map(a=>`\u003cli>${a}\u003c/li>`).join('');\n        return `\u003cdiv class=\"day-row\" data-id=\"d-${m.key}-${w.key}-${di}\">\n          \u003cdiv class=\"day-head\" onclick=\"toggleBlock('d-${m.key}-${w.key}-${di}')\">\n            \u003cspan class=\"day-date\">${weekdayShort(day.date)} ${day.date}\u003c/span>\n            \u003cspan class=\"day-title\">${dayHeadline(day)}\u003c/span>\n            \u003cspan class=\"chev\">▶\u003c/span>\n          \u003c/div>\n          \u003cdiv class=\"day-body\">\u003cul class=\"accomplished-list\">${acc}\u003c/ul>\u003c/div>\n        \u003c/div>`;\n      }).join('');\n      return `\u003cdiv class=\"week-block\" data-id=\"w-${m.key}-${w.key}\">\n        \u003cdiv class=\"week-head\" onclick=\"toggleBlock('w-${m.key}-${w.key}')\">\n          \u003cspan class=\"week-name\">${w.label}\u003c/span>\n          \u003cspan class=\"week-meta\">${w.days.length} ${wDayWord} \u003cspan class=\"chev\">▶\u003c/span>\u003c/span>\n        \u003c/div>\n        \u003cdiv class=\"week-body\">${daysHtml}\u003c/div>\n      \u003c/div>`;\n    }).join('');\n    return `\u003cdiv class=\"month-block\" data-id=\"m-${m.key}\">\n      \u003cdiv class=\"month-head\" onclick=\"toggleBlock('m-${m.key}')\">\n        \u003cspan class=\"month-name\">${m.label}\u003c/span>\n        \u003cspan class=\"month-meta\">${totalDays} ${dayWord} logged \u003cspan class=\"chev\">▶\u003c/span>\u003c/span>\n      \u003c/div>\n      \u003cdiv class=\"month-body\">${weeksHtml}\u003c/div>\n    \u003c/div>`;\n  }).join('');\n  const anyPrevOpen = wasOpen.size > 0;\n  document.querySelectorAll('[data-id]').forEach(el=>{\n    if(wasOpen.has(el.dataset.id)) el.classList.add('open');\n  });\n  if(!anyPrevOpen && months[0]){\n    document.querySelector(`[data-id=\"m-${months[0].key}\"]`).classList.add('open');\n    const lw=months[0].weeks[0];\n    if(lw) toggleBlock(`w-${months[0].key}-${lw.key}`, true);\n    if(lw && lw.days[0]) toggleBlock(`d-${months[0].key}-${lw.key}-0`, true);\n  }\n}\nfunction toggleBlock(id, forceOpen){\n  const el=document.querySelector(`[data-id=\"${id}\"]`);\n  if(!el) return;\n  if(forceOpen){ el.classList.add('open'); return; }\n  el.classList.toggle('open');\n}\n/* ---------- Charts (Richard, 17.7.) ---------- */\n/* Daily feature-status snapshots — APPEND one row here whenever feature_status.html counts\n   change (part of the doc-sync routine). Live recording since 17.7.; the 16.7. row was\n   recovered EXACTLY from git history (feature_status.html as committed 16.7. 22:16 — Richard:\n   \"veď všade vedieme dokumentáciu\", and indeed git remembered). Before 16.7. the per-feature\n   ok/test/plan catalog didn't exist yet (features.html tracked only 13 module tiles), so\n   earlier days stay as calibrated estimates from the work log. */\nconst FEATURE_COUNT_HISTORY = [\n  { date:'2026-07-16', ok:43, test:39, plan:4 },\n  { date:'2026-07-17', ok:77, test:25, plan:7 },\n  { date:'2026-07-18', ok:77, test:26, plan:8 },\n  { date:'2026-07-19', ok:89, test:29, plan:8 },\n  { date:'2026-07-21', ok:89, test:24, plan:13 },  // measured from the live feature map (plan = plan 8 + build 5)\n  { date:'2026-07-22', ok:93, test:24, plan:13 },  // auto-recorded from the live feature map\n  { date:'2026-07-23', ok:94, test:24, plan:13 },  // auto-recorded from the live feature map\n  { date:'2026-07-24', ok:94, test:24, plan:13 },  // auto-recorded from the live feature map\n];\n/* Hours worked per day (Richard, 17.7.; 22.7. rebuilt) — the REAL time the Claude Code app was\n   open on this project, derived from the session transcripts by scripts/work_hours.py and frozen\n   into scripts/work_hours_data.json. Auto-written on every commit; no estimates, no manual paste. */\nconst WORK_HOURS = { '2026-07-08':6.1, '2026-07-09':4.7, '2026-07-10':5.6, '2026-07-11':0.2, '2026-07-12':16.3, '2026-07-13':2.6, '2026-07-14':11.0, '2026-07-15':12.7, '2026-07-16':17.0, '2026-07-17':7.4, '2026-07-18':13.9, '2026-07-19':5.0, '2026-07-20':17.6, '2026-07-21':11.4, '2026-07-22':11.2, '2026-07-23':5.5 };\nconst WORK_HOURS_MEASURED_FROM = '2026-07-08';\nfunction isEstimatedHours(d){ return d \u003c WORK_HOURS_MEASURED_FROM; }\nfunction renderWorkHours(){\n  const el = document.getElementById('workHoursCard');\n  if(!el) return;\n  let measured = 0, est = 0;\n  Object.entries(WORK_HOURS).forEach(([d,h])=>{ if(isEstimatedHours(d)) est += h; else measured += h; });\n  const total = measured + est;\n  el.innerHTML = `\u003cdiv style=\"display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;\">\n    \u003cspan style=\"font-size:26px; font-weight:800; color:var(--accent); font-family:'SF Mono',Menlo,monospace;\">⏱️ ~${total.toFixed(1).replace('.',',')} h\u003c/span>\n    \u003cspan style=\"font-size:12.5px; color:var(--ink-dim);\">${L(\n      `odpracovaných na Sautero spolu — ${measured.toFixed(1).replace('.',',')} h presne z git histórie (od 13. 7.) + ~${est.toFixed(0)} h odhad za 8.–12. 7. (pred gitom). Meria scripts/work_hours.py, aktualizuje sa denne.`,\n      `worked on Sautero in total — ${measured.toFixed(1)} h measured from git history (since Jul 13) + ~${est.toFixed(0)} h estimated for Jul 8–12 (pre-git). Measured by scripts/work_hours.py, updated daily.`)}\u003c/span>\n  \u003c/div>`;\n}\nfunction shortDay(d){ return d.slice(8,10) + '.' + String(+d.slice(5,7)) + '.'; }\n/* Both charts ALWAYS span project day 1 (2026-07-08) through TODAY in Bern time (Richard,\n   17.7.) — days without a log entry show as zero, never disappear. */\nconst PROJECT_START = '2026-07-08';\nfunction bernToday(){ return new Intl.DateTimeFormat('en-CA', { timeZone:'Europe/Zurich' }).format(new Date()); }\nfunction fullDateRange(){\n  const out = [];\n  const end = bernToday();\n  let d = new Date(PROJECT_START + 'T12:00:00Z');\n  for(let i = 0; i \u003c 366; i++){\n    const iso = d.toISOString().slice(0,10);\n    out.push(iso);\n    if(iso >= end) break;\n    d.setUTCDate(d.getUTCDate() + 1);\n  }\n  return out;\n}\nfunction renderTasksPerDay(){\n  const el = document.getElementById('tasksPerDayChart');\n  if(!el) return;\n  const byDate = {};\n  DAYS.forEach(d=>{ byDate[d.date] = (byDate[d.date] || 0) + d.accomplished.length; });\n  const dates = fullDateRange();\n  const max = Math.max(1, ...dates.map(d=>byDate[d] || 0));\n  const BW = 34, GAP = 14, H = 150, TOP = 18, LBL = 30;\n  const W = dates.length * (BW + GAP) + GAP;\n  const bars = dates.map((d,i)=>{\n    const v = byDate[d] || 0;\n    const h = v ? Math.max(3, Math.round(v / max * H)) : 2;\n    const x = GAP + i * (BW + GAP), y = TOP + H - h;\n    const hrs = WORK_HOURS[d];\n    const hrsLbl = hrs != null ? `${isEstimatedHours(d) ? '~' : ''}${String(hrs).replace('.',',')} h` : '';\n    return `\u003cg class=\"bar\" onclick=\"openDayFromChart('${d}')\">\u003ctitle>${d} — ${v}${hrs != null ? ' · ' + hrsLbl : ''}\u003c/title>\n      \u003crect x=\"${x}\" y=\"${y}\" width=\"${BW}\" height=\"${h}\" rx=\"4\" fill=\"${v ? 'var(--accent)' : 'var(--rule)'}\"/>\n      \u003ctext x=\"${x+BW/2}\" y=\"${y-5}\" text-anchor=\"middle\" font-size=\"11\" fill=\"${v ? 'var(--ink)' : 'var(--ink-faint)'}\">${v}\u003c/text>\n      \u003ctext x=\"${x+BW/2}\" y=\"${TOP+H+16}\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"var(--ink-dim)\">${shortDay(d)}\u003c/text>\n      \u003ctext x=\"${x+BW/2}\" y=\"${TOP+H+28}\" text-anchor=\"middle\" font-size=\"8.5\" fill=\"var(--ink-faint)\">${hrsLbl}\u003c/text>\u003c/g>`;\n  }).join('');\n  el.innerHTML = `\u003csvg width=\"${W}\" height=\"${TOP+H+LBL+12}\" viewBox=\"0 0 ${W} ${TOP+H+LBL+12}\">${bars}\u003c/svg>`;\n}\nfunction renderFeaturesOverTime(){\n  const el = document.getElementById('featuresOverTimeChart');\n  if(!el) return;\n  // Stacked bars over the WHOLE project (8.7. → today, Richard 17.7.). Days with a recorded\n  // snapshot (FEATURE_COUNT_HISTORY, daily since 17.7.) show the exact ok/test/plan stack.\n  // Days BEFORE recording started get the same full-color stack, back-estimated (cumulative\n  // shipped-task share from the day log scaled to the first recorded total, split by the\n  // first recorded day's status ratio) — per Richard 17.7. the only estimate marker is the\n  // note under the chart saying from when the data is real.\n  const SER = [\n    { key:'ok', label: L('Funkčné','Working'), color:'#4ADE80' },\n    { key:'test', label: L('Čaká na test','Awaiting test'), color:'#FB923C' },\n    { key:'plan', label: L('Naplánované','Planned'), color:'#FF7A68' },\n  ];\n  const recorded = {};\n  FEATURE_COUNT_HISTORY.forEach(r=>{ recorded[r.date] = { ...r, total: r.ok + r.test + r.plan }; });\n  const firstRecordedDate = FEATURE_COUNT_HISTORY.map(r=>r.date).sort()[0];\n  const first = recorded[firstRecordedDate];\n  // Cumulative shipped-task counts from the day log, up to the first recorded day.\n  const byDate = {};\n  DAYS.forEach(d=>{ byDate[d.date] = (byDate[d.date] || 0) + d.accomplished.length; });\n  const dates = fullDateRange();\n  let cum = 0, cumAtFirstRecorded = 0;\n  const cumByDate = {};\n  dates.forEach(d=>{ cum += (byDate[d] || 0); cumByDate[d] = cum; if(d \u003c= firstRecordedDate) cumAtFirstRecorded = cum; });\n  // Estimated day = first recorded day's stack scaled by cumulative shipped-task share,\n  // status split kept at the first recorded day's ratio.\n  const estDay = d => {\n    const total = Math.max(1, Math.round(cumByDate[d] / (cumAtFirstRecorded || 1) * first.total));\n    const ok = Math.round(total * first.ok / first.total);\n    const test = Math.round(total * first.test / first.total);\n    return { ok, test, plan: Math.max(0, total - ok - test), total };\n  };\n  // A missing day AFTER recording started is NOT an estimate case — the back-estimate formula\n  // exists only for days before 16.7. Applying it later invented a fake DROP (22.7. showed 117\n  // while the live map said 126, because the formula ignores recorded snapshots entirely).\n  // Such days now carry the LAST recorded stack forward — honest \"no change recorded\".\n  const valueFor = {};\n  let lastRec = null;\n  dates.forEach(d=>{\n    if(recorded[d]) lastRec = recorded[d];\n    valueFor[d] = recorded[d] || (d > firstRecordedDate && lastRec ? lastRec : estDay(d));\n  });\n  const maxTotal = Math.max(...dates.map(d => valueFor[d].total));\n  const BW = 40, GAP = 16, H = 170, TOP = 20, LBL = 30;\n  const W = Math.max(dates.length * (BW + GAP) + GAP, 4 * 128 + GAP);\n  const bars = dates.map((d,i)=>{\n    const x = GAP + i * (BW + GAP);\n    const isEst = !recorded[d];\n    const r = valueFor[d];\n    let yCursor = TOP + H;\n    const segs = SER.map(s=>{\n      const v = r[s.key];\n      const h = maxTotal ? Math.max(v > 0 ? 2 : 0, Math.round(v / maxTotal * H)) : 0;\n      yCursor -= h;\n      const tip = isEst ? `${s.label} (${L('odhad','estimate')}): ${v}` : `${s.label}: ${v}`;\n      return `\u003crect x=\"${x}\" y=\"${yCursor}\" width=\"${BW}\" height=\"${h}\" fill=\"${s.color}\">\u003ctitle>${tip}\u003c/title>\u003c/rect>`;\n    }).join('');\n    return `\u003cg>${segs}\n      \u003ctext x=\"${x+BW/2}\" y=\"${yCursor-6}\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"700\" fill=\"var(--ink)\">${r.total}\u003c/text>\n      \u003ctext x=\"${x+BW/2}\" y=\"${TOP+H+16}\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"var(--ink-dim)\">${shortDay(d)}\u003c/text>\u003c/g>`;\n  }).join('');\n  const legend = SER.map((s,i)=>`\u003cg>\u003crect x=\"${GAP + i*128}\" y=\"${TOP+H+24}\" width=\"9\" height=\"9\" rx=\"2\" fill=\"${s.color}\"/>\u003ctext x=\"${GAP + i*128 + 13}\" y=\"${TOP+H+32}\" font-size=\"9.5\" fill=\"var(--ink-dim)\">${s.label}\u003c/text>\u003c/g>`).join('');\n  el.innerHTML = `\u003csvg width=\"${W}\" height=\"${TOP+H+LBL+16}\" viewBox=\"0 0 ${W} ${TOP+H+LBL+16}\">${bars}${legend}\u003c/svg>`;\n}\nfunction openDayFromChart(date){\n  document.querySelectorAll('.month-block, .week-block').forEach(b=>b.classList.add('open'));\n  const row = [...document.querySelectorAll('.day-row')].find(r=>{\n    const d = r.querySelector('.day-date');\n    return d && d.textContent.includes(date);\n  });\n  if(!row) return;\n  row.classList.add('open');\n  row.scrollIntoView({ behavior:'smooth', block:'center' });\n  row.classList.add('flash');\n  setTimeout(()=>row.classList.remove('flash'), 2200);\n}\n\n/* Hero hide/show (Richard, 17.7.): rolls up the donut + stats + filters so the phone screen\n   goes straight to content; remembered per device. */\nfunction toggleHero(force){\n  const hidden = typeof force === 'boolean' ? force : document.getElementById('heroDetails').style.display !== 'none';\n  document.getElementById('heroDetails').style.display = hidden ? 'none' : '';\n  document.getElementById('heroToggle').textContent = hidden\n    ? (_lang==='sk' ? '▸ Zobraziť prehľad' : '▸ Show overview')\n    : (_lang==='sk' ? '▾ Skryť prehľad' : '▾ Hide overview');\n  localStorage.setItem('sautero_tasklist_hero_hidden', hidden ? '1' : '0');\n}\n\napplyLang();\nrenderTimeline();\nrenderWorkHours();\nrenderTasksPerDay();\nrenderFeaturesOverTime();\ntoggleHero(localStorage.getItem('sautero_tasklist_hero_hidden') === '1');\n\u003c/script>\n\n\u003cdiv class=\"sautero-stamp\" data-sk=\"🔄 Stav Sautero k 24. 7. 2026, 00:02\" data-en=\"🔄 Sautero state as of Jul 24, 2026, 00:02\">🔄 Stav Sautero k 24. 7. 2026, 00:02\u003c/div>\n\u003c/body>\n\u003c/html>\n"];
const frames = [];
/* Anchor links inside an embedded doc MUST be intercepted (Richard's 19.7. phone video — every
   tap on the inner jump-nav stacked another copy of this shell's banner): a srcdoc iframe
   inherits its base URL from THIS page, so a plain href="#timeline" resolves to plan.html#…
   and NAVIGATES the iframe to the whole shell — recursively nesting banner inside banner.
   Same-origin srcdoc means we can reach in: hash links become in-iframe smooth scrolls, real
   links (automation.html, …) escape to the top window instead of loading inside the tab. */
function patchInnerLinks(f){
  try{
    const doc = f.contentDocument;
    doc.addEventListener('click', (e)=>{
      const a = e.target.closest ? e.target.closest('a[href]') : null;
      if(!a) return;
      const href = a.getAttribute('href');
      if(href.startsWith('#')){
        e.preventDefault();
        const el = href.length > 1 ? doc.getElementById(href.slice(1)) : null;
        // Instant, not behavior:'smooth' — smooth scrolling inside a srcdoc iframe silently
        // no-ops in some engines (verified live 19.7.); a guaranteed jump beats a pretty maybe.
        if(el) el.scrollIntoView();
      } else if(!a.target){
        a.target = '_top';
      }
    }, true);
  } catch(err){}
}
let currentTab = 0;
function openTab(n){
  currentTab = n;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active', i===n));
  frames.forEach(f=>f && f.classList.remove('show'));
  if(!frames[n]){
    const f = document.createElement('iframe');
    f.addEventListener('load', ()=>patchInnerLinks(f));
    f.srcdoc = DOCS[n];
    document.getElementById('frames').appendChild(f);
    frames[n] = f;
  }
  frames[n].classList.add('show');
}
openTab(0);
/* Shell language: the ONE EN/SK toggle lives in this top bar (Richard, 21.7. — "prepínač vždy
   vo vrchnej lište pre všetky dokumenty"). It flips the shared sautero_doc_lang key, re-applies
   the shell chrome, and RELOADS the loaded inner iframes so each embedded doc re-renders in the
   new language (they read the key on load, whatever their own mechanism). The inner docs' own
   toggles still work and write the same key, so the two never disagree. */
function applyShellLang(){
  const lang = localStorage.getItem('sautero_doc_lang') || 'sk';
  document.querySelectorAll('[data-sk]').forEach(el=>{
    el.textContent = lang === 'sk' ? el.getAttribute('data-sk') : (el.getAttribute('data-en') || el.getAttribute('data-sk'));
  });
  const en = document.getElementById('lcEn'), sk = document.getElementById('lcSk');
  if(en && sk){ en.className = lang==='en'?'on':'off'; sk.className = lang==='sk'?'on':'off'; }
  document.documentElement.lang = lang;
}
function toggleShellLang(){
  const cur = localStorage.getItem('sautero_doc_lang') === 'en' ? 'en' : 'sk';
  localStorage.setItem('sautero_doc_lang', cur === 'en' ? 'sk' : 'en');
  applyShellLang();
  frames.forEach(f=>{ if(f){ const s = f.srcdoc; f.srcdoc = s; } });  // reload inner docs into the new language
}
window.addEventListener('storage', e=>{ if(!e || !e.key || e.key === 'sautero_doc_lang') applyShellLang(); });
setInterval(applyShellLang, 1500);
applyShellLang();
</script>
