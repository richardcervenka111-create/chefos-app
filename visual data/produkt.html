const DOCS = ["\u003c!DOCTYPE html>\n\u003chtml lang=\"sk\">\n\u003chead>\n\u003cmeta charset=\"UTF-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n\u003ctitle>ChefOS — Mapa funkcií\u003c/title>\n\u003cstyle>\n  :root{\n    --bg:#0A1A2F; --bg-2:#0d2036; --paper:#122845; --paper-raised:#0f2340; --paper-hi:#16304f;\n    --ink:#fff; --ink-dim:#9C949E; --ink-faint:rgba(156,148,158,0.6);\n    --rule:#223d57; --rule-soft:#1a3149;\n    --accent:#34F7D7; --accent-dim:rgba(52,247,215,0.4); --accent-wash:rgba(52,247,215,0.08);\n    --gold:#F7C948; --gold-dim:rgba(247,201,72,0.4); --gold-wash:rgba(247,201,72,0.08);\n    --danger:#FF7A68; --danger-dim:rgba(255,122,104,0.4); --danger-wash:rgba(255,122,104,0.08);\n    /* Status colors, specific to this doc: functional / needs testing / planned only. */\n    --ok:#4ADE80; --ok-dim:rgba(74,222,128,0.4); --ok-wash:rgba(74,222,128,0.09);\n    --test:#FB923C; --test-dim:rgba(251,146,60,0.5); --test-wash:rgba(251,146,60,0.14);\n    --plan:#FF7A68; --plan-dim:rgba(255,122,104,0.4); --plan-wash:rgba(255,122,104,0.08);\n    --shadow:0 8px 28px rgba(0,0,0,0.45);\n    --mono:\"SF Mono\",Menlo,Consolas,monospace;\n  }\n  *{ box-sizing:border-box; }\n  html,body{ margin:0; padding:0; }\n  body{\n    background:var(--bg); color:var(--ink);\n    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;\n    -webkit-font-smoothing:antialiased; line-height:1.5;\n  }\n  .wrap{ max-width:1180px; margin:0 auto; padding:0 24px 100px 24px; }\n  ::selection{ background:var(--accent); color:#0A1A2F; }\n\n  header.hero{ position:relative; padding:36px 0 30px 0; border-bottom:1px solid var(--rule); overflow:hidden; }\n  header.hero::before{\n    content:''; position:absolute; top:-160px; left:50%; transform:translateX(-50%);\n    width:900px; height:460px; pointer-events:none;\n    background:radial-gradient(ellipse at center, var(--accent-wash), transparent 70%);\n  }\n  .hero-inner{ position:relative; max-width:1180px; margin:0 auto; padding:0 24px; }\n  .topline{ display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:22px; flex-wrap:wrap; }\n  .brandmark{ display:flex; align-items:center; gap:9px; }\n  .brandmark .mark{ font-size:20px; }\n  .brandmark .word{ font-size:15px; font-weight:700; letter-spacing:0.02em; color:var(--accent); font-style:italic; font-family:Georgia,'Times New Roman',serif; }\n\n  .acct-toggle{\n    display:flex; align-items:center; gap:6px; background:var(--paper); border:1px solid var(--rule);\n    border-radius:20px; padding:4px; flex:none;\n  }\n  .acct-toggle button{\n    border:none; background:none; color:var(--ink-dim); font-size:12px; font-weight:700;\n    padding:7px 14px; border-radius:16px; cursor:pointer; transition:background .15s, color .15s;\n    font-family:inherit;\n  }\n  .acct-toggle button.active{ background:var(--accent); color:#0A1A2F; }\n\n  .kicker{ color:var(--accent); font-size:12px; letter-spacing:0.18em; text-transform:uppercase; font-weight:700; margin-bottom:10px; }\n  h1.title{ font-size:36px; font-weight:800; margin:0 0 12px 0; line-height:1.14; letter-spacing:-0.01em; }\n  h1.title em{ font-style:italic; color:var(--accent); font-weight:800; }\n  .lede{ color:var(--ink-dim); font-size:14.5px; max-width:70ch; line-height:1.65; }\n\n  .legend{ display:flex; gap:10px; flex-wrap:wrap; margin-top:22px; }\n  .legend-item{ display:flex; align-items:center; gap:8px; background:var(--paper); border:1px solid var(--rule); border-radius:10px; padding:8px 13px; font-size:12.5px; color:var(--ink-dim); cursor:pointer; user-select:none; transition:opacity .15s, border-color .15s; }\n  .legend-item.active{ border-color:var(--accent-dim); }\n  .legend-item:not(.active){ opacity:.38; border-style:dashed; }\n  .legend-dot{ width:10px; height:10px; border-radius:50%; flex:none; }\n  .legend-item b{ color:var(--ink); font-weight:700; }\n\n  .pulse-strip{ display:grid; grid-template-columns:repeat(4,1fr); gap:1px; margin-top:24px; background:var(--rule); border:1px solid var(--rule); border-radius:16px; overflow:hidden; }\n  @media (max-width:680px){ .pulse-strip{ grid-template-columns:repeat(2,1fr); } }\n  .pulse-cell{ background:var(--paper); padding:16px 18px 14px 18px; }\n  .pulse-cell .num{ font-family:var(--mono); font-size:26px; font-weight:700; line-height:1; font-variant-numeric:tabular-nums; }\n  .pulse-cell .lbl{ font-size:11px; text-transform:uppercase; letter-spacing:0.07em; color:var(--ink-dim); margin-top:7px; display:flex; align-items:center; gap:6px; }\n  .pulse-cell .lbl::before{ content:''; width:7px; height:7px; border-radius:50%; flex:none; }\n  .pulse-cell.ok .lbl::before{ background:var(--ok); } .pulse-cell.ok .num{ color:var(--ok); }\n  .pulse-cell.test .lbl::before{ background:var(--test); } .pulse-cell.test .num{ color:var(--test); }\n  .pulse-cell.plan .lbl::before{ background:var(--plan); } .pulse-cell.plan .num{ color:var(--plan); }\n  .pulse-cell.total .lbl::before{ background:var(--ink-dim); }\n\n  .module{ margin-top:44px; }\n  .module-head{ display:flex; align-items:baseline; gap:12px; margin-bottom:16px; }\n  .module-icon{\n    width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center;\n    font-size:18px; background:var(--paper-raised); border:1px solid var(--rule); flex:none;\n  }\n  .module-title{ font-size:19px; font-weight:800; }\n  .module-count{ font-size:12px; color:var(--ink-faint); font-family:var(--mono); }\n\n  .feature-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:10px; }\n  .feature-card{\n    background:var(--paper); border:1px solid var(--rule); border-radius:12px; padding:13px 15px;\n    border-left:3px solid var(--ok); cursor:pointer; transition:border-color .15s, transform .1s;\n  }\n  .feature-card:hover{ border-color:var(--accent-dim); }\n  .feature-card:active{ transform:scale(.985); }\n  .feature-card.status-test{ border-left-color:var(--test); background:var(--test-wash); }\n  .feature-card.status-plan{ border-left-color:var(--plan); }\n  .feature-card .fname{ font-size:13.5px; font-weight:700; display:flex; align-items:center; gap:7px; }\n  .status-dot{ width:8px; height:8px; border-radius:50%; flex:none; }\n  .status-dot.ok{ background:var(--ok); }\n  .status-dot.test{ background:var(--test); }\n  .status-dot.plan{ background:var(--plan); }\n  .acct-tag{ display:inline-block; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; padding:2px 7px; border-radius:8px; margin-top:7px; }\n  .acct-tag.personal{ background:var(--accent-wash); color:var(--accent); }\n  .acct-tag.company{ background:var(--gold-wash); color:var(--gold); }\n  .feature-card.dim{ opacity:.35; }\n\n  /* Detail modal (Richard, 17.7.) — tap any feature card for a plain-language explanation. */\n  .modal-backdrop{ position:fixed; inset:0; background:rgba(4,10,20,0.72); display:none; align-items:center; justify-content:center; padding:22px; z-index:100; }\n  .modal-backdrop.open{ display:flex; }\n  .modal{ background:var(--paper); border:1px solid var(--rule); border-radius:18px; max-width:460px; width:100%; padding:22px 24px 18px 24px; box-shadow:var(--shadow); }\n  .modal .m-module{ font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.12em; color:var(--ink-faint); }\n  .modal .m-name{ font-size:18px; font-weight:800; margin:6px 0 10px 0; line-height:1.3; }\n  .modal .m-status{ display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:700; padding:4px 11px; border-radius:9px; border:1px solid; }\n  .modal .m-status.ok{ color:var(--ok); border-color:var(--ok-dim); background:var(--ok-wash); }\n  .modal .m-status.test{ color:var(--test); border-color:var(--test-dim); background:var(--test-wash); }\n  .modal .m-status.plan{ color:var(--plan); border-color:var(--plan-dim); background:var(--plan-wash); }\n  .modal .m-desc{ font-size:13.5px; color:var(--ink-dim); line-height:1.65; margin:14px 0 4px 0; }\n  .modal .m-tags{ display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }\n  .modal .m-close{ display:block; width:100%; margin-top:16px; background:none; border:1px solid var(--rule); border-radius:10px; color:var(--ink-dim); font:inherit; font-size:13px; padding:9px 0; cursor:pointer; }\n  .modal .m-close:hover{ border-color:var(--accent-dim); color:var(--ink); }\n\n  .chefos-stamp{ text-align:center; font-size:12px; color:var(--ink-faint); margin-top:50px; padding-top:20px; border-top:1px solid var(--rule); }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\u003cheader class=\"hero\">\n  \u003cdiv class=\"hero-inner\">\n    \u003cdiv class=\"topline\">\n      \u003cdiv class=\"brandmark\">\u003cspan class=\"mark\">👨‍🍳\u003c/span>\u003cspan class=\"word\">ChefOS\u003c/span>\u003c/div>\n      \u003cdiv class=\"acct-toggle\" id=\"acctToggle\">\n        \u003cbutton id=\"acctPersonalBtn\" onclick=\"setAcctView('personal')\">👤 Personal\u003c/button>\n        \u003cbutton id=\"acctCompanyBtn\" onclick=\"setAcctView('company')\">🏢 Company\u003c/button>\n      \u003c/div>\n    \u003c/div>\n    \u003cp class=\"kicker\">Mapa funkcií\u003c/p>\n    \u003ch1 class=\"title\">Čo \u003cem>ChefOS\u003c/em> vie dnes\u003c/h1>\n    \u003cp class=\"lede\">Kompletný zoznam funkcií appky, s reálnym stavom každej jednej. \u003cb style=\"color:var(--ink);\">Klikni na hociktorú funkciu\u003c/b> a otvorí sa okno s vysvetlením, čo presne robí. Toggle hore prepína pohľad presne ako v appke — veci iba pre Personal alebo iba pre Company účty sa podľa toho stlmia.\u003c/p>\n    \u003cdiv class=\"legend\">\n      \u003cdiv class=\"legend-item active\" id=\"legendOk\" onclick=\"toggleStatusFilter('ok')\">\u003cspan class=\"legend-dot\" style=\"background:var(--ok);\">\u003c/span>Funkčné, otestované naživo — \u003cb id=\"legendOkCount\">\u003c/b>\u003c/div>\n      \u003cdiv class=\"legend-item active\" id=\"legendTest\" onclick=\"toggleStatusFilter('test')\">\u003cspan class=\"legend-dot\" style=\"background:var(--test);\">\u003c/span>Postavené, čaká na test naživo — \u003cb id=\"legendTestCount\">\u003c/b>\u003c/div>\n      \u003cdiv class=\"legend-item active\" id=\"legendPlan\" onclick=\"toggleStatusFilter('plan')\">\u003cspan class=\"legend-dot\" style=\"background:var(--plan);\">\u003c/span>Naplánované, ešte nepostavené — \u003cb id=\"legendPlanCount\">\u003c/b>\u003c/div>\n      \u003cdiv class=\"legend-item\" id=\"legendAdmin\" onclick=\"toggleAdminOnlyFilter()\">\u003cspan class=\"legend-dot\" style=\"background:var(--gold);\">\u003c/span>🛡️ Iba Kitchen Admin — \u003cb id=\"legendAdminCount\">\u003c/b>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"pulse-strip\">\n      \u003cdiv class=\"pulse-cell ok\">\u003cdiv class=\"num\" id=\"pulseOk\">\u003c/div>\u003cdiv class=\"lbl\">Funkčné\u003c/div>\u003c/div>\n      \u003cdiv class=\"pulse-cell test\">\u003cdiv class=\"num\" id=\"pulseTest\">\u003c/div>\u003cdiv class=\"lbl\">Čaká na test\u003c/div>\u003c/div>\n      \u003cdiv class=\"pulse-cell plan\">\u003cdiv class=\"num\" id=\"pulsePlan\">\u003c/div>\u003cdiv class=\"lbl\">Naplánované\u003c/div>\u003c/div>\n      \u003cdiv class=\"pulse-cell total\">\u003cdiv class=\"num\" id=\"pulseTotal\">\u003c/div>\u003cdiv class=\"lbl\">Spolu funkcií\u003c/div>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/header>\n\n\u003cdiv class=\"wrap\" id=\"modulesWrap\">\u003c/div>\n\n\u003cdiv class=\"wrap\">\n  \u003cdiv class=\"chefos-stamp\" id=\"stamp\">🔄 Stav ChefOS k 17. 7. 2026, 12:40\u003c/div>\n\u003c/div>\n\n\u003c!-- Feature detail modal -->\n\u003cdiv class=\"modal-backdrop\" id=\"modalBackdrop\" onclick=\"if(event.target===this) closeFeatureModal()\">\n  \u003cdiv class=\"modal\">\n    \u003cdiv class=\"m-module\" id=\"mModule\">\u003c/div>\n    \u003cdiv class=\"m-name\" id=\"mName\">\u003c/div>\n    \u003cspan class=\"m-status\" id=\"mStatus\">\u003c/span>\n    \u003cp class=\"m-desc\" id=\"mDesc\">\u003c/p>\n    \u003cdiv class=\"m-tags\" id=\"mTags\">\u003c/div>\n    \u003cbutton class=\"m-close\" onclick=\"closeFeatureModal()\">Zavrieť\u003c/button>\n  \u003c/div>\n\u003c/div>\n\n\u003cscript>\n/* Data — status: 'ok' (funkčné, naživo overené) | 'test' (postavené, čaká na živý test)\n   | 'plan' (iba naplánované). acct: 'personal' | 'company' | null (obom). role:'admin' =\n   funkcia viditeľná len pre kitchen adminov. desc = ľudské vysvetlenie pre klik-okno. */\nconst MODULES = [\n  { icon:'📖', title:'Recepty', items:[\n    { name:'173 receptov, knižnica ChefOS', status:'ok', desc:'Kompletná profesionálna knižnica receptov v plnom 20-poľovom formáte (suroviny, postup, yield, časy, stanica, food cost…). Každá kuchyňa dostane vlastnú kópiu automaticky pri vzniku.' },\n    { name:'Police: My Recipes / ChefOS / Company', status:'ok', desc:'Recepty sú rozdelené na police podľa autora — tvoje vlastné, spoločná ChefOS knižnica a firemné od kolegov. Polica sa vyberá veľkými dlaždicami pri otvorení Receptov. Opravy 16.–17.7.: polica sa sama neprepína, firemný recept od teba sa ukazuje v Company, a firemný recept sa už NIKDY neukáže na osobnej polici My Recipes ani po prepnutí režimu (db/130). Odškrtnuté 17.7.' },\n    { name:'Vlastné projekty (Add Project)', status:'ok', desc:'Vedľa pevných políc si vieš vytvoriť vlastné pomenované zbierky receptov — napr. \"Svadobné menu 2026\" — s výberom z 8 farebných kníh ako ikonou. Dlhé podržanie dlaždice = premenovať / skryť / vymazať. Naživo overené 17.7. („funkčné, som spokojný\").' },\n    { name:'Sekcie per polica (každá vlastné)', status:'ok', desc:'Každá polica aj projekt má vlastný, nezávislý zoznam sekcií (Polievky, Dezerty…) — nová polica začína čistá, len Favorites + All, a sekcie si buduje sama cez \"+ New Section\". Naživo overené 17.7. („presne ako má byť\").' },\n    { name:'Verejná polica Public + publikovanie 🌍', status:'ok', desc:'Nová dlaždica Public hneď vedľa ChefOS — vidí ju každý účet v každej kuchyni. Vlastný recept zverejníš glóbusom 🌍 v detaile (s kontrolnou otázkou; rovnakým tlačidlom sa dá aj stiahnuť späť). Recept ostáva jeden — tvoj — a všetci ho čítajú, favoritujú a komentujú priamo (db/131). Cudzie verejné recepty (aj recepty priateľov) sú striktne READ-ONLY — Edit tlačidlo sa vôbec neukáže, dá sa len škálovať, komentovať a pridať suroviny do vlastnej databázy (17.7.). Naživo overené 17.7. naprieč 3 účtami; komentovanie cudzích verejných receptov opravené hneď v teste (db/132). Pravidlá 17.7. popoludní: pevné dlaždice (My Recipes/ChefOS/Public/Company) sa NEDAJÚ vymazať, len skryť (dlhé podržanie); z Company profilu sa publikovať nedá vôbec — appka vypíše podmienky a databázový trigger (db/133) to poistí aj technicky. Publikovať smie každý len vlastné osobné recepty z Personal profilu.' },\n    { name:'Skutočné súkromie \"Moje\" (RLS)', status:'test', acct:'personal', desc:'Osobné recepty sú súkromné priamo na úrovni databázy — nevidí ich ani admin kuchyne. Nie je to len filter v appke, ale bezpečnostné pravidlo servera.' },\n    { name:'Zdieľanie s priateľmi (opt-in)', status:'ok', desc:'Ak si to zapneš v nastaveniach, tvoji chef-priatelia (Connections) vidia tvoje vlastné recepty — len na čítanie. Vypnuteľné kedykoľvek.' },\n    { name:'Komentáre — zdieľané naprieč kuchyňami', status:'ok', desc:'Komentár na ChefOS recepte vidí každá kuchyňa, ktorá ten recept má — spoločná nástenka nad knižnicou. Naživo overené 17.7. po oprave db/129 (komentár si nesie ID master receptu priamo). Počet komentárov vidno na dvoch miestach: badge na tlačidle komentárov v detaile a bublinka s číslom vedľa hviezdičky priamo v zozname receptov (1–9, potom „9+\"). Šípka na riadkoch receptov zmazaná — nič nerobila.' },\n    { name:'Activity feed (🔔 kto okomentoval)', status:'test', desc:'Zvonček na Home ukáže bodku, keď niekto okomentuje TVOJ recept — po otvorení vidíš zoznam nových komentárov.' },\n    { name:'AI generovanie receptu / nápadov', status:'ok', desc:'Chef\\'s Assistant vie vygenerovať úplne nový recept na mieru — podľa surovín, diéty alebo štýlu — a uložiť ho rovno do tvojej police.' },\n    { name:'Sken receptu z fotky / PDF', status:'ok', desc:'Odfotíš recept (aj ručne písaný, aj celé menu) a AI ho prepíše do štandardného ChefOS formátu — suroviny, množstvá, postup, všetko na svojom mieste.' },\n    { name:'Sken menu z URL webstránky', status:'ok', desc:'Vložíš adresu webstránky s menu a AI si ju stiahne a spracuje sama — rovnaký výsledok ako sken fotky, bez fotenia.' },\n    { name:'Tlač — firemná identita (branded)', status:'ok', desc:'Jedno tlačidlo tlače: profesionálna receptová karta s hlavičkou tvojej kuchyne, ChefOS pečiatkou, dvojstĺpcovým layoutom (suroviny + očíslovaný postup), koláčovým grafom zloženia, Chef\\'s Notes a sekciou \"Used In\". Naživo overené 17.7. („receptúry sa tlačia perfektne\"); stará základná tlač zmazaná. Opravený bug 17.7.: po zatvorení náhľadu tlače v Safari zmizli ikony pri recepte až do refreshu — appka teraz po tlači vynúti upratanie a prekreslenie sama.' },\n    { name:'Pridať recept do Check Listu', status:'ok', desc:'Tlačidlo na recepte — appka sa najprv spýta do ktorého projektu (ak máš viac), potom na ktorú stanicu, a recept pristane v dennom prep liste. Naživo overené 17.7.; na základe testu pribudla možnosť „➕ New section…\" — recept vieš vložiť aj do úplne novej sekcie, nielen do existujúcich.' },\n    { name:'Obľúbené, poznámky, škálovanie, alergény', status:'ok', desc:'Hviezdička na obľúbené, vlastné poznámky ku každému receptu, prepočet množstiev podľa porcií alebo jednej suroviny, automatická detekcia alergénov a diét z názvov surovín.' },\n  ]},\n  { icon:'🧂', title:'Ingrediencie', items:[\n    { name:'Zdieľaný cenník (~2 000 položiek)', status:'ok', desc:'Cenová databáza surovín tvojej kuchyne — z nej sa automaticky počíta food cost každého receptu. Pozor: väčšina cien je zatiaľ AI odhad, nie overená faktúra.' },\n    { name:'My Ingredients (súkromné)', status:'test', acct:'personal', desc:'Tvoja vlastná polica surovín, oddelená od spoločného cenníka — súkromná na úrovni databázy, rovnako ako osobné recepty.' },\n    { name:'Vlastné zoznamy + farebné knihy', status:'test', desc:'Vytvoríš si ďalšie pomenované zoznamy surovín (napr. \"Ázijská špajza\") s výberom z 8 farebných kníh ako ikonou (17.7.). Dlhé podržanie vlastného zoznamu = premenovať / skryť / vymazať / zdieľať. Pevné police (ChefOS, My Ingredients, Public) sa dajú len SKRYŤ, nikdy nie premenovať/vymazať — rovnako ako pri receptoch.' },\n    { name:'Verejná polica + zdieľanie surovín 🌍🤝', status:'test', desc:'Nová dlaždica Public (naprieč kuchyňami, len na čítanie) + tlačidlo Share v My Ingredients: zoznam tvojich surovín, pri každej badge 🌍 public / 🤝 friends, plus „všetko naraz\" a jednotlivo (db/136). Public = vidí každá kuchyňa, Friends = len tvoji chef-priatelia. Z Company profilu sa nedá zdieľať nič (appka + databázový trigger). Cudzie verejné suroviny sú bezpečne escapované, read-only a nikdy nevstupujú do tvojho cenníka receptov. Rovnaká voľba (public/friends) pribudla aj na publish tlačidlo receptov.' },\n    { name:'Pridávanie do zdieľanej police — len admin', status:'test', role:'admin', desc:'Do spoločného cenníka kuchyne môže pridávať a upravovať len admin — bežný člen ho používa, ale nerozbije. Vlastné police má každý naplno.' },\n    { name:'Sken dokumentu / fotky → AI extrakcia', status:'test', desc:'Odfotíš cenník od dodávateľa, ručný zoznam alebo PDF a AI z neho vytiahne každú položku aj s cenou.' },\n    { name:'Invoice Scan v2 (dodávateľ + viacjazyčný)', status:'test', desc:'Sken faktúry: 17.7. prepísaný — číta ktorýkoľvek jazyk (DE/SK/CZ…), z hlavičky rozpozná DODÁVATEĽA a nastaví ho na všetky položky z tej faktúry, aktualizuje ceny + dátum, doplní kategóriu. Preskakuje dátumy, čísla faktúr, súčty, DPH a zálohy (predtým z dátumu robil položku). Pribudlo pole Dodávateľ v ingredienciách (db/137) — základ pre budúce objednávanie na klik. Nutričné/sezónne detaily doladí ✨ AI Details.' },\n    { name:'Sken .xlsx (Excel) — viacjazyčný', status:'test', desc:'Načíta aj Excel súbor od dodávateľa — bez externých knižníc, priamo v prehliadači — a spracuje ho tou istou AI extrakciou. Vylepšené 17.7.: sken teraz zvláda zoznamy v ktoromkoľvek jazyku (SK/CZ/DE/PL/FR…), názvy ponechá v origináli a jednotky (ks/kus/Stück…) aj kategórie normalizuje. Predtým fungoval poriadne len po anglicky.' },\n    { name:'AI Details — dopĺňanie polí', status:'ok', desc:'Jedno tlačidlo doplní chýbajúce kategórie, sezónnosť, skladovanie a nutričné hodnoty pre až 25 položiek naraz. Nikdy neprepisuje, čo už je vyplnené. Naživo overené 17.7.; výsledok teraz aj vysvetľuje, odkiaľ dáta pochádzajú (typické referenčné hodnoty AI, nie laboratórne meranie — vždy upraviteľné).' },\n    { name:'Dlhé podržanie: premenovať / skryť / vymazať', status:'test', desc:'Podrž prst (alebo pravý klik) na hociktorej surovine a rovno ju upravíš — bez hľadania v menu.' },\n    { name:'Bulk delete (podľa dátumu / všetko)', status:'test', desc:'Hromadné vymazanie surovín podľa dátumu pridania alebo celej police naraz — na upratanie po zlom skene.' },\n    { name:'Sezónnosť, kategórie, filtre, Ingredient Audit', status:'ok', desc:'Filtrovanie podľa kuchyne, kategórie, sezóny, skladovania a ceny; sezónne suroviny navrchu; audit nekonzistentných názvov.' },\n  ]},\n  { icon:'✅', title:'Check List (Kitchen Flow)', items:[\n    { name:'Prep sheet podľa stanice', status:'ok', desc:'Denný prípravný zoznam po staniciach (SKY, Hot Line, Garde Manger…) — jedlá s položkami, stavy TO DO / CHECK / FINISH / DON\\'T DO, priority a minúty. Srdce ChefOS.' },\n    { name:'Projekty / výber reštaurácie', status:'ok', desc:'Jedna kuchyňa môže mať viac projektov (napr. dve prevádzky) — Check List sa otvára cez výber projektu a všetko vnútri je oddelené.' },\n    { name:'Cross-station \"All\" + overload 🔥', status:'ok', desc:'Pohľad na všetky stanice naraz — kto má koľko roboty pred sebou; stanica s viac ako 3,5 h nevybavenej práce dostane 🔥 odznak.' },\n    { name:'AI sken prep sheetu (fotka / PDF)', status:'ok', desc:'Odfotíš papierový prep sheet a AI z neho postaví celú stanicu — jedlá aj položky — na jedno potvrdenie.' },\n    { name:'Reálne časy per stav (crowd-sourced)', status:'ok', desc:'Každá položka má minúty pre TO DO / CHECK / FINISH; tapnutím na čas zapíšeš, koľko to reálne trvalo, a odhady sa časom spresňujú priemerom.' },\n    { name:'Dlhé podržanie: premenovať / skryť / vymazať', status:'test', desc:'Rovnaké gesto ako pri ingredienciách — podrž jedlo v prep liste a rovno ho upravíš.' },\n    { name:'Audit log zmien', status:'ok', role:'admin', desc:'Kto čo kedy zmenil v Check Liste — dohľadateľné pre admina, žiadne \"to som nebol ja\".' },\n    { name:'Language Audit', status:'ok', role:'admin', desc:'AI prejde názvy jedál a položiek a navrhne jednotný jazyk/pravopis pre celú kuchyňu.' },\n    { name:'Prepojenie na Order List a Print Labels', status:'ok', desc:'Z položky v prep liste jedným ťukom: objednať (🛒) alebo vytlačiť štítok (🖨️).' },\n  ]},\n  { icon:'🛒', title:'Order List', items:[\n    { name:'Objednávky per-osoba', status:'ok', desc:'Každý si pridáva vlastné položky (z Check Listu, Ingrediencií alebo ručne); duplicitné položky sa sčítavajú a admin vidí, kto čo objednal. Naživo overené 16.7.' },\n    { name:'Bulk tlač / vymazanie', status:'ok', desc:'Označíš viac položiek naraz a vytlačíš alebo vyčistíš jedným ťukom.' },\n    { name:'Send to Supplier', status:'plan', desc:'Odoslanie objednávky priamo dodávateľovi jedným tlačidlom — zatiaľ \"coming soon\" placeholder, plánované po triali (napojenie na švajčiarskych dodávateľov je dlhodobá vízia).' },\n  ]},\n  { icon:'🏷️', title:'Print Labels', items:[\n    { name:'Fronta štítkov z Check Listu / ručne', status:'ok', desc:'Štítky na produkty pripravíš z prep listu jedným ťukom alebo ručne (od 3 písmen navrhuje názvy) a vytlačíš všetky naraz.' },\n    { name:'Use-by dátum automaticky', status:'ok', desc:'Štítok si sám dopočíta dátum spotreby z trvanlivosti produktu — žiadne počítanie v hlave o polnoci.' },\n    { name:'HACCP log každej tlače', status:'ok', desc:'Každý vytlačený štítok sa zapíše s dátumom spotreby — z toho žije obrazovka Expirácia štítkov v HACCP (čo je po dátume / dnes-zajtra / v poriadku).' },\n    { name:'Tlačiareň Brother QL-820NWB', status:'plan', desc:'Odporúčaná tlačiareň (~CHF 130, bez zmluvy) je vybraná a zdôvodnená v docs/LABEL_PRINTER_RESEARCH.md — fyzicky zatiaľ nekúpená, tlačí sa cez bežnú tlačiareň prehliadača.' },\n  ]},\n  { icon:'⏱️', title:'Working Time', items:[\n    { name:'Check-in / check-out, prestávky', status:'ok', desc:'Príchod a odchod jedným ťukom, prestávky, poznámky ku dňu — evidencia odpracovaných hodín pre teba aj pre výplatu.' },\n    { name:'Zabudnutý check-in / check-out', status:'ok', desc:'Ak zabudneš ťuknúť, appka to zistí a dá ti spätne doplniť skutočný čas — obojsmerne (zabudnutý príchod aj odchod).' },\n    { name:'GPS snímka pri check-in/out', status:'ok', desc:'Jednorazová poloha presne v momente príchodu/odchodu (nie priebežné sledovanie — vedomé rozhodnutie z právnych dôvodov). ⚠️ Audit 16.7.: treba ju ešte doplniť do legal.html.' },\n    { name:'Kontrahované hodiny, nadčasy, voľno', status:'ok', desc:'Porovnanie odpracovaného s úväzkom, nadčasy a zostatok voľna — mesačné grafy a koláče.' },\n    { name:'Detail dňa (objednávky + štítky)', status:'ok', desc:'Pri každom dni vidíš, čo sa v ten deň objednalo a koľko štítkov sa vytlačilo — kontext k odpracovaným hodinám.' },\n    { name:'Sken zmluvy → AI poznámka', status:'ok', desc:'Nahráš pracovnú zmluvu a AI z nej vytiahne hodiny, dovolenku a platové podmienky — s ikonami ⚠️/✅/ℹ️ pri každom bode. Zmluva je viditeľná len tebe (chránené na úrovni databázy).' },\n    { name:'Pripomienka zmeny (shift reminder)', status:'ok', desc:'Appka ti pripomenie blížiaci sa začiatok zmeny podľa rozpisu.' },\n  ]},\n  { icon:'📅', title:'Schedule', items:[\n    { name:'Rozpis zmien (shift kódy)', status:'ok', desc:'Mesačný rozpis v mriežke so zmenovými kódmi ako na papieri — postavený podľa reálneho rozpisu z hotela. Roster sa momentálne prestavuje pre Burrito Bandito & Lido.' },\n    { name:'Sken rozpisu (Dienstplan) → AI', status:'ok', desc:'Odfotíš papierový Dienstplan a AI ho prepíše do appky — mená, dni, zmeny.' },\n  ]},\n  { icon:'🧼', title:'HACCP', items:[\n    { name:'Príjem tovaru, teploty varenia, chladenie', status:'ok', desc:'Záznamy teplôt pri príjme, jadrové teploty pri varení a protokol chladenia — presne to, čo pýta švajčiarska kontrola.' },\n    { name:'Teploty chladničiek', status:'ok', desc:'Denné zapisovanie teplôt chladničiek/mrazničiek s históriou. (Automatický senzor SensorPush je preskúmaný, zatiaľ nekúpený.)' },\n    { name:'Čistenie a hygiena checklisty', status:'ok', desc:'Denné/týždenné upratovacie a hygienické checklisty s odškrtávaním — dohľadateľné pri kontrole.' },\n    { name:'Fritézový olej, škodcovia', status:'ok', desc:'Evidencia výmeny oleja a kontrol škodcov — dve najčastejšie otázky inšpekcie.' },\n    { name:'Expirácia štítkov', status:'ok', desc:'Prehľad všetkého, čo bolo oštítkované: po dátume / končí dnes-zajtra / v poriadku — napojené na Print Labels.' },\n    { name:'Skryté z osobných účtov', status:'test', desc:'HACCP (a Team Meetings) vidia len firemné účty a admini — samostatnému kuchárovi na osobnom účte zbytočne nezavadzia.' },\n    { name:'Školenia personálu (vlna 3)', status:'plan', desc:'Evidencia, kto absolvoval hygienické školenie a kedy — zatiaľ \"pripravujeme\" dlaždica.' },\n    { name:'Admin report naprieč HACCP', status:'plan', desc:'Jedna súhrnná obrazovka cez všetky HACCP moduly pre kontrolu — zatiaľ \"pripravujeme\" dlaždica.' },\n  ]},\n  { icon:'🎩', title:\"Chef's Assistant (AI)\", items:[\n    { name:'Chat asistent, technika, substitúcie', status:'ok', desc:'Michelin-štýl kuchársky poradca: náhrady surovín, technika, nápady na jedlá — priamo v appke.' },\n    { name:'AI kredit systém pre Personal účty', status:'test', acct:'personal', desc:'Osobné účty majú AI funkcie cez kreditový zostatok v CHF (prvé dobitie 70 % kreditu, ďalšie 90 %) — firemné účty majú AI v predplatnom. Účtuje sa podľa reálnej spotreby tokenov.' },\n    { name:'Centrálny Anthropic API kľúč', status:'test', desc:'Všetky AI funkcie bežia cez jeden firemný kľúč v samostatnom workspace — spotreba užívateľov sa sleduje oddelene od vývojárskej. Nikto si už nemusí vkladať vlastný kľúč.' },\n    { name:'AI Testing Mode', status:'test', role:'admin', desc:'Platformový vypínač pre Head Admina: kým je zapnutý, AI je pre všetkých neobmedzené (na testovanie) — kreditový systém sa obchádza.' },\n    { name:'Gate presadený aj na serveri', status:'test', desc:'Kreditová kontrola beží aj v serverovej funkcii, nielen v appke — obísť ju z prehliadača nestačí.' },\n    { name:'Chef Challenge', status:'ok', desc:'Hravé AI výzvy na varenie. ⚠️ Audit odporúča vyhodiť z trial buildu — hračka bez väzby na hodnotu pre kuchyňu.' },\n  ]},\n  { icon:'🔗', title:'Connections', items:[\n    { name:'Add Friend QR / email', status:'ok', desc:'Pridáš si kolegu-kuchára naskenovaním jeho QR alebo emailom — vznikne priateľské prepojenie na zdieľanie receptov a zoznamov.' },\n    { name:'Chef Friends zoznam', status:'ok', desc:'Zoznam tvojich prepojených kuchárov — pri každom vidíš, čo s tebou zdieľa.' },\n    { name:'Zdieľané recepty od priateľov', status:'ok', desc:'Recepty, ktoré ti priatelia sprístupnili (read-only) — otváraš ich priamo z ich profilu.' },\n    { name:'Zdieľané zoznamy ingrediencií od priateľov', status:'test', desc:'To isté pre vlastné zoznamy surovín — priateľ ti ukáže napr. svoju \"Ázijskú špajzu\", len na čítanie.' },\n    { name:'Scan QR (univerzálny)', status:'ok', desc:'Jeden skener kamery rozozná priateľský QR, tímovú pozvánku aj join kód — a vždy sa najprv spýta, čo chceš urobiť.' },\n  ]},\n  { icon:'🏗️', title:'Tímy / Typ účtu', items:[\n    { name:'Personal / Company prepínač', status:'ok', desc:'Jeden účet, dva režimy: osobný zápisník vs. firemná kuchyňa. Prepnutie jedným ťukom na Home s potvrdením.' },\n    { name:'Reálne členstvo — brána na Company', status:'test', desc:'Do Company režimu sa dostane len ten, kto sa REÁLNE pripojil do tímu (pozvánka, join kód) alebo je admin — hocikto cudzí už nie.' },\n    { name:'Join kód — QR / ručne / email', status:'test', acct:'company', desc:'Admin vygeneruje kód alebo QR svojej kuchyne; nový člen ho naskenuje alebo zadá a appka sa spýta \"chceš sa stať členom tímu X?\" pred pripojením.' },\n    { name:'Create Team', status:'test', acct:'company', role:'admin', desc:'Kitchen admin (company_admin) vie založiť novú reštauráciu/kuchyňu a vygenerovať jej join kódy — Richard onboarduje firmy cez Add Company, ich admin si potom tvorí tímy sám.' },\n    { name:'ROLE v My Profile', status:'test', desc:'V profile vidíš svoju rolu: Head Admin / Admin / Admin Assistant / Member — podľa skutočných práv, nie podľa dojmu.' },\n    { name:'Team Members — Make Assistant / Remove', status:'ok', role:'admin', desc:'Admin vidí zoznam členov svojej kuchyne (v Admin aj v Connections > My Team), vie prideliť rolu asistenta a odstrániť člena. Naživo overené 17.7. po trojkolovej oprave RLS.' },\n    { name:'Remove ponecháva osobný ChefOS', status:'ok', desc:'Odstránený člen príde LEN o firemnú kuchyňu — okamžite dostane vlastnú čistú \"My Kitchen\" so štandardnými policami a jeho osobné recepty/suroviny mu zostávajú. Naživo overené 17.7.' },\n  ]},\n  { icon:'🛡️', title:'Admin', items:[\n    { name:'Add Admin (Head / Kitchen Admin)', status:'ok', role:'admin', desc:'Dve úrovne: Head Admin (Richard, plný dosah) a Kitchen Admin (vybrané práva cez prepínače — pozvánky, tím, reporty…).' },\n    { name:'Add Company (jednorazová pozvánka)', status:'ok', role:'admin', desc:'Richard založí firmu a pošle JEDNU pozvánku emailom — kto ju prijme, automaticky sa stane hlavným adminom tej kuchyne. Odolné aj voči \"spálenému\" odkazu (email preview) — overené na chefos@protonmail.com.' },\n    { name:'Admin Directory', status:'ok', role:'admin', desc:'Prehľad všetkých účtov s on/off prepínačmi práv, typom účtu a AI kreditom (ak nejaký má).' },\n    { name:'Access Requests', status:'ok', role:'admin', desc:'Schvaľovanie nových žiadostí o prístup do ChefOS — appka je invite-only, bez schválenia sa nikto nedostane dnu.' },\n    { name:'Kitchen Reports (hub + grafy + predikcia)', status:'test', acct:'company', role:'admin', desc:'Reportový hub ako Internal Docs: Team Members (dochádzka, hodiny, aktivita — koláčové a stĺpcové grafy, len so súhlasom zamestnanca), Recepty (police ChefOS/Company, kompletnosť časov a cien, mix sekcií), Ingrediencie (% s cenami a doplnenými dátami), Check List (stavy, zostávajúce minúty per stanica, projekty) — každá sekcia s 🔮 predikciou tempa. HACCP reporty zatiaľ ako \"pracujeme na tom\".' },\n    { name:'Feedback inbox (iba Head Admin)', status:'ok', role:'admin', desc:'Všetka spätná väzba od užívateľov (Settings > Send Feedback) na jednom mieste. Vidí ju IBA hlavný admin (Richard / iCloud) — nie kuchynskí admini. Zabezpečené aj v databáze (read policy is_super_admin(), db/108) aj v UI. Naživo overené 17.7.' },\n    { name:'Email Contacts (číslované + detail)', status:'test', role:'admin', desc:'Každá emailová adresa, ktorú ChefOS kedy videl (žiadosti, pozvánky) — plnené automaticky databázovým triggerom. 17.7.: pribudlo číslovanie (#1 najstarší naspodu, najnovší hore) a ťuknutím na kontakt sa hlavnému adminovi otvorí celý detail vrátane napojeného ChefOS účtu (meno, rola, typ, kuchyňa), ak taký existuje.' },\n    { name:'AI Testing Mode + Internal Docs', status:'ok', role:'admin', desc:'Vypínač neobmedzeného AI na testovanie + interné dokumenty (status, backlog, investor deck, najnovší Critical Review) — Internal Docs len pre Richarda.' },\n    { name:'Preview as Normal User', status:'ok', role:'admin', desc:'Admin si jedným ťukom pozrie appku očami bežného člena — s trvalým bannerom na návrat.' },\n  ]},\n  { icon:'⚙️', title:'Nastavenia', items:[\n    { name:'My Profile & Security (heslo, Face ID)', status:'ok', desc:'Meno, email, tím, rola; povinné heslo + voliteľné Face ID odomknutie na tomto zariadení (biometria nikdy neopúšťa telefón).' },\n    { name:'Light / Dark mode', status:'test', desc:'Prepínač vzhľadu — tmavý (pôvodný ChefOS) alebo svetlý pre kuchyňu pri dennom svetle. Per zariadenie, každý člen tímu si volí sám.' },\n    { name:'Jazyk (EN/DE/FR/IT/SK)', status:'ok', desc:'Prepnutie jazyka rozhrania — čiastočné pokrytie (login, Home, Check List), zvyšok postupne. Dáta kuchyne sa nikdy neprekladajú.' },\n    { name:'Tutoriály pre každé okno (❓)', status:'test', desc:'Každá hlavná obrazovka (Check List, Recepty, Ingrediencie, Order List, Print Labels, Working Time, Schedule, HACCP, Chef\\'s Assistant, Connections, Admin, Settings) má vlastný podrobný sprievodca: otvorí sa sám pri prvom otvorení obrazovky a v hornej lište je natrvalo ❓ na jeho zopakovanie. Nahradilo What\\'s New srdiečko (zmazané 17.7. ako duplicitné — Richard).' },\n    { name:'Preusporiadanie ikoniek Home/Settings', status:'ok', desc:'Poradie dlaždíc si každý nastaví sám — platí len pre jeho zariadenie.' },\n    { name:'Send Feedback', status:'test', desc:'Správa priamo Richardovi z appky — chyba, nápad alebo pochvala.' },\n    { name:'Zdieľať hodiny s adminom (súhlas)', status:'test', desc:'Defaultne admin vidí hodiny tímu len anonymne v súčte; menovite len ak si to tu sám zapneš. Kedykoľvek odvolateľné.' },\n    { name:'Tutorial + pridanie na plochu', status:'ok', desc:'Úvodný sprievodca sa 17.7. zoštíhlil len na privítanie + hlavnú plochu (Home) — detaily jednotlivých funkcií prevzali tutoriály priamo v ich obrazovkách. Otvára sa sám pri prvom prihlásení, znova cez ❓ na Home. Bez admin obsahu pre bežných členov; + návod, ako si dať ChefOS na plochu telefónu ako appku.' },\n    { name:'Vždy viditeľný hlavičkový pás', status:'test', desc:'Kitchen Notebook / ChefOS pás s tlačidlami Späť a Domov na každej obrazovke okrem hlavného menu — Domov navyše vždy vyroluje čistý vrch stránky.' },\n  ]},\n  { icon:'🔐', title:'Bezpečnosť a súkromie', items:[\n    { name:'Invite-only prístup + schvaľovanie', status:'ok', desc:'Do appky sa nedá samoregistrovať — len pozvánkou (QR/link/email) a po schválení. \"Coming soon\" stena pre náhodných návštevníkov.' },\n    { name:'Confidentiality + Privacy brány', status:'test', desc:'Pri prvom prihlásení (a po každej zmene verzie) musí každý odsúhlasiť mlčanlivosť a ochranu osobných údajov (GDPR/nDSG) — s možnosťou nesúhlasiť a odhlásiť sa.' },\n    { name:'RLS izolácia dát per kuchyňa', status:'ok', desc:'Každá tabuľka v databáze má bezpečnostné pravidlá — dáta jednej kuchyne druhá nikdy nevidí, a osobné dáta nevidí ani vlastný admin. Kontrolované automatickým auditom pri každom commite.' },\n    { name:'Branded auth emaily', status:'test', desc:'Prihlasovacie a potvrdzovacie emaily prichádzajú v ChefOS identite (navy/teal, vlastná doména) namiesto generického Supabase vzhľadu.' },\n    { name:'Trvalé opravy incidentov (db/118, 121–125)', status:'ok', desc:'Tri bezpečnostné incidenty zo 16.7. (spálená admin pozvánka, nefunkčný Remove, zamknutý účet po remove) — každý opravený štrukturálne, nie záplatou, a zapísaný v HEALTH_LOG.md aj s ponaučením.' },\n    { name:'/security dokumenty pre právnika', status:'test', desc:'Priečinok s bezpečnostným review a podkladmi pre právnu konzultáciu pred trialom.' },\n    { name:'legal.html — aktualizácia (heslo, GPS)', status:'plan', desc:'Audit 16.7. našiel dve zastarané tvrdenia: dokument tvrdí \"žiadne heslá\" (heslo je povinné od 15.7.) a nespomína GPS snímku pri check-in/out. Oprava textu čaká — pred trialom povinná.' },\n    { name:'Platobná brána, faktúry', status:'plan', desc:'Na štart ručné faktúry (do ~20 kuchýň), platobná brána až potom — vedomé rozhodnutie z monetizačného plánu.' },\n    { name:'Einzelfirma / GmbH registrácia', status:'plan', desc:'Právna forma na fakturáciu: najprv Einzelfirma/AHV (blokátor prvého príjmu, termín 20.7.), GmbH až po prvých reálnych tržbách.' },\n  ]},\n];\n\n/* Status filters — counts in the legend and pulse strip always reflect the FULL list, so\n   toggling a filter never makes the totals lie; only the cards below get filtered. */\nconst activeStatuses = new Set(['ok','test','plan']);\nlet showAdminOnly = false;\nfunction toggleStatusFilter(status){\n  if(activeStatuses.has(status)){\n    if(activeStatuses.size === 1) return; // never allow an empty page\n    activeStatuses.delete(status);\n  } else {\n    activeStatuses.add(status);\n  }\n  document.getElementById('legendOk').classList.toggle('active', activeStatuses.has('ok'));\n  document.getElementById('legendTest').classList.toggle('active', activeStatuses.has('test'));\n  document.getElementById('legendPlan').classList.toggle('active', activeStatuses.has('plan'));\n  renderModules();\n}\nfunction toggleAdminOnlyFilter(){\n  showAdminOnly = !showAdminOnly;\n  document.getElementById('legendAdmin').classList.toggle('active', showAdminOnly);\n  renderModules();\n}\nfunction renderModules(){\n  const wrap = document.getElementById('modulesWrap');\n  const acct = document.getElementById('acctPersonalBtn').classList.contains('active') ? 'personal' : 'company';\n  let ok=0, test=0, plan=0, adminTotal=0;\n  wrap.innerHTML = MODULES.map((mod, mi)=>{\n    const cards = mod.items.map((it, ii)=>{\n      if(it.status==='ok') ok++; else if(it.status==='test') test++; else plan++;\n      if(it.role==='admin') adminTotal++;\n      if(showAdminOnly && it.role!=='admin') return null;\n      if(!activeStatuses.has(it.status)) return null;\n      const dimmed = it.acct && it.acct !== acct;\n      return `\n        \u003cdiv class=\"feature-card status-${it.status}${dimmed?' dim':''}\" onclick=\"openFeatureModal(${mi},${ii})\">\n          \u003cdiv class=\"fname\">\u003cspan class=\"status-dot ${it.status}\">\u003c/span>${it.name}\u003c/div>\n          \u003cdiv style=\"display:flex; gap:5px; flex-wrap:wrap;\">\n            ${it.acct ? `\u003cspan class=\"acct-tag ${it.acct}\">${it.acct === 'personal' ? 'Personal' : 'Company'}\u003c/span>` : ''}\n            ${it.role==='admin' ? `\u003cspan class=\"acct-tag\" style=\"background:var(--gold-wash); color:var(--gold);\">🛡️ Kitchen Admin\u003c/span>` : ''}\n          \u003c/div>\n        \u003c/div>\n      `;\n    }).filter(Boolean);\n    if(!cards.length) return '';\n    return `\n      \u003cdiv class=\"module\">\n        \u003cdiv class=\"module-head\">\n          \u003cdiv class=\"module-icon\">${mod.icon}\u003c/div>\n          \u003cdiv class=\"module-title\">${mod.title}\u003c/div>\n          \u003cdiv class=\"module-count\">${cards.length}${cards.length !== mod.items.length ? ' / ' + mod.items.length : ''} funkcií\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"feature-grid\">${cards.join('')}\u003c/div>\n      \u003c/div>\n    `;\n  }).join('');\n  document.getElementById('pulseOk').textContent = ok;\n  document.getElementById('pulseTest').textContent = test;\n  document.getElementById('pulsePlan').textContent = plan;\n  document.getElementById('pulseTotal').textContent = ok+test+plan;\n  document.getElementById('legendOkCount').textContent = ok;\n  document.getElementById('legendTestCount').textContent = test;\n  document.getElementById('legendPlanCount').textContent = plan;\n  document.getElementById('legendAdminCount').textContent = adminTotal;\n}\nfunction setAcctView(type){\n  document.getElementById('acctPersonalBtn').classList.toggle('active', type==='personal');\n  document.getElementById('acctCompanyBtn').classList.toggle('active', type==='company');\n  renderModules();\n}\n\n/* Detail modal (Richard, 17.7.) — tap a card, read what the feature actually does. */\nconst STATUS_LABELS = { ok:'Funkčné, otestované naživo', test:'Postavené, čaká na test naživo', plan:'Naplánované, ešte nepostavené' };\nfunction openFeatureModal(mi, ii){\n  const mod = MODULES[mi], it = mod.items[ii];\n  document.getElementById('mModule').textContent = mod.icon + ' ' + mod.title;\n  document.getElementById('mName').textContent = it.name;\n  const st = document.getElementById('mStatus');\n  st.className = 'm-status ' + it.status;\n  st.textContent = STATUS_LABELS[it.status];\n  document.getElementById('mDesc').textContent = it.desc || '';\n  document.getElementById('mTags').innerHTML =\n    (it.acct ? `\u003cspan class=\"acct-tag ${it.acct}\">${it.acct === 'personal' ? 'Len Personal účty' : 'Len Company účty'}\u003c/span>` : '') +\n    (it.role==='admin' ? `\u003cspan class=\"acct-tag\" style=\"background:var(--gold-wash); color:var(--gold);\">🛡️ Len Kitchen Admin\u003c/span>` : '');\n  document.getElementById('modalBackdrop').classList.add('open');\n}\nfunction closeFeatureModal(){\n  document.getElementById('modalBackdrop').classList.remove('open');\n}\ndocument.addEventListener('keydown', e=>{ if(e.key === 'Escape') closeFeatureModal(); });\n\nsetAcctView('personal');\n\u003c/script>\n\u003c/body>\n\u003c/html>\n", "\u003c!DOCTYPE html>\n\u003chtml lang=\"sk\">\n\u003chead>\n\u003cmeta charset=\"UTF-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n\u003ctitle>ChefOS — Kontrolný zoznam\u003c/title>\n\u003cstyle>\n  :root{\n    --bg:#0A1A2F; --paper:#122845; --paper-raised:#0f2340;\n    --ink:#fff; --ink-dim:#9C949E; --ink-faint:rgba(156,148,158,0.6);\n    --rule:#223d57; --accent:#34F7D7; --accent-dim:rgba(52,247,215,0.4);\n    --gold:#F7C948; --gold-dim:rgba(247,201,72,0.4);\n    --danger:#FF7A68; --danger-dim:rgba(255,122,104,0.4);\n    --shadow:0 8px 28px rgba(0,0,0,0.45);\n  }\n  *{ box-sizing:border-box; }\n  html,body{ margin:0; padding:0; }\n  body{\n    background:var(--bg); color:var(--ink);\n    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;\n    -webkit-font-smoothing:antialiased; line-height:1.5;\n  }\n  .wrap{ max-width:900px; margin:0 auto; padding:0 20px 100px 20px; }\n  a{ color:inherit; }\n\n  /* ---------- Hero / sticky top ---------- */\n  header.hero{\n    position:sticky; top:0; z-index:50; background:var(--bg);\n    padding:20px 0 22px 0; border-bottom:1px solid var(--rule);\n  }\n  .topline{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }\n  .brandmark{ display:flex; align-items:center; gap:9px; }\n  .brandmark .word{ font-size:14px; font-weight:700; letter-spacing:0.02em; color:var(--accent); }\n  .lang-toggle{\n    background:var(--paper); border:1px solid var(--rule); color:var(--ink-dim);\n    font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;\n    padding:6px 12px; border-radius:20px; cursor:pointer; transition:border-color .15s, color .15s;\n  }\n  .lang-toggle:hover{ border-color:var(--accent-dim); color:var(--accent); }\n  .kicker{ color:var(--accent); font-size:11px; letter-spacing:0.16em; text-transform:uppercase; font-weight:700; margin-bottom:8px; }\n  h1.title{ font-size:26px; font-weight:700; margin:0 0 16px 0; line-height:1.15; }\n\n  .stat-row{ display:flex; align-items:center; gap:18px; }\n  .pie{ width:66px; height:66px; border-radius:50%; background:conic-gradient(var(--accent) 0deg,var(--paper-raised) 0deg); flex:none; position:relative; transition:background .4s; }\n  .pie::after{ content:''; position:absolute; inset:8px; border-radius:50%; background:var(--bg); }\n  .pieLabel{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:var(--accent); font-variant-numeric:tabular-nums; }\n  .stat-cards{ display:flex; gap:10px; flex:1; flex-wrap:wrap; }\n  .stat-card{ background:var(--paper); border:1px solid var(--rule); border-radius:12px; padding:8px 14px; }\n  .stat-card .v{ font-family:\"SF Mono\",Menlo,monospace; font-size:15px; font-weight:700; font-variant-numeric:tabular-nums; }\n  .stat-card .k{ font-size:10px; text-transform:uppercase; letter-spacing:0.07em; color:var(--ink-dim); }\n  .bar{ height:8px; background:var(--paper-raised); border-radius:99px; overflow:hidden; margin-top:14px; }\n  .fill{ height:100%; width:0; background:var(--accent); transition:width .4s; }\n\n  /* ---------- Section groups (collapsible) ---------- */\n  details.group{ margin-top:18px; background:var(--paper); border:1px solid var(--rule); border-radius:16px; overflow:hidden; }\n  details.group summary{\n    list-style:none; cursor:pointer; padding:16px 18px; font-size:15px; font-weight:700; color:var(--ink);\n    display:flex; align-items:center; gap:10px; user-select:none;\n  }\n  details.group summary::-webkit-details-marker{ display:none; }\n  details.group summary::after{ content:'▶'; margin-left:auto; font-size:11px; color:var(--ink-dim); transition:transform .15s; }\n  details.group[open] summary::after{ transform:rotate(90deg); }\n  details.group summary .count{ font-size:11px; font-weight:700; color:var(--ink-dim); background:var(--paper-raised); border:1px solid var(--rule); padding:2px 9px; border-radius:20px; }\n  .group-body{ padding:2px 14px 14px 14px; }\n\n  h3.sub{ color:var(--ink-dim); text-transform:uppercase; font-size:10.5px; letter-spacing:0.09em; font-weight:700; margin:16px 6px 6px 6px; }\n  h3.sub:first-child{ margin-top:6px; }\n\n  /* ---------- Task rows ---------- */\n  .task{ display:flex; gap:11px; align-items:flex-start; padding:9px 8px; border-radius:10px; transition:background .12s; }\n  .task:hover{ background:var(--paper-raised); }\n  .task input[type=\"checkbox\"]{\n    appearance:none; -webkit-appearance:none; width:20px; height:20px; border-radius:6px;\n    border:1.5px solid var(--rule); background:var(--paper-raised); flex:none; margin-top:1px;\n    cursor:pointer; position:relative; transition:border-color .12s, background .12s;\n  }\n  .task input[type=\"checkbox\"]:checked{ background:var(--accent); border-color:var(--accent); }\n  .task input[type=\"checkbox\"]:checked::after{\n    content:''; position:absolute; left:6px; top:2px; width:5px; height:10px;\n    border:solid var(--bg); border-width:0 2px 2px 0; transform:rotate(45deg);\n  }\n  .task label{ flex:1; font-size:13.5px; color:var(--ink); line-height:1.5; }\n  .task.you-row{ background:rgba(247,201,72,0.07); }\n  .task.you-row:hover{ background:rgba(247,201,72,0.12); }\n  .note{ font-size:11px; color:var(--ink-dim); margin-top:3px; display:block; line-height:1.5; }\n  .tag{ font-size:9.5px; font-weight:700; letter-spacing:0.05em; padding:3px 8px; border-radius:99px; flex:none; margin-top:1px; }\n  .tag.me{ background:rgba(52,247,215,0.14); color:var(--accent); border:1px solid var(--accent-dim); }\n  .tag.you{ background:rgba(247,201,72,0.14); color:var(--gold); border:1px solid var(--gold-dim); }\n\n  /* ---------- Timeline ---------- */\n  .timeline-heading{ font-size:15px; font-weight:700; color:var(--ink); display:flex; align-items:center; gap:8px; padding:16px 18px; }\n  .month-block{ border-top:1px solid var(--rule); }\n  .month-block:first-child{ border-top:none; }\n  .month-head{ padding:12px 18px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; user-select:none; }\n  .month-head:hover{ background:var(--paper-raised); }\n  .month-name{ font-size:14px; font-weight:700; }\n  .month-meta{ font-size:11px; color:var(--ink-dim); display:flex; align-items:center; gap:6px; }\n  .month-body{ display:none; padding:0 18px 12px 18px; }\n  .month-block.open>.month-body{ display:block; }\n  .month-block.open>.month-head .chev{ transform:rotate(90deg); }\n  .chev{ display:inline-block; transition:transform .15s ease; color:var(--ink-dim); font-size:10px; }\n  .week-block{ border:1px solid var(--rule); border-radius:12px; margin-top:8px; background:var(--paper-raised); overflow:hidden; }\n  .week-head{ padding:10px 13px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; user-select:none; }\n  .week-head:hover{ background:rgba(255,255,255,0.03); }\n  .week-name{ font-size:12px; font-weight:700; }\n  .week-meta{ font-size:10.5px; color:var(--ink-dim); display:flex; align-items:center; gap:6px; }\n  .week-body{ display:none; padding:0 13px 10px 13px; }\n  .week-block.open .week-body{ display:block; }\n  .week-block.open .chev{ transform:rotate(90deg); }\n  .day-row{ border-top:1px solid var(--rule); }\n  .day-row:first-child{ border-top:none; }\n  .day-head{ padding:9px 2px; cursor:pointer; display:flex; align-items:center; gap:8px; user-select:none; }\n  .day-head:hover .day-title{ color:var(--accent); }\n  .day-date{ font-size:10.5px; color:var(--ink-dim); min-width:78px; flex:none; font-variant-numeric:tabular-nums; }\n  .day-title{ font-size:12.5px; flex:1; color:var(--ink); }\n  .day-body{ display:none; padding:2px 2px 12px 2px; }\n  .day-row.open .day-body{ display:block; }\n  .day-row.open .chev{ transform:rotate(90deg); }\n  .accomplished-list{ list-style:none; margin:6px 0 0 86px; padding:0; }\n  .accomplished-list li{ font-size:11.5px; color:var(--ink-dim); line-height:1.65; padding:3px 0; position:relative; padding-left:16px; }\n  .accomplished-list li::before{ content:'✓'; position:absolute; left:0; color:var(--accent); }\n\n  footer.foot{ text-align:center; font-size:11px; color:var(--ink-faint); padding:36px 0 10px 0; }\n\n  /* ---------- Search + filters (2026-07-15 Visual Data Standards redesign) ---------- */\n  .controls{ display:flex; align-items:center; gap:8px; margin-top:12px; flex-wrap:wrap; }\n  #taskSearch{\n    flex:1; min-width:150px; background:var(--paper); border:1px solid var(--rule); border-radius:20px;\n    color:var(--ink); font-family:inherit; font-size:12px; padding:6px 14px; outline:none;\n  }\n  #taskSearch::placeholder{ color:var(--ink-faint); }\n  #taskSearch:focus{ border-color:var(--accent-dim); }\n  .fbtn{\n    background:var(--paper); border:1px solid var(--rule); color:var(--ink-dim);\n    font-size:10.5px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase;\n    padding:5px 11px; border-radius:20px; cursor:pointer; transition:border-color .15s, color .15s; white-space:nowrap;\n  }\n  .fbtn:hover{ border-color:var(--accent-dim); }\n  .fbtn.on{ border-color:var(--accent); color:var(--accent); background:rgba(52,247,215,0.08); }\n  .fbtn.on.f-you{ border-color:var(--gold); color:var(--gold); background:rgba(247,201,72,0.1); }\n  .task.filtered-out{ display:none; }\n  h3.sub.filtered-out{ display:none; }\n  details.group.filtered-out{ display:none; }\n  summary .gcount{ font-size:11px; font-weight:700; color:var(--ink-dim); background:var(--paper-raised); border:1px solid var(--rule); padding:2px 9px; border-radius:20px; font-family:\"SF Mono\",Menlo,monospace; }\n\n  /* ---------- ChefOS stamp + language fab (Richard, 15.7.: every /visual data/ document\n     carries a last-updated-to-ChefOS-state badge and an SK/EN toggle) ---------- */\n  .chefos-stamp{\n    position:fixed; bottom:14px; right:14px; z-index:90;\n    background:rgba(15,35,64,0.92); border:1px solid rgba(52,247,215,0.4); color:#34F7D7;\n    font-size:10.5px; font-weight:700; font-family:\"SF Mono\",Menlo,Consolas,monospace;\n    padding:6px 12px; border-radius:999px;\n    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); pointer-events:none;\n  }\n  .chefos-lang-fab{\n    position:fixed; bottom:14px; left:14px; z-index:90;\n    background:rgba(15,35,64,0.92); border:1px solid #223d57; color:#9C949E;\n    font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;\n    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;\n    padding:7px 14px; border-radius:999px; cursor:pointer;\n    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);\n    transition:border-color .15s, color .15s;\n  }\n  .chefos-lang-fab:hover{ border-color:rgba(52,247,215,0.4); color:#34F7D7; }\n  @media print{ .chefos-stamp, .chefos-lang-fab{ display:none; } }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\u003cdiv class=\"wrap\">\n\n\u003cheader class=\"hero\">\n  \u003cdiv class=\"topline\">\n    \u003cdiv class=\"brandmark\">\n      \u003csvg width=\"20\" height=\"20\" viewBox=\"0 0 68 68\">\u003cpath d=\"M 46.8 42.3 A 18 18 0 1 1 46.8 21.7\" fill=\"none\" stroke=\"#34F7D7\" stroke-width=\"7\" stroke-linecap=\"round\"/>\u003ccircle cx=\"34\" cy=\"34\" r=\"3\" fill=\"#34F7D7\"/>\u003c/svg>\n      \u003cspan class=\"word\">ChefOS\u003c/span>\n    \u003c/div>\n    \u003cbutton class=\"lang-toggle\" id=\"langBtn\" onclick=\"toggleLang()\">EN\u003c/button>\n  \u003c/div>\n  \u003cdiv class=\"kicker\" data-sk=\"Kontrolný zoznam · Kuchynský denník\" data-en=\"Task List · Kitchen Journal\">\u003c/div>\n  \u003ch1 class=\"title\" data-sk=\"Čo je hotové, čo prichádza\" data-en=\"What's shipped, what's next\">\u003c/h1>\n  \u003cdiv class=\"stat-row\">\n    \u003cdiv class=\"pie\" id=\"pie\">\u003cdiv class=\"pieLabel\" id=\"pieLabel\">0%\u003c/div>\u003c/div>\n    \u003cdiv class=\"stat-cards\">\n      \u003cdiv class=\"stat-card\">\u003cdiv class=\"v\" id=\"done\">–\u003c/div>\u003cdiv class=\"k\" data-sk=\"Hotovo\" data-en=\"Done\">\u003c/div>\u003c/div>\n      \u003cdiv class=\"stat-card\">\u003cdiv class=\"v\" id=\"left\">–\u003c/div>\u003cdiv class=\"k\" data-sk=\"Zostáva\" data-en=\"Remaining\">\u003c/div>\u003c/div>\n      \u003cdiv class=\"stat-card\">\u003cdiv class=\"v\" id=\"pct\">–\u003c/div>\u003cdiv class=\"k\" data-sk=\"Celkovo\" data-en=\"Overall\">\u003c/div>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n  \u003cdiv class=\"bar\">\u003cdiv class=\"fill\" id=\"fill\">\u003c/div>\u003c/div>\n  \u003cdiv class=\"controls\">\n    \u003cinput id=\"taskSearch\" type=\"search\" placeholder=\"Hľadať…\" oninput=\"applyFilters()\">\n    \u003cbutton class=\"fbtn\" id=\"fOpen\" onclick=\"toggleFilter('open')\" data-sk=\"⏳ Len otvorené\" data-en=\"⏳ Open only\">\u003c/button>\n    \u003cbutton class=\"fbtn\" id=\"fMe\" onclick=\"toggleFilter('me')\" data-sk=\"🤖 JA\" data-en=\"🤖 ME\">\u003c/button>\n    \u003cbutton class=\"fbtn f-you\" id=\"fYou\" onclick=\"toggleFilter('you')\" data-sk=\"👨‍🍳 TY\" data-en=\"👨‍🍳 YOU\">\u003c/button>\n  \u003c/div>\n\u003c/header>\n\n\u003cdetails class=\"group\" open id=\"timelineSection\">\n  \u003csummary>\u003cspan data-sk=\"🗓️ Časová os\" data-en=\"🗓️ Timeline\">\u003c/span>\u003cspan class=\"count\" data-sk=\"čo bolo hotové, v ktorý deň\" data-en=\"what shipped, on which day\">\u003c/span>\u003c/summary>\n  \u003cdiv id=\"timelineRoot\">\u003c/div>\n\u003c/details>\n\n\u003cdetails class=\"group\" open>\u003csummary>\u003cspan data-sk=\"✅ Hotovo\" data-en=\"✅ Shipped so far\">\u003c/span>\u003c/summary>\u003cdiv class=\"group-body\">\n\n\u003ch3 class=\"sub\">🆕 Najnovšie (16.–17. 7.) — plný detail vo feature_status.html\u003c/h3>\n\u003cdiv class='task'>\u003cinput id='r1' type='checkbox' checked>\u003clabel for='r1'>🔐 Bezpečnostná kontrola celého projektu (17.7.): privátny bucket na zmluvy (db/134), cross-kitchen XSS escapery, trvalé poistky v auditoch, live DB health check čistý\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='r2' type='checkbox' checked>\u003clabel for='r2'>🌍 Verejné police Public (recepty + ingrediencie) naprieč kuchyňami + publikovanie 🌍/priateľom, per-recept aj per-ingredienciu; cudzí obsah read-only (db/131–138)\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='r3' type='checkbox' checked>\u003clabel for='r3'>🤝 Zdieľanie s priateľmi + Chef Friends → profil priateľa (recepty aj ingrediencie); z Company profilu sa zdieľať nedá nič (appka + DB trigger)\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='r4' type='checkbox' checked>\u003clabel for='r4'>🧾 Invoice Scan v2: rozpozná dodávateľa z hlavičky, nové pole Dodávateľ (db/137); oba skeny prekladajú do jazyka z nastavenia, originál ako alias\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='r5' type='checkbox' checked>\u003clabel for='r5'>💬 Zdieľané komentáre naprieč kuchyňami + počítadlo/bublinka (db/129); firemný recept už nikdy na osobnej polici (db/130)\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='r6' type='checkbox' checked>\u003clabel for='r6'>🎓 Podrobný tutoriál pre každé okno (❓ v lište) + zoštíhlený úvod; What's New zmazané\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='r7' type='checkbox' checked>\u003clabel for='r7'>🧂 Ingredient police skrývateľné (nie zmazateľné) + 8 farebných kníh; ikony do dvoch riadkov; 📧 Email Contacts číslované + detail; Feedback iba Head Admin\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\n\u003ch3 class=\"sub\">Check List\u003c/h3>\n\u003cdiv class='task'>\u003cinput id='s1' type='checkbox' checked>\u003clabel for='s1'>Dish-grouped prep sheets across all 8 stations (real menus + Richard-approved provisional ones)\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s2' type='checkbox' checked>\u003clabel for='s2'>On-hand stock count, min-required, 🚩 flag (priority-1 only)\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s3' type='checkbox' checked>\u003clabel for='s3'>TO DO / CHECK / FINISH / DON'T DO status + per-stage time fields\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s4' type='checkbox' checked>\u003clabel for='s4'>Real crowd-sourced prep times — tap the clock, values average together\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s5' type='checkbox' checked>\u003clabel for='s5'>Cross-station \"All\" view, busiest-section-first sorting, 🔥 overload badge\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s6' type='checkbox' checked>\u003clabel for='s6'>Manual \"+ New Section\" / \"+ Add dish\" — no photo needed\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s7' type='checkbox' checked>\u003clabel for='s7'>AI prep-sheet scan (photo or PDF)\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s8' type='checkbox' checked>\u003clabel for='s8'>Hide or delete an item, a dish, or a whole section\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s9' type='checkbox' checked>\u003clabel for='s9'>🛒 Order button on every item\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s10' type='checkbox' checked>\u003clabel for='s10'>Notes field, sticky header, swipe-back gesture\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s11' type='checkbox' checked>\u003clabel for='s11'>Renamed to \"Check List\", all data translated to English\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\n\u003ch3 class=\"sub\">Recipes\u003c/h3>\n\u003cdiv class='task'>\u003cinput id='s12' type='checkbox' checked>\u003clabel for='s12'>Full 20-field recipe format — all 173 original recipes migrated\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s13' type='checkbox' checked>\u003clabel for='s13'>AI photo-scan import + \"Generate method with AI\"\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s14' type='checkbox' checked>\u003clabel for='s14'>Cost + nutrition engine with per-ingredient breakdown\u003c/label>\u003cspan class=\"tag me\">JA\u003c/s
