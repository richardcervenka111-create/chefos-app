tro guide was slimmed on 17 Jul to just the welcome + Home — feature details were taken over by per-screen tutorials. Opens by itself on first sign-in, again via ❓ on Home. No admin content for regular members; + a guide to putting Sautero on the phone\\'s home screen as an app.', status:'ok', desc:'Úvodný sprievodca sa 17.7. zoštíhlil len na privítanie + hlavnú plochu (Home) — detaily jednotlivých funkcií prevzali tutoriály priamo v ich obrazovkách. Otvára sa sám pri prvom prihlásení, znova cez ❓ na Home. Bez admin obsahu pre bežných členov; + návod, ako si dať Sautero na plochu telefónu ako appku.' },\n    { name:'Vždy viditeľný hlavičkový pás', name_en:'Always-visible header strip', desc_en:'The Kitchen Notebook / Sautero strip with Back and Home buttons on every screen except the main menu — Home also always scrolls to a clean top of the page.', status:'test', desc:'Kitchen Notebook / Sautero pás s tlačidlami Späť a Domov na každej obrazovke okrem hlavného menu — Domov navyše vždy vyroluje čistý vrch stránky.' },\n  ]},\n  { icon:'🔐', title:'Bezpečnosť a súkromie', title_en:'Security & privacy', items:[\n    { name:'Invite-only prístup + schvaľovanie', name_en:'Invite-only access + approval', desc_en:'No self-registration — only by invite (QR/link/email) and after approval. A \"coming soon\" wall for random visitors.', status:'ok', desc:'Do appky sa nedá samoregistrovať — len pozvánkou (QR/link/email) a po schválení. \"Coming soon\" stena pre náhodných návštevníkov.' },\n    { name:'Confidentiality + Privacy brány', name_en:'Confidentiality + Privacy gates', desc_en:'On first sign-in (and after every version change) everyone must accept confidentiality and data protection (GDPR/nDSG) — with the option to decline and sign out.', status:'test', desc:'Pri prvom prihlásení (a po každej zmene verzie) musí každý odsúhlasiť mlčanlivosť a ochranu osobných údajov (GDPR/nDSG) — s možnosťou nesúhlasiť a odhlásiť sa.' },\n    { name:'RLS izolácia dát per kuchyňa', name_en:'RLS data isolation per kitchen', desc_en:'Every database table carries security rules — one kitchen never sees another\\'s data, and even your own admin can\\'t see personal data. Checked by an automatic audit on every commit.', status:'ok', desc:'Každá tabuľka v databáze má bezpečnostné pravidlá — dáta jednej kuchyne druhá nikdy nevidí, a osobné dáta nevidí ani vlastný admin. Kontrolované automatickým auditom pri každom commite.' },\n    { name:'Branded auth emaily', name_en:'Branded auth emails', desc_en:'Sign-in and confirmation emails arrive in the Sautero identity (navy/teal, own domain) instead of the generic Supabase look. Rebranded to Sautero incl. sender name 18 Jul.', status:'test', desc:'Prihlasovacie a potvrdzovacie emaily prichádzajú v Sautero identite (navy/teal, vlastná doména) namiesto generického Supabase vzhľadu.' },\n    { name:'Trvalé opravy incidentov (db/118, 121–125)', name_en:'Permanent incident fixes (db/118, 121–125)', desc_en:'Three security incidents from 16 Jul (a burned admin invite, broken Remove, an account locked out after remove) — each fixed structurally, not patched, and recorded in HEALTH_LOG.md with the lesson.', status:'ok', desc:'Tri bezpečnostné incidenty zo 16.7. (spálená admin pozvánka, nefunkčný Remove, zamknutý účet po remove) — každý opravený štrukturálne, nie záplatou, a zapísaný v HEALTH_LOG.md aj s ponaučením.' },\n    { name:'/security dokumenty pre právnika', name_en:'/security documents for the lawyer', desc_en:'A folder with the security review and materials for the legal consultation before the trial.', status:'test', desc:'Priečinok s bezpečnostným review a podkladmi pre právnu konzultáciu pred trialom.' },\n    { name:'legal.html — aktualizácia (heslo, GPS)', name_en:'legal.html — update (password, GPS)', desc_en:'The 16 Jul audit found two outdated claims: the document says \"no passwords\" (a password is mandatory since 15 Jul) and doesn\\'t mention the GPS snapshot at check-in/out. The text fix is pending — mandatory before the trial.', status:'plan', desc:'Audit 16.7. našiel dve zastarané tvrdenia: dokument tvrdí \"žiadne heslá\" (heslo je povinné od 15.7.) a nespomína GPS snímku pri check-in/out. Oprava textu čaká — pred trialom povinná.' },\n    { name:'Platobná brána, faktúry', name_en:'Payment gateway, invoices', desc_en:'Manual invoices at the start (up to ~20 kitchens), a payment gateway only after — a conscious decision from the monetisation plan.', status:'plan', desc:'Na štart ručné faktúry (do ~20 kuchýň), platobná brána až potom — vedomé rozhodnutie z monetizačného plánu.' },\n    { name:'Einzelfirma / GmbH registrácia', name_en:'Sole proprietorship / GmbH registration', desc_en:'The legal form for invoicing: first Einzelfirma/AHV (first-revenue blocker, due 20 Jul), GmbH only after the first real revenue.', status:'plan', desc:'Právna forma na fakturáciu: najprv Einzelfirma/AHV (blokátor prvého príjmu, termín 20.7.), GmbH až po prvých reálnych tržbách.' },\n  ]},\n];\n\n/* Status filters — counts in the legend and pulse strip always reflect the FULL list, so\n   toggling a filter never makes the totals lie; only the cards below get filtered. */\nconst activeStatuses = new Set(['ok','test','plan']);\nlet showAdminOnly = false;\nfunction toggleStatusFilter(status){\n  if(activeStatuses.has(status)){\n    if(activeStatuses.size === 1) return; // never allow an empty page\n    activeStatuses.delete(status);\n  } else {\n    activeStatuses.add(status);\n  }\n  document.getElementById('legendOk').classList.toggle('active', activeStatuses.has('ok'));\n  document.getElementById('legendTest').classList.toggle('active', activeStatuses.has('test'));\n  document.getElementById('legendPlan').classList.toggle('active', activeStatuses.has('plan'));\n  renderModules();\n}\nfunction toggleAdminOnlyFilter(){\n  showAdminOnly = !showAdminOnly;\n  document.getElementById('legendAdmin').classList.toggle('active', showAdminOnly);\n  renderModules();\n}\n/* t174 (18.7.): bilingual feature map. Every item may carry name_en/desc_en (+ module\n   title_en); the EN view uses them, missing ones fall back to SK so a half-translated\n   state never breaks. New/edited features MUST be added with both languages. */\nfunction FN(it){ return (_lang==='en' && it.name_en) ? it.name_en : it.name; }\nfunction FD(it){ return (_lang==='en' && it.desc_en) ? it.desc_en : (it.desc || ''); }\nfunction MT(mod){ return (_lang==='en' && mod.title_en) ? mod.title_en : mod.title; }\nfunction renderModules(){\n  const wrap = document.getElementById('modulesWrap');\n  const acct = document.getElementById('acctPersonalBtn').classList.contains('active') ? 'personal' : 'company';\n  let ok=0, test=0, plan=0, adminTotal=0;\n  wrap.innerHTML = MODULES.map((mod, mi)=>{\n    const cards = mod.items.map((it, ii)=>{\n      if(it.status==='ok') ok++; else if(it.status==='test') test++; else plan++;\n      if(it.role==='admin') adminTotal++;\n      if(showAdminOnly && it.role!=='admin') return null;\n      if(!activeStatuses.has(it.status)) return null;\n      const dimmed = it.acct && it.acct !== acct;\n      return `\n        \u003cdiv class=\"feature-card status-${it.status}${dimmed?' dim':''}\" onclick=\"openFeatureModal(${mi},${ii})\">\n          \u003cdiv class=\"fname\">\u003cspan class=\"status-dot ${it.status}\">\u003c/span>${FN(it)}\u003c/div>\n          \u003cdiv style=\"display:flex; gap:5px; flex-wrap:wrap;\">\n            ${it.acct ? `\u003cspan class=\"acct-tag ${it.acct}\">${it.acct === 'personal' ? 'Personal' : 'Company'}\u003c/span>` : ''}\n            ${it.role==='admin' ? `\u003cspan class=\"acct-tag\" style=\"background:var(--gold-wash); color:var(--gold);\">🛡️ Kitchen Admin\u003c/span>` : ''}\n          \u003c/div>\n        \u003c/div>\n      `;\n    }).filter(Boolean);\n    if(!cards.length) return '';\n    return `\n      \u003cdiv class=\"module\">\n        \u003cdiv class=\"module-head\">\n          \u003cdiv class=\"module-icon\">${mod.icon}\u003c/div>\n          \u003cdiv class=\"module-title\">${MT(mod)}\u003c/div>\n          \u003cdiv class=\"module-count\">${cards.length}${cards.length !== mod.items.length ? ' / ' + mod.items.length : ''} ${_lang==='sk'?'funkcií':'features'}\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"feature-grid\">${cards.join('')}\u003c/div>\n      \u003c/div>\n    `;\n  }).join('');\n  document.getElementById('pulseOk').textContent = ok;\n  document.getElementById('pulseTest').textContent = test;\n  document.getElementById('pulsePlan').textContent = plan;\n  document.getElementById('pulseTotal').textContent = ok+test+plan;\n  document.getElementById('legendOkCount').textContent = ok;\n  document.getElementById('legendTestCount').textContent = test;\n  document.getElementById('legendPlanCount').textContent = plan;\n  document.getElementById('legendAdminCount').textContent = adminTotal;\n  renderDonut(ok, test, plan);\n}\n/* Interactive donut (Richard, 17.7.) — same data as the pulse strip, same toggles as the\n   legend: clicking a segment filters the list, clicking the center total resets all three. */\nfunction renderDonut(ok, test, plan){\n  const svg = document.getElementById('featureDonut');\n  if(!svg) return;\n  const total = ok + test + plan;\n  const R = 44, C = 2 * Math.PI * R;\n  const segs = [\n    { key:'ok',   val:ok,   color:'var(--ok)' },\n    { key:'test', val:test, color:'var(--test)' },\n    { key:'plan', val:plan, color:'var(--plan)' },\n  ];\n  let off = 0;\n  const circles = segs.map(s=>{\n    const frac = total ? s.val / total : 0;\n    const c = `\u003ccircle class=\"seg${activeStatuses.has(s.key) ? '' : ' off'}\" cx=\"60\" cy=\"60\" r=\"${R}\"\n      fill=\"none\" stroke=\"${s.color}\" stroke-width=\"17\"\n      stroke-dasharray=\"${(frac*C).toFixed(2)} ${(C-frac*C).toFixed(2)}\"\n      stroke-dashoffset=\"${(-off*C).toFixed(2)}\" transform=\"rotate(-90 60 60)\"\n      onclick=\"toggleStatusFilter('${s.key}')\">\u003ctitle>${s.val} funkcií — klikni pre filter\u003c/title>\u003c/circle>`;\n    off += frac;\n    return c;\n  }).join('');\n  // Center number follows the FILTER (Richard, 18.7.): with a segment toggled off it shows\n  // the sum of the segments still on, not the grand total; label flips to say it's filtered.\n  const filtered = activeStatuses.size \u003c 3;\n  const shown = segs.filter(s=>activeStatuses.has(s.key)).reduce((a,s)=>a + s.val, 0);\n  svg.innerHTML = circles +\n    `\u003ctext class=\"center-num\" x=\"60\" y=\"58\" text-anchor=\"middle\" onclick=\"resetStatusFilters()\">${filtered ? shown : total}\u003c/text>` +\n    `\u003ctext class=\"center-lbl\" x=\"60\" y=\"72\" text-anchor=\"middle\">${filtered ? (_lang==='sk'?'vo filtri':'in filter') : (_lang==='sk'?'funkcií spolu':'features total')}\u003c/text>`;\n}\nfunction resetStatusFilters(){\n  ['ok','test','plan'].forEach(s=>activeStatuses.add(s));\n  document.getElementById('legendOk').classList.add('active');\n  document.getElementById('legendTest').classList.add('active');\n  document.getElementById('legendPlan').classList.add('active');\n  renderModules();\n}\nfunction setAcctView(type){\n  document.getElementById('acctPersonalBtn').classList.toggle('active', type==='personal');\n  document.getElementById('acctCompanyBtn').classList.toggle('active', type==='company');\n  renderModules();\n}\n\n/* Detail modal (Richard, 17.7.) — tap a card, read what the feature actually does. */\nconst STATUS_LABELS_I18N = {\n  sk: { ok:'Funkčné, otestované naživo', test:'Postavené, čaká na test naživo', plan:'Naplánované, ešte nepostavené' },\n  en: { ok:'Working, verified live', test:'Built, awaiting live test', plan:'Planned, not built yet' },\n};\nconst STATUS_LABELS = new Proxy({}, { get: (_, k) => STATUS_LABELS_I18N[_lang][k] });\nfunction openFeatureModal(mi, ii){\n  const mod = MODULES[mi], it = mod.items[ii];\n  document.getElementById('mModule').textContent = mod.icon + ' ' + mod.title;\n  document.getElementById('mName').textContent = FN(it);\n  const st = document.getElementById('mStatus');\n  st.className = 'm-status ' + it.status;\n  st.textContent = STATUS_LABELS[it.status];\n  document.getElementById('mDesc').textContent = FD(it);\n  document.getElementById('mTags').innerHTML =\n    (it.acct ? `\u003cspan class=\"acct-tag ${it.acct}\">${it.acct === 'personal' ? 'Len Personal účty' : 'Len Company účty'}\u003c/span>` : '') +\n    (it.role==='admin' ? `\u003cspan class=\"acct-tag\" style=\"background:var(--gold-wash); color:var(--gold);\">🛡️ Len Kitchen Admin\u003c/span>` : '');\n  document.getElementById('modalBackdrop').classList.add('open');\n}\nfunction closeFeatureModal(){\n  document.getElementById('modalBackdrop').classList.remove('open');\n}\ndocument.addEventListener('keydown', e=>{ if(e.key === 'Escape') closeFeatureModal(); });\n\n/* SK/EN toggle (Richard, 17.7.) — shared sautero_doc_lang key across every /visual data/ doc.\n   Chrome is bilingual; feature names/descs stay Slovak for now (honest boundary, noted in the\n   EN lede). */\nlet _lang = localStorage.getItem('sautero_doc_lang') || 'sk';\nfunction applyLang(){\n  document.querySelectorAll('[data-sk]').forEach(el=>{\n    el.textContent = _lang === 'sk' ? el.getAttribute('data-sk') : (el.getAttribute('data-en') || el.getAttribute('data-sk'));\n  });\n  document.getElementById('pageTitle').innerHTML = _lang === 'sk'\n    ? 'Čo \u003cem>Sautero\u003c/em> vie dnes'\n    : 'What \u003cem>Sautero\u003c/em> can do today';\n  document.getElementById('pageLede').innerHTML = _lang === 'sk'\n    ? 'Kompletný zoznam funkcií appky, s reálnym stavom každej jednej. \u003cb style=\"color:var(--ink);\">Klikni na hociktorú funkciu\u003c/b> a otvorí sa okno s vysvetlením, čo presne robí. Toggle hore prepína pohľad presne ako v appke — veci iba pre Personal alebo iba pre Company účty sa podľa toho stlmia.'\n    : 'The complete list of app features, each with its real status. \u003cb style=\"color:var(--ink);\">Click any feature\u003c/b> to open an explanation of exactly what it does. The toggle above switches the view like in the app — Personal-only or Company-only items dim accordingly. \u003ci>(Feature names &amp; descriptions stay in Slovak for now.)\u003c/i>';\n  document.getElementById('langBtn').textContent = _lang === 'sk' ? 'EN' : 'SK';\n  document.documentElement.lang = _lang;\n}\nfunction toggleLang(){\n  _lang = _lang === 'sk' ? 'en' : 'sk';\n  localStorage.setItem('sautero_doc_lang', _lang);\n  applyLang();\n  renderModules();\n}\n\napplyLang();\nsetAcctView('personal');\n\u003c/script>\n\u003c/body>\n\u003c/html>\n", "\u003c!DOCTYPE html>\n\u003chtml lang=\"sk\">\n\u003chead>\n\u003cmeta charset=\"UTF-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n\u003cmeta http-equiv=\"Cache-Control\" content=\"no-cache, no-store, must-revalidate\">\n\u003cmeta http-equiv=\"Pragma\" content=\"no-cache\">\n\u003cmeta http-equiv=\"Expires\" content=\"0\">\n\u003ctitle>Sautero — Kontrolný zoznam\u003c/title>\n\u003cstyle>\n  :root{\n    --bg:#0A1A2F; --paper:#122845; --paper-raised:#0f2340;\n    --ink:#fff; --ink-dim:#9C949E; --ink-faint:rgba(156,148,158,0.6);\n    --rule:#223d57; --accent:#34F7D7; --accent-dim:rgba(52,247,215,0.4);\n    --gold:#F7C948; --gold-dim:rgba(247,201,72,0.4);\n    --danger:#FF7A68; --danger-dim:rgba(255,122,104,0.4);\n    --shadow:0 8px 28px rgba(0,0,0,0.45);\n  }\n  *{ box-sizing:border-box; }\n  html,body{ margin:0; padding:0; }\n  body{\n    background:var(--bg); color:var(--ink);\n    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;\n    -webkit-font-smoothing:antialiased; line-height:1.5;\n  }\n  .wrap{ max-width:900px; margin:0 auto; padding:0 20px 100px 20px; }\n  a{ color:inherit; }\n\n  /* ---------- Hero / sticky top ---------- */\n  header.hero{\n    position:sticky; top:0; z-index:50; background:var(--bg);\n    padding:20px 0 22px 0; border-bottom:1px solid var(--rule);\n  }\n  .topline{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }\n  .brandmark{ display:flex; align-items:center; gap:9px; }\n  .brandmark .word{ font-size:14px; font-weight:700; letter-spacing:0.02em; color:var(--accent); }\n  .lang-toggle{\n    background:var(--paper); border:1px solid var(--rule); color:var(--ink-dim);\n    font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;\n    padding:6px 12px; border-radius:20px; cursor:pointer; transition:border-color .15s, color .15s;\n  }\n  .lang-toggle:hover{ border-color:var(--accent-dim); color:var(--accent); }\n  .kicker{ color:var(--accent); font-size:11px; letter-spacing:0.16em; text-transform:uppercase; font-weight:700; margin-bottom:8px; }\n  h1.title{ font-size:26px; font-weight:700; margin:0 0 16px 0; line-height:1.15; }\n\n  .stat-row{ display:flex; align-items:center; gap:18px; }\n  .pie{ width:66px; height:66px; border-radius:50%; background:conic-gradient(var(--accent) 0deg,var(--paper-raised) 0deg); flex:none; position:relative; transition:background .4s; }\n  .pie::after{ content:''; position:absolute; inset:8px; border-radius:50%; background:var(--bg); }\n  .pieLabel{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:var(--accent); font-variant-numeric:tabular-nums; }\n  .stat-cards{ display:flex; gap:10px; flex:1; flex-wrap:wrap; }\n  .stat-card{ background:var(--paper); border:1px solid var(--rule); border-radius:12px; padding:8px 14px; }\n  .stat-card .v{ font-family:\"SF Mono\",Menlo,monospace; font-size:15px; font-weight:700; font-variant-numeric:tabular-nums; }\n  .stat-card .k{ font-size:10px; text-transform:uppercase; letter-spacing:0.07em; color:var(--ink-dim); }\n  .bar{ height:8px; background:var(--paper-raised); border-radius:99px; overflow:hidden; margin-top:14px; }\n  .fill{ height:100%; width:0; background:var(--accent); transition:width .4s; }\n\n  /* ---------- Section groups (collapsible) ---------- */\n  details.group{ margin-top:18px; background:var(--paper); border:1px solid var(--rule); border-radius:16px; overflow:hidden; }\n  details.group summary{\n    list-style:none; cursor:pointer; padding:16px 18px; font-size:15px; font-weight:700; color:var(--ink);\n    display:flex; align-items:center; gap:10px; user-select:none;\n  }\n  details.group summary::-webkit-details-marker{ display:none; }\n  details.group summary::after{ content:'▶'; margin-left:auto; font-size:11px; color:var(--ink-dim); transition:transform .15s; }\n  details.group[open] summary::after{ transform:rotate(90deg); }\n  details.group summary .count{ font-size:11px; font-weight:700; color:var(--ink-dim); background:var(--paper-raised); border:1px solid var(--rule); padding:2px 9px; border-radius:20px; }\n  .group-body{ padding:2px 14px 14px 14px; }\n\n  h3.sub{ color:var(--ink-dim); text-transform:uppercase; font-size:10.5px; letter-spacing:0.09em; font-weight:700; margin:16px 6px 6px 6px; }\n  h3.sub:first-child{ margin-top:6px; }\n\n  /* ---------- Task rows ---------- */\n  .task{ display:flex; gap:11px; align-items:flex-start; padding:9px 8px; border-radius:10px; transition:background .12s; }\n  .task:hover{ background:var(--paper-raised); }\n  .task input[type=\"checkbox\"]{\n    appearance:none; -webkit-appearance:none; width:20px; height:20px; border-radius:6px;\n    border:1.5px solid var(--rule); background:var(--paper-raised); flex:none; margin-top:1px;\n    cursor:pointer; position:relative; transition:border-color .12s, background .12s;\n  }\n  .task input[type=\"checkbox\"]:checked{ background:var(--accent); border-color:var(--accent); }\n  .task input[type=\"checkbox\"]:checked::after{\n    content:''; position:absolute; left:6px; top:2px; width:5px; height:10px;\n    border:solid var(--bg); border-width:0 2px 2px 0; transform:rotate(45deg);\n  }\n  .task label{ flex:1; font-size:13.5px; color:var(--ink); line-height:1.5; }\n  .task.you-row{ background:rgba(247,201,72,0.07); }\n  .task.you-row:hover{ background:rgba(247,201,72,0.12); }\n  .note{ font-size:11px; color:var(--ink-dim); margin-top:3px; display:block; line-height:1.5; }\n  .tag{ font-size:9.5px; font-weight:700; letter-spacing:0.05em; padding:3px 8px; border-radius:99px; flex:none; margin-top:1px; }\n  .tag.me{ background:rgba(52,247,215,0.14); color:var(--accent); border:1px solid var(--accent-dim); }\n  .tag.you{ background:rgba(247,201,72,0.14); color:var(--gold); border:1px solid var(--gold-dim); }\n\n  /* ---------- Timeline ---------- */\n  .timeline-heading{ font-size:15px; font-weight:700; color:var(--ink); display:flex; align-items:center; gap:8px; padding:16px 18px; }\n  .month-block{ border-top:1px solid var(--rule); }\n  .month-block:first-child{ border-top:none; }\n  .month-head{ padding:12px 18px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; user-select:none; }\n  .month-head:hover{ background:var(--paper-raised); }\n  .month-name{ font-size:14px; font-weight:700; }\n  .month-meta{ font-size:11px; color:var(--ink-dim); display:flex; align-items:center; gap:6px; }\n  .month-body{ display:none; padding:0 18px 12px 18px; }\n  .month-block.open>.month-body{ display:block; }\n  .month-block.open>.month-head .chev{ transform:rotate(90deg); }\n  .chev{ display:inline-block; transition:transform .15s ease; color:var(--ink-dim); font-size:10px; }\n  .week-block{ border:1px solid var(--rule); border-radius:12px; margin-top:8px; background:var(--paper-raised); overflow:hidden; }\n  .week-head{ padding:10px 13px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; user-select:none; }\n  .week-head:hover{ background:rgba(255,255,255,0.03); }\n  .week-name{ font-size:12px; font-weight:700; }\n  .week-meta{ font-size:10.5px; color:var(--ink-dim); display:flex; align-items:center; gap:6px; }\n  .week-body{ display:none; padding:0 13px 10px 13px; }\n  .week-block.open .week-body{ display:block; }\n  .week-block.open .chev{ transform:rotate(90deg); }\n  .day-row{ border-top:1px solid var(--rule); }\n  .day-row:first-child{ border-top:none; }\n  .day-head{ padding:9px 2px; cursor:pointer; display:flex; align-items:center; gap:8px; user-select:none; }\n  .day-head:hover .day-title{ color:var(--accent); }\n  .day-date{ font-size:10.5px; color:var(--ink-dim); min-width:78px; flex:none; font-variant-numeric:tabular-nums; }\n  .day-title{ font-size:12.5px; flex:1; color:var(--ink); }\n  .day-body{ display:none; padding:2px 2px 12px 2px; }\n  .day-row.open .day-body{ display:block; }\n  .day-row.open .chev{ transform:rotate(90deg); }\n  .accomplished-list{ list-style:none; margin:6px 0 0 86px; padding:0; }\n  .accomplished-list li{ font-size:11.5px; color:var(--ink-dim); line-height:1.65; padding:3px 0; position:relative; padding-left:16px; }\n  .accomplished-list li::before{ content:'✓'; position:absolute; left:0; color:var(--accent); }\n\n  footer.foot{ text-align:center; font-size:11px; color:var(--ink-faint); padding:36px 0 10px 0; }\n\n  /* ---------- Charts (Richard, 17.7.: pace + feature status over time) ---------- */\n  .chart-card{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:16px 18px 14px 18px; margin-bottom:14px; }\n  .chart-card h3.sub{ margin:0 0 12px 0; }\n  .chart-scroll{ overflow-x:auto; scrollbar-width:thin; }\n  .chart-note{ font-size:11.5px; color:var(--ink-faint); margin:10px 0 0 0; line-height:1.5; }\n  .chart-scroll svg text{ font-family:\"SF Mono\",Menlo,monospace; }\n  .chart-scroll .bar{ cursor:pointer; }\n  .chart-scroll .bar:hover{ opacity:.8; }\n  .day-row.flash > .day-head{ background:rgba(52,247,215,0.12); border-radius:8px; }\n\n  /* ---------- Search + filters (2026-07-15 Visual Data Standards redesign) ---------- */\n  .controls{ display:flex; align-items:center; gap:8px; margin-top:12px; flex-wrap:wrap; }\n  #taskSearch{\n    flex:1; min-width:150px; background:var(--paper); border:1px solid var(--rule); border-radius:20px;\n    color:var(--ink); font-family:inherit; font-size:12px; padding:6px 14px; outline:none;\n  }\n  #taskSearch::placeholder{ color:var(--ink-faint); }\n  #taskSearch:focus{ border-color:var(--accent-dim); }\n  .fbtn{\n    background:var(--paper); border:1px solid var(--rule); color:var(--ink-dim);\n    font-size:10.5px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase;\n    padding:5px 11px; border-radius:20px; cursor:pointer; transition:border-color .15s, color .15s; white-space:nowrap;\n  }\n  .fbtn:hover{ border-color:var(--accent-dim); }\n  .fbtn.on{ border-color:var(--accent); color:var(--accent); background:rgba(52,247,215,0.08); }\n  .fbtn.on.f-you{ border-color:var(--gold); color:var(--gold); background:rgba(247,201,72,0.1); }\n  .task.filtered-out{ display:none; }\n  h3.sub.filtered-out{ display:none; }\n  details.group.filtered-out{ display:none; }\n  summary .gcount{ font-size:11px; font-weight:700; color:var(--ink-dim); background:var(--paper-raised); border:1px solid var(--rule); padding:2px 9px; border-radius:20px; font-family:\"SF Mono\",Menlo,monospace; }\n\n  /* ---------- Sautero stamp + language fab (Richard, 15.7.: every /visual data/ document\n     carries a last-updated-to-Sautero-state badge and an SK/EN toggle) ---------- */\n  .sautero-stamp{\n    position:fixed; bottom:14px; right:14px; z-index:90;\n    background:rgba(15,35,64,0.92); border:1px solid rgba(52,247,215,0.4); color:#34F7D7;\n    font-size:10.5px; font-weight:700; font-family:\"SF Mono\",Menlo,Consolas,monospace;\n    padding:6px 12px; border-radius:999px;\n    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); pointer-events:none;\n  }\n  .sautero-lang-fab{\n    position:fixed; bottom:14px; left:14px; z-index:90;\n    background:rgba(15,35,64,0.92); border:1px solid #223d57; color:#9C949E;\n    font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;\n    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;\n    padding:7px 14px; border-radius:999px; cursor:pointer;\n    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);\n    transition:border-color .15s, color .15s;\n  }\n  .sautero-lang-fab:hover{ border-color:rgba(52,247,215,0.4); color:#34F7D7; }\n  @media print{ .sautero-stamp, .sautero-lang-fab{ display:none; } }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\u003cdiv class=\"wrap\">\n\n\u003cheader class=\"hero\">\n  \u003cdiv class=\"topline\">\n    \u003cdiv class=\"brandmark\">\n      \u003csvg width=\"20\" height=\"20\" viewBox=\"0 0 68 68\">\u003cpath d=\"M 46.8 42.3 A 18 18 0 1 1 46.8 21.7\" fill=\"none\" stroke=\"#34F7D7\" stroke-width=\"7\" stroke-linecap=\"round\"/>\u003ccircle cx=\"34\" cy=\"34\" r=\"3\" fill=\"#34F7D7\"/>\u003c/svg>\n      \u003cspan class=\"word\">Sautero\u003c/span>\n    \u003c/div>\n    \u003cbutton class=\"lang-toggle\" id=\"langBtn\" onclick=\"toggleLang()\">EN\u003c/button>\n  \u003c/div>\n  \u003cdiv class=\"kicker\" data-sk=\"Kontrolný zoznam · Kuchynský denník\" data-en=\"Task List · Kitchen Journal\">\u003c/div>\n  \u003cdiv style=\"display:flex; align-items:flex-start; justify-content:space-between; gap:12px;\">\n    \u003ch1 class=\"title\" data-sk=\"Čo je hotové, čo prichádza\" data-en=\"What's shipped, what's next\">\u003c/h1>\n    \u003c!-- Hide/show the hero details (Richard, 17.7.): on a phone the donut + stats + filters eat\n         the whole first screen — this rolls them up; remembered per device. -->\n    \u003cbutton class=\"fbtn\" id=\"heroToggle\" onclick=\"toggleHero()\" style=\"flex:none; margin-top:8px;\">\u003c/button>\n  \u003c/div>\n  \u003cdiv id=\"heroDetails\">\n  \u003cdiv class=\"stat-row\">\n    \u003cdiv class=\"pie\" id=\"pie\">\u003cdiv class=\"pieLabel\" id=\"pieLabel\">0%\u003c/div>\u003c/div>\n    \u003cdiv class=\"stat-cards\">\n      \u003cdiv class=\"stat-card\">\u003cdiv class=\"v\" id=\"done\">–\u003c/div>\u003cdiv class=\"k\" data-sk=\"Hotovo\" data-en=\"Done\">\u003c/div>\u003c/div>\n      \u003cdiv class=\"stat-card\">\u003cdiv class=\"v\" id=\"left\">–\u003c/div>\u003cdiv class=\"k\" data-sk=\"Zostáva\" data-en=\"Remaining\">\u003c/div>\u003c/div>\n      \u003cdiv class=\"stat-card\">\u003cdiv class=\"v\" id=\"pct\">–\u003c/div>\u003cdiv class=\"k\" data-sk=\"Celkovo\" data-en=\"Overall\">\u003c/div>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n  \u003cdiv class=\"bar\">\u003cdiv class=\"fill\" id=\"fill\">\u003c/div>\u003c/div>\n  \u003cdiv class=\"controls\">\n    \u003cinput id=\"taskSearch\" type=\"search\" placeholder=\"Hľadať…\" oninput=\"applyFilters()\">\n    \u003cbutton class=\"fbtn\" id=\"fOpen\" onclick=\"toggleFilter('open')\" data-sk=\"⏳ Len otvorené\" data-en=\"⏳ Open only\">\u003c/button>\n    \u003cbutton class=\"fbtn\" id=\"fMe\" onclick=\"toggleFilter('me')\" data-sk=\"🤖 JA\" data-en=\"🤖 ME\">\u003c/button>\n    \u003cbutton class=\"fbtn f-you\" id=\"fYou\" onclick=\"toggleFilter('you')\" data-sk=\"👨‍🍳 TY\" data-en=\"👨‍🍳 YOU\">\u003c/button>\n  \u003c/div>\n  \u003c/div>\u003c!-- /heroDetails -->\n\u003c/header>\n\n\u003cdetails class=\"group\" open id=\"chartsSection\">\n  \u003csummary>\u003cspan data-sk=\"📊 Grafy\" data-en=\"📊 Charts\">\u003c/span>\u003cspan class=\"count\" data-sk=\"tempo deň po dni + stav funkcií v čase\" data-en=\"day-by-day pace + feature status over time\">\u003c/span>\u003c/summary>\n  \u003cdiv class=\"group-body\">\n    \u003c!-- Work-hours meter (Richard, 17.7.; 22.7. rebuilt) — real hours from the Claude Code session\n         logs (scripts/work_hours.py, every second the app was open), no estimates. Auto-updated. -->\n    \u003cdiv class=\"chart-card\" id=\"workHoursCard\">\u003c/div>\n    \u003cdiv class=\"chart-card\">\n      \u003ch3 class=\"sub\" data-sk=\"Hotové tásky za deň (+ odpracované hodiny) — klikni na stĺpec a otvorí sa ten deň v časovej osi\" data-en=\"Tasks shipped per day (+ hours worked) — click a bar to open that day in the timeline\">\u003c/h3>\n      \u003cdiv id=\"tasksPerDayChart\" class=\"chart-scroll\">\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"chart-card\">\n      \u003ch3 class=\"sub\" data-sk=\"Funkcie v čase — funkčné / čaká na test / naplánované / spolu\" data-en=\"Features over time — working / awaiting test / planned / total\">\u003c/h3>\n      \u003cdiv id=\"featuresOverTimeChart\" class=\"chart-scroll\">\u003c/div>\n      \u003cp class=\"chart-note\" data-sk=\"Reálny čas z Claude Code session logov — každá sekunda, keď bola appka otvorená (aktívne okno; prestávky nad 30 min sa nepočítajú), od 8. 7. 2026. Žiadne odhady.\" data-en=\"Real time from the Claude Code session logs — every second the app was open (the active window; breaks over 30 min are not counted), since Jul 8, 2026. No estimates.\">\u003c/p>\n    \u003c/div>\n  \u003c/div>\n\u003c/details>\n\n\u003cdetails class=\"group\" open id=\"timelineSection\">\n  \u003csummary>\u003cspan data-sk=\"🗓️ Časová os\" data-en=\"🗓️ Timeline\">\u003c/span>\u003cspan class=\"count\" data-sk=\"čo bolo hotové, v ktorý deň\" data-en=\"what shipped, on which day\">\u003c/span>\u003c/summary>\n  \u003cdiv id=\"timelineRoot\">\u003c/div>\n\u003c/details>\n\n\u003cdetails class=\"group\" open>\u003csummary>\u003cspan data-sk=\"✅ Hotovo\" data-en=\"✅ Shipped so far\">\u003c/span>\u003c/summary>\u003cdiv class=\"group-body\">\n\n\u003ch3 class=\"sub\">🆕 Najnovšie (16.–17. 7.) — plný detail vo feature_status.html\u003c/h3>\n\u003cdiv class='task'>\u003cinput id='r1' type='checkbox' checked>\u003clabel for='r1'>🔐 Bezpečnostná kontrola celého projektu (17.7.): privátny bucket na zmluvy (db/134), cross-kitchen XSS escapery, trvalé poistky v auditoch, live DB health check čistý\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='r2' type='checkbox' checked>\u003clabel for='r2'>🌍 Verejné police Public (recepty + ingrediencie) naprieč kuchyňami + publikovanie 🌍/priateľom, per-recept aj per-ingredienciu; cudzí obsah read-only (db/131–138)\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='r3' type='checkbox' checked>\u003clabel for='r3'>🤝 Zdieľanie s priateľmi + Chef Friends → profil priateľa (recepty aj ingrediencie); z Company profilu sa zdieľať nedá nič (appka + DB trigger)\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='r4' type='checkbox' checked>\u003clabel for='r4'>🧾 Invoice Scan v2: rozpozná dodávateľa z hlavičky, nové pole Dodávateľ (db/137); oba skeny prekladajú do jazyka z nastavenia, originál ako alias\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='r5' type='checkbox' checked>\u003clabel for='r5'>💬 Zdieľané komentáre naprieč kuchyňami + počítadlo/bublinka (db/129); firemný recept už nikdy na osobnej polici (db/130)\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='r6' type='checkbox' checked>\u003clabel for='r6'>🎓 Podrobný tutoriál pre každé okno (❓ v lište) + zoštíhlený úvod; What's New zmazané\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='r7' type='checkbox' checked>\u003clabel for='r7'>🧂 Ingredient police skrývateľné (nie zmazateľné) + 8 farebných kníh; ikony do dvoch riadkov; 📧 Email Contacts číslované + detail; Feedback iba Head Admin\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\n\u003ch3 class=\"sub\">Check List\u003c/h3>\n\u003cdiv class='task'>\u003cinput id='s1' type='checkbox' checked>\u003clabel for='s1'>Dish-grouped prep sheets across all 8 stations (real menus + Richard-approved provisional ones)\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s2' type='checkbox' checked>\u003clabel for='s2'>On-hand stock count, min-required, 🚩 flag (priority-1 only)\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s3' type='checkbox' checked>\u003clabel for='s3'>TO DO / CHECK / FINISH / DON'T DO status + per-stage time fields\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s4' type='checkbox' checked>\u003clabel for='s4'>Real crowd-sourced prep times — tap the clock, values average together\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s5' type='checkbox' checked>\u003clabel for='s5'>Cross-station \"All\" view, busiest-section-first sorting, 🔥 overload badge\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s6' type='checkbox' checked>\u003clabel for='s6'>Manual \"+ New Section\" / \"+ Add dish\" — no photo needed\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s7' type='checkbox' checked>\u003clabel for='s7'>AI prep-sheet scan (photo or PDF)\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s8' type='checkbox' checked>\u003clabel for='s8'>Hide or delete an item, a dish, or a whole section\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s9' type='checkbox' checked>\u003clabel for='s9'>🛒 Order button on every item\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s10' type='checkbox' checked>\u003clabel for='s10'>Notes field, sticky header, swipe-back gesture\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s11' type='checkbox' checked>\u003clabel for='s11'>Renamed to \"Check List\", all data translated to English\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\n\u003ch3 class=\"sub\">Recipes\u003c/h3>\n\u003cdiv class='task'>\u003cinput id='s12' type='checkbox' checked>\u003clabel for='s12'>Full 20-field recipe format — all 173 original recipes migrated\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s13' type='checkbox' checked>\u003clabel for='s13'>AI photo-scan import + \"Generate method with AI\"\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s14' type='checkbox' checked>\u003clabel for='s14'>Cost + nutrition engine with per-ingredient breakdown\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s15' type='checkbox' checked>\u003clabel for='s15'>Fixed the duplicate-save bug\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s16' type='checkbox' checked>\u003clabel for='s16'>🛒 Order button next to the \"i\" info button on every ingredient\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\n\u003ch3 class=\"sub\">Ingredients\u003c/h3>\n\u003cdiv class='task'>\u003cinput id='s17' type='checkbox' checked>\u003clabel for='s17'>2,083 ingredients priced (535 → 1,263 → 2,083 through expansions; live count 17.7.)\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s18' type='checkbox' checked>\u003clabel for='s18'>Season / storage-type / food-type / cuisine filters — combinable\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\n\u003ch3 class=\"sub\" data-sk=\"Všeobecné\" data-en=\"General\">General\u003c/h3>\n\u003cdiv class='task'>\u003cinput id='s19' type='checkbox' checked>\u003clabel for='s19'>Supabase backend, passwordless email-code login\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s20' type='checkbox' checked>\u003clabel for='s20'>Home dashboard, multi-language UI (EN/DE/FR/IT/SK)\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s21' type='checkbox' checked>\u003clabel for='s21'>Chef's Assistant chat (Michelin persona), mobile keyboard fix + greeting\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s22' type='checkbox' checked>\u003clabel for='s22'>Multi-team via QR invite + closed-trial admin approval gate\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s23' type='checkbox' checked>\u003clabel for='s23'>Order List, Schedule (real shift-code grid), Fridge Temperature\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task you-row'>\u003cinput id='s24' type='checkbox' checked>\u003clabel for='s24'>Deployed to production (GitHub Pages)\u003cspan class=\"note\">You: keep re-uploading index.html after each batch\u003c/span>\u003c/label>\u003cspan class=\"tag you\">TY\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s25' type='checkbox' checked>\u003clabel for='s25'>Investor presentation.html + planning.html dashboards\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s26' type='checkbox' checked>\u003clabel for='s26'>Order List top bar: real Print, Select + bulk delete, group by section\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s27' type='checkbox' checked>\u003clabel for='s27'>Print Labels: 🖨️ icon on every Check List item + shelf-life \"use by\" dates on 5×3cm labels, real title + section grouping\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s28' type='checkbox' checked>\u003clabel for='s28'>Working Time: check-in/out timer, breaks, monthly hours/overtime, vacation countdown, contract photo-scan + AI legal-advisory notes\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s29' type='checkbox' checked>\u003clabel for='s29'>Recipes &amp; Check List: rename + change icon on any section/category, not just delete\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s30' type='checkbox' checked>\u003clabel for='s30'>Recipes: 7 diet filters (was 2), visible highlighting fixed, search always covers all recipes, \"Ask Chef's Assistant\" AI recipe generator\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s31' type='checkbox' checked>\u003clabel for='s31'>Ingredient Audit: real per-item review (Add / Link as alias / Ignore), no more blind bulk-create\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s32' type='checkbox' checked>\u003clabel for='s32'>Kitchen-wide currency switcher (EUR/CHF/USD) — defaulted to CHF\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s33' type='checkbox' checked>\u003clabel for='s33'>Ingredients screen: topbar redesign, 104 real supplier-priced items added (Caviezel Giovanettoni AG)\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s34' type='checkbox' checked>\u003clabel for='s34'>Working Time note field fixed (text was invisible while typing), Home icons enlarged\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s35' type='checkbox' checked>\u003clabel for='s35'>Minimalist Sautero logo designed + applied to the My Team QR code\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s36' type='checkbox' checked>\u003clabel for='s36'>Ingredients: live match-count while filtering, full category list (was 4-item shortcut), new Verified/Estimated/Missing pricing filter\u003c/label>\u003cspan class=\"tag me\">JA\u003c/s s (own Supabase tables, no third-party service)\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s45' type='checkbox' checked>\u003clabel for='s45'>Expiring/revocable team invites + admin can remove a team member (neither existed before)\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s46' type='checkbox' checked>\u003clabel for='s46'>Written manual regression checklist (docs/REGRESSION_CHECKLIST.md)\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s47' type='checkbox' checked>\u003clabel for='s47'>Check List audit log — who changed status/on-hand/priority/notes, shown as \"Recent activity\" in the item Info panel\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s48' type='checkbox' checked>\u003clabel for='s48'>🔴→✅ db/55 run in Supabase — fixed the infinite-recursion RLS bug on profiles that broke basically the entire app; re-verified live via REST probe, every table responding normally again\u003c/label>\u003cspan class=\"tag you\">TY\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s49' type='checkbox' checked>\u003clabel for='s49'>loadAppData() parallelized (11 sequential Supabase queries → Promise.all) — was the likely cause of the app feeling slow to load\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s50' type='checkbox' checked>\u003clabel for='s50'>Staging Supabase project (\"chefos-staging\") created and fully bootstrapped — same schema + data as production, verified live with no errors. New SQL migrations get tested here first from now on\u003c/label>\u003cspan class=\"tag me you\">JA + TY\u003c/span>\u003c/div>\n\u003cdiv class='task'>\u003cinput id='s51' type='checkbox' checked>\u003clabel for='s51'>Trial success criteria defined and agreed with Richard: 40 el for='t20'>\u003cspan data-sk=\"Check-in / check-out\" data-en=\"Check-in / check-out\">\u003c/span>\u003cspan class=\"note\" data-sk=\"✅ Naživo od 11.–12.7. ako Working Time (check-in/out, hodiny, nadčasy, GPS snímka)\" data-en=\"✅ Live since Jul 11–12 as Working Time (check-in/out, hours, overtime, GPS snapshot)\">\u003c/span>\u003c/label>\u003cspan class=\"tag me\">JA\u003c/span>\u003c/div>\n\u003cdiv class='task you-row'>\u003cinput id='t21' type='checkbox'>\u003clabel for='t21'>\u003cspan data-sk=\"GPS + prestávky + nadčasy + právna kontrola zmlúv\" data-en=\"GPS + breaks + overtime + contract legal review\">\u003c/span>\u003cspan class=\"note\" data-sk=\"Reálne pracovnoprávne/privacy dôsledky — pred kódom treba právnu kontrolu. Aktualizácia 14.7.: namiesto toho nasadená obmedzená, nízkoriziková verzia (jednorazová snímka polohy len pri check-in/out, žiadne priebežné sledovanie) — pozri Working Time.\" data-en=\"Real labor-law/privacy implications — needs legal review before any code. Update 14.7.: a scoped, low-risk version (one-time location snapshot at check-in/out only, not continuous tracking) shipped instead — see Working Time.\">\u003c/span>\u003c/label>\u003cspan class=\"tag you\">TY\u003c/span>\u003c/div>\n\u003cdiv class='task you-row'>\u003cinput id='t29' type='checkbox'>\u003clabel for='t29'>\u003cspan data-sk=\"Community/sociálna edícia\" data-en=\"Community/social edition\">\u003c/span>\u003cspan class=\"note\" data-sk=\"Tvoje vlastné varovanie: spustenie bez bezpečnostnej kontroly by nás mohlo potopiť. Aktualizácia 17.7.: prvá community vrstva (Public police, zdieľanie, komentáre naprieč kuchyňami) nasadená PO plnej bezpečnostnej kontrole s trvalými poistkami.\" data-en=\"Your own flag: launching without a security check could sink us. Update Jul 17: the first community layer (Public shelves, sharing, cross-kitchen comments) shipped AFTER a full security review with permanent guards.\">\u003c/span>\u003c/label>\u003cspan class=\"tag you\">TY\u003c/span>\u003c/div>\n\u003c/div>\u003c/details>\n\n\u003cfooter class=\"foot\" data-sk=\"Sautero — interný kontrolný zoznam · aktualizuje sa priebežne · Slovenčina je predvolená, prepni na EN hore vpravo\" data-en=\"Sautero — internal task list · updated continuously · English shown, switch to SK top-right\">\u003c/footer>\n\u003c/div>\n\n\u003cscript>\n/* ---------- Language toggle — SK je predvolený jazyk celej appky/dokumentov (Richard,\n   14.7.). Toto prekladá štruktúrne popisky (nadpisy, sekcie, štítky JA/TY, texty generované\n   JS-om nižšie) — nie stovky jednotlivých položiek úloh a časovej osi nižšie, ktoré ostávajú\n   v pôvodnom jazyku (väčšinou anglicky) v oboch režimoch. Preklad každej historickej položky\n   je samostatná väčšia úloha, zámerne neurobená narýchlo v jednej dávke. ---------- */\nlet _lang = localStorage.getItem('sautero_doc_lang') || 'sk';\nfunction applyLang(){\n  document.querySelectorAll('[data-sk]').forEach(el=>{\n    el.textContent = _lang === 'sk' ? el.getAttribute('data-sk') : (el.getAttribute('data-en') || el.getAttribute('data-sk'));\n  });\n  document.getElementById('langBtn').textContent = _lang === 'sk' ? 'EN' : 'SK';\n  const search = document.getElementById('taskSearch');\n  if(search) search.placeholder = _lang === 'sk' ? 'Hľadať…' : 'Search…';\n  document.documentElement.lang = _lang;\n  updateStats();\n}\nfunction toggleLang(){\n  _lang = _lang === 'sk' ? 'en' : 'sk';\n  localStorage.setItem('sautero_doc_lang', _lang);\n  applyLang();\n  renderTimeline();\n  // Charts carry language in their legends/labels — re-render them too (17.7. fix).\n  if(typeof renderWorkHours === 'function') renderWorkHours();\n  if(typeof renderTasksPerDay === 'function') renderTasksPerDay();\n  if(typeof renderFeaturesOverTime === 'function') renderFeaturesOverTime();\n  if(typeof toggleHero === 'function') toggleHero(localStorage.getItem('sautero_tasklist_hero_hidden') === '1');\n}\nfunction L(sk, en){ return _lang === 'sk' ? sk : en; }\n\nconst b=[...document.querySelectorAll('input[type=checkbox]')];\nfunction updateStats(){\n  let d=0;\n  b.forEach(x=>{ if(x.checked) d++; });\n  let p = b.length ? Math.round(d/b.length*100) : 0;\n  document.getElementById('done').textContent = d;\n  document.getElementById('left').textContent = b.length - d;\n  document.getElementById('pct').textContent = p + '%';\n  document.getElementById('fill').style.width = p + '%';\n  document.getElementById('pie').style.background = 'conic-gradient(var(--accent) ' + (p*3.6) + 'deg, var(--paper-raised) 0deg)';\n  document.getElementById('pieLabel').textContent = p + '%';\n}\nfunction upd(){\n  b.forEach(x=>{ localStorage.setItem(x.id, x.checked); });\n  updateStats();\n}\nb.forEach(x=>{\n  const saved = localStorage.getItem(x.id);\n  x.checked = saved === null ? x.checked : (saved === 'true');\n  x.onchange = upd;\n});\n\n/* ---------- Per-group done/total counts — injected into each summary, computed from the\n   group's own checkboxes so they can't drift. ---------- */\nfunction renderGroupCounts(){\n  document.querySelectorAll('details.group').forEach(g=>{\n    const checks = g.querySelectorAll('input[type=checkbox]');\n    if(!checks.length) return;\n    const done = [...checks].filter(c=>c.checked).length;\n    let badge = g.querySelector('summary .gcount');\n    if(!badge){\n      badge = document.createElement('span');\n      badge.className = 'gcount';\n      g.querySelector('summary').appendChild(badge);\n    }\n    badge.textContent = done + '/' + checks.length;\n  });\n}\nconst _origUpdateStats = updateStats;\nupdateStats = function(){ _origUpdateStats(); renderGroupCounts(); };\n\n/* ---------- Search + filters — open-only / mine (JA) / yours (TY) + free text; section\n   subheadings and whole groups hide when everything under them is filtered out. ---------- */\nconst _filters = { open:false, me:false, you:false };\nfunction toggleFilter(key){\n  _filters[key] = !_filters[key];\n  document.getElementById('fOpen').classList.toggle('on', _filters.open);\n  document.getElementById('fMe').classList.toggle('on', _filters.me);\n  document.getElementById('fYou').classList.toggle('on', _filters.you);\n  applyFilters();\n}\nfunction applyFilters(){\n  const q = document.getElementById('taskSearch').value.trim().toLowerCase();\n  document.querySelectorAll('.task').forEach(task=>{\n    const check = task.querySelector('input[type=checkbox]');\n    const tag = task.querySelector('.tag');\n    const tagText = tag ? tag.textContent : '';\n    let visible = true;\n    if(_filters.open && check && check.checked) visible = false;\n    if(_filters.me && tagText.indexOf('JA') === -1 && tagText.indexOf('ME') === -1) visible = false;\n    if(_filters.you && tagText.indexOf('TY') === -1 && tagText.indexOf('YOU') === -1) visible = false;\n    if(visible && q && task.textContent.toLowerCase().indexOf(q) === -1) visible = false;\n    task.classList.toggle('filtered-out', !visible);\n  });\n  // Hide subheadings with no visible tasks before the next subheading\n  document.querySelectorAll('.group-body').forEach(body=>{\n    const children = [...body.children];\n    children.forEach((el,i)=>{\n      if(!el.matches('h3.sub')) return;\n      let any = false;\n      for(let j=i+1; j\u003cchildren.length; j++){\n        if(children[j].matches('h3.sub')) break;\n        if(children[j].matches('.task') && !children[j].classList.contains('filtered-out')){ any = true; break; }\n      }\n      el.classList.toggle('filtered-out', !any);\n    });\n  });\n  // Hide entire groups with nothing visible (never the timeline group)\n  document.querySelectorAll('details.group').forEach(g=>{\n    if(g.id === 'timelineSection') return;\n    const any = g.querySelector('.task:not(.filtered-out)');\n    g.classList.toggle('filtered-out', !any);\n  });\n}\n\n/* ---------- Timeline: everything shipped, grouped by month > week > day, click to expand ---------- */\nconst DAYS=[\n  { date:'2026-07-08', headline:'Phase 0 — Foundation & Validation approved', accomplished:[\n    'Defined Sautero v1 scope: Chef Pro / Restaurant kitchens, not home cooks',\n    'Mobile/tablet-first installable web app, no native build',\n    'Pilot kitchen confirmed (Hotel Schweizerhof Bern)',\n    'MVP_DEFINITION.md and ARCHITECTURE.md approved by Richard'\n  ]},\n  { date:'2026-07-09', headline:'Recipe engine live, Ingredients + Check List v1, Schedule rebuilt, deployed', accomplished:[\n    'Supabase backend stood up; all 173 recipes migrated; scaling calculator fixed',\n    'Ingredients & Pricing: 535 items seeded, cost + nutrition engines',\n    'Full 20-field recipe form; visual design pass',\n    'Mise en Place v1, Order List, Home dashboard, Fridge Temperature',\n    'Schedule rebuilt to match the real Dienstplan PDF (28 shift codes, 27 staff)',\n    'SKY prep sheet built from Richard\\'s real photographed paper sheet',\n    'Photo-scan AI recipe import shipped',\n    'Deployed to production on GitHub Pages'\n  ]},\n  { date:'2026-07-10', headline:'AI features, Kitchen Flow, all 8 stations, multi-language, ingredients to 1,263', accomplished:[\n    'Generate Method with AI + Chef\\'s Assistant chatbot (Haiku, cost-capped)',\n    'Kitchen Flow v1: station icon tiles, 🔥 overload badge',\n    'Check List prep sheets extended to all 8 stations',\n    'AI prep-sheet scan (photo + PDF); renamed \"Mise en Place\" → \"Check List\"',\n    'Translated all prep-sheet data to English; multi-language UI v1 (EN/DE/FR/IT/SK)',\n    'Fixed \"All\" cross-station view and stuck station-tile badges; swipe-back gesture',\n    'Ingredients expanded to 1,263 (season/storage/food-type filters)',\n    'Created presentation.html and planning.html dashboards',\n    'Check List: manual \"+ New Section\"/\"+ Add dish\", no longer scan-only',\n    'Fixed cross-device station persistence bug',\n    'Real crowd-sourced prep times — tap the clock, values average together',\n    'TO DO/DON\\'T DO status colors swapped; Extra got its own icon',\n    'Chef\\'s Assistant mobile-keyboard fix + greeting bubble',\n    'Two real people testing live at two separate venues',\n    'Scoped the public-trial plan: 2026-08-01, 25 users, multi-team via QR'\n  ]},\n  { date:'2026-07-11', headline:'Multi-team QR + access gate, Recipe/Check List fixes, unified visual identity', accomplished:[\n    'presentation.html refocused on Switzerland / canton Bern with sourced market numbers',\n    'Multi-team via QR invite (create or join a kitchen) built end-to-end',\n    'Closed-trial access gate: every email manually approved before use, new Admin tile',\n    'Vendored a verified QR-code generator, fully client-side',\n    'Login screen: \"check Spam/Trash\" hint added',\n    'Triaged 4 planning documents into building-now vs. explicitly-parked backlog',\n    'Fixed the recipe double-save bug (double-tap race condition)',\n    '🚩 flag restricted to priority-1 items only',\n    'Check List: delete or hide an item, a dish, or a whole section',\n    '🛒 Order button on every Check List item and recipe ingredient row',\n    'Fixed a latent Order List bug where notes were silently dropped on save',\n    'Built app/board.html → renamed to app/tasklist.html, with this timeline',\n    'Unified Sautero visual identity (navy/teal) across presentation.html, planning.html, tasklist.html'\n  ]},\n  { date:'2026-07-12', headline:'Order List + Print Labels toolbars, Working Time built, 104 real supplier prices, Recipes/Ingredients rework, two critical bugs found and fixed', accomplished:[\n    'Order List top bar: real Print, Send-to-supplier placeholder, Select + bulk delete, group by section/device',\n    'Check List: 🖨️ Print icon on every item row; Print Labels hub redesigned with a toolbar and per-product shelf-life tracking for auto-computed \"use by\" dates on 5×3cm labels',\n    'Built Working Time from scratch: real check-in/check-out timer, break logging, monthly hours + overtime summary, next-vacation countdown, contracted-hours field, AI contract-photo-scan with legal-advisory notes (explicitly informational, not legal advice)',\n    'Found and fixed two severe script-breaking bugs same-day (a top-level variable referencing another one declared later in the file — the app briefly went fully or partially unresponsive both times) — both fully root-caused and documented',\n    'Recipes: fixed \"always show Favorites\" defaulting to an empty screen when there are zero favorites',\n    'Ingredient Audit tool v1: scans every recipe + Check List item for names missing from Ingredients, flags likely duplicates',\n    'Recipes: 🕐 Newest-first sort next to Favorites; search rebuilt as a standalone icon with section + diet + allergen-free filters; category icon set roughly doubled',\n    '104 real, supplier-sourced ingredient prices imported from Caviezel Giovanettoni AG\\'s 2026 Swiss wholesale price list (CHF converted to EUR, article numbers kept for traceability) — upgrades ~54 existing estimated prices to real ones',\n    'Check List &amp; Recipes: every section/category can now be renamed and have its icon changed, not just deleted',\n    'Recipes: diet-filter highlighting fixed (was barely visible) + expanded from 2 to 7 diets (added Pescatarian, Keto, Paleo, Mediterranean, High-Protein)',\n    'Recipes: search now always covers every recipe by default, not just whichever section tile happened to be open',\n    '\"Ask Chef\\'s Assistant\" — new AI recipe-idea generator in recipe search: asks warm/cold + sweet/savory, suggests 5 real dish ideas, writes the full recipe for whichever one is picked',\n    'Ingredient Audit rebuilt into a real per-item approval flow (editable pre-cleaned name, Add / Link-as-alias / Ignore) — replaces the old blind \"create all\" bulk button',\n    'Kitchen-wide currency switcher (EUR/CHF/USD) shipped, admin-only, defaulted to CHF for the Swiss pilot kitchen',\n    'Ingredients screen: topbar redesigned — search + all 4 filter chip rows + Ingredient Audit collapsed behind one icon instead of permanently eating half the screen',\n    'Ingredients search/filter button improved: visible text label, fixed a mislabeled \"Category\" chip row (it was actually Cuisine), added a \"Clear all\" button'\n  ]},\n  { date:'2026-07-13', headline:'Working Time note-visibility fix, bigger Home icons, Print Labels polish, Sautero logo, printer + fridge-sensor research, first named sales target', accomplished:[\n    'Fixed Working Time\\'s day-note field being invisible while typing (a dark-mode/mobile-browser rendering gap, not just that one field — applied a page-wide fix)',\n    'Home screen tile icons enlarged again, still 3 per row',\n    'Print Labels: added the missing topbar title, wired up a real \"By section\" grouping toggle (was a placeholder)',\n    'Designed a minimalist Sautero logo (circular monogram mark) and applied it live — small brand header on My Team, centered overlay on the invite QR code itself (QR error-correction bumped to \"H\" so it still scans reliably with the logo on top)',\n    'Researched wireless fridge-temperature sensors for the \"scan QR → live temp\" idea — found iOS Safari can\\'t read Bluetooth/NFC sensors from a website at all, so a WiFi/cloud-API sensor is required; recommended SensorPush as the budget pick with a real free API',\n    'Researched a physical label printer for Print Labels + how to structure a supplier contract — recommended Brother QL-820NWB (~CHF 130, buy outright, no contract) via the existing print-dialog flow; full report in docs/LABEL_PRINTER_RESEARCH.md',\n    'Named Nooch Asian Kitchen (FWG restaurant group, 10+ Swiss locations incl. 3 in canton Bern) as the first target customer to approach once the pilot validates the product',\n    'Ingredients search sheet: live \"N ingredients match\" count while adjusting filters, the Food-type shortcut (4 categories) replaced with the full real category list (Alcohol, Bakery, ... 19 total, derived from the data so it never goes stale), and a new \"Pricing\" filter (Verified / Estimated / Missing) to see at a glance which prices are real supplier-sourced numbers vs. still-estimated placeholders',\n    'Ingredients: that match-count also pinned directly in the topbar itself, so it\\'s visible without opening Search &amp; Filter at all',\n    'Sautero logo redesigned (v1 read as flat/generic) — a hand-built ring mark drawn as one precise arc instead of a font letter, sage/cream instead of copper, plus an italic serif \"Sautero\" wordmark next to it',\n    'Check List\\'s New Section / Edit Section icon picker expanded from 30 icons to the same 72-icon set Recipes already offers',\n    'New: 🌐 Language Audit — scans every Check List dish and item name, flags anything not already in English (photo scans and manual entry sometimes bring in German/French/Italian, since this kitchen is in Bern), suggests a translation, per-item approve/skip',\n    'Two v2-backlog expert-review findings acted on: pilot kitchen changes from Hotel Schweizerhof to Burrito Bandito &amp; Lido (one group, two venues) — retires the IP-ownership risk flagged against the old employer, since Sautero stops depending on their data entirely; RC Studio shelved to protect Sautero capacity against the new full-time job. presentation.html updated to match. First draft of a written pilot agreement saved to docs/PILOT_AGREEMENT.md.',\n    'Six critical/security items from the backlog v2 review, resolved: Git version control (finally), Anthropic API key moved server-side (Edge Function proxy, all 9 call sites), real-time cross-device sync actually wired up for Check List (confirmed it never existed before), basic error tracking + usage analytics, expiring/revocable team invites + remove-a-member, and a written manual regression checklist. Everything genuinely needing Richard\\'s own accounts/hardware/judgment (Resend domain, Supabase backups/staging, cost caps, device testing, legal review, business decisions) stays logged as open in backlog.html rather than silently skipped.',\n    'Ingredients filter sheet: search box + live match-count now pinned to the top while the filter chip rows scroll underneath, instead of scrolling away',\n    'backlog.html made interactive: the 38 task rows are real checkboxes with localStorage persistence, plus a sticky top bar showing a live percent-complete pie chart + progress bar',\n    'Check List audit log shipped — every status/on-hand/priority/note change is now recorded (who, what, when) and shown as \"Recent activity\" in the item\\'s Info panel, closing the \"whose fault it is\" gap the Check List used to leave open',\n    '🔴→✅ Found and fixed a critical live bug: db/53 added two RLS policies on `profiles` that query `profiles` again inside themselves, causing infinite recursion in Postgres — confirmed live via a direct REST probe against the production database, which showed it had silently broken almost every table in the app (profiles, recipes, ingredients, prep_items, prep_dishes, access_requests...). Very likely why the login/approval screen looked broken on Richard\\'s phone. Fix shipped as db/55 (a SECURITY DEFINER helper function, sidesteps the self-reference) — Richard ran it and a second REST probe confirmed every table responds normally again.',\n    'Read Richard\\'s Hotel Schweizerhof employment contract at his request — no IP-assignment, non-compete, confidentiality-beyond-GDPR or side-business clause found anywhere in it. Not legal certainty (flagged clearly as such, recommended a real lawyer confirm before anything investor-facing), but a materially reassuring read given Swiss law (OR 332) only assigns an employer inventions made in fulfillment of contractual duties, and Richard\\'s job is Chef de Partie, not software development.',\n    'loadAppData() parallelized — was awaiting 11 independent Supabase queries one at a time on every view open; switched to Promise.all, should noticeably cut load time',\n    'Trial success criteria defined and agreed with Richard: 40%+ of invited teams active in Check List 3+ days/week by week 2, at least half of started teams still active in week 2, at least 5 of 25 people say yes to \"would you pay X CHF/month\", fewer than 10 critical errors logged during the trial, at least 3 unprompted positive + 3 critical pieces of feedback collected',\n    'Staging Supabase project (\"chefos-staging\") created and fully bootstrapped end-to-end: all 56 SQL migrations run in one shot via a small Python script (psycopg2 over the Session Pooler — the Direct connection needs IPv6, which wasn\\'t reachable, so this took a few tries to get the right connection method), verified live against a REST probe with zero errors. 173 recipes, 1,315 ingredients, 64 dishes and 273 Check List items all present and matching production. From now on, new SQL migrations get tested here first, then production — exactly the discipline gap that caused the RLS outage above.',\n    'GitHub Pages deploy automated (Actions workflow, repo connected, force-push authorized by Richard) — every commit live within a minute, manual drag-and-drop uploads retired. Project-scoped Claude Code permissions added so routine work runs without per-step approval prompts.',\n    'App visual identity unified with the documents (navy/teal) at Richard\\'s explicit request — the old warm copper/charcoal app look is retired, one Sautero visual everywhere. QR code stays black/white for scannability.',\n    'Shipped in one overnight+morning batch: Privacy & Terms page (legal.html, covers Working Time/nDSG, linked from login), feedback button (mailto with context), yield/waste factor in food cost (db/57 — URGENT: still needs to run on prod), Ingredients price-range filter replacing the broken Verified/Estimated chips, multi-select filter chips, \"Show me\" search button, and the 🎯 Chef Challenge tile (Richard\\'s \"menu only from ingredients under 1 CHF\" idea — real priced ingredients, not AI guesses).',\n    'Monetization plan formalized: Richard\\'s 10-model expert workshop converted to app/monetization.html in house style; Claude added model 11 (paid kitchen-digitalization workshops — the only model that doesn\\'t depend on the finished product) and a concrete action plan. Unanimous panel conclusion: onboarding ~CHF 990 + founding pre-sale CHF 490/yr is the whole 12-month plan. Both unblocking documents drafted ready-to-send: NEBENERWERB_REQUEST.md (employer consent, blocker #1) and FOUNDING_OFFER.md (offer terms, refund policy, fair-use limits).',\n    'Ingredient database expanded to exactly 2,000 rows (db/59, 646 new AI-estimated items — meat cuts, Swiss IGP/AOP cheeses and sausages, fish, produce varieties, pantry staples, modernist textures), each with price/nutrition/storage/seasons/origin/substitutes and honestly labeled as estimated (unlike db/46+58\\'s real supplier prices). Verified on staging: exactly 2,000 rows, 100% priced.',\n    '🔴→✅ Found and fixed a silent bug: the app only ever showed the first 1,000 ingredients (Supabase\\'s default REST page-size cap) — explains the \"1000 in the app vs 1263 in the presentation\" discrepancy Richard noticed. Fixed with a paginating fetch helper; all rows now load regardless of table size.',\n    '🔴→✅ Found and fixed: Check List\\'s delete confirmed but silently did nothing in some cases — Supabase/RLS can match 0 rows on an update with no error at all. deletePrepItem/Dish/deleteStation now detect a 0-row update, surface it, log it, and reload instead of pretending it worked. Confirmed fixed live by Richard.',\n    '🔴→✅ Found and fixed the real cause behind every AI feature failing (\"Failed to send a request to the Edge Function\"): the server-side claude-proxy function (shipped earlier this session) had never actually been deployed to the production Supabase project — deploying it is a manual CLI step nobody had run yet. Walked Richard through installing Supabase CLI and deploying it live; confirmed reachable (HTTP 200) and confirmed working end-to-end by Richard on his phone. Also raised the prep-sheet scan\\'s max_tokens (4096→8192) to fix truncation on a full real prep sheet — same bug class already hit once on Schedule upload.',\n    'Added a 🗣️ Team Meetings placeholder tile to Home at Richard\\'s request (scope to be decided later — candidates noted in backlog.html: auto-agenda from Check List/Schedule, a shared daily note, or a meeting log).',\n    'New idea logged (not built yet): Recipes photo scan should ask \"one recipe, or a whole menu?\" before scanning — a whole-menu scan would recognize each dish\\'s name and ingredients and generate a full recipe (with method, not just an ingredient list) for each one, inferring typical missing ingredients/steps a menu wouldn\\'t spell out. Prompted by Richard scanning a whole menu into Recipes by mistake (meant Check List) and only noticing after the fact.'\n  ]},\n  { date:'2026-07-14', headline:'Feature freeze čestne priznaný, denný ingredient agent, Working Time poloha + forgot-to-check-in, contract note tón, Chef Challenge skrytý, tasklist redesign', accomplished:[\n    'Working Time: \"Forgot to check in?\" (zrkadlí existujúce \"Forgot to check out?\") + jednorazová snímka polohy presne pri check-in/check-out (nie priebežné sledovanie — Richard si vybral túto variantu z právnych aj technických dôvodov)',\n    'AI poznámka o zmluve: teraz 4-6 bodov s ikonou tónu (⚠️ risk / ✅ good / ℹ️ neutral) namiesto zoznamu len problémov',\n    'Nájdená a opravená (návrh, čaká na staging test) skutočná privacy diera: RLS politika z 13.7. púšťala celý riadok profiles komukoľvek v kuchyni, vrátane cudzích poznámok o zmluve',\n    'Denný AI agent na ingrediencie nastavený: CHF 30/mesiac strop, beží denne 06:30, report v docs/ingredient_agent_log.md',\n    'Zvýraznené 🚨 upozornenie na zmeškaný Critical Review deadline',\n    'Nastavené pripomienky: nedeľný snapshot (20:00) + pondelková kontrola deadline (14:30)',\n    'Feature freeze týždeň: čestne priznané, že sa v ň
