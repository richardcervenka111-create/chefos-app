const DOCS = ["\u003c!DOCTYPE html>\n\u003chtml lang=\"sk\">\n\u003chead>\n\u003cmeta charset=\"UTF-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n\u003cmeta http-equiv=\"Cache-Control\" content=\"no-cache, no-store, must-revalidate\">\n\u003cmeta http-equiv=\"Pragma\" content=\"no-cache\">\n\u003cmeta http-equiv=\"Expires\" content=\"0\">\n\u003ctitle>Sautero — Mapa funkcií\u003c/title>\n\u003cstyle>\n  :root{\n    --bg:#0A1A2F; --bg-2:#0d2036; --paper:#122845; --paper-raised:#0f2340; --paper-hi:#16304f;\n    --ink:#fff; --ink-dim:#9C949E; --ink-faint:rgba(156,148,158,0.6);\n    --rule:#223d57; --rule-soft:#1a3149;\n    --accent:#34F7D7; --accent-dim:rgba(52,247,215,0.4); --accent-wash:rgba(52,247,215,0.08);\n    --gold:#F7C948; --gold-dim:rgba(247,201,72,0.4); --gold-wash:rgba(247,201,72,0.08);\n    --danger:#FF7A68; --danger-dim:rgba(255,122,104,0.4); --danger-wash:rgba(255,122,104,0.08);\n    /* Status colors, specific to this doc: functional / needs testing / planned only. */\n    --ok:#4ADE80; --ok-dim:rgba(74,222,128,0.4); --ok-wash:rgba(74,222,128,0.09);\n    --test:#FB923C; --test-dim:rgba(251,146,60,0.5); --test-wash:rgba(251,146,60,0.14);\n    --plan:#FF7A68; --plan-dim:rgba(255,122,104,0.4); --plan-wash:rgba(255,122,104,0.08);\n    --shadow:0 8px 28px rgba(0,0,0,0.45);\n    --mono:\"SF Mono\",Menlo,Consolas,monospace;\n  }\n  *{ box-sizing:border-box; }\n  html,body{ margin:0; padding:0; }\n  body{\n    background:var(--bg); color:var(--ink);\n    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;\n    -webkit-font-smoothing:antialiased; line-height:1.5;\n  }\n  .wrap{ max-width:1180px; margin:0 auto; padding:0 24px 100px 24px; }\n  ::selection{ background:var(--accent); color:#0A1A2F; }\n\n  header.hero{ position:relative; padding:36px 0 30px 0; border-bottom:1px solid var(--rule); overflow:hidden; }\n  header.hero::before{\n    content:''; position:absolute; top:-160px; left:50%; transform:translateX(-50%);\n    width:900px; height:460px; pointer-events:none;\n    background:radial-gradient(ellipse at center, var(--accent-wash), transparent 70%);\n  }\n  .hero-inner{ position:relative; max-width:1180px; margin:0 auto; padding:0 24px; }\n  .topline{ display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:22px; flex-wrap:wrap; }\n  .brandmark{ display:flex; align-items:center; gap:9px; }\n  .brandmark .mark{ font-size:20px; }\n  .brandmark .word{ font-size:15px; font-weight:700; letter-spacing:0.02em; color:var(--accent); font-style:italic; font-family:Georgia,'Times New Roman',serif; }\n\n  .acct-toggle{\n    display:flex; align-items:center; gap:6px; background:var(--paper); border:1px solid var(--rule);\n    border-radius:20px; padding:4px; flex:none;\n  }\n  .acct-toggle button{\n    border:none; background:none; color:var(--ink-dim); font-size:12px; font-weight:700;\n    padding:7px 14px; border-radius:16px; cursor:pointer; transition:background .15s, color .15s;\n    font-family:inherit;\n  }\n  .acct-toggle button.active{ background:var(--accent); color:#0A1A2F; }\n\n  .kicker{ color:var(--accent); font-size:12px; letter-spacing:0.18em; text-transform:uppercase; font-weight:700; margin-bottom:10px; }\n  h1.title{ font-size:36px; font-weight:800; margin:0 0 12px 0; line-height:1.14; letter-spacing:-0.01em; }\n  h1.title em{ font-style:italic; color:var(--accent); font-weight:800; }\n  .lede{ color:var(--ink-dim); font-size:14.5px; max-width:70ch; line-height:1.65; }\n\n  .legend{ display:flex; gap:10px; flex-wrap:wrap; margin-top:22px; }\n  .legend-item{ display:flex; align-items:center; gap:8px; background:var(--paper); border:1px solid var(--rule); border-radius:10px; padding:8px 13px; font-size:12.5px; color:var(--ink-dim); cursor:pointer; user-select:none; transition:opacity .15s, border-color .15s; }\n  .legend-item.active{ border-color:var(--accent-dim); }\n  .legend-item:not(.active){ opacity:.38; border-style:dashed; }\n  .legend-dot{ width:10px; height:10px; border-radius:50%; flex:none; }\n  .legend-item b{ color:var(--ink); font-weight:700; }\n\n  .lang-toggle{\n    background:var(--paper); border:1px solid var(--rule); color:var(--ink-dim);\n    font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;\n    padding:6px 12px; border-radius:20px; cursor:pointer; transition:border-color .15s, color .15s;\n    font-family:inherit;\n  }\n  .lang-toggle:hover{ border-color:var(--accent-dim); color:var(--accent); }\n  .donut-row{ display:flex; align-items:center; gap:26px; margin-top:24px; flex-wrap:wrap; }\n  #featureDonut .seg{ cursor:pointer; transition:opacity .15s, stroke-width .15s; }\n  #featureDonut .seg.off{ opacity:.22; }\n  #featureDonut .seg:hover{ stroke-width:20; }\n  #featureDonut text{ fill:var(--ink); font-family:var(--mono); }\n  #featureDonut .center-num{ font-size:26px; font-weight:700; cursor:pointer; }\n  #featureDonut .center-lbl{ font-size:6.5px; fill:var(--ink-dim); text-transform:uppercase; letter-spacing:.08em; }\n  .pulse-strip{ display:grid; grid-template-columns:repeat(4,1fr); gap:1px; margin-top:24px; background:var(--rule); border:1px solid var(--rule); border-radius:16px; overflow:hidden; }\n  @media (max-width:680px){ .pulse-strip{ grid-template-columns:repeat(2,1fr); } }\n  .pulse-cell{ background:var(--paper); padding:16px 18px 14px 18px; }\n  .pulse-cell .num{ font-family:var(--mono); font-size:26px; font-weight:700; line-height:1; font-variant-numeric:tabular-nums; }\n  .pulse-cell .lbl{ font-size:11px; text-transform:uppercase; letter-spacing:0.07em; color:var(--ink-dim); margin-top:7px; display:flex; align-items:center; gap:6px; }\n  .pulse-cell .lbl::before{ content:''; width:7px; height:7px; border-radius:50%; flex:none; }\n  .pulse-cell.ok .lbl::before{ background:var(--ok); } .pulse-cell.ok .num{ color:var(--ok); }\n  .pulse-cell.test .lbl::before{ background:var(--test); } .pulse-cell.test .num{ color:var(--test); }\n  .pulse-cell.plan .lbl::before{ background:var(--plan); } .pulse-cell.plan .num{ color:var(--plan); }\n  .pulse-cell.total .lbl::before{ background:var(--ink-dim); }\n\n  .module{ margin-top:44px; }\n  .module-head{ display:flex; align-items:baseline; gap:12px; margin-bottom:16px; }\n  .module-icon{\n    width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center;\n    font-size:18px; background:var(--paper-raised); border:1px solid var(--rule); flex:none;\n  }\n  .module-title{ font-size:19px; font-weight:800; }\n  .module-count{ font-size:12px; color:var(--ink-faint); font-family:var(--mono); }\n\n  .feature-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:10px; }\n  .feature-card{\n    background:var(--paper); border:1px solid var(--rule); border-radius:12px; padding:13px 15px;\n    border-left:3px solid var(--ok); cursor:pointer; transition:border-color .15s, transform .1s;\n  }\n  .feature-card:hover{ border-color:var(--accent-dim); }\n  .feature-card:active{ transform:scale(.985); }\n  .feature-card.status-test{ border-left-color:var(--test); background:var(--test-wash); }\n  .feature-card.status-plan{ border-left-color:var(--plan); }\n  .feature-card .fname{ font-size:13.5px; font-weight:700; display:flex; align-items:center; gap:7px; }\n  .status-dot{ width:8px; height:8px; border-radius:50%; flex:none; }\n  .status-dot.ok{ background:var(--ok); }\n  .status-dot.test{ background:var(--test); }\n  .status-dot.plan{ background:var(--plan); }\n  .acct-tag{ display:inline-block; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; padding:2px 7px; border-radius:8px; margin-top:7px; }\n  .acct-tag.personal{ background:var(--accent-wash); color:var(--accent); }\n  .acct-tag.company{ background:var(--gold-wash); color:var(--gold); }\n  .feature-card.dim{ opacity:.35; }\n\n  /* Detail modal (Richard, 17.7.) — tap any feature card for a plain-language explanation. */\n  .modal-backdrop{ position:fixed; inset:0; background:rgba(4,10,20,0.72); display:none; align-items:center; justify-content:center; padding:22px; z-index:100; }\n  .modal-backdrop.open{ display:flex; }\n  .modal{ background:var(--paper); border:1px solid var(--rule); border-radius:18px; max-width:460px; width:100%; padding:22px 24px 18px 24px; box-shadow:var(--shadow); }\n  .modal .m-module{ font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.12em; color:var(--ink-faint); }\n  .modal .m-name{ font-size:18px; font-weight:800; margin:6px 0 10px 0; line-height:1.3; }\n  .modal .m-status{ display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:700; padding:4px 11px; border-radius:9px; border:1px solid; }\n  .modal .m-status.ok{ color:var(--ok); border-color:var(--ok-dim); background:var(--ok-wash); }\n  .modal .m-status.test{ color:var(--test); border-color:var(--test-dim); background:var(--test-wash); }\n  .modal .m-status.plan{ color:var(--plan); border-color:var(--plan-dim); background:var(--plan-wash); }\n  .modal .m-desc{ font-size:13.5px; color:var(--ink-dim); line-height:1.65; margin:14px 0 4px 0; }\n  .modal .m-tags{ display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }\n  .modal .m-close{ display:block; width:100%; margin-top:16px; background:none; border:1px solid var(--rule); border-radius:10px; color:var(--ink-dim); font:inherit; font-size:13px; padding:9px 0; cursor:pointer; }\n  .modal .m-close:hover{ border-color:var(--accent-dim); color:var(--ink); }\n\n  .sautero-stamp{ position:fixed; bottom:14px; right:14px; z-index:90; background:rgba(15,35,64,0.92); border:1px solid rgba(52,247,215,0.4); color:#34F7D7; font-size:10.5px; font-weight:700; font-family:\"SF Mono\",Menlo,Consolas,monospace; padding:6px 12px; border-radius:999px; pointer-events:none; }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\u003cheader class=\"hero\">\n  \u003cdiv class=\"hero-inner\">\n    \u003cdiv class=\"topline\">\n      \u003cdiv class=\"brandmark\">\u003cspan class=\"mark\">👨‍🍳\u003c/span>\u003cspan class=\"word\">Sautero\u003c/span>\u003c/div>\n      \u003cdiv style=\"display:flex; align-items:center; gap:8px;\">\n        \u003cdiv class=\"acct-toggle\" id=\"acctToggle\">\n          \u003cbutton id=\"acctPersonalBtn\" onclick=\"setAcctView('personal')\">👤 Personal\u003c/button>\n          \u003cbutton id=\"acctCompanyBtn\" onclick=\"setAcctView('company')\">🏢 Company\u003c/button>\n        \u003c/div>\n        \u003c!-- SK/EN toggle (Richard, 17.7.) — same shared sautero_doc_lang key as every other doc.\n             Chrome is fully bilingual; feature names/descriptions stay Slovak for now (same\n             honest boundary as monetization card bodies). -->\n        \u003cbutton class=\"lang-toggle\" id=\"langBtn\" onclick=\"toggleLang()\">EN\u003c/button>\n      \u003c/div>\n    \u003c/div>\n    \u003cp class=\"kicker\" data-sk=\"Mapa funkcií\" data-en=\"Feature map\">Mapa funkcií\u003c/p>\n    \u003ch1 class=\"title\" id=\"pageTitle\">Čo \u003cem>Sautero\u003c/em> vie dnes\u003c/h1>\n    \u003cp class=\"lede\" id=\"pageLede\">Kompletný zoznam funkcií appky, s reálnym stavom každej jednej. \u003cb style=\"color:var(--ink);\">Klikni na hociktorú funkciu\u003c/b> a otvorí sa okno s vysvetlením, čo presne robí. Toggle hore prepína pohľad presne ako v appke — veci iba pre Personal alebo iba pre Company účty sa podľa toho stlmia.\u003c/p>\n    \u003cdiv class=\"legend\">\n      \u003cdiv class=\"legend-item active\" id=\"legendOk\" onclick=\"toggleStatusFilter('ok')\">\u003cspan class=\"legend-dot\" style=\"background:var(--ok);\">\u003c/span>\u003cspan data-sk=\"Funkčné, otestované naživo — \" data-en=\"Working, verified live — \">Funkčné, otestované naživo — \u003c/span>\u003cb id=\"legendOkCount\">\u003c/b>\u003c/div>\n      \u003cdiv class=\"legend-item active\" id=\"legendTest\" onclick=\"toggleStatusFilter('test')\">\u003cspan class=\"legend-dot\" style=\"background:var(--test);\">\u003c/span>\u003cspan data-sk=\"Postavené, čaká na test naživo — \" data-en=\"Built, awaiting live test — \">Postavené, čaká na test naživo — \u003c/span>\u003cb id=\"legendTestCount\">\u003c/b>\u003c/div>\n      \u003cdiv class=\"legend-item active\" id=\"legendPlan\" onclick=\"toggleStatusFilter('plan')\">\u003cspan class=\"legend-dot\" style=\"background:var(--plan);\">\u003c/span>\u003cspan data-sk=\"Naplánované, ešte nepostavené — \" data-en=\"Planned, not built yet — \">Naplánované, ešte nepostavené — \u003c/span>\u003cb id=\"legendPlanCount\">\u003c/b>\u003c/div>\n      \u003cdiv class=\"legend-item\" id=\"legendAdmin\" onclick=\"toggleAdminOnlyFilter()\">\u003cspan class=\"legend-dot\" style=\"background:var(--gold);\">\u003c/span>\u003cspan data-sk=\"🛡️ Iba Kitchen Admin — \" data-en=\"🛡️ Kitchen Admin only — \">🛡️ Iba Kitchen Admin — \u003c/span>\u003cb id=\"legendAdminCount\">\u003c/b>\u003c/div>\n    \u003c/div>\n    \u003c!-- Interactive status donut (Richard, 17.7.): the same three statuses as the legend, as a\n         pie — CLICK a segment to filter the list below (same toggle as the legend chips).\n         Center shows the overall total; clicking it brings every status back. -->\n    \u003cdiv class=\"donut-row\">\n      \u003csvg id=\"featureDonut\" viewBox=\"0 0 120 120\" style=\"width:170px; height:170px; flex:none;\">\u003c/svg>\n      \u003cdiv class=\"pulse-strip\" style=\"flex:1; min-width:260px; margin-top:0;\">\n        \u003cdiv class=\"pulse-cell ok\">\u003cdiv class=\"num\" id=\"pulseOk\">\u003c/div>\u003cdiv class=\"lbl\" data-sk=\"Funkčné\" data-en=\"Working\">Funkčné\u003c/div>\u003c/div>\n        \u003cdiv class=\"pulse-cell test\">\u003cdiv class=\"num\" id=\"pulseTest\">\u003c/div>\u003cdiv class=\"lbl\" data-sk=\"Čaká na test\" data-en=\"Awaiting test\">Čaká na test\u003c/div>\u003c/div>\n        \u003cdiv class=\"pulse-cell plan\">\u003cdiv class=\"num\" id=\"pulsePlan\">\u003c/div>\u003cdiv class=\"lbl\" data-sk=\"Naplánované\" data-en=\"Planned\">Naplánované\u003c/div>\u003c/div>\n        \u003cdiv class=\"pulse-cell total\">\u003cdiv class=\"num\" id=\"pulseTotal\">\u003c/div>\u003cdiv class=\"lbl\" data-sk=\"Spolu funkcií\" data-en=\"Features total\">Spolu funkcií\u003c/div>\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/header>\n\n\u003cdiv class=\"wrap\" id=\"modulesWrap\">\u003c/div>\n\n\u003cdiv class=\"wrap\">\n  \u003cdiv class=\"sautero-stamp\" id=\"stamp\">🔄 Stav Sautero k 23. 7. 2026, 00:07\u003c/div>\n\u003c/div>\n\n\u003c!-- Feature detail modal -->\n\u003cdiv class=\"modal-backdrop\" id=\"modalBackdrop\" onclick=\"if(event.target===this) closeFeatureModal()\">\n  \u003cdiv class=\"modal\">\n    \u003cdiv class=\"m-module\" id=\"mModule\">\u003c/div>\n    \u003cdiv class=\"m-name\" id=\"mName\">\u003c/div>\n    \u003cspan class=\"m-status\" id=\"mStatus\">\u003c/span>\n    \u003cp class=\"m-desc\" id=\"mDesc\">\u003c/p>\n    \u003cdiv class=\"m-tags\" id=\"mTags\">\u003c/div>\n    \u003cbutton class=\"m-close\" onclick=\"closeFeatureModal()\" data-sk=\"Zavrieť\" data-en=\"Close\">Zavrieť\u003c/button>\n  \u003c/div>\n\u003c/div>\n\n\u003cscript>\n/* Data — status: 'ok' (funkčné, naživo overené) | 'test' (postavené, čaká na živý test)\n   | 'plan' (iba naplánované). acct: 'personal' | 'company' | null (obom). role:'admin' =\n   funkcia viditeľná len pre kitchen adminov. desc = ľudské vysvetlenie pre klik-okno. */\nconst MODULES = [\n  { icon:'📖', title:'Recepty', title_en:'Recipes', items:[\n    { name:'183 receptov, knižnica Sautero (173 + 10 komunitných)', name_en:'183 recipes, the Sautero library (173 + 10 community)', desc_en:'A complete professional recipe library in the full 20-field format (ingredients, method, yield, times, station, food cost…). Every kitchen automatically gets its own copy when it is created.', status:'ok', desc:'Kompletná profesionálna knižnica receptov v plnom 20-poľovom formáte (suroviny, postup, yield, časy, stanica, food cost…). Každá kuchyňa dostane vlastnú kópiu automaticky pri vzniku.' },\n    { name:'Police: My Recipes / Sautero / Company', name_en:'Shelves: My Recipes / Sautero / Company', desc_en:'Recipes are split into shelves by author — your own, the shared Sautero library, and company ones from colleagues. The shelf is picked via large tiles when opening Recipes. Fixes 16–17 Jul: the shelf no longer switches by itself, a company recipe you authored shows under Company, and a company recipe NEVER appears on the personal My Recipes shelf again even after switching modes (db/130). Ticked off 17 Jul.', status:'ok', desc:'Recepty sú rozdelené na police podľa autora — tvoje vlastné, spoločná Sautero knižnica a firemné od kolegov. Polica sa vyberá veľkými dlaždicami pri otvorení Receptov. Opravy 16.–17.7.: polica sa sama neprepína, firemný recept od teba sa ukazuje v Company, a firemný recept sa už NIKDY neukáže na osobnej polici My Recipes ani po prepnutí režimu (db/130). Odškrtnuté 17.7.' },\n    { name:'Vlastné projekty (Add Project)', name_en:'Custom projects (Add Project)', desc_en:'Alongside the fixed shelves you can create your own named recipe collections — e.g. \"Wedding menu 2026\" — choosing one of 8 coloured books as the icon. Long-press a tile = rename / hide / delete. Verified live 17 Jul (\"works, I\\'m happy\"). Since db/147 (18 Jul) a kitchen\\'s projects and the recipes filed into them are visible to the whole team.', status:'ok', desc:'Vedľa pevných políc si vieš vytvoriť vlastné pomenované zbierky receptov — napr. \"Svadobné menu 2026\" — s výberom z 8 farebných kníh ako ikonou. Dlhé podržanie dlaždice = premenovať / skryť / vymazať. Naživo overené 17.7. („funkčné, som spokojný\").' },\n    { name:'Sekcie per polica (každá vlastné)', name_en:'Sections per shelf (each its own)', desc_en:'Every shelf and project has its own independent list of sections (Soups, Desserts…) — a new shelf starts clean with just Favorites + All and builds its sections via \"+ New Section\". Verified live 17 Jul (\"exactly as it should be\").', status:'ok', desc:'Každá polica aj projekt má vlastný, nezávislý zoznam sekcií (Polievky, Dezerty…) — nová polica začína čistá, len Favorites + All, a sekcie si buduje sama cez \"+ New Section\". Naživo overené 17.7. („presne ako má byť\").' },\n    { name:'Ochrana proti duplicitám pri zverejnení 🧠', name_en:'Duplicate protection on publishing 🧠', desc_en:'When publishing an ingredient to the Public shelf two checks run: a fast name normalisation (case, diacritics, spaces) against the whole Sautero price book and scan aliases — and if nothing matches, a short AI check (Haiku) recognises the same ingredient in another language (\"Karfiol\" vs \"Cauliflower\") or a typo. A duplicate is not published; the existing library item stays the single source of truth. On error the AI check lets things through (it never blocks by mistake).', status:'build', desc:'Pri zverejnení ingrediencie na Public policu prebehnú dve kontroly: rýchla normalizácia názvu (veľké/malé písmená, diakritika, medzery) proti celému Sautero cenníku aj aliasom zo skenov — a keď nič nenájde, krátka AI kontrola (Haiku) rozpozná aj rovnakú surovinu v inom jazyku („Karfiol“ vs „Cauliflower“) či preklep. Duplikát sa nezverejní, existujúca knižničná položka ostáva tá jedna pravá. AI kontrola pri chybe púšťa ďalej (nikdy neblokuje omylom).' },\n    { name:'Verejná polica Public + publikovanie 🌍', name_en:'Public shelf + publishing 🌍', desc_en:'A new Public tile right next to Sautero — visible to every account in every kitchen. You publish your own recipe with the 🌍 globe in its detail (with a confirmation question; the same button unpublishes). The recipe stays one — yours — and everyone reads, favourites and comments on it directly (db/131). Foreign public recipes (and friends\\' recipes) are strictly READ-ONLY — the Edit button never shows; they can only be scaled, commented on, and their ingredients added to your own database (17 Jul). Rules from 17 Jul afternoon: fixed tiles (My Recipes/Sautero/Public/Company) can NEVER be deleted, only hidden (long-press); publishing from a Company profile is impossible — the app explains the rules and a database trigger (db/133) enforces it technically too. Everyone may publish only their own personal recipes from a Personal profile.', status:'ok', desc:'Nová dlaždica Public hneď vedľa Sautero — vidí ju každý účet v každej kuchyni. Vlastný recept zverejníš glóbusom 🌍 v detaile (s kontrolnou otázkou; rovnakým tlačidlom sa dá aj stiahnuť späť). Recept ostáva jeden — tvoj — a všetci ho čítajú, favoritujú a komentujú priamo (db/131). Cudzie verejné recepty (aj recepty priateľov) sú striktne READ-ONLY — Edit tlačidlo sa vôbec neukáže, dá sa len škálovať, komentovať a pridať suroviny do vlastnej databázy (17.7.). Naživo overené 17.7. naprieč 3 účtami; komentovanie cudzích verejných receptov opravené hneď v teste (db/132). Pravidlá 17.7. popoludní: pevné dlaždice (My Recipes/Sautero/Public/Company) sa NEDAJÚ vymazať, len skryť (dlhé podržanie); z Company profilu sa publikovať nedá vôbec — appka vypíše podmienky a databázový trigger (db/133) to poistí aj technicky. Publikovať smie každý len vlastné osobné recepty z Personal profilu.' },\n    { name:'Skutočné súkromie \"Moje\" (RLS)', name_en:'True \"Mine\" privacy (RLS)', desc_en:'Personal recipes are private at the database level — not even the kitchen admin sees them. It is not just an app filter but a server security rule.', status:'test', acct:'personal', desc:'Osobné recepty sú súkromné priamo na úrovni databázy — nevidí ich ani admin kuchyne. Nie je to len filter v appke, ale bezpečnostné pravidlo servera.' },\n    { name:'Zdieľanie s priateľmi (opt-in)', name_en:'Sharing with friends (opt-in)', desc_en:'If you enable it in settings, your chef friends (Connections) can see your own recipes — read-only. Can be switched off anytime.', status:'ok', desc:'Ak si to zapneš v nastaveniach, tvoji chef-priatelia (Connections) vidia tvoje vlastné recepty — len na čítanie. Vypnuteľné kedykoľvek.' },\n    { name:'Komentáre — zdieľané naprieč kuchyňami', name_en:'Comments — shared across kitchens', desc_en:'A comment on a Sautero recipe is visible to every kitchen that has that recipe — a shared noticeboard over the library. Verified live 17 Jul after the db/129 fix (a comment carries the master recipe ID directly). The comment count shows in two places: a badge on the comments button in the detail and a numbered bubble next to the star right in the recipe list (1–9, then \"9+\"). The arrow on recipe rows was removed — it did nothing.', status:'ok', desc:'Komentár na Sautero recepte vidí každá kuchyňa, ktorá ten recept má — spoločná nástenka nad knižnicou. Naživo overené 17.7. po oprave db/129 (komentár si nesie ID master receptu priamo). Počet komentárov vidno na dvoch miestach: badge na tlačidle komentárov v detaile a bublinka s číslom vedľa hviezdičky priamo v zozname receptov (1–9, potom „9+\"). Šípka na riadkoch receptov zmazaná — nič nerobila.' },\n    { name:'Activity feed (🔔 kto okomentoval)', name_en:'Activity feed (🔔 who commented)', desc_en:'The bell on Home shows a dot when someone comments on YOUR recipe — opening it lists the new comments. Confirmed live 17 Jul. Since the evening of 17 Jul it also watches recipes in your Favourites (public/Sautero, including comments from other kitchens — marked ⭐).', status:'ok', desc:'Zvonček na Home ukáže bodku, keď niekto okomentuje TVOJ recept — po otvorení vidíš zoznam nových komentárov. Potvrdené naživo 17.7. Od 17.7. večera sleduje aj recepty v tvojich Obľúbených (public/Sautero, aj komenty z iných kuchýň — označené ⭐).' },\n    { name:'AI generovanie receptu / nápadov', name_en:'AI recipe / idea generation', desc_en:'Chef\\'s Assistant can generate a completely new tailored recipe — by ingredients, diet or style — and save it straight to your shelf.', status:'ok', desc:'Chef\\'s Assistant vie vygenerovať úplne nový recept na mieru — podľa surovín, diéty alebo štýlu — a uložiť ho rovno do tvojej police.' },\n    { name:'Sken receptu z fotky / PDF', name_en:'Recipe scan from photo / PDF', desc_en:'Photograph a recipe (even handwritten, even a whole menu) and AI transcribes it into the standard Sautero format — ingredients, quantities, method, everything in its place.', status:'ok', desc:'Odfotíš recept (aj ručne písaný, aj celé menu) a AI ho prepíše do štandardného Sautero formátu — suroviny, množstvá, postup, všetko na svojom mieste.' },\n    { name:'Sken menu z URL webstránky', name_en:'Menu scan from a website URL', desc_en:'Paste a web page address with a menu and AI downloads and processes it by itself — the same result as a photo scan, without photographing.', status:'ok', desc:'Vložíš adresu webstránky s menu a AI si ju stiahne a spracuje sama — rovnaký výsledok ako sken fotky, bez fotenia.' },\n    { name:'Tlač — firemná identita (branded)', name_en:'Print — company identity (branded)', desc_en:'One print button: a professional recipe card with your kitchen\\'s header, the Sautero mark, a two-column layout (ingredients + numbered method), a composition pie chart, Chef\\'s Notes and a \"Used In\" section. Verified live 17 Jul (\"recipes print perfectly\"); the old basic print was removed. Bug fixed 17 Jul: after closing the print preview in Safari the recipe icons vanished until refresh — the app now forces a cleanup and re-render after printing.', status:'ok', desc:'Jedno tlačidlo tlače: profesionálna receptová karta s hlavičkou tvojej kuchyne, Sautero pečiatkou, dvojstĺpcovým layoutom (suroviny + očíslovaný postup), koláčovým grafom zloženia, Chef\\'s Notes a sekciou \"Used In\". Naživo overené 17.7. („receptúry sa tlačia perfektne\"); stará základná tlač zmazaná. Opravený bug 17.7.: po zatvorení náhľadu tlače v Safari zmizli ikony pri recepte až do refreshu — appka teraz po tlači vynúti upratanie a prekreslenie sama.' },\n    { name:'Pridať recept do Check Listu', name_en:'Add a recipe to the Check List', desc_en:'A button on the recipe — the app first asks which project (if you have several), then which station, and the recipe lands in the daily prep list. Verified live 17 Jul; the test added \"➕ New section…\" — you can file the recipe into a brand-new section, not only existing ones.', status:'ok', desc:'Tlačidlo na recepte — appka sa najprv spýta do ktorého projektu (ak máš viac), potom na ktorú stanicu, a recept pristane v dennom prep liste. Naživo overené 17.7.; na základe testu pribudla možnosť „➕ New section…\" — recept vieš vložiť aj do úplne novej sekcie, nielen do existujúcich.' },\n    { name:'Obľúbené, poznámky, škálovanie, alergény', name_en:'Favourites, notes, scaling, allergens', desc_en:'A star for favourites, your own notes on every recipe, quantity scaling by portions or by a single ingredient, automatic allergen and diet detection from ingredient names.', status:'ok', desc:'Hviezdička na obľúbené, vlastné poznámky ku každému receptu, prepočet množstiev podľa porcií alebo jednej suroviny, automatická detekcia alergénov a diét z názvov surovín.' },\n    { name:'Sken celého menu → viac receptov naraz + uložiť všetky', name_en:'Whole-menu scan → many recipes at once + save all', desc_en:'Scanning a menu generates every dish as its own full recipe and lets you save them ALL in one tap (fixed 22 Jul: it used to let you keep only one while charging credits for all of them). Each can be reviewed, re-tried if one fails, and filed to chosen destinations.', status:'ok', desc:'Sken menu vygeneruje každé jedlo ako vlastný plný recept a umožní uložiť ich VŠETKY jedným ťuknutím (opravené 22.7.: predtým sa dal nechať len jeden, no kredity sa strhli za všetky). Každý sa dá prezrieť, skúsiť znova ak zlyhá, a uložiť na vybrané miesta.' },\n    { name:'Sken: úroveň zložitosti (Short / Standard / Sophisticated)', name_en:'Scan: complexity level (Short / Standard / Sophisticated)', desc_en:'Before scanning you pick how detailed the generated recipes should be, and you can rewrite the batch at another level afterwards. A missing method is filled in with one tap.', status:'ok', desc:'Pred skenom si vyberieš, aké podrobné majú vygenerované recepty byť, a dávku vieš dodatočne prepísať na inú úroveň. Chýbajúci postup sa doplní jedným ťuknutím.' },\n    { name:'Orezanie fotky po nasnímaní (crop)', name_en:'Photo crop after capture', desc_en:'After taking or choosing a photo for a scan you can crop it before AI reads it — cleaner input, better transcription.', status:'ok', desc:'Po odfotení alebo výbere fotky pre sken si ju vieš pred spracovaním orezať — čistejší vstup, lepší prepis.' },\n    { name:'Fotka k receptu — pridať / zmeniť / odstrániť (všetci) + AI generovanie (4 účty)', name_en:'Recipe photo — add / change / remove (everyone) + AI generation (4 accounts)', desc_en:'On your own recipe everyone can add their own photo (uploaded, downscaled on-device to ~900px), change it, or remove it (in the edit form and on the detail). The 4 internal accounts additionally get a ✨ button that generates a photorealistic dish photo from the recipe\\'s own text (Google Imagen / Gemini), style inherited from the recipe\\'s complexity; each generated photo\\'s cost is logged to Admin → AI Usage. AI generation stays flag-gated until enabled for everyone.', status:'ok', desc:'Na vlastnom recepte vie každý pridať vlastnú fotku (nahratú, zmenšenú v zariadení na ~900px), zmeniť ju alebo odstrániť (v edit formulári aj na detaile). 4 interné účty majú navyše tlačidlo ✨, ktoré vygeneruje fotorealistickú fotku jedla z textu receptu (Google Imagen / Gemini), štýl podľa zložitosti; náklad každej vygenerovanej fotky sa loguje do Admin → AI Usage. AI generovanie ostáva za flagom, kým sa nezapne pre všetkých.' },\n  ]},\n  { icon:'🧂', title:'Ingrediencie', title_en:'Ingredients', items:[\n    { name:'Zdieľaný cenník (2 005 položiek v Sautero cenníku)', name_en:'Shared price book (2,005 items in the Sautero price book)', desc_en:'Your kitchen\\'s ingredient price database — every recipe\\'s food cost is computed from it automatically (live state 17 Jul: 2,005 Sautero price-book items (2,058 rows incl. personal + lists; public counted separately)). Note: most prices are still AI estimates, not verified invoices — real prices arrive via Invoice Scan.', status:'ok', desc:'Cenová databáza surovín tvojej kuchyne — z nej sa automaticky počíta food cost každého receptu (živý stav k 17.7.: 2 005 položiek Sautero cenníka (2 058 riadkov s osobnými a zoznamami; public sa počíta zvlášť)). Pozor: väčšina cien je zatiaľ AI odhad, nie overená faktúra — reálne ceny pribúdajú cez Invoice Scan.' },\n    { name:'My Ingredients (súkromné)', name_en:'My Ingredients (private)', desc_en:'Your own ingredient shelf, separate from the shared price book — private at the database level, just like personal recipes. Confirmed by a live 2-account test 17 Jul (\"Secret marinade\" invisible to other accounts). Since 17 Jul evening mode isolation also applies: in Company mode personal shelves disappear entirely (like My Recipes), with the same Settings override.', status:'ok', acct:'personal', desc:'Tvoja vlastná polica surovín, oddelená od spoločného cenníka — súkromná na úrovni databázy, rovnako ako osobné recepty. Potvrdené živým testom z 2 účtov 17.7. („Tajná marináda“ neviditeľná pre iné účty). Od 17.7. večera navyše platí režimová izolácia: v Company režime osobné police úplne zmiznú (rovnako ako My Recipes), s rovnakým prepínačom v Settings.' },\n    { name:'Vlastné zoznamy + farebné knihy', name_en:'Custom lists + coloured books', desc_en:'Create additional named ingredient lists (e.g. \"Asian pantry\") choosing one of 8 coloured books as the icon (17 Jul). Long-press a custom list = rename / hide / delete / share. Fixed shelves (Sautero, My Ingredients, Public) can only be HIDDEN, never renamed/deleted — same as recipes. Since db/146 (18 Jul) a kitchen\\'s lists and their items are visible to the whole team, and list items also count into Company Ingredients.', status:'ok', desc:'Vytvoríš si ďalšie pomenované zoznamy surovín (napr. \"Ázijská špajza\") s výberom z 8 farebných kníh ako ikonou (17.7.). Dlhé podržanie vlastného zoznamu = premenovať / skryť / vymazať / zdieľať. Pevné police (Sautero, My Ingredients, Public) sa dajú len SKRYŤ, nikdy nie premenovať/vymazať — rovnako ako pri receptoch.' },\n    { name:'Verejná polica + zdieľanie surovín 🌍🤝', name_en:'Public shelf + ingredient sharing 🌍🤝', desc_en:'A new Public tile (across kitchens, read-only) + a Share button in My Ingredients: a list of your ingredients with a 🌍 public / 🤝 friends badge on each, plus \"all at once\" and one-by-one (db/136). Public = every kitchen sees it, Friends = only your chef friends. Nothing can be shared from a Company profile (app + database trigger). Foreign public ingredients are safely escaped, read-only, and never enter your recipe price book. The same choice (public/friends) was added to the recipe publish button.', status:'ok', desc:'Nová dlaždica Public (naprieč kuchyňami, len na čítanie) + tlačidlo Share v My Ingredients: zoznam tvojich surovín, pri každej badge 🌍 public / 🤝 friends, plus „všetko naraz\" a jednotlivo (db/136). Public = vidí každá kuchyňa, Friends = len tvoji chef-priatelia. Z Company profilu sa nedá zdieľať nič (appka + databázový trigger). Cudzie verejné suroviny sú bezpečne escapované, read-only a nikdy nevstupujú do tvojho cenníka receptov. Rovnaká voľba (public/friends) pribudla aj na publish tlačidlo receptov.' },\n    { name:'Pridávanie do zdieľanej police — len admin', name_en:'Adding to the shared shelf — admin only', desc_en:'Only an admin may add to and edit the kitchen\\'s shared price book — a regular member uses it but cannot break it. Everyone has full power over their own shelves.', status:'test', role:'admin', desc:'Do spoločného cenníka kuchyne môže pridávať a upravovať len admin — bežný člen ho používa, ale nerozbije. Vlastné police má každý naplno.' },\n    { name:'Sken dokumentu / fotky → AI extrakcia', name_en:'Document / photo scan → AI extraction', desc_en:'Photograph a supplier price list, a handwritten list or a PDF and AI pulls out every item with its price.', status:'ok', desc:'Odfotíš cenník od dodávateľa, ručný zoznam alebo PDF a AI z neho vytiahne každú položku aj s cenou.' },\n    { name:'Invoice Scan v2 (dodávateľ + viacjazyčný)', name_en:'Invoice Scan v2 (supplier + multilingual)', desc_en:'Invoice scanning, rewritten 17 Jul — reads any language (DE/SK/CZ…), recognises the SUPPLIER from the letterhead and sets it on every item from that invoice, updates prices + date, fills the category. Skips dates, invoice numbers, totals, VAT and deposits (it used to turn a date into an item). A Supplier field was added to ingredients (db/137) — the basis for future one-tap ordering. Nutrition/seasonal details are finished by ✨ AI Details.', status:'ok', desc:'Sken faktúry: 17.7. prepísaný — číta ktorýkoľvek jazyk (DE/SK/CZ…), z hlavičky rozpozná DODÁVATEĽA a nastaví ho na všetky položky z tej faktúry, aktualizuje ceny + dátum, doplní kategóriu. Preskakuje dátumy, čísla faktúr, súčty, DPH a zálohy (predtým z dátumu robil položku). Pribudlo pole Dodávateľ v ingredienciách (db/137) — základ pre budúce objednávanie na klik. Nutričné/sezónne detaily doladí ✨ AI Details.' },\n    { name:'Sken .xlsx (Excel) — viacjazyčný', name_en:'Excel (.xlsx) scan — multilingual', desc_en:'Reads a supplier\\'s Excel file too — no external libraries, right in the browser — and processes it with the same AI extraction. Improved 17 Jul: the scan now handles lists in any language (SK/CZ/DE/PL/FR…), keeps names in the original and normalises units (ks/kus/Stück…) and categories. Previously it only worked properly in English.', status:'ok', desc:'Načíta aj Excel súbor od dodávateľa — bez externých knižníc, priamo v prehliadači — a spracuje ho tou istou AI extrakciou. Vylepšené 17.7.: sken teraz zvláda zoznamy v ktoromkoľvek jazyku (SK/CZ/DE/PL/FR…), názvy ponechá v origináli a jednotky (ks/kus/Stück…) aj kategórie normalizuje. Predtým fungoval poriadne len po anglicky.' },\n    { name:'AI Details — dopĺňanie polí', name_en:'AI Details — filling in fields', desc_en:'One button fills missing categories, seasonality, storage and nutrition values for up to 25 items at once. It never overwrites what is already filled in. Verified live 17 Jul; the result now also explains where the data comes from (typical AI reference values, not lab measurements — always editable).', status:'ok', desc:'Jedno tlačidlo doplní chýbajúce kategórie, sezónnosť, skladovanie a nutričné hodnoty pre až 25 položiek naraz. Nikdy neprepisuje, čo už je vyplnené. Naživo overené 17.7.; výsledok teraz aj vysvetľuje, odkiaľ dáta pochádzajú (typické referenčné hodnoty AI, nie laboratórne meranie — vždy upraviteľné).' },\n    { name:'Dlhé podržanie: premenovať / skryť / vymazať', name_en:'Long-press: rename / hide / delete', desc_en:'Hold your finger (or right-click) on any ingredient and edit it directly — no hunting through menus.', status:'ok', desc:'Podrž prst (alebo pravý klik) na hociktorej surovine a rovno ju upravíš — bez hľadania v menu.' },\n    { name:'Bulk delete (podľa dátumu / všetko)', name_en:'Bulk delete (by date / everything)', desc_en:'Mass-delete ingredients by the date they were added, or a whole shelf at once — for cleaning up after a bad scan.', status:'ok', desc:'Hromadné vymazanie surovín podľa dátumu pridania alebo celej police naraz — na upratanie po zlom skene.' },\n    { name:'Sezónnosť, kategórie, filtre, Ingredient Audit', name_en:'Seasonality, categories, filters, Ingredient Audit', desc_en:'Filtering by kitchen, category, season, storage and price; seasonal ingredients on top; an audit of inconsistent names.', status:'ok', desc:'Filtrovanie podľa kuchyne, kategórie, sezóny, skladovania a ceny; sezónne suroviny navrchu; audit nekonzistentných názvov.' },\n  ]},\n  { icon:'✅', title:'Check List (Kitchen Flow)', title_en:'Check List (Kitchen Flow)', items:[\n    { name:'Súkromie projektov: personal vs company 🔐', name_en:'Project privacy: personal vs company 🔐', status:'test', desc:'Projekt vytvorený v personal režime vidí LEN jeho tvorca — vynútené priamo v databáze (db/159, 19.7.), vrátane celého obsahu (jedlá, položky, úlohy). Firemné projekty zakladá len kitchen admin; členovia v nich tvoria sekcie. Overené impersonačným testom na produkcii, čaká na živý test s Richardom.', desc_en:'A project created in personal mode is visible ONLY to its creator — enforced directly in the database (db/159, 19 Jul), including its whole content (dishes, items, tasks). Company projects are created only by the kitchen admin; members create sections inside them. Verified with an impersonation test on production, awaiting the live test with Richard.' },\n    { name:'Rozbaľovacie jedlá (klik = suroviny)', name_en:'Collapsible dishes (tap = ingredients)', status:'ok', desc:'Karty jedál sú defaultne zbalené — klik na názov otvorí všetky suroviny naraz (18.7.). Výber skrytých položiek sa presunul na ikonu 👁️ vedľa názvu.', desc_en:'Dish cards are collapsed by default — tapping the name opens all ingredients at once (18 Jul). The hidden-items picker moved to the 👁️ icon next to the name.' },\n    { name:'Vlastné názvy tlačidiel TO DO/CHECK/FINISH ✏️', name_en:'Custom TO DO/CHECK/FINISH button labels ✏️', status:'ok', desc:'Dlhým podržaním tlačidla pri KONKRÉTNEJ ingrediencii ho premenuješ len pre ňu (napr. CHECK → „MARINÁDA\", db/151, 18.7.). Ostatné ingrediencie ostávajú štandardné.', desc_en:'Long-press a button on ONE specific ingredient to rename it just there (e.g. CHECK → \"MARINADE\", db/151, 18 Jul). Every other ingredient stays standard.' },\n    { name:'Admin zámky časov 🔒 + sync časov', name_en:'Admin time locks 🔒 + time sync', status:'ok', desc:'Admin vie zamknúť čas ktorejkoľvek fázy ingrediencie (⋮ menu, db/150) — personál ho už nerozkolíše novými zápismi. Zapísaný čas sa zároveň automaticky prenáša na rovnako pomenované ingrediencie v projekte (zámky rešpektuje).', desc_en:'An admin can lock any stage time of an ingredient (⋮ menu, db/150) — staff can no longer drift it with new entries. A logged time also auto-syncs to same-named ingredients in the project (locks respected).' },\n    { name:'Mazanie len pre adminov 🛡️', name_en:'Deletion admin-only 🛡️', status:'ok', desc:'Jedlá a celé sekcie maže len Head Admin / kitchen admin — člen možnosť vôbec nevidí. Tlačidlo 🗑️ Delete zmizlo z hlavičky jedla pre všetkých (2 skoro-straty jedla na iPade, 18.–19.7.); mazanie žije len za dlhým podržaním názvu. Všetko je soft-delete s obnovou.', desc_en:'Dishes and whole sections are deleted only by the Head Admin / kitchen admin — members never see the option. The 🗑️ Delete button left the dish header for everyone (2 near-losses on the iPad, 18–19 Jul); deletion lives only behind a long-press on the name. Everything is soft-delete with restore.' },\n    { name:'Premenovanie ingrediencie (⋮ Edit name)', name_en:'Ingredient rename (⋮ Edit name)', status:'ok', desc:'Preklep alebo zle naskenované meno opravíš na mieste bez straty statusu, on-hand, priority a histórie (18.7.).', desc_en:'Fix a typo or a mis-scanned name in place without losing status, on-hand, priority and history (18 Jul).' },\n    { name:'Prep sheet podľa stanice', name_en:'Prep sheet by station', desc_en:'The daily prep list by station (SKY, Hot Line, Garde Manger…) — dishes with items, TO DO / CHECK / FINISH / DON\\'T DO states, priorities and minutes. The heart of Sautero.', status:'ok', desc:'Denný prípravný zoznam po staniciach (SKY, Hot Line, Garde Manger…) — jedlá s položkami, stavy TO DO / CHECK / FINISH / DON\\'T DO, priority a minúty. Srdce Sautero.' },\n    { name:'Projekty / výber reštaurácie', name_en:'Projects / restaurant picker', desc_en:'One kitchen can run several projects (e.g. two venues) — the Check List opens via a project picker and everything inside is separated.', status:'ok', desc:'Jedna kuchyňa môže mať viac projektov (napr. dve prevádzky) — Check List sa otvára cez výber projektu a všetko vnútri je oddelené.' },\n    { name:'Cross-station \"All\" + overload 🔥', name_en:'Cross-station \"All\" + overload 🔥', desc_en:'A view of all stations at once — who has how much work ahead; a station with more than 3.5 h of outstanding work gets the 🔥 badge.', status:'ok', desc:'Pohľad na všetky stanice naraz — kto má koľko roboty pred sebou; stanica s viac ako 3,5 h nevybavenej práce dostane 🔥 odznak.' },\n    { name:'AI sken prep sheetu (fotka / PDF)', name_en:'AI prep-sheet scan (photo / PDF)', desc_en:'Photograph a paper prep sheet and AI builds the whole station from it — dishes and items — on a single confirmation.', status:'ok', desc:'Odfotíš papierový prep sheet a AI z neho postaví celú stanicu — jedlá aj položky — na jedno potvrdenie.' },\n    { name:'Reálne časy per stav (crowd-sourced)', name_en:'Real times per state (crowd-sourced)', desc_en:'Every item carries minutes for TO DO / CHECK / FINISH; tapping the time records how long it really took, and the estimates refine over time by averaging.', status:'ok', desc:'Každá položka má minúty pre TO DO / CHECK / FINISH; tapnutím na čas zapíšeš, koľko to reálne trvalo, a odhady sa časom spresňujú priemerom.' },\n    { name:'Dlhé podržanie: premenovať / skryť / vymazať', name_en:'Long-press: rename / hide / delete', desc_en:'The same gesture as in Ingredients — hold a dish in the prep list and edit it directly. Confirmed by Richard 17 Jul. Since 17 Jul evening Add Project also offers an icon picker (8 coloured books, all profiles) — the DB column existed since db/94, the form just never offered it.', status:'ok', desc:'Rovnaké gesto ako pri ingredienciách — podrž jedlo v prep liste a rovno ho upravíš. Potvrdené Richardom 17.7. Od 17.7. večera má Add Project aj výber ikony (8 farebných kníh, všetky profily) — stĺpec v DB existoval od db/94, len ho formulár nikdy neponúkol.' },\n    { name:'Audit log zmien', name_en:'Change audit log', desc_en:'Who changed what and when in the Check List — traceable for the admin, no more \"it wasn\\'t me\".', status:'ok', role:'admin', desc:'Kto čo kedy zmenil v Check Liste — dohľadateľné pre admina, žiadne \"to som nebol ja\".' },\n    { name:'Language Audit', name_en:'Language Audit', desc_en:'AI walks through dish and item names and suggests a consistent language/spelling for the whole kitchen.', status:'ok', role:'admin', desc:'AI prejde názvy jedál a položiek a navrhne jednotný jazyk/pravopis pre celú kuchyňu.' },\n    { name:'Prepojenie na Order List a Print Labels', name_en:'Linked to Order List and Print Labels', desc_en:'From a prep-list item in one tap: order it (🛒) or print a label (🖨️).', status:'ok', desc:'Z položky v prep liste jedným ťukom: objednať (🛒) alebo vytlačiť štítok (🖨️).' },\n  ]},\n  { icon:'🛒', title:'Order List', title_en:'Order List', items:[\n    { name:'Súkromný vs firemný nákupný zoznam 🔐', name_en:'Private vs company shopping list 🔐', status:'ok', desc:'Objednávka v personal režime je viditeľná LEN tebe (aj domáce nákupy) — nikdy sa nemieša s firemným zoznamom a naopak (db/156, 19.7., vynútené v databáze).', desc_en:'An order made in personal mode is visible ONLY to you (home shopping included) — it never mixes with the company list and vice versa (db/156, 19 Jul, database-enforced).' },\n    { name:'Objednávanie funguje každému aj bez cien', name_en:'Ordering works for everyone even without prices', status:'ok', desc:'Člen tímu objedná aj položku, ktorá ešte nie je v cenníku — vytvorí sa ako zdieľaná ingrediencia cez bezpečnú serverovú funkciu (db/154, 19.7.), admin ju vidí pomenovanú v celkovom zozname a objedná manuálne. Presne režim „bez zazmluvnených dodávateľov\".', desc_en:'A team member can order an item not yet in the price book — it is created as a shared ingredient via a safe server function (db/154, 19 Jul); the admin sees it named in the summary and orders manually. Exactly the \"no contracted suppliers yet\" mode.' },\n    { name:'Objednávky per-osoba', name_en:'Orders per person', desc_en:'Everyone adds their own items (from the Check List, Ingredients or by hand); duplicate items add up and the admin sees who ordered what. Verified live 16 Jul.', status:'ok', desc:'Každý si pridáva vlastné položky (z Check Listu, Ingrediencií alebo ručne); duplicitné položky sa sčítavajú a admin vidí, kto čo objednal. Naživo overené 16.7.' },\n    { name:'Bulk tlač / vymazanie', name_en:'Bulk print / delete', desc_en:'Select several items at once and print or clear them with one tap.', status:'ok', desc:'Označíš viac položiek naraz a vytlačíš alebo vyčistíš jedným ťukom.' },\n    { name:'Send to Supplier', name_en:'Send to Supplier', desc_en:'Sending the order straight to the supplier with one button — currently a \"coming soon\" placeholder, planned after the trial (connecting Swiss suppliers is the long-term vision).', status:'plan', desc:'Odoslanie objednávky priamo dodávateľovi jedným tlačidlom — zatiaľ \"coming soon\" placeholder, plánované po triali (napojenie na švajčiarskych dodávateľov je dlhodobá vízia).' },\n  ]},\n  { icon:'🏷️', title:'Print Labels', title_en:'Print Labels', items:[\n    { name:'Fronta štítkov z Check Listu / ručne', name_en:'Label queue from the Check List / manual', desc_en:'Prepare product labels from the prep list with one tap or by hand (name suggestions from 3 letters) and print them all at once.', status:'ok', desc:'Štítky na produkty pripravíš z prep listu jedným ťukom alebo ručne (od 3 písmen navrhuje názvy) a vytlačíš všetky naraz.' },\n    { name:'Use-by dátum automaticky', name_en:'Use-by date automatically', desc_en:'The label computes the use-by date from the product\\'s shelf life by itself — no midnight mental arithmetic.', status:'ok', desc:'Štítok si sám dopočíta dátum spotreby z trvanlivosti produktu — žiadne počítanie v hlave o polnoci.' },\n    { name:'HACCP log každej tlače', name_en:'HACCP log of every print', desc_en:'Every printed label is recorded with its use-by date — that feeds the Label Expiry screen in HACCP (expired / today-tomorrow / fine).', status:'ok', desc:'Každý vytlačený štítok sa zapíše s dátumom spotreby — z toho žije obrazovka Expirácia štítkov v HACCP (čo je po dátume / dnes-zajtra / v poriadku).' },\n    { name:'Tlačiareň Brother QL-820NWB', name_en:'Brother QL-820NWB printer', desc_en:'The recommended printer (~CHF 130, no contract) is selected and justified in docs/LABEL_PRINTER_RESEARCH.md — not physically bought yet; printing goes through the browser\\'s normal print for now.', status:'plan', desc:'Odporúčaná tlačiareň (~CHF 130, bez zmluvy) je vybraná a zdôvodnená v docs/LABEL_PRINTER_RESEARCH.md — fyzicky zatiaľ nekúpená, tlačí sa cez bežnú tlačiareň prehliadača.' },\n  ]},\n  { icon:'⏱️', title:'Working Time', title_en:'Working Time', items:[\n    { name:'Check-in / check-out, prestávky', name_en:'Check-in / check-out, breaks', desc_en:'Arrival and departure with one tap, breaks, notes on the day — a record of hours worked for you and for payroll.', status:'ok', desc:'Príchod a odchod jedným ťukom, prestávky, poznámky ku dňu — evidencia odpracovaných hodín pre teba aj pre výplatu.' },\n    { name:'Reálne bežiace stopky na prestávku', name_en:'A real running break stopwatch', desc_en:'Tap 5/10/15/30 min and a live countdown runs (working time pauses while it does) — the day detail then shows the exact start→end time and length of every break. Added 19 Jul.', status:'ok', desc:'Ťukneš 5/10/15/30 min a bežia živé odpočítavajúce stopky (working time sa dovtedy zastaví) — v detaile dňa potom vidíš presný čas prestávky od→do aj jej dĺžku. Pridané 19.7.' },\n    { name:'Zabudnutý check-in / check-out', name_en:'Forgotten check-in / check-out', desc_en:'If you forget to tap, the app notices and lets you fill in the real time retroactively — both ways (forgotten arrival and departure).', status:'ok', desc:'Ak zabudneš ťuknúť, appka to zistí a dá ti spätne doplniť skutočný čas — obojsmerne (zabudnutý príchod aj odchod).' },\n    { name:'GPS snímka pri check-in/out', name_en:'GPS snapshot at check-in/out', desc_en:'A one-off location exactly at the moment of arrival/departure (not continuous tracking — a deliberate legal decision). ⚠️ Audit 16 Jul: still needs to be added to legal.html.', status:'ok', desc:'Jednorazová poloha presne v momente príchodu/odchodu (nie priebežné sledovanie — vedomé rozhodnutie z právnych dôvodov). ⚠️ Audit 16.7.: treba ju ešte doplniť do legal.html.' },\n    { name:'Kontrahované hodiny, nadčasy, voľno', name_en:'Contracted hours, overtime, time off', desc_en:'Worked hours compared against the contract, overtime and the time-off balance — monthly bar and pie charts.', status:'ok', desc:'Porovnanie odpracovaného s úväzkom, nadčasy a zostatok voľna — mesačné grafy a koláče.' },\n    { name:'Detail dňa (objednávky + štítky)', name_en:'Day detail (orders + labels)', desc_en:'For each day you see what was ordered that day and how many labels were printed — context for the hours worked.', status:'ok', desc:'Pri každom dni vidíš, čo sa v ten deň objednalo a koľko štítkov sa vytlačilo — kontext k odpracovaným hodinám.' },\n    { name:'Sken zmluvy → AI poznámka', name_en:'Contract scan → AI note', desc_en:'Upload your employment contract and AI extracts hours, holidays and pay conditions — with ⚠️/✅/ℹ️ icons on every point. The contract is visible only to you (protected at the database level).', status:'ok', desc:'Nahráš pracovnú zmluvu a AI z nej vytiahne hodiny, dovolenku a platové podmienky — s ikonami ⚠️/✅/ℹ️ pri každom bode. Zmluva je viditeľná len tebe (chránené na úrovni databázy).' },\n    { name:'Pripomienka zmeny (shift reminder)', name_en:'Shift reminder', desc_en:'The app reminds you of your upcoming shift start according to the schedule.', status:'ok', desc:'Appka ti pripomenie blížiaci sa začiatok zmeny podľa rozpisu.' },\n  ]},\n  { icon:'📅', title:'Schedule', title_en:'Schedule', items:[\n    { name:'Rozpis zmien (shift kódy)', name_en:'Shift schedule (shift codes)', desc_en:'A monthly grid schedule with shift codes just like on paper — built from a real hotel roster. The roster is currently being rebuilt for Burrito Bandito & Lido.', status:'ok', desc:'Mesačný rozpis v mriežke so zmenovými kódmi ako na papieri — postavený podľa reálneho rozpisu z hotela. Roster sa momentálne prestavuje pre Burrito Bandito & Lido.' },\n    { name:'Sken rozpisu (Dienstplan) → AI', name_en:'Schedule scan (Dienstplan) → AI', desc_en:'Photograph a paper Dienstplan and AI transcribes it into the app — names, days, shifts.', status:'ok', desc:'Odfotíš papierový Dienstplan a AI ho prepíše do appky — mená, dni, zmeny.' },\n    { name:'Aktivita člena tímu (admin, demo)', name_en:'Team member activity (admin, demo)', desc_en:'In demo mode the admin can tap a team member\\'s name and see their last 30 days — tapping a day shows exactly what they ordered, which labels they printed, which recipes/dishes they added and how much time they stopped in Check List. Added 19 Jul, demo-only for now.', status:'ok', desc:'V demo móde admin ťukne na meno člena tímu a vidí jeho posledných 30 dní — ťuknutím na deň sa ukáže presne čo objednal, aké štítky vytlačil, aké recepty/jedlá pridal a koľko času odstopoval v Check List. Pridané 19.7., zatiaľ len v demo móde.' },\n  ]},\n  { icon:'🧼', title:'HACCP', title_en:'HACCP', items:[\n    { name:'HACCP pre každý účet + kto odškrtol + demo', name_en:'HACCP for every account + who ticked + demo', status:'ok', desc:'Dlaždica HACCP je od 18.7. viditeľná každému účtu vrátane Personal. Cleaning checklist zapisuje MENO toho, kto úlohu odškrtol (vidí ho admin, db/149), nová kuchyňa dostane 5 demo úloh pri prvom otvorení. Richard overil naživo. (19.7.: nájdený a odstránený zabudnutý kód, ktorý bežných členov aj tak blokoval — teraz naozaj pre všetkých.)', desc_en:'The HACCP tile is visible to every account incl. Personal since 18 Jul. The cleaning checklist records WHO ticked each task (admins see the name, db/149), and a virgin kitchen gets 5 demo tasks on first open. Verified live by Richard. (Jul 19: found and removed a forgotten gate that was still blocking regular members — now truly open to everyone.)' },\n    { name:'Príjem tovaru, teploty varenia, chladenie', name_en:'Goods receiving, cooking temperatures, cooling', desc_en:'Temperature records at receiving, core temperatures while cooking and a cooling protocol — exactly what a Swiss inspection asks for.', status:'ok', desc:'Záznamy teplôt pri príjme, jadrové teploty pri varení a protokol chladenia — presne to, čo pýta švajčiarska kontrola.' },\n    { name:'Teploty chladničiek', name_en:'Fridge temperatures', desc_en:'Daily fridge/freezer temperature logging with history. (The automatic SensorPush sensor is researched, not bought yet.)', status:'ok', desc:'Denné zapisovanie teplôt chladničiek/mrazničiek s históriou. (Automatický senzor SensorPush je preskúmaný, zatiaľ nekúpený.)' },\n    { name:'Čistenie a hygiena checklisty', name_en:'Cleaning and hygiene checklists', desc_en:'Daily/weekly cleaning and hygiene checklists with tick-offs — traceable at an inspection.', status:'ok', desc:'Denné/týždenné upratovacie a hygienické checklisty s odškrtávaním — dohľadateľné pri kontrole.' },\n    { name:'Fritézový olej, škodcovia', name_en:'Fryer oil, pests', desc_en:'Records of oil changes and pest checks — the two most common inspection questions.', status:'ok', desc:'Evidencia výmeny oleja a kontrol škodcov — dve najčastejšie otázky inšpekcie.' },\n    { name:'Expirácia štítkov', name_en:'Label expiry', desc_en:'An overview of everything labelled: expired / ending today-tomorrow / fine — connected to Print Labels.', status:'ok', desc:'Prehľad všetkého, čo bolo oštítkované: po dátume / končí dnes-zajtra / v poriadku — napojené na Print Labels.' },\n    { name:'Skryté z osobných účtov', name_en:'Hidden from personal accounts', desc_en:'HACCP (and Team Meetings) are visible only to company accounts and admins — they don\\'t clutter a solo chef\\'s personal account. Confirmed by Richard 17 Jul. Guarantee: since db/116 Company mode is locked to real team members, so every company team member HAS HACCP in their Company profile; tightened 17 Jul evening so accounts with no chosen profile type don\\'t see it either.', status:'ok', desc:'HACCP (a Team Meetings) vidia len firemné účty a admini — samostatnému kuchárovi na osobnom účte zbytočne nezavadzia. Potvrdené Richardom 17.7. Garancia: Company režim je od db/116 uzamknutý na skutočných členov tímu, takže každý člen company tímu HACCP v Company profile MÁ; utiahnuté 17.7. večer, aby ho nevideli ani účty s nevybraným typom profilu.' },\n    { name:'Školenia personálu (vlna 3)', name_en:'Staff training (wave 3)', desc_en:'A record of who completed hygiene training and when — a \"coming soon\" tile for now.', status:'plan', desc:'Evidencia, kto absolvoval hygienické školenie a kedy — zatiaľ \"pripravujeme\" dlaždica.' },\n    { name:'Admin report naprieč HACCP', name_en:'Admin report across HACCP', desc_en:'One summary screen across all HACCP modules for an inspection — a \\'coming soon\\' tile for now.', status:'plan', desc:'Jedna súhrnná obrazovka cez všetky HACCP moduly pre kontrolu — zatiaľ \"pripravujeme\" dlaždica.' },\n  ]},\n  { icon:'🎪', title:'Events (bankety a akcie)', title_en:'Events (banquets & functions)', items:[\n    { name:'New Event — manuálne aj AI scanom', name_en:'New Event — manual or AI scan', status:'test', desc:'Nová dlaždica Events (t172, db/153, 18.7.): akcia sa zapíše formulárom (typ, klient, počet ľudí, menu, cena, dátum/čas) ALEBO odfotíš objednávku/e-mail a AI všetko vytiahne a predvyplní — skontroluješ a uložíš. Čaká na prvý plný živý test.', desc_en:'The new Events tile (t172, db/153, 18 Jul): log a function via the form (type, client, headcount, menu, price, date/time) OR photograph the order/e-mail and AI extracts and prefills everything — review and save. Awaiting its first full live test.' },\n    { name:'Dnes | Zajtra + 🎭 demo prepínač', name_en:'Today | Tomorrow + 🎭 demo toggle', status:'test', desc:'Dva banery vedľa seba (dnešné a zajtrajšie akcie), ďalšie dni pod nimi — najbližší hore. 🎭 Demo v hornej lište (len Head Admin) ukáže vymyslené akcie len na obrazovke — nič sa neukladá; nový štandard pre všetky demá v appke.', desc_en:'Two banners side by side (today\\'s and tomorrow\\'s functions), later days below — nearest first. 🎭 Demo in the top bar (Head Admin only) shows invented functions on screen only — nothing is saved; the new standard for all in-app demos.' },\n  ]},\n  { icon:'🎩', title:\"Chef's Assistant (AI)\", items:[\n    { name:'Chat asistent, technika, substitúcie', name_en:'Chat assistant, technique, substitutions', desc_en:'A Michelin-style culinary advisor: ingredient substitutions, technique, dish ideas — right in the app.', status:'ok', desc:'Michelin-štýl kuchársky poradca: náhrady surovín, technika, nápady na jedlá — priamo v appke.' },\n    { name:'Generovaný recept → ulož alebo vylepši 🔒', name_en:'Generated recipe → save or improve 🔒', desc_en:'After the assistant generates any recipe you choose: Add to recipes (with a control question of WHERE besides My/Company Recipes — the recipe projects, mode-correct so a company view never lists personal projects) or Generate a better recipe (simpler / more complex / same difficulty). A \"Saving your recipe…\" overlay shows until the new recipe opens. The whole tile is locked with its own behavioural robot — 7 of 13 tiles.', status:'ok', desc:'Po vygenerovaní receptu si vyberieš: Pridať do receptov (s kontrolnou otázkou KAM okrem My/Company Recipes — projekty, správne podľa režimu, takže company pohľad nikdy neponúkne osobné projekty) alebo Vygenerovať lepší recept (jednoduchší / zložitejší / rovnaká obtiažnosť). Počas ukladania beží okno „Ukladám recept…\" až po otvorenie nového receptu. Celá dlaždica je zamknutá vlastným behaviorálnym robotom — 7 z 13 dlaždíc.' },\n    { name:'AI kredit systém pre Personal účty', name_en:'AI credit system for Personal accounts', desc_en:'Personal accounts use AI features via a CHF credit balance (first top-up 70% credit, later ones 90%) — company accounts have AI in the subscription. Billed by real token consumption.', status:'test', acct:'personal', desc:'Osobné účty majú AI funkcie cez kreditový zostatok v CHF (prvé dobitie 70 % kreditu, ďalšie 90 %) — firemné účty majú AI v predplatnom. Účtuje sa podľa reálnej spotreby tokenov.' },\n    { name:'Centrálny Anthropic API kľúč', name_en:'Central Anthropic API key', desc_en:'All AI features run through one company key in a separate workspace — user consumption is tracked apart from development. Nobody has to paste their own key anymore.', status:'test', desc:'Všetky AI funkcie bežia cez jeden firemný kľúč v samostatnom workspace — spotreba užívateľov sa sleduje oddelene od vývojárskej. Nikto si už nemusí vkladať vlastný kľúč.' },\n    { name:'AI Testing Mode', name_en:'AI Testing Mode', desc_en:'A platform-wide switch for the Head Admin: while it is on, AI is unlimited for everyone (for testing) — the credit system is bypassed.', status:'test', role:'admin', desc:'Platformový vypínač pre Head Admina: kým je zapnutý, AI je pre všetkých neobmedzené (na testovanie) — kreditový systém sa obchádza.' },\n    { name:'AI Usage — spotreba per užívateľ', name_en:'AI Usage — consumption per user', desc_en:'Since 17 Jul the server (claude-proxy) records every AI call (who, feature, tokens, price — db/139). A live overview in Admin → AI Usage: the Head Admin sees everyone, a Kitchen Admin their team (RLS db/142); tapping a user opens a pie chart of their AI features. The founder\\'s 3 test accounts are flagged. The Claude Platform dashboard only sees the shared key — this is the only place with the split.', status:'build', role:'admin', desc:'Server (claude-proxy) od 17.7. zapisuje každé AI volanie (kto, funkcia, tokeny, cena — db/139). Živý prehľad v Admin → AI Usage: Head Admin vidí všetkých, Kitchen Admin svoj tím (RLS db/142); rozklik na užívateľa otvorí koláčový graf jeho AI funkcií. Zakladateľove 3 testovacie účty označené. Claude Platform dashboard vidí len spoločný kľúč — toto je jediné miesto s rozdelením.' },\n    { name:'Gate presadený aj na serveri', name_en:'Gate enforced on the server too', desc_en:'The credit check also runs in the server function, not just the app — bypassing it from the browser is not enough.', status:'test', desc:'Kreditová kontrola beží aj v serverovej funkcii, nielen v appke — obísť ju z prehliadača nestačí.' },\n    { name:'Chef Challenge', name_en:'Chef Challenge', desc_en:'Playful AI cooking challenges. ⚠️ The audit recommends dropping it from the trial build — a toy with no tie to kitchen value.', status:'ok', desc:'Hravé AI výzvy na varenie. ⚠️ Audit odporúča vyhodiť z trial buildu — hračka bez väzby na hodnotu pre kuchyňu.' },\n  ]},\n  { icon:'🔗', title:'Connections', title_en:'Connections', items:[\n    { name:'Add Friend QR / email', name_en:'Add Friend QR / email', desc_en:'Add a fellow chef by scanning their QR or by email — a friend link for sharing recipes and lists.', status:'ok', desc:'Pridáš si kolegu-kuchára naskenovaním jeho QR alebo emailom — vznikne priateľské prepojenie na zdieľanie receptov a zoznamov.' },\n    { name:'Chef Friends zoznam', name_en:'Chef Friends list', desc_en:'The list of your connected chefs — for each one you see what they share with you.', status:'ok', desc:'Zoznam tvojich prepojených kuchárov — pri každom vidíš, čo s tebou zdieľa.' },\n    { name:'Share My Recipe — konkrétnemu priateľovi', name_en:'Share My Recipe — with a specific friend', desc_en:'A new tile in Connections (db/143): pick YOUR recipe, then which friends will see it — and the friend gets a notification on next opening the app. The bulk \"share all\" switch remains alongside. Company profiles share nothing — enforced in the database too.', status:'build', desc:'Nová dlaždica v Connections (db/143): vyber SVOJ recept, potom ktorí priatelia ho uvidia — a priateľ dostane pri ďalšom otvorení appky upozornenie. Popri tom ostáva aj hromadný prepínač „zdieľať všetky“. Company profily nezdieľajú nič — vynútené aj v databáze.' },\n    { name:'Connections zjednodušené', name_en:'Connections simplified', desc_en:'Instead of \"Share QR Code\" with 3 questions: 👋 Invite Friend opens the QR directly, 📖 Share My Recipe has its own tile. The Kitchen Reports kitchen list was redesigned (admin name from the email, pin only on the row\\'s edge).', status:'build', desc:'Namiesto „Share QR Code“ s 3 otázkami: 👋 Invite Friend otvorí QR rovno, 📖 Share My Recipe má vlastnú dlaždicu. Kitchen Reports zoznam kuchýň predizajnovaný (meno admina z emailu, pin len na boku riadku).' },\n    { name:'Zdieľané recepty od priateľov', name_en:'Recipes shared by friends', desc_en:'Recipes your friends made available to you (read-only) — opened straight from their profile.', status:'ok', desc:'Recepty, ktoré ti priatelia sprístupnili (read-only) — otváraš ich priamo z ich profilu.' },\n    { name:'Zdieľané zoznamy ingrediencií od priateľov', name_en:'Ingredient lists shared by friends', desc_en:'The same for custom ingredient lists — a friend shows you e.g. their \"Asian pantry\", read-only.', status:'test', desc:'To isté pre vlastné zoznamy surovín — priateľ ti ukáže napr. svoju \"Ázijskú špajzu\", len na čítanie.' },\n    { name:'Scan QR (univerzálny)', name_en:'Scan QR (universal)', desc_en:'One camera scanner recognises a friend QR, a team invite and a join code — and always asks first what you want to do.', status:'ok', desc:'Jeden skener kamery rozozná priateľský QR, tímovú pozvánku aj join kód — a vždy sa najprv spýta, čo chceš urobiť.' },\n  ]},\n  { icon:'🏗️', title:'Tímy / Typ účtu', title_en:'Teams / Account type', items:[\n    { name:'Premenovanie kuchyne/tímu ✏️ (Head Admin)', name_en:'Kitchen/team rename ✏️ (Head Admin)', status:'ok', desc:'V My Team pri názve kuchyne je ✏️ — Head Admin premenuje tím kedykoľvek, nielen pri vzniku (18.7.). Premenovanie CUDZEJ firmy (Add Company) potrebuje budúci zoznam všetkých kuchýň — zapísané v Poznámkach.', desc_en:'My Team shows ✏️ next to the kitchen name — the Head Admin renames the team anytime, not just at creation (18 Jul). Renaming a FOREIGN company (Add Company) needs the future all-kitchens directory — noted in Poznámky.' },\n    { name:'Add Company = okamžité admin práva', name_en:'Add Company = instant admin rights', status:'ok', desc:'Pozvaný hlavný admin novej firmy je po kliknutí na link a vyplnení polí HNEĎ adminom — pozvánka si sama predschváli jeho e-mail v prístupovej bráne (db/148, 18.7.); dovtedy sa zasekával na „Waiting for approval\".', desc_en:'The invited main admin of a new company becomes an admin IMMEDIATELY after the link + form — the invite pre-approves their email at the access gate (db/148, 18 Jul); previously they were stuck on \"Waiting for approval\".' },\n    { name:'Personal / Company prepínač', name_en:'Personal / Company switch', desc_en:'One account, two modes: a personal notebook vs. the company kitchen. Switched with one tap on Home, with a confirmation.', status:'ok', desc:'Jeden účet, dva režimy: osobný zápisník vs. firemná kuchyňa. Prepnutie jedným ťukom na Home s potvrdením.' },\n    { name:'Reálne členstvo — brána na Company', name_en:'Real membership — the Company gate', desc_en:'Only someone who has REALLY joined the team (invite, join code) or is an admin gets into Company mode — random strangers no longer do.', status:'test', desc:'Do Company režimu sa dostane len ten, kto sa REÁLNE pripojil do tímu (pozvánka, join kód) alebo je admin — hocikto cudzí už nie.' },\n    { name:'Join kód — QR / ručne / email', name_en:'Join code — QR / manual / email', desc_en:'The admin generates their kitchen\\'s code or QR; a new member scans or types it and the app asks \"do you want to become a member of team X?\" before joining.', status:'test', acct:'company', desc:'Admin vygeneruje kód alebo QR svojej kuchyne; nový člen ho naskenuje alebo zadá a appka sa spýta \"chceš sa stať členom tímu X?\" pred pripojením.' },\n    { name:'ROLE v My Profile', name_en:'ROLE in My Profile', desc_en:'Your profile shows your role: Head Admin / Admin / Admin Assistant / Member — by actual rights, not by impression.', status:'test', desc:'V profile vidíš svoju rolu: Head Admin / Admin / Admin Assistant / Member — podľa skutočných práv, nie podľa dojmu.' },\n    { name:'Team Members — Make Assistant / Remove', name_en:'Team Members — Make Assistant / Remove', desc_en:'The admin sees their kitchen\\'s member list (in Admin and in Connections > My Team), can grant the assistant role and remove a member. Verified live 17 Jul after a three-round RLS fix. Since 18 Jul roles read Main Admin / Kitchen Admin by name.', status:'ok', role:'admin', desc:'Admin vidí zoznam členov svojej kuchyne (v Admin aj v Connections > My Team), vie prideliť rolu asistenta a odstrániť člena. Naživo overené 17.7. po trojkolovej oprave RLS.' },\n    { name:'Remove ponecháva osobný Sautero', name_en:'Remove keeps the personal Sautero', desc_en:'A removed member loses ONLY the company kitchen — they immediately get their own clean \"My Kitchen\" with standard shelves, and their personal recipes/ingredients stay theirs. Verified live 17 Jul.', status:'ok', desc:'Odstránený člen príde LEN o firemnú kuchyňu — okamžite dostane vlastnú čistú \"My Kitchen\" so štandardnými policami a jeho osobné recepty/suroviny mu zostávajú. Naživo overené 17.7.' },\n  ]},\n  { icon:'🛡️', title:'Admin', title_en:'Admin', items:[\n    { name:'Add Admin (Head / Kitchen Admin)', name_en:'Add Admin (Main / Kitchen Admin)', desc_en:'Two levels: Main Admin (Richard, full reach) and Kitchen Admin (selected rights via switches — invites, team, reports…).', status:'ok', role:'admin', desc:'Dve úrovne: Head Admin (Richard, plný dosah) a Kitchen Admin (vybrané práva cez prepínače — pozvánky, tím, reporty…).' },\n    { name:'Add Company (jednorazová pozvánka)', name_en:'Add Company (single-use invite)', desc_en:'Richard creates the company and sends ONE invite by email — whoever accepts automatically becomes that kitchen\\'s main admin. Resilient to a \"burned\" link (email preview) — verified on sautero@protonmail.com.', status:'ok', role:'admin', desc:'Richard založí firmu a pošle JEDNU pozvánku emailom — kto ju prijme, automaticky sa stane hlavným adminom tej kuchyne. Odolné aj voči \"spálenému\" odkazu (email preview) — overené na sautero@protonmail.com.' },\n    { name:'Admin Directory', name_en:'Admin Directory', desc_en:'An overview of all accounts with on/off right switches, account type and AI credit (if any).', status:'ok', role:'admin', desc:'Prehľad všetkých účtov s on/off prepínačmi práv, typom účtu a AI kreditom (ak nejaký má).' },\n    { name:'Access Requests', name_en:'Access Requests', desc_en:'Approving new requests for access to Sautero — the app is invite-only; nobody gets in without approval.', status:'ok', role:'admin', desc:'Schvaľovanie nových žiadostí o prístup do Sautero — appka je invite-only, bez schválenia sa nikto nedostane dnu.' },\n    { name:'Kitchen Reports (hub + grafy + predikcia)', name_en:'Kitchen Reports (hub + charts + prediction)', desc_en:'A report hub like Internal Docs: Team Members (attendance, hours, activity — pie and bar charts, only with the employee\\'s consent), Recipes (Sautero/Company shelves, completeness of times and prices, section mix), Ingredients (% with prices and filled data), Check List (states, remaining minutes per station, projects) — each section with a 🔮 pace prediction. HACCP reports still \"in the works\".', status:'test', acct:'company', role:'admin', desc:'Reportový hub ako Internal Docs: Team Members (dochádzka, hodiny, aktivita — koláčové a stĺpcové grafy, len so súhlasom zamestnanca), Recepty (police Sautero/Company, kompletnosť časov a cien, mix sekcií), Ingrediencie (% s cenami a doplnenými dátami), Check List (stavy, zostávajúce minúty per stanica, projekty) — každá sekcia s 🔮 predikciou tempa. HACCP reporty zatiaľ ako \"pracujeme na tom\".' },\n    { name:'Feedback inbox (iba Head Admin)', name_en:'Feedback inbox (Main Admin only)', desc_en:'All user feedback (Settings > Send Feedback) in one place. ONLY the main admin (Richard / iCloud) sees it — not kitchen admins. Secured in the database (read policy is_super_admin(), db/108) and in the UI. Verified live 17 Jul.', status:'ok', role:'admin', desc:'Všetka spätná väzba od užívateľov (Settings > Send Feedback) na jednom mieste. Vidí ju IBA hlavný admin (Richard / iCloud) — nie kuchynskí admini. Zabezpečené aj v databáze (read policy is_super_admin(), db/108) aj v UI. Naživo overené 17.7.' },\n    { name:'Email Contacts (číslované + detail)', name_en:'Email Contacts (numbered + detail)', desc_en:'Every email address Sautero has ever seen (requests, invites) — filled automatically by a database trigger. 17 Jul: numbering added (#1 oldest at the bottom, newest on top) and tapping a contact opens the full detail for the main admin, including the linked Sautero account (name, role, type, kitchen) if one exists.', status:'test', role:'admin', desc:'Každá emailová adresa, ktorú Sautero kedy videl (žiadosti, pozvánky) — plnené automaticky databázovým triggerom. 17.7.: pribudlo číslovanie (#1 najstarší naspodu, najnovší hore) a ťuknutím na kontakt sa hlavnému adminovi otvorí celý detail vrátane napojeného Sautero účtu (meno, rola, typ, kuchyňa), ak taký existuje.' },\n    { name:'AI Testing Mode + Internal Docs', name_en:'AI Testing Mode + Internal Docs', desc_en:'The unlimited-AI testing switch + internal documents (status, backlog, investor deck, the latest Critical Review) — Internal Docs for Richard only.', status:'ok', role:'admin', desc:'Vypínač neobmedzeného AI na testovanie + interné dokumenty (status, backlog, investor deck, najnovší Critical Review) — Internal Docs len pre Richarda.' },\n    { name:'Preview as Normal User', name_en:'Preview as Normal User', desc_en:'The admin views the app through a regular member\\'s eyes with one tap — with a permanent return banner.', status:'ok', role:'admin', desc:'Admin si jedným ťukom pozrie appku očami bežného člena — s trvalým bannerom na návrat.' },\n  ]},\n  { icon:'⚙️', title:'Nastavenia', title_en:'Settings', items:[\n    { name:'My Profile & Security (heslo, Face ID)', name_en:'My Profile & Security (password, Face ID)', desc_en:'Name, email, team, role; a mandatory password + optional Face ID unlock on this device (biometrics never leave the phone).', status:'ok', desc:'Meno, email, tím, rola; povinné heslo + voliteľné Face ID odomknutie na tomto zariadení (biometria nikdy neopúšťa telefón).' },\n    { name:'Light / Dark mode', name_en:'Light / Dark mode', desc_en:'An appearance switch — dark (the original Sautero) or light for a kitchen in daylight. Per device; every team member chooses for themselves.', status:'test', desc:'Prepínač vzhľadu — tmavý (pôvodný Sautero) alebo svetlý pre kuchyňu pri dennom svetle. Per zariadenie, každý člen tímu si volí sám.' },\n    { name:'🎪 Events (bankety a akcie) — plán', name_en:'🎪 Events (banquets and functions) — planned', desc_en:'An Events tile: things yet to happen (a banquet for 35, three-course menu…). New Event manually or by scan (AI reads the type, client, headcount, menu and price from a photo of the order), below it Today | Tomorrow events side by side. Logged 18 Jul (t172), marked to finish.', status:'plan', desc:'Dlaždica Events: udalosti, ktoré sa ešte len majú stať (banket 35 ľudí, trojchodové menu…). New Event manuálne alebo scanom (AI z fotky objednávky rozpozná typ, klienta, počet ľudí, menu, cenu), pod tým Dnešné | Zajtrajšie eventy vedľa seba. Zapísané 18.7. (t172), s poznámkou dokončiť.' },\n    { name:'Add Team Member (kód + QR + link + email)', name_en:'Add Team Member (code + QR + link + email)', desc_en:'The admin of an existing kitchen (e.g. protonmail \"T1\") adds people to THEIR team: the sheet mints a fresh 6-character code, QR, copyable link and an email field (a login email with the join built in). Replaced the confusing \"Create Team\" for kitchen admins — creating new kitchens stays with the Main Admin (iCloud). db/145: a kitchen\\'s own admin may mint its code. 18 Jul.', status:'test', role:'admin', desc:'Admin existujúcej kuchyne (napr. protonmail „T1“) pridáva ľudí do SVOJHO tímu: sheet vygeneruje čerstvý 6-miestny kód, QR, kopírovateľný link a pole na email (login email s pripraveným joinom). Create Team dlaždica bola 18.7. večer úplne odstránená (nové kuchyne vznikajú cez Add Company u hlavného admina); nápad do budúcna: kitchen admini si budú môcť tvoriť viac tímov vo vlastnej firme (Poznámky). db/145: kód si smie vygenerovať admin vlastnej kuchyne.' },\n    { name:'Nový vzhľad (beta — len zakladateľ)', name_en:'New look (beta — founder only)', desc_en:'The redesign \"same identity, higher league\": navy in 4 depth layers, teal with glow, hairline borders, 44px+ touch targets, micro-interactions. Lives under html.theme-new — the classic theme untouched; the Classic/New switch in Appearance is visible only to richard.cervenka@icloud.com (default New for him, per device, deployed inert for everyone else). Branch redesign-ui, waves 1–3.', status:'build', role:'admin', desc:'Redesign „tá istá identita, vyššia liga“: navy v 4 vrstvách hĺbky, teal s glow, hairline bordery, 44px+ dotykové ciele, mikrointerakcie. Žije pod html.theme-new — klasická téma nedotknutá; prepínač Klasický/Nový v Appearance vidí len richard.cervenka@icloud.com (u neho default Nový, per zariadenie, nasadené neaktívne pre všetkých ostatných). Vetva redesign-ui, celky 1–3.' },\n    { name:'Jazyk (EN/DE/FR/IT/SK)', name_en:'Language (EN/DE/FR/IT/SK)', desc_en:'Switching the interface language — partial coverage (login, Home, Check List), the rest gradually. Kitchen data is never translated.', status:'ok', desc:'Prepnutie jazyka rozhrania — čiastočné pokrytie (login, Home, Check List), zvyšok postupne. Dáta kuchyne sa nikdy neprekladajú.' },\n    { name:'Tutoriály pre každé okno (❓)', name_en:'Tutorials for every screen (❓)', desc_en:'Every main screen (Check List, Recipes, Ingredients, Order List, Print Labels, Working Time, Schedule, HACCP, Chef\\'s Assistant, Connections, Admin, Settings) has its own detailed guide: it opens by itself on first visit and a permanent ❓ in the top bar replays it. Replaced the What\\'s New heart (deleted 17 Jul as duplicate — Richard).', status:'test', desc:'Každá hlavná obrazovka (Check List, Recepty, Ingrediencie, Order List, Print Labels, Working Time, Schedule, HACCP, Chef\\'s Assistant, Connections, Admin, Settings) má vlastný podrobný sprievodca: otvorí sa sám pri prvom otvorení obrazovky a v hornej lište je natrvalo ❓ na jeho zopakovanie. Nahradilo What\\'s New srdiečko (zmazané 17.7. ako duplicitné — Richard).' },\n    { name:'Preusporiadanie ikoniek Home/Settings', name_en:'Reordering Home/Settings tiles', desc_en:'Everyone arranges the tile order for themselves — it applies only to their device.', status:'ok', desc:'Poradie dlaždíc si každý nastaví sám — platí len pre jeho zariadenie.' },\n    { name:'Send Feedback', name_en:'Send Feedback', desc_en:'A message straight to Richard from the app — a bug, an idea or praise.', status:'test', desc:'Správa priamo Richardovi z appky — chyba, nápad alebo pochvala.' },\n    { name:'Zdieľať hodiny s adminom (súhlas)', name_en:'Share hours with the admin (consent)', desc_en:'By default the admin sees team hours only anonymously in total; by name only if you enable it here yourself. Revocable anytime.', status:'test', desc:'Defaultne admin vidí hodiny tímu len anonymne v súčte; menovite len ak si to tu sám zapneš. Kedykoľvek odvolateľné.' },\n    { name:'Tutorial + pridanie na plochu', name_en:'Tutorial + add to home screen', desc_en:'The in
