<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sautero — Kompletná kontrola funkcií</title>
<style>
  :root{
    --bg:#0A1A2F; --bg-2:#0d2036; --paper:#122845; --paper-raised:#0f2340; --paper-hi:#16304f;
    --ink:#fff; --ink-dim:#9C949E; --ink-faint:rgba(156,148,158,0.6);
    --rule:#223d57; --rule-soft:#1a3149;
    --accent:#34F7D7; --accent-dim:rgba(52,247,215,0.4); --accent-wash:rgba(52,247,215,0.08);
    --gold:#F7C948; --gold-dim:rgba(247,201,72,0.4); --gold-wash:rgba(247,201,72,0.08);
    --danger:#FF7A68; --danger-dim:rgba(255,122,104,0.4); --danger-wash:rgba(255,122,104,0.08);
    --ok:#4ADE80; --ok-dim:rgba(74,222,128,0.4); --ok-wash:rgba(74,222,128,0.09);
    --test:#FB923C; --test-dim:rgba(251,146,60,0.5); --test-wash:rgba(251,146,60,0.14);
    --plan:#8891A0; --plan-dim:rgba(136,145,160,0.4); --plan-wash:rgba(136,145,160,0.08);
    --shadow:0 8px 28px rgba(0,0,0,0.45);
    --mono:"SF Mono",Menlo,Consolas,monospace;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; overflow-x:hidden; }
  body{ background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif; -webkit-font-smoothing:antialiased; line-height:1.5; padding-bottom:80px; }
  .wrap{ max-width:1180px; margin:0 auto; padding:0 20px 100px 20px; }
  .hero{ background:linear-gradient(180deg, var(--bg-2), var(--bg)); border-bottom:1px solid var(--rule); padding:26px 0 30px 0; }
  .hero-inner{ position:relative; max-width:1180px; margin:0 auto; padding:0 20px; }
  .topline{ display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:18px; flex-wrap:wrap; }
  .brandmark{ display:flex; align-items:center; gap:9px; }
  .brandmark .mark{ font-size:20px; }
  .brandmark .word{ font-size:15px; font-weight:700; letter-spacing:.02em; color:var(--accent); font-style:italic; font-family:Georgia,'Times New Roman',serif; }
  .acct-toggle{ display:flex; background:var(--paper); border:1px solid var(--rule); border-radius:10px; padding:3px; gap:2px; }
  .acct-toggle button{ background:none; border:none; color:var(--ink-dim); font:inherit; font-size:12.5px; font-weight:700; padding:6px 13px; border-radius:8px; cursor:pointer; }
  .acct-toggle button.active{ background:var(--accent); color:#0A1A2F; }
  .lang-toggle{ position:fixed; top:12px; right:12px; z-index:60; background:var(--paper); border:1px solid var(--rule); color:var(--ink); font-size:12px; font-weight:700; padding:6px 12px; border-radius:999px; cursor:pointer; }
  .kicker{ color:var(--accent); font-size:12px; letter-spacing:.16em; text-transform:uppercase; font-weight:700; margin-bottom:8px; }
  h1{ font-size:24px; margin:0 0 8px 0; }
  .lede{ color:var(--ink-dim); font-size:13.5px; max-width:72ch; line-height:1.6; margin:0; }
  .legend{ display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .legend-item{ display:flex; align-items:center; gap:8px; background:var(--paper); border:1px solid var(--rule); border-radius:10px; padding:8px 13px; font-size:12.5px; color:var(--ink-dim); cursor:pointer; user-select:none; transition:opacity .15s, border-color .15s; }
  .legend-item.active{ border-color:var(--accent-dim); }
  .legend-item:not(.active){ opacity:.38; border-style:dashed; }
  .legend-dot{ width:10px; height:10px; border-radius:50%; flex:none; }
  .legend-item b{ color:var(--ink); font-weight:700; }
  .donut-row{ display:flex; align-items:center; gap:22px; margin-top:20px; flex-wrap:wrap; }
  #sweepDonut{ flex:none; }
  .seg{ cursor:pointer; transition:opacity .15s; } .seg.off{ opacity:.15; }
  .center-num{ font-family:var(--mono); font-size:24px; font-weight:700; fill:var(--ink); cursor:pointer; }
  .center-lbl{ font-size:8.5px; fill:var(--ink-faint); text-transform:uppercase; letter-spacing:.06em; }
  .pulse-strip{ display:grid; grid-template-columns:repeat(2,1fr); gap:1px; margin-top:20px; background:var(--rule); border:1px solid var(--rule); border-radius:16px; overflow:hidden; }
  @media (min-width:640px){ .pulse-strip{ grid-template-columns:repeat(5,1fr); } }
  .pulse-cell{ background:var(--paper); padding:14px 16px 12px 16px; }
  .pulse-cell .num{ font-family:var(--mono); font-size:23px; font-weight:700; line-height:1; font-variant-numeric:tabular-nums; }
  .pulse-cell .lbl{ font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-dim); margin-top:6px; display:flex; align-items:center; gap:6px; }
  .pulse-cell .lbl::before{ content:''; width:7px; height:7px; border-radius:50%; flex:none; }
  .pulse-cell.ok .lbl::before{ background:var(--ok); } .pulse-cell.ok .num{ color:var(--ok); }
  .pulse-cell.test .lbl::before{ background:var(--test); } .pulse-cell.test .num{ color:var(--test); }
  .pulse-cell.plan .lbl::before{ background:var(--plan); } .pulse-cell.plan .num{ color:var(--ink-dim); }
  .pulse-cell.total .lbl::before{ background:var(--gold); } .pulse-cell.total .num{ color:var(--gold); }
  .pulse-cell.time .lbl::before{ background:var(--accent); } .pulse-cell.time .num{ color:var(--accent); }

  .section-label{ display:flex; align-items:center; gap:10px; margin:34px 0 12px 0; }
  .section-label .n{ font-family:var(--mono); font-size:11px; color:var(--accent); }
  .section-label h2{ font-size:15px; margin:0; }
  .section-label .rule{ flex:1; height:1px; background:var(--rule); }

  .module{ margin-top:30px; }
  .module-head{ display:flex; align-items:baseline; gap:12px; margin-bottom:14px; cursor:pointer; }
  .module-icon{ width:34px; height:34px; border-radius:10px; background:var(--paper-raised); display:flex; align-items:center; justify-content:center; font-size:17px; flex:none; }
  .module-title{ font-size:17px; font-weight:800; flex:1; }
  .module-count{ font-size:12px; color:var(--ink-faint); font-family:var(--mono); white-space:nowrap; }
  .module-bar{ display:flex; height:6px; border-radius:999px; overflow:hidden; margin:0 0 14px 0; background:var(--rule-soft); }
  .module-bar div{ height:100%; }
  .module-chevron{ font-size:12px; color:var(--ink-faint); transition:transform .15s; flex:none; }
  .module.collapsed .module-chevron{ transform:rotate(-90deg); }
  .module.collapsed .feature-grid, .module.collapsed .module-bar{ display:none; }

  .feature-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:9px; }
  .feature-card{ background:var(--paper); border:1px solid var(--rule); border-left:3px solid var(--ok); border-radius:11px; padding:11px 13px; cursor:pointer; transition:border-color .15s, transform .05s; }
  .feature-card:hover{ border-color:var(--accent-dim); }
  .feature-card:active{ transform:scale(.985); }
  .feature-card.status-test{ border-left-color:var(--test); background:var(--test-wash); }
  .feature-card.status-plan{ border-left-color:var(--plan); }
  .feature-card .fname{ font-size:12.5px; font-weight:700; display:flex; align-items:flex-start; gap:7px; line-height:1.4; }
  .status-dot{ width:8px; height:8px; border-radius:50%; flex:none; margin-top:4px; }
  .status-dot.ok{ background:var(--ok); }
  .status-dot.test{ background:var(--test); }
  .status-dot.plan{ background:var(--plan); }
  .acct-tag{ display:inline-block; font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; padding:2px 6px; border-radius:7px; margin-top:7px; margin-right:4px; }
  .acct-tag.personal{ background:var(--accent-wash); color:var(--accent); }
  .acct-tag.company{ background:var(--gold-wash); color:var(--gold); }
  .acct-tag.admin{ background:var(--gold-wash); color:var(--gold); }
  .feature-card.dim{ opacity:.32; }

  .modal-backdrop{ position:fixed; inset:0; background:rgba(4,10,20,.72); display:none; align-items:center; justify-content:center; padding:20px; z-index:100; }
  .modal-backdrop.open{ display:flex; }
  .modal{ background:var(--paper); border:1px solid var(--rule); border-radius:18px; max-width:440px; width:100%; padding:20px 22px 16px 22px; box-shadow:var(--shadow); }
  .modal .m-module{ font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.12em; color:var(--ink-faint); }
  .modal .m-name{ font-size:17px; font-weight:800; margin:6px 0 10px 0; line-height:1.35; }
  .modal .m-status{ display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:700; padding:4px 11px; border-radius:9px; border:1px solid; }
  .modal .m-status.ok{ color:var(--ok); border-color:var(--ok-dim); background:var(--ok-wash); }
  .modal .m-status.test{ color:var(--test); border-color:var(--test-dim); background:var(--test-wash); }
  .modal .m-status.plan{ color:var(--ink-dim); border-color:var(--plan-dim); background:var(--plan-wash); }
  .modal .m-desc{ font-size:13px; color:var(--ink-dim); line-height:1.6; margin:14px 0 4px 0; }
  .modal .m-tags{ display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
  .modal .m-close{ display:block; width:100%; margin-top:16px; background:none; border:1px solid var(--rule); border-radius:10px; color:var(--ink-dim); font:inherit; font-size:13px; padding:9px 0; cursor:pointer; }
  .modal .m-close:hover{ border-color:var(--accent-dim); color:var(--ink); }

  .chefos-stamp{ text-align:center; font-size:12px; color:var(--ink-faint); margin-top:50px; padding-top:20px; border-top:1px solid var(--rule); }
  @media print{ .lang-toggle{ display:none; } }
</style>
</head>
<body>
<button class="lang-toggle" id="langBtn" onclick="toggleLang()">EN</button>

<div class="hero">
  <div class="hero-inner">
    <div class="topline">
      <div class="brandmark"><span class="mark">🔍</span><span class="word">Sautero</span></div>
      <div class="acct-toggle">
        <button id="acctPersonalBtn" onclick="setAcctView('personal')" data-sk="Personal" data-en="Personal">Personal</button>
        <button id="acctCompanyBtn" class="active" onclick="setAcctView('company')" data-sk="Company" data-en="Company">Company</button>
      </div>
    </div>
    <div class="kicker" data-sk="19.7.2026 sweep" data-en="19 Jul 2026 sweep"></div>
    <h1 data-sk="Kompletná kontrola funkcií" data-en="Complete feature verification"></h1>
    <p class="lede" data-sk="Každá jednotlivá vec, ktorú treba na telefóne osobne odklikať a potvrdiť — dlaždica po dlaždici, presne ako mapa funkcií. Klikni na ktorúkoľvek kartu pre detail. Prepínač Personal/Company hore stlmí kontroly, ktoré sa v danom režime netýkajú." data-en="Every single thing that needs to be personally tapped through and confirmed on a phone — tile by tile, exactly like the feature map. Tap any card for detail. The Personal/Company switch above dims checks that don't apply in that mode."></p>
    <div class="legend" id="legendRow"></div>
    <div class="donut-row">
      <svg id="sweepDonut" width="120" height="120" viewBox="0 0 120 120"></svg>
      <div class="pulse-strip" id="pulseStrip"></div>
    </div>
  </div>
</div>

<div class="wrap">
  <div id="modulesWrap"></div>
  <div class="chefos-stamp" id="stamp">🔄 Stav Sautero k 19. 7. 2026</div>
</div>

<div class="modal-backdrop" id="modalBackdrop" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <div class="m-module" id="mModule"></div>
    <div class="m-name" id="mName"></div>
    <span class="m-status" id="mStatus"></span>
    <p class="m-desc" id="mDesc"></p>
    <div class="m-tags" id="mTags"></div>
    <button class="m-close" onclick="closeModal()" data-sk="Zavrieť" data-en="Close">Zavrieť</button>
  </div>
</div>

let _lang = 'sk';
let activeStatuses = new Set(['ok','test','plan']);
let _collapsedModules = new Set();
const STATUS_LABELS_I18N = {
  sk: { ok:'Hotovo, potvrdené naživo', test:'Postavené, čaká na živý test', plan:'Ešte sa nezačalo' },
  en: { ok:'Done, confirmed live', test:'Built, awaiting a live test', plan:'Not started yet' },
};
const STATUS_LABELS = new Proxy({}, { get: (_, k) => STATUS_LABELS_I18N[_lang][k] });
const LEGEND_SK = { ok:'Hotovo', test:'Rozbehnuté', plan:'Čaká' };
const LEGEND_EN = { ok:'Done', test:'In progress', plan:'Not started' };

function applyStaticLabels(){
  document.querySelectorAll('[data-sk]').forEach(el=>{
    const v = el.getAttribute(_lang === 'sk' ? 'data-sk' : 'data-en');
    if(v !== null) el.textContent = v;
  });
}
function toggleLang(){
  _lang = _lang === 'sk' ? 'en' : 'sk';
  document.getElementById('langBtn').textContent = _lang === 'sk' ? 'EN' : 'SK';
  document.documentElement.lang = _lang;
  applyStaticLabels();
  renderLegend();
  renderModules();
}
function IN(it){ return (_lang==='en' && it.ne) ? it.ne : it.n; }

function renderLegend(){
  const L = _lang==='sk' ? LEGEND_SK : LEGEND_EN;
  const colors = { ok:'var(--ok)', test:'var(--test)', plan:'var(--plan)' };
  document.getElementById('legendRow').innerHTML = ['ok','test','plan'].map(k=>`
    <div class="legend-item ${activeStatuses.has(k)?'active':''}" id="legend${k}" onclick="toggleStatusFilter('${k}')">
      <span class="legend-dot" style="background:${colors[k]};"></span><span><b id="legendCount_${k}">0</b> ${L[k]}</span>
    </div>
  `).join('');
}
function toggleStatusFilter(k){
  if(activeStatuses.has(k)) activeStatuses.delete(k); else activeStatuses.add(k);
  if(activeStatuses.size===0) activeStatuses.add(k);
  renderModules();
}
function resetStatusFilters(){ activeStatuses = new Set(['ok','test','plan']); renderModules(); }
function setAcctView(type){
  document.getElementById('acctPersonalBtn').classList.toggle('active', type==='personal');
  document.getElementById('acctCompanyBtn').classList.toggle('active', type==='company');
  renderModules();
}
function toggleModule(mi){
  if(_collapsedModules.has(mi)) _collapsedModules.delete(mi); else _collapsedModules.add(mi);
  renderModules();
}

function renderModules(){
  const wrap = document.getElementById('modulesWrap');
  const acct = document.getElementById('acctPersonalBtn').classList.contains('active') ? 'personal' : 'company';
  let ok=0, test=0, plan=0;
  wrap.innerHTML = MODULES.map((mod, mi)=>{
    let mOk=0, mTest=0, mPlan=0;
    const cards = mod.items.map((it, ii)=>{
      if(it.s==='ok') ok++; else if(it.s==='test') test++; else plan++;
      if(it.s==='ok') mOk++; else if(it.s==='test') mTest++; else mPlan++;
      if(!activeStatuses.has(it.s)) return null;
      const dimmed = it.a && it.a !== 'both' && it.a !== acct;
      return `
        <div class="feature-card status-${it.s}${dimmed?' dim':''}" onclick="openModal(${mi},${ii})">
          <div class="fname"><span class="status-dot ${it.s}"></span>${IN(it)}</div>
          <div>
            ${it.a==='personal' ? `<span class="acct-tag personal">Personal</span>` : ''}
            ${it.a==='company' ? `<span class="acct-tag company">Company</span>` : ''}
            ${it.a==='admin' ? `<span class="acct-tag admin">🛡️ Admin</span>` : ''}
          </div>
        </div>
      `;
    }).filter(Boolean);
    const mTotal = mOk+mTest+mPlan;
    const collapsed = _collapsedModules.has(mi);
    return `
      <div class="module${collapsed?' collapsed':''}">
        <div class="module-head" onclick="toggleModule(${mi})">
          <div class="module-icon">${mod.icon}</div>
          <div class="module-title">${_lang==='en' && mod.title_en ? mod.title_en : mod.title}</div>
          <div class="module-count">${mOk}/${mTotal}</div>
          <div class="module-chevron">▾</div>
        </div>
        <div class="module-bar">
          <div style="width:${mTotal?mOk/mTotal*100:0}%; background:var(--ok);"></div>
          <div style="width:${mTotal?mTest/mTotal*100:0}%; background:var(--test);"></div>
          <div style="width:${mTotal?mPlan/mTotal*100:0}%; background:var(--plan);"></div>
        </div>
        <div class="feature-grid">${cards.join('') || `<div style="color:var(--ink-faint); font-size:12.5px; padding:8px 0;">${_lang==='sk'?'Nič vo filtri.':'Nothing in this filter.'}</div>`}</div>
      </div>
    `;
  }).join('');
  document.getElementById('legendCount_ok') && (document.getElementById('legendCount_ok').textContent = ok);
  document.getElementById('legendCount_test') && (document.getElementById('legendCount_test').textContent = test);
  document.getElementById('legendCount_plan') && (document.getElementById('legendCount_plan').textContent = plan);
  renderPulse(ok, test, plan);
  renderDonut(ok, test, plan);
}
function renderPulse(ok, test, plan){
  const total = ok+test+plan;
  const pct = total ? Math.round(ok/total*100) : 0;
  const cells = [
    { cls:'ok', num:ok, lsk:'Hotovo', len:'Done' },
    { cls:'test', num:test, lsk:'Rozbehnuté', len:'In progress' },
    { cls:'plan', num:plan, lsk:'Zostáva', len:'Remaining' },
    { cls:'total', num:total, lsk:'Spolu · '+pct+'%', len:'Total · '+pct+'%' },
    { cls:'time', num:FOUNDER_TIME_LABEL, lsk:'Čas na kontrole', len:'Time testing' },
  ];
  document.getElementById('pulseStrip').innerHTML = cells.map(c=>`
    <div class="pulse-cell ${c.cls}"><div class="num">${c.num}</div><div class="lbl">${_lang==='sk'?c.lsk:c.len}</div></div>
  `).join('');
}
function renderDonut(ok, test, plan){
  const svg = document.getElementById('sweepDonut');
  const total = ok + test + plan;
  const R = 44, C = 2 * Math.PI * R;
  const segs = [
    { key:'ok', val:ok, color:'var(--ok)' },
    { key:'test', val:test, color:'var(--test)' },
    { key:'plan', val:plan, color:'var(--plan)' },
  ];
  let off = 0;
  const circles = segs.map(s=>{
    const frac = total ? s.val / total : 0;
    const c = `<circle class="seg${activeStatuses.has(s.key)?'':' off'}" cx="60" cy="60" r="${R}"
      fill="none" stroke="${s.color}" stroke-width="17"
      stroke-dasharray="${(frac*C).toFixed(2)} ${(C-frac*C).toFixed(2)}"
      stroke-dashoffset="${(-off*C).toFixed(2)}" transform="rotate(-90 60 60)"
      onclick="toggleStatusFilter('${s.key}')"><title>${s.val}</title></circle>`;
    off += frac;
    return c;
  }).join('');
  const filtered = activeStatuses.size < 3;
  const shown = segs.filter(s=>activeStatuses.has(s.key)).reduce((a,s)=>a+s.val,0);
  const pct = total ? Math.round(ok/total*100) : 0;
  svg.innerHTML = circles +
    `<text class="center-num" x="60" y="56" text-anchor="middle" onclick="resetStatusFilters()">${filtered ? shown : pct+'%'}</text>` +
    `<text class="center-lbl" x="60" y="70" text-anchor="middle">${filtered ? (_lang==='sk'?'vo filtri':'in filter') : (_lang==='sk'?'hotovo':'done')}</text>`;
}
function openModal(mi, ii){
  const mod = MODULES[mi], it = mod.items[ii];
  document.getElementById('mModule').textContent = mod.icon + ' ' + (_lang==='en' && mod.title_en ? mod.title_en : mod.title);
  document.getElementById('mName').textContent = IN(it);
  const st = document.getElementById('mStatus');
  st.className = 'm-status ' + it.s;
  st.textContent = STATUS_LABELS[it.s];
  document.getElementById('mDesc').textContent = '';
  document.getElementById('mTags').innerHTML =
    (it.a==='personal' ? `<span class="acct-tag personal">${_lang==='sk'?'Len Personal účty':'Personal accounts only'}</span>` : '') +
    (it.a==='company' ? `<span class="acct-tag company">${_lang==='sk'?'Len Company účty':'Company accounts only'}</span>` : '') +
    (it.a==='admin' ? `<span class="acct-tag admin">🛡️ ${_lang==='sk'?'Len Admin':'Admin only'}</span>` : '') +
    (it.a==='both' ? `<span class="acct-tag personal">Personal</span><span class="acct-tag company">Company</span>` : '');
  document.getElementById('modalBackdrop').classList.add('open');
}
function closeModal(){ document.getElementById('modalBackdrop').classList.remove('open'); }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

/* Self-reported, not audited — same convention as costs.html. Sweep started ~15:00 Bern time
   19.7. (first Home screenshot 15:02); updated by hand as the session continues. */
const FOUNDER_TIME_LABEL = '~3.5h';

applyStaticLabels();
renderLegend();
renderModules();
</script>
