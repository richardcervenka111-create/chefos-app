\n    background:radial-gradient(ellipse at center, var(--accent-wash), transparent 70%);\n  }\n  .hero-inner{ position:relative; max-width:1100px; margin:0 auto; padding:0 24px; }\n  .topline{ display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; }\n  .brandmark{ display:flex; align-items:center; gap:9px; }\n  .brandmark .word{ font-size:15px; font-weight:700; letter-spacing:0.02em; color:var(--accent); }\n  .lang-toggle{\n    background:var(--paper); border:1px solid var(--rule); color:var(--ink-dim);\n    font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;\n    padding:6px 12px; border-radius:20px; cursor:pointer; transition:border-color .15s, color .15s; flex:none;\n  }\n  .lang-toggle:hover{ border-color:var(--accent-dim); color:var(--accent); }\n  .kicker{ color:var(--accent); font-size:12px; letter-spacing:0.18em; text-transform:uppercase; font-weight:700; margin-bottom:10px; }\n  h1.title{ font-size:38px; font-weight:800; margin:0 0 14px 0; line-height:1.12; letter-spacing:-0.01em; }\n  h1.title em{ font-style:italic; color:var(--accent); font-weight:800; }\n  .lede{ color:var(--ink-dim); font-size:15px; max-width:64ch; line-height:1.65; }\n\n  /* Pulse strip — the board's own column counts, computed live, so the top of the page\n     answers \"how are we doing\" before any scrolling. */\n  .pulse-row{ display:flex; align-items:center; gap:24px; margin-top:26px; flex-wrap:wrap; }\n  #kanbanDonut .seg{ cursor:pointer; transition:stroke-width .15s; }\n  #kanbanDonut .seg:hover{ stroke-width:20; }\n  #kanbanDonut text{ fill:var(--ink); font-family:\"SF Mono\",Menlo,monospace; }\n  .col.flash{ outline:2px solid var(--accent); outline-offset:3px; border-radius:14px; }\n  .pulse-strip{ display:grid; grid-template-columns:repeat(4,1fr); gap:1px; margin-top:26px; background:var(--rule); border:1px solid var(--rule); border-radius:16px; overflow:hidden; }\n  @media (max-width:680px){ .pulse-strip{ grid-template-columns:repeat(2,1fr); } }\n  .pulse-cell{ background:var(--paper); padding:16px 18px 14px 18px; }\n  .pulse-cell .num{ font-family:var(--mono); font-size:26px; font-weight:700; line-height:1; font-variant-numeric:tabular-nums; }\n  .pulse-cell .lbl{ font-size:11px; text-transform:uppercase; letter-spacing:0.07em; color:var(--ink-dim); margin-top:7px; display:flex; align-items:center; gap:6px; }\n  .pulse-cell .lbl::before{ content:''; width:7px; height:7px; border-radius:50%; flex:none; }\n  .pulse-cell.done .num{ color:var(--accent); } .pulse-cell.done .lbl::before{ background:var(--accent); }\n  .pulse-cell.prog .num{ color:var(--gold); } .pulse-cell.prog .lbl::before{ background:var(--gold); }\n  .pulse-cell.block .num{ color:var(--danger); } .pulse-cell.block .lbl::before{ background:var(--danger); }\n  .pulse-cell.wait .num{ color:var(--ink-dim); } .pulse-cell.wait .lbl::before{ background:var(--ink-dim); }\n\n  .meta-row{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-top:14px; }\n  @media (max-width:720px){ .meta-row{ grid-template-columns:repeat(2,1fr); } }\n  .meta-card{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:14px 16px; }\n  .meta-label{ font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-dim); margin-bottom:4px; }\n  .meta-value{ font-family:var(--mono); font-size:15px; font-weight:700; color:var(--ink); }\n\n  /* ---------- Sticky section nav ---------- */\n  nav.pagenav{\n    position:sticky; top:0; z-index:20;\n    background:rgba(10,26,47,0.92); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);\n    border-bottom:1px solid var(--rule);\n    display:flex; gap:2px; overflow-x:auto; scrollbar-width:none;\n  }\n  nav.pagenav::-webkit-scrollbar{ display:none; }\n  nav.pagenav a{\n    flex:none; padding:13px 16px; font-size:12.5px; font-weight:600; color:var(--ink-dim);\n    text-decoration:none; border-bottom:2px solid transparent; white-space d); } .col-prog .dot{ background:var(--gold); }\n  .col-block .col-head{ color:var(--danger); } .col-block .dot{ background:var(--danger); }\n  .col-wait .col-head{ color:var(--ink-dim); } .col-wait .dot{ background:var(--ink-dim); }\n  .col-body{ padding:10px; display:flex; flex-direction:column; gap:8px; min-height:60px; }\n  .col-done .col-body{ max-height:640px; overflow-y:auto; }\n  .col-scroll-hint{ font-size:10px; color:var(--ink-faint); text-align:center; padding:4px 0 8px 0; }\n  .ticket{ background:var(--paper-raised); border:1px solid var(--rule); border-radius:8px; padding:9px 10px; font-size:12.5px; line-height:1.4; }\n  .ticket b{ display:block; font-size:12.5px; margin-bottom:2px; color:var(--ink); }\n  .ticket span{ color:var(--ink-dim); font-size:11.5px; }\n  .ticket.clickable-ticket{ cursor:pointer; transition:border-color .15s; }\n  .ticket.clickable-ticket:hover{ border-color:var(--accent-dim); }\n  .ticket.selected-next{ border-color:var(--gold); background:rgba(247,201,72,0.09); }\n  .ticket-next-flag{ display:block; font-size:9.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--gold); font-weight:700; margin-bottom:4px; }\n  .ticket-actions{ display:none; margin-top:8px; padding-top:8px; border-top:1px solid var(--rule); }\n  .ticket.open .ticket-actions{ display:block; }\n  .ticket-work-btn{ background:var(--accent); color:var(--bg); border:none; border-radius:8px; padding:6px 12px; font-size:11px; font-weight:700; cursor:pointer; }\n  .ticket-work-btn:hover{ opacity:0.88; }\n  .ticket-copied-hint{ display:block; margin-top:6px; font-size:10.5px; color:var(--accent); min-height:14px; }\n  .staging-chip{\n    display:inline-block; margin-top:6px; font-size:9.5px; font-family:var(--mono); font-weight:700;\n    letter-spacing:0.04em; text-transform:uppercase; color:var(--gold);\n    border:1px solid var(--gold-dim); background:var(--gold-wash); border-radius:999px; padding:2px 8px;\n  }\n\n  /* ---------- Timeline ---------- */\n  .timeline{ position:relative; padding-left:26px; }\n  .timeline::before{ content:''; position:absolute; left:6px; top:6px; bottom:6px; width:1px; background:var(--rule); }\n  .tl-item{ position:relative; padding-bottom:30px; }\n  .tl-item:last-child{ padding-bottom:0; }\n  .tl-item::before{\n    content:''; position:absolute; left:-26px; top:3px; width:11px; height:11px; border-radius:50%;\n    background:var(--bg); border:2px solid var(--ink-dim);\n  }\n  .tl-item.now::before{ border-color:var(--gold); background:var(--gold); box-shadow:0 0 0 4px var(--gold-wash); }\n  .tl-item.done::before{ border-color:var(--accent); background:var(--accent); }\n  .tl-item.risk::before{ border-color:var(--danger); background:var(--danger); }\n  .tl-date{ font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:var(--accent); margin-bottom:5px; font-family:var(--mono); }\n  .tl-title{ font-size:19px; font-weight:700; margin:0 0 7px 0; color:var(--ink); }\n  .tl-body{ font-size:13.5px; color:var(--ink-dim); line-height:1.65; max-width:640px; }\n  .tl-body b{ color:var(--ink); font-weight:600; }\n  .tag{\n    display:inline-block; font-size:10px; text-transform:uppercase; letter-spacing:0.06em;\n    padding:3px 9px; border-radius:20px; margin-top:9px; font-weight:700; font-family:var(--mono);\n  }\n  .tag.risk{ background:var(--danger-wash); color:var(--danger); }\n  .tag.ok{ background:var(--accent-wash); color:var(--accent); }\n\n  .callout{\n    border:1px solid var(--danger-dim); background:var(--danger-wash);\n    border-radius:10px; padding:16px 18px; margin-top:16px;\n  }\n  .callout .k{ font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:var(--danger); font-weight:700; margin-bottom:7px; }\n  .callout p{ margin:0; font-size:13.5px; color:var(--ink-dim); line-height:1.65; }\n  .callout code{ background:rgba(0,0,0,0.25); padding:1px 6px; border-radius:4px; font-size:12px; color:var(--accent); font-family:var(--mono); }\n  .callout.ok{ border-color:var(--accent-dim); background:var(--accent-wash); }\n  .callout.ok .k{ color:var(--accent); }\n  .resolved{ color:var(--accent); }\n  .resolved s{ color:var(--ink-faint); }\n\n  /* ---------- Spending ---------- */\n  details.group{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; overflow:hidden; margin-top:14px; }\n  details.group summary{\n    list-style:none; cursor:pointer; padding:15px 18px; font-size:14px; font-weight:700; color:var(--ink);\n    display:flex; align-items:center; gap:10px; user-select:none;\n  }\n  details.group summary::-webkit-details-marker{ display:none; }\n  details.group summary::after{ content:'▶'; margin-left:auto; font-size:11px; color:var(--ink-dim); transition:transform .15s; }\n  details.group[open] summary::after{ transform:rotate(90deg); }\n  .group-body{ padding:0 18px 18px 18px; }\n  .spend-bar{ display:flex; height:14px; border-radius:999px; overflow:hidden; border:1px solid var(--rule); margin:4px 0 8px 0; }\n  .spend-bar i{ display:block; height:100%; }\n  .spend-legend{ display:flex; flex-wrap:wrap; gap:14px; font-size:11px; color:var(--ink-dim); margin-bottom:14px; }\n  .spend-legend span{ display:inline-flex; align-items:center; gap:6px; }\n  .spend-legend i{ width:9px; height:9px; border-radius:3px; display:inline-block; }\n  .spend-row{ display:flex; justify-content:space-between; align-items:baseline; padding:9px 0; border-top:1px solid var(--rule); gap:12px; }\n  .spend-what{ font-size:13px; color:var(--ink); }\n  .spend-what .meta{ display:block; font-size:11px; color:var(--ink-dim); margin-top:2px; }\n  .spend-amount{ font-family:var(--mono); font-size:13.5px; font-weight:700; color:var(--ink); flex:none; font-variant-numeric:tabular-nums; }\n  .spend-total{ display:flex; justify-content:space-between; align-items:baseline; padding:12px 0 2px 0; margin-top:4px; border-top:1px solid var(--rule); }\n  .spend-total .spend-amount{ color:var(--accent); font-size:16px; }\n\n  /* ---------- Top 5 ---------- */\n  .top5-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:14px; }\n  @media (max-width:820px){ .top5-grid{ grid-template-columns:1fr; } }\n  .top5-card{ background:var(--paper-raised); border:1px solid var(--rule); border-radius:12px; padding:14px 16px; }\n  .top5-card h4{ margin:0 0 10px 0; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--accent); font-weight:700; }\n  .top5-card ol{ margin:0; padding-left:18px; }\n  .top5-card li{ font-size:12.5px; color:var(--ink-dim); line-height:1.6; padding:3px 0; }\n  .top5-card li b{ color:var(--ink); font-weight:600; }\n  .top5-card li{ list-style:none; margin-left:-18px; padding-left:18px; position:relative; }\n  .top5-card li::before{ content:'•'; position:absolute; left:2px; color:var(--ink-faint); }\n  .top5-card li.clickable-ticket{ cursor:pointer; border-radius:8px; transition:background .15s; }\n  .top5-card li.clickable-ticket:hover{ background:var(--paper-hi); }\n  .top5-card li.selected-next{ background:rgba(247,201,72,0.09); }\n  .deadline-badge{ display:block; font-size:10.5px; margin-top:2px; font-family:var(--mono); }\n  .deadline-badge.plain{ color:var(--ink-faint); }\n  .deadline-badge.soon{ color:var(--gold); font-weight:700; }\n  .deadline-badge.urgent{ color:var(--danger); font-weight:700; }\n\n  footer.foot{ text-align:center; font-size:11.5px; color:var(--ink-faint); padding:40px 0 20px 0; }\n\n  /* ---------- Sautero stamp + language fab (Richard, 15.7.: every /visual data/ document\n     carries a last-updated-to-Sautero-state badge and an SK/EN toggle) ---------- */\n  .sautero-stamp{\n    position:fixed; bottom:14px; right:14px; z-index:90;\n    background:rgba(15,35,64,0.92); border:1px solid rgba(52,247,215,0.4); color:#34F7D7;\n    font-size:10.5px; font-weight:700; font-family:\"SF Mono\",Menlo,Consolas,monospace;\n    padding:6px 12px; border-radius:999px;\n    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); pointer-events:none;\n  }\n  .sautero-lang-fab{\n    position:fixed; bottom:14px; left:14px; z-index:90;\n    background:rgba(15,35,64,0.92); border:1px solid #223d57; color:#9C949E;\n    font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;\n    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;\n    padding:7px 14px; border-radius:999px; cursor:pointer;\n    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);\n    transition:border-color .15s, color .15s;\n  }\n  .sautero-lang-fab:hover{ border-color:rgba(52,247,215,0.4); color:#34F7D7; }\n  @media print{ .sautero-stamp, .sautero-lang-fab{ display:none; } }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\u003cheader class=\"hero\">\n  \u003cdiv class=\"hero-inner\">\n    \u003cdiv class=\"topline\">\n      \u003cdiv class=\"brandmark\">\n        \u003csvg width=\"24\" height=\"24\" viewBox=\"0 0 68 68\">\u003cpath d=\"M 46.8 42.3 A 18 18 0 1 1 46.8 21.7\" fill=\"none\" stroke=\"#34F7D7\" stroke-width=\"7\" stroke-linecap=\"round\"/>\u003ccircle cx=\"34\" cy=\"34\" r=\"3\" fill=\"#34F7D7\"/>\u003c/svg>\n        \u003cspan class=\"word\">Sautero\u003c/span>\n      \u003c/div>\n      \u003cbutton class=\"lang-toggle\" id=\"langBtn\" onclick=\"toggleLang()\">EN\u003c/button>\n    \u003c/div>\n    \u003cdiv class=\"kicker\" data-sk=\"Stavový lístok · Kuchynský denník\" data-en=\"Status Ticket · Kitchen Journal\">\u003c/div>\n    \u003ch1 class=\"title\" data-sk='Kde presne stojí \u003cem>Sautero\u003c/em> dnes' data-en='Exactly where \u003cem>Sautero\u003c/em> stands today'>\u003c/h1>\n    \u003cp class=\"lede\" data-sk=\"Prehľad na základe ROADMAP.md, MVP_DEFINITION.md, ARCHITECTURE.md a FEATURE_ROADMAP.md. Pilotná kuchyňa už reálne beží — otázka nie je „kedy začať&quot;, ale „kedy je to bezpečné pustiť k cudzím ľuďom a k peniazom&quot;.\" data-en=\"Overview based on ROADMAP.md, MVP_DEFINITION.md, ARCHITECTURE.md and FEATURE_ROADMAP.md. The pilot kitchen is already live — the question isn't &quot;when to start&quot;, it's &quot;when is it safe to open up to strangers and money&quot;.\">\u003c/p>\n    \u003c!-- Kanban donut (Richard, 17.7.): the four columns as a pie — click a segment to jump\n         straight to that column on the board. -->\n    \u003cdiv class=\"pulse-row\">\n      \u003csvg id=\"kanbanDonut\" viewBox=\"0 0 120 120\" style=\"width:160px; height:160px; flex:none;\">\u003c/svg>\n      \u003cdiv class=\"pulse-strip\" id=\"pulseStrip\" style=\"flex:1; min-width:260px; margin-top:0;\">\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"meta-row\">\n      \u003cdiv class=\"meta-card\">\u003cdiv class=\"meta-label\" data-sk=\"Fáza podľa plánu\" data-en=\"Phase per plan\">\u003c/div>\u003cdiv class=\"meta-value\">1 / 7\u003c/div>\u003c/div>\n      \u003cdiv class=\"meta-card\">\u003cdiv class=\"meta-label\" data-sk=\"Reálny rozsah práce\" data-en=\"Real scope of work\">\u003c/div>\u003cdiv class=\"meta-value\" data-sk=\"Zasahuje do fáz 1–3\" data-en=\"Spans phases 1–3\">\u003c/div>\u003c/div>\n      \u003cdiv class=\"meta-card\">\u003cdiv class=\"meta-label\" data-sk=\"Aktívnych pilotných užívateľov\" data-en=\"Active pilot users\">\u003c/div>\u003cdiv class=\"meta-value\" data-sk=\"13 účtov — 3 zakladateľove testovacie + 10 reálnych ľudí\" data-en=\"13 accounts — 3 founder test accounts + 10 real people\">\u003c/div>\u003c/div>\n      \u003cdiv class=\"meta-card\">\u003cdiv class=\"meta-label\" data-sk=\"Cieľ verejného trialu\" data-en=\"Public trial target\">\u003c/div>\u003cdiv class=\"meta-value\">1. 8. 2026\u003c/div>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/header>\n\n\u003cnav class=\"pagenav\" id=\"pageNav\">\n  \u003ca href=\"#prep-board\" class=\"active\" data-sk=\"01 Prep board\" data-en=\"01 Prep board\">\u003c/a>\n  \u003ca href=\"#timeline\" data-sk=\"02 Časová os\" data-en=\"02 Timeline\">\u003c/a>\n  \u003ca href=\"#pamataj\" data-sk=\"03 Na pamäti\" data-en=\"03 Keep in mind\">\u003c/a>\n  \u003ca href=\"#vydavky\" data-sk=\"04 Výdavky\" data-en=\"04 Spending\">\u003c/a>\n  \u003ca href=\"#top5\" data-sk=\"05 Top 5 úlohy\" data-en=\"05 Top 5 tasks\">\u003c/a>\n  \u003ca class=\"ext\" href=\"automation.html\" data-sk=\"🤖 Automatizácie\" data-en=\"🤖 Automations\">\u003c/a>\n  \u003ca class=\"ext\" href=\"features.html\" data-sk=\"🧩 Funkcie & zdravie\" data-en=\"🧩 Features & health\">\u003c/a>\n  \u003ca class=\"ext\" href=\"presentation.html\" data-sk=\"📈 Investor deck\" data-en=\"📈 Investor deck\">\u003c/a>\n\u003c/nav>\n\n\u003cdiv class=\"wrap\">\n\n  \u003csection id=\"prep-board\">\n    \u003cdiv class=\"section-label\">\u003cspan class=\"n\">01\u003c/span>\u003ch2 data-sk=\"Prep board — kde je čo\" data-en=\"Prep board — where things stand\">\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n\n    \u003cdiv class=\"board\">\n      \u003cdiv class=\"col col-prog\">\n        \u003cdiv class=\"col-head\">\u003cspan class=\"dot\">\u003c/span>\u003cspan data-sk=\"Rozbehnuté\" data-en=\"In progress\">\u003c/span>\u003cspan class=\"count\">\u003c/span>\u003c/div>\n        \u003cdiv class=\"col-body\">\n          \u003cdiv class=\"ticket\" style=\"border-color:var(--gold);\">\u003cb style=\"color:var(--gold);\">🔍 Kompletná kontrola funkcií — pokračuje\u003c/b>\u003cspan>19.7. noc: 398-položkový 🔍 Kompletná kontrola v Internal Docs (test_sweep.html) je hotový a naostro — ale samotné prechádzanie/odškrtávanie položiek s Richardom ešte len začína. Zvyšný širší audit (kontrola všetkých 38 kitchen_id tabuliek na ten istý bug) je uzavretý bez ďalších nálezov nad rámec už opravených\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🌐 t174 — dvojjazyčná dokumentácia HOTOVÁ\u003c/b>\u003cspan>Kompletné: mapa funkcií 112, História, Denník, Teraz 66+ tiketov, Roadmapa 163+ úloh, deck, monetizácia 14 modelov, Manifesto, Visual Guide + horný baner. Trvalé pravidlo: nový obsah sa rodí dvojjazyčne\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Ingredient DB — reálne ceny\u003c/b>\u003cspan>2 005 položiek v Sautero cenníku; 104 reálnych dodávateľských cien, zvyšok stále odhad AI — reálne ceny pribúdajú cez Invoice Scan\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🤖 Denný AI agent — ingrediencie\u003c/b>\u003cspan>Beží raz denne, strop CHF 30/mesiac, sám si vyberá čo vylepšiť (ceny/sezóna/chýbajúce položky), zapisuje ako novú SQL migráciu (nikdy priamo do produkcie). 14.7.: overil 16 základných surovín voči reálnym Migros cenám — db/67, zatiaľ nespustené. Report: docs/ingredient_agent_log.md\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Overovanie cien\u003c/b>\u003cspan>Nový filter Verified/Estimated/Missing to teraz robí viditeľným, väčšina stále odhad\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Label printer\u003c/b>\u003cspan>Odporúčanie hotové (Brother QL-820NWB), fyzicky ešte nekúpené\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Fridge temp senzor\u003c/b>\u003cspan>Manuálne zapisovanie teplôt medzitým oživené v novom HACCP module (15.7.); SensorPush odporúčaný, fyzicky nekúpený, integrácia nezačatá\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🎨 Visual Data Standards — redizajn dokumentov\u003c/b>\u003cspan>Nový standing štandard (15.7.): všetky dashboardy/infografiky na world-class úroveň, presun do /visual data/. Investor deck + status hotové, zvyšné dokumenty postupne\u003c/span>\u003c/div>\n        \u003c/div>\n      \u003c/div>\n\n      \u003cdiv class=\"col col-block\">\n        \u003cdiv class=\"col-head\">\u003cspan class=\"dot\">\u003c/span>\u003cspan data-sk=\"Blokované\" data-en=\"Blocked\">\u003c/span>\u003cspan class=\"count\">\u003c/span>\u003c/div>\n        \u003cdiv class=\"col-body\">\n          \u003cdiv class=\"ticket\">\u003cb>Živé testovanie v prehliadači\u003c/b>\u003cspan>Agent nemá prístup k reálnemu zariadeniu — 13.7. sa dva bugy (Check List delete, AI scan) overili naživo len vďaka tomu, že ich Richard priamo nahlásil a otestoval po nasadení; väčšina ostatných nedávnych funkcií stále nie je naživo overená. Po 14.–15.7. (HACCP, Face ID, URL sken, background scanning…) je tento dlh ešte väčší\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🎪 Events dlaždica (t172)\u003c/b>\u003cspan>Bankety a akcie: New Event manuálne alebo scanom (AI z objednávky vytiahne typ, klienta, počet ľudí, menu, cenu), Dnešné | Zajtrajšie vedľa seba — zapísané 18.7., čaká na build\u003c/span>\u003c/div>\n        \u003c/div>\n      \u003c/div>\n\n      \u003cdiv class=\"col col-wait\">\n        \u003cdiv class=\"col-head\">\u003cspan class=\"dot\">\u003c/span>\u003cspan data-sk=\"Čaká\" data-en=\"Waiting\">\u003c/span>\u003cspan class=\"count\">\u003c/span>\u003c/div>\n        \u003cdiv class=\"col-body\">\n          \u003cdiv class=\"ticket\" style=\"border-color:var(--gold);\">\u003cb style=\"color:var(--gold);\">💰 Prvý príjem — 2 blokátory, termín 20.7.26\u003c/b>\u003cspan>Richard sa 16.7. zaviazal na dátum. 1) Nebenerwerb žiadosť zamestnávateľovi (10 min, draft hotový, súbor pripravený v priečinku VYRIEŠIŤ DO 20.7.2026/), 2) Einzelfirma/AHV registrácia (1-2 h). Potom: founding-member ponuka do appky (Claude, draft hotový)\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🧼 HACCP vlna 3\u003c/b>\u003cspan>Školenia personálu + admin report — posledné dve dlaždice s \"pripravujeme\" bannerom. Vlna 2 (fritézový olej, škodcovia, expirácia štítkov) nasadená 15.7.\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Fakturácia / predplatné\u003c/b>\u003cspan>Plán existuje (monetization.html) — na štart ručné faktúry, platobná brána až pri 20+ kuchyniach\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>GmbH\u003c/b>\u003cspan>Vedome odložené až po prvom reálnom príjme\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Fázy 3 (zvyšok)–7\u003c/b>\u003cspan>Inventory, plánovanie, reporty, AI odporúčania, natívna appka, launch\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Prvý predajný kontakt\u003c/b>\u003cspan>Nooch Asian Kitchen identifikovaný ako cieľ (3 pobočky v kantóne Bern), zatiaľ bez oslovenia\u003c/span>\u003c/div>\n        \u003c/div>\n      \u003c/div>\n\n      \u003cdiv class=\"col col-done\">\n        \u003cdiv class=\"col-head\">\u003cspan class=\"dot\">\u003c/span>\u003cspan data-sk=\"Hotovo\" data-en=\"Done\">\u003c/span>\u003cspan class=\"count\">\u003c/span>\u003c/div>\n        \u003cdiv class=\"col-body\">\n          \u003cdiv class=\"ticket\" style=\"border-color:var(--accent);\">\u003cb style=\"color:var(--accent);\">🏢 COMPANY ADMIN ONBOARDING KOMPLET + značkový e-mail + general audit (20.–21.7.)\u003c/b>\u003cspan>Onboarding nového company admina prerobený na OFFER-ACCEPT: udelenie Company Admin cez Admin Directory vytvorí PONUKU (e-mail + notifikácia v jeho profile), on ju sám prijme a až potom si pomenuje vlastnú company/reštauráciu — osobné dáta ostávajú vždy súkromné a nedotknuté (db/164 super-admin update, db/165 premenovanie vlastnej kuchyne, db/167 pending_company_invite). Pri odobratí funkcie kontrolná otázka „nechať v tíme / odstrániť z company\". Značkový e-mail „You're now a Company Admin\" cez novú edge funkciu notify-company-offer (Resend, odosielateľ noreply@sautero.ch) — príčina, prečo predtým nechodil: chýbal RESEND_API_KEY secret, funkcia padala na 500; doplnené a overené naživo. Company Report viditeľný pre KAŽDÉHO company admina (db/168, premenované z Kitchen Report). Personal-kitchen-name label v profile (db/166). Oznamovacie okná admin flow prerobené z natívnych na Sautero identitu. Opravené tiché zlyhanie admin save (0-row RLS → db/164 + .select()). General audit + regression: audit_app aj audit_db clean (168 migrácií, 49 tabuliek), overená company-admin parity naprieč UI aj RLS, potvrdené že reset odobratého admina do čerstvej personal kuchyne NIČ nemaže. Opravený aj bilingválny off-by-one v tomto dokumente.\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\" style=\"border-color:var(--accent);\">\u003cb style=\"color:var(--accent);\">🔍 VEĽKÝ SWEEP — 5 ďalších privacy únikov, 398-položkový kontrolný dokument, Working Time prestávka (19.7. noc)\u003c/b>\u003cspan>Systematicky nájdených a opravených 5 ďalších miest, kde osobný (personal) obsah unikal celej firme — rovnaký bug ako pri Order Liste, vždy: kitchen_id sa nemení keď prepnem na Personal, iba RLS politika ho brala ako jediný filter. Opravené: Events (db/161), zoznamy ingrediencií aj receptov (db/162 — priamo riešilo Richardov starší nahlásený bug „nová kategória v personal vidí každý\"), a najzávažnejšie — jedlá/úlohy VNÚTRI osobného Check List projektu (db/163): tie sa po db/159 oprave projektov vôbec nekontrolovali, takže ktokoľvek v kuchyni ich mohol nielen vidieť, ale aj upraviť/vymazať. Plus história cien osobnej ingrediencie (db/163). Každá oprava overená tenant_isolation_test.sql naživo na produkcii. Následne prebehla kontrola všetkých 38 tabuliek s kitchen_id — žiadny ďalší únik nenájdený. Nová funkcia: Working Time reálne bežiace stopky na prestávku (5/10/15/30 min) s presným zápisom do detailu dňa; demo mód (🎭) teraz jednotne cez 3 testovacie účty na každej dlaždici zvlášť (nie jeden globálny prepínač); admin v demo Schedule môže kliknúť na člena tímu a vidieť jeho posledných 30 dní (objednávky, štítky, recepty, odstopovaný čas). Postavený úplne nový 🔍 Kompletná kontrola dokument (398 položiek, 16 modulov, mapa-funkcií štýl s klikateľnými detailami, samostatný Personal/Company/👥 Interakcia prepínač lebo obe verzie appky majú iný rozsah funkcií). Opravený aj zabudnutý HACCP admin-gate bug (blokoval bežných členov, hoci HACCP je od 18.7. pre všetkých).\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\" style=\"border-color:var(--accent);\">\u003cb style=\"color:var(--accent);\">🔐 SÚKROMIE + STABILITA DEŇ — personal/company split, iPad opravy, Events, konsolidácia štart (18.–19.7.)\u003c/b>\u003cspan>Objednávkový RLS bug (člen nemohol objednať novú položku) → db/154 zdieľaná ingrediencia cez RPC. Personal vs company natvrdo v DB: Order List (db/156, unique constraint + RLS) aj Check List projekty (db/159 — osobný projekt vidí LEN tvorca, firemné projekty zakladá len kitchen admin; overené impersonačným testom priamo na produkcii). Mazanie jedál/sekcií len pre adminov + tlačidlo Delete preč z hlavičky (2× skoro stratené jedlo). iPad: ghost-click guard po zatvorení okien, scroll-restore + prepočet dotykov po klávesnici, rekurzívne stohovanie banera v dokumentoch opravené (patchInnerLinks). 🎪 Events dlaždica naživo (db/153: manuál + AI scan objednávky, Dnes|Zajtra, 🎭 demo prepínač — nový štandard pre všetky demá). Konsolidácia DB: plán (49→~24), Fáza 1 (db/157 — mŕtve tabuľky, reálne žilo len 47) aj krok 2.1 (db/158 ikony→JSONB kópia) hotové so Zero Feature Loss protokolom. CLAUDE.md + SUPABASE_CONSOLIDATION_PLAN.md. Nález: staging je prázdna mŕtva kópia — treba resync. AI Details + Invoice Scan vrátené adminom na Sautero policu.\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\" style=\"border-color:var(--accent);\">\u003cb style=\"color:var(--accent);\">🏷️ SAUTERO DEŇ D — rebrand dotiahnutý od domény po logo (18.7.)\u003c/b>\u003cspan>Appka beží naživo na app.sautero.ch (DNS cez Hostpoint, GitHub Pages, HTTPS; staré app.chefos.ch odstavené). Kompletný brand sweep: 691 náhrad naprieč VŠETKÝMI dokumentmi (zmluvy, reviews, security, snapshoty), e-mailové šablóny + odosielateľ „Sautero\", nové logo (serifové teal S, všetky ikony), NAMING_RISK uzavretý s poučením. Tímové funkcie dňa: ➕ Add Team Member (kód+QR+link+email, db/145), tímové zoznamy ingrediencií (db/146) aj projekty receptov (db/147) so značkou 👥, Company Ingredients agreguje aj zoznamy, sken/faktúra presúva položky do Company, roly Main/Kitchen Admin, Create Team dlaždica odstránená (ostáva Add Company). Dv
