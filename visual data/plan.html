tus: 'done' },\n      { text: 'Poslať Nebenerwerb žiadosť + registrovať Einzelfirma/AHV (oba príjmové blokátory, oba len Richard, termín 20. 7.)', status: 'planned' },\n    ]\n  },\n  month: {\n    range: 'Júl 2026',\n    items: [\n      { text: 'Spustenie verejného trialu — 25 užívateľov, viac reštaurácií, vlastný tím pre každú kuchyňu (cieľ 1. 8. 2026)', status: 'progress' },\n      { text: 'Vedený živý test celej appky s Richardom — prebieha, väčšina kľúčových tokov overená 16.–17. 7.', status: 'progress' },\n      { text: 'Odblokovanie prvého príjmu: Nebenerwerb súhlas + registrácia Einzelfirma (termín 20. 7.)', status: 'planned' },\n    ]\n  }\n};\n\n/* Each day: date (YYYY-MM-DD), headline, accomplished (bullet list),\n   planned (what was intended to carry into the next session, for done-vs-planned tracking). */\nconst DAYS = [\n  {\n    date: '2026-07-08',\n    headline: 'Fáza 0 — Základy & validácia schválené',\n    accomplished: [\n      'Definovaný rozsah Sautero v1: Chef Pro / reštauračné kuchyne, nie domáci kuchári',\n      'Inštalovateľná webová appka mobile/tablet-first, bez natívneho buildu',\n      'Potvrdená pilotná kuchyňa (Hotel Schweizerhof Bern)',\n      'MVP_DEFINITION.md a ARCHITECTURE.md schválené Richardom',\n    ],\n    planned: 'Rozbehnúť Fázu 1 — skutočný backend + plný dátový model receptov.'\n  },\n  {\n    date: '2026-07-09',\n    headline: 'Receptový engine naživo, Ingrediencie + Check List v1, Schedule prestavaný, nasadené na produkciu',\n    accomplished: [\n      'Postavený Supabase backend; zmigrovaných všetkých 173 receptov; opravená škálovacia kalkulačka',\n      'Ingrediencie & ceny: nasadených 535 položiek (odhadované ceny, označené), cenový + nutričný engine',\n      'Plný 20-poľový formulár receptu; vizuálny dizajnový prechod (login, navigácia, focus stavy)',\n      'Mise en Place v1: osobný zoznam úloh, 3-stavový status, rýchle pridanie z receptov, Order List',\n      'Home dashboard (6 dlaždíc) + modul teploty chladničiek',\n      'Schedule prestavaný podľa reálneho Dienstplan PDF: 28 kódov zmien, 27 skutočných zamestnancov',\n      'SKY prep sheet postavený z Richardovho reálne odfoteného papierového hárku (25 jedál, 69 položiek)',\n      'Prep sheet vyladený v 5 kolách v jeden deň: skladové počty, pole statusu, min_required príznaky, čitateľnosť, časy podľa fáz, prestavba sticky hlavičky',\n      'Nasadený AI import receptu z fotky (Sonnet)',\n      'Nasadené na produkciu: richardcervenka111-create.github.io/chefos-app',\n    ],\n    planned: 'Pridať ďalšie AI funkcie (generovanie postupu, chat asistent) a rozšíriť Check List na všetky stanice.'\n  },\n  {\n    date: '2026-07-10',\n    headline: 'AI funkcie, Kitchen Flow, všetkých 8 staníc, viacjazyčnosť, ingrediencie na 1 263',\n    accomplished: [\n      'Nasadené Generovanie postupu s AI + Chef\\'s Assistant chatbot; náklady znížené na Haiku + obmedzená história',\n      'Kitchen Flow v1: výber stanice ako ikonové dlaždice, 🔥 odznak preťaženia (>3,5 h nevybavenej práce)',\n      'Check List prep sheety rozšírené na všetkých 8 staníc (Hot Line/Garde Manger/Dezerty z reálnych menu; Lobby/Entremetier/BQT/Extra provizórne, schválené Richardom)',\n      'Pole poznámky pridané ku každej úlohe/prep položke',\n      'AI sken prep sheetu (fotka + PDF) — samoobslužné vytváranie nových staníc',\n      'Premenované „Mise en Place“ → „Check List“ (len navonok)',\n      'Všetky prep-sheet dáta preložené do angličtiny',\n      'Viacjazyčné UI v1: prepínač EN/DE/FR/IT/SK (čiastočné pokrytie, reálna infraštruktúra)',\n      'Opravený „All“ pohľad naprieč stanicami (bol prázdny) a zaseknuté odznaky dlaždíc staníc',\n      'Pridané swipe-back gesto na mobile',\n      'Návrh 20k-riadkovej master DB zúžený na +2 polia a ~1 300 ingrediencií (730 nových, generovaných, nula kolízií)',\n      'Ingrediencie: filter chipy sezóna + typ skladovania + typ potraviny (kombinovateľné)',\n      'Vytvorený a odvtedy udržiavaný app/presentation.html (investorský dashboard, priebežne synchronizovaný)',\n      'Postavený app/planning.html (tento súbor) — deň/týždeň/mesiac, hotové vs. plánované',\n      'Presentation.html preorientovaný na Švajčiarsko / kantón Bern, so zdrojovanými trhovými číslami a bottom-up ARR modelom',\n      'Check List: ručné „+ New Section“ a „+ Add dish“ (skladanie položiek), už nie len cez sken',\n      'Opravený bug perzistencie staníc medzi zariadeniami (stanica vytvorená na jednom telefóne sa po reloade ukáže všetkým)',\n      'Check List: reálne, crowd-sourced prep časy — ťukni na hodiny a zapíš skutočné minúty, priemerujú sa cez opakované zápisy',\n      'Farby statusov TO DO / DON\\'T DO prehodené (TO DO teraz červené) na Richardovu žiadosť; Extra dostala vlastnú ikonu (🧺)',\n      'Chef\\'s Assistant: opravená mobilná klávesnica prekrývajúca vstup (100dvh), pridaná uvítacia bublina',\n      'Dvaja reálni ľudia testovali naživo cez Richardov zdieľaný login v dvoch prevádzkach — Recepty im potvrdene fungovali end-to-end',\n      'Naplánovaný a zapísaný verejný trial: cieľ 1. 8. 2026, 25 užívateľov naprieč reštauráciami, každá si tvorí vlastný tím cez QR pozvánku, rozsah zúžený na Check List + Chef\\'s Assistant + Ingrediencie + Recepty',\n    ],\n    planned: 'Opraviť email login pre cudzie adresy (overenie Resend domény alebo vstavaný mailer); navrhnúť a postaviť multi-team/QR systém; vyleštiť 4 trialové funkcie smerom k verejnému trialu 1. 8. 2026.'\n  },\n  {\n    date: '2026-07-11',\n    headline: 'Multi-team QR + prístupová brána, opravy Receptov/Check Listu, zjednotená vizuálna identita',\n    accomplished: [\n      'Multi-team cez QR pozvánku (vytvor alebo pridaj sa do kuchyne) postavený end-to-end; vendorovaný overený QR generátor, plne client-side',\n      'Prístupová brána uzavretého trialu: každý email ručne schválený pred použitím, nová Admin dlaždica',\n      'Opravený bug dvojitého uloženia receptu (race condition pri double-tape); 🚩 vlajka obmedzená len na priority-1 položky',\n      'Check List: vymazať alebo skryť položku, jedlo aj celú sekciu; 🛒 Objednať tlačidlo na každej položke a riadku suroviny receptu',\n      'Postavený app/board.html → premenovaný na app/tasklist.html s plným shipped/timeline trackerom',\n      'Zjednotená vizuálna identita Sautero (navy/teal) naprieč presentation.html, planning.html, tasklist.html',\n    ],\n    planned: 'Toolbary Order Listu + Print Labels, postaviť Working Time od nuly, rozšíriť reálne ceny ingrediencií.'\n  },\n  {\n    date: '2026-07-12',\n    headline: 'Toolbary Order Listu + Print Labels, postavený Working Time, 104 reálnych dodávateľských cien, prerábka Receptov/Ingrediencií, dva kritické bugy nájdené a opravené',\n    accomplished: [\n      'Nasadený horný panel Order Listu (Tlač, Výber+hromadné mazanie, zoskupenie podľa sekcie) a Print Labels hub (toolbar + automatické „use by“ dátumy z trvanlivosti)',\n      'Working Time postavený od nuly: check-in/out časovač, prestávky, mesačné hodiny/nadčasy, odpočet dovolenky, AI sken zmluvy s právno-poradnými poznámkami',\n      'Nájdené a v ten istý deň opravené dva vážne bugy lámuce skript (poradie inicializácie top-level premenných) — oba s úplnou príčinou',\n      'Nasadený Ingredient Audit v1, hneď v tej istej dávke prestavaný na skutočný per-položkový schvaľovací tok (Pridať / Prepojiť ako alias / Ignorovať)',\n      'Importovaných 104 reálnych dodávateľských cien zo švajčiarskeho veľkoobchodného cenníka 2026 (CHF→EUR, dohľadateľné na čísla artiklov)',\n      'Check List &amp; Recepty: sekcie/kategórie sa dajú premenovať a preikonovať, nie len mazať; diétne filtre Receptov opravené + rozšírené 2→7; pridaný AI generátor receptov „Ask Chef\\'s Assistant“',\n      'Nasadený kuchynský prepínač meny (EUR/CHF/USD), default CHF; topbar Ingrediencií predizajnovaný, aby nežral pol obrazovky',\n    ],\n    planned: 'Drobné vylepšenia, Sautero logo a hardvérový výskum (tlačiareň štítkov, senzor chladničky).'\n  },\n  {\n    date: '2026-07-13',\n    headline: 'Oprava viditeľnosti poznámok vo Working Time, väčšie Home ikony, vyladenie Print Labels, Sautero logo, výskum tlačiarne + senzora, prvý pomenovaný predajný cieľ',\n    accomplished: [\n      'Opravené neviditeľné pole dennej poznámky vo Working Time počas písania (celostránková dark-mode oprava, nie len to jedno pole)',\n      'Ikony dlaždíc na Home opäť zväčšené (stále 3 v rade); Print Labels dostal chýbajúci titulok topbaru a skutočný prepínač zoskupenia „Podľa sekcie“',\n      'Navrhnuté minimalistické Sautero logo (kruhový monogram), nasadené naživo do brand hlavičky My Team a vycentrované priamo v pozvánkovom QR kóde',\n      'Preskúmaný bezdrôtový senzor teploty chladničky pre nápad „sken QR → živá teplota“ — odporúčaný SensorPush (jediná budget možnosť so skutočným cloud API; Bluetooth/NFC z webstránky je na iOS slepá ulička)',\n      'Preskúmaná fyzická tlačiareň štítkov + prístup k dodávateľským zmluvám — odporúčaný Brother QL-820NWB (~130 CHF, kúpa napriamo, bez zmluvy), celý report v docs/LABEL_PRINTER_RESEARCH.md',\n      'Nooch Asian Kitchen (skupina FWG, 3 prevádzky v kantóne Bern) pomenovaný ako prvý predajný cieľ po pilote',\n      'Ingrediencie: živý počet zhôd pri filtrovaní, plný reálny zoznam kategórií namiesto starej 4-položkovej skratky, nový cenový filter Overené/Odhad/Chýba',\n      'Ingrediencie: počet zhôd pripnutý aj priamo v topbare, viditeľný bez otvorenia Search &amp; Filter',\n      'Sautero logo predizajnované — ručne stavaný prstencový znak (jeden presný oblúk, nie fontové písmeno) v sage/cream namiesto medenej, italic serif wordmark',\n      'Výber ikon Check Listu rozšírený z 30 na plných 72 ikon, zhodné s Receptami',\n      'Nové: Language Audit — skenuje názvy jedál/položiek Check Listu na čokoľvek mimo angličtiny, navrhuje preklady, schvaľovanie po položkách',\n      'Pilotná kuchyňa sa mení z Hotela Schweizerhof na Burrito Bandito &amp; Lido (jedna skupina, dve prevádzky) — ruší Schweizerhof IP riziko z backlog v2 review, keďže Sautero prestáva závisieť od ich dát; RC Studio odložené kvôli kapacite; prvý draft pilotnej zmluvy v docs/PILOT_AGREEMENT.md',\n      'Vyriešených šesť kritických/bezpečnostných bodov: nastavený Git (úplne chýbal), Anthropic API kľúč presunutý server-side cez novú Edge Function proxy, reálne zapojený realtime sync Check Listu medzi zariadeniami (potvrdene predtým neexistoval), základné error trackovanie + usage analytika, expirujúce/odvolateľné tímové pozvánky + admin odstránenie člena, písaný manuálny regresný checklist',\n      'Filter sheet Ingrediencií: vyhľadávanie + živý počet zhôd pripnuté hore, chipy scrollujú pod nimi',\n      'backlog.html spravený interaktívny: skutočné checkboxy s localStorage perzistenciou, sticky horný pás so živým koláčom percent + progress barom',\n      'Nasadený audit log Check Listu — každá zmena statusu/skladu/priority/poznámky zaznamenáva kto/čo/kedy, zobrazené ako „Recent activity“ v Info paneli položky',\n      '🔴→✅ Kritický bug nájdený a opravený v ten istý deň: db/53 pridal dve RLS politiky na `profiles`, ktoré rekurzívne dopytujú samotné `profiles`, čo Postgres nevie vyriešiť — naživo potvrdené priamou REST sondou, že to zlomilo takmer každú tabuľku appky (profiles, recipes, ingredients, prep_items, prep_dishes, access_requests…), veľmi pravdepodobne príčina rozbitého login screenu na Richardovom telefóne. Oprava v db/55, Richard ju spustil, znovu overené druhou REST sondou — všetky tabuľky odpovedajú normálne.',\n      'Na Richardovu žiadosť prečítaná jeho zmluva s Hotelom Schweizerhof: nikde žiadna IP klauzula, zákaz konkurencie ani zákaz vedľajšej činnosti — úprimne upokojujúce čítanie (nie právna garancia; označené, že pred čímkoľvek investorským to má potvrdiť skutočný švajčiarsky pracovný právnik)',\n      'loadAppData() paralelizovaný (11 sekvenčných Supabase dopytov → Promise.all) v reakcii na Richardov report, že appka sa občas načítava pomaly',\n      'Definované a s Richardom dohodnuté kritériá úspechu trialu (používanie, retencia, ochota platiť, spoľahlivosť a kvalitatívny feedback — pozri backlog.html)',\n      'Vytvorený a plne bootstrapnutý staging Supabase projekt („chefos-staging“) — všetkých 56 migrácií spustených naraz cez malý psycopg2 skript (cez Session Pooler, lebo Direct connection chce IPv6, ktoré tu nebolo dostupné), naživo overené bez chýb a presne zhodné s produkčnými dátami. Nové SQL migrácie sa odteraz testujú najprv tu.',\n      'GitHub Pages deploy plne zautomatizovaný (Actions workflow + prepojené repo) — každý commit je do minúty naživo, koniec Richardovho ručného drag-and-drop nahrávania; nastavené projektové Claude Code permissions, rutinná práca už nepotrebuje schvaľovanie po krokoch',\n      'Vizuálna identita appky zjednotená s dokumentmi (navy/teal #34F7D7 akcent nahrádza starý copper/charcoal look) na Richardovu žiadosť — jeden Sautero look všade; nasadená Privacy & Terms stránka (legal.html) + feedback tlačidlo; yield/waste faktor pridaný do food costu (db/57 čakal na prod); Ingrediencie: filter cenového rozsahu, multi-select chipy, tlačidlo \"Show me\"; nová 🎯 Chef Challenge dlaždica (nápady na menu v rozpočte z vlastných nacenených surovín kuchyne)',\n      'Formalizovaný monetizačný plán: Richardov workshop 10 modelov s expertným panelom prevedený do app/monetization.html v house štýle, Claude pridal model 11 (platené workshopy/školenia) + akčný plán. Jednomyseľný záver panelu: onboarding ~990 CHF + founding ročná predplatba 490 CHF je celý 12-mesačný plán. Nadraftované dva odblokovacie dokumenty: docs/NEBENERWERB_REQUEST.md (súhlas zamestnávateľa — právny blokátor č. 1) a docs/FOUNDING_OFFER.md (founding-member ponuka s podmienkami).',\n      'Databáza ingrediencií rozšírená presne na 2 000 riadkov (db/59, 646 nových AI-odhadovaných položiek s plnými dátami cena/nutrície/sklad/sezóny/pôvod/náhrady, poctivo označené ako odhad); nájdený a opravený tichý bug, kde appka načítavala len prvých 1 000 ingrediencií (defaultný REST strop Su (dateStr){\n  const d = new Date(dateStr + 'T00:00:00');\n  const day = (d.getDay() + 6) % 7; // Monday = 0\n  const monday = new Date(d); monday.setDate(d.getDate() - day);\n  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);\n  const fmt = (x)=> x.toLocaleDateString('en-GB',{ day:'numeric', month:'short' });\n  return { key: monday.toISOString().slice(0,10), label: `Week of ${fmt(monday)} – ${fmt(sunday)}, ${sunday.getFullYear()}` };\n}\nfunction monthLabel(dateStr){\n  const d = new Date(dateStr + 'T00:00:00');\n  return { key: dateStr.slice(0,7), label: d.toLocaleDateString('en-GB',{ month:'long', year:'numeric' }) };\n}\nfunction weekdayShort(dateStr){\n  return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-GB',{ weekday:'short' });\n}\n\nfunction renderTop3(){\n  const scopes = [\n    { key:'day', label:'Today' },\n    { key:'week', label:'This Week' },\n    { key:'month', label:'This Month' },\n  ];\n  document.getElementById('top3Grid').innerHTML = scopes.map(s=>{\n    const data = TOP3[s.key];\n    const items = data.items.map(it=>`\n      \u003cli class=\"top3-item\">\n        \u003cspan class=\"top3-dot ${it.status}\">\u003c/span>\n        \u003cspan>${it.text}\u003cspan class=\"top3-status ${it.status}\">${it.status}\u003c/span>\u003c/span>\n      \u003c/li>\n    `).join('');\n    return `\n      \u003cdiv class=\"top3-card\">\n        \u003cdiv class=\"top3-scope\">${s.label}\u003c/div>\n        \u003cdiv class=\"top3-range\">${data.range}\u003c/div>\n        \u003cul class=\"top3-list\">${items}\u003c/ul>\n      \u003c/div>\n    `;\n  }).join('');\n}\n\nfunction renderTimeline(){\n  // group days by month, then by week, preserving chronological order, newest first\n  const daysDesc = DAYS.slice().sort((a,b)=> b.date.localeCompare(a.date));\n  const months = [];\n  daysDesc.forEach(day=>{\n    const m = monthLabel(day.date);\n    let monthEntry = months.find(x=>x.key === m.key);\n    if(!monthEntry){ monthEntry = { key:m.key, label:m.label, weeks:[] }; months.push(monthEntry); }\n    const w = isoWeekLabel(day.date);\n    let weekEntry = monthEntry.weeks.find(x=>x.key === w.key);\n    if(!weekEntry){ weekEntry = { key:w.key, label:w.label, days:[] }; monthEntry.weeks.push(weekEntry); }\n    weekEntry.days.push(day);\n  });\n\n  document.getElementById('timelineRoot').innerHTML = months.map((m, mi)=>{\n    const totalDays = m.weeks.reduce((n,w)=>n+w.days.length,0);\n    const weeksHtml = m.weeks.map((w, wi)=>{\n      const daysHtml = w.days.map((day, di)=>{\n        const accomplishedHtml = day.accomplished.map(a=>{\n          const time = (a && typeof a === 'object') ? a.time : null;\n          const text = (a && typeof a === 'object') ? a.text : a;\n          return `\u003cli>${time ? `\u003cspan class=\"mono\" style=\"color:var(--accent); margin-right:8px;\">${time}\u003c/span>` : ''}${text}\u003c/li>`;\n        }).join('');\n        return `\n          \u003cdiv class=\"day-row\" data-id=\"d-${m.key}-${w.key}-${di}\">\n            \u003cdiv class=\"day-head\" onclick=\"toggleBlock('d-${m.key}-${w.key}-${di}')\">\n              \u003cdiv class=\"day-flex\" style=\"flex:1;\">\n                \u003cspan class=\"day-date\">${weekdayShort(day.date)} ${day.date}\u003c/span>\n                \u003cspan class=\"day-title\">${day.headline}\u003c/span>\n              \u003c/div>\n              \u003cspan class=\"chev\">▶\u003c/span>\n            \u003c/div>\n            \u003cdiv class=\"day-body\">\n              \u003cul class=\"accomplished-list\">${accomplishedHtml}\u003c/ul>\n              \u003cdiv class=\"day-planned\">\u003cb>Planned next:\u003c/b> ${day.planned}\u003c/div>\n            \u003c/div>\n          \u003c/div>\n        `;\n      }).join('');\n      return `\n        \u003cdiv class=\"week-block\" data-id=\"w-${m.key}-${w.key}\">\n          \u003cdiv class=\"week-head\" onclick=\"toggleBlock('w-${m.key}-${w.key}')\">\n            \u003cspan class=\"week-name\">${w.label}\u003c/span>\n            \u003cspan class=\"week-meta\">${w.days.length} day${w.days.length===1?'':'s'} logged \u003cspan class=\"chev\">▶\u003c/span>\u003c/span>\n          \u003c/div>\n          \u003cdiv class=\"week-body\">${daysHtml}\u003c/div>\n        \u003c/div>\n      `;\n    }).join('');\n    return `\n      \u003cdiv class=\"month-block${mi===0?' open':''}\" data-id=\"m-${m.key}\">\n        \u003cdiv class=\"month-head\" onclick=\"toggleBlock('m-${m.key}')\">\n          \u003cspan class=\"month-name\">${m.label}\u003c/span>\n          \u003cspan class=\"month-meta\">${totalDays} day${totalDays===1?'':'s'} logged \u003cspan class=\"chev\">▶\u003c/span>\u003c/span>\n        \u003c/div>\n        \u003cdiv class=\"month-body\">${weeksHtml}\u003c/div>\n      \u003c/div>\n    `;\n  }).join('');\n\n  // auto-open the most recent week and most recent day inside the open month\n  if(months[0]){\n    const latestWeek = months[0].weeks[0];\n    if(latestWeek) toggleBlock(`w-${months[0].key}-${latestWeek.key}`, true);\n    if(latestWeek && latestWeek.days[0]) toggleBlock(`d-${months[0].key}-${latestWeek.key}-0`, true);\n  }\n}\n\nfunction toggleBlock(id, forceOpen){\n  const el = document.querySelector(`[data-id=\"${id}\"]`);\n  if(!el) return;\n  if(forceOpen){ el.classList.add('open'); return; }\n  el.classList.toggle('open');\n}\n\n/* ---------- Language toggle — translates structural chrome (kicker, headings, section\n   descriptions, footer) only. TOP3/DAYS log content stays in English in both modes — same\n   scope boundary as the other Sautero docs, a separate translation job. ---------- */\nlet _lang = localStorage.getItem('chefos_doc_lang') || 'sk';\nfunction applyLang(){\n  document.querySelectorAll('[data-sk]').forEach(el=>{\n    el.textContent = _lang === 'sk' ? el.getAttribute('data-sk') : (el.getAttribute('data-en') || el.getAttribute('data-sk'));\n  });\n  document.getElementById('langBtn').textContent = _lang === 'sk' ? 'EN' : 'SK';\n  document.documentElement.lang = _lang;\n  document.getElementById('footNote').textContent = _lang === 'sk'\n    ? `Sautero · vygenerované ${GENERATED} · doplnok k presentation.html, zdroj docs/ROADMAP.md`\n    : `Sautero · generated ${GENERATED} · companion to presentation.html, sourced from docs/ROADMAP.md`;\n}\nfunction toggleLang(){\n  _lang = _lang === 'sk' ? 'en' : 'sk';\n  localStorage.setItem('chefos_doc_lang', _lang);\n  applyLang();\n  renderLogStats();\n  const search = document.getElementById('logSearch');\n  if(search) search.placeholder = _lang === 'sk' ? 'Hľadať v denníku…' : 'Search the log…';\n}\n\n/* ---------- Log stats — computed from DAYS itself so the numbers can't drift. ---------- */\nfunction renderLogStats(){\n  const entries = DAYS.reduce((n,d)=> n + d.accomplished.length, 0);\n  const dates = DAYS.map(d=>d.date).sort();\n  const first = new Date(dates[0] + 'T00:00:00');\n  const last = new Date(dates[dates.length-1] + 'T00:00:00');\n  const spanDays = Math.round((last - first) / 86400000) + 1;\n  const locale = _lang === 'sk' ? 'sk-SK' : 'en-GB';\n  document.getElementById('logStats').innerHTML = `\n    \u003cdiv class=\"log-stat\">\u003cdiv class=\"v\">${DAYS.length}\u003c/div>\u003cdiv class=\"k\">${_lang==='sk'?'dní v denníku':'days logged'}\u003c/div>\u003c/div>\n    \u003cdiv class=\"log-stat\">\u003cdiv class=\"v\">${entries}\u003c/div>\u003cdiv class=\"k\">${_lang==='sk'?'zapísaných položiek':'entries recorded'}\u003c/div>\u003c/div>\n    \u003cdiv class=\"log-stat\">\u003cdiv class=\"v\">${entries && spanDays ? Math.round(entries/spanDays*10)/10 : 0}\u003c/div>\u003cdiv class=\"k\">${_lang==='sk'?'položiek / deň (priemer)':'entries / day (avg)'}\u003c/div>\u003c/div>\n  `;\n}\n\n/* ---------- Expand/collapse all + search across the day-by-day log. Searching expands every\n   block so hits are actually visible, and highlights matches; clearing restores default. ---------- */\nfunction expandAllLog(open){\n  document.querySelectorAll('#timelineRoot [data-id]').forEach(el=> el.classList.toggle('open', open));\n}\nfunction searchLog(){\n  const q = document.getElementById('logSearch').value.trim().toLowerCase();\n  renderTimeline(); // reset any previous highlighting/hiding\n  if(!q) return;\n  expandAllLog(true);\n  document.querySelectorAll('#timelineRoot .accomplished-list li').forEach(li=>{\n    const t = li.textContent.toLowerCase();\n    if(t.indexOf(q) === -1){ li.style.display = 'none'; return; }\n    li.style.display = '';\n  });\n  // Hide days with no visible entries\n  document.querySelectorAll('#timelineRoot .day-row').forEach(day=>{\n    const any = [...day.querySelectorAll('.accomplished-list li')].some(li=> li.style.display !== 'none');\n    const headText = day.textContent.toLowerCase();\n    day.style.display = (any || headText.indexOf(q) !== -1) ? '' : 'none';\n  });\n}\n\n/* Pace chart (Richard, 17.7.) — accomplishments per day; a bar click opens that day. */\nfunction renderPaceChart(){\n  const el = document.getElementById('paceChart');\n  if(!el) return;\n  const days = DAYS.slice().sort((a,b)=>a.date.localeCompare(b.date));\n  const max = Math.max(...days.map(d=>d.accomplished.length));\n  const BW = 34, GAP = 14, H = 150, TOP = 18, LBL = 30;\n  const W = days.length * (BW + GAP) + GAP;\n  const bars = days.map((d,i)=>{\n    const h = Math.max(3, Math.round(d.accomplished.length / max * H));\n    const x = GAP + i * (BW + GAP), y = TOP + H - h;\n    const short = d.date.slice(8,10) + '.' + String(+d.date.slice(5,7)) + '.';\n    return `\u003cg class=\"bar\" onclick=\"openDayFromChart('${d.date}')\">\u003ctitle>${d.date} — ${d.accomplished.length}\u003c/title>\n      \u003crect x=\"${x}\" y=\"${y}\" width=\"${BW}\" height=\"${h}\" rx=\"4\" fill=\"var(--accent)\"/>\n      \u003ctext x=\"${x+BW/2}\" y=\"${y-5}\" text-anchor=\"middle\" font-size=\"11\" fill=\"var(--ink)\">${d.accomplished.length}\u003c/text>\n      \u003ctext x=\"${x+BW/2}\" y=\"${TOP+H+16}\" text-anchor=\"middle\" font-size=\"9.5\" fill=\"var(--ink-dim)\">${short}\u003c/text>\u003c/g>`;\n  }).join('');\n  el.innerHTML = `\u003csvg width=\"${W}\" height=\"${TOP+H+LBL}\" viewBox=\"0 0 ${W} ${TOP+H+LBL}\">${bars}\u003c/svg>`;\n}\nfunction openDayFromChart(date){\n  expandAllLog(true);\n  const row = [...document.querySelectorAll('#timelineRoot .day-row')].find(r=>{\n    const d = r.querySelector('.day-date');\n    return d && d.textContent.includes(date);\n  });\n  if(!row) return;\n  row.classList.add('open');\n  row.scrollIntoView({ behavior:'smooth', block:'center' });\n  row.classList.add('flash');\n  setTimeout(()=>row.classList.remove('flash'), 2200);\n}\n\napplyLang();\nrenderTop3();\nrenderTimeline();\nrenderLogStats();\nrenderPaceChart();\n\u003c/script>\n\n\u003cdiv class=\"chefos-stamp\" data-sk=\"🔄 Stav Sautero k 18. 7. 2026, 10:21\" data-en=\"🔄 Sautero state as of Jul 18, 2026, 10:21\">🔄 Stav Sautero k 18. 7. 2026, 10:21\u003c/div>\n\u003c/body>\n\u003c/html>\n", "\u003c!DOCTYPE html>\n\u003chtml lang=\"sk\">\n\u003chead>\n\u003cmeta charset=\"UTF-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n\u003ctitle>Sautero — Úlohy v2: dnes → Fáza 7 (expert review)\u003c/title>\n\u003cstyle>\n  /* Sautero standing visual identity — same tokens as every other Sautero document. Redesigned\n     2026-07-15 under the Visual Data Standards: task content untouched, upgraded chrome —\n     search + status/tag filtering, per-phase progress bars, phase jump nav. */\n  :root{\n    --bg:#0A1A2F; --paper:#122845; --paper-raised:#0f2340; --paper-hi:#16304f;\n    --ink:#fff; --ink-dim:#9C949E; --ink-faint:rgba(156,148,158,0.6);\n    --rule:#223d57; --accent:#34F7D7; --accent-dim:rgba(52,247,215,0.4); --accent-wash:rgba(52,247,215,0.08);\n    --gold:#F7C948; --gold-dim:rgba(247,201,72,0.4);\n    --danger:#FF7A68; --danger-dim:rgba(255,122,104,0.4);\n    --v2:#8B93FF; --v2-dim:rgba(139,147,255,0.4);\n    --mono:\"SF Mono\",Menlo,Consolas,monospace;\n  }\n  *{ box-sizing:border-box; }\n  html,body{ margin:0; padding:0; }\n  body{\n    background:var(--bg); color:var(--ink);\n    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;\n    -webkit-font-smoothing:antialiased; padding-bottom:70px; line-height:1.5;\n  }\n  .wrap{ max-width:900px; margin:0 auto; padding:0 20px; }\n  ::selection{ background:var(--accent); color:#0A1A2F; }\n\n  /* ---------- Sticky control bar: progress + search + filters ---------- */\n  #top{\n    position:sticky; top:0; z-index:99;\n    background:rgba(15,35,64,0.96); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);\n    border-bottom:1px solid var(--rule);\n    padding:10px 20px;\n  }\n  #topRow1{ display:flex; align-items:center; gap:14px; max-width:900px; margin:0 auto; }\n  #topInner{ flex:1; min-width:0; }\n  .pie{\n    width:48px; height:48px; border-radius:50%; flex:none; position:relative;\n    background:conic-gradient(#34F7D7 0deg, #223d57 0deg); transition:background .3s;\n  }\n  .pie::after{ content:''; position:absolute; inset:6px; border-radius:50%; background:var(--paper-raised); }\n  .pieLabel{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:bold; color:var(--accent); z-index:1; font-family:var(--mono); }\n  #topInner h2{ margin:0 0 3px 0; font-size:13.5px; font-weight:700; color:var(--ink); }\n  .stats{ display:flex; gap:12px; flex-wrap:wrap; font-size:11px; color:var(--ink-dim); margin-bottom:5px; font-family:var(--mono); }\n  .bar{ height:6px; background:var(--rule); border-radius:99px; overflow:hidden; }\n  .fill{ height:100%; width:0; background:var(--accent); transition:width .3s; }\n  #topRow2{ display:flex; align-items:center; gap:8px; max-width:900px; margin:9px auto 0 auto; flex-wrap:wrap; }\n  #taskSearch{\n    flex:1; min-width:150px; background:var(--paper); border:1px solid var(--rule); border-radius:20px;\n    color:var(--ink); font-family:inherit; font-size:12px; padding:6px 14px; outline:none;\n  }\n  #taskSearch::placeholder{ color:var(--ink-faint); }\n  #taskSearch:focus{ border-color:var(--accent-dim); }\n  .fbtn{\n    background:var(--paper); border:1px solid var(--rule); color:var(--ink-dim);\n    font-size:10.5px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase;\n    padding:5px 11px; border-radius:20px; cursor:pointer; transition:border-color .15s, color .15s; white-space:nowrap;\n  }\n  .fbtn:hover{ border-color:var(--accent-dim); }\n  .fbtn.on{ border-color:var(--accent); color:var(--accent); background:var(--accent-wash); }\n  .fbtn.on.f-crit{ border-color:var(--danger); color:var(--danger); background:rgba(255,122,104,0.1); }\n  .fbtn.on.f-v2{ border-color:var(--v2); color:var(--v2); background:rgba(139,147,255,0.1); }\n  #filterEmpty{ display:none; text-align:center; color:var(--ink-dim); font-size:13px; padding:30px 0; }\n\n  header{ padding:32px 20px 26px 20px; border-bottom:1px solid var(--rule); }\n  header .inner{ max-width:900px; margin:0 auto; }\n  .brandmark{ display:flex; align-items:center; gap:9px; margin-bottom:20px; }\n  .brandmark .word{ font-size:15px; font-weight:700; letter-spacing:0.02em; color:var(--accent); }\n  .kicker{ font-size:12px; letter-spacing:0.16em; text-transform:uppercase; color:var(--accent); margin-bottom:10px; font-weight:700; }\n  h1.title{ font-size:clamp(26px,5vw,38px); line-height:1.12; margin:0 0 12px 0; font-weight:800; letter-spacing:-0.01em; }\n  h1.title em{ font-style:italic; color:var(--accent); font-weight:800; }\n  .dek{ font-size:14.5px; color:var(--ink-dim); max-width:660px; line-height:1.6; margin:0 0 18px 0; }\n  .legend{ display:flex; gap:16px; flex-wrap:wrap; }\n  .legend .item{ display:flex; align-items:center; gap:7px; font-size:11.5px; color:var(--ink-dim); }\n  .swatch{ width:10px; height:10px; border-radius:3px; display:inline-block; }\n  .sw-plan{ background:var(--accent); }\n  .sw-new{ background:var(--gold); }\n  .sw-crit{ background:var(--danger); }\n  .sw-v2{ background:var(--v2); }\n\n  .phase-head{ margin:48px 0 4px 0; display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; scroll-margin-top:110px; }\n  .phase-num{ font-family:var(--mono); font-style:italic; font-size:28px; color:var(--accent); line-height:1; }\n  .phase-title-wrap{ flex:1; min-width:200px; }\n  .phase-title-wrap h2{ margin:0; font-size:12px; text-transform:uppercase; letter-spacing:0.12em; color:var(--ink); font-weight:700; }\n  .phase-title-wrap .sub{ font-size:13px; color:var(--ink-dim); margin-top:3px; }\n  .phase-rule{ height:1px; background:var(--rule); margin:14px 0; }\n  .phase-status{ display:inline-block; font-size:10px; text-transform:uppercase; letter-spacing:0.07em; padding:3px 9px; border-radius:20px; font-weight:700; white-space:nowrap; }\n  .st-active{ background:rgba(247,201,72,0.16); color:var(--gold); }\n  .st-open{ background:rgba(156,148,158,0.12); color:var(--ink-dim); }\n  .st-future{ background:rgba(156,148,158,0.07); color:var(--ink-faint); }\n  .st-red{ background:rgba(255,122,104,0.18); color:var(--danger); }\n  /* Per-phase progress (injected by JS) */\n  /* Phase overview chart (17.7.) */\n  .phase-overview{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:16px 18px 10px 18px; margin:26px 0 6px 0; }\n  .po-flex{ display:flex; align-items:center; gap:22px; flex-wrap:wrap; }\n  .po-rows{ flex:1; min-width:260px; }\n  #overallDonut text{ fill:var(--ink); font-family:var(--mono); }\n  /* Sticky phase-jump nav (17.7.) */\n  .phase-nav{ position:sticky; top:0; z-index:30; background:rgba(10,26,47,0.94); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); border-bottom:1px solid var(--rule); display:flex; gap:6px; overflow-x:auto; padding:8px 14px; scrollbar-width:none; margin:0 -20px; }\n  .phase-nav::-webkit-scrollbar{ display:none; }\n  .phase-nav button{ flex:none; background:var(--paper); border:1px solid var(--rule); color:var(--ink-dim); font-size:11px; font-weight:700; padding:5px 11px; border-radius:20px; cursor:pointer; white-space:nowrap; transition:border-color .15s, color .15s; font-family:inherit; }\n  .phase-nav button:hover{ border-color:var(--accent-dim); color:var(--accent); }\n  /* Collapsible phases (17.7.) */\n  .phase-head{ cursor:pointer; user-select:none; }\n  .phase-head .collapse-chev{ margin-left:auto; color:var(--ink-faint); font-size:12px; transition:transform .15s; flex:none; }\n  .phase-head.collapsed .collapse-chev{ transform:rotate(-90deg); }\n  .tasklist.collapsed{ display:none !important; }\n  .po-title{ font-size:12px; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-dim); font-weight:700; margin-bottom:12px; }\n  .po-row{ display:flex; align-items:center; gap:10px; padding:5px 0; cursor:pointer; }\n  .po-row:hover .po-name{ color:var(--accent); }\n  .po-name{ flex:0 0 210px; min-width:0; font-size:12px; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }\n  .po-bar{ flex:1; height:12px; background:var(--rule); border-radius:99px; overflow:hidden; display:flex; }\n  .po-fill{ height:100%; background:var(--accent); }\n  .po-count{ flex:none; font-family:var(--mono); font-size:10.5px; color:var(--ink-dim); min-width:52px; text-align:right; }\n  @media (max-width:640px){ .po-name{ flex-basis:130px; } }\n  .phase-progress{ display:flex; align-items:center; gap:8px; flex:none; width:100%; margin-top:6px; }\n  .phase-progress .pbar{ flex:1; height:4px; background:var(--rule); border-radius:99px; overflow:hidden; }\n  .phase-progress .pfill{ height:100%; background:var(--accent); border-radius:99px; }\n  .phase-progress .pcount{ font-family:var(--mono); font-size:10px; color:var(--ink-dim); flex:none; }\n\n  .tasklist{ background:var(--paper); border:1px solid var(--rule); border-radius:12px; overflow:hidden; }\n  .task{ display:flex; gap:12px; padding:13px 16px; border-bottom:1px solid var(--rule); align-items:flex-start; }\n  .task:last-child{ border-bottom:none; }\n  .task.v2{ background:rgba(139,147,255,0.06); border-left:3px solid var(--v2); }\n  .task.filtered-out{ display:none; }\n  /* Real checkbox, styled to look like the original plain squares — checking one off strikes\n     the title and dims it automatically via :has(), no JS needed for that part. */\n  .task-check{\n    appearance:none; -webkit-appearance:none;\n    width:16px; height:16px; border:1.5px solid var(--ink-dim); border-radius:4px;\n    margin-top:2px; flex-shrink:0; cursor:pointer; position:relative;\n    background:var(--paper-raised);\n  }\n  .task-check:checked{ background:var(--accent); border-color:var(--accent); }\n  .task-check:checked::after{\n    content:''; position:absolute; left:5px; top:2px; width:4px; height:8px;\n    border:solid var(--bg); border-width:0 2px 2px 0; transform:rotate(45deg);\n  }\n  .task:has(.task-check:checked) .task-title{ text-decoration:line-through; color:var(--ink-dim); }\n  .task-body{ flex:1; min-width:0; }\n  .task-title{ font-size:13.5px; font-weight:600; color:var(--ink); margin-bottom:2px; }\n  .task-desc{ font-size:12.5px; color:var(--ink-dim); line-height:1.55; }\n  .role{ font-size:10px; text-transform:uppercase; letter-spacing:0.06em; color:var(--v2); font-weight:700; margin-top:5px; display:block; }\n  .tags{ display:flex; gap:6px; flex-shrink:0; margin-top:2px; flex-direction:column; align-items:flex-end; }\n  .tag{ font-size:9.5px; text-transform:uppercase; letter-spacing:0.05em; padding:3px 7px; border-radius:20px; font-weight:700; white-space:nowrap; }\n  .tag-plan{ background:rgba(52,247,215,0.14); color:var(--accent); }\n  .tag-new{ background:rgba(247,201,72,0.16); color:var(--gold); }\n  .tag-crit{ background:rgba(255,122,104,0.16); color:var(--danger); }\n  .tag-v2{ background:rgba(139,147,255,0.18); color:var(--v2); }\n\n  .callout{ border:1px solid var(--danger-dim); background:rgba(255,122,104,0.07); border-radius:10px; padding:16px 18px; margin-top:14px; }\n  .callout .k{ font-size:10.5px; text-transform:uppercase; letter-spacing:0.1em; color:var(--danger); font-weight:700; margin-bottom:7px; }\n  .callout p{ margin:0; font-size:13px; color:var(--ink-dim); line-height:1.6; }\n  .callout.ok{ border-color:var(--accent-dim); background:rgba(52,247,215,0.07); }\n  .callout.ok .k{ color:var(--accent); }\n\n  footer{ margin-top:56px; padding-top:18px; border-top:1px solid var(--rule); font-size:11px; color:var(--ink-faint); }\n\n  .lang-toggle{\n    background:var(--paper); border:1px solid var(--rule); color:var(--ink-dim);\n    font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;\n    padding:6px 12px; border-radius:20px; cursor:pointer; transition:border-color .15s, color .15s;\n  }\n  .lang-toggle:hover{ border-color:var(--accent-dim); color:var(--accent); }\n  .topline{ display:flex; align-items:center; justify-content:space-between; }\n\n  /* ---------- Sautero stamp + language fab (Richard, 15.7.: every /visual data/ document\n     carries a last-updated-to-Sautero-state badge and an SK/EN toggle) ---------- */\n  .chefos-stamp{\n    position:fixed; bottom:14px; right:14px; z-index:90;\n    background:rgba(15,35,64,0.92); border:1px solid rgba(52,247,215,0.4); color:#34F7D7;\n    font-size:10.5px; font-weight:700; font-family:\"SF Mono\",Menlo,Consolas,monospace;\n    padding:6px 12px; border-radius:999px;\n    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); pointer-events:none;\n  }\n  .chefos-lang-fab{\n    position:fixed; bottom:14px; left:14px; z-index:90;\n    background:rgba(15,35,64,0.92); border:1px solid #223d57; color:#9C949E;\n    font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;\n    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;\n    padding:7px 14px; border-radius:999px; cursor:pointer;\n    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);\n    transition:border-color .15s, color .15s;\n  }\n  .chefos-lang-fab:hover{ border-color:rgba(52,247,215,0.4); color:#34F7D7; }\n  @media print{ .chefos-stamp, .chefos-lang-fab{ display:none; } }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\n\u003cdiv id=\"top\">\n  \u003cdiv id=\"topRow1\">\n    \u003cdiv class=\"pie\" id=\"pie\">\u003cdiv class=\"pieLabel\" id=\"pieLabel\">0%\u003c/div>\u003c/div>\n    \u003cdiv id=\"topInner\">\n      \u003ch2>Sautero backlog v2\u003c/h2>\n      \u003cdiv class=\"stats\">\u003cspan id=\"done\">\u003c/span>\u003cspan id=\"left\">\u003c/span>\u003cspan id=\"filterHits\">\u003c/span>\u003c/div>\n      \u003cdiv class=\"bar\">\u003cdiv class=\"fill\" id=\"fill\">\u003c/div>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n  \u003cdiv id=\"topRow2\">\n    \u003cinput id=\"taskSearch\" type=\"search\" placeholder=\"Hľadať v úlohách…\" oninput=\"applyFilters()\">\n    \u003cbutton class=\"fbtn\" id=\"fOpen\" onclick=\"toggleFilter('open')\" data-sk=\"⏳ Len otvorené\" data-en=\"⏳ Open only\">\u003c/button>\n    \u003cbutton class=\"fbtn f-crit\" id=\"fCrit\" onclick=\"toggleFilter('crit')\" data-sk=\"🔴 Kritické\" data-en=\"🔴 Critical\">\u003c/button>\n    \u003cbutton class=\"fbtn f-v2\" id=\"fV2\" onclick=\"toggleFilter('v2')\" data-sk=\"🟣 v2 review\" data-en=\"🟣 v2 review\">\u003c/button>\n  \u003c/div>\n\u003c/div>\n\n\u003cheader>\n  \u003cdiv class=\"inner\">\n    \u003cdiv class=\"topline\">\n      \u003cdiv class=\"brandmark\">\n        \u003csvg width=\"22\" height=\"22\" viewBox=\"0 0 68 68\">\u003cpath d=\"M 46.8 42.3 A 18 18 0 1 1 46.8 21.7\" fill=\"none\" stroke=\"#34F7D7\" stroke-width=\"7\" stroke-linecap=\"round\"/>\u003ccircle cx=\"34\" cy=\"34\" r=\"3\" fill=\"#34F7D7\"/>\u003c/svg>\n        \u003cspan class=\"word\">Sautero\u003c/span>\n      \u003c/div>\n      \u003cbutton class=\"lang-toggle\" id=\"langBtn\" onclick=\"toggleLang()\">EN\u003c/button>\n    \u003c/div>\n    \u003cdiv class=\"kicker\" data-sk=\"Kompletný zoznam úloh · v2 — po expert review\" data-en=\"Complete task list · v2 — after expert review\">\u003c/div>\n    \u003ch1 class=\"title\" data-sk=\"Všetko, čo treba ešte urobiť — doplnené\" data-en=\"Everything left to do — updated\">\u003c/h1>\n    \u003cp class=\"dek\" data-sk=\"Predchádzajúci zoznam prešiel kontrolou zo šiestich uhlov: Product Manager, CTO, Solution Architect, UX Lead, QA Lead a skúsený SaaS founder. Fialové položky sú nové — veci, ktoré v prvej verzii chýbali. Zvyšok zostáva z v1. Zaškrtni políčko, keď je úloha hotová — počítadlo hore sa aktualizuje samo a pamätá si to aj nabudúce.\" data-en=\"The previous list went through a review from six angles: Product Manager, CTO, Solution Architect, UX Lead, QA Lead and an experienced SaaS founder. Purple items are new — things the first version missed. The rest carries over from v1. Check the box when a task is done — the counter above updates itself and remembers it next time.\">\u003c/p>\n    \u003cdiv class=\"legend\">\n      \u003cdiv class=\"item\">\u003cspan class=\"swatch sw-plan\">\u003c/span>\u003cspan data-sk=\"Z tvojho plánu\" data-en=\"From your plan\">\u003c/span>\u003c/div>\n      \u003cdiv class=\"item\">\u003cspan class=\"swatch sw-new\">\u003c/span>\u003cspan data-sk=\"Odporúčanie v1\" data-en=\"v1 recommendation\">\u003c/span>\u003c/div>\n      \u003cdiv class=\"item\">\u003cspan class=\"swatch sw-v2\">\u003c/span>\u003cspan data-sk=\"Nové vo v2 (expert review)\" data-en=\"New in v2 (expert review)\">\u003c/span>\u003c/div>\n      \u003cdiv class=\"item\">\u003cspan class=\"swatch sw-crit\">\u003c/span>\u003cspan data-sk=\"Kritické\" data-en=\"Critical\">\u003c/span>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/header>\n\n\u003cdiv class=\"wrap\">\n\n  \u003c!-- Sticky phase-jump nav (Richard, 17.7. \"vylepši vizuál\"): always-visible chips, one per\n       phase — jump anywhere in this long document with one tap. -->\n  \u003cnav class=\"phase-nav\" id=\"phaseNav\">\u003c/nav>\n\n  \u003c!-- Phase overview chart (Richard, 17.7.): done vs open per phase — click a row to jump.\n       Now with the overall-progress donut alongside. -->\n  \u003cdiv class=\"phase-overview\" id=\"phaseOverview\">\u003c/div>\n\n  \u003c!-- FOUNDER RISKS -->\n  \u003cdiv class=\"phase-head\">\n    \u003cdiv class=\"phase-num\">⚠\u003c/div>\n    \u003cdiv class=\"phase-title-wrap\">\u003ch2 data-sk=\"Zakladateľské riziká — vyriešiť skôr než čokoľvek iné\" data-en=\"Founder risks — resolve before anything else\">\u003c/h2>\u003cdiv class=\"sub\" data-sk=\"Toto v1 úplne prehliadla a je to najvážnejšia časť celého dokumentu\" data-en=\"v1 completely missed this, and it's the most important part of the whole document\">\u003c/div>\u003c/div>\n    \u003cspan class=\"phase-status st-red\">Existenčné\u003c/span>\n  \u003c/div>\n  \u003cdiv class=\"phase-rule\">\u003c/div>\n  \u003cdiv class=\"tasklist\">\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t1\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Vyjasniť vlastníctvo IP voči zamestnávateľovi (Hotel Schweizerhof)\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Vyriešené 13.7.:\u003c/b> Schweizerhof dáta (rozvrh, prep sheets postavené na jeho menu) ide preč z appky úplne — pilot beží na Burrito Bandito &amp; Lido namiesto toho, takže tento konkrétny IP risk odpadá. Všeobecná rada (skontrolovať IP klauzuly v pracovnej zmluve) naďalej platí aj pre nového zamestnávateľa — pozri nižšie.\u003c/div>\u003cspan class=\"role\">Vyriešené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t2\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Vyriešiť, čo bude pilotnou kuchyňou po odchode zo Schweizerhofu\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Vyriešené 13.7.:\u003c/b> Pilotná kuchyňa je Burrito Bandito &amp; Lido — jedna spoločnosť, dve prevádzky. IP klauzuly v novej pracovnej zmluve stále stojí za to skontrolovať, no to je bežná opatrnosť, nie akútny blocker.\u003c/div>\u003cspan class=\"role\">Vyriešené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t3\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Realisticky prehodnotiť kapacitu: nová práca na plný úväzok + Sautero + RC Studio\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Vyriešené 13.7.:\u003c/b> RC Studio ide bokom — kapacita sa delí len medzi novú prácu a Sautero. Termíny (vrátane 1.8. trialu) treba aj tak priebežne sledovať voči reálne dostupným hodinám.\u003c/div>\u003cspan class=\"role\">Vyriešené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t4\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Písomná pilot dohoda s každou testovacou kuchyňou\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--v2);\">Prvý návrh hotový 13.7.\u003c/b> — uložený ako docs/PILOT_AGREEMENT.md. Ešte treba: preložiť/upraviť podľa jazyka konkrétnej prevádzky a nechať si to potvrdiť, že to naozaj právne obstojí, kým sa na to bude spoliehať.\u003c/div>\u003cspan class=\"role\">Founder + právne\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Rozpracované\u003c/span>\u003c/div>\u003c/div>\n  \u003c/div>\n\n  \u003c!-- PHASE 00 -->\n  \u003cdiv class=\"phase-head\">\n    \u003cdiv class=\"phase-num\">00\u003c/div>\n    \u003cdiv class=\"phase-title-wrap\">\u003ch2 data-sk=\"Tento týždeň — technický základ\" data-en=\"This week — technical foundation\">\u003c/h2>\u003cdiv class=\"sub\" data-sk=\"v1 blockery + čo odhalil CTO/QA pohľad\" data-en=\"v1 blockers + what the CTO/QA review surfaced\">\u003c/div>\u003c/div>\n    \u003cspan class=\"phase-status st-active\">Teraz\u003c/span>\n  \u003c/div>\n  \u003cdiv class=\"phase-rule\">\u003c/div>\n  \u003cdiv class=\"tasklist\">\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t5\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Overiť odosielaciu doménu v Resend / prepnúť na Supabase mailer\u003c/div>\u003cdiv class=\"task-desc\">Tvrdý blocker verejného trialu — cudzie adresy sa nevedia prihlásiť.\u003c/div>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Blocker\u003c/span>\u003cspan class=\"tag tag-plan\">Plán\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t6\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Dať celý kód do Gitu (GitHub, súkromné repo) — okamžite\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Plne vyriešené 13.7.:\u003c/b> lokálny git repo pripojený na Richardov existujúci repozitár chefos-app (bol na GitHube spravovaný ručným drag-and-drop nahrávaním). Pridaný GitHub Actions workflow, ktorý automaticky nasadí app/ na create.github.io pri každom commite — žiadne ručné nahrávanie už netreba.\u003c/div>\u003cspan class=\"role\">Vyriešené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t7\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Zapnúť/overiť automatické zálohy Supabase databázy + otestovať obnovu\u003c/div>\u003cdiv class=\"task-desc\">Free tier má obmedzené zálohy. V DB sú už reálne dáta pilotu (173 receptov, prep dáta, dochádzka). Záloha, ktorú si nikdy neskúšal obnoviť, nie je záloha.\u003c/div>\u003cspan class=\"role\">CTO\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">v2\u003c/span>\u003cspan class=\"tag tag-crit\">Kritické\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t8\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Vytvoriť staging prostredie (druhý Supabase projekt) — prestať púšťať SQL priamo na produkciu\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Vyriešené 13.7.:\u003c/b> projekt \"chefos-staging\" založený, celá schéma + dáta (173 receptov, 1315 ingrediencií, celý Check List) nahraté cez db/_staging_bootstrap.sql, naživo overené (žiadna RLS chyba). Odteraz: nová SQL zmena ide vždy najprv sem, až potom na produkciu.\u003c/div>\u003cspan class=\"role\">Vyriešené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t9\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Presunúť Anthropic API kľúč na server (Supabase Edge Function)\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Vyriešené 13.7.:\u003c/b> supabase/functions/claude-proxy hotová, všetkých 9 volaní v appke prepojených cez ňu. Ty ešte musíš spustiť \u003ccode style=\"background:rgba(0,0,0,0.25); padding:1px 6px; border-radius:4px;\">supabase functions deploy claude-proxy\u003c/code> — nemám odtiaľto prístup k Supabase CLI.\u003c/div>\u003cspan class=\"role\">Vyriešené (čaká na deploy)\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Kód hotový\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t10\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Cost cap + alert na Anthropic účte\u003c/div>\u003cdiv class=\"task-desc\">Vedieť o prekročení skôr, než príde faktúra.\u003c/div>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-new\">v1\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t11\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Over limity Supabase free tieru pred trialom\u003c/div>\u003cdiv class=\"task-desc\">Free projekty sa po 7 dňoch nečinnosti pozastavujú a majú limity na DB veľkosť/požiadavky. S 25 užívateľmi zváž Pro tier (~25 USD/mes) aspoň na obdobie trialu — lacná poistka proti trapasu „appka je preč\".\u003c/div>\u003cspan class=\"role\">CTO\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">v2\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t12\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Spustiť čakajúce SQL migrácie (46–53: dodávateľské ceny, mena, RLS opravy, realtime, error/usage logy, invite expirácia)\u003c/div>\u003cdiv class=\"task-desc\">Po zriadení stagingu — najprv tam, potom prod.\u003c/div>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Plán\u003c/span>\u003c/div>\u003c/div>\n  \u003c/div>\n\n  \u003c!-- PRE TRIAL -->\n  \u003cdiv class=\"phase-head\">\n    \u003cdiv class=\"phase-num\">0.5\u003c/div>\n    \u003cdiv class=\"phase-title-wrap\">\u003ch2 data-sk=\"Pred verejným trialom\" data-en=\"Before the public trial\">\u003c/h2>\u003cdiv class=\"sub\" data-sk=\"25 ľudí, viac reštaurácií — s doplnkami z PM/UX/QA pohľadu\" data-en=\"25 people, multiple restaurants — with additions from the PM/UX/QA review\">\u003c/div>\u003c/div>\n    \u003cspan class=\"phase-status st-active\">Blízko\u003c/span>\n  \u003c/div>\n  \u003cdiv class=\"phase-rule\">\u003c/div>\n  \u003cdiv class=\"tasklist\">\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t13\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Definovať kritériá úspechu trialu VOPRED — čo znamená „funguje\"\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Vyriešené 13.7. — dohodnuté s Richardom:\u003c/b>\u003cbr>• Aktívne používanie: 40 %+ pozvaných tímov otvorí Check List aspoň 3× v druhom týždni\u003cbr>• Retencia: aspoň polovica tímov, čo začali, je aktívna aj v 2. týždni (nie len deň 1)\u003cbr>• Ochota platiť: aspoň 5 z 25 ľudí odpovie áno na priamu otázku „platil by si X CHF/mesiac?\"\u003cbr>• Spoľahlivosť: menej ako 10 kritických chýb v error_logs počas trialu\u003cbr>• Kvalitatívne: aspoň 3 nevyžiadané pozitívne a 3 kritické spätné väzby zozbierané\u003c/div>\u003cspan class=\"role\">Vyriešené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Dohodnuté\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t14\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Pridať základnú analytiku používania (aspoň: kto sa prihlásil, ktorý modul otvoril)\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Vyriešené 13.7.:\u003c/b> db/52_usage_events.sql, loguje login + otvorenie každého hlavného modulu. Admin si to vie prečítať priamo cez Supabase Table Editor, žiadne UI zatiaľ netreba.\u003c/div>\u003cspan class=\"role\">Vyriešené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t15\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Error tracking — zachytávať JS chyby užívateľov\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Vyriešené 13.7.:\u003c/b> db/51_error_logs.sql + window.onerror/unhandledrejection handler, capped na 20 logov/session.\u003c/div>\u003cspan class=\"role\">Vyriešené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t16\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Napísať regresný test checklist a prejsť ho pred každým väčším nasadením\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Vyriešené 13.7.:\u003c/b> docs/REGRESSION_CHECKLIST.md. Prejsť si ho ty musíš sám na reálnom zariadení pred trialom — to za teba spraviť neviem.\u003c/div>\u003cspan class=\"role\">Vyriešené (dokument), test čaká na teba\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t17\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Otestovať na matici zariadení: starší iPhone, Android, tablet — nie len tvoj telefón\u003c/div>\u003cdiv class=\"task-desc\">25 cudzích ľudí = 25 rôznych zariadení. Minimálne: iOS Safari (2 verzie), Android Chrome, jeden tablet. Kuchynské reálie: mokré prsty, rukavice, odlesk — over veľkosť dotykových plôch.\u003c/div>\u003cspan class=\"role\">QA + UX Lead\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">v2\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t18\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Rozhodnúť jazykovú stratégiu: appka je po anglicky, bernské kuchyne hovoria nemecky\u003c/div>\u003cdiv class=\"task-desc\">UI bolo cielene preložené do angličtiny — ale cieľový trh je kantón Bern. Minimálne over pri triale, či je angličtina pre commis/casserolier bariéra; nemecká lokalizácia môže byť dôležitejšia než ďalšia funkcia.\u003c/div>\u003cspan class=\"role\">UX Lead + PM\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">v2\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t19\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Manuálny live test celej appky + flow „vytvor kuchyňu → QR → cudzí sa pripojí\"\u003c/div>\u003cdiv class=\"task-desc\">Z v1 — s reálnym druhým človekom, nie sám so sebou.\u003c/div>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Plán\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t20\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Onboarding text + kanál na feedback + Podmienky/Privacy stránka\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Vyriešené 13.7. (autonómne, cez noc):\u003c/b> app/legal.html — Privacy &amp; Terms stránka v štýle appky, pokrýva Working Time dochádzkové dáta (nDSG), AI dáta, error/usage logy, explicitne označené ako zatiaľ neoverené právnikom. Odkaz na prihlasovacej obrazovke. Feedback kanál: 💬 ikonka na Home, otvorí mailto priamo na Richarda s predvyplneným kontextom (email, kitchen id) — najjednoduchšie funkčné riešenie pre malý uzavretý trial.\u003c/div>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t21\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Label printer + papierový fallback plán pre servis\u003c/div>\u003cdiv class=\"task-desc\">Z v1 — Brother QL-820NWB, a odporúčanie pre kuchyne, čo robiť pri výpadku.\u003c/div>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-new\">v1\u003c/span>\u003c/div>\u003c/div>\n  \u003c/div>\n\n  \u003c!-- PHASE 2 -->\n  \u003cdiv class=\"phase-head\">\n    \u003cdiv class=\"phase-num\">02\u003c/div>\n    \u003cdiv class=\"phase-title-wrap\">\u003ch2 data-sk=\"Fáza 2 — Kitchen Flow MVP\" data-en=\"Phase 2 — Kitchen Flow MVP\">\u003c/h2>\u003cdiv class=\"sub\" data-sk=\"Doplnené o architektonickú otázku, ktorú v1 minula\" data-en=\"Added an architecture question that v1 missed\">\u003c/div>\u003c/div>\n    \u003cspan class=\"phase-status st-open\">Čiastočne rozbehnuté\u003c/span>\n  \u003c/div>\n  \u003cdiv class=\"phase-rule\">\u003c/div>\n  \u003cdiv class=\"tasklist\">\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t22\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Overiť/zapojiť skutočný realtime\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Potvrdené a vyriešené 13.7.:\u003c/b> realtime naozaj nikde nebol zapojený — appka sa vždy načítala len raz. Teraz Check List (prep_items/prep_dishes) posiela zmeny naživo na všetky zariadenia. Ty ešte musíš spustiť db/50_enable_realtime.sql.\u003c/div>\u003cspan class=\"role\">Vyriešené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Kód hotový\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t23\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Naplánovať rozdelenie single-file architektúry — podľa vlastného ARCHITECTURE.md\u003c/div>\u003cdiv class=\"task-desc\">Tvoj vlastný dokument hovorí, že single-file štruktúra „does NOT carry forward\" — no appka je stále jeden obrovský index.html a rastie o desiatky funkcií denne. Netreba prepisovať hneď, ale treba stanoviť bod, kedy sa rozdelí (napr. po triale), inak sa každá ďalšia zmena stáva rizikovejšou (script-order bug bol prvé varovanie).\u003c/div>\u003cspan class=\"role\">Solution Architect + CTO\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">v2\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t24\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Audit log — kto kedy odklikol/zmenil položku\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Vyriešené 13.7.:\u003c/b> nová tabuľka check_list_audit_log zaznamenáva každú zmenu statusu/on-hand/priority/poznámky (kto, čo, kedy), viditeľné pre celú kuchyňu v Info paneli položky (\"Recent activity\"). Ty ešte musíš spustiť db/54_check_list_audit_log.sql.\u003c/div>\u003cspan class=\"role\">Vyriešené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Kód hotový\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t25\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Role a oprávnenia · reálne časy namiesto placeholderov · test v ostrom servise · validácia formátu receptu · kalibrácia overload prahu\u003c/div>\u003cdiv class=\"task-desc\">Všetko z v1 — zostáva v plnom rozsahu.\u003c/div>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Plán + v1\u003c/span>\u003c/div>\u003c/div>\n  \u003c/div>\n\n  \u003c!-- PHASE 3 -->\n  \u003cdiv class=\"phase-head\">\n    \u003cdiv class=\"phase-num\">03\u003c/div>\n    \u003cdiv class=\"phase-title-wrap\">\u003ch2 data-sk=\"Fáza 3 — Inventory, Food Cost &amp; Shopping\" data-en=\"Phase 3 — Inventory, Food Cost &amp; Shopping\">\u003c/h2>\u003cdiv class=\"sub\" data-sk=\"Doplnené o dátovú integritu\" data-en=\"Added data-integrity coverage\">\u003c/div>\u003c/div>\n    \u003cspan class=\"phase-status st-open\">Čiastočne predbehnuté\u003c/span>\n  \u003c/div>\n  \u003cdiv class=\"phase-rule\">\u003c/div>\n  \u003cdiv class=\"tasklist\">\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t26\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Vyriešiť multi-tenant konflikt zdieľanej ingredient tabuľky\u003c/div>\u003cdiv class=\"task-desc\">Ak je ingredients tabuľka spoločná pre všetky kuchyne, potom keď jedna kuchyňa zmení cenu masla, zmení ju všetkým — ceny od dodávateľov sú pritom pre každú kuchyňu iné. Treba rozhodnúť: globálny katalóg + per-kitchen ceny (správne riešenie), alebo kópia tabuľky pre každú kuchyňu. Toto treba rozhodnúť SKÔR, než pribudnú ďalšie tímy s vlastnými cenami — spätná migrácia bude bolieť.\u003c/div>\u003cspan class=\"role\">Solution Architect\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">v2\u003c/span>\u003cspan class=\"tag tag-crit\">Pred trialom zvážiť\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t27\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Yield/waste faktor v kalkulácii food costu\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Vyriešené 13.7. kompletne:\u003c/b> pole \"Yield %\" pri ingredienciách, food cost počíta s odpadom (očistená váha vs. kúpená, effective price = price / yield), breakdown ukazuje \"X% yield\" poznámku. Otestované na stagingu, nasadené, a Richard ráno spustil db/57 na produkcii — overené naživo (stĺpec existuje, žiadne chyby). Súvisí: odmeňovací systém za vyplnenie Yield % je t44.\u003c/div>\u003cspan class=\"role\">Vyriešené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t28\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Inventory modul · recepty→spotreba→sklad · Shopping Lists · overenie cien · rozhodnutie o Master DB\u003c/div>\u003cdiv class=\"task-desc\">Všetko z v1 — zostáva.\u003c/div>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Plán + v1\u003c/span>\u003c/div>\u003c/div>\n  \u003c/div>\n\n  \u003c!-- PHASE 4-5 -->\n  \u003cdiv class=\"phase-head\">\n    \u003cdiv class=\"phase-num\">04–05\u003c/div>\n    \u003cdiv class=\"phase-title-wrap\">\u003ch2 data-sk=\"Fázy 4–5 — Plánovanie, reporty, AI vrstva\" data-en=\"Phases 4–5 — Planning, reports, AI layer\">\u003c/h2>\u003cdiv class=\"sub\" data-sk=\"v1 pokrytie stačí, jeden doplnok\" data-en=\"v1 coverage is enough, one addition\">\u003c/div>\u003c/div>\n    \u003cspan class=\"phase-status st-future\">Budúcnosť\u003c/span>\n  \u003c/div>\n  \u003cdiv class=\"phase-rule\">\u003c/div>\n  \u003cdiv class=\"tasklist\">\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t29\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Service planning · prep forecasting · reporty · export dát · AI odporúčania · schedule coverage assistant · monetizácia AI\u003c/div>\u003cdiv class=\"task-desc\">Všetko z v1 — zostáva bez zmeny.\u003c/div>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Plán + v1\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t30\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Retenčná politika dát + anonymizácia pre AI učenie\u003c/div>\u003cdiv class=\"task-desc\">Fáza 5 sa má učiť z „reálnych dát používania\" — tie patria kuchyniam. Vopred definuj (a napíš do podmienok), či a ako sa dáta jednej kuchyne používajú na zlepšovanie produktu. Enterprise zákazník sa na toto opýta ako na prvé.\u003c/div>\u003cspan class=\"role\">CTO + Founder\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">v2\u003c/span>\u003c/div>\u003c/div>\n  \u003c/div>\n\n  \u003c!-- PHASE 6-7 -->\n  \u003cdiv class=\"phase-head\">\n    \u003cdiv class=\"phase-num\">06–07\u003c/div>\n    \u003cdiv class=\"phase-title-wrap\">\u003ch2 data-sk=\"Fázy 6–7 — Platform Expansion &amp; Launch\" data-en=\"Phases 6–7 — Platform Expansion &amp; Launch\">\u003c/h2>\u003cdiv class=\"sub\" data-sk=\"v1 + doplnky z founder pohľadu\" data-en=\"v1 + additions from the founder review\">\u003c/div>\u003c/div>\n    \u003cspan class=\"phase-status st-future\">Budúcnosť\u003c/span>\n  \u003c/div>\n  \u003cdiv class=\"phase-rule\">\u003c/div>\n  \u003cdiv class=\"tasklist\">\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t31\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Natívne appky · desktop · offline mode (priorita vyššie!) · multi-location · App Store · pricing · onboarding bez teba · go-to-market · Nooch kontakt · GmbH spúšťač · HACCP zodpovednosť/poistenie\u003c/div>\u003cdiv class=\"task-desc\">Všetko z v1 — zostáva. Offline mode naďalej odporúčam potiahnuť dopredu.\u003c/div>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Plán + v1\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t32\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Fakturácia: použiť hotové riešenie (Stripe Billing / Paddle / Lemon Squeezy), nie stavať vlastné\u003c/div>\u003cdiv class=\"task-desc\">v1 správne pomenovala „chýba billing\", ale nepovedala ako: pre solo foundera je Merchant-of-Record riešenie (Paddle/Lemon Squeezy rieši aj DPH/VAT v EÚ a CH za teba) obrovská úspora oproti Stripe + vlastné daňové priznania v každej krajine.\u003c/div>\u003cspan class=\"role\">Founder + CTO\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">v2\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t33\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Validovať ochotu platiť EŠTE POČAS trialu — nie až vo Fáze 7\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Rozpracované 13.7.:\u003c/b> celý monetizačný plán teraz žije v app/monetization.html (11 modelov, právne prekážky, poradie spúšťania) a founding-member ponuka je nadraftovaná v docs/FOUNDING_OFFER.md — trial otázka \"zaplatil by si?\" sa mení na konkrétnu ponuku CHF 490/rok founding cena. Zostáva: Richard rozhodne finálne ceny + dva právne blokátory nižšie (t47, t48).\u003c/div>\u003cspan class=\"role\">Founder + PM\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">v2\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t34\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Aktualizovať konkurenčnú analýzu pred predajom\u003c/div>\u003cdiv class=\"task-desc\">Deck má sekciu competitive landscape, ale trh kitchen-management SaaS (Apicbase, MarketMan, Flipdish a pod.) sa hýbe rýchlo — pred prvým predajným rozhovorom over, čo konkurenti medzičasom vydali a za koľko.\u003c/div>\u003cspan class=\"role\">PM\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">v2\u003c/span>\u003c/div>\u003c/div>\n  \u003c/div>\n\n  \u003c!-- CROSS CUTTING -->\n  \u003cdiv class=\"phase-head\">\n    \u003cdiv class=\"phase-num\">∞\u003c/div>\n    \u003cdiv class=\"phase-title-wrap\">\u003ch2 data-sk=\"Prierezové — priebežne\" data-en=\"Cross-cutting — ongoing\">\u003c/h2>\u003cdiv class=\"sub\" data-sk=\"v1 + procesné doplnky\" data-en=\"v1 + process additions\">\u003c/div>\u003c/div>\n    \u003cspan class=\"phase-status st-open\">Priebežne\u003c/span>\n  \u003c/div>\n  \u003cdiv class=\"phase-rule\">\u003c/div>\n  \u003cdiv class=\"tasklist\">\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t160\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔴 → ✅ Bezpečnostná kontrola celého projektu (17.7.) — dve reálne diery zavreté + trvalé poistky\u003c/div>\u003cdiv class=\"task-desc\">Richard požiadal o kompletný security check. \u003cb style=\"color:var(--gold);\">(1) Únik zmlúv:\u003c/b> storage bucket „working-time-notes\" (nahraté pracovné zmluvy — mzdy, hodiny) bol VEREJNÝ a čitateľný pre každého prihláseného — uniklo to, lebo bol vytvorený cez Supabase klikačku, nie migráciou, takže ho audit nikdy nevidel. \u003cb>db/134\u003c/b>: bucket privátny + všetky operácie owner-only, appka číta cez krátkodobé podpísané URL. \u003cb style=\"color:var(--gold);\">(2) Stored XSS:\u003c/b> verejná polica receptov (db/131) prvýkrát zobrazuje cudzí obsah v session každého → cudzí recept s `&lt;img onerror&gt;` v názve by spustil skript. Oprava: escapovanie na dátovej hranici (cudzie recepty aj ingrediencie sa pri načítaní zbavia nebezpečných znakov, sú read-only a mimo cenníka). \u003cb>Trvalé poistky v auditoch:\u003c/b> verejný bucket / storage SELECT policy bez owner-checku / odstránenie XSS escapera teraz zhodia commit. Live DB health check: 0 tabuliek bez RLS, všetky triggery + policies sedia. Zapísané v HEALTH_LOG + pamäti.\u003c/div>\u003cspan class=\"role\">Nasadené naživo (db/134), guardy aktívne\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Bezpečnosť · Opravené\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t161\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🌍 Verejné police + zdieľanie (recepty aj ingrediencie), read-only cudzí obsah (17.7.)\u003c/div>\u003cdiv class=\"task-desc\">Nová polica \u003cb>Public\u003c/b> vedľa Sautero pri receptoch aj ingredienciách — naprieč kuchyňami, len na čítanie, ako Sautero knižnica. Publikovanie glóbusom s kontrolnou otázkou (\u003cb>db/131–133\u003c/b> recepty, \u003cb>db/136\u003c/b> ingrediencie). Zdieľanie ponúka 🌍 verejne / 🤝 priateľom: recepty per-recept (\u003cb>db/138\u003c/b>), ingrediencie per-položku so „všetko naraz\" + jednotlivo; friend-shared obsah vidno v \u003cb>Chef Friends → profil priateľa\u003c/b>. Z Company profilu sa zdieľať nedá NIČ (appka + DB trigger, account_type=personal). Cudzie recepty/ingrediencie sú striktne read-only — dá sa len škálovať/čítať/komentovať, nie prepisovať (Edit skrytý), escapované a nikdy nevstupujú do vlastného cenníka. Pevné police sa dajú len SKRYŤ, nie zmazať/premenovať; nové ingredient listy majú výber z 8 farebných kníh (\u003cb>db/135\u003c/b>). Komentovanie cudzích verejných receptov opravené (\u003cb>db/132\u003c/b>).\u003c/div>\u003cspan class=\"role\">Nasadené naživo (db/131–138)\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t162\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🧾 Invoice Scan v2 + dodávateľ + prekladové/viacjazyčné skeny (17.7.)\u003c/div>\u003cdiv class=\"task-desc\">Sken faktúry: z hlavičky rozpozná \u003cb>DODÁVATEĽA\u003c/b> a nastaví ho na všetky položky, aktualizuje ceny + dátum, preskakuje dátumy/čísla/súčty/DPH/zálohy (predtým z dátumu robil položku). Nové pole \u003cb>Dodávateľ\u003c/b> v ingredienciách (\u003cb>db/137\u003c/b>) — základ pre budúce objednávanie na klik podľa dodávateľa. Oba skeny (faktúra aj cenník/dokument/xlsx) teraz \u003cb>PREKLADAJÚ\u003c/b> názvy do jazyka z nastavenia Scan Settings (default English), originál ukladajú ako alias na párovanie a spoznanie. Ikony v ingredienciách rozdelené do dvoch riadkov (netlačia sa). Opravený pád skenu (aliases NOT NULL → prázdne pole).\u003c/div>\u003cspan class=\"role\">Nasadené naživo\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t163\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">💬 Zdieľané komentáre + 🎓 tutoriály pre každé okno + osobná polica opravená (17.7.)\u003c/div>\u003cdiv class=\"task-desc\">Komentáre na Sautero receptoch konečne viditeľné naprieč kuchyňami (\u003cb>db/129\u003c/b> denormalizácia master id) + počítadlo na tlačidle aj bublinka priamo v zozname receptov (1–9, potom 9+). Každá hlavná obrazovka má vlastný podrobný tutoriál — otvorí sa pri prvom otvorení, ❓ v hornej lište na zopakovanie; úvodný sprievodca zoštíhlený len na privítanie + Home; What's New srdiečko zmazané ako duplicitné. Firemný recept sa už NIKDY neukáže na osobnej polici My Recipes ani po prepnutí režimu (\u003cb>db/130\u003c/b>, staré výnimkové pravidlo nahradené opravou dát).\u003c/div>\u003cspan class=\"role\">Nasadené naživo\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t164\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📧 Email Contacts číslované + detail · Feedback iba Head Admin (17.7.)\u003c/div>\u003cdiv class=\"task-desc\">Email kontakty dostali číslovanie (#1 najstarší naspodu, najnovší hore) a ťuknutím sa hlavnému adminovi otvorí celý detail kontaktu vrátane napojeného Sautero účtu (meno, rola, typ, kuchyňa), ak taký existuje. Feedback inbox potvrdený ako výhradne Head-Admin (aj DB `is_super_admin()`, aj UI — doc opravený, predtým mylne uvádzal Kitchen Admin). AI Details teraz vysvetľuje pôvod dát (typické referenčné hodnoty AI, nie laboratórne meranie). Overené: HACCP správne skryté z personal účtov, viditeľné v company admin.\u003c/div>\u003cspan class=\"role\">Nasadené naživo\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t165\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔴 legal.html — doplniť heslá a GPS do právnych textov (nález auditu)\u003c/div>\u003cdiv class=\"task-desc\">Privacy/legal texty nepokrývajú prihlásenie heslom (db/83) ani GPS snímky pri check-in/out vo Working Time — obe funkcie už bežia naživo. Top nález kritického review, stále otvorený. Pred verejným trialom povinné.\u003c/div>\u003cspan class=\"role\">Claude — pripravené na pokyn\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Pred trialom\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t166\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Vypnúť AI testing mode pred verejným trialom\u003c/div>\u003cdiv class=\"task-desc\">app_config.ai_unlimited_testing_mode je stále ON — každý účet má neobmedzené AI zadarmo na centrálnom kľúči. Na testovanie zámer, pred pustením cudzích ľudí treba vypnúť (jeden SQL riadok) a nechať kreditový systém robiť svoju prácu.\u003c/div>\u003cspan class=\"role\">1 SQL riadok, deň pred trialom\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Pred trialom\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t167\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Share-grant na server-side voucher (free AI pri zdieľaní receptu)\u003c/div>\u003cdiv class=\"task-desc\">Flag „_share_grant\" je deklarovaný klientom — technicky zdatný užívateľ by ním obišiel kreditovú bránu. Prijaté riziko pre pred-trial fázu (dosah = jeden AI call), pred trialom utiahnuť na server-vydávaný jednorazový voucher v claude-proxy.\u003c/div>\u003cspan class=\"role\">Claude — edge funkcia\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Pred trialom\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t168\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Živý test RLS súkromia „Moje\" z dvoch účtov\u003c/div>\u003cdiv class=\"task-desc\">Posledná oranžová položka zo série testov 17.7.: na osobnom účte uložiť recept do „Moje\", z druhého účtu tej istej kuchyne overiť, že nie je viditeľný nikde (ani cez hľadanie). Mechanizmus je v RLS od db/97, treba len ľudské potvrdenie.\u003c/div>\u003cspan class=\"role\">LEN TY — 5 minút\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t170\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Tlač receptov v identite reštaurácie (bod 4, 18.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richardova požiadavka: každá nová reštaurácia dostane tlač receptov vo VLASTNEJ identite — farby, font, logo — tak ako dnes máme našu brandovanú tlač. Návrh: kitchens tabuľka dostane brand polia (primárna/sekundárna farba, logo URL, font voľba), print template ich načíta; nastavenie v Admin → kuchyňa. Súčasť onboardingu novej reštaurácie.\u003c/div>\u003cspan class=\"role\">Claude — po rebrande\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t171\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Kontext dňa vs. tržby: počasie, deň v týždni, sviatky (bod 5, 18.7.)\u003c/div>\u003cdiv class=\"task-desc\">Zbierať denný kontext (počasie z otvoreného API pre lokalitu kuchyne, deň v týždni, štátne/kantonálne sviatky CH) a korelovať s tržbami/objednávkami v Kitchen Reports — „daždivé utorky = -18 % obedov\". Predpoklad: tržbové dáta (zatiaľ nemáme — príde s POS integráciou alebo ručným denným zápisom tržby). Fáza po triali.\u003c/div>\u003cspan class=\"role\">Claude — po triali\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t172\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🎪 Dlaždica Events (bod 1, 18.7.) — DOKONČIŤ\u003c/div>\u003cdiv class=\"task-desc\">Nová dlaždica Events: všetky udalos
