u003cb>db/97\u003c/b> — `is_subscribed` na profiles, ručný prepínač v Admin Directory, gate v `callClaudeAPI()` AJ priamo v `claude-proxy` edge funkcii (klientská strana sama osebe by sa dala obísť). (8) \u003cb style=\"color:var(--gold);\">db/100\u003c/b> — nová povinná Privacy & Data Protection brána (rovnaký mechanizmus ako Confidentiality z 13.7.) pred KAŽDÝM vstupom, aj pre už prihlásených; `legal.html` prepísaný s GDPR/švajčiarsky nDSG sekciami; nový `/security/` priečinok s technickým security review pre právnika. Zámerne KAŽDÝ nový gate/RLS je fail-open pri chybe dopytu.\u003c/div>\u003cspan class=\"role\">Nasadené, migrácie db/97–100 aj edge function redeploy potvrdené spustené (kontrolný skript, 17 bodov ✅)\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t145\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📦 Popoludňajšia dávka 16.7. — živé testy (t144)\u003c/div>\u003cdiv class=\"task-desc\">Custom Ingredients ikonka je teraz v Ingredients, nie na Home — over že admin ju tam vidí a ostatní nie. Preview as Normal User (Settings, admin) — over že banner dole naozaj vráti späť aj po prekliknutí na iné obrazovky. \"Coming soon\" stena — otvor appku v anonymnom okne BEZ akéhokoľvek parametra v URL (po spustení db/96 a zapnutí) a over že sa ukáže; potom skús s ?invite= parametrom a over že sa neukáže. Working Time → rozklikni mesiac → deň, kde si niečo objednal alebo vytlačil štítok, over že sa to zobrazí. Settings reorder ikonka (vpravo hore) — over že poradie sa uloží a drží aj po reloade.\u003c/div>\u003cspan class=\"role\">Živý test, admin aj bežný účet\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t143\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">👋 Add Friend QR ako pozvánka (db/95) + heslo \"already set\" stav\u003c/div>\u003cdiv class=\"task-desc\">Spustiť db/95. Nový (nie admin) člen tímu otvorí Add Friend, ukáže QR — over že sa QR vôbec vygeneruje (kitchen_invites insert už nie je admin-only). Cudzí človek bez účtu naskenuje natívnou kamerou (nie cez appku) → prihlási sa → musí skončiť v TEJ istej kuchyni AJ spojený ako priateľ automaticky. Existujúci chef v inej kuchyni naskenuje cez appkové Scan QR → musí sa LEN spojiť ako priateľ, nesmie sa presunúť do cudzej kuchyne. Zvlášť: My Profile → Account & Security, over že s už nastaveným heslom appka ukáže \"Password is set\" + Change Password namiesto rovno poľa.\u003c/div>\u003cspan class=\"role\">Živý test, 2+ účty vrátane nového bez účtu\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t142\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📋 Check List projekty — picker, \"Development\" bucket, skryté hotelové stanice (db/94)\u003c/div>\u003cdiv class=\"task-desc\">Spustiť db/94 (STAGING FIRST — píše do všetkých existujúcich tasks/prep_dishes riadkov). Ako admin: Check List sa otvorí na obrazovke s dlaždicami, \"Development\" musí obsahovať presne to, čo tam bolo predtým (SKY, Garde Manger, Lobby, Hot Line...). Ako iný účet: prázdna obrazovka, len \"+ Add Project\" — po vytvorení nového projektu vidieť LEN 5 základných staníc (Hot Line, Entremetier, BQT, Desserts, Extra), nikdy nie SKY/Garde Manger/Lobby. Overiť aj \"All stations\" prehľad v novom prázdnom projekte.\u003c/div>\u003cspan class=\"role\">Migrácia + živý test, 2 účty\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Migrácia čaká\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t141\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📖 Personal/Company účet — brána pri prihlásení + filter receptov (db/93)\u003c/div>\u003cdiv class=\"task-desc\">Spustiť db/93. Prihlásiť sa existujúcim účtom — musí sa zobraziť brána \"Personal or Company Account?\" (jednorazovo, aj starým účtom, nielen novým). Vybrať Personal → v Recipes sekcii vidieť len Moje + Sautero (žiadne Firemné). Vybrať Company → len Sautero + Firemné (žiadne Moje). Overiť aj prepnutie neskôr cez Settings → Account Type, a že sa filter tlačidiel okamžite prekreslí.\u003c/div>\u003cspan class=\"role\">Živý test, 2 účty\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t139\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🛒 db/76 doladené a potvrdené naživo — posledná zvyšná migrácia z 15.7. dobehnutá\u003c/div>\u003cdiv class=\"task-desc\">Prvý pokus o db/76 padol na `operator does not exist: name[] = text[]` — \u003ccode style=\"background:rgba(0,0,0,0.25); padding:1px 6px; border-radius:4px;\">pg_attribute.attname\u003c/code> je typ \u003ccode style=\"background:rgba(0,0,0,0.25); padding:1px 6px; border-radius:4px;\">name\u003c/code>, nie \u003ccode style=\"background:rgba(0,0,0,0.25); padding:1px 6px; border-radius:4px;\">text\u003c/code> — porovnanie jednotlivých hodnôt sa castuje automaticky, porovnanie POLÍ nie. Oprava: \u003ccode style=\"background:rgba(0,0,0,0.25); padding:1px 6px; border-radius:4px;\">array_agg(attname::text ...)\u003c/code>. Keďže Supabase SQL Editor spúšťa vložený skript ako jednu transakciu, chyba v DO bloku vrátila späť úplne všetko — žiadny čiastočný stav, žiadne riziko. Opravené, spustené naživo, KONTROLA teraz ukazuje 15/15. Všetkých 11 migrácií z tohto týždňa (76, 80-90) je potvrdených bežiacich na produkcii.\u003c/div>\u003cspan class=\"role\">Nasadené a overené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t144\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📦 Popoludňajšia 11-bodová dávka (16.7.): coming soon stena, admin preview, Check List projekty do praxe, Working Time detail, tutorial\u003c/div>\u003cdiv class=\"task-desc\">(1) Custom Ingredients presunuté z Home do Ingredients (patrí tam, nie na hlavnú plochu). (2) 🛡️ Admin → Settings → \"Preview as Normal User\" — dočasne si vyskúšaš appku očami bežného účtu, trvalý banner dole na návrat (nezávislý od currentIsAdmin, presne preto že ten sa počas preview vypne). (3) Access Requests dostal refresh tlačidlo. (4) Android bug nahlásený, čaká sa na error_logs výpis na diagnózu. (5) \u003cb style=\"color:var(--gold);\">\"Coming soon\" stena (db/96)\u003c/b> — kto príde na stránku BEZ invite/join/friend odkazu ALEBO QR a nemá ešte session, uvidí \"čoskoro spúšťame\" namiesto loginu; každý s reálnym odkazom/QR alebo existujúcou session prejde normálne. Ovládané cez app_config.coming_soon_enabled — dá sa vypnúť priamo v SQL bez nasadenia. Zámerne fail-open (chýbajúca migrácia nesmie zamknúť pilotnú kuchyňu). (6) Settings dostal rovnaký reorder mechanizmus ako Home (ikonka vpravo hore). (7) Aktuálny typ účtu (Personal/Company) vidieť priamo v názve dlaždice Settings. (8) Working Time → mesiac → deň teraz ukazuje aj objednávky (Order List, dotknuté ten deň) a vytlačené štítky (print_label_log, presný historický záznam) — vedome BEZ počtu \"splnených úloh\", keďže ani tasks ani prep_items nezaznamenávajú kto a kedy niečo dokončil, len kto to vytvoril. (9) Chef Friends už rieši \"Friends dlaždicu\" z Connections — nič nové netreba. (10) 👋 Add Friend QR teraz funguje aj ako pozvánka do kuchyne pre KAŽDÉHO člena (db/95, vedomé zrušenie časti db/81 po priamom potvrdení). (11) Tutorial dostal 3 nové sekcie (HACCP, Connections, Admin) a aktualizované Check List/Recipes — bez screenshotov, appka ich nikdy nepoužívala a vymyslené screenshoty bez živého prihlásenia by mohli byť nepresné.\u003c/div>\u003cspan class=\"role\">Nasadené (db/96 rovno na produkciu)\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t118\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🛡️ Admin dlaždica prerobená na hub: Add Admin, Admin Directory, Access Requests, Email Contacts (bod 1, 16.7.)\u003c/div>\u003cdiv class=\"task-desc\">Doriešuje admin hierarchiu z t107 (#5). Dve úrovne admina, nie jedna: \u003cb style=\"color:var(--accent);\">Kitchen Admin\u003c/b> — nová stĺpec profiles.admin_perms (db/85), delegovateľné oprávnenia po jednom (manage_invites, manage_team, language_audit, view_email_contacts, approve_access), zostáva úplne obyčajný profil, žiadny \"Admin\" štítok, žiadny super-admin dosah — presne podľa Richardovho zadania (\"rovnaký profil ako obyčajný\"). \u003cb style=\"color:var(--accent);\">Head Admin\u003c/b> — nezmenený is_admin (Richard), plný dosah. Admin dlaždica na Home je teraz hub v dizajne Home s 4 dlaždicami namiesto priameho odkazu na Access Requests: ➕ Add Admin (vyhľadanie profilu podľa mena/mailu → výber úrovne), 📋 Admin Directory (iba Richard — zoznam všetkých, vyhľadávanie, Edit s on/off prepínačom pre každé oprávnenie + samostatný Head Admin prepínač), 📨 Access Requests (presunuté sem, viditeľné aj pre approve_access), 📧 Email Contacts (presunuté zo Settings sem, viditeľné aj pre view_email_contacts). Pri stavaní nájdený reálny bug: email_contacts INSERT politika vyžadovala is_admin, appka ale zapisuje access-request kontakty pri KAŽDOM novom signupe, takmer nikdy nie od admina — ticho zlyhávalo od db/82 (prehltnuté v .then()), opravené v db/86 zároveň. db/86 tiež pridáva chýbajúcu \"super-admin číta všetky profily\" politiku (Admin Directory ju potrebuje na vyhľadávanie naprieč kuchyňami).\u003c/div>\u003cspan class=\"role\">Nasadené (db/85 rovno na produkciu, db/86 STAGING FIRST — prepisuje RLS)\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Bezpečnostná oprava\u003c/span>\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t117\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Osembodová dávka 15.7. neskoro v noci: logout, invite-only, heslo povinné, Connections, email databáza (bod 4/9/10 pozri poznámku)\u003c/div>\u003cdiv class=\"task-desc\">(1) Working Time/Check List pre nových users: overené, ŽIADNA zmena kódu potrebná — nová kuchyňa nikdy nededila prep/dochádzkové dáta (len db/74 kopíruje ingrediencie, nič iné) — už bolo správne, len teraz zdokumentované. (2) 🚪 Sign Out v Settings — appka doteraz nemala spôsob sa reálne odhlásiť na zdieľanom zariadení. (3) Náklady +CHF 97.73 zapísané do troch dokumentov (účel zatiaľ neupresnený). (4) @chefos.ch mail — Claude nesmie vytvárať účty; odporúčanie dané Richardovi priamo v chate. (5) Invite-only lockdown: db/81 (STAGING FIRST) — vytváranie/rušenie invite QR/linkov je teraz len pre admina (RLS + appka), self-serve \"vytvor si vlastnú kuchyňu\" zostáva len pre richard.cervenka@icloud.com; upozornenie na nový access request (notify-access-request) už existovalo, len treba overiť deploy. (6) 🔗 Connections (bývalé My Team) — nová stránka v dizajne Home: Scan QR (kamera + jsQR, nová CDN závislosť), Share QR Code (3 kontrolné otázky presne podľa zadania — Add friend je reálna funkcia cez novú chef_connections tabuľku db/84, Share My Recipes je poctivo označená ako \"coming soon\" kým sa nevyjasní rozsah, Invite New Chef = existujúci tok, len admin-only), My Team (nezmenený obsah, len presunutý). (7) Heslo povinné: db/83 (bezpečné rovno na produkciu) — nová brána hneď po súhlase s mlčanlivosťou, nedá sa preskočiť, emailový kód funguje ďalej paralelne. (8) Email databáza: nová email_contacts tabuľka (db/82) + admin-only prehľad v Settings, zachytáva access requesty AJ (po novom) komu sa poslal invite mail — predtým sa to nikde nezapisovalo. Bod 9 (posunúť plán vpred) = táto celá dávka. Bod 10 (skontrolovať appku) = auditory (audit_db.py/audit_app.py) prešli čisto po každej zmene + logická kontrola nových tokov (invite scan, connection unikátnosť, gate poradie); živý test na telefóne stále chýba.\u003c/div>\u003cspan class=\"role\">Nasadené (db/81+82+83+84 čakajú na spustenie, 81 staging first)\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Bezpečnostná oprava\u003c/span>\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t116\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔐 Šesťbodová dávka 15.7. v noci: filtre, poličky, admin lockdown, Settings, install návod, gamify návrh\u003c/div>\u003cdiv class=\"task-desc\">(1) Viditeľnosť označených filtrov = ŠTANDARD: aktívny chip je vždy plný teal + tmavý text, zjednotené 4 rodiny chipov (recepty, prep, scale, všeobecné) — Check List statusy si nechávajú vlastné sémantické farby zámerne. (2) Poličky receptov podľa autora: Sautero = celá zabudovaná knižnica (recepty bez autora, vrátane 173 migrovaných), Moje = moje, Firemné = od kolegov; AI-generated ostáva len ako štítok; predvolená polička = Sautero. (3) Gamify návrh pre neplatiacich = model 14 v monetization.html (dátový flywheel: body za Yield %/ceny/HACCP → tokeny na AI; zjednocuje t44+t71+Chef Challenge; stavať po triale). (4) Admin lockdown: db/80 (STAGING FIRST) — is_admin len richard.cervenka@icloud.com, trigger blokuje zmeny stĺpca kýmkoľvek iným; pri kontrole nájdená REÁLNA eskalačná diera (politika z db/34 dovoľovala komukoľvek nastaviť si is_admin=true) — od db/34 otvorená, teraz zavretá; appka už nedáva admin zakladateľovi kuchyne. (5) ⚙️ Settings hub na Home — profil+bezpečnosť, AI/scan, jazyk (nový picker), mena (admin), poradie ikon, viditeľnosť sekcií, návod, install, právne. (6) 📲 \"Add to Phone\" návod (iOS Safari + Android Chrome) — fotka od Richarda nedorazila, postavený štandardný postup.\u003c/div>\u003cspan class=\"role\">Nasadené (db/80 čaká na staging)\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Bezpečnostná oprava\u003c/span>\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t115\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🕒 /visual data/: aktuálny obsah + štítok poslednej aktualizácie + SK/EN prepínač všade (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richardova požiadavka v troch bodoch. (1) Obsah dotiahnutý na dnešný stav: planning (čerstvé TOP3 + celý denníkový zápis 15.7.), tasklist (9 nových Hotovo riadkov, zastarané P1 položky anotované, časová os 15.7.), features (nová HACCP karta, Fridge Temp preznačený na naživo-v-HACCP), VISUAL_GUIDE (čísla na obálke ~1300/6 AI, sekcia 11 \"dodané, ešte neilustrované\", spend ~CHF 141). (2) Každý z 13 dokumentov má fixný štítok \"🔄 Stav Sautero k [dátum, čas]\" vpravo dole — archívne dokumenty (review 13.7., snapshot 9.7.) majú čestnú variantu \"hodnotenie/snapshot k X · aktualizované Y\". (3) SK/EN prepínač všade — 6 dokumentov ho už malo, zvyšných 7 dostalo plávajúce tlačidlo vľavo dole so zdieľaným chefos_doc_lang kľúčom (jeden prepnutý jazyk platí naprieč všetkými dokumentmi). Investor deck po novom kompletne dvojjazyčný v statickom obsahu (predvolene po slovensky); pri monetization/reviews je preložený chrome, telá kariet ostávajú v pôvodnom jazyku — rovnaká hranica ako pri backlog úlohách, poctivo priznaná.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t114\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🧼 HACCP modul, vlna 2 (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Fritézový olej a Škodcovia nepotrebovali žiadny nový kód okrem zapnutia dlaždíc — enginy z vlny 1 (haccp_measurement_log / haccp_checklist_items) ich mali pripravené vopred vrátane check constraintov v db/77. Skutočná novinka: Expirácia štítkov — tlač štítkov si teraz pamätá, čo sa vytlačilo (print_label_log, db/78, aj s vypočítaným use-by dátumom; zlyhanie logu nikdy nezablokuje samotnú tlač) a nová obrazovka HACCP → Label Expiry zoskupuje podľa naliehavosti (po dátume / dnes-zajtra / v poriadku / bez dátumu) s tlačidlom \"Used / discarded\" — zoznam ukazuje, čo je fyzicky v kuchyni, nie históriu tlače. db/78 = čisto nová tabuľka, bezpečná rovno na produkciu. Vlna 3 zostáva: Školenia personálu + admin Report.\u003c/div>\u003cspan class=\"role\">Nasadené, vlna 2\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo · vlna 2\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t113\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🎨 Visual Data Standards — redizajn všetkých 13 dokumentov + presun do /visual data/ (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richardov nový standing štandard: každá infografika/dashboard na world-class úroveň, brand identita nedotknutá, všetko v /visual data/. Hotové v jeden deň: investor deck (hero s 3 kľúčovými číslami, sticky navigácia, vlastná Gantt časová os + SVG revenue graf namiesto Chart.js — už žiadna externá závislosť), status (pulse strip so živými počtami stĺpcov, Hotovo stĺpec s vlastným scrollom), backlog (vyhľadávanie + filtre otvorené/kritické/v2, progress bar per fáza — všetkých 112 úloh aj zaškrtnutia zachované), monetization (klikateľná prehľadová matica 13 modelov), tasklist (vyhľadávanie + filtre JA/TY, počítadlá skupín), planning (štatistiky denníka, vyhľadávanie), features (vyhľadávanie, rozbaliť/zbaliť), automation (zosúladené čísla so status.html: ~CHF 141), oba Critical Reviews (týždenná navigácia — čiastočne plní t85), VISUAL_GUIDE + Manifesto + starý Status 9.7. (posledné 3 dokumenty na starej teplej palete preladené na navy/teal). Staré cesty = redirect stuby, takže záložky fungujú. Všetky 4 naplánované automatizácie (health check, ingredient agent, snapshot, deadline check) presmerované na nové cesty.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t112\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🧼 HACCP modul, vlna 1 (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard chcel novú HACCP stránku, dizajnovo totožnú s hlavným menu (rovnaké dlaždice, rovnaká veľkosť), s funkciami ktoré spomenul plus Fridge Temp presunuté z hlavného menu sem. Na jeho výslovnú žiadosť (\"rozmýšľaj ako HACCP odborník... dopln aj iné funkcie\") doplnené o štandardné kontrolné body zo švajčiarskeho Selbstkontrollkonzeptu, ktoré appke úplne chýbali: príjem tovaru, jadrová teplota pri varení, protokol chladenia, škodcovia, školenia personálu, admin prehľad. Vlna 1 (nasadené): Fridge Temp (oživené — showFridges() bol len odpojený), Príjem tovaru, Jadrová teplota, Protokol chladenia, Cleaning checklist, Osobná hygiena checklist. Vlna 2-3 (dlaždice viditeľné, zatiaľ \"pripravujeme\" baner): Fritézový olej, Škodcovia, Expirácia štítkov, Školenia, Report. db/77 pridáva dve znovupoužiteľné tabuľky namiesto jednej na modul — haccp_measurement_log (odčítanie + OK/Problém, použité 3x teraz + fritézový olej neskôr) a haccp_checklist_items/_log (opakujúca sa úloha, použité 2x teraz + škodcovia neskôr).\u003c/div>\u003cspan class=\"role\">Nasadené, vlna 1\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo · vlna 1\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t111\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔓 Heslo + Face ID prihlásenie (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Druhý spôsob prihlásenia popri emailovom kóde. Heslo: štandardné Supabase email+heslo (nastaví sa v My Profile → Account &amp; Security). Face ID: skutočný WebAuthn platform authenticator (Face ID/Touch ID/Windows Hello) ako odomknutie PER ZARIADENIE, nie nový server-overený faktor — appka nemá vlastný backend na overovanie WebAuthn podpisov, takže biometrický gate chráni lokálne uložený refresh token namiesto toho. Žiadne biometrické dáta appku ani Supabase nikdy neopustia. Bezpečné aj na zdieľaných kuchynských tabletoch — cudzí odtlačok/tvár jednoducho nevytvorí platný podpis pre cudzí kľúč.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t110\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Sken menu priamo z webstránky (URL), nielen z fotky/PDF (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard: chce vedieť naskenovať menu reštaurácie priamo z jej webu, nie len z odfotenej stránky. Nový vstupný bod \"A menu website\" vo výbere typu skenu — appka si vypýta link a namiesto poslania fotky Claude-mu použije jeho vlastný server-side web_fetch nástroj (web_fetch_20260209), ktorý si stránku stiahne sám na strane Anthropicu. Nevyžaduje žiadnu zmenu v claude-proxy edge funkcii (tá je čisté prepošlenie JSON tela). Zvyšok pipeline je identický s existujúcim skenom celého menu z fotky — jedno jedlo = jeden plný recept na kontrolu pred uložením.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t108\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Order List: teammates si navzájom nemažú/neprepisujú objednávky (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard: zdieľané naprieč tímom, sčítava sa pri opakovanej surovine, admin vidí kto čo objednal. Kontrolou vyšli najavo dva reálne bugy: rovnaká surovina od dvoch ľudí sa prepísala namiesto sčítania, a Save tlačidlo v stanicovom pickeri mazalo CELÚ stanicu za celú kuchyňu pred uložením — jeden človek mohol ticho zmazať objednávku druhého. db/76 mení unikátne obmedzenie na (kuchyňa, stanica, ingrediencia, autor) — každý má svoj vlastný riadok. \u003cb style=\"color:var(--accent);\">Spustené naživo 16.7.\u003c/b> — cestou sa našla a opravila aj chyba v samotnej migrácii (array_agg(name) sa nedal porovnať s text[] poľom bez castu; Supabase spúšťa vložený SQL ako jednu transakciu, takže pôvodný pokus sa celý bezpečne vrátil späť, nič sa nespustilo čiastočne).\u003c/div>\u003cspan class=\"role\">Nasadené a potvrdené na produkcii\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t109\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🧠 Mentálne zdravie/prevencia vyhorenia — ODLOŽENÉ (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard chcel priebežné/skryté sledovanie výrazu tváre cez prednú kameru počas celej pracovnej doby na zber dát o psychickom stave zamestnancov. Odmietnuté z právnych a etických dôvodov: EU AI Act výslovne zakazuje emotion recognition na pracovisku ako neprijateľné riziko; švajčiarsky Art. 328 OR (ochrana osobnosti) a nDSG radia psychický stav medzi citlivé údaje vyžadujúce slobodný súhlas, ktorý zamestnanec voči appke vlastného zamestnávateľa reálne nemá. Navrhnutá alternatíva namiesto toho: (1) dobrovoľný denný \"ako sa cítiš\" check-in, jedno kliknutie, nikdy nepovinný, (2) využiť objektívne signály, ktoré appka už zbiera (Working Time — nadčasy, chýbajúce voľno) ako rizikové faktory vyhorenia, (3) admin vidí len agregované/anonymizované trendy tímu, nie individuálne \"nálady\" v reálnom čase. Richard súhlasil s odložením — appka na to čaká, kým sa k tomu Claude vráti.\u003c/div>\u003cspan class=\"role\">Odložené, čaká na návrat k téme\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Mental health · Odložené\u003c/span>\u003c/div>\u003c/div>\n  \u003c/div>\n\n  \u003c!-- LIVE TESTING CHECKLIST -->\n  \u003cdiv class=\"phase-head\">\n    \u003cdiv class=\"phase-num\">🧪\u003c/div>\n    \u003cdiv class=\"phase-title-wrap\">\u003ch2 data-sk=\"Živé testovanie na zariadení — ešte nikdy neoverené\" data-en=\"Live device testing — never yet verified\">\u003c/h2>\u003cdiv class=\"sub\" data-sk=\"Všetko postavené a auditormi prešlo čisto, no žiadny z týchto tokov ešte nešiel naživo na reálnom telefóne (bod 2, 16.7.)\" data-en=\"Everything is built and passes the auditors clean, but none of these flows has run live on a real phone yet\">\u003c/div>\u003c/div>\n    \u003cspan class=\"phase-status st-active\">Pred trialom\u003c/span>\n  \u003c/div>\n  \u003cdiv class=\"phase-rule\">\u003c/div>\n  \u003cdiv class=\"tasklist\">\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t119\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔗 Connections hub — navigácia medzi Scan QR / Share QR Code / My Team\u003c/div>\u003cdiv class=\"task-desc\">Otvoriť z Home, prejsť do všetkých troch podobrazoviek a späť, overiť že dizajn sedí s Home dlaždicami.\u003c/div>\u003cspan class=\"role\">Živý test na telefóne\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t120\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📷 Scan QR — kamera + jsQR\u003c/div>\u003cdiv class=\"task-desc\">Reálna kamera na telefóne, nie len desktop simulátor — jsQR je nová CDN závislosť, nikdy neoverená mimo lokálneho vývoja.\u003c/div>\u003cspan class=\"role\">Živý test na telefóne\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t121\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🤝 Add Friend flow (chef_connections)\u003c/div>\u003cdiv class=\"task-desc\">Dvaja skutoční ľudia, dve zariadenia — naskenovať, potvrdiť, overiť že spojenie vznikne obom stranám a druhýkrát sa nezduplikuje.\u003c/div>\u003cspan class=\"role\">Živý test, 2 zariadenia\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t122\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔒 Invite-only lockdown (db/81)\u003c/div>\u003cdiv class=\"task-desc\">Neadmin nesmie vidieť/vytvoriť/zrušiť invite QR ani link; admin áno. Self-serve \"vytvor si kuchyňu\" funguje len pre richard.cervenka@icloud.com.\u003c/div>\u003cspan class=\"role\">Živý test, 2 účty\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t140\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔒 → ✅ Access-request schvaľovacia brána potvrdená naživo (paulapanizzon@gmail.com, 15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard poslal reálnej osobe pozvánku — appka ju korektne zablokovala na \"Waiting for approval\" a nepustila ďalej, kým ju ručne neschválil v Access Requests. Potvrdzuje, že brána z db/34 platí aj pre pozvaných (invite dá prístup ku KONKRÉTNEJ kuchyni, nie okolo schválenia). Vedľajší nález pri kontrole: jej email_contacts záznam (source=access_request) chýbal — posledná obeť starej db/82 politiky (opravenej v db/86) tesne pred opravou; jediná diera zo všetkých access_requests, doplnená ručným backfillom.\u003c/div>\u003cspan class=\"role\">Potvrdené naživo\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t123\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔓 Povinná brána na heslo (db/83)\u003c/div>\u003cdiv class=\"task-desc\">Objaví sa hneď po súhlase s mlčanlivosťou, nedá sa preskočiť/obísť späť tlačidlom, emailový kód naďalej funguje ako alternatíva.\u003c/div>\u003cspan class=\"role\">Živý test, nový účet\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t124\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">😊 Face ID / Touch ID (WebAuthn)\u003c/div>\u003cdiv class=\"task-desc\">Skutočný platform authenticator, nie mock — overiť nastavenie v My Profile aj samotné odomknutie pri ďalšom prihlásení, aj že cudzí odtlačok/tvár na zdieľanom tablete neprejde.\u003c/div>\u003cspan class=\"role\">Živý test na telefóne s Face/Touch ID\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t125\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🧼 HACCP vlna 1 — Fridge Temp, Príjem tovaru, Jadrová teplota, Chladenie, Cleaning, Hygiena\u003c/div>\u003cdiv class=\"task-desc\">Šesť obrazoviek, každá zapisuje do haccp_measurement_log/haccp_checklist_items — overiť že sa dáta reálne uložia a zobrazia v histórii.\u003c/div>\u003cspan class=\"role\">Živý test v kuchyni\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t126\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🏷️ HACCP vlna 2 — Fritézový olej, Škodcovia, Expirácia štítkov\u003c/div>\u003cdiv class=\"task-desc\">Expirácia štítkov je nová logika (print_label_log, db/78) — vytlačiť štítok, overiť že sa objaví v Label Expiry zoskupený podľa naliehavosti, otestovať \"Used/discarded\".\u003c/div>\u003cspan class=\"role\">Živý test s tlačiarňou štítkov\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t127\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🚪 Sign Out\u003c/div>\u003cdiv class=\"task-desc\">Odhlási, appka sa vráti na prihlasovaciu obrazovku, ďalší človek sa vie prihlásiť na to isté zdieľané zariadenie bez zvyškov predošlej session.\u003c/div>\u003cspan class=\"role\">Živý test na zdieľanom tablete\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t128\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📲 PWA ikonka + localStorage session\u003c/div>\u003cdiv class=\"task-desc\">Appka pridaná na plochu (Add to Phone), prihlásenie cez emailový link otvorený v Safari — overiť že sa stav prihlásenia zosynchronizuje aj v nainštalovanej PWA ikonke, nie len v prehliadači.\u003c/div>\u003cspan class=\"role\">Živý test na telefóne\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t129\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📖 Recipe scale bar — Custom×N indikátor, 3-cestný filter Sautero/Moje/Firemné\u003c/div>\u003cdiv class=\"task-desc\">Vlastné násobenie porcie ukáže správne \"×N\", polička receptov filtruje správne podľa autora vrátane predvolenej Sautero police.\u003c/div>\u003cspan class=\"role\">Živý test\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t130\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📋 Check List — prázdny stav/tutorial, plynulé skenovanie na pozadí\u003c/div>\u003cdiv class=\"task-desc\">Nová kuchyňa s prázdnym Check Listom ukáže návod; sken menu beží na pozadí s progresom (pill), appka sa medzitým dá normálne používať.\u003c/div>\u003cspan class=\"role\">Živý test\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t131\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">⏱️ Working Time — \"Zmeniť zmluvu\" preklad rozloženia\u003c/div>\u003cdiv class=\"task-desc\">Zmena úväzku uprostred mesiaca prepočíta a prekreslí grafy/súhrny správne, nič sa nerozbije vizuálne.\u003c/div>\u003cspan class=\"role\">Živý test\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t132\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🛒 Order List — objednávky viacerých ľudí sa sčítavajú, nemažú (db/76)\u003c/div>\u003cdiv class=\"task-desc\">db/76 je od 16.7. potvrdené naživo na produkcii (unikátne obmedzenie per osoba beží). Zostáva už len samotný živý test: dvaja ľudia, tá istá surovina, overiť že sa množstvá sčítajú a že Save v stanicovom pickeri nezmaže cudzí riadok.\u003c/div>\u003cspan class=\"role\">Migrácia hotová, čaká už len živý test, 2 účty\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t133\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🛡️ Admin hub — Add Admin, Admin Directory, on/off prepínače, presunutý Email Contacts (t118)\u003c/div>\u003cdiv class=\"task-desc\">Vytvoriť skutočného Kitchen Admina cez Add Admin, prihlásiť sa jeho účtom a overiť, že vidí presne tie tlačidlá, ktoré mu boli zapnuté (a žiadny \"Admin\" štítok nikde) — a naopak, že vypnutie oprávnenia v Admin Directory tlačidlo naozaj schová. Overiť aj Head Admin prepínač na druhom testovacom účte.\u003c/div>\u003cspan class=\"role\">Živý test, 2 účty\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t136\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🏷️ Custom Ingredients — upload súboru, kontrola, uloženie, mazanie (t135)\u003c/div>\u003cdiv class=\"task-desc\">Najprv spustiť db/88. Ako admin: nová ikonka vo vrchnej lište Home → Upload file → odfotený/PDF cenník → overiť extrakciu, odškrtnutie položiek, uloženie a mazanie. Ako nečlen-admin: ikonka nesmie byť viditeľná.\u003c/div>\u003cspan class=\"role\">Živý test s reálnym cenníkom\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t137\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📖 Share My Recipes + 👨‍🍳 Chef Friends — dvaja ľudia, dve kuchyne (t135)\u003c/div>\u003cdiv class=\"task-desc\">Najprv spustiť db/89. Účet A zapne Sharing (Share QR Code → Share my recipes), účet B (prepojený cez Add Friend, INÁ kuchyňa) otvorí Connections → Chef Friends → vidí A-čkove vlastné recepty read-only; overiť že NEvidí Firemné/Sautero recepty A-čkovej kuchyne, že detail nemá edit/scale/order tlačidlá, a že vypnutie prepínača prístup okamžite zavrie.\u003c/div>\u003cspan class=\"role\">Živý test, 2 účty, 2 kuchyne\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t138\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📚 db/87 na stagingu — nová kuchyňa dostane Sautero recepty, \"Moje\" nepretečú\u003c/div>\u003cdiv class=\"task-desc\">Na stagingu vytvoriť novú kuchyňu a overiť: dostala kompletnú Sautero poličku (173+), NEdostala nikoho osobné \"Moje\" recepty, a backfill naplnil existujúce prázdne kuchyne. Až potom produkcia.\u003c/div>\u003cspan class=\"role\">Staging test pred produkciou\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Migrácia čaká\u003c/span>\u003c/div>\u003c/div>\n  \u003c/div>\n\n  \u003cdiv class=\"callout\">\n    \u003cdiv class=\"k\">Najdôležitejší záver expert review\u003c/div>\n    \u003cp>v1 zoznam bol o produkte. Chýbali v ňom tri kategórie, ktoré potápajú startupy častejšie než chýbajúce funkcie: \u003cb style=\"color:var(--ink);\">(1) právne základy\u003c/b> — IP voči zamestnávateľovi, s ktorým máš zároveň spor, je najvážnejšie jediné riziko v celom projekte; \u003cb style=\"color:var(--ink);\">(2) inžinierska disciplína\u003c/b> — žiadny Git, žiadny staging, SQL rovno na produkciu, jeden súbor bez zálohy; \u003cb style=\"color:var(--ink);\">(3) validácia peniazmi\u003c/b> — trial bez vopred definovaného úspechu a bez otázky „zaplatil by si?\" je len demo pre kamarátov.\u003c/p>\n  \u003c/div>\n\n  \u003cdiv class=\"callout ok\">\n    \u003cdiv class=\"k\">Poradie na najbližších 14 dní\u003c/div>\n    \u003cp>0. db/57 na produkcii ✅ (13.7. ráno) →\n    1. Zálohy DB + test obnovy → 2. IP kontrola novej pracovnej zmluvy + \u003cb style=\"color:var(--gold);\">poslať Nebenerwerb žiadosť (t47 — 10 min, odblokuje príjem)\u003c/b> → 3. \u003cb style=\"color:var(--gold);\">Kúpiť doménu (t50 — rieši Resend blokátor AJ firemný email naraz)\u003c/b> → 4. Staging projekt ✅ → 5. Deploy claude-proxy + spustiť zvyšné SQL 46–54 → 6. Regresný checklist naživo na reálnom zariadení → 7. Kritériá úspechu trialu ✅ → 8. \u003cb style=\"color:var(--gold);\">Einzelfirma registrácia (t48)\u003c/b> → potom trial + founding-member ponuka (draft hotový: docs/FOUNDING_OFFER.md). Celý monetizačný plán: app/monetization.html. Veľký blok v poradí: dodávateľské dáta (t51 — čaká na stiahnutie PDF z iCloudu).\u003c/p>\n  \u003c/div>\n\n  \u003cfooter data-sk=\"Sautero — kompletný zoznam úloh v2 · expert review: PM / CTO / Solution Architect / UX Lead / QA Lead / SaaS Founder · aktualizuje sa denne · 15. 7. 2026\" data-en=\"Sautero — complete task list v2 · expert review: PM / CTO / Solution Architect / UX Lead / QA Lead / SaaS Founder · updated daily · Jul 15, 2026\">\u003c/footer>\n\u003c/div>\n\n\u003cscript>\n/* ---------- Language toggle — same pattern as tasklist.html/status.html: translates\n   structural chrome (headings, section labels, legend, filter buttons) only, not the ~110\n   individual task titles/descriptions or the 14-day-order callout, which stay Slovak in both\n   modes (a separate, deliberately-not-rushed translation job). ---------- */\nlet _lang = localStorage.getItem('chefos_doc_lang') || 'sk';\nfunction applyLang(){\n  document.querySelectorAll('[data-sk]').forEach(el=>{\n    el.textContent = _lang === 'sk' ? el.getAttribute('data-sk') : (el.getAttribute('data-en') || el.getAttribute('data-sk'));\n  });\n  document.getElementById('langBtn').textContent = _lang === 'sk' ? 'EN' : 'SK';\n  document.getElementById('taskSearch').placeholder = _lang === 'sk' ? 'Hľadať v úlohách…' : 'Search tasks…';\n  document.documentElement.lang = _lang;\n  upd();\n}\nfunction toggleLang(){\n  _lang = _lang === 'sk' ? 'en' : 'sk';\n  localStorage.setItem('chefos_doc_lang', _lang);\n  applyLang();\n}\nfunction L(sk, en){ return _lang === 'sk' ? sk : en; }\n\n/* ---------- Checkbox persistence — SAME localStorage keys as the original app/backlog.html\n   (chefos_backlog_\u003cid>), so every box Richard already ticked stays ticked after the move\n   to /visual data/. ---------- */\nconst b=[...document.querySelectorAll('.task-check')];\nfunction upd(){\n  let d=0;\n  b.forEach(x=>{localStorage.setItem('chefos_backlog_'+x.id,x.checked);if(x.checked)d++;});\n  const p=Math.round(d/b.length*100);\n  document.getElementById('done').textContent='✅ '+d+' '+L('hotových','done');\n  document.getElementById('left').textContent='⏳ '+(b.length-d)+' '+L('zostáva','left');\n  document.getElementById('fill').style.width=p+'%';\n  document.getElementById('pie').style.background='conic-gradient(#34F7D7 '+(p*3.6)+'deg, #223d57 0deg)';\n  document.getElementById('pieLabel').textContent=p+'%';\n  renderPhaseProgress();\n  applyFilters();\n}\nb.forEach(x=>{\n  const saved=localStorage.getItem('chefos_backlog_'+x.id);\n  x.checked = saved===null ? x.checked : (saved==='true');\n  x.onchange=upd;\n});\n\n/* ---------- Per-phase progress bars — injected under each phase heading, computed from the\n   checkboxes in that phase's own tasklist so they can never drift from reality. ---------- */\nfunction renderPhaseProgress(){\n  document.querySelectorAll('.phase-head').forEach(head=>{\n    let list = head.nextElementSibling;\n    while(list && !list.classList.contains('tasklist')) list = list.nextElementSibling;\n    if(!list) return;\n    const checks = list.querySelectorAll('.task-check');\n    if(!checks.length) return;\n    const done = [...checks].filter(c=>c.checked).length;\n    let prog = head.querySelector('.phase-progress');\n    if(!prog){\n      prog = document.createElement('div');\n      prog.className = 'phase-progress';\n      prog.innerHTML = '\u003cdiv class=\"pbar\">\u003cdiv class=\"pfill\">\u003c/div>\u003c/div>\u003cspan class=\"pcount\">\u003c/span>';\n      head.appendChild(prog);\n    }\n    prog.querySelector('.pfill').style.width = Math.round(done/checks.length*100) + '%';\n    prog.querySelector('.pcount').textContent = done + '/' + checks.length;\n  });\n}\n\n/* ---------- Search + filters — with ~110 tasks, finding the one you mean is the main job\n   of this page. Status filter (open only), tag filters (critical / v2), and free-text search\n   combine; phases whose every task is filtered out hide entirely. ---------- */\nconst _filters = { open:false, crit:false, v2:false };\nfunction toggleFilter(key){\n  _filters[key] = !_filters[key];\n  document.getElementById('fOpen').classList.toggle('on', _filters.open);\n  document.getElementById('fCrit').classList.toggle('on', _filters.crit);\n  document.getElementById('fV2').classList.toggle('on', _filters.v2);\n  applyFilters();\n}\nfunction applyFilters(){\n  const q = document.getElementById('taskSearch').value.trim().toLowerCase();\n  let shown = 0, total = 0;\n  document.querySelectorAll('.task').forEach(task=>{\n    total++;\n    const check = task.querySelector('.task-check');\n    let visible = true;\n    if(_filters.open && check && check.checked) visible = false;\n    if(_filters.crit && !task.querySelector('.tag-crit')) visible = false;\n    if(_filters.v2 && !task.classList.contains('v2')) visible = false;\n    if(visible && q && task.textContent.toLowerCase().indexOf(q) === -1) visible = false;\n    task.classList.toggle('filtered-out', !visible);\n    if(visible) shown++;\n  });\n  // Hide phases that end up completely empty\n  document.querySelectorAll('.phase-head').forEach(head=>{\n    let list = head.nextElementSibling;\n    let rule = null;\n    if(list && list.classList.contains('phase-rule')){ rule = list; list = list.nextElementSibling; }\n    if(!list || !list.classList.contains('tasklist')) return;\n    const any = list.querySelector('.task:not(.filtered-out)');\n    head.style.display = any ? '' : 'none';\n    if(rule) rule.style.display = any ? '' : 'none';\n    list.style.display = any ? '' : 'none';\n  });\n  const hits = document.getElementById('filterHits');\n  const filtering = q || _filters.open || _filters.crit || _filters.v2;\n  hits.textContent = filtering ? ('🔍 ' + shown + '/' + total) : '';\n}\n/* Phase overview (Richard, 17.7.) — overall donut + done-vs-open bar per phase (click jumps),\n   plus the sticky phase-jump nav and collapsible phases. */\nfunction collectPhases(){\n  const rows = [];\n  document.querySelectorAll('.phase-head').forEach((head, idx)=>{\n    let list = head.nextElementSibling;\n    while(list && !list.classList.contains('tasklist')) list = list.nextElementSibling;\n    if(!list) return;\n    const checks = [...list.querySelectorAll('.task-check')];\n    if(!checks.length) return;\n    const done = checks.filter(c=>c.checked).length;\n    const num = head.querySelector('.phase-num')?.textContent || '';\n    const name = (num + ' ' + (head.querySelector('h2')?.textContent || '')).trim();\n    head.id = head.id || ('phaseHead' + idx);\n    rows.push({ num, name, done, total: checks.length, id: head.id, head, list });\n  });\n  return rows;\n}\nfunction renderPhaseOverview(){\n  const wrap = document.getElementById('phaseOverview');\n  if(!wrap) return;\n  const rows = collectPhases();\n  const done = rows.reduce((s,r)=>s+r.done,0), total = rows.reduce((s,r)=>s+r.total,0);\n  const R = 40, C = 2*Math.PI*R, frac = total ? done/total : 0;\n  const donut = `\u003csvg id=\"overallDonut\" viewBox=\"0 0 110 110\" style=\"width:120px; height:120px; flex:none;\">\n    \u003ccircle cx=\"55\" cy=\"55\" r=\"${R}\" fill=\"none\" stroke=\"var(--rule)\" stroke-width=\"13\"/>\n    \u003ccircle cx=\"55\" cy=\"55\" r=\"${R}\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\"13\"\n      stroke-dasharray=\"${(frac*C).toFixed(2)} ${(C-frac*C).toFixed(2)}\" stroke-linecap=\"round\"\n      transform=\"rotate(-90 55 55)\"/>\n    \u003ctext x=\"55\" y=\"53\" text-anchor=\"middle\" font-size=\"20\" font-weight=\"700\">${Math.round(frac*100)}%\u003c/text>\n    \u003ctext x=\"55\" y=\"68\" text-anchor=\"middle\" font-size=\"7\" fill=\"var(--ink-dim)\">${done}/${total}\u003c/text>\n  \u003c/svg>`;\n  wrap.innerHTML = '\u003cdiv class=\"po-title\">' + (_lang==='sk' ? 'Prehľad fáz — hotové vs. otvorené (klikni pre skok)' : 'Phase overview — done vs. open (click to jump)') + '\u003c/div>' +\n    `\u003cdiv class=\"po-flex\">${donut}\u003cdiv class=\"po-rows\">` +\n    rows.map(r=>`\n      \u003cdiv class=\"po-row\" onclick=\"jumpToPhase('${r.id}')\">\n        \u003cspan class=\"po-name\" title=\"${r.name.replace(/\"/g,'&quot;')}\">${r.name}\u003c/span>\n        \u003cspan class=\"po-bar\">\u003cspan class=\"po-fill\" style=\"width:${r.total ? Math.round(r.done/r.total*100) : 0}%\">\u003c/span>\u003c/span>\n        \u003cspan class=\"po-count\">${r.done}/${r.total}\u003c/span>\n      \u003c/div>`).join('') + '\u003c/div>\u003c/div>';\n  const nav = document.getElementById('phaseNav');\n  if(nav) nav.innerHTML = rows.map(r=>`\u003cbutton onclick=\"jumpToPhase('${r.id}')\" title=\"${r.name.replace(/\"/g,'&quot;')}\">${r.num} · ${r.done}/${r.total}\u003c/button>`).join('');\n}\nfunction jumpToPhase(id){\n  const head = document.getElementById(id);\n  if(!head) return;\n  head.classList.remove('collapsed');\n  const list = collectPhases().find(r=>r.id===id)?.list;\n  if(list) list.classList.remove('collapsed');\n  head.scrollIntoView({ behavior:'smooth', block:'start' });\n}\n/* Collapsible phases — tap a phase header to roll its task list up/down. */\nfunction initPhaseCollapse(){\n  collectPhases().forEach(r=>{\n    if(r.head.querySelector('.collapse-chev')) return;\n    const chev = document.createElement('span');\n    chev.className = 'collapse-chev';\n    chev.textContent = '▼';\n    r.head.appendChild(chev);\n    r.head.addEventListener('click', (e)=>{\n      if(e.target.closest('a, button, input')) return;\n      r.head.classList.toggle('collapsed');\n      r.list.classList.toggle('collapsed');\n    });\n  });\n}\napplyLang();\nrenderPhaseOverview();\ninitPhaseCollapse();\n\u003c/script>\n\n\u003cdiv class=\"chefos-stamp\" data-sk=\"🔄 Stav Sautero k 17. 7. 2026, 16:40\" data-en=\"🔄 Sautero state as of Jul 17, 2026, 16:40\">🔄 Stav Sautero k 17. 7. 2026, 16:40\u003c/div>\n\u003c/body>\n\u003c/html>\n"];
const frames = [];
function openTab(n){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active', i===n));
  frames.forEach(f=>f && f.classList.remove('show'));
  if(!frames[n]){
    const f = document.createElement('iframe');
    f.srcdoc = DOCS[n];
    document.getElementById('frames').appendChild(f);
    frames[n] = f;
  }
  frames[n].classList.add('show');
}
openTab(0);
</script>
