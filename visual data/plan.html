n class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t28\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Inventory modul · recepty→spotreba→sklad · Shopping Lists · overenie cien · rozhodnutie o Master DB\u003c/div>\u003cdiv class=\"task-desc\">Všetko z v1 — zostáva.\u003c/div>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Plán + v1\u003c/span>\u003c/div>\u003c/div>\n  \u003c/div>\n\n  \u003c!-- PHASE 4-5 -->\n  \u003cdiv class=\"phase-head\">\n    \u003cdiv class=\"phase-num\">04–05\u003c/div>\n    \u003cdiv class=\"phase-title-wrap\">\u003ch2 data-sk=\"Fázy 4–5 — Plánovanie, reporty, AI vrstva\" data-en=\"Phases 4–5 — Planning, reports, AI layer\">\u003c/h2>\u003cdiv class=\"sub\" data-sk=\"v1 pokrytie stačí, jeden doplnok\" data-en=\"v1 coverage is enough, one addition\">\u003c/div>\u003c/div>\n    \u003cspan class=\"phase-status st-future\">Budúcnosť\u003c/span>\n  \u003c/div>\n  \u003cdiv class=\"phase-rule\">\u003c/div>\n  \u003cdiv class=\"tasklist\">\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t29\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Service planning · prep forecasting · reporty · export dát · AI odporúčania · schedule coverage assistant · monetizácia AI\u003c/div>\u003cdiv class=\"task-desc\">Všetko z v1 — zostáva bez zmeny.\u003c/div>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Plán + v1\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t30\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Retenčná politika dát + anonymizácia pre AI učenie\u003c/div>\u003cdiv class=\"task-desc\">Fáza 5 sa má učiť z „reálnych dát používania\" — tie patria kuchyniam. Vopred definuj (a napíš do podmienok), či a ako sa dáta jednej kuchyne používajú na zlepšovanie produktu. Enterprise zákazník sa na toto opýta ako na prvé.\u003c/div>\u003cspan class=\"role\">CTO + Founder\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">v2\u003c/span>\u003c/div>\u003c/div>\n  \u003c/div>\n\n  \u003c!-- PHASE 6-7 -->\n  \u003cdiv class=\"phase-head\">\n    \u003cdiv class=\"phase-num\">06–07\u003c/div>\n    \u003cdiv class=\"phase-title-wrap\">\u003ch2 data-sk=\"Fázy 6–7 — Platform Expansion &amp; Launch\" data-en=\"Phases 6–7 — Platform Expansion &amp; Launch\">\u003c/h2>\u003cdiv class=\"sub\" data-sk=\"v1 + doplnky z founder pohľadu\" data-en=\"v1 + additions from the founder review\">\u003c/div>\u003c/div>\n    \u003cspan class=\"phase-status st-future\">Budúcnosť\u003c/span>\n  \u003c/div>\n  \u003cdiv class=\"phase-rule\">\u003c/div>\n  \u003cdiv class=\"tasklist\">\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t31\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Natívne appky · desktop · offline mode (priorita vyššie!) · multi-location · App Store · pricing · onboarding bez teba · go-to-market · Nooch kontakt · GmbH spúšťač · HACCP zodpovednosť/poistenie\u003c/div>\u003cdiv class=\"task-desc\">Všetko z v1 — zostáva. Offline mode naďalej odporúčam potiahnuť dopredu.\u003c/div>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Plán + v1\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t32\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Fakturácia: použiť hotové riešenie (Stripe Billing / Paddle / Lemon Squeezy), nie stavať vlastné\u003c/div>\u003cdiv class=\"task-desc\">v1 správne pomenovala „chýba billing\", ale nepovedala ako: pre solo foundera je Merchant-of-Record riešenie (Paddle/Lemon Squeezy rieši aj DPH/VAT v EÚ a CH za teba) obrovská úspora oproti Stripe + vlastné daňové priznania v každej krajine.\u003c/div>\u003cspan class=\"role\">Founder + CTO\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">v2\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t33\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Validovať ochotu platiť EŠTE POČAS trialu — nie až vo Fáze 7\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Rozpracované 13.7.:\u003c/b> celý monetizačný plán teraz žije v app/monetization.html (11 modelov, právne prekážky, poradie spúšťania) a founding-member ponuka je nadraftovaná v docs/FOUNDING_OFFER.md — trial otázka \"zaplatil by si?\" sa mení na konkrétnu ponuku CHF 490/rok founding cena. Zostáva: Richard rozhodne finálne ceny + dva právne blokátory nižšie (t47, t48).\u003c/div>\u003cspan class=\"role\">Founder + PM\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">v2\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t34\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Aktualizovať konkurenčnú analýzu pred predajom\u003c/div>\u003cdiv class=\"task-desc\">Deck má sekciu competitive landscape, ale trh kitchen-management SaaS (Apicbase, MarketMan, Flipdish a pod.) sa hýbe rýchlo — pred prvým predajným rozhovorom over, čo konkurenti medzičasom vydali a za koľko.\u003c/div>\u003cspan class=\"role\">PM\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">v2\u003c/span>\u003c/div>\u003c/div>\n  \u003c/div>\n\n  \u003c!-- CROSS CUTTING -->\n  \u003cdiv class=\"phase-head\">\n    \u003cdiv class=\"phase-num\">∞\u003c/div>\n    \u003cdiv class=\"phase-title-wrap\">\u003ch2 data-sk=\"Prierezové — priebežne\" data-en=\"Cross-cutting — ongoing\">\u003c/h2>\u003cdiv class=\"sub\" data-sk=\"v1 + procesné doplnky\" data-en=\"v1 + process additions\">\u003c/div>\u003c/div>\n    \u003cspan class=\"phase-status st-open\">Priebežne\u003c/span>\n  \u003c/div>\n  \u003cdiv class=\"phase-rule\">\u003c/div>\n  \u003cdiv class=\"tasklist\">\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t160\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔴 → ✅ Bezpečnostná kontrola celého projektu (17.7.) — dve reálne diery zavreté + trvalé poistky\u003c/div>\u003cdiv class=\"task-desc\">Richard požiadal o kompletný security check. \u003cb style=\"color:var(--gold);\">(1) Únik zmlúv:\u003c/b> storage bucket „working-time-notes\" (nahraté pracovné zmluvy — mzdy, hodiny) bol VEREJNÝ a čitateľný pre každého prihláseného — uniklo to, lebo bol vytvorený cez Supabase klikačku, nie migráciou, takže ho audit nikdy nevidel. \u003cb>db/134\u003c/b>: bucket privátny + všetky operácie owner-only, appka číta cez krátkodobé podpísané URL. \u003cb style=\"color:var(--gold);\">(2) Stored XSS:\u003c/b> verejná polica receptov (db/131) prvýkrát zobrazuje cudzí obsah v session každého → cudzí recept s `&lt;img onerror&gt;` v názve by spustil skript. Oprava: escapovanie na dátovej hranici (cudzie recepty aj ingrediencie sa pri načítaní zbavia nebezpečných znakov, sú read-only a mimo cenníka). \u003cb>Trvalé poistky v auditoch:\u003c/b> verejný bucket / storage SELECT policy bez owner-checku / odstránenie XSS escapera teraz zhodia commit. Live DB health check: 0 tabuliek bez RLS, všetky triggery + policies sedia. Zapísané v HEALTH_LOG + pamäti.\u003c/div>\u003cspan class=\"role\">Nasadené naživo (db/134), guardy aktívne\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Bezpečnosť · Opravené\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t161\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🌍 Verejné police + zdieľanie (recepty aj ingrediencie), read-only cudzí obsah (17.7.)\u003c/div>\u003cdiv class=\"task-desc\">Nová polica \u003cb>Public\u003c/b> vedľa Sautero pri receptoch aj ingredienciách — naprieč kuchyňami, len na čítanie, ako Sautero knižnica. Publikovanie glóbusom s kontrolnou otázkou (\u003cb>db/131–133\u003c/b> recepty, \u003cb>db/136\u003c/b> ingrediencie). Zdieľanie ponúka 🌍 verejne / 🤝 priateľom: recepty per-recept (\u003cb>db/138\u003c/b>), ingrediencie per-položku so „všetko naraz\" + jednotlivo; friend-shared obsah vidno v \u003cb>Chef Friends → profil priateľa\u003c/b>. Z Company profilu sa zdieľať nedá NIČ (appka + DB trigger, account_type=personal). Cudzie recepty/ingrediencie sú striktne read-only — dá sa len škálovať/čítať/komentovať, nie prepisovať (Edit skrytý), escapované a nikdy nevstupujú do vlastného cenníka. Pevné police sa dajú len SKRYŤ, nie zmazať/premenovať; nové ingredient listy majú výber z 8 farebných kníh (\u003cb>db/135\u003c/b>). Komentovanie cudzích verejných receptov opravené (\u003cb>db/132\u003c/b>).\u003c/div>\u003cspan class=\"role\">Nasadené naživo (db/131–138)\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t162\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🧾 Invoice Scan v2 + dodávateľ + prekladové/viacjazyčné skeny (17.7.)\u003c/div>\u003cdiv class=\"task-desc\">Sken faktúry: z hlavičky rozpozná \u003cb>DODÁVATEĽA\u003c/b> a nastaví ho na všetky položky, aktualizuje ceny + dátum, preskakuje dátumy/čísla/súčty/DPH/zálohy (predtým z dátumu robil položku). Nové pole \u003cb>Dodávateľ\u003c/b> v ingredienciách (\u003cb>db/137\u003c/b>) — základ pre budúce objednávanie na klik podľa dodávateľa. Oba skeny (faktúra aj cenník/dokument/xlsx) teraz \u003cb>PREKLADAJÚ\u003c/b> názvy do jazyka z nastavenia Scan Settings (default English), originál ukladajú ako alias na párovanie a spoznanie. Ikony v ingredienciách rozdelené do dvoch riadkov (netlačia sa). Opravený pád skenu (aliases NOT NULL → prázdne pole).\u003c/div>\u003cspan class=\"role\">Nasadené naživo\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t163\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">💬 Zdieľané komentáre + 🎓 tutoriály pre každé okno + osobná polica opravená (17.7.)\u003c/div>\u003cdiv class=\"task-desc\">Komentáre na Sautero receptoch konečne viditeľné naprieč kuchyňami (\u003cb>db/129\u003c/b> denormalizácia master id) + počítadlo na tlačidle aj bublinka priamo v zozname receptov (1–9, potom 9+). Každá hlavná obrazovka má vlastný podrobný tutoriál — otvorí sa pri prvom otvorení, ❓ v hornej lište na zopakovanie; úvodný sprievodca zoštíhlený len na privítanie + Home; What's New srdiečko zmazané ako duplicitné. Firemný recept sa už NIKDY neukáže na osobnej polici My Recipes ani po prepnutí režimu (\u003cb>db/130\u003c/b>, staré výnimkové pravidlo nahradené opravou dát).\u003c/div>\u003cspan class=\"role\">Nasadené naživo\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t164\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📧 Email Contacts číslované + detail · Feedback iba Head Admin (17.7.)\u003c/div>\u003cdiv class=\"task-desc\">Email kontakty dostali číslovanie (#1 najstarší naspodu, najnovší hore) a ťuknutím sa hlavnému adminovi otvorí celý detail kontaktu vrátane napojeného Sautero účtu (meno, rola, typ, kuchyňa), ak taký existuje. Feedback inbox potvrdený ako výhradne Head-Admin (aj DB `is_super_admin()`, aj UI — doc opravený, predtým mylne uvádzal Kitchen Admin). AI Details teraz vysvetľuje pôvod dát (typické referenčné hodnoty AI, nie laboratórne meranie). Overené: HACCP správne skryté z personal účtov, viditeľné v company admin.\u003c/div>\u003cspan class=\"role\">Nasadené naživo\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t165\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔴 legal.html — doplniť heslá a GPS do právnych textov (nález auditu)\u003c/div>\u003cdiv class=\"task-desc\">Privacy/legal texty nepokrývajú prihlásenie heslom (db/83) ani GPS snímky pri check-in/out vo Working Time — obe funkcie už bežia naživo. Top nález kritického review, stále otvorený. Pred verejným trialom povinné.\u003c/div>\u003cspan class=\"role\">Claude — pripravené na pokyn\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Pred trialom\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t166\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Vypnúť AI testing mode pred verejným trialom\u003c/div>\u003cdiv class=\"task-desc\">app_config.ai_unlimited_testing_mode je stále ON — každý účet má neobmedzené AI zadarmo na centrálnom kľúči. Na testovanie zámer, pred pustením cudzích ľudí treba vypnúť (jeden SQL riadok) a nechať kreditový systém robiť svoju prácu.\u003c/div>\u003cspan class=\"role\">1 SQL riadok, deň pred trialom\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Pred trialom\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t167\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Share-grant na server-side voucher (free AI pri zdieľaní receptu)\u003c/div>\u003cdiv class=\"task-desc\">Flag „_share_grant\" je deklarovaný klientom — technicky zdatný užívateľ by ním obišiel kreditovú bránu. Prijaté riziko pre pred-trial fázu (dosah = jeden AI call), pred trialom utiahnuť na server-vydávaný jednorazový voucher v claude-proxy.\u003c/div>\u003cspan class=\"role\">Claude — edge funkcia\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Pred trialom\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t168\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Živý test RLS súkromia „Moje\" z dvoch účtov\u003c/div>\u003cdiv class=\"task-desc\">Posledná oranžová položka zo série testov 17.7.: na osobnom účte uložiť recept do „Moje\", z druhého účtu tej istej kuchyne overiť, že nie je viditeľný nikde (ani cez hľadanie). Mechanizmus je v RLS od db/97, treba len ľudské potvrdenie.\u003c/div>\u003cspan class=\"role\">LEN TY — 5 minút\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t170\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Tlač receptov v identite reštaurácie (bod 4, 18.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richardova požiadavka: každá nová reštaurácia dostane tlač receptov vo VLASTNEJ identite — farby, font, logo — tak ako dnes máme našu brandovanú tlač. Návrh: kitchens tabuľka dostane brand polia (primárna/sekundárna farba, logo URL, font voľba), print template ich načíta; nastavenie v Admin → kuchyňa. Súčasť onboardingu novej reštaurácie.\u003c/div>\u003cspan class=\"role\">Claude — po rebrande\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t171\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Kontext dňa vs. tržby: počasie, deň v týždni, sviatky (bod 5, 18.7.)\u003c/div>\u003cdiv class=\"task-desc\">Zbierať denný kontext (počasie z otvoreného API pre lokalitu kuchyne, deň v týždni, štátne/kantonálne sviatky CH) a korelovať s tržbami/objednávkami v Kitchen Reports — „daždivé utorky = -18 % obedov\". Predpoklad: tržbové dáta (zatiaľ nemáme — príde s POS integráciou alebo ručným denným zápisom tržby). Fáza po triali.\u003c/div>\u003cspan class=\"role\">Claude — po triali\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t172\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🎪 Dlaždica Events (bod 1, 18.7.) — DOKONČIŤ\u003c/div>\u003cdiv class=\"task-desc\">Nová dlaždica Events: všetky udalosti, ktoré sa ešte len majú stať (napr. banket, 35 ľudí, trojchodové menu). Hore tlačidlo New Event — manuálny zápis (čo je to za akciu, pre koho, koľko ľudí, aké menu, cena, dátum/čas) ALEBO Scan: odfotenie objednávky/e-mailu/zmluvy a AI rozpozná typ akcie, klienta, počet ľudí, menu, cenu a pridá do zoznamu (rovnaký vision vzor ako Invoice Scan). Pod New Event dva stĺpce vedľa seba: Dnešné eventy | Zajtrajšie eventy; ďalšie dni v zozname nižšie, najbližší hneď navrchu. Potvrdené znova 18.7. (bod 3) + pridať demo ukážku eventu, nech dlaždica nie je prázdna hneď po otvorení.\u003c/div>\u003cspan class=\"role\">Claude — dokončiť\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t175\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📄 Staré dokumenty (Teraz, Monetizácia) na klik-a-podrobnosti vzor ako mapa funkcií\u003c/div>\u003cdiv class=\"task-desc\">Richard, 18.7. (bod 2): v Plán → Teraz je horný \"jump nav\" (Časová os, Na pamäti…) a v Biznis → Monetizácia klik na model — oboje sú stará vždy-rozbalená stránka, nie klik-a-zobrazí-sa-detail vzor ako feature_status.html. Aj sťažnosť, že obsah \"nieje upevnené po stranách\" (layout/šírka). Trvalé pravidlo od teraz pre VŠETKY dokumenty — nové sa už tak robia, tieto dva staré treba prerobiť.\u003c/div>\u003cspan class=\"role\">Claude\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t176\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🎨 Prekopať Značka &amp; vízia (Investor Deck, Manifesto, Visual Guide) — presnejšie dáta z chatu\u003c/div>\u003cdiv class=\"task-desc\">Richard, 18.7. (bod 4): všetky tri dokumenty vieme urobiť lepšie a presnejšie na základe reálnej histórie a poznámok z tohto chatu. Nezabudnúť anglický preklad pri každom bode (nie len chrome, aj obsah).\u003c/div>\u003cspan class=\"role\">Claude\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t177\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🛡️ Head Admin edit-priorita všade + Admin Directory: Edit / Zobrazenie ako užívateľ\u003c/div>\u003cdiv class=\"task-desc\">Richard, 18.7. (bod 6): hlavný admin má prednosť v editovaní nad každým a nad všetkým. V Admin Directory klik na ktoréhokoľvek užívateľa otvorí plochu s 1. Edit 2. Zobrazenie jeho pohľadu na appku aj s jeho dátami — Richard vie editovať všetko presne ako so svojimi vlastnými funkciami. Nadväzuje na existujúci \"Preview as Normal User\" (16.7.) — treba rozšíriť na výber KONKRÉTNEHO užívateľa + skutočné editovanie, nielen náhľad.\u003c/div>\u003cspan class=\"role\">Claude\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t178\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">✏️ Head Admin: premenovať TEAM/kuchyňu kedykoľvek\u003c/div>\u003cdiv class=\"task-desc\">Richard, 18.7. (bod 7): ako hlavný admin chce mať funkciu zmeniť názov ktoréhokoľvek TEAM/kuchyne, keď uzná za vhodné — nielen v momente vytvorenia.\u003c/div>\u003cspan class=\"role\">Claude\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t179\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🧽 HACCP Cleaning checklist — vylepšiť demo/obsah\u003c/div>\u003cdiv class=\"task-desc\">Richard, 18.7.: po overení demo cleaning checklistu (\"našiel som, je to ok\") poznamenal, že sa na tom bude pracovať ďalej v budúcnosti — presnejší/reálnejší obsah než 5 generických demo úloh.\u003c/div>\u003cspan class=\"role\">Claude — neskôr\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Plán\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t181\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔍 DNES 19.7.: kompletná kontrola VŠETKÝCH funkcií s Richardom — checklist pripravený\u003c/div>\u003cdiv class=\"task-desc\">Richard (19.7. v noci, pred spaním): „keď sa zobudím, ideme na kompletnú kontrolu všetkých funkcií.\" Pripravený docs/FEATURE_VERIFICATION_CHECKLIST.md — 15 sekcií (login/gates, Check List, Order List, Recepty, Ingrediencie, Events, HACCP, Working Time, Connections, Print Labels, Assistant, Settings, Admin, Dokumenty, prierezové kontroly), každá vo 4 perspektívach: Head Admin/člen × personal/company. Súčasť: zoznam „chýbajúcich vecí\" — každá dostane verdikt schované rolou/režimom vs. reálne rozbité. Známe medzery vopred: zoznamy ingrediencií a projekty receptov ešte bez personal split; rozhodnúť events per-mode.\u003c/div>\u003cspan class=\"role\">Richard + Claude spolu\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t180\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🗄️ Konsolidácia Supabase — Fáza 1 HOTOVÁ 19.7., ďalej Fáza 2 + finálny drop 26.7.\u003c/div>\u003cdiv class=\"task-desc\">SUPABASE_CONSOLIDATION_PLAN.md (49 evidovaných → cieľ ~24 tabuliek). Fáza 1 spustená 19.7. (db/157): meranie ukázalo, že v produkcii reálne žilo len 47 tabuliek — prázdna \"feedback\" premenovaná na zz_retired_feedback (týždeň v karanténe, definitívny drop 26.7. po Richardovom schválení, pripomienka nastavená), profile_private a schedule_entries v produkcii nikdy neexistovali. Ďalšie kroky: Fáza 2 (ikony→JSONB, súhlasy→consents, custom_ingredients→ingredients) pred trialom; Fázy 3–4 (zoznamy, HACCP/rozvrh žurnály) až PO štarte trialu.\u003c/div>\u003cspan class=\"role\">Claude + Richard schvaľuje dropy\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t173\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🎙️ Hlasové ovládanie appky, aj pri zamknutom telefóne (bod 4, 18.7.) — poznámka\u003c/div>\u003cdiv class=\"task-desc\">Richardova požiadavka: ovládať appku hlasom („pridaj na check list…\"), ideálne aj so zamknutým displejom. Technická realita: web appka/PWA na iOS NEMÔŽE počúvať pri zamknutom telefóne (Safari mikrofón beží len s otvorenou stránkou). Reálna cesta: (a) v appke Web Speech API na diktovanie/príkazy pri odomknutom telefóne, (b) pri zamknutom = natívna appka + Siri Shortcuts/App Intents („Hey Siri, Sautero pridaj…\") — patrí do Fázy 6 (natívna appka). Zatiaľ len poznámka, nezačaté.\u003c/div>\u003cspan class=\"role\">poznámka — Fáza 6\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t174\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🌐 ✅ Preklady: plné SK/EN pokrytie VŠETKÝCH dokumentov — HOTOVÉ 18.7. v noci\u003c/div>\u003cdiv class=\"task-desc\">Stav 18.7. neskorý večer: ✅ mapa funkcií (112/112), ✅ História (15 dní + deň 18), ✅ Denník (12 dní EN), ✅ investor deck, ✅ costs/automation (boli už bilingválne). Ostáva: monetization (SK→EN + prepínač), Teraz tikety, Roadmapa úlohy, Manifesto + Visual Guide (EN→SK). Pôvodný audit: Denníku (SK → EN), Manifesto + Visual Guide (EN → SK), investor decku (KPI/roadmapa EN → SK). ~30 000 slov, systematicky po dokumentoch. Trvalé pravidlo: nový obsah sa rodí dvojjazyčne, dlh sa nesmie zväčšovať.\u003c/div>\u003cspan class=\"role\">Claude — postupne\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t169\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Preložiť 105 popisov funkcií do angličtiny (feature_status)\u003c/div>\u003cdiv class=\"task-desc\">SK/EN prepínač je od 17.7. všade, chrome dokumentov je dvojjazyčný — telá 105 funkcií v Mape funkcií zatiaľ ostávajú po slovensky (poctivo priznané v EN verzii). Preklad dáva zmysel najneskôr, keď dokumenty uvidí prvý anglicky hovoriaci partner/investor.\u003c/div>\u003cspan class=\"role\">Claude — na pokyn\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t35\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">RLS bezpečnostný audit · uptime monitoring · support kanál · Innosuisse/Venturelab grant · live test na reálnom iOS zariadení\u003c/div>\u003cdiv class=\"task-desc\">Všetko z v1 — zostáva. Dva konkrétne chýbajúce RLS prípady (kitchens UPDATE, station_icons DELETE) už opravené v 48_kitchens_and_station_icons_policy_fix.sql.\u003c/div>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-new\">v1\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t36\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Zaviesť poradie nasadzovania: staging → regresný checklist → prod (nikdy naopak)\u003c/div>\u003cdiv class=\"task-desc\">Nie je to úloha, je to zvyk — ale musí sa rozhodnúť raz a dodržiavať. Kombinuje tri v2 položky (Git, staging, checklist) do jedného pracovného postupu.\u003c/div>\u003cspan class=\"role\">CTO + QA\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">v2\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t37\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Penetračný pohľad na access gate a invite linky pred rastom\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Vyriešené 13.7.:\u003c/b> nový kitchen_invites token (7-dňová expirácia, revokovateľný) nahradil holé kitchen id v odkaze; pridané \"Revoke &amp; get new link\" aj zoznam členov tímu s admin-only \"Remove\". Ty ešte musíš spustiť db/53_invite_expiry_and_remove_member.sql.\u003c/div>\u003cspan class=\"role\">Vyriešené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Kód hotový\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t38\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Definovať „severnú hviezdu\" metriku produktu\u003c/div>\u003cdiv class=\"task-desc\">Jedno číslo, ktoré sleduje zdravie produktu naprieč všetkým fázami — pre Sautero pravdepodobne „počet kuchýň, ktoré použili Check List počas reálneho servisu tento týždeň\". Všetko ostatné (funkcie, dizajn, AI) je podriadené tomuto číslu.\u003c/div>\u003cspan class=\"role\">PM + Founder\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">v2\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t39\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Zvážiť dedikovaný support/monitoring kanál mimo emailu — napr. jednoduchý status.html-štýlový verejný stavový panel pre pilotné kuchyne\u003c/div>\u003cdiv class=\"task-desc\">Nová myšlienka: keď je appka nedostupná alebo má nejaký problém, kuchyne to dnes zistia len tak, že im niečo nefunguje. Aj jednoduchá jednostránková \"je Sautero v poriadku?\" by znížila počet zbytočných správ tebe počas servisu.\u003c/div>\u003cspan class=\"role\">Moje odporúčanie\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t40\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Appka sa niekedy načítava pridlho — chceme, aby to bolo okamžité\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Vyriešené 13.7.:\u003c/b> loadAppData() (volá sa pri každom otvorení obrazovky) čakalo na 11 nezávislých Supabase dotazov jeden po druhom namiesto naraz — prepnuté na Promise.all, malo by to skrátiť čakanie zhruba na čas najpomalšieho jedného dotazu namiesto súčtu všetkých 11. Treba ešte reálne pocítiť naživo, či to stačí.\u003c/div>\u003cspan class=\"role\">Vyriešené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Kód hotový\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t41\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Pricing filter v Ingredients — prerobený na rozsah cena od-do\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Vyriešené 13.7.:\u003c/b> staré Verified/Estimated/Missing chipy (trojnásobne sa duplikovali, príčina sa nenašla statickým čítaním kódu) nahradené jednoduchým rozsahom Min/Max — presne podľa Richardovho zadania. Vstupy sú v mene, akú kuchyňa práve zobrazuje (EUR/CHF/USD), prepočítané na EUR pre porovnanie s uloženou cenou. Nasadené a naživo overené.\u003c/div>\u003cspan class=\"role\">Vyriešené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t42\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Zjednotenie vizuálu appky s dokumentmi (navy/teal)\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Vyriešené 13.7. — na Richardovu žiadosť:\u003c/b> appka mala doteraz zámerne odlišnú teplú farebnú schému (copper/charcoal) od dokumentov. Teraz prevedená na rovnakú navy/teal paletu ako presentation/planning/backlog/status/tasklist — hlavný accent teraz teal (#34F7D7), sekundárny gold (#F7C948), pozadia/text zjednotené. Logo aj wordmark prefarbené na teal, QR kód ostal čierno-biely (funkčný dôvod — skenovateľnosť). Čisto farebná zmena, overená štrukturálna integrita.\u003c/div>\u003cspan class=\"role\">Vyriešené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t43\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">\"Show me\" tlačidlo pri vyhľadávaní v Ingredients\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Vyriešené 13.7.:\u003c/b> priamo vedľa vyhľadávacieho poľa v Search &amp; Filter pribudlo tlačidlo \"Show me\" — zavrie filter sheet a rovno ukáže vyfiltrovaný zoznam, bez nutnosti scrollovať dole na \"Close\".\u003c/div>\u003cspan class=\"role\">Vyriešené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t44\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Odmeňovací systém pre používateľov, čo vyplnia Yield %\u003c/div>\u003cdiv class=\"task-desc\">Richardov postreh (13.7., osobná priorita): redukcia food waste má byť trvalo jednou z priorít Sautero — \"videl som vyhodiť toľko jedla že za 1000 životov by som nedokázal zjesť\". Nápad: keď niekto v kuchyni vyplní Yield % pri ingrediencii (čo je dobrovoľné, nikto to nemusí robiť), nejako ho za to odmeniť/oceniť v appke — motivácia dopĺňať dáta, ktoré priamo znižujú plytvanie. Zatiaľ nešpecifikované ako presne (body? odznak? rebríček kuchyne?) — treba to premyslieť s Richardom, kým sa postaví.\u003c/div>\u003cspan class=\"role\">Richardova priorita — treba rozmyslieť\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t45\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Chef Challenge — súťaže/výzvy pre kuchárov (prvá verzia)\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Vyriešené 13.7. (prvá verzia):\u003c/b> Richardovo zadanie \"vytvorenie menu ale iba s ingredienciami do 1CHF\" postavené ako nová 🎯 Chef Challenge dlaždica na Home — kuchár nastaví cenový limit, appka nájde reálne ingrediencie z vlastného cenníka kuchyne pod tým limitom (nie AI odhad), vygeneruje 5 nápadov na jedlo len z tohto zoznamu, po výbere napíše plný recept na úpravu pred uložením. Znovupoužíva existujúci Ask Chef's Assistant AI engine, len iné zadanie.\u003cbr>\u003cbr>\u003cb>Toto je len prvý konkrétny krok\u003c/b> — Richard hovoril všeobecnejšie o \"kontestoch\" pre kuchárov. Širšia verzia (opakujúce sa výzvy, viac tímov/kuchýň naraz, rebríček, hlasovanie, iné typy obmedzení než len cena) je otvorená téma, treba ju s Richardom prebrať predtým, než sa stavia ďalej.\u003c/div>\u003cspan class=\"role\">v1 hotová, širšia vízia otvorená\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t46\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Monetizačný dokument v našom vizuáli + akčný plán\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Vyriešené 13.7.:\u003c/b> Richardov monetizačný workshop (10 modelov, expert panel) prevedený do navy/teal ako app/monetization.html. Claude doplnil model 11 (platené školenia/workshopy — jediný model nezávislý od hotového produktu, drží sa ako premium variant onboardingu) a akčný plán \"čo sa deje hneď\". Jednohlasný záver panelu: onboarding CHF ~990 + founding ročné predplatné = celý plán na 12 mesiacov; blokátory nie sú produktové, ale právne (t47, t48).\u003c/div>\u003cspan class=\"role\">Vyriešené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t47\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔴 Nebenerwerb — písomný súhlas zamestnávateľa (blokátor č. 1 pre príjem)\u003c/div>\u003cdiv class=\"task-desc\">Bez písomného súhlasu zamestnávateľa so zárobkovou vedľajšou činnosťou sa nesmie prijať prvá platba. \u003cb>Návrh žiadosti je pripravený v docs/NEBENERWERB_REQUEST.md\u003c/b> (DE list + checklist) — doplň meno, over klauzulu vo svojej zmluve s Burrito Bandito/Lido, pošli. 10 minút práce, odblokuje všetkých 11 modelov. \u003cb style=\"color:var(--gold);\">Richard sa 16.7. zaviazal vyriešiť do 20.7.26.\u003c/b>\u003c/div>\u003cspan class=\"role\">LEN TY — 10 minút, termín 20.7.26\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Blokátor príjmu\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t48\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔴 Einzelfirma + AHV registrácia (blokátor č. 2 pre príjem)\u003c/div>\u003cdiv class=\"task-desc\">Prvá faktúra potrebuje fakturačný subjekt — Einzelfirma stačí (registrácia ako selbständig cez AHV kasu kantónu Bern, obchodný register netreba do CHF 100k obratu, DPH tiež nie). Odhad 1–2 hodiny online + desiatky CHF. GmbH zostáva cieľ \"po príjme\", presne podľa pôvodného plánu. \u003cb style=\"color:var(--gold);\">Richard sa 16.7. zaviazal vyriešiť do 20.7.26.\u003c/b>\u003c/div>\u003cspan class=\"role\">LEN TY — 1-2 hodiny, termín 20.7.26\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Blokátor príjmu\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t49\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Founding-member ponuka priamo v appke\u003c/div>\u003cdiv class=\"task-desc\">Po vyriešení t47+t48: karta/stránka \"Founding member\" pre trial užívateľov — uvidia ponuku (draft: docs/FOUNDING_OFFER.md), kliknú \"mám záujem\", Richardovi príde email. Žiadna platobná brána na štart — ručná faktúra do 20 kuchýň stačí. Claude postaví, keď Richard potvrdí ceny.\u003c/div>\u003cspan class=\"role\">Claude — čaká na t47/t48 + ceny\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Pripravené\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t50\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Vlastná doména + firemný email namiesto osobného Gmailu\u003c/div>\u003cdiv class=\"task-desc\">Richard (13.7.): nechce používať osobný mail v appke/biznise. \u003cb style=\"color:var(--accent);\">Vyriešené 15.7.:\u003c/b> chefos.ch kúpená, overená v Resend, custom SMTP zapnutý, appka beží na app.chefos.ch — Richard otestoval celý tok naživo (HTTPS, email link, automatické prihlásenie). Resend blokátor č. 3 aj firemný email vyriešené jedným krokom.\u003c/div>\u003cspan class=\"role\">Vyriešené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t51\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔴 Rozšíriť ingrediencie o dáta od dodávateľov — hotové na stagingu, ČAKÁ NA TEBA na produkcii\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Vyriešené 13.7.:\u003c/b> preisliste-brutto-2026-komplett.pdf stiahnutý a spracovaný — je to TEN ISTÝ Caviezel Giovanettoni katalog, čo už čiastočne pokrýva db/46 (104 položiek), takže som porovnal a doplnil len skutočne chýbajúce: 17 ovocných pyré (Boiron, profi cukrárske suroviny), pár chýbajúcich zeleninových/mliečnych položiek, a hlavne — presne podľa tvojej žiadosti o lokálnych dodávateľov — \u003cb>13 regionálnych syrov priamo z okolia Bodenského jazera/Thurgau\u003c/b> (dodávatelia Hungerbühler, Strähl, Müller-Thurgau), plus 7 ďalších európskych syrov a 6 druhov cestovín. Spolu 49 nových položiek, db/58_supplier_ingredients_expansion.sql, \u003cb style=\"color:var(--accent);\">otestované na stagingu (funguje, 153 dodávateľských cien spolu, žiadne chyby)\u003c/b>. \u003cb style=\"color:var(--danger);\">Ešte treba spustiť db/58 na produkcii\u003c/b> — nemám tam prístup. Poznámka: \"Tilsiter\" (nové) a \"Tilsiter AOP\" (staré, AI odhad) sú teraz dve podobné položky vedľa seba — nezlučoval som ich automaticky, over si to v Ingredient Audit, keď budeš mať čas.\u003c/div>\u003cspan class=\"role\">Čaká na db/58 na produkcii\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Urgentné\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t52\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Model 12: Sponzorované umiestnenie lokálnych dodávateľov\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Zodpovedané 13.7.\u003c/b> (Richardova otázka, či by šla reklama na lokálne produkty): áno, dá sa, a je to pridané do app/monetization.html ako model 12. Technicky ľahké (štítok \"odporúčaný lokálny dodávateľ\" pri ingrediencii, žiadna API integrácia netreba), ale predčasné — nemá zmysel predávať dodávateľom viditeľnosť, kým appka nemá reálny objem (aspoň 20-30 aktívnych kuchýň z trialu). Do tej doby appka aj tak buduje presne tie dáta (origin pole, dodávateľ + artikel číslo pri každej ingrediencii z db/46+db/58), ktoré túto reklamu neskôr umožnia predať.\u003c/div>\u003cspan class=\"role\">Zodpovedané, odložené na po triale\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t53\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔴 Databáza ingrediencií rozšírená na 2000 — hotové na stagingu, ČAKÁ NA TEBA na produkcii\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Vyriešené 13.7.:\u003c/b> Richardovo zadanie \"dostať sa na 2000 ingrediencií so všetkými údajmi\". Pridaných 646 nových položiek (db/59): mäsové rezy vrátane diviny a drobov, švajčiarske IGP/AOP klobásy a syry (Boutefas, Longeole, L'Etivaz, Mont-d'Or...), ryby po druhoch, odrody zeleniny/zemiakov/ovocia, huby, strukoviny, múky, profi špajza (ázijská/blízkovýchodná/európska), oleje, octy, kuchynský alkohol, medy, pečivo a modernistické textúry. Každá položka má cenu, nutríciu, skladovanie, sezóny, pôvod a náhrady — ceny sú \u003cb>poctivo označené ako odhady\u003c/b> (na rozdiel od db/46+58, ktoré majú reálne katalogové ceny). Otestované na stagingu: presne 2000 riadkov, 100% s cenou. \u003cb style=\"color:var(--danger);\">Spusti db/58 a db/59 na produkcii\u003c/b> (v tomto poradí). Bonus: opravený bug, kde appka ticho zobrazovala len prvých 1000 ingrediencií (Supabase REST limit) — preto rozdiel medzi appkou (1000) a prezentáciou (1263).\u003c/div>\u003cspan class=\"role\">Čaká na db/58+59 na produkcii\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Urgentné\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t54\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Team Meetings — nová dlaždica na Home (placeholder)\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Vyriešené 13.7.:\u003c/b> Richard chcel dlaždicu rezervovanú hneď, funkcie doriešime neskôr (\"kľudne napíš 'we work on it'\"). Pridaná 🗣️ Team Meetings dlaždica na Home, po kliknutí ukáže \"We're working on it\" — žiadna logika zatiaľ. Kandidáti na skutočný obsah, keď sa k tomu vrátime: auto-agenda z otvorených Check List priority-1 položiek + dnešného Schedule, zdieľaná denná poznámka, alebo záznam z meetingu.\u003c/div>\u003cspan class=\"role\">Placeholder nasadený\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Nasadené\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t55\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Nová funkcia: banner pri 2+ dňovom výpadku dodávky tovaru\u003c/div>\u003cdiv class=\"task-desc\">Richard (13.7.): deň pred 2 a viac dňovým odstavením dodávok by mal na appke naskočiť banner hore. Zdroj dát vyjasnený: štátne sviatky + informácie od dodávateľov (nie ručné zadávanie adminom). Zámerne odložené — doriešime neskôr, ako presne appka tieto dva zdroje spojí do jedného dátumu odstávky.\u003c/div>\u003cspan class=\"role\">Odložené — doriešime neskôr\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t56\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Delete tlačidlo v Check List sa pýta, ale nemaže\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Opravené 13.7.:\u003c/b> Supabase update s riadkovým zabezpečením (RLS) vie zhodnúť 0 riadkov a napriek tomu nevrátiť error — potvrdzovacie okno sa teda ukáže, ale nič sa v databáze nezmení, appka sa tvárila, že je to hotové. Opravené v deletePrepItem/deletePrepDish/deleteStation: teraz appka kontroluje, či update naozaj niečo zmenil, a ak nie, jasne to nahlási + zaloguje do error_logs (uvidíme presné ID nabudúce) + obnoví dáta zo servera namiesto tichého zlyhania. Nemal som prístup k živej appke na reprodukciu — daj vedieť, či sa to teraz naozaj maže.\u003c/div>\u003cspan class=\"role\">Over naživo\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Nasadené\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t57\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Hygiena používania telefónu v kuchyni — preverené\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Zodpovedané 13.7.\u003c/b> (Richardova otázka): áno, je to reálne riziko — FDA aj britský FSA telefóny/tablety v kuchyni oficiálne označujú ako vysoko-rizikové položky, Salmonella/E.coli vydrží na dotykovej ploche 24+ hodín. Neznamená to, že appka na telefóne v kuchyni nejde — znamená to, že treba jasné pravidlá: telefón v stojane/držiaku (nie priamo v rukách pri surovinách), umyté ruky pred/po dotyku, denné utieranie 70% izopropylalkoholom, žiadny kontakt s telefónom mokrými/múčnymi rukami. Odporúčam pridať krátku poznámku o tomto do onboardingu pre kuchyne.\u003c/div>\u003cspan class=\"role\">Zodpovedané\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t58\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">AI skenovanie prep listu nefungovalo\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Skutočná príčina nájdená a opravená 13.7.:\u003c/b> Richard hlásil \"Failed to send a request to the Edge Function\" — to znamená, že appka sa vôbec nedostala k serveru, čo volá Claude. Ukázalo sa, že server-side funkcia claude-proxy (t100, presun API kľúča na server) bola doteraz nasadená len z kódu, ale nikdy skutočne nahraná na produkčný Supabase projekt — nasadenie treba spustiť ručne cez Supabase CLI, čo dovtedy nikto neurobil. Previedol som Richarda naživo cez inštaláciu Homebrew + Supabase CLI + \u003ccode>supabase functions deploy claude-proxy\u003c/code>, teraz nasadené a naživo overené (HTTP 200 z produkcie). Toto vysvetľuje, prečo bolo odrazu rozbité úplne každé AI v appke (photo scan, Chef's Assistant, Schedule upload), nielen prep list. Bonus oprava, čo som spravil predtým (max_tokens 4096→8192 pre veľké prep listy) ostáva tiež v platnosti.\u003c/div>\u003cspan class=\"role\">Nasadené a overené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t59\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Recipes photo scan: \"jeden recept, alebo celé menu?\" + režim skenovania celého menu\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Postavené 13.7. večer:\u003c/b> pred skenovaním v Recipes sa appka teraz opýta \"One recipe\" / \"A whole menu\". Pri celom menu: jeden Claude call nájde každé jedlo + jeho sekciu (Starters/Mains/...) + čo menu opisuje, potom sa pre \u003cb>každé\u003c/b> jedlo zavolá presne ten istý recipe-generation call, čo už používa Chef Challenge — Claude vie, že riadok v menu je marketing, nie recept, takže dopíše chýbajúce ingrediencie/postup/koreninu sám. Výsledky pristanú na review zozname, ťuknutím na jedlo sa otvorí bežný formulár na úpravu pred uložením — nič sa neuloží samo. Nemal som prístup k živej appke na test — over prosím naživo.\u003c/div>\u003cspan class=\"role\">Over naživo\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Nasadené\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t60\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Report a bug tlačítko\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Postavené 13.7.:\u003c/b> nová 🐛 ikona na Home, oddelená od 💬 feedback — mailto s predvyplneným \"čo sa stalo / čo si čakal\", plus zariadenie/prehliadač/kuchyňa automaticky priložené.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t61\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Print Labels: autocomplete z ingrediencií Check Listu\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Postavené 13.7.:\u003c/b> ručné pridanie štítku teraz po 3 znakoch navrhuje 5 najpravdepodobnejších zhôd priamo z aktuálnych Check List položiek danej kuchyne (rovnaká logika ako existujúce vyhľadávanie v Check Liste) — ťuknutie na návrh rovno pridá štítok.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t62\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">In-app tutorial (max 20 min)\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Postavené 13.7.:\u003c/b> nový ❓ na Home otvára krátku sériu ~10 obrazoviek (Home, Check List, Recipes, Ingredients, Order List, Chef's Assistant/Challenge, Print Labels, Working Time, feedback/bug) — pár minút na obrazovku, celé pohodlne pod 20 min. Automaticky sa ukáže raz novému užívateľovi hneď po prvom vstupe, inak kedykoľvek cez ❓.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t63\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Klauzula o mlčanlivosti pri prihlásení\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Postavené 13.7.:\u003c/b> nová obrazovka pri prvom vstupe (kým sa neodklikne, appka sa neotvorí) — jednoduchý text o mlčanlivosti (nezdieľať recepty/ceny/dáta kuchyne von) + checkbox + potvrdenie, zapísané ako trvalý neupraviteľný záznam (db/60, kto/kedy/aká verzia) namiesto len príznaku v profile. Text je bežný jazyk, \u003cb>nie je právne overený\u003c/b> — rovnaká výhrada ako pri legal.html. \u003cb style=\"color:var(--accent);\">Naživo overené 14.7.:\u003c/b> Richard reštartoval appku, brána sa spýtala na súhlas, po odklikaní ho pustila dnu — db/60 teda beží aj na produkcii.\u003c/div>\u003cspan class=\"role\">Overené naživo\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t64\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Ecobion — konkurenčný prieskum\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Preskúmané 13.7.:\u003c/b> Ecobion (Carouge, Ženeva) predáva ePackPro — švajčiarsky/francúzsky digitalizovaný HACCP systém, sám seba nazýva \"la solution HACCP digitalisée n°1\". Robí presne to, čo aj my: sledovanie teplôt, plánovanie úloh (admin nastaví, tím len odškrtáva — ako náš Check List), štítky na jedlá s dátumom spotreby/alergénmi/cenou, foto-archív dodacích listov. Rozdiel: predávajú to ako \u003cb>hardvér + inštalácia + školenie na mieste + support 7 dní v týždni + oprava pri rozbití\u003c/b> — teda vysoký kontakt, pravdepodobne aj vysoká cena (cena nie je verejná, len na dopyt). My sme čisto softvér, bez inštalačnej návštevy, na vlastnom telefóne, AI photo-scan (ktorý oni podľa materiálov nemajú). Toto je reálny konkurent v švajčiarskom trhu — treba to zohľadniť v positioning/monetization dokumentoch, keď bude čas.\u003c/div>\u003cspan class=\"role\">Zodpovedané\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t65\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">\"Databáza sa naučí kuchára nahradiť\" — potrebuje ujasnenie\u003c/div>\u003cdiv class=\"task-desc\">Richard (13.7.): \"na základe dat z toho ako daný kuchár pracuje a odpovedá sa databáza naučí ho nahradiť\". Nestaviam to bez ujasnenia — ako je to napísané, znie to ako sledovanie výkonu jednotlivca smerom k jeho nahradeniu, čo je citlivá (a v niektorých krajinách právne riziková) oblasť pracovného dohľadu. Predpokladám, že skutočný zámer je niečo iné — napr. appka sa naučí preferencie/štýl konkrétneho kuchára a vie navrhnúť náhradu/substitúciu ingrediencie alebo receptu podľa jeho typického spôsobu práce? Napíš prosím konkrétnejšie, čo má appka robiť a s akými dátami, a ideme na to.\u003c/div>\u003cspan class=\"role\">Čaká na upresnenie\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t66\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Kompatibilita s hodinkami (Check List + odmeny)\u003c/div>\u003cdiv class=\"task-desc\">Richard (13.7.): zapnúť si Check List podľa priorít na hodinkách, stopovať čas, dostať odmenu. Potrebné ujasniť platformu (Apple Watch / Wear OS / Garmin) — každá má úplne inú technickú cestu a appka je zámerne \"buildless\" jednosúborová webová appka, žiadna z nich sa nedá jednoducho spustiť ako natívna hodinková appka bez samostatného vývoja. Najreálnejšia prvá verzia: pridať appku na Apple Watch cez Safari (web, nie natívne) alebo prepojiť s existujúcim štart/stop časovačom úlohy (t50 v tasklist), ktorý appka už má na telefóne. Súvisí aj s t44 (odmeňovací systém za yield %) — možno rovnaký systém odmien pre oboje naraz.\u003c/div>\u003cspan class=\"role\">Čaká na upresnenie platformy\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t67\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Zdieľanie appky s hudbou cez QR (Spotify/SoundCloud) — názor\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Zodpovedané 13.7.\u003c/b> (Richardova otázka): pekný nápad na atmosféru v kuchyni, ale odporúčam to \u003cb>nestavať teraz\u003c/b> — nesúvisí s jadrom produktu (food cost/prep/hygiena), a jednoduchá verzia (QR na zdieľanú Spotify/SoundCloud playlist kuchyne) je vlastne len odkaz, netreba na to appku vôbec meniť — stačí QR generátor mimo appky. Ak by to malo byť viac než odkaz (napr. hlasovanie o pesničke, ovládanie z appky), to už vyžaduje Spotify/SoundCloud API integráciu a schválenie od nich — zbytočná komplexnosť pred triálom. Odložené, nie zamietnuté.\u003c/div>\u003cspan class=\"role\">Zodpovedané, odložené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nízka priorita\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t68\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Tutorial prerobený na odrážky (bod 1, 14.7.)\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Postavené 14.7.:\u003c/b> Richardova spätná väzba — pôvodná verzia bola jeden hutný odsek na obrazovku, ťažko sa to čítalo za behu. Každá z 10 obrazoviek má teraz 3-4 jednoriadkové odrážky, každá s vlastnou ikonou.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t69\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Richardovo meno odstránené z appky/dokumentov smerom von (bod 2, 14.7.)\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Postavené 14.7.:\u003c/b> legal.html a monetization.html už nikde priamo nemenujú Richarda — namiesto toho \"the Sautero team\" / \"founder\". Mailto adresa v Report Bug/Feedback zatiaľ ostáva jeho osobný gmail (appka ho nikde nezobrazuje ako text, len ako cieľ odkazu) — čaká sa na hello@sautero email, potom sa prepne. Poznámka: nenašiel som v repozitári žiadne skutočne odhalené heslo — ak si mal na mysli konkrétne miesto, ukáž mi ho a hneď to schovám.\u003c/div>\u003cspan class=\"role\">Čiastočne hotové — čaká sa na hello@sautero email\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Rozbehnuté\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t70\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Report Bug / Feedback mail vyčistený od \"bordelu a čísel\" (bod 3, 14.7.)\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Opravené 14.7.:\u003c/b> to, čo vyzeralo ako bordel, bolo surové kitchen UUID a celý user-agent reťazec priamo v texte mailu. Teraz mail obsahuje len ľudsky čitateľný text + krátke ID reportu (napr. \"A1B2C3\") v predmete; technické detaily (zariadenie, kuchyňa) sa aj tak logujú do error_logs pod tým istým ID, keby boli niekedy potrebné.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t71\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">\"Databáza sa naučí nahradiť\" — preformulované na krytie dovoleniek (bod 4, upresnenie k t65)\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Richard upresnil 14.7.:\u003c/b> nejde o sledovanie výkonu smerom k prepusteniu — ide o to, aby appka na základe naučených dát o kuchárovi vedela pokryť jeho prácu, kým je na dovolenke (aj darovanej od firmy), bez toho aby ho museli otravovať emailami. Kuchyňa (firma) za \"správne trénovanie appky\" dostáva odmenu (tokeny). Toto výrazne mení môj pôvodný postreh — je to o kontinuite tímu, nie o dohľade nad jednotlivcom. Stále je to väčšia funkcia na naplánovanie (čo presne sa \"naučí\", ako vyzerá \"krytie\" v appke, čo sú \"tokeny\") — nestavané zatiaľ, čaká na spoločné naplánovanie.\u003c/div>\u003cspan class=\"role\">Preformulované, čaká na plánovanie\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t72\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Dva typy profilu: osobný (sociálna sieť pre gastro) vs. pro (len QR sken tímu) (bod 5, 14.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard (14.7.): appka už má QR-based spájanie tímov (My Team) — to ho priviedlo k väčšej otázke: čo ak nemá účet celá kuchyňa, ale iba jednotliví zamestnanci? Návrh: \u003cb>1. Osobný profil\u003c/b> — funguje ako sociálna sieť pre ľudí pracujúcich v gastre (fotky, videá, hudba, \"ovplyvňovanie\" iných v odbore). \u003cb>2. Pro účet\u003c/b> — po otvorení rovno spustí fotoaparát na sken QR kódu na vytvorenie/pripojenie k tímovej skupine jednej kuchyne. \u003cb style=\"color:var(--danger);\">Toto je zásadné rozšírenie rozsahu appky\u003c/b> — v podstate pridanie sociálnej siete (feed, obsah, vplyv medzi užívateľmi) vedľa existujúceho pracovného nástroja, presne to, pred čím varuje Critical Review (scope gravity, feature freeze pred triálom). Nestavané, čaká na rozhodnutie o prioritite a čase.\u003c/div>\u003cspan class=\"role\">Čaká na rozhodnutie o priorite\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Veľký rozsah — rozhodnúť\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t73\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Hodinky: Apple Watch + Garmin potvrdené (bod 6, upresnenie k t66)\u003c/div>\u003cdiv class=\"task-desc\">Richard (14.7.): chce obe platformy. Realita: appka je zámerne jeden HTML súbor bez buildu — Apple Watch (WatchOS/Swift, Xcode) a Garmin (Connect IQ, Monkey C) sú dva úplne odlišné natívne vývojové stacky, žiadny z nich sa nedá postaviť v tomto prostredí ako rozšírenie appky. Toto je skutočný nový softvérový projekt (dva), nie appka feature — treba naplánovať zvlášť, keď na to príde čas (pravdepodobne až po triáli).\u003c/div>\u003cspan class=\"role\">Platforma potvrdená, čaká na samostatné plánovanie\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t74\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Sezónne zoraďovanie Ingredients — prvých 30 aktuálna sezóna, ďalších 30 budúci mesiac (bod 8 časť 2, 14.7.)\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Postavené 14.7.:\u003c/b> v predvolenom zobrazení Ingredients (bez vyhľadávania/filtrov) appka teraz najprv ukáže \"🌱 In season now\" (do 30 položiek podľa aktuálneho mesiaca) a potom \"🗓️ Coming into season next month\" (do 30 ďalších), až potom bežné triedenie podľa kategórie. Pri aktívnom vyhľadávaní/filtri sa toto nepoužije — vtedy kuchár hľadá niečo konkrétne.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t75\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">\"Nonstop\" agent na ingrediencie/iné (bod 8+14, opakované 14.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard toto zopakoval druhýkrát, teraz ešte silnejšie (\"každú sekundu, kým je Mac zapnutý\"). \u003cb style=\"color:var(--danger);\">Doslova nepretržitý beh nie je technicky možný\u003c/b> — AI agent beží len na jednotlivé vyžiadania, nie ako trvalý proces; a aj najčastejšia realistická aproximácia (napr. každých pár minút) by pri reálnych API cenách prestrelila schválený CHF 100/mesiac rozpočet o rády väčšmi. Nestavané, kým nepríde jasná odpoveď na frekvenciu a skutočný rozpočtový strop — toto nie je byrokracia, je to ochrana pred reálnym neúmyselným účtom.\u003c/div>\u003cspan class=\"role\">Čaká na reálnu frekvenciu/rozpočet — 2. krát nepotvrdené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Rozhodnúť pred zapnutím\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t76\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Nedeľný snapshot (20:00) + pondelková kontrola deadline (14:30) — nastavené\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Nastavené 14.7.:\u003c/b> každú nedeľu o 20:00 appka pripraví jeden dátumovo pomenovaný súbor (`docs/snapshots/\u003cdátum>.md`) so všetkým z app/, docs/, README a git históriou — surový podklad. \u003cb style=\"color:var(--accent);\">Zmenené 15.7. na Richardovu žiadosť:\u003c/b> Claude teraz z tohto podkladu rovno píše samotný infografický `docs/CRITICAL_REVIEW_\u003cdátum>.html` (rovnaký vizuálny štýl ako 13.7. verzia, s odkazom na predchádzajúci týždeň hore), nie je to už len vstup pre Richardovo písanie. Každý pondelok o 14:40 appka skontroluje, či pribudol nový `docs/CRITICAL_REVIEW_*.html` s dnešným dátumom — ak nie, zvýrazneným 🚨 upozornením pripomenie zmeškaný deadline (14:30).\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t77\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Wellness/fitness partnerstvo pre gastro pracovníkov (bod 6, upresnenie)\u003c/div>\u003cdiv class=\"task-desc\">Richard (14.7.): chce, aby appka pomáhala ľuďom v gastre mať viac pokoja, lepšie vzťahy a zdravie — možná spolupráca s fitness centrami (predplatné zahrnuté v cene). Screenshot, čo mal ukázať kontext, sa opäť nepripojil. Veľmi skorá, nešpecifikovaná vízia — logujem ako nápad, nestavia sa.\u003c/div>\u003cspan class=\"role\">Čaká na screenshot/upresnenie\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Nové\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t78\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Hodinky (Apple Watch + Garmin) — reálny rozsah, nie \"hneď\" (bod 4, 14.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard chce toto postaviť okamžite. Realita: natívna Apple Watch appka potrebuje Xcode + platený Apple Developer účet (99 USD/rok); Garmin potrebuje Connect IQ SDK (Monkey C) + Garmin Developer účet. Obe sú samostatné viactýždňové projekty s úplne iným tech stackom než jeden HTML súbor Sautero — nedá sa to \"hneď\" spraviť v tejto appke. Pred štartom treba vedieť: má Richard/niekto v tíme Mac s Xcode, je ochotný platiť Apple Developer poplatok, aké konkrétne hodinky sa budú reálne testovať? Nestavané, čaká na tieto odpovede.\u003c/div>\u003cspan class=\"role\">Čaká na odpovede pred štartom\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Ujasniť predtým, než začneme\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t79\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">\"Forgot to check in?\" + jednorazová poloha pri check-in/out (bod 1, 14.7.)\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Postavené 14.7.:\u003c/b> zrkadlí existujúce \"Forgot to check out?\" — datetime-local vstup ohraničený na posledných 24h. Poloha: Richard si vybral variantu 1 (jednorazová snímka polohy presne v momente check-in/out, ŽIADNE priebežné sledovanie pohybu) namiesto plnej histórie pohybu — tá by bola právne citlivá (švajčiarske pravidlá o sledovaní zamestnancov) a aj technicky nereálna na uzamknutom telefóne bez natívnej appky. `time_entries.check_in_lat/lng` + `check_out_lat/lng` (db/63), 📍 odkaz na Google Maps v dennom detaile. Nikoho iného sa netýka — tabuľka je aj tak len na vlastné riadky.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t80\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">AI poznámka o zmluve — štýl ako tutorial + dobré aj zlé body (bod 2, 14.7.)\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Postavené 14.7.:\u003c/b> každý bod má teraz ikonu tónu (⚠️ risk / ✅ good / ℹ️ neutral) namiesto jedného zoznamu len problémov — AI dostal pokyn nájsť 4-6 bodov vrátane toho, čo je v zmluve naozaj v poriadku alebo lepšie než bežné, nielen riziká. \u003cb style=\"color:var(--danger);\">Bonus nález:\u003c/b> pri kontrole \"vidí to niekto iný?\" sa ukázalo, že RLS politika \"read kitchen teammates\" (db/55) púšťa CELÝ riadok profiles komukoľvek v kuchyni — teda aj cudzie contract_notes/contract_advisory_points boli technicky čitateľné (appka to síce nikdy nerobila, ale DB to nezakazovala). Oprava pripravená v db/62 (column-level GRANT/REVOKE) — treba otestovať najprv na stagingu, keďže ide o rovnakú tabuľku ako spôsobila výpadok 13.7.\u003c/div>\u003cspan class=\"role\">Nasadené v appke, DB oprava čaká na staging test\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003cspan class=\"tag tag-crit\">DB fix čaká\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t81\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Denný AI agent na ingrediencie — rozpočet CHF 30/mesiac (bod 9, 14.7.)\u003c/div>\u003cdiv class=\"task-desc\">\u003cb style=\"color:var(--accent);\">Nastavené 14.7.:\u003c/b> po druhom odmietnutí \"nonstop\" požiadavky (t75) Richard potvrdil konkrétny strop (CHF 30/mesiac) a nechal frekvenciu/prioritu na Claude — nastavené na denne o 06:30, štandardne rozširuje/overuje ingrediencie, kým Richard nepovie inak. Každý beh zapíše self-reported (nie auditovaný) odhad ceny do docs/ingredient_agent_log.md + krátky riadok do status.html. Zastaví sa sám, ak by mesačný odhad prekročil CHF 30.\u003c/div>\u003cspan class=\"role\">Nasadené — prvý beh 15.7. ráno\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t82\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Zvýraznené upozornenie na zmeškaný deadline (bod 8, 14.7.)\u003c/div>\u003cdiv class=\"task-desc\">Pondelková kontrola (sautero-monday-review-deadline-check) teraz pri zmeškanom deadline píše výrazne väčší, samostatný blok (nie len jeden riadok) — 🚨🚨🚨 v nadpise, odrážky s presným súborom a dátumom.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t83\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">✅ Michelin-chef prepis receptov — KOMPLET, prestavaný efektívne (bod 3, 14.7. → dokončené 17.7.)\u003c/div>\u003cdiv class=\"task-desc\">Znova postavené na Richardovu žiadosť („znova postav ale oveľa lepšie\"): namiesto ručných dávok po kategóriách jedna migrácia db/141 — všetkých 183 receptov knižnice (173 pôvodných + 10 povýšených komunitných od užívateľov) dostalo 5 profesionálnych polí (chef_notes/storage/shelf_life/equipment/plating). Kľúčované cez title + created_by is null, takže zásah platí vo VŠETKÝCH kuchyniach naraz aj do budúcna (nové kuchyne dedia z hlavnej). Ázijské výnimky starých dávok doplnené (pilot je Burrito Bandito, cieľ Nooch — ázijská kuchyňa je plne v hre). Overené naživo: 183/183, 0 prázdnych v ktorejkoľvek kuchyni.\u003c/div>\u003cspan class=\"role\">Hotové 17.7. — db/141 na produkcii\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t84\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Nová sekcia pre AI recepty namiesto mazania (bod 4, 14.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard potvrdil \"druhú možnosť\" zo staršej otázky — nemazať 173 reálnych receptov, namiesto toho postaviť samostatný priestor len pre AI-generované recepty. Navrhovaný najjednoduchší tvar: prepínač v Recipes (\"Moje recepty\" / \"AI Playground\") filtrujúci podľa existujúceho tagu 'AI-generated' (Chef Challenge, Menu scan už takto tagujú) — namiesto celej novej appky. Čaká na potvrdenie tohto výkladu, potom staviame.\u003c/div>\u003cspan class=\"role\">Návrh pripravený, čaká na potvrdenie tvaru\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Naplánované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t85\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Critical Review v slovenčine s týždennou navigáciou (bod 7, 14.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard chce slovenskú verziu Critical Review priamo v app/ ako html, s navigáciou na vrchu na prechádzanie týždeň po týždni (archív, ktorý sa dopĺňa, nie prepisuje). Naplánované ako ďalší krok — poctivý preklad si vyžaduje čas, zámerne to nerobíme narýchlo v tej istej dávke ako 6 iných vecí (presne to, na čo Richard v bode 5 upozornil).\u003c/div>\u003cspan class=\"role\">Naplánované ako ďalší krok\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Naplánované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t86\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Currency presunuté z Home na topbar ikonu, Fridge Temp + My Team dostali \"pracujeme na tom\" banner (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Currency už nie je veľká dlaždica — malá ikona (⇄) hore, viditeľná len adminovi. Fridge Temp a My Team ostávajú viditeľné na Home, ale po ťuknutí ukážu ten istý typ bannera ako Team Meetings namiesto skutočnej obrazovky — kód oboch funkcií netknutý pod tým.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t87\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Klikateľné tikety v status.html — \"Pracovať na tomto teraz\" (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Prep board tikety aj Top 5 úlohy sa dajú rozkliknúť a označiť ako \"ďalšie\" — kopíruje hotovú správu do schránky na vloženie do chatu. Poctivo: statický súbor nevie sám spustiť prácu, toto je najbližšie k tomu, čo sa dá (jeden klik + jedno vloženie).\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t88\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">My Profile — povinná registrácia (meno/vek/pohlavie) pri prvom prihlásení (bod 2, 15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Nová brána (rovnaký vzor ako mlčanlivosť) blokuje vstup do appky, kým prvý-krát-prihlásený človek nevyplní meno, vek a pohlavie. Dá sa upraviť aj kedykoľvek neskôr cez novú 👤 ikonu v topbare. db/65 (age/gender stĺpce) spustený na produkcii Richardom, funkcia potvrdená živá.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t89\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Email login — prepnuté na vstavaný Supabase mailer, potom vlastná doména (bod 1, 15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard najprv vypol custom SMTP na test (limit 2 emaily/hodinu) — narazili sme naň takmer hneď pri testovaní. Skutočné riešenie: kúpená doména `chefos.ch` (Hostpoint, CHF 5/prvý rok), pridané DNS záznamy pre Resend (DKIM TXT + MX/TXT pre SPF na `send.chefos.ch`). Resend momentálne \"Pending\", overenie môže trvať pár hodín. Posledný krok po overení: zapnúť späť custom SMTP v Supabase s touto doménou.\u003c/div>\u003cspan class=\"role\">DNS pridané, čaká na overenie Resend\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Čaká na Resend\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t90\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Logovanie zlyhaní pri AI skenoch (recept/menu/prep sheet/zmluva) (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard opravil nesprávne tvrdenie vo features.html — fotosken JE testovaný naživo a väčšinou funguje, len občas zlyhá. Denná kontrola zdravia appky (statický audit) toto nevie odhaliť. Skutočná odpoveď: každé zlyhanie sa teraz zapíše do error_logs (dôvod, typ súboru), nech sa dá vzor skutočne vystopovať.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t91\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔴 → ✅ Kritický bug: zmluva miznúca po refreshi (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard nahlásil, že po nahratí zmluvy do Working Time a refreshi všetko zmizlo. Skutočná príčina: db/62 (stĺpcové oprávnenia na profiles) omylom blokoval aj vlastníka riadku, nielen spoluzamestnancov — Postgres stĺpcové GRANT/REVOKE nevie rozlíšiť \"môj riadok\" od \"cudzí riadok\". Núdzová oprava (db/68 — obnovený plný SELECT) spustená naživo Richardom. Poriadna oprava (samostatná tabuľka profile_private, db/69) pripravená ako draft na staging, ešte nezapojená do appky.\u003c/div>\u003cspan class=\"role\">Núdzovo opravené, poriadna oprava čaká na staging\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Poriadna oprava čaká\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t92\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Feedback/Bug zlúčené do jednej ikony + nová možnosť \"Question\" (bod 1, 15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Dve samostatné ikony (💬/🐛) nahradené jednou rozkliknuteľnou ikonou s menu (Feedback/Bug/Question). db/70 rozšíril feedback_reports.type o \"question\".\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t93\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">\"Check &amp; Add\" — editovateľný náhľad pred pridaním naskenovaných jedál (bod 5, 15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard nahlásil: sken 14-jedálneho menu (rizoto/ravioli/mäso/ryby) sa dal len rovno pridať, bez možnosti upraviť. Teraz je každé naskenované jedlo vlastná karta — meno, cena, každá položka zvlášť editovateľná/odstrániteľná, aj celé jedlo sa dá vyradiť pred uložením.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t94\" checked>\u003cdiv class=\"task-bo
