splay:flex; align-items:center; justify-content:space-between; margin-bottom:22px; }\n  .brandmark{ display:flex; align-items:center; gap:9px; }\n  .brandmark .word{ font-size:15px; font-weight:700; letter-spacing:0.02em; color:var(--accent); }\n  .lang-toggle{\n    background:var(--paper); border:1px solid var(--rule); color:var(--ink-dim);\n    font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;\n    padding:6px 12px; border-radius:20px; cursor:pointer; transition:border-color .15s, color .15s; flex:none;\n  }\n  .lang-toggle:hover{ border-color:var(--accent-dim); color:var(--accent); }\n  .kicker{ color:var(--accent); font-size:12px; letter-spacing:0.18em; text-transform:uppercase; font-weight:700; margin-bottom:10px; }\n  h1.title{ font-size:38px; font-weight:800; margin:0 0 14px 0; line-height:1.12; letter-spacing:-0.01em; }\n  h1.title em{ font-style:italic; color:var(--accent); font-weight:800; }\n  .lede{ color:var(--ink-dim); font-size:15px; max-width:64ch; line-height:1.65; }\n\n  /* Pulse strip — the board's own column counts, computed live, so the top of the page\n     answers \"how are we doing\" before any scrolling. */\n  .pulse-row{ display:flex; align-items:center; gap:24px; margin-top:26px; flex-wrap:wrap; }\n  #kanbanDonut .seg{ cursor:pointer; transition:stroke-width .15s; }\n  #kanbanDonut .seg:hover{ stroke-width:20; }\n  #kanbanDonut text{ fill:var(--ink); font-family:\"SF Mono\",Menlo,monospace; }\n  .col.flash{ outline:2px solid var(--accent); outline-offset:3px; border-radius:14px; }\n  .pulse-strip{ display:grid; grid-template-columns:repeat(4,1fr); gap:1px; margin-top:26px; background:var(--rule); border:1px solid var(--rule); border-radius:16px; overflow:hidden; }\n  @media (max-width:680px){ .pulse-strip{ grid-template-columns:repeat(2,1fr); } }\n  .pulse-cell{ background:var(--paper); padding:16px 18px 14px 18px; }\n  .pulse-cell .num{ font-family:var(--mono); font-size:26px; font-weight:700; line-height:1; font-variant-numeric:tabular-nums; }\n  .pulse-cell .lbl{ font-size:11px; text-transform:uppercase; letter-spacing:0.07em; color:var(--ink-dim); margin-top:7px; display:flex; align-items:center; gap:6px; }\n  .pulse-cell .lbl::before{ content:''; width:7px; height:7px; border-radius:50%; flex:none; }\n  .pulse-cell.done .num{ color:var(--accent); } .pulse-cell.done .lbl::before{ background:var(--accent); }\n  .pulse-cell.prog .num{ color:var(--gold); } .pulse-cell.prog .lbl::before{ background:var(--gold); }\n  .pulse-cell.block .num{ color:var(--danger); } .pulse-cell.block .lbl::before{ background:var(--danger); }\n  .pulse-cell.wait .num{ color:var(--ink-dim); } .pulse-cell.wait .lbl::before{ background:var(--ink-dim); }\n\n  .meta-row{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-top:14px; }\n  @media (max-width:720px){ .meta-row{ grid-template-columns:repeat(2,1fr); } }\n  .meta-card{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:14px 16px; }\n  .meta-label{ font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-dim); margin-bottom:4px; }\n  .meta-value{ font-family:var(--mono); font-size:15px; font-weight:700; color:var(--ink); }\n\n  /* ---------- Sticky section nav ---------- */\n  nav.pagenav{\n    position:sticky; top:0; z-index:20;\n    background:rgba(10,26,47,0.92); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);\n    border-bottom:1px solid var(--rule);\n    display:flex; gap:2px; overflow-x:auto; scrollbar-width:none;\n  }\n  nav.pagenav::-webkit-scrollbar{ display:none; }\n  nav.pagenav a{\n    flex:none; padding:13px 16px; font-size:12.5px; font-weight:600; color:var(--ink-dim);\n    text-decoration:none; border-bottom:2px solid transparent; white-space:nowrap;\n    transition:color .15s ease, border-color .15s ease;\n  }\n  nav.pagenav a:hover{ color:var(--ink); }\n  nav.pagenav a.active{ color:var(--accent); border-bottom-color:var(--accent); }\n  nav.pagenav a.ext{ color:var(--ink-faint); }\n\n  section{ padding:44px 0; border-bottom:1px solid var(--rule); scroll-margin-top:52px; }\n  section:last-of-type{ border-bottom:none; }\n  .section-label{ display:flex; align-items:baseline; gap:12px; margin-bottom:22px; }\n  .section-label .n{ font-family:var(--mono); color:var(--accent); font-size:13px; }\n  .section-label h2{ font-size:13px; text-transform:uppercase; letter-spacing:0.12em; color:var(--ink); margin:0; font-weight:700; }\n  .section-label .rule{ flex:1; height:1px; background:var(--rule); }\n\n  /* ---------- Board ---------- */\n  /* Actionable columns first (Rozbehnuté / Blokované / Čaká), Hotovo last with its own inner\n     scroll — 25+ done tickets shouldn't stretch the page and bury what needs attention. */\n  .board{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; align-items:start; }\n  @media (max-width:820px){ .board{ grid-template-columns:1fr 1fr; } }\n  @media (max-width:520px){ .board{ grid-template-columns:1fr; } }\n  .col{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; overflow:hidden; }\n  .col-head{\n    padding:11px 14px; font-size:11px; text-transform:uppercase; letter-spacing:0.1em; font-weight:700;\n    display:flex; align-items:center; border-bottom:1px solid var(--rule);\n  }\n  .col-head .dot{ width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:7px; flex:none; }\n  .col-head .count{\n    margin-left:auto; font-family:var(--mono); font-size:10.5px; font-weight:700;\n    background:var(--paper-raised); border:1px solid var(--rule); border-radius:999px; padding:2px 8px; color:inherit;\n  }\n  .col-done .col-head{ color:var(--accent); } .col-done .dot{ background:var(--accent); }\n  .col-prog .col-head{ color:var(--gold); } .col-prog .dot{ background:var(--gold); }\n  .col-block .col-head{ color:var(--danger); } .col-block .dot{ background:var(--danger); }\n  .col-wait .col-head{ color:var(--ink-dim); } .col-wait .dot{ background:var(--ink-dim); }\n  .col-body{ padding:10px; display:flex; flex-direction:column; gap:8px; min-height:60px; }\n  .col-done .col-body{ max-height:640px; overflow-y:auto; }\n  .col-scroll-hint{ font-size:10px; color:var(--ink-faint); text-align:center; padding:4px 0 8px 0; }\n  .ticket{ background:var(--paper-raised); border:1px solid var(--rule); border-radius:8px; padding:9px 10px; font-size:12.5px; line-height:1.4; }\n  .ticket b{ display:block; font-size:12.5px; margin-bottom:2px; color:var(--ink); }\n  .ticket span{ color:var(--ink-dim); font-size:11.5px; }\n  .ticket.clickable-ticket{ cursor:pointer; transition:border-color .15s; }\n  .ticket.clickable-ticket:hover{ border-color:var(--accent-dim); }\n  .ticket.selected-next{ border-color:var(--gold); background:rgba(247,201,72,0.09); }\n  .ticket-next-flag{ display:block; font-size:9.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--gold); font-weight:700; margin-bottom:4px; }\n  .ticket-actions{ display:none; margin-top:8px; padding-top:8px; border-top:1px solid var(--rule); }\n  .ticket.open .ticket-actions{ display:block; }\n  .ticket-work-btn{ background:var(--accent); color:var(--bg); border:none; border-radius:8px; padding:6px 12px; font-size:11px; font-weight:700; cursor:pointer; }\n  .ticket-work-btn:hover{ opacity:0.88; }\n  .ticket-copied-hint{ display:block; margin-top:6px; font-size:10.5px; color:var(--accent); min-height:14px; }\n  .staging-chip{\n    display:inline-block; margin-top:6px; font-size:9.5px; font-family:var(--mono); font-weight:700;\n    letter-spacing:0.04em; text-transform:uppercase; color:var(--gold);\n    border:1px solid var(--gold-dim); background:var(--gold-wash); border-radius:999px; padding:2px 8px;\n  }\n\n  /* ---------- Timeline ---------- */\n  .timeline{ position:relative; padding-left:26px; }\n  .timeline::before{ content:''; position:absolute; left:6px; top:6px; bottom:6px; width:1px; background:var(--rule); }\n  .tl-item{ position:relative; padding-bottom:30px; }\n  .tl-item:last-child{ padding-bottom:0; }\n  .tl-item::before{\n    content:''; position:absolute; left:-26px; top:3px; width:11px; height:11px; border-radius:50%;\n    background:var(--bg); border:2px solid var(--ink-dim);\n  }\n  .tl-item.now::before{ border-color:var(--gold); background:var(--gold); box-shadow:0 0 0 4px var(--gold-wash); }\n  .tl-item.done::before{ border-color:var(--accent); background:var(--accent); }\n  .tl-item.risk::before{ border-color:var(--danger); background:var(--danger); }\n  .tl-date{ font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:var(--accent); margin-bottom:5px; font-family:var(--mono); }\n  .tl-title{ font-size:19px; font-weight:700; margin:0 0 7px 0; color:var(--ink); }\n  .tl-body{ font-size:13.5px; color:var(--ink-dim); line-height:1.65; max-width:640px; }\n  .tl-body b{ color:var(--ink); font-weight:600; }\n  .tag{\n    display:inline-block; font-size:10px; text-transform:uppercase; letter-spacing:0.06em;\n    padding:3px 9px; border-radius:20px; margin-top:9px; font-weight:700; font-family:var(--mono);\n  }\n  .tag.risk{ background:var(--danger-wash); color:var(--danger); }\n  .tag.ok{ background:var(--accent-wash); color:var(--accent); }\n\n  .callout{\n    border:1px solid var(--danger-dim); background:var(--danger-wash);\n    border-radius:10px; padding:16px 18px; margin-top:16px;\n  }\n  .callout .k{ font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:var(--danger); font-weight:700; margin-bottom:7px; }\n  .callout p{ margin:0; font-size:13.5px; color:var(--ink-dim); line-height:1.65; }\n  .callout code{ background:rgba(0,0,0,0.25); padding:1px 6px; border-radius:4px; font-size:12px; color:var(--accent); font-family:var(--mono); }\n  .callout.ok{ border-color:var(--accent-dim); background:var(--accent-wash); }\n  .callout.ok .k{ color:var(--accent); }\n  .resolved{ color:var(--accent); }\n  .resolved s{ color:var(--ink-faint); }\n\n  /* ---------- Spending ---------- */\n  details.group{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; overflow:hidden; margin-top:14px; }\n  details.group summary{\n    list-style:none; cursor:pointer; padding:15px 18px; font-size:14px; font-weight:700; color:var(--ink);\n    display:flex; align-items:center; gap:10px; user-select:none;\n  }\n  details.group summary::-webkit-details-marker{ display:none; }\n  details.group summary::after{ content:'▶'; margin-left:auto; font-size:11px; color:var(--ink-dim); transition:transform .15s; }\n  details.group[open] summary::after{ transform:rotate(90deg); }\n  .group-body{ padding:0 18px 18px 18px; }\n  .spend-bar{ display:flex; height:14px; border-radius:999px; overflow:hidden; border:1px solid var(--rule); margin:4px 0 8px 0; }\n  .spend-bar i{ display:block; height:100%; }\n  .spend-legend{ display:flex; flex-wrap:wrap; gap:14px; font-size:11px; color:var(--ink-dim); margin-bottom:14px; }\n  .spend-legend span{ display:inline-flex; align-items:center; gap:6px; }\n  .spend-legend i{ width:9px; height:9px; border-radius:3px; display:inline-block; }\n  .spend-row{ display:flex; justify-content:space-between; align-items:baseline; padding:9px 0; border-top:1px solid var(--rule); gap:12px; }\n  .spend-what{ font-size:13px; color:var(--ink); }\n  .spend-what .meta{ display:block; font-size:11px; color:var(--ink-dim); margin-top:2px; }\n  .spend-amount{ font-family:var(--mono); font-size:13.5px; font-weight:700; color:var(--ink); flex:none; font-variant-numeric:tabular-nums; }\n  .spend-total{ display:flex; justify-content:space-between; align-items:baseline; padding:12px 0 2px 0; margin-top:4px; border-top:1px solid var(--rule); }\n  .spend-total .spend-amount{ color:var(--accent); font-size:16px; }\n\n  /* ---------- Top 5 ---------- */\n  .top5-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:14px; }\n  @media (max-width:820px){ .top5-grid{ grid-template-columns:1fr; } }\n  .top5-card{ background:var(--paper-raised); border:1px solid var(--rule); border-radius:12px; padding:14px 16px; }\n  .top5-card h4{ margin:0 0 10px 0; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--accent); font-weight:700; }\n  .top5-card ol{ margin:0; padding-left:18px; }\n  .top5-card li{ font-size:12.5px; color:var(--ink-dim); line-height:1.6; padding:3px 0; }\n  .top5-card li b{ color:var(--ink); font-weight:600; }\n  .top5-card li{ list-style:none; margin-left:-18px; padding-left:18px; position:relative; }\n  .top5-card li::before{ content:'•'; position:absolute; left:2px; color:var(--ink-faint); }\n  .top5-card li.clickable-ticket{ cursor:pointer; border-radius:8px; transition:background .15s; }\n  .top5-card li.clickable-ticket:hover{ background:var(--paper-hi); }\n  .top5-card li.selected-next{ background:rgba(247,201,72,0.09); }\n  .deadline-badge{ display:block; font-size:10.5px; margin-top:2px; font-family:var(--mono); }\n  .deadline-badge.plain{ color:var(--ink-faint); }\n  .deadline-badge.soon{ color:var(--gold); font-weight:700; }\n  .deadline-badge.urgent{ color:var(--danger); font-weight:700; }\n\n  footer.foot{ text-align:center; font-size:11.5px; color:var(--ink-faint); padding:40px 0 20px 0; }\n\n  /* ---------- Sautero stamp + language fab (Richard, 15.7.: every /visual data/ document\n     carries a last-updated-to-Sautero-state badge and an SK/EN toggle) ---------- */\n  .chefos-stamp{\n    position:fixed; bottom:14px; right:14px; z-index:90;\n    background:rgba(15,35,64,0.92); border:1px solid rgba(52,247,215,0.4); color:#34F7D7;\n    font-size:10.5px; font-weight:700; font-family:\"SF Mono\",Menlo,Consolas,monospace;\n    padding:6px 12px; border-radius:999px;\n    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); pointer-events:none;\n  }\n  .chefos-lang-fab{\n    position:fixed; bottom:14px; left:14px; z-index:90;\n    background:rgba(15,35,64,0.92); border:1px solid #223d57; color:#9C949E;\n    font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;\n    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;\n    padding:7px 14px; border-radius:999px; cursor:pointer;\n    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);\n    transition:border-color .15s, color .15s;\n  }\n  .chefos-lang-fab:hover{ border-color:rgba(52,247,215,0.4); color:#34F7D7; }\n  @media print{ .chefos-stamp, .chefos-lang-fab{ display:none; } }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\u003cheader class=\"hero\">\n  \u003cdiv class=\"hero-inner\">\n    \u003cdiv class=\"topline\">\n      \u003cdiv class=\"brandmark\">\n        \u003csvg width=\"24\" height=\"24\" viewBox=\"0 0 68 68\">\u003cpath d=\"M 46.8 42.3 A 18 18 0 1 1 46.8 21.7\" fill=\"none\" stroke=\"#34F7D7\" stroke-width=\"7\" stroke-linecap=\"round\"/>\u003ccircle cx=\"34\" cy=\"34\" r=\"3\" fill=\"#34F7D7\"/>\u003c/svg>\n        \u003cspan class=\"word\">Sautero\u003c/span>\n      \u003c/div>\n      \u003cbutton class=\"lang-toggle\" id=\"langBtn\" onclick=\"toggleLang()\">EN\u003c/button>\n    \u003c/div>\n    \u003cdiv class=\"kicker\" data-sk=\"Stavový lístok · Kuchynský denník\" data-en=\"Status Ticket · Kitchen Journal\">\u003c/div>\n    \u003ch1 class=\"title\" data-sk='Kde presne stojí \u003cem>Sautero\u003c/em> dnes' data-en='Exactly where \u003cem>Sautero\u003c/em> stands today'>\u003c/h1>\n    \u003cp class=\"lede\" data-sk=\"Prehľad na základe ROADMAP.md, MVP_DEFINITION.md, ARCHITECTURE.md a FEATURE_ROADMAP.md. Pilotná kuchyňa už reálne beží — otázka nie je „kedy začať&quot;, ale „kedy je to bezpečné pustiť k cudzím ľuďom a k peniazom&quot;.\" data-en=\"Overview based on ROADMAP.md, MVP_DEFINITION.md, ARCHITECTURE.md and FEATURE_ROADMAP.md. The pilot kitchen is already live — the question isn't &quot;when to start&quot;, it's &quot;when is it safe to open up to strangers and money&quot;.\">\u003c/p>\n    \u003c!-- Kanban donut (Richard, 17.7.): the four columns as a pie — click a segment to jump\n         straight to that column on the board. -->\n    \u003cdiv class=\"pulse-row\">\n      \u003csvg id=\"kanbanDonut\" viewBox=\"0 0 120 120\" style=\"width:160px; height:160px; flex:none;\">\u003c/svg>\n      \u003cdiv class=\"pulse-strip\" id=\"pulseStrip\" style=\"flex:1; min-width:260px; margin-top:0;\">\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"meta-row\">\n      \u003cdiv class=\"meta-card\">\u003cdiv class=\"meta-label\" data-sk=\"Fáza podľa plánu\" data-en=\"Phase per plan\">\u003c/div>\u003cdiv class=\"meta-value\">1 / 7\u003c/div>\u003c/div>\n      \u003cdiv class=\"meta-card\">\u003cdiv class=\"meta-label\" data-sk=\"Reálny rozsah práce\" data-en=\"Real scope of work\">\u003c/div>\u003cdiv class=\"meta-value\" data-sk=\"Zasahuje do fáz 1–3\" data-en=\"Spans phases 1–3\">\u003c/div>\u003c/div>\n      \u003cdiv class=\"meta-card\">\u003cdiv class=\"meta-label\" data-sk=\"Aktívnych pilotných užívateľov\" data-en=\"Active pilot users\">\u003c/div>\u003cdiv class=\"meta-value\" data-sk=\"11 účtov — 3 zakladateľove testovacie + 8 reálnych ľudí\" data-en=\"11 accounts — 3 founder test accounts + 8 real people\">\u003c/div>\u003c/div>\n      \u003cdiv class=\"meta-card\">\u003cdiv class=\"meta-label\" data-sk=\"Cieľ verejného trialu\" data-en=\"Public trial target\">\u003c/div>\u003cdiv class=\"meta-value\">1. 8. 2026\u003c/div>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/header>\n\n\u003cnav class=\"pagenav\" id=\"pageNav\">\n  \u003ca href=\"#prep-board\" class=\"active\" data-sk=\"01 Prep board\" data-en=\"01 Prep board\">\u003c/a>\n  \u003ca href=\"#timeline\" data-sk=\"02 Časová os\" data-en=\"02 Timeline\">\u003c/a>\n  \u003ca href=\"#pamataj\" data-sk=\"03 Na pamäti\" data-en=\"03 Keep in mind\">\u003c/a>\n  \u003ca href=\"#vydavky\" data-sk=\"04 Výdavky\" data-en=\"04 Spending\">\u003c/a>\n  \u003ca href=\"#top5\" data-sk=\"05 Top 5 úlohy\" data-en=\"05 Top 5 tasks\">\u003c/a>\n  \u003ca class=\"ext\" href=\"automation.html\" data-sk=\"🤖 Automatizácie\" data-en=\"🤖 Automations\">\u003c/a>\n  \u003ca class=\"ext\" href=\"features.html\" data-sk=\"🧩 Funkcie & zdravie\" data-en=\"🧩 Features & health\">\u003c/a>\n  \u003ca class=\"ext\" href=\"presentation.html\" data-sk=\"📈 Investor deck\" data-en=\"📈 Investor deck\">\u003c/a>\n\u003c/nav>\n\n\u003cdiv class=\"wrap\">\n\n  \u003csection id=\"prep-board\">\n    \u003cdiv class=\"section-label\">\u003cspan class=\"n\">01\u003c/span>\u003ch2 data-sk=\"Prep board — kde je čo\" data-en=\"Prep board — where things stand\">\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n\n    \u003cdiv class=\"board\">\n      \u003cdiv class=\"col col-prog\">\n        \u003cdiv class=\"col-head\">\u003cspan class=\"dot\">\u003c/span>\u003cspan data-sk=\"Rozbehnuté\" data-en=\"In progress\">\u003c/span>\u003cspan class=\"count\">\u003c/span>\u003c/div>\n        \u003cdiv class=\"col-body\">\n          \u003cdiv class=\"ticket\">\u003cb>Recipe formulár — 20 polí\u003c/b>\u003cspan>DB má všetky polia, formulár ukazuje len časť\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🍽️ Michelin-chef prepis receptov\u003c/b>\u003cspan>19 hotových (Šaláty 11/11, Dressingy 8/11), migrácie v db/64+66, žiadna nespustená na produkcii. Pokračovanie čaká na Richardovo rozhodnutie o rozsahu ázijskej kuchyne — ~110 receptov zostáva\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Ingredient DB rozšírenie\u003c/b>\u003cspan>104 reálnych cien od dodávateľa importovaných, zvyšok stále odhad AI\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🤖 Denný AI agent — ingrediencie\u003c/b>\u003cspan>Beží raz denne, strop CHF 30/mesiac, sám si vyberá čo vylepšiť (ceny/sezóna/chýbajúce položky), zapisuje ako novú SQL migráciu (nikdy priamo do produkcie). 14.7.: overil 16 základných surovín voči reálnym Migros cenám — db/67, zatiaľ nespustené. Report: docs/ingredient_agent_log.md\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Overovanie cien\u003c/b>\u003cspan>Nový filter Verified/Estimated/Missing to teraz robí viditeľným, väčšina stále odhad\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Label printer\u003c/b>\u003cspan>Odporúčanie hotové (Brother QL-820NWB), fyzicky ešte nekúpené\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Fridge temp senzor\u003c/b>\u003cspan>Manuálne zapisovanie teplôt medzitým oživené v novom HACCP module (15.7.); SensorPush odporúčaný, fyzicky nekúpený, integrácia nezačatá\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🎨 Visual Data Standards — redizajn dokumentov\u003c/b>\u003cspan>Nový standing štandard (15.7.): všetky dashboardy/infografiky na world-class úroveň, presun do /visual data/. Investor deck + status hotové, zvyšné dokumenty postupne\u003c/span>\u003c/div>\n        \u003c/div>\n      \u003c/div>\n\n      \u003cdiv class=\"col col-block\">\n        \u003cdiv class=\"col-head\">\u003cspan class=\"dot\">\u003c/span>\u003cspan data-sk=\"Blokované\" data-en=\"Blocked\">\u003c/span>\u003cspan class=\"count\">\u003c/span>\u003c/div>\n        \u003cdiv class=\"col-body\">\n          \u003cdiv class=\"ticket\">\u003cb>Živé testovanie v prehliadači\u003c/b>\u003cspan>Agent nemá prístup k reálnemu zariadeniu — 13.7. sa dva bugy (Check List delete, AI scan) overili naživo len vďaka tomu, že ich Richard priamo nahlásil a otestoval po nasadení; väčšina ostatných nedávnych funkcií stále nie je naživo overená. Po 14.–15.7. (HACCP, Face ID, URL sken, background scanning…) je tento dlh ešte väčší\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Michelin prepis — ázijská kuchyňa\u003c/b>\u003cspan>Otvorená otázka pre Richarda: vylúčiť 2 hraničné recepty (Yuzu Cauliflower, ázijská karamelizovaná cibuľa) z Michelin prepisu, alebo nie? Bez odpovede prepis stojí\u003c/span>\u003c/div>\n        \u003c/div>\n      \u003c/div>\n\n      \u003cdiv class=\"col col-wait\">\n        \u003cdiv class=\"col-head\">\u003cspan class=\"dot\">\u003c/span>\u003cspan data-sk=\"Čaká\" data-en=\"Waiting\">\u003c/span>\u003cspan class=\"count\">\u003c/span>\u003c/div>\n        \u003cdiv class=\"col-body\">\n          \u003cdiv class=\"ticket\" style=\"border-color:var(--gold);\">\u003cb style=\"color:var(--gold);\">💰 Prvý príjem — 2 blokátory, termín 20.7.26\u003c/b>\u003cspan>Richard sa 16.7. zaviazal na dátum. 1) Nebenerwerb žiadosť zamestnávateľovi (10 min, draft hotový, súbor pripravený v priečinku VYRIEŠIŤ DO 20.7.2026/), 2) Einzelfirma/AHV registrácia (1-2 h). Potom: founding-member ponuka do appky (Claude, draft hotový)\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🧼 HACCP vlna 3\u003c/b>\u003cspan>Školenia personálu + admin report — posledné dve dlaždice s \"pripravujeme\" bannerom. Vlna 2 (fritézový olej, škodcovia, expirácia štítkov) nasadená 15.7.\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Fakturácia / predplatné\u003c/b>\u003cspan>Plán existuje (monetization.html) — na štart ručné faktúry, platobná brána až pri 20+ kuchyniach\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>GmbH\u003c/b>\u003cspan>Vedome odložené až po prvom reálnom príjme\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Fázy 3 (zvyšok)–7\u003c/b>\u003cspan>Inventory, plánovanie, reporty, AI odporúčania, natívna appka, launch\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Prvý predajný kontakt\u003c/b>\u003cspan>Nooch Asian Kitchen identifikovaný ako cieľ (3 pobočky v kantóne Bern), zatiaľ bez oslovenia\u003c/span>\u003c/div>\n        \u003c/div>\n      \u003c/div>\n\n      \u003cdiv class=\"col col-done\">\n        \u003cdiv class=\"col-head\">\u003cspan class=\"dot\">\u003c/span>\u003cspan data-sk=\"Hotovo\" data-en=\"Done\">\u003c/span>\u003cspan class=\"count\">\u003c/span>\u003c/div>\n        \u003cdiv class=\"col-body\">\n          \u003cdiv class=\"ticket\" style=\"border-color:var(--danger);\">\u003cb style=\"color:var(--danger);\">🔴 → ✅ Bezpečnostná kontrola celého projektu (17.7.): dve reálne diery zavreté + trvalé poistky\u003c/b>\u003cspan>Richard požiadal o kompletný security check. (1) Bucket „working-time-notes\" (nahraté pracovné ZMLUVY — mzdy, hodiny) bol VEREJNÝ a čitateľný pre každého prihláseného — uniklo to, lebo bol vytvorený cez Supabase klikačku, nie migráciou. db/134: privátny + owner-only, appka číta cez podpísané URL. (2) Verejná polica receptov (db/131) prvýkrát zobrazuje cudzí obsah → stored XSS. Oprava: escapovanie na dátovej hranici (cudzie recepty aj ingrediencie). Trvalé guardy v auditoch: verejný bucket / bucket-wide storage policy / odstránenie XSS escapera teraz zhodia commit. Live DB health check: 0 tabuliek bez RLS, všetky triggery + policies sedia.\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🌍 Verejné police + zdieľanie (recepty aj ingrediencie) — 17.7.\u003c/b>\u003cspan>Nová polica Public vedľa Sautero (recepty aj ingrediencie), naprieč kuchyňami, read-only. Publikovanie glóbusom s kontrolnou otázkou (db/131-133, 136). Zdieľanie 🌍 verejne / 🤝 priateľom — recepty per-recept, ingrediencie per-položku so „všetko naraz\" + jednotlivo; friend-shared obsah vidno v Chef Friends → profil priateľa. Z Company profilu sa zdieľať nedá NIČ (appka + DB trigger). Cudzie recepty/ingrediencie sú striktne read-only (len škálovať/čítať), escapované a mimo vlastného cenníka. Pevné police sa dajú len skryť, nie zmazať; nové ingredient listy majú 8 farebných kníh (db/135).\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🧾 Invoice Scan v2 + dodávateľ + viacjazyčné/prekladové skeny — 17.7.\u003c/b>\u003cspan>Sken faktúry: z hlavičky rozpozná DODÁVATEĽA a nastaví ho na všetky položky, aktualizuje ceny + dátum, preskakuje dátumy/súčty/DPH. Nové pole Dodávateľ v ingredienciách (db/137) — základ pre budúce objednávanie na klik. Oba skeny (faktúra aj cenník/xlsx) teraz PREKLADAJÚ názvy do jazyka z nastavenia (default English), originál ukladajú ako alias na párovanie. Ikony v ingredienciách rozdelené do dvoch riadkov. Opravený pád skenu (aliases NOT NULL).\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>💬 Zdieľané komentáre + 🎓 tutoriály pre každé okno — 17.7.\u003c/b>\u003cspan>Komentáre na Sautero receptoch konečne viditeľné naprieč kuchyňami (db/129 denormalizácia master id) + počítadlo na tlačidle aj bublinka v zozname (1–9, potom 9+); komentovať sa dá aj cudzie verejné recepty (db/132). Každá obrazovka má vlastný podrobný tutoriál (otvorí sa pri prvom otvorení, ❓ v lište na zopakovanie); úvodný sprievodca zoštíhlený na Home; What's New srdiečko zmazané. Firemný recept sa už NIKDY neukáže na osobnej polici (db/130).\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>📧 Email Contacts číslované + detail · Feedback iba Head Admin — 17.7.\u003c/b>\u003cspan>Email kontakty dostali číslovanie (#1 najstarší naspodu) a ťuknutím sa hlavnému adminovi otvorí celý detail vrátane napojeného Sautero účtu. Feedback inbox potvrdený ako výhradne Head-Admin (DB is_super_admin() aj UI). AI Details teraz vysvetľuje pôvod dát (typické referenčné hodnoty, nie meranie).\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\" style=\"border-color:var(--danger);\">\u003cb style=\"color:var(--danger);\">🔴 → ✅ Bezpečnostný bug: Remove z tímu nefungoval, odstránený člen si ponechal plný prístup (16.7. neskoro v noci)\u003c/b>\u003cspan>\"Remove\" v Admin/My Team vždy zlyhal (\"new row violates row-level security policy\") — db/90-tka UPDATE politika nemala WITH CHECK, Postgres defaultne vyžadoval kitchen_id NOT NULL, presný opak toho čo Remove robí. Kým bug trval, odstránený člen reálne VIDEL ďalej všetky dáta kuchyne — appkine \"not in any team\" hlásenie je len text, skutočný prístup rozhoduje kitchen_id v RLS. db/121 pridáva správny WITH CHECK, potvrdené opravené naživo. Nový \"👥 Team Members\" tile priamo v Admin hube (Make Assistant/Remove)\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>📚 Recepty: sekcie a projekty po policiach + colored-book ikony (16.7. neskoro v noci)\u003c/b>\u003cspan>Sekcie (Bakery &amp; Bread, Sushi Basics…) sa počítali zo VŠETKÝCH receptov v kuchyni bez ohľadu na policu — My Recipes/Company Recipes ukazovali celú Sautero taxonómiu aj s nulou zodpovedajúcich receptov. db/122 pridáva shelf_scope, každá polica (aj každý nový projekt) má teraz vlastný nezávislý zoznam sekcií (štart: len Favorites/All). Bug tiež nájdený v showList() — natvrdo resetovala policu na 'chefos' pri každom otvorení, po odstránení malého prepínača v zozname sa prejavil naplno (\"Sautero recepty všade a vždy\"), opravené. Nové projekty (\"Add Project\") dostali výber z 8 farebných kníh (db/123). Sautero komentáre opravené naprieč kuchyňami cez nový chefos_master_id (db/119) — predtým neviditeľné, lebo každá kuchyňa má vlastnú fyzickú kópiu receptu\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🔑 Reálne členstvo v tíme + trvalá oprava admin-invite bugu (16.7. neskoro večer)\u003c/b>\u003cspan>Prepnutie na Company účet už nie je otvorené pre hocikoho — iba pre reálne pripojených (invite link/mail, team kód, alebo kitchen admin rola); profiles.in_team (db/116). Scan QR na tímovú pozvánku teraz pýta potvrdenie \"chceš sa stať členom tímu X?\" namiesto tichého presmerovania. My Profile pridáva ROLE riadok (Head Admin/Admin/Admin Assistant/Member). Nahlásený bug — chefos@protonmail.com prijal Add Company pozvánku, no admin rola sa nepriznala (vypálený jednorazový odkaz) — opravený jednorazovo (db/117) AJ trvalo (db/118: claim_company_admin teraz akceptuje aj spotrebovaný odkaz, pokiaľ je volajúci už reálne v danej kuchyni a admin stoličkа je stále voľná) + hlasný alert namiesto tichého zlyhania\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🍽️ Long-press systém + vlastné zoznamy ingrediencií + poličky pre recepty (16.7. večer)\u003c/b>\u003cspan>Jednotné podržanie prstom/pravé tlačidlo (Premenovať/Skryť/Zmazať/Zdieľať) na ingredienciách, prep-jedlách aj vlastných zoznamoch — Sautero a My Ingredients ostávajú natrvalo nezmazateľné. Nové pomenované zoznamy ingrediencií (ingredient_lists, db/112) so zdieľaním priateľom (db/114, len na čítanie). Recepty dostali rovnaký výber políc ako ingrediencie (Moje/Sautero pre osobné, Sautero/Firemné pre firemné)\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🖨️ Branded tlač v2 + hlavičkový pás + Add to Check List (16.7. večer)\u003c/b>\u003cspan>Tlač receptu prerobená na plne synchrónnu (Safari blokoval async print()) — dvojstĺpcový layout, meta pás, Chef's Notes. Nový vždy-viditeľný horný pás (Kitchen Notebook/Sautero + Späť/Domov) na každej obrazovke okrem hlavného menu, CSS double-offset bug nájdený a opravený. Add to Check List teraz vždy najprv pýta projekt (auto ak je len jeden), potom stanicu. HACCP a Team Meetings skryté z osobných účtov (admin aj firemné účty ich vidia naďalej)\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🔧 Sken .xlsx + AI Details + Kitchen Reports drill-down + branded email (16.7. večer)\u003c/b>\u003cspan>Excel (.xlsx) sken ingrediencií bez knižnice (ručný ZIP/XML parser). \"AI Details\" dopĺňa chýbajúce kategórie/sklad/sezónu dávkovo, nikdy neprepisuje existujúce dáta. Kitchen Reports dostal admin adresár kuchýň + drill-down do receptov (police → kategórie → recept). Opravené odosielanie Feedbacku (duplicitný overlay prepisoval polia) + email_contacts databáza dostala DB trigger namiesto krehkého client-side zápisu. Centrálny Anthropic API kľúč (Claude Console workspace \"Sautero Users\") — user spend oddelene sledovaný od Richardovho vlastného. Značkové Supabase auth emaily (magic link aj confirm-signup) v identite Sautero\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>📦 Popoludňajšia 11-bodová dávka (16.7.)\u003c/b>\u003cspan>Custom Ingredients presunuté z Home do Ingredients; 🛡️ Admin → \"Preview as Normal User\" (dočasný pohľad očami bežného účtu, trvalý banner na návrat); refresh tlačidlo v Access Requests; \"Coming soon\" stena (db/96) pre kohokoľvek bez invite/QR odkazu a bez session, ovládaná priamo v SQL, fail-open; Settings dostal reorder ikonu ako Home; typ účtu (Personal/Company) vidieť priamo v Settings; Working Time deň-detail teraz ukazuje objednávky a vytlačené štítky (vedome bez \"splnených úloh\" — dáta na to neexistujú); 👋 Add Friend QR funguje aj ako pozvánka do kuchyne pre každého (db/95, vedomé čiastočné zrušenie db/81); Tutorial dostal HACCP, Connections a Admin sekcie\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🔴 → ✅ Incident 16.7.: super-admin lockout, opravené a trvalo zablokované\u003c/b>\u003cspan>Pár hodín po spustení db/85+86 sa Richard nevedel prihlásiť do vlastného admin účtu. Dve navrstvené chyby (obe Claudove, obe neviditeľné v SQL editore): rekurzívna RLS politika (rovnaká trieda ako výpadok 13.7.) + chýbajúci column grant pre nové stĺpce. Opravené naživo (db/90) do pár minút od nahlásenia; auditor teraz TRVALO odmietne commit s touto triedou chyby (overené, že chytá aj historický db/53 aj dnešný db/86)\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🛡️ Admin hub + 🏷️ Custom Ingredients + 📖 Share My Recipes (16.7.)\u003c/b>\u003cspan>Admin dlaždica prerobená na hub v dizajne Home: Add Admin (Kitchen Admin vs Head Admin, dva reálne rôzne prístupy), Admin Directory s on/off prepínačmi. Nová admin-only ikonka Custom Ingredients — upload súboru, AI extrakcia, samostatný zoznam. Share My Recipes dobehnuté presne podľa dohody (opt-in, read-only, len chef_connections priatelia) + nová 👨‍🍳 Chef Friends obrazovka — prvý zoznam prepojení vôbec\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>📚 Nové kuchyne dostávajú Sautero recepty (16.7.)\u003c/b>\u003cspan>db/87 — rovnaký bug ako pri ingredienciách (db/74), teraz pre recepty: nová kuchyňa dostane celú knižnicu bez autora, nikdy nie niečie osobné recepty. Access-request 'denied' status sa odteraz kontroluje pri každom prihlásení, nielen pri prvom signupe\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🔐 Health check + admin lockdown + Settings hub (15.7. v noci)\u003c/b>\u003cspan>Trvalé guardy: audítory v git hookoch + CI + brána na deploy; nájdená a zavretá (db/80, staging first) eskalačná diera — ktokoľvek si mohol sám nastaviť is_admin. Nové: ⚙️ Settings hub na Home, 📲 návod na pridanie na plochu, viditeľnosť aktívnych filtrov ako štandard (plný teal), poličky receptov Moje/Sautero/Firemné podľa autora\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🔐 Osembodová dávka: logout, invite-only, povinné heslo, Connections, email databáza (15.7. neskoro v noci)\u003c/b>\u003cspan>Sign Out tlačidlo, self-serve \"vytvor si kuchyňu\" zamknuté len na Richarda (db/81 zavrel aj reálnu dieru — ktokoľvek v kuchyni mohol vytvárať invite QR, nielen admin), heslo povinné pre všetkých (db/83, nová brána po mlčanlivosti), Connections (bývalé My Team) — Scan QR + Share QR (Add Friend reálne funguje cez chef_connections, Share My Recipes poctivo \"coming soon\"), email_contacts databáza (db/82, admin-only prehľad v Settings)\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🧼 HACCP vlna 2\u003c/b>\u003cspan>Fritézový olej + Škodcovia zapnuté (enginy z vlny 1 ich mali pripravené), Expirácia štítkov postavená — tlač štítkov sa loguje s use-by dátumom (db/78), nová obrazovka ukazuje čo je po dátume / dnes-zajtra / v poriadku\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🌐 Vlastná doména + email login pre všetkých\u003c/b>\u003cspan>15.7.: chefos.ch overená v Resend, custom SMTP zapnutý, appka beží na app.chefos.ch — Richard otestoval celý tok naživo (HTTPS, email link, automatické prihlásenie). Hlavný blokátor trialu odstránený\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🔴 → ✅ Kritický signup bug opravený (db/73)\u003c/b>\u003cspan>handle_new_user() padal pre KAŽDÚ novú registráciu (search_path v SECURITY DEFINER) — každý invite aj trial signup by zlyhal. Objavené cez Richardov gmail test + Postgres logy, opravené priamo na produkcii\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🧼 HACCP modul, vlna 1\u003c/b>\u003cspan>Nová stránka v dizajne Home (rovnaké dlaždice): príjem tovaru, jadrová teplota, protokol chladenia, cleaning + hygiena checklisty; Fridge Temp presunutý sem a oživený. db/77 pripravená\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🔓 Heslo + Face ID prihlásenie\u003c/b>\u003cspan>Druhý spôsob popri emailovom kóde — Supabase heslo + WebAuthn platform authenticator ako per-device odomknutie; žiadne biometrické dáta neopúšťajú zariadenie\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Sken menu z URL webstránky\u003c/b>\u003cspan>Nový vstup \"A menu website\" — Claude si stránku stiahne sám (server-side web_fetch), bez zmeny edge funkcie; ďalej identické s photo-menu skenom\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Skenovanie na pozadí + 3-cestný filter receptov\u003c/b>\u003cspan>AI sken už neblokuje prácu (minimalizuj + pill s progresom, 5 skenovacích tokov); recepty filtrovateľné Moje/Sautero/Firemné\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Order List: oprava tichej straty dát\u003c/b>\u003cspan>Save v stanicovom pickeri mazal CELÚ stanicu za celú kuchyňu; db/76 = riadok per osoba, sčítavanie duplicít, admin vidí kto čo objednal. Potvrdené naživo 16.7. (prvý pokus padol na name[]/text[] typovú chybu, opravené, žiadne čiastočné poškodenie vďaka transakčnému spusteniu)\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Nové kuchyne dostávajú ingrediencie + nepovinný profil\u003cspan class=\"staging-chip\">staging first\u003c/span>\u003c/b>\u003cspan>db/74: nová kuchyňa zdedí kópiu ~2000 ingrediencií (predtým začínala s nulou); db/75: profil (meno/vek/pohlavie) už nie je povinný, pribudol \"Skip for now\"\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Recipe engine na Supabase\u003c/b>\u003cspan>173 receptov migrovaných, škálovanie opravené, edit/save funguje naživo\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Ingredients &amp; Pricing\u003c/b>\u003cspan>2 083 ingrediencií (živý stav 17.7.), cost-matching engine, plne filtrovateľné (kuchyňa, kategória, sezóna, skladovanie, overenosť ceny)\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Check List (Kitchen Flow v1)\u003c/b>\u003cspan>Cross-station prehľad, 8 staníc, prep sheets, AI sken fotky/PDF, Language Audit\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Multi-tenant + QR tímy\u003c/b>\u003cspan>Vlastná kuchyňa, invite QR s logom, prístupová brána so schvaľovaním\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Working Time\u003c/b>\u003cspan>Check-in/out, nahrávanie rozvrhu, grafy odpracovaných hodín\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Chef's Assistant\u003c/b>\u003cspan>AI chat, substitúcie, technika + generovanie nových receptov na mieru filtrom\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Investor deck\u003c/b>\u003cspan>presentation.html, priebežne aktualizovaný, Nooch pridaný ako prvý cieľ; 15.7. kompletne prerobený podľa Visual Data Standards\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Vizuálna identita v2\u003c/b>\u003cspan>Navy/teal na dokumentoch, nové logo appky, jednotný dizajn naprieč appkou\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Infra/security balík\u003c/b>\u003cspan>Git, API kľúč na server, realtime sync, error/usage tracking, invite expirácia, audit log (kto čo zmenil v Check Liste)\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🔴 → ✅ Kritický RLS bug opravený\u003c/b>\u003cspan>db/53 spôsobilo nekonečnú rekurziu na profiles, ktorá rozbila takmer celú appku — nájdené a opravené (db/55) v ten istý deň, Richard potvrdil spustenie a appka opäť normálne odpovedá\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Staging prostredie\u003c/b>\u003cspan>Druhý Supabase projekt \"chefos-staging\", celá schéma + dáta nahraté a naživo overené — nová SQL zmena ide odteraz vždy najprv sem, až potom na produkciu\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Rýchlosť načítania\u003c/b>\u003cspan>loadAppData() posielal 11 dotazov jeden po druhom, teraz naraz (Promise.all) — malo by to citeľne skrátiť čakanie pri otváraní obrazoviek\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Kritériá úspechu trialu\u003c/b>\u003cspan>Dohodnuté s Richardom: 40%+ tímov aktívnych 3× v 2. týždni, aspoň 5/25 ochotných platiť, menej ako 10 kritických chýb\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Monetizačný plán\u003c/b>\u003cspan>app/monetization.html — 13 modelov, expert panel; plán na 12 mesiacov: onboarding CHF ~990 + founding pre-sale CHF 490/rok; Nebenerwerb žiadosť + founding ponuka nadraftované v docs/\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Jednotný vizuál + trial balík\u003c/b>\u003cspan>Appka v navy/teal ako dokumenty; legal.html, feedback tlačidlo, yield/waste vo food coste, Chef Challenge, multi-select filtre\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>🔴 → ✅ AI funkcie v appke opravené (naživo overené)\u003c/b>\u003cspan>Skutočná príčina: server-side claude-proxy funkcia (t100) bola napísaná, ale nikdy skutočne nasadená na produkciu — Richard prevedený naživo cez Supabase CLI deploy, teraz funguje (photo scan, prep list, Chef's Assistant). Bonus opravy: Check List delete tichý no-op (RLS), max_tokens limit na veľké prep listy, 1000-ingrediencia zobrazovací strop\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>2000 ingrediencií + Team Meetings placeholder\u003c/b>\u003cspan>db/58+59 na stagingu (produkcia čaká na Richarda); nová 🗣️ Team Meetings dlaždica na Home (zatiaľ len \"we're working on it\")\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Working Time: forgot-to-check-in + poloha\u003c/b>\u003cspan>Zrkadlí \"forgot to check out\"; jednorazová snímka GPS presne pri check-in/check-out (nie priebežné sledovanie — Richardovo rozhodnutie z právnych aj technických dôvodov)\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>AI poznámka o zmluve — tón + privacy fix\u003c/b>\u003cspan>Každý bod má ikonu ⚠️/✅/ℹ️ (aj dobré veci, nielen riziká); pri kontrole objavená a opravená (db/62, čaká na staging test) skutočná diera — cudzie contract_notes boli technicky čitateľné cez RLS\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Zvýraznené upozornenie na deadline\u003c/b>\u003cspan>Pondelková kontrola Critical Review teraz píše výrazný 🚨🚨🚨 blok namiesto jedného riadku\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>Chef Challenge dlaždica skrytá\u003c/b>\u003cspan>Na Richardovu žiadosť — kód a funkcia ostávajú netknuté, len odstránené z Home\u003c/span>\u003c/div>\n          \u003cdiv class=\"ticket\">\u003cb>tasklist.html + status.html redizajn\u003c/b>\u003cspan>Nová vizuálna vrstva, SK/EN prepínač na štruktúrne popisky, sekcie Výdavky + Top 5 úlohy\u003c/span>\u003c/div>\n        \u003c/div>\n        \u003cdiv class=\"col-scroll-hint\" data-sk=\"↕ najnovšie hore — koluje\" data-en=\"↕ newest first — scrolls\">\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003csection id=\"timeline\">\n    \u003cdiv class=\"section-label\">\u003cspan class=\"n\">02\u003c/span>\u003ch2 data-sk=\"Časová os — tri reálne míľniky\" data-en=\"Timeline — three real milestones\">\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n\n    \u003cdiv class=\"timeline\">\n      \u003cdiv class=\"tl-item done\">\n        \u003cdiv class=\"tl-date\">Od 9. 7. 2026 — už beží\u003c/div>\n        \u003cdiv class=\"tl-title\">Neformálny pilot v jednej kuchyni\u003c/div>\n        \u003cdiv class=\"tl-body\">Toto sa už deje. Richard a dvaja testeri reálne používajú recepty, Check List aj Ingredients naživo na Supabase. Toto \u003cb>nie je budúcnosť — je to súčasný stav\u003c/b>.\u003c/div>\n        \u003cspan class=\"tag ok\">Aktívne\u003c/span>\n      \u003c/div>\n\n      \u003cdiv class=\"tl-item now\">\n        \u003cdiv class=\"tl-date\">Cieľ: 1. 8. 2026 (realisticky skôr polovica augusta)\u003c/div>\n        \u003cdiv class=\"tl-title\">Verejný trial — 25 ľudí, viac reštaurácií\u003c/div>\n        \u003cdiv class=\"tl-body\">Rozsah zámerne úzky: len Check List, Chef's Assistant, Ingredients, Recipes. Technicky takmer pripravené (multi-tím + QR pozvánky + schvaľovacia brána je hotová).\u003c/div>\n        \u003cdiv class=\"callout\">\n          \u003cdiv class=\"k\">Čo reálne stojí v ceste\u003c/div>\n          \u003cp>\u003cspan class=\"resolved\">✅ \u003cs>Email prihlásenie pre cudzie adresy\u003c/s> — vyriešené 15.7.: doména \u003ccode>chefos.ch\u003c/code> overená, custom SMTP beží, Richard otestoval celý prihlasovací tok naživo. Zároveň opravený kritický signup bug (db/73), ktorý by bol zhodil KAŽDÚ novú registráciu.\u003c/span>\u003cbr>\u003cbr>\n            Zostáva jeden kvalitatívny krok: za posledný týždeň pribudlo veľmi veľa funkcií (desiatky zápisov v roadmape) a väčšina z nich \u003cb style=\"color:var(--ink);\">nebola nikdy naživo otestovaná v prehliadači\u003c/b> — agent len kontroloval kód štrukturálne. Pred pustením 25 cudzích ľudí k appke to chce jeden poctivý manuálny testovací prechod.\u003c/p>\n        \u003c/div>\n      \u003c/div>\n\n      \u003cdiv class=\"tl-item risk\">\n        \u003cdiv class=\"tl-date\">Realistický odhad: Q4 2026 (okt–dec), nie skôr\u003c/div>\n        \u003cdiv class=\"tl-title\">Reálny produkt pripravený na predaj\u003c/div>\n        \u003cdiv class=\"tl-body\">Toto je vedomý odhad, nie sľub — tempo builda je mimoriadne rýchle (desiatky funkcií za pár dní), ale „predajné\" chýba viac než kód:\u003c/div>\n        \u003cdiv class=\"tl-body\" style=\"margin-top:6px;\">\n          • Žiadna fakturácia/predplatné (nikde v pláne ani kóde)\u003cbr>\n          • Ceny ingrediencií z veľkej časti stále odhadované AI, nie overené — pre platiaci food-cost nástroj to treba dotiahnuť\u003cbr>\n          • Kitchen Flow reálne overený len v jednej kuchyni, nie cez skutočnú prevádzku v tlaku servisu vo viacerých podnikoch\u003cbr>\n          • Žiadna právnická/zmluvná vrstva (GmbH vedome odložená)\u003cbr>\n          • Fázy 3 (zvyšok) až 7 podľa plánu ešte len prídu na rad\n        \u003c/div>\n        \u003cspan class=\"tag risk\">Závisí od výsledku trialu\u003c/span>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003csection id=\"pamataj\">\n    \u003cdiv class=\"section-label\">\u003cspan class=\"n\">03\u003c/span>\u003ch2 data-sk=\"Jedna vec, ktorú treba mať na pamäti\" data-en=\"One thing to keep in mind\">\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n    \u003cdiv class=\"callout ok\">\n      \u003cdiv class=\"k\" data-sk=\"Rýchlosť vs. overenie\" data-en=\"Speed vs. verification\">\u003c/div>\n      \u003cp data-sk='Objem hotovej práce je naozaj veľký na to, koľko dní to trvalo — ale rýchlosť buildu (AI agent, žiadny live prístup k zariadeniu) znamená, že \u003cb style=\"color:var(--ink);\">kvalita a stabilita zaostávajú za rozsahom\u003c/b>. Pred verejným trialom aj pred akýmkoľvek predajným rozhovorom (napr. Nooch) treba jeden manuálny prechod appkou naživo — nie ďalšiu funkciu.' data-en='The sheer volume of finished work is genuinely large for how many days this took — but the build speed (AI agent, no live device access) means \u003cb style=\"color:var(--ink);\">quality and stability are lagging behind scope\u003c/b>. Before the public trial, and before any sales conversation (e.g. Nooch), this needs one honest manual pass through the live app — not another feature.'>\u003c/p>\n    \u003c/div>\n  \u003c/section>\n\n  \u003csection id=\"vydavky\">\n    \u003cdiv class=\"section-label\">\u003cspan class=\"n\">04\u003c/span>\u003ch2 data-sk=\"Výdavky\" data-en=\"Spending\">\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n    \u003cdetails class=\"group\" open>\n      \u003csummary>\u003cspan data-sk=\"💳 Súhrn — plný rozpis presunutý do Biznis → Náklady\" data-en=\"💳 Summary — full breakdown moved to Biznis → Costs\">\u003c/span>\u003c/summary>\n      \u003cdiv class=\"group-body\">\n        \u003cdiv class=\"spend-total\" style=\"border-top:none; padding-top:0;\">\n          \u003cdiv class=\"spend-what\" data-sk=\"Hotovosť doteraz ~CHF 259 + Supabase Pro mesačne · s časom zakladateľa (89,5 h × 45 CHF) ~CHF 4 308 · plánované nákupy ~CHF 255\" data-en=\"Cash to date ~CHF 259 + Supabase Pro monthly · incl. founder time (89.5 h × CHF 45) ~CHF 4,308 · planned purchases ~CHF 255\">\u003c/div>\n        \u003c/div>\n        \u003cp class=\"lede\" style=\"margin:8px 0 0 0; font-size:12px;\" data-sk=\"Kompletné položky, koláčový graf všetkých doterajších aj budúcich nákladov a AI spotreba per užívateľ (živé meranie od 17.7.) sú v dokumente Biznis → záložka Náklady. Živý per-účet prehľad: Admin → 📈 AI Usage v appke.\" data-en=\"Complete line items, the pie chart of all costs to date and upcoming, and per-user AI spend (metered live since Jul 17) live in the Biznis document → Costs tab. Live per-account view: Admin → 📈 AI Usage in the app.\">\u003c/p>\n      \u003c/div>\n    \u003c/details>\n  \u003c/section>\n\n  \u003csection id=\"top5\">\n    \u003cdiv class=\"section-label\">\u003cspan class=\"n\">05\u003c/span>\u003ch2 data-sk=\"5 najdôležitejších úloh\" data-en=\"Top 5 tasks\">\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n    \u003cdetails class=\"group\" open>\n      \u003csummary>\u003cspan data-sk=\"📌 Podľa obdobia — s odpočtom\" data-en=\"📌 By timeframe — with countdown\">\u003c/span>\u003c/summary>\n      \u003cdiv class=\"group-body\">\n        \u003cp class=\"lede\" style=\"margin:0 0 12px 0; font-size:12px;\" data-sk=\"Odpočet sa zobrazí, keď do deadline ostáva 50 hodín alebo menej — dovtedy len dátum.\" data-en=\"A countdown appears once 50 hours or fewer remain before the deadline — a plain date shows until then.\">\u003c/p>\n        \u003cdiv class=\"top5-grid\" id=\"top5Grid\">\u003c/div>\n      \u003c/div>\n    \u003c/details>\n  \u003c/section>\n\n  \u003cfooter class=\"foot\" data-sk=\"Sautero — interný stavový prehľad · zostavené z ROADMAP.md, MVP_DEFINITION.md, ARCHITECTURE.md, FEATURE_ROADMAP.md, LABEL_PRINTER_RESEARCH.md · aktualizuje sa denne · 15. 7. 2026\" data-en=\"Sautero — internal status overview · compiled from ROADMAP.md, MVP_DEFINITION.md, ARCHITECTURE.md, FEATURE_ROADMAP.md, LABEL_PRINTER_RESEARCH.md · updates continuously · Jul 15, 2026\">\u003c/footer>\n\n\u003cscript>\n/* Language toggle — SK is the default for every Sautero document (Richard, 14.7.). This\n   translates structural chrome (nav, headers, hero, the Spending/Top-5 sections) via\n   data-sk/data-en pairs. Historical ticket text in the Prep board predates this pattern\n   and stays as originally written — translating every ticket is a separate, larger job,\n   deliberately not rushed into this batch. */\nlet _statusLang = localStorage.getItem('chefos_doc_lang') || 'sk';\nfunction applyLangChrome(){\n  document.querySelectorAll('[data-sk]').forEach(el=>{\n    const val = _statusLang === 'sk' ? el.getAttribute('data-sk') : (el.getAttribute('data-en') || el.getAttribute('data-sk'));\n    if(val.indexOf('\u003c') !== -1) el.innerHTML = val; else el.textContent = val;\n  });\n  const btn = document.getElementById('langBtn');\n  if(btn) btn.textContent = _statusLang === 'sk' ? 'EN' : 'SK';\n  document.documentElement.lang = _statusLang;\n}\nwindow.toggleLang = function(){\n  _statusLang = _statusLang === 'sk' ? 'en' : 'sk';\n  localStorage.setItem('chefos_doc_lang', _statusLang);\n  applyLangChrome();\n  renderTop5();\n  renderPulse();\n};\napplyLangChrome();\n\n/* ---------- Pulse strip + column counts — computed from the board itself, never hand-kept,\n   so the hero numbers can't drift out of sync with the actual ticket lists. ---------- */\nconst PULSE_LABELS = {\n  done: { sk:'Hotovo', en:'Done' },\n  prog: { sk:'Rozbehnuté', en:'In progress' },\n  block:{ sk:'Blokované', en:'Blocked' },\n  wait: { sk:'Čaká', en:'Waiting' },\n};\nfunction renderPulse(){\n  const counts = {\n    done: document.querySelectorAll('.col-done .ticket').length,\n    prog: document.querySelectorAll('.col-prog .ticket').length,\n    block: document.querySelectorAll('.col-block .ticket').length,\n    wait: document.querySelectorAll('.col-wait .ticket').length,\n  };\n  document.getElementById('pulseStrip').innerHTML = ['done','prog','block','wait'].map(k=>`\n    \u003cdiv class=\"pulse-cell ${k}\">\u003cdiv class=\"num\">${counts[k]}\u003c/div>\u003cdiv class=\"lbl\">${_statusLang==='sk'?PULSE_LABELS[k].sk:PULSE_LABELS[k].en}\u003c/div>\u003c/div>\n  `).join('');\n  document.querySelectorAll('.col').forEach(col=>{\n    const badge = col.querySelector('.col-head .count');\n    if(badge) badge.textContent = col.querySelectorAll('.ticket').length;\n  });\n  renderKanbanDonut(counts);\n}\n/* Kanban donut (Richard, 17.7.) — click a segment to jump to that column on the board. */\nfunction renderKanbanDonut(counts){\n  const svg = document.getElementById('kanbanDonut');\n  if(!svg) return;\n  const SEGS = [\n    { key:'done', color:'var(--accent)', cls:'.col-done' },\n    { key:'prog', color:'var(--gold)', cls:'.col-prog' },\n    { key:'block', color:'var(--danger)', cls:'.col-block' },\n    { key:'wait', color:'var(--ink-dim)', cls:'.col-wait' },\n  ];\n  const total = SEGS.reduce((s,x)=>s + counts[x.key], 0);\n  const R = 44, C = 2 * Math.PI * R;\n  let off = 0;\n  const circles = SEGS.map(s=>{\n    const frac = total ? counts[s.key] / total : 0;\n    const label = _statusLang==='sk' ? PULSE_LABELS[s.key].sk : PULSE_LABELS[s.key].en;\n    const c = `\u003ccircle class=\"seg\" cx=\"60\" cy=\"60\" r=\"${R}\" fill=\"none\" stroke=\"${s.color}\" stroke-width=\"17\"\n      stroke-dasharray=\"${(frac*C).toFixed(2)} ${(C-frac*C).toFixed(2)}\" stroke-dashoffset=\"${(-off*C).toFixed(2)}\"\n      transform=\"rotate(-90 60 60)\" onclick=\"jumpToCol('${s.cls}')\">\u003ctitle>${label}: ${counts[s.key]}\u003c/title>\u003c/circle>`;\n    off += frac;\n    return c;\n  }).join('');\n  svg.innerHTML = circles +\n    `\u003ctext x=\"60\" y=\"58\" text-anchor=\"middle\" font-size=\"24\" font-weight=\"700\">${total}\u003c/text>` +\n    `\u003ctext x=\"60\" y=\"72\" text-anchor=\"middle\" font-size=\"7\" fill=\"var(--ink-dim)\">${_statusLang==='sk'?'tiketov spolu':'tickets total'}\u003c/text>`;\n}\nfunction jumpToCol(sel){\n  const col = document.querySelector(sel);\n  if(!col) return;\n  col.scrollIntoView({ behavior:'smooth', block:'start' });\n  col.classList.add('flash');\n  setTimeout(()=>col.classList.remove('flash'), 2200);\n}\n\n/* Spend details moved to costs.html (Richard, 17.7.: \"náklady samostatne\") — section 04 here\n   keeps only the one-line summary; keep its totals in sync with costs.html at doc-sync. */\n\n/* ---------- Top 5 tasks, by timeframe — each with a real deadline. A countdown badge only\n   appears once 50 hours or fewer remain (Richard's request, 14.7.) so the page isn't cluttered\n   with far-off dates counting down for no reason; before that it's just a plain date. Deadlines\n   are Claude's own soft planning targets tied to real known dates — not binding commitments\n   from Richard. Refreshed 15.7.: email-login and AI-Playground items resolved and removed,\n   replaced with the migrations + live-test pass now actually pending. */\nconst TOP5 = {\n  day: { sk:'Dnes / zajtra', en:'Today / tomorrow', items:[\n    { sk:'Živý test na zariadení: Admin hub, Custom Ingredients, Share My Recipes, Chef Friends, Order List (db/76) — celý zoznam v backlog.html t119-t139', en:'Live device test: Admin hub, Custom Ingredients, Share My Recipes, Chef Friends, Order List (db/76) — full list in backlog.html t119-t139', deadline:'2026-07-16T20:00:00+02:00' },\n    { sk:'Zapnúť shift-reminder notifikáciu vo Working Time, ak ju chceš', en:'Turn on the Working Time shift reminder, if you want it', deadline:'2026-07-16T20:00:00+02:00' },\n    { sk:'Pozrieť si nový vizuál investor decku + status dokumentu (/visual data/)', en:'Review the redesigned investor deck + status doc (/visual data/)', deadline:'2026-07-16T20:00:00+02:00' },\n  ]},\n  week: { sk:'Tento týždeň', en:'This week', items:[\n    { sk:'Zaregistrovať Einzelfirma/AHV (1-2 h, druhý príjmový blokátor)', en:'Register the Einzelfirma/AHV (1-2 h, second revenue blocker)', deadline:'2026-07-20T14:30:00+02:00' },\n    { sk:'Poslať Nebenerwerb žiadosť zamestnávateľovi (10 min, draft hotový)', en:'Send the Nebenerwerb request to the employer (10 min, draft ready)', deadline:'2026-07-20T14:30:00+02:00' },\n    { sk:'Jeden poctivý manuálny test appky pred verejným trialom', en:'One honest manual app test pass before the public trial', deadline:'2026-07-20T14:30:00+02:00' },\n    { sk:'Napísať týždenný Critical Review (vlastný deadline: pondelok 14:30)', en:'Write the weekly Critical Review (self-set deadline: Monday 14:30)', deadline:'2026-07-20T14:30:00+02:00' },\n  ]},\n  month: { sk:'Tento mesiac', en:'This month', items:[\n    { sk:'Spustiť verejný trial — 1.8., 25 ľudí, viac reštaurácií', en:'Launch the public trial — Aug 1, 25 people, multiple restaurants', deadline:'2026-08-01T00:00:00+02:00' },\n    { sk:'Prvý kontakt s Nooch Asian Kitchen', en:'First contact with Nooch Asian Kitchen', deadline:'2026-08-01T00:00:00+02:00' },\n    { sk:'Kúpiť label printer (Brother QL-820NWB) + fridge senzor (SensorPush)', en:'Buy the label printer (Brother QL-820NWB) + fridge sensor (SensorPush)', deadline:'2026-08-01T00:00:00+02:00' },\n    { sk:'Dokončiť Michelin-chef prepis (19/~131 hotových)', en:'Finish the Michelin-chef rewrite (19/~131 done)', deadline:'2026-08-01T00:00:00+02:00' },\n    { sk:'Founding-member ponuka naživo v appke, po prvom príjme', en:'Founding-member offer live in the app, after first revenue', deadline:'2026-08-01T00:00:00+02:00' },\n  ]},\n};\nfunction formatDeadline(d){\n  return d.toLocaleDateString(_statusLang==='sk'?'sk-SK':'en-GB', { day:'numeric', month:'short' }) + ', ' + d.toLocaleTimeString(_statusLang==='sk'?'sk-SK':'en-GB', { hour:'2-digit', minute:'2-digit' });\n}\nfunction deadlineBadge(iso){\n  const deadline = new Date(iso);\n  const now = new Date();\n  const hoursLeft = (deadline - now) / 3600000;\n  if(hoursLeft \u003c= 0) return `\u003cspan class=\"deadline-badge urgent\">${_statusLang==='sk'?'⏰ Po termíne':'⏰ Overdue'}\u003c/span>`;\n  if(hoursLeft \u003c= 50){\n    const h = Math.floor(hoursLeft);\n    const m = Math.round((hoursLeft - h) * 60);\n    const cls = hoursLeft \u003c= 12 ? 'urgent' : 'soon';\n    return `\u003cspan class=\"deadline-badge ${cls}\">⏳ ${h}h ${String(m).padStart(2,'0')}m ${_statusLang==='sk'?'do deadline':'to deadline'}\u003c/span>`;\n  }\n  return `\u003cspan class=\"deadline-badge plain\">${_statusLang==='sk'?'Deadline: ':'Deadline: '}${formatDeadline(deadline)}\u003c/span>`;\n}\nfunction renderTop5(){\n  const grid = document.getElementById('top5Grid');\n  if(!grid) return;\n  grid.innerHTML = ['day','week','month'].map(key=>{\n    const card = TOP5[key];\n    const items = card.items.map(it=>`\u003cli class=\"clickable-ticket\">\u003cspan class=\"task-text\">\u003c/span>${deadlineBadge(it.deadline)}\u003c/li>`).join('');\n    return `\u003cdiv class=\"top5-card\">\u003ch4>${_statusLang==='sk'?card.sk:card.en}\u003c/h4>\u003col>${items}\u003c/ol>\u003c/div>`;\n  }).join('');\n  // Fill in task text + wire up the same click-to-select behaviour as Prep board tickets,\n  // via DOM APIs (not string interpolation) so quotes/apostrophes in task text never break\n  // anything (2026-07-15, Richard's request to mirror the Prep board feature here too).\n  ['day','week','month'].forEach((key,cardIdx)=>{\n    const card = TOP5[key];\n    const li = grid.children[cardIdx].querySelectorAll('li');\n    card.items.forEach((it,i)=>{\n      const text = _statusLang==='sk' ? it.sk : it.en;\n      const el = li[i];\n      el.querySelector('.task-text').textContent = text;\n      el.dataset.enhanced = '1';\n      if(localStorage.getItem('chefos_status_selected_title') === text){\n        el.classList.add('selected-next');\n        const flag = document.createElement('span');\n        flag.className = 'ticket-next-flag';\n        flag.textContent = '🎯 Vybrané ako ďalšie';\n        el.insertBefore(flag, el.firstChild);\n      }\n      const actions = document.createElement('div');\n      actions.className = 'ticket-actions';\n      const workBtn = document.createElement('button');\n      workBtn.className = 'ticket-work-btn';\n      workBtn.textContent = '🎯 Pracovať na tomto teraz';\n      workBtn.dataset.title = text;\n      workBtn.dataset.desc = '';\n      workBtn.onclick = function(e){ e.stopPropagation(); selectTicketToWorkOn(this); };\n      const hintSpan = document.createElement('span');\n      hintSpan.className = 'ticket-copied-hint';\n      actions.appendChild(workBtn);\n      actions.appendChild(hintSpan);\n      el.appendChild(actions);\n      el.addEventListener('click', ()=> el.classList.toggle('open'));\n    });\n  });\n}\nrenderTop5();\nsetInterval(renderTop5, 60000);\n\n/* ---------- Click a ticket -> pick what to work on next (2026-07-15) ---------------------\n   Honest limit: this is a static file (file:// in the browser, no server) — a button here\n   physically cannot reach into a chat with Claude or start a session by itself. The closest\n   real equivalent: tap a ticket to open it, tap \"Work on this now\" to (a) mark it with a gold\n   \"next\" flag that persists on this device via localStorage, and (b) copy a ready-to-paste\n   message to the clipboard — so the actual hand-off is one tap + one paste into the chat,\n   instead of typing the ticket out from scratch. Only wired on Rozbehnuté/Blokované/Čaká —\n   Hotovo tickets are already done, nothing to queue there. ------------------------------- */\nfunction selectTicketToWorkOn(btn){\n  const title = btn.dataset.title;\n  const desc = btn.dataset.desc;\n  localStorage.setItem('chefos_status_selected_title', title);\n  document.querySelectorAll('.ticket.selected-next, li.selected-next').forEach(t=>{\n    t.classList.remove('selected-next');\n    const flag = t.querySelector('.ticket-next-flag');\n    if(flag) flag.remove();\n  });\n  const ticket = btn.closest('.ticket, li');\n  ticket.classList.add('selected-next');\n  if(!ticket.querySelector('.ticket-next-flag')){\n    const flag = document.createElement('span');\n    flag.className = 'ticket-next-flag';\n    flag.textContent = '🎯 Vybrané ako ďalšie';\n    ticket.insertBefore(flag, ticket.firstChild);\n  }\n  const hint = btn.parentElement.querySelector('.ticket-copied-hint');\n  const msg = desc ? `Chcem aby sme teraz pracovali na: \"${title}\" — ${desc}` : `Chcem aby sme teraz pracovali na: \"${title}\"`;\n  if(navigator.clipboard && navigator.clipboard.writeText){\n    navigator.clipboard.writeText(msg).then(()=>{\n      hint.textContent = '✓ Skopírované — vlož do chatu s Claude';\n    }).catch(()=>{\n      hint.textContent = 'Napíš Claude: \"' + title + '\"';\n    });\n  } else {\n    hint.textContent = 'Napíš Claude: \"' + title + '\"';\n  }\n  setTimeout(()=>{ if(hint) hint.textContent=''; }, 5000);\n}\nfunction enhanceTickets(){\n  document.querySelectorAll('.col-prog .ticket, .col-block .ticket, .col-wait .ticket').forEach(ticket=>{\n    if(ticket.dataset.enhanced) return;\n    ticket.dataset.enhanced = '1';\n    const titleEl = ticket.querySelector('b');\n    const descEl = ticket.querySelector('span');\n    const title = titleEl ? titleEl.textContent.trim() : ticket.textContent.trim().slice(0,60);\n    const desc = descEl ? descEl.textContent.trim() : '';\n    ticket.classList.add('clickable-ticket');\n    if(localStorage.getItem('chefos_status_selected_title') === title){\n      ticket.classList.add('selected-next');\n      const flag = document.createElement('span');\n      flag.className = 'ticket-next-flag';\n      flag.textContent = '🎯 Vybrané ako ďalšie';\n      ticket.insertBefore(flag, ticket.firstChild);\n    }\n    const actions = document.createElement('div');\n    actions.className = 'ticket-actions';\n    const workBtn = document.createElement('button');\n    workBtn.className = 'ticket-work-btn';\n    workBtn.textContent = '🎯 Pracovať na tomto teraz';\n    workBtn.dataset.title = title;\n    workBtn.dataset.desc = desc;\n    workBtn.onclick = function(e){ e.stopPropagation(); selectTicketToWorkOn(this); };\n    const hintSpan = document.createElement('span');\n    hintSpan.className = 'ticket-copied-hint';\n    actions.appendChild(workBtn);\n    actions.appendChild(hintSpan);\n    ticket.appendChild(actions);\n    ticket.addEventListener('click', ()=> ticket.classList.toggle('open'));\n  });\n}\nenhanceTickets();\nrenderPulse();\n\n/* Active-section highlight in the sticky nav. */\n(function initPageNav(){\n  const links = Array.from(document.querySelectorAll('#pageNav a[href^=\"#\"]'));\n  const sections = links.map(a => document.getElementById(a.getAttribute('href').slice(1)));\n  const observer = new IntersectionObserver((entries)=>{\n    entries.forEach(entry=>{\n      if(!entry.isIntersecting) return;\n      const id = entry.target.id;\n      links.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + id));\n    });\n  }, { rootMargin: '-30% 0px -60% 0px', threshold: 0 });\n  sections.forEach(s => s && observer.observe(s));\n})();\n\u003c/script>\n\u003c/div>\n\n\u003cdiv class=\"chefos-stamp\" data-sk=\"🔄 Stav Sautero k 18. 7. 2026, 08:40\" data-en=\"🔄 Sautero state as of Jul 18, 2026, 08:40\">🔄 Stav Sautero k 18. 7. 2026, 08:40\u003c/div>\n\u003c/body>\n\u003c/html>\n", "\u003c!doctype html>\n\u003chtml lang=\"en\" data-theme=\"dark\">\n\u003chead>\n\u003cmeta charset=\"utf-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n\u003ctitle>Sautero — Planning\u003c/title>\n\u003cstyle>\n  /* Sautero standing visual identity (2026-07-11) — same palette/fonts as app/board.html. */\n  :root{\n    --bg:#0A1A2F; --paper:#122845; --paper-raised:#0f2340;\n    --ink:#fff; --ink-dim:#9C949E; --ink-faint:rgba(156,148,158,0.6);\n    --rule:#223d57; --accent:#34F7D7; --accent-dim:rgba(52,247,215,0.4);\n    --gold:#F7C948; --gold-dim:rgba(247,201,72,0.4);\n    --shadow:0 8px 28px rgba(0,0,0,0.45);\n  }\n  *{ box-sizing:border-box; }\n  html,body{ margin:0; padding:0; }\n  body{\n    background:var(--bg); color:var(--ink);\n    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;\n    -webkit-font-smoothing:antialiased; line-height:1.5;\n  }\n  .wrap{ max-width:1040px; margin:0 auto; padding:0 24px 100px 24px; }\n  a{ color:var(--accent); }\n\n  header.hero{ padding:56px 0 34px 0; border-bottom:1px solid var(--rule); }\n  .kicker{ color:var(--accent); font-size:12px; letter-spacing:0.18em; text-transform:uppercase; font-weight:600; margin-bottom:10px; }\n  h1.title{ font-size:38px; font-weight:700; margin:0 0 14px 0; }\n  h1.title b{ color:var(--accent); font-weight:700; }\n  .lede{ color:var(--ink-dim); font-size:15px; max-width:66ch; line-height:1.65; }\n\n  .lang-toggle{\n    background:var(--paper); border:1px solid var(--rule); color:var(--ink-dim);\n    font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;\n    padding:6px 12px; border-radius:20px; cursor:pointer; transition:border-color .15s, color .15s;\n  }\n  .lang-toggle:hover{ border-color:var(--accent-dim); color:var(--accent); }\n  .topline{ display:flex; align-items:center; justify-content:space-between; }\n\n  section{ padding:44px 0; border-bottom:1px solid var(--rule); }\n  section:last-of-type{ border-bottom:none; }\n  h2.section-title{ font-weight:700; font-size:24px; margin:0 0 8px 0; }\n  .section-desc{ color:var(--ink-dim); font-size:13.5px; max-width:68ch; margin-bottom:24px; line-height:1.6; }\n\n  /* Top-3 priority cards */\n  .top3-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }\n  @media (max-width:820px){ .top3-grid{ grid-template-columns:1fr; } }\n  .top3-card{ background:var(--paper); border:1px solid var(--rule); border-radius:16px; padding:20px 18px; }\n  .top3-scope{ font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--accent); font-weight:700; margin-bottom:2px; }\n  .top3-range{ font-size:11.5px; color:var(--ink-faint); margin-bottom:14px; }\n  .top3-list{ list-style:none; margin:0; padding:0; }\n  .top3-item{ display:flex; gap:10px; align-items:flex-start; padding:9px 0; border-top:1px solid var(--rule); font-size:13px; color:var(--ink); }\n  .top3-item:first-child{ border-top:none; }\n  .top3-dot{ flex:0 0 auto; width:9px; height:9px; border-radius:50%; margin-top:4px; }\n  .top3-dot.done{ background:var(--accent); }\n  .top3-dot.progress{ background:var(--gold); }\n  .top3-dot.planned{ background:var(--ink-faint); }\n  .top3-status{ display:block; font-size:10.5px; text-transform:uppercase; letter-spacing:0.04em; margin-top:2px; }\n  .top3-status.done{ color:var(--accent); }\n  .top3-status.progress{ color:var(--gold); }\n  .top3-status.planned{ color:var(--ink-faint); }\n\n  /* Timeline accordion: month > week > day */\n  .month-block{ border:1px solid var(--rule); border-radius:16px; background:var(--paper); margin-bottom:14px; overflow:hidden; }\n  .month-head{ padding:16px 18px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; user-select:none; }\n  .month-head:hover{ background:var(--paper-raised); }\n  .month-name{ font-size:17px; font-weight:700; }\n  .month-meta{ font-size:11.5px; color:var(--ink-faint); font-family:\"SF Mono\",Menlo,monospace; }\n  .month-body{ display:none; padding:0 18px 18px 18px; }\n  .month-block.open > .month-body{ display:block; }\n  .month-block.open > .month-head .chev{ transform:rotate(90deg); }\n  .chev{ display:inline-block; transition:transform 0.15s ease; color:var(--ink-faint); margin-left:8px; }\n\n  .week-block{ border:1px solid var(--rule); border-radius:12px; margin-top:12px; }\n  .week-head{ padding:12px 14px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; user-select:none; }\n  .week-head:hover{ background:var(--paper-raised); }\n  .week-name{ font-size:13.5px; font-weight:600; }\n  .week-meta{ font-size:11px; color:var(--ink-faint); font-family:\"SF Mono\",Menlo,monospace; }\n  .week-body{ display:none; padding:0 14px 14px 14px; }\n  .week-block.open .week-body{ display:block; }\n  .week-block.open .chev{ transform:rotate(90deg); }\n\n  .day-row{ border-top:1px solid var(--rule); }\n  .day-row:first-child{ border-top:none; }\n  .day-head{ padding:11px 4px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; user-select:none; }\n  .day-head:hover .day-title{ color:var(--accent); }\n  .day-date{ font-family:\"SF Mono\",Menlo,monospace; font-size:11.5px; color:var(--ink-faint); min-width:78px; }\n  .day-title{ font-size:13px; color:var(--ink); flex:1; padding:0 10px; }\n  .day-body{ display:none; padding:2px 4px 16px 4px; }\n  .day-row.open .day-body{ display:block; }\n  .day-row.open .chev{ transform:rotate(90deg); }\n  .day-flex{ display:flex; align-items:flex-start; gap:0; }\n\n  .accomplished-list{ list-style:none; margin:8px 0 0 88px; padding:0; }\n  .accomplished-list li{ font-size:12.5px; color:var(--ink-dim); line-height:1.6; padding:3px 0; position:relative; padding-left:16px; }\n  .accomplished-list li::before{ content:'✓'; position:absolute; left:0; color:var(--accent); }\n  .day-planned{ margin:10px 0 0 88px; font-size:12px; color:var(--ink-faint); font-style:italic; }\n  .day-planned b{ color:var(--gold); font-style:normal; }\n\n  footer.foot{ text-align:center; font-size:11.5px; color:var(--ink-faint); padding:40px 0 20px 0; }\n\n  /* ---------- Log stats strip + controls (2026-07-15 Visual Data Standards redesign) ---------- */\n  .log-stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:1px; margin-top:24px; background:var(--rule); border:1px solid var(--rule); border-radius:14px; overflow:hidden; }\n  .log-stat{ background:var(--paper); padding:14px 16px; }\n  .log-stat .v{ font-family:\"SF Mono\",Menlo,monospace; font-size:22px; font-weight:700; color:var(--accent); font-variant-numeric:tabular-nums; line-height:1; }\n  .log-stat .k{ font-size:10.5px; text-transform:uppercase; letter-spacing:0.07em; color:var(--ink-dim); margin-top:6px; }\n  .chart-card{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:16px 18px 12px 18px; margin-bottom:16px; }\n  .chart-scroll{ overflow-x:auto; scrollbar-width:thin; }\n  .chart-scroll svg text{ font-family:\"SF Mono\",Menlo,monospace; }\n  .chart-scroll .bar{ cursor:pointer; }\n  .chart-scroll .bar:hover{ opacity:.8; }\n  .day-row.flash > .day-head{ background:rgba(52,247,215,0.12); border-radius:8px; }\n  .tl-controls{ display:flex; align-items:center; gap:8px; margin-bottom:14px; flex-wrap:wrap; }\n  #logSearch{\n    flex:1; min-width:150px; background:var(--paper); border:1px solid var(--rule); border-radius:20px;\n    color:var(--ink); font-family:inherit; font-size:12px; padding:6px 14px; outline:none;\n  }\n  #logSearch::placeholder{ color:var(--ink-faint); }\n  #logSearch:focus{ border-color:var(--accent-dim); }\n  .fbtn{\n    background:var(--paper); border:1px solid var(--rule); color:var(--ink-dim);\n    font-size:10.5px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase;\n    padding:5px 11px; border-radius:20px; cursor:pointer; transition:border-color .15s, color .15s; white-space:nowrap;\n  }\n  .fbtn:hover{ border-color:var(--accent-dim); color:var(--accent); }\n  mark{ background:rgba(52,247,215,0.25); color:var(--ink); border-radius:3px; padding:0 1px; }\n\n  /* ---------- Sautero stamp + language fab (Richard, 15.7.: every /visual data/ document\n     carries a last-updated-to-Sautero-state badge and an SK/EN toggle) ---------- */\n  .chefos-stamp{\n    position:fixed; bottom:14px; right:14px; z-index:90;\n    background:rgba(15,35,64,0.92); border:1px solid rgba(52,247,215,0.4); color:#34F7D7;\n    font-size:10.5px; font-weight:700; font-family:\"SF Mono\",Menlo,Consolas,monospace;\n    padding:6px 12px; border-radius:999px;\n    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); pointer-events:none;\n  }\n  .chefos-lang-fab{\n    position:fixed; bottom:14px; left:14px; z-index:90;\n    background:rgba(15,35,64,0.92); border:1px solid #223d57; color:#9C949E;\n    font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;\n    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;\n    padding:7px 14px; border-radius:999px; cursor:pointer;\n    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);\n    transition:border-color .15s, color .15s;\n  }\n  .chefos-lang-fab:hover{ border-color:rgba(52,247,215,0.4); color:#34F7D7; }\n  @media print{ .chefos-stamp, .chefos-lang-fab{ display:none; } }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\u003cdiv class=\"wrap\">\n\n  \u003cheader class=\"hero\">\n    \u003cdiv class=\"topline\">\n      \u003cdiv class=\"kicker\" data-sk=\"Sautero — Plánovanie a postup\" data-en=\"Sautero — Planning &amp; Progress\">\u003c/div>\n      \u003cbutton class=\"lang-toggle\" id=\"langBtn\" onclick=\"toggleLang()\">EN\u003c/button>\n    \u003c/div>\n    \u003ch1 class=\"title\">Plan\u003cb>ning\u003c/b>\u003c/h1>\n    \u003cp class=\"lede\" data-sk=\"Hotovo vs. plánované, v troch časových rámcoch. Top priority pre dnes/tento týždeň/tento mesiac a rozkliknuteľný denník všetkého odpracovaného — zoskupený podľa týždňa a mesiaca, aby to zostalo čitateľné aj s rastom.\" data-en=\"Done vs. planned, at three timeframes. Top priorities for today/this week/this month, and a click-to-expand log of every day worked — grouped by week and month so this stays readable as it grows.\">\u003c/p>\n    \u003cdiv class=\"log-stats\" id=\"logStats\">\u003c/div>\n  \u003c/header>\n\n  \u003csection id=\"top3\">\n    \u003ch2 class=\"section-title\" data-sk=\"Top 3 priority\" data-en=\"Top 3 priorities\">\u003c/h2>\n    \u003cp class=\"section-desc\" data-sk=\"Aktualizované každú session. Tyrkysová = hotovo, zlatá = rozpracované, sivá = naplánované, ešte nezačaté.\" data-en=\"Updated each session. Teal = done, gold = in progress, grey = planned but not started.\">\u003c/p>\n    \u003cdiv class=\"top3-grid\" id=\"top3Grid\">\u003c/div>\n  \u003c/section>\n\n  \u003csection id=\"timeline\">\n    \u003ch2 class=\"section-title\" data-sk=\"Denník deň po dni\" data-en=\"Day-by-day log\">\u003c/h2>\n    \u003cp class=\"section-desc\" data-sk=\"Klikni na mesiac, potom na týždeň, potom na deň — uvidíš presne, čo sa vtedy dorobilo.\" data-en=\"Click a month, then a week, then a day to see exactly what shipped.\">\u003c/p>\n    \u003c!-- Pace chart (Richard, 17.7.): accomplishments per day — click a bar to open that day. -->\n    \u003cdiv class=\"chart-card\">\n      \u003ch3 style=\"margin:0 0 12px 0; font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-dim);\" data-sk=\"Úspechy za deň — klikni na stĺpec\" data-en=\"Accomplishments per day — click a bar\">\u003c/h3>\n      \u003cdiv id=\"paceChart\" class=\"chart-scroll\">\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"tl-controls\">\n      \u003cinput id=\"logSearch\" type=\"search\" placeholder=\"Hľadať v denníku…\" oninput=\"searchLog()\">\n      \u003cbutton class=\"fbtn\" onclick=\"expandAllLog(true)\" data-sk=\"Rozbaliť všetko\" data-en=\"Expand all\">\u003c/button>\n      \u003cbutton class=\"fbtn\" onclick=\"expandAllLog(false)\" data-sk=\"Zbaliť všetko\" data-en=\"Collapse all\">\u003c/button>\n    \u003c/div>\n    \u003cdiv id=\"timelineRoot\">\u003c/div>\n  \u003c/section>\n\n  \u003cfooter class=\"foot\" id=\"footNote\">\u003c/footer>\n\u003c/div>\n\n\u003cscript>\n/* ============================================================\n   DATA — the only part of this file that should need editing.\n   Add a new day by pushing one object to DAYS; week/month grouping\n   is computed automatically. Keep TOP3 current each session.\n   ============================================================ */\nconst GENERATED = '2026-07-18';\n\nconst TOP3 = {\n  day: {\n    range: 'Sobota 18. 7. 2026',\n    items: [\n      { text: '🏷️ REBRAND: nová značka Sautero — appka, všetky dokumenty a e-maily premenované; technické kľúče a app.chefos.ch sa presunú po kúpe domén (Richard: sautero.ch + sautero.com, ~25 CHF)', status: 'done' },\n      { text: '8-bodový zoznam dokončený: tímový join s jasným varovaním, sken ukladá do správneho zoznamu, 🏢 Company Ingredients polica, HTML/text podpora vo všetkých skenoch + silnejšia extrakcia dodávateľa', status: 'done' },\n      { text: 'Investor deck hĺbkovo aktualizovaný: 183 receptov / 2 005 ingrediencií / 13 účtov, donut 77-25-7, nový stĺpcový graf hodín buildu s tap-detailom', status: 'done' },\n    ]\n  },\n  week: {\n    range: 'Týždeň 13. 7. – 19. 7. 2026',\n    items: [\n      { text: 'Community vrstva nasadená: verejné police (recepty + ingrediencie), zdieľanie po položkách verejne/priateľom, komentáre naprieč kuchyňami', status: 'done' },\n      { text: 'Maratón 16. 7.: skutočné súkromie dát, reálne členstvo v tíme, rolový admin, Kitchen Reports, centrálny AI kľúč', sta
