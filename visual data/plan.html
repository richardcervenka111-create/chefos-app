t167:{t:\"The share-grant onto a server-side voucher (free AI for sharing a recipe)\", d:\"The \\\"_share_grant\\\" flag is declared by the client — a technically savvy user could bypass the credit gate with it. An accepted risk for the pre-trial phase (impact = one AI call); before the trial tighten it to a server-issued one-time voucher in claude-proxy.\", r:\"Claude — the edge function\"},\n t168:{t:\"A live RLS test of \\\"Mine\\\" privacy from two accounts\", d:\"The last orange item from the 17 Jul test series: save a recipe into \\\"Mine\\\" on a personal account, verify from a second account of the same kitchen that it's visible nowhere (not even via search). The mechanism has been in RLS since db/97; it just needs human confirmation.\", r:\"ONLY YOU — 5 minutes\"},\n t170:{t:\"Recipe printing in each restaurant's identity (point 4, 18 Jul)\", d:\"Richard's request: every new restaurant gets recipe printing in its OWN identity — colours, font, logo — just like our branded print today. Design: the kitchens table gets brand fields (primary/secondary colour, logo URL, font choice), the print template reads them; configured in Admin → kitchen. Part of onboarding a new restaurant.\", r:\"Claude — after the rebrand\"},\n t171:{t:\"Day context vs. revenue: weather, weekday, holidays (point 5, 18 Jul)\", d:\"Collect daily context (weather from an open API for the kitchen's location, the weekday, Swiss national/cantonal holidays) and correlate it with revenue/orders in Kitchen Reports — \\\"rainy Tuesdays = −18% lunches\\\". Prerequisite: revenue data (we don't have it yet — comes with a POS integration or a manual daily revenue entry). A post-trial phase.\", r:\"Claude — after the trial\"},\n t172:{t:\"🎪 The Events tile (point 1, 18 Jul) — TO FINISH\", d:\"A new Events tile: everything yet to happen (e.g. a banquet, 35 people, a three-course menu). At the top a New Event button — manual entry (what kind of event, for whom, how many people, which menu, price, date/time) OR Scan: photograph the order/e-mail/contract and AI recognises the event type, client, headcount, menu and price and adds it to the list (the same vision pattern as Invoice Scan). Below New Event two columns side by side: Today's events | Tomorrow's events; further days in a list below, nearest one right at the top. Reconfirmed 18 Jul (point 3) + add a demo example so the tile isn't empty right after opening.\", r:\"Claude — to finish\"},\n t175:{t:\"📄 Old documents (Now, Monetisation) to the click-for-detail pattern like the feature map\", d:\"Richard, 18 Jul (point 2): Plan → Now has a top \\\"jump nav\\\" (Timeline, Keep in mind…) and Business → Monetisation, clicking a model — both are an old always-expanded page, not the click-and-detail-appears pattern feature_status.html uses. Also a complaint that content \\\"isn't pinned to the sides\\\" (layout/width). Standing rule from now on for EVERY document — new ones already work this way, these two old ones need rebuilding.\", r:\"Claude\"},\n t176:{t:\"🎨 Overhaul Brand & Vision (Investor Deck, Manifesto, Visual Guide) — more accurate data from the chat\", d:\"Richard, 18 Jul (point 4): all three documents can be made better and more accurate based on the real history and notes from this chat. Don't forget the English translation for every point (not just chrome, content too).\", r:\"Claude\"},\n t177:{t:\"🛡️ Head Admin edit-priority everywhere + Admin Directory: Edit / View as user\", d:\"Richard, 18 Jul (point 6): the main admin takes priority in editing over everyone and everything. In Admin Directory, tapping any user opens a panel with 1. Edit 2. View their perspective of the app including their data — Richard can edit everything exactly as with his own functions. Builds on the existing \\\"Preview as Normal User\\\" (16 Jul) — needs extending to pick a SPECIFIC user + actual editing, not just a preview.\", r:\"Claude\"},\n t178:{t:\"✏️ Head Admin: rename any TEAM/kitchen at any time\", d:\"Richard, 18 Jul (point 7): as main admin he wants the ability to change the name of any TEAM/kitchen whenever he sees fit — not just at the moment it's created.\", r:\"Claude\"},\n t179:{t:\"🧽 HACCP Cleaning checklist — improve the demo/content\", d:\"Richard, 18 Jul: after verifying the demo cleaning checklist (\\\"found it, it's fine\\\") he noted this will get more work later — more accurate/realistic content than 5 generic demo tasks.\", r:\"Claude — later\"},\n t181:{t:\"🔍 TODAY 19 Jul: complete verification of ALL features with Richard — checklist ready\", d:\"Richard (19 Jul at night, before sleep): \\\"when I wake up, we go through a complete check of every feature.\\\" docs/FEATURE_VERIFICATION_CHECKLIST.md prepared — 15 sections (login/gates, Check List, Order List, Recipes, Ingredients, Events, HACCP, Working Time, Connections, Print Labels, Assistant, Settings, Admin, Documents, cross-cutting sweeps), each in 4 perspectives: Head Admin/member × personal/company. Includes the \\\"missing things\\\" list — every item gets a verdict: hidden by role/mode vs. actually broken. Known gaps up front: ingredient lists and recipe projects still lack the personal split; decide events per-mode.\", r:\"Richard + Claude together\"},\n t180:{t:\"🗄️ Supabase consolidation — Phase 1 DONE 19 Jul, next Phase 2 + final drop 26 Jul\", d:\"SUPABASE_CONSOLIDATION_PLAN.md (49 tracked → target ~24 tables). Phase 1 executed 19 Jul (db/157): measurement showed only 47 tables actually lived in production — the empty \\\"feedback\\\" table renamed to zz_retired_feedback (one week in quarantine, definitive drop 26 Jul after Richard's approval, reminder scheduled); profile_private and schedule_entries never existed in production. Next: Phase 2 (icons→JSONB, consents merge, custom_ingredients→ingredients) before the trial; Phases 3–4 (lists, HACCP/schedule journals) only AFTER the trial starts.\", r:\"Claude + Richard approves drops\"},\n t173:{t:\"🎙️ Voice control of the app, even with the phone locked (point 4, 18 Jul) — a note\", d:\"Richard's request: control the app by voice (\\\"add to the check list…\\\"), ideally even with the display locked. Technical reality: a web app/PWA on iOS CANNOT listen while the phone is locked (the Safari microphone only runs with the page open). The real path: (a) Web Speech API in the app for dictation/commands with the phone unlocked, (b) locked = the native app + Siri Shortcuts/App Intents (\\\"Hey Siri, Sautero add…\\\") — belongs to Phase 6 (the native app). Just a note for now, not started.\", r:\"a note — Phase 6\"},\n t174:{t:\"🌐 ✅ Translations: full SK/EN coverage of ALL documents — DONE 18 Jul night\", d:\"State 18 Jul late evening: ✅ the feature map (112/112), ✅ History (15 days + day 18), ✅ the Diary (12 days EN), ✅ the investor deck, ✅ costs/automation (already bilingual). Remaining: monetization (SK→EN + a toggle), the Now tickets, the Roadmap tasks, Manifesto + Visual Guide (EN→SK). The original audit: the Diary (SK → EN), Manifesto + Visual Guide (EN → SK), the deck data (EN → SK). ~30,000 words, doc by doc. The standing rule: new content is born bilingual, the debt must never grow.\", r:\"Claude — progressively\"},\n t169:{t:\"Translate 105 feature descriptions into English (feature_status)\", d:\"The SK/EN toggle has been everywhere since 17 Jul, the documents' chrome is bilingual — the bodies of the 105 features in the Feature map stayed Slovak (honestly admitted in the EN view). The translation makes sense at the latest when the first English-speaking partner/investor sees the documents.\", r:\"Claude — on your word\"},\n t35:{t:\"An RLS security audit · uptime monitoring · a support channel · an Innosuisse/Venturelab grant · a live test on a real iOS device\", d:\"All from v1 — remains. Two specific missing RLS cases (kitchens UPDATE, station_icons DELETE) already fixed in 48_kitchens_and_station_icons_policy_fix.sql.\"},\n t36:{t:\"Adopt a deploy order: staging → the regression checklist → prod (never the other way)\", d:\"It's not a task, it's a habit — but it must be decided once and kept. Combines three v2 items (Git, staging, the checklist) into one workflow.\", r:\"CTO + QA\"},\n t37:{t:\"A penetration look at the access gate and invite links before growth\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Resolved 13 Jul:\u003c/b> the new kitchen_invites token (7-day expiry, revocable) replaced the bare kitchen id in the link; \\\"Revoke &amp; get new link\\\" added plus a team-member list with an admin-only \\\"Remove\\\". You still need to run db/53_invite_expiry_and_remove_member.sql.\", r:\"Resolved\"},\n t38:{t:\"Define the product's \\\"north star\\\" metric\", d:\"One number that tracks product health across all phases — for Sautero probably \\\"the number of kitchens that used the Check List during real service this week\\\". Everything else (features, design, AI) serves this number.\", r:\"PM + Founder\"},\n t39:{t:\"Consider a dedicated support/monitoring channel beyond email — e.g. a simple status-page for pilot kitchens\", d:\"A new idea: when the app is down or struggling, kitchens today only find out because something doesn't work. Even a simple one-page \\\"is Sautero okay?\\\" would cut the needless messages to you during service.\", r:\"My recommendation\"},\n t40:{t:\"The app sometimes loads too long — we want it instant\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Resolved 13 Jul:\u003c/b> loadAppData() (called on every screen open) awaited 11 independent Supabase queries one after another instead of at once — switched to Promise.all, the wait should drop to roughly the slowest single query instead of the sum of all 11. Still needs a real-life feel test.\", r:\"Resolved\"},\n t41:{t:\"The Pricing filter in Ingredients — rebuilt as a from-to price range\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Resolved 13 Jul:\u003c/b> the old Verified/Estimated/Missing chips (they tripled themselves, the cause never found by static reading) replaced with a simple Min/Max range — exactly per Richard's brief. Inputs are in the kitchen's current display currency (EUR/CHF/USD), converted to EUR for comparison with the stored price. Deployed and verified live.\", r:\"Resolved\"},\n t42:{t:\"Unifying the app's visual identity with the documents (navy/teal)\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Resolved 13 Jul — at Richard's request:\u003c/b> the app had a deliberately different warm scheme (copper/charcoal) from the documents. Now converted to the same navy/teal palette as presentation/planning/backlog/status/tasklist — the main accent now teal (#34F7D7), secondary gold (#F7C948), backgrounds/text unified. The logo and wordmark recoloured teal, the QR code stayed black-and-white (a functional reason — scannability). A purely colour change, structural integrity verified.\", r:\"Resolved\"},\n t43:{t:\"A \\\"Show me\\\" button in the Ingredients search\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Resolved 13 Jul:\u003c/b> right next to the search field in Search &amp; Filter a \\\"Show me\\\" button appeared — closes the filter sheet and shows the filtered list immediately, without scrolling down to \\\"Close\\\".\", r:\"Resolved\"},\nt44:{t:\"A reward system for users who fill in Yield %\", d:\"Richard's observation (13 Jul, a personal priority): reducing food waste must permanently be one of Sautero's priorities — \\\"I've seen more food thrown away than I could eat in 1000 lifetimes\\\". The idea: when someone fills in Yield % on an ingredient (voluntary, nobody must), reward/recognise them in the app — motivation to add the data that directly cuts waste. Not yet specified how exactly (points? a badge? a kitchen leaderboard?) — think it through with Richard before building.\", r:\"Richard's priority — needs thought\"},\nt45:{t:\"Chef Challenge — contests/challenges for chefs (first version)\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Resolved 13 Jul (first version):\u003c/b> Richard's brief \\\"create a menu but only with ingredients under 1 CHF\\\" built as the new 🎯 Chef Challenge tile on Home — the chef sets a price cap, the app finds real ingredients from the kitchen's own price book under that cap (not AI guesses), generates 5 dish ideas from that list only, and writes the full recipe for the picked one, editable before saving. Reuses the existing Ask Chef's Assistant AI engine with a different brief.\u003cbr>\u003cbr>\u003cb>This is only the first concrete step\u003c/b> — Richard spoke more broadly about \\\"contests\\\" for chefs. The wider version (recurring challenges, several teams/kitchens at once, a leaderboard, voting, other constraint types than price) is an open topic to discuss with Richard before building further.\", r:\"v1 done, the wider vision open\"},\nt46:{t:\"The monetisation document in our visual + an action plan\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Resolved 13 Jul:\u003c/b> Richard's monetisation workshop (10 models, an expert panel) converted to navy/teal as monetization.html. Claude added model 11 (paid training/workshops — the only model independent of a finished product, kept as the premium onboarding variant) and the \\\"what happens right now\\\" action plan. The panel's unanimous conclusion: onboarding CHF ~990 + a founding annual subscription = the whole 12-month plan; the blockers aren't product ones but legal (t47, t48).\", r:\"Resolved\"},\nt47:{t:\"🔴 The side-business consent — the employer's written approval (revenue blocker #1)\", d:\"Without the employer's written consent to gainful side work no first payment may be accepted. \u003cb>The draft request is ready in docs/NEBENERWERB_REQUEST.md\u003c/b> (a DE letter + checklist) — fill in the name, check the clause in your Burrito Bandito/Lido contract, send. 10 minutes of work, unblocks all models. \u003cb style=\\\"color:var(--gold);\\\">Richard committed on 16 Jul to resolve by 20 Jul 26.\u003c/b>\", r:\"ONLY YOU — 10 minutes, due 20 Jul 26\"},\nt48:{t:\"🔴 Sole proprietorship + AHV registration (revenue blocker #2)\", d:\"The first invoice needs an invoicing entity — a sole proprietorship suffices (registering as selbständig via the AHV office of canton Bern; no commercial register below CHF 100k turnover, no VAT either). Estimate 1–2 hours online + tens of CHF. The GmbH stays the \\\"after revenue\\\" goal, exactly per the original plan. \u003cb style=\\\"color:var(--gold);\\\">Richard committed on 16 Jul to resolve by 20 Jul 26.\u003c/b>\", r:\"ONLY YOU — 1-2 hours, due 20 Jul 26\"},\nt49:{t:\"The founding-member offer right in the app\", d:\"After t47+t48: a \\\"Founding member\\\" card/page for trial users — they see the offer (draft: docs/FOUNDING_OFFER.md), tap \\\"I'm interested\\\", Richard gets an email. No payment gateway at the start — a manual invoice suffices up to 20 kitchens. Claude builds it once Richard confirms the prices.\", r:\"Claude — awaits t47/t48 + prices\"},\nt50:{t:\"An own domain + a business email instead of the personal Gmail\", d:\"Richard (13 Jul): doesn't want his personal mail in the app/business. \u003cb style=\\\"color:var(--accent);\\\">Resolved 15 Jul:\u003c/b> the domain bought, verified in Resend, custom SMTP on, the app on its own address — Richard tested the whole flow live (HTTPS, email link, automatic sign-in). Resend blocker #3 and the business email solved in one step.\", r:\"Resolved\"},\nt51:{t:\"🔴 Extend ingredients with supplier data — done on staging, AWAITING YOU on production\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Resolved 13 Jul:\u003c/b> preisliste-brutto-2026-komplett.pdf downloaded and processed — it's the SAME Caviezel Giovanettoni catalogue already partly covered by db/46 (104 items), so I compared and added only what was genuinely missing: 17 fruit purées (Boiron, pro pastry ingredients), a few missing vegetable/dairy items, and above all — exactly per your local-suppliers request — \u003cb>13 regional cheeses straight from the Lake Constance/Thurgau area\u003c/b> (suppliers Hungerbühler, Strähl, Müller-Thurgau), plus 7 more European cheeses and 6 pasta types. 49 new items in total, db/58_supplier_ingredients_expansion.sql, \u003cb style=\\\"color:var(--accent);\\\">tested on staging (works, 153 supplier prices in total, no errors)\u003c/b>. \u003cb style=\\\"color:var(--danger);\\\">db/58 still needs running on production\u003c/b> — I have no access there. Note: \\\"Tilsiter\\\" (new) and \\\"Tilsiter AOP\\\" (old, an AI estimate) now sit side by side — I didn't merge them automatically, check in Ingredient Audit when you have time.\", r:\"Awaiting db/58 on production\"},\nt52:{t:\"Model 12: sponsored placement of local suppliers\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Answered 13 Jul\u003c/b> (Richard's question whether ads for local products would work): yes, it's possible, and it's added to monetization.html as model 12. Technically easy (a \\\"recommended local supplier\\\" tag on an ingredient, no API integration needed), but premature — no point selling suppliers visibility until the app has real volume (at least 20-30 active trial kitchens). Until then the app is building exactly the data (the origin field, supplier + article number on every db/46+db/58 ingredient) that will later make this ad sellable.\", r:\"Answered, postponed to after the trial\"},\nt53:{t:\"🔴 The ingredient database extended to 2,000 — done on staging, AWAITING YOU on production\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Resolved 13 Jul:\u003c/b> Richard's brief \\\"reach 2,000 ingredients with all data\\\". 646 new items added (db/59): meat cuts incl. game and offal, Swiss IGP/AOP sausages and cheeses (Boutefas, Longeole, L'Etivaz, Mont-d'Or…), fish by species, vegetable/potato/fruit varieties, mushrooms, pulses, flours, a pro pantry (Asian/Middle-Eastern/European), oils, vinegars, cooking alcohol, honeys, bakery and modernist textures. Every item has price, nutrition, storage, seasons, origin and substitutes — prices are \u003cb>honestly flagged as estimates\u003c/b> (unlike db/46+58 which carry real catalogue prices). Tested on staging: exactly 2,000 rows, 100% priced. \u003cb style=\\\"color:var(--danger);\\\">Run db/58 and db/59 on production\u003c/b> (in that order). Bonus: fixed the bug where the app silently showed only the first 1,000 ingredients (the Supabase REST cap) — hence the app (1,000) vs. the deck (1,263) mismatch.\", r:\"Awaiting db/58+59 on production\"},\nt54:{t:\"Team Meetings — a new Home tile (placeholder)\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Resolved 13 Jul:\u003c/b> Richard wanted the tile reserved right away, features to be decided later (\\\"feel free to write 'we work on it'\\\"). The 🗣️ Team Meetings tile added to Home; tapping shows \\\"We're working on it\\\" — no logic yet. Candidates for real content when we return: an auto-agenda from open priority-1 Check List items + today's Schedule, a shared daily note, or a meeting log.\", r:\"Placeholder shipped\"},\nt55:{t:\"A new feature: a banner for a 2+ day supply outage\", d:\"Richard (13 Jul): the day before a 2+ day supply stop, a banner should appear at the top of the app. The data source clarified: public holidays + information from suppliers (not manual admin entry). Deliberately postponed — we'll settle later exactly how the app merges the two sources into one outage date.\", r:\"Postponed — later\"},\nt56:{t:\"The Check List Delete button asks but doesn't delete\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Fixed 13 Jul:\u003c/b> a Supabase update under RLS can match 0 rows and still return no error — the confirmation dialog shows, but nothing changes in the database while the app pretends it's done. Fixed in deletePrepItem/deletePrepDish/deleteStation: the app now checks whether the update actually changed anything, and if not, reports it clearly + logs to error_logs (we'll see the exact ID next time) + reloads server data instead of failing silently. I had no live-app access to reproduce — tell me whether deleting truly works now.\", r:\"Verify live\"},\nt57:{t:\"Phone hygiene in the kitchen — researched\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Answered 13 Jul\u003c/b> (Richard's question): yes, it's a real risk — both the FDA and the UK FSA officially class phones/tablets in kitchens as high-risk items; Salmonella/E. coli survives on a touchscreen 24+ hours. It doesn't mean a kitchen phone app is a no-go — it means clear rules: the phone in a stand/holder (not in hands over ingredients), washed hands before/after touching, daily wiping with 70% isopropyl alcohol, no contact with wet/floury hands. I recommend a short note about this in kitchen onboarding.\", r:\"Answered\"},\nt58:{t:\"The AI prep-sheet scan didn't work\", d:\"\u003cb style=\\\"color:var(--accent);\\\">The real cause found and fixed 13 Jul:\u003c/b> Richard reported \\\"Failed to send a request to the Edge Function\\\" — meaning the app never reached the server that calls Claude. It turned out the server-side claude-proxy function (t100, the key move to the server) had only ever been deployed in code, never actually uploaded to the production Supabase project — the deploy is a manual Supabase CLI step nobody had run. I walked Richard live through installing Homebrew + the Supabase CLI + \u003ccode>supabase functions deploy claude-proxy\u003c/code>; now deployed and verified live (HTTP 200 from production). This explains why every single AI in the app suddenly broke (photo scan, Chef's Assistant, Schedule upload), not just the prep list. The earlier bonus fix (max_tokens 4096→8192 for big prep sheets) also stands.\", r:\"Deployed and verified\"},\nt59:{t:\"The Recipes photo scan: \\\"one recipe, or a whole menu?\\\" + the whole-menu mode\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Built 13 Jul evening:\u003c/b> before scanning, Recipes now asks \\\"One recipe\\\" / \\\"A whole menu\\\". For a whole menu: one Claude call finds every dish + its section (Starters/Mains/…) + what the menu describes, then for \u003cb>each\u003c/b> dish it makes exactly the same recipe-generation call Chef Challenge already uses — Claude knows a menu line is marketing, not a recipe, so it fills in missing ingredients/method/seasoning itself. Results land on a review list; tapping a dish opens the normal edit form before saving — nothing saves by itself. I had no live-app access to test — please verify live.\", r:\"Verify live\"},\nt60:{t:\"A Report-a-bug button\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Built 13 Jul:\u003c/b> a new 🐛 icon on Home, separate from 💬 feedback — a mailto with a prefilled \\\"what happened / what did you expect\\\", plus device/browser/kitchen attached automatically.\", r:\"Shipped\"},\nt61:{t:\"Print Labels: autocomplete from Check List ingredients\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Built 13 Jul:\u003c/b> adding a label manually now suggests the 5 likeliest matches from the kitchen's current Check List items after 3 characters (the same logic as the existing Check List search) — tapping a suggestion adds the label directly.\", r:\"Shipped\"},\nt62:{t:\"The in-app tutorial (max 20 min)\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Built 13 Jul:\u003c/b> the new ❓ on Home opens a short ~10-screen series (Home, Check List, Recipes, Ingredients, Order List, Chef's Assistant/Challenge, Print Labels, Working Time, feedback/bug) — a few minutes per screen, comfortably under 20 min in total. Shows automatically once to a new user right after first entry, otherwise anytime via ❓.\", r:\"Shipped\"},\nt63:{t:\"A confidentiality clause at sign-in\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Built 13 Jul:\u003c/b> a new first-entry screen (the app won't open until it's accepted) — plain text about confidentiality (don't share the kitchen's recipes/prices/data outside) + a checkbox + confirmation, written as a permanent immutable record (db/60: who/when/which version) instead of a mere profile flag. The text is plain language, \u003cb>not lawyer-verified\u003c/b> — the same caveat as legal.html. \u003cb style=\\\"color:var(--accent);\\\">Verified live 14 Jul:\u003c/b> Richard restarted the app, the gate asked for consent, and let him in after accepting — so db/60 runs on production too.\", r:\"Verified live\"},\nt64:{t:\"Ecobion — competitor research\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Researched 13 Jul:\u003c/b> Ecobion (Carouge, Geneva) sells ePackPro — a Swiss/French digital HACCP system, calling itself \\\"la solution HACCP digitalisée n°1\\\". It does exactly what we do: temperature tracking, task planning (the admin sets it up, the team just ticks — like our Check List), dish labels with use-by/allergens/price, a photo archive of delivery notes. The difference: they sell it as \u003cb>hardware + on-site installation + training + 7-day support + repair when broken\u003c/b> — high touch, likely high price (not public, quote only). We are pure software, no install visit, on your own phone, with an AI photo scan (which their materials don't show). A real competitor in the Swiss market — factor it into the positioning/monetisation documents when there's time.\", r:\"Answered\"},\nt65:{t:\"\\\"The database learns to replace the chef\\\" — needs clarification\", d:\"Richard (13 Jul): \\\"based on data on how a given chef works and answers, the database learns to replace him\\\". I won't build this without clarification — as written it reads like individual performance surveillance towards replacement, a sensitive (and in some countries legally risky) area of workplace monitoring. I assume the real intent is something else — e.g. the app learns a chef's preferences/style and can suggest an ingredient or recipe substitution in his typical way of working? Please write more concretely what the app should do and with what data, and we'll go.\", r:\"Awaiting clarification\"},\nt66:{t:\"Watch compatibility (Check List + rewards)\", d:\"Richard (13 Jul): open the priority-ordered Check List on a watch, time tasks, get a reward. The platform needs clarifying (Apple Watch / Wear OS / Garmin) — each has a completely different technical path, and the app is deliberately a \\\"buildless\\\" single-file web app; none can simply run as a native watch app without separate development. The most realistic first version: the app on Apple Watch via Safari (web, not native) or hooking into the existing task start/stop timer (t50 in the tasklist) the app already has on the phone. Also relates to t44 (the yield-% reward system) — possibly one reward system for both.\", r:\"Awaiting the platform decision\"},\nt67:{t:\"Sharing the app with music via QR (Spotify/SoundCloud) — an opinion\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Answered 13 Jul\u003c/b> (Richard's question): a nice kitchen-atmosphere idea, but I recommend \u003cb>not building it now\u003c/b> — unrelated to the product's core (food cost/prep/hygiene), and the simple version (a QR to the kitchen's shared Spotify/SoundCloud playlist) is really just a link; the app needn't change at all — a QR generator outside the app suffices. If it should be more than a link (song voting, control from the app), that needs a Spotify/SoundCloud API integration and their approval — needless complexity before the trial. Postponed, not rejected.\", r:\"Answered, postponed\"},\nt68:{t:\"The tutorial reworked into bullets (point 1, 14 Jul)\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Built 14 Jul:\u003c/b> Richard's feedback — the original was one dense paragraph per screen, hard to read on the go. Each of the 10 screens now carries 3-4 one-line bullets, each with its own icon.\", r:\"Shipped\"},\nt69:{t:\"Richard's name removed from the outward-facing app/documents (point 2, 14 Jul)\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Built 14 Jul:\u003c/b> legal.html and monetization.html no longer name Richard anywhere — \\\"the Sautero team\\\" / \\\"founder\\\" instead. The mailto address in Report Bug/Feedback remains his personal gmail for now (the app never displays it as text, only as a link target) — awaiting the hello@ email, then it switches. Note: I found no genuinely exposed password in the repository — if you meant a specific spot, show me and I'll hide it immediately.\", r:\"Partly done — awaiting the hello@ email\"},\nt70:{t:\"The Report Bug / Feedback mail cleaned of \\\"clutter and numbers\\\" (point 3, 14 Jul)\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Fixed 14 Jul:\u003c/b> what looked like clutter was the raw kitchen UUID and the full user-agent string right in the mail body. The mail now carries only human-readable text + a short report ID (e.g. \\\"A1B2C3\\\") in the subject; technical details (device, kitchen) are logged to error_logs under the same ID anyway, should they ever be needed.\", r:\"Shipped\"},\nt71:{t:\"\\\"The database learns to replace\\\" — reframed as holiday cover (point 4, clarifying t65)\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Richard clarified 14 Jul:\u003c/b> it's not performance monitoring towards dismissal — it's the app using learned data about a chef to cover his work while he's on holiday (even company-gifted), without bothering him with emails. The kitchen (company) earns a reward (tokens) for \\\"training the app well\\\". This significantly changes my original concern — it's about team continuity, not individual surveillance. It's still a bigger feature to plan (what exactly is \\\"learned\\\", what \\\"cover\\\" looks like in the app, what \\\"tokens\\\" are) — not built yet, awaits joint planning.\", r:\"Reframed, awaits planning\"},\nt72:{t:\"Two profile types: personal (a gastro social network) vs. pro (team QR scan only) (point 5, 14 Jul)\", d:\"Richard (14 Jul): the app already has QR-based team joining (My Team) — which led him to the bigger question: what if a whole kitchen has no account, only individual employees? Proposal: \u003cb>1. A personal profile\u003c/b> — works as a social network for people in gastronomy (photos, videos, music, \\\"influencing\\\" others in the trade). \u003cb>2. A pro account\u003c/b> — opens straight into the camera to scan a QR to create/join one kitchen's team group. \u003cb style=\\\"color:var(--danger);\\\">This is a fundamental scope extension\u003c/b> — essentially adding a social network (feed, content, influence) next to the existing work tool, exactly what the Critical Review warns against (scope gravity, the feature freeze before the trial). Not built, awaits a priority and timing decision.\", r:\"Awaits a priority decision\"},\nt73:{t:\"Watches: Apple Watch + Garmin confirmed (point 6, clarifying t66)\", d:\"Richard (14 Jul): wants both platforms. Reality: the app is deliberately one no-build HTML file — Apple Watch (WatchOS/Swift, Xcode) and Garmin (Connect IQ, Monkey C) are two entirely different native stacks, neither buildable in this environment as an app extension. This is a genuine new software project (two of them), not an app feature — to be planned separately when its time comes (probably after the trial).\", r:\"Platform confirmed, awaits separate planning\"},\nt74:{t:\"Seasonal ordering of Ingredients — first 30 in season, next 30 next month (point 8 part 2, 14 Jul)\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Built 14 Jul:\u003c/b> in the default Ingredients view (no search/filters) the app now shows \\\"🌱 In season now\\\" first (up to 30 items by the current month), then \\\"🗓️ Coming into season next month\\\" (up to 30 more), and only then the normal category order. With an active search/filter this is skipped — the chef is looking for something specific then.\", r:\"Shipped\"},\nt75:{t:\"A \\\"non-stop\\\" agent for ingredients/other (points 8+14, repeated 14 Jul)\", d:\"Richard repeated this a second time, now stronger (\\\"every second while the Mac is on\\\"). \u003cb style=\\\"color:var(--danger);\\\">Literally continuous running is technically impossible\u003c/b> — an AI agent runs per request, not as a permanent process; and even the closest realistic approximation (say every few minutes) would overshoot the approved CHF 100/month budget by orders of magnitude at real API prices. Not built until a clear answer arrives on frequency and a real budget cap — this isn't bureaucracy, it's protection from a real accidental bill.\", r:\"Awaits real frequency/budget — unconfirmed twice\"},\nt76:{t:\"The Sunday snapshot (20:00) + the Monday deadline check (14:30) — set up\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Set up 14 Jul:\u003c/b> every Sunday at 20:00 the app prepares one date-named file (`docs/snapshots/\u003cdate>.md`) with everything from app/, docs/, README and the git history — raw material. \u003cb style=\\\"color:var(--accent);\\\">Changed 15 Jul at Richard's request:\u003c/b> Claude now writes the infographic `docs/CRITICAL_REVIEW_\u003cdate>.html` itself from that material (the same visual style as the 13 Jul edition, with a link to the previous week at the top) — no longer just input for Richard's writing. Every Monday at 14:40 the app checks whether a new `docs/CRITICAL_REVIEW_*.html` with today's date appeared — if not, a highlighted 🚨 reminder flags the missed 14:30 deadline.\", r:\"Set up\"},\nt77:{t:\"A wellness/fitness partnership for gastro workers (point 6, clarification)\", d:\"Richard (14 Jul): wants the app to help gastro people find more calm, better relationships and health — possibly partnering with fitness centres (membership included in the price). The screenshot meant to give context didn't attach again. A very early, unspecified vision — logged as an idea, not built.\", r:\"Awaits the screenshot/clarification\"},\nt78:{t:\"Watches (Apple Watch + Garmin) — the real scope, not \\\"right now\\\" (point 4, 14 Jul)\", d:\"Richard wants this built immediately. Reality: a native Apple Watch app needs Xcode + a paid Apple Developer account (USD 99/yr); Garmin needs the Connect IQ SDK (Monkey C) + a Garmin Developer account. Both are separate multi-week projects on a completely different stack than Sautero's one HTML file — it cannot be done \\\"right now\\\" inside this app. Before starting we need: does Richard/anyone have a Mac with Xcode, is he willing to pay the Apple fee, which exact watches will actually be tested? Not built, awaits these answers.\", r:\"Awaits answers before starting\"},\nt79:{t:\"\\\"Forgot to check in?\\\" + a one-off location at check-in/out (point 1, 14 Jul)\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Built 14 Jul:\u003c/b> mirrors the existing \\\"Forgot to check out?\\\" — a datetime-local input bounded to the last 24h. Location: Richard chose variant 1 (a one-off location snapshot exactly at check-in/out, NO continuous movement tracking) over a full movement history — that would be legally sensitive (Swiss employee-monitoring rules) and technically unrealistic on a locked phone without a native app. `time_entries.check_in_lat/lng` + `check_out_lat/lng` (db/63), a 📍 Google Maps link in the day detail. Affects nobody else — the table is own-rows-only anyway.\", r:\"Shipped\"},\nt80:{t:\"The AI contract note — tutorial style + good and bad points (point 2, 14 Jul)\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Built 14 Jul:\u003c/b> every point now carries a tone icon (⚠️ risk / ✅ good / ℹ️ neutral) instead of one problems-only list — the AI is instructed to find 4-6 points including what's genuinely fine or better than usual in the contract, not just risks. \u003cb style=\\\"color:var(--danger);\\\">A bonus find:\u003c/b> checking \\\"can anyone else see this?\\\" revealed the \\\"read kitchen teammates\\\" RLS policy (db/55) exposes the WHOLE profiles row to anyone in the kitchen — so others' contract_notes/contract_advisory_points were technically readable (the app never did it, but the DB didn't forbid it). The fix prepared in db/62 (column-level GRANT/REVOKE) — staging first, since it's the same table that caused the 13 Jul outage.\", r:\"Shipped in the app, the DB fix awaits the staging test\"},\nt81:{t:\"The daily ingredient AI agent — a CHF 30/month budget (point 9, 14 Jul)\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Set up 14 Jul:\u003c/b> after declining the \\\"non-stop\\\" request twice (t75), Richard confirmed a concrete cap (CHF 30/month) and left cadence/priorities to Claude — set to daily at 06:30, by default extending/verifying ingredients until Richard says otherwise. Every run writes a self-reported (not audited) cost estimate to docs/ingredient_agent_log.md + a short line into status.html. It stops itself if the monthly estimate would exceed CHF 30.\", r:\"Set up — first run 15 Jul morning\"},\nt82:{t:\"The missed-deadline warning amplified (point 8, 14 Jul)\", d:\"The Monday check (sautero-monday-review-deadline-check) now prints a visibly bigger, standalone block on a missed deadline (not just one line) — 🚨🚨🚨 in the heading, bullets with the exact file and date.\", r:\"Shipped\"},\nt83:{t:\"✅ The Michelin-chef recipe rewrite — COMPLETE, rebuilt efficiently (point 3, 14 Jul → finished 17 Jul)\", d:\"Rebuilt at Richard's request (\\\"build it again but much better\\\"): instead of manual per-category batches, one migration db/141 — all 183 library recipes (173 original + 10 promoted community ones) received the 5 professional fields (chef_notes/storage/shelf_life/equipment/plating). Keyed via title + created_by is null, so the change applies in ALL kitchens at once and into the future (new kitchens inherit from the master). The old batches' Asian exclusions filled in (the pilot is Burrito Bandito, the target Nooch — Asian cuisine is fully in play). Verified live: 183/183, 0 empty in any kitchen.\", r:\"Done 17 Jul — db/141 on production\"},\nt84:{t:\"A new section for AI recipes instead of deletion (point 4, 14 Jul)\", d:\"Richard confirmed the \\\"second option\\\" from an earlier question — don't delete the 173 real recipes; build a separate space just for AI-generated ones instead. The simplest proposed shape: a switch in Recipes (\\\"My recipes\\\" / \\\"AI Playground\\\") filtering by the existing 'AI-generated' tag (Chef Challenge and Menu scan already tag like this) — instead of a whole new app. Awaits confirmation of this reading, then we build.\", r:\"Proposal ready, awaits shape confirmation\"},\nt85:{t:\"The Critical Review in Slovak with weekly navigation (point 7, 14 Jul)\", d:\"Richard wants a Slovak Critical Review directly in app/ as html, with top navigation to browse week by week (an archive that grows, never overwrites). Planned as the next step — an honest translation takes time; deliberately not rushed into the same batch as 6 other things (exactly what Richard warned about in point 5).\", r:\"Planned as the next step\"},\nt86:{t:\"Currency moved from Home to a topbar icon; Fridge Temp + My Team got the \\\"working on it\\\" banner (15 Jul)\", d:\"Currency is no longer a big tile — a small (⇄) icon on top, admin-only. Fridge Temp and My Team stay visible on Home, but tapping shows the same banner type as Team Meetings instead of a real screen — both features' code untouched underneath.\", r:\"Shipped\"},\nt87:{t:\"Clickable tickets in status.html — \\\"Work on this now\\\" (15 Jul)\", d:\"Prep-board tickets and Top-5 tasks can be opened and marked as \\\"next\\\" — copying a ready message to the clipboard for pasting into the chat. Honestly: a static file can't start work by itself; this is the closest possible (one click + one paste).\", r:\"Shipped\"},\nt88:{t:\"My Profile — mandatory registration (name/age/gender) at first sign-in (point 2, 15 Jul)\", d:\"A new gate (the same pattern as confidentiality) blocks the app until a first-time user fills in name, age and gender. Editable anytime later via the new 👤 topbar icon. db/65 (age/gender columns) run on production by Richard, the feature confirmed live.\", r:\"Shipped\"},\nt89:{t:\"Email login — switched to the built-in Supabase mailer, then an own domain (point 1, 15 Jul)\", d:\"Richard first disabled custom SMTP to test (a 2-emails/hour limit) — we hit it almost immediately. The real solution: the domain bought (Hostpoint, CHF 5 year one), the Resend DNS records added (a DKIM TXT + MX/TXT for SPF on the send subdomain). Resend \\\"Pending\\\" at the time; verification can take a few hours. The last step after verification: re-enable custom SMTP in Supabase on this domain.\", r:\"DNS added, awaiting Resend verification\"},\nt90:{t:\"Failure logging for the AI scans (recipe/menu/prep sheet/contract) (15 Jul)\", d:\"Richard corrected a wrong claim in features.html — the photo scan IS live-tested and mostly works, it just occasionally fails. The daily static health check can't detect this. The real answer: every failure now writes to error_logs (reason, file type), so the pattern can actually be traced.\", r:\"Shipped\"},\nt91:{t:\"🔴 → ✅ A critical bug: the contract vanishing after refresh (15 Jul)\", d:\"Richard reported that after uploading a contract to Working Time and refreshing, everything vanished. The real cause: db/62 (column privileges on profiles) accidentally blocked the row's owner too, not just colleagues — Postgres column GRANT/REVOKE can't tell \\\"my row\\\" from \\\"someone else's\\\". The emergency fix (db/68 — full SELECT restored) run live by Richard. The proper fix (a separate profile_private table, db/69) prepared as a staging draft, not yet wired into the app.\", r:\"Emergency-fixed, the proper fix awaits staging\"},\nt92:{t:\"Feedback/Bug merged into one icon + the new \\\"Question\\\" option (point 1, 15 Jul)\", d:\"Two separate icons (💬/🐛) replaced by one expandable icon with a menu (Feedback/Bug/Question). db/70 extended feedback_reports.type with \\\"question\\\".\", r:\"Shipped\"},\nt93:{t:\"\\\"Check &amp; Add\\\" — an editable preview before adding scanned dishes (point 5, 15 Jul)\", d:\"Richard reported: scanning a 14-dish menu (risotto/ravioli/meat/fish) could only be added as-is, with no editing. Now every scanned dish is its own card — name, price, every item separately editable/removable, and a whole dish can be dropped before saving.\", r:\"Shipped\"},\nt94:{t:\"The cookies explanation — the app uses none, only localStorage (15 Jul)\", d:\"Richard asked about cookies on the confidentiality screen. Verified straight in the code: the app uses no cookies, only localStorage (sign-in, language, device ID, tutorial-seen, the print queue) — nothing tracking/advertising. Instead of checkboxes (a misleading \\\"choice\\\" with no real option), an honest expandable explanation added right into the confidentiality screen.\", r:\"Shipped\"},\nt95:{t:\"My Team switched back on live + the email invite (point 5, 15 Jul)\", d:\"Since email login now works for external addresses too, the My Team tile returned to a real screen. A new \\\"Send invite email\\\" field added — sends a real sign-in email (via signInWithOtp + emailRedirectTo) with the kitchen invite built into the link. Never yet tested live end-to-end.\", r:\"Shipped, awaits a live test\"},\nt96:{t:\"A clear message when the email limit is exceeded (15 Jul)\", d:\"Richard hit \\\"rate limit exceeded\\\" and an unreadable \\\"{}\\\" on two consecutive attempts — both the same cause (the built-in mailer's 2-emails/hour limit). The app now recognises both cases and shows one clear, actionable message instead of a raw error.\", r:\"Shipped\"},\nt97:{t:\"The domain bought + the Resend DNS records added (point 5, 15 Jul)\", d:\"Richard bought the domain on Hostpoint (CHF 5 year one, no Domain Shield add-on). 3 DNS records added (a DKIM TXT, SPF MX+TXT on the send subdomain) via the Resend Add Domain flow. Resend verifying at the time (status \\\"Pending\\\") — can take a few hours.\", r:\"Awaiting verification\"},\nt98:{t:\"The \\\"AI Playground\\\" switch on Recipes (15 Jul, done early)\", d:\"AI-generated dishes (Ask Chef's Assistant, Chef Challenge, the menu scan) carried the \\\"AI-generated\\\" tag but showed mixed with the real 173 recipes. The new \\\"My recipes / AI Playground\\\" switch above the list separates them — by default only real recipes show. The logic verified by simulation, not yet clicked live in a browser (planned for the manual pre-trial test).\", r:\"Shipped, awaits a live test\"},\nt99:{t:\"The app's domain moved to its own address (15 Jul)\", d:\"Richard didn't want his name publicly visible in the app's address (previously richardcervenka111-create.github.io). The CNAME file in the repo + DNS at Hostpoint + the custom domain and HTTPS certificate in GitHub Pages + the Supabase Site URL/Redirect URLs switched to the own domain. Tested live by Richard — email login works end-to-end, link and automatic sign-in.\", r:\"Shipped, tested live\"},\nt100:{t:\"The Michelin-chef pass, batch 3: Bakery &amp; Bread 12/12 (15 Jul, done early)\", d:\"Draft migration db/72 (equipment/chef_notes/storage/shelf_life/plating_suggestions for all 12 recipes in the category — baguette, sourdough, brioche, pizza dough, toast bread, croissants, babka, focaccia, rolls, panettone, no-knead bread, the Swiss plait). No Asian exclusions, purely Western bakery. Not yet run on staging.\", r:\"Draft, awaits the staging test\"},\nt101:{t:\"🔴 → ✅ A critical bug: new-user registration didn't work at all (15 Jul)\", d:\"Richard's test with a new gmail address hit \\\"Database error saving new user\\\". The real cause (found in the Postgres logs): the handle_new_user() trigger had no search_path, so it couldn't find the profiles table inside the internal auth process — blocking ABSOLUTELY ALL new users incl. team invites. db/73 fixed, run live by Richard. Bonus: the app had mislabelled it a \\\"rate limit\\\" — friendlyAuthErrorMessage() fixed so it no longer lumps unknown errors under one label.\", r:\"Fixed, tested live\"},\nt102:{t:\"Richard's name removed from all visible screens (15 Jul)\", d:\"The access-gate screen (\\\"Richard needs to approve…\\\") and the example name in the Schedule upload (\\\"Cervenka Richard\\\") were visible to every new user. Rewritten to impersonal text (\\\"An admin needs to approve…\\\", the example \\\"Smith John\\\").\", r:\"Shipped\"},\nt103:{t:\"Sign-out only when the app closes, not on tab switch (point 5, 15 Jul)\", d:\"The Supabase client switched to sessionStorage instead of localStorage — the session survives normal tab/app switching (e.g. a jump to the camera), but truly closing the app/browser requires a new sign-in. Important for shared kitchen phones.\", r:\"Shipped\"},\nt104:{t:\"Uploading .md/.html/.txt documents everywhere, not just photo/PDF (point 9, 15 Jul)\", d:\"All 5 AI-scan spots (recipe, menu, prep sheet, contract, schedule) now share one readFileForScan/claudeScanSourceBlock helper. Text formats are decoded and sent to Claude as plain text instead of going through the vision pipeline.\", r:\"Shipped\"},\nt105:{t:\"New kitchens get ingredients, they don't start empty (point 6, 15 Jul)\", d:\"ingredients is bound to kitchen_id — the 2,000-item database was seeded only into Richard's kitchen. Anyone creating their own new kitchen (instead of joining via invite) got zero ingredients. db/74: a trigger copies the largest existing set into every new kitchen + a one-off backfill for existing empty kitchens. TEST ON STAGING FIRST — it writes real data.\", r:\"Draft, awaits the staging test\"},\nt106:{t:\"The profile is fully optional, no field mandatory (point 4, 15 Jul)\", d:\"The My Profile gate used to require name+age+gender or the app wouldn't open. Now every field is optional + a \\\"Skip for now\\\" button. db/75 adds profile_gate_skipped so the gate doesn't reappear at every sign-in.\", r:\"Shipped\"},\nt107:{t:\"The big list of 11 new points (15 Jul) — awaits a plan\", d:\"Richard sent 11 new requests at once: contextual help/feedback everywhere (#1), time for creating new dishes (#2), the menu scan from a URL (#7 — done, see t110), smooth uninterrupted scanning with progress (#8 — done), the new HACCP mega-module + real Settings (#9 — wave 1 done, see t112), the order list recorded in all profiles (#10 — solved, see t108), the 3-way recipe filter Mine/Sautero/company (#11 — done), a multi-level admin hierarchy with own QR invites and document visibility (#5), password + face recognition as a sign-in method (done, see t111). The remaining point (the admin hierarchy) and HACCP waves 2-3 need a separate plan/confirmation of direction before building.\", r:\"Awaits Richard's direction\"},\nt134:{t:\"🔴 → ✅ Incident 16 Jul: the super-admin lockout after db/85+86 — fixed by db/90 + a permanent auditor guard\", d:\"Hours after running db/85+86 Richard couldn't sign in to his own admin account (\\\"Waiting for approval\\\"). Two layered mistakes, both Claude's, both invisible in the SQL editor (it runs as superuser, bypassing RLS and column grants): (1) db/86 repeated exactly the same recursive-RLS anti-pattern as db/53 from 13 Jul — a policy ON profiles queries profiles in its own body → Postgres 42P17, poisoning EVERY profiles query for everyone; (2) db/85 added the admin_perms/email columns but didn't extend the db/62 column-level GRANT list → the basic \\\"who am I\\\" sign-in query failed for everyone. The fix: db/90 (SECURITY DEFINER helpers + the grant, run live 16 Jul, confirmed working). Once and for all: audit_db.py check #6 — a policy querying its own table = a hard pre-commit fail (verified it retroactively catches both db/53 AND db/86); a new HEALTH_LOG lesson: profiles migrations are tested through the authenticated role, never by SQL-editor success.\", r:\"Fixed live, the guard active\"},\nt135:{t:\"The 16 Jul afternoon batch: recipes for new kitchens, Custom Ingredients, a stricter access gate, Share My Recipes + Chef Friends\", d:\"(1) \u003cb>db/87\u003c/b> — new kitchens get the Sautero recipe library (created_by IS NULL only — personal \\\"Mine\\\" recipes never leak into a foreign kitchen as \\\"Company\\\") + a backfill; the same dynamic pattern as db/74. \u003cb>STAGING FIRST\u003c/b>. (2) \u003cb>db/88 + UI\u003c/b> — 🏷️ Custom Ingredients: a new admin-only icon in the Home top bar, file upload (photo/PDF/text/CSV) through the shared scan pipeline, Claude extracts the items, a review before saving, the separate custom_ingredients table (deliberately apart from the curated catalogue). Safe straight to production. (3) The access gate: the 'denied' status is now checked at EVERY sign-in, not just the first signup — a post-join denial previously had no effect. (4) \u003cb>db/89 + UI\u003c/b> — 📖 Share My Recipes exactly as agreed: an opt-in switch (default OFF), read-only, own recipes only, chef_connections friends only; the new 👨‍🍳 Chef Friends tile in Connections (the first connections list ever) + a read-only recipe detail without edit/scale/order buttons. Safe straight to production — incl. the column GRANT for recipes_shared (exactly today's incident's bug class, not forgotten this time).\", r:\"Shipped (db/87 staging first; db/88+89 straight to production; db/90 already running)\"},\nt148:{t:\"📦 The 12-point late-night batch + fixes 16 Jul: recipe shelves/sections/projects, Admin Team Members, the RLS Remove bug\", d:\"(1) \\\"What's New\\\" — a new notification icon apart from the Tutorial, a growing one-screen-per-feature list; from now on I ask before adding. (2) Print: the old plain print button gone, branded print got teal accents and \\\"Used In\\\". (3) Reviewed the Add Company flow and found 2 remaining holes — the existing-user `?invite=` path checked revoked/expired BEFORE calling the db/118 repair logic (bypassing it entirely), and `joinKitchenViaLink` had no loud failure alert — both fixed. (4) feature_status.html got the new \\\"🛡️ Kitchen Admin only\\\" filter with a count. (5) The Home button now forces a scroll to the top (repeatedly + `history.scrollRestoration='manual'`). (6) \u003cb style=\\\"color:var(--gold);\\\">The real fix:\u003c/b> Sautero comments were invisible across kitchens because every kitchen holds its own physical recipe copy (different id) — the new `chefos_master_id` (db/119) shared by all copies solves it permanently, future recipes included. (7) Recipes: \\\"Add Project\\\" — custom named collections (db/120, mirroring ingredient_lists) + the duplicate small shelf switch removed from the list (switching now only via the big tiles). (8) Send to Supplier got a branded \\\"coming soon\\\" instead of a bare alert. (9) Light/Dark mode — a Settings switch, the app stays dark by default. \u003cb style=\\\"color:var(--gold);\\\">A bug found and fixed:\u003c/b> `showList()` hard-reset the shelf to 'sautero' on EVERY open — after removing the small switch (point 7) it showed fully (Sautero recipes \\\"everywhere, always\\\"), fixed by deleting that line. \u003cb style=\\\"color:var(--gold);\\\">Another bug:\u003c/b> sections (Bakery &amp; Bread, Sushi Basics…) were computed from ALL kitchen recipes regardless of shelf — db/122 adds `shelf_scope` to recipe_category_icons; every shelf (and every new project) now has its own independent section list, starting with just Favorites/All. New projects also got a choice of 8 coloured books instead of one fixed icon (db/123). \u003cb style=\\\"color:var(--gold);\\\">A security bug:\u003c/b> removing a team member (Admin/My Team) always failed with \\\"new row violates row-level security policy\\\" — the db/90 UPDATE policy had no explicit WITH CHECK; Postgres defaulted to the USING expression, which required kitchen_id NOT NULL — the exact opposite of what Remove does. While it failed, the removed member genuinely KEPT full access to all kitchen data (RLS keys on kitchen_id, not on the \\\"not in any team\\\" message) — db/121 adds the proper WITH CHECK. Also the new \\\"👥 Team Members\\\" tile right in the Admin hub (Make Assistant/Remove), sharing the same function as Connections &gt; My Team. All 5 migrations (119–123) confirmed run by Richard.\", r:\"Shipped live, the Remove RLS fix confirmed after db/121\"},\nt147:{t:\"📦 The 16 Jul late-evening batch: real team membership, long-press everywhere, list sharing, branding, fixes\", d:\"(1) \u003cb style=\\\"color:var(--gold);\\\">db/116–118\u003c/b> — Company mode is now locked to real team members (`profiles.in_team`, set server-side on joining via code/invite, never on switching account type) or kitchen admins — anyone else gets the same \\\"not in any team yet\\\" screen as My Team, with a placeholder \\\"Create a team of friends\\\" button. Scanning a team QR in the app now always asks \\\"Do you want to become a member of team X?\\\" instead of silence. The Company Admin got full invite control (QR, email, revoke) in their My Team. \u003cb style=\\\"color:var(--gold);\\\">Incident:\u003c/b> sautero@protonmail.com accepted an Add Company invite, entered the kitchen, but the admin role silently wasn't granted (a burned single-use invite) — db/117 the one-off repair, db/118 the permanent guard (a burned admin invite can be claimed WHILE the seat is still empty and the caller is already in that kitchen), and the app now alerts loudly on failure instead of a silent console.error. (2) Long-press (or right-click) on Check List dishes AND ingredients → Rename/Hide/Delete, for everyone — ingredients got their own `hidden` column (db/107). (3) Custom ingredient lists (db/112) alongside the fixed Sautero/My Ingredients — long-pressing a list TILE (not an item) offers Rename/Hide/Delete/Share; shared lists (db/114) are visible to chef friends read-only. (4) Recipes got the same entry picker as Ingredients (My Recipes/Sautero personal, Sautero/Company Recipes company). (5) Branded Print v2 — a two-column design, step numbers, the blocked print fixed (synchronous `window.print()`, the kitchen name cached in advance), doesn't print the navigation/feedback bubble. (6) The new floating Sautero header (Back + Home) atop every screen except Home, replacing overlapping icons. (7) HACCP + Team Meetings hidden from regular personal accounts (the Head Admin and Company accounts still see them). (8) \\\"Add to Check List\\\" asks for the project AND the station instead of silently dumping into Extra. (9) The ingredient scan reads .xlsx too (an own ZIP/XML parser, no library) + \\\"✨ AI Details\\\" fills categories/seasons/storage through the credit system. (10) Kitchen Reports: admins first see the list of all kitchens with name/admin (db/113) + drill-down recipes (shelves → sections → recipe → View Recipe). (11) The Feedback bug fixed (duplicate IDs between the old and new system overwrote each other's fields) + an email_contacts trigger on access_requests instead of the fragile best-effort insert (db/106). (12) The central Anthropic API key (an own Claude Console workspace) instead of \\\"everyone brings their own\\\" — 12 client-side \\\"add your API key\\\" prompts removed. (13) The Sautero-branded Supabase email template (navy/teal, `{{ .Token }}` kept for manual code entry) set live in Authentication → Emails.\", r:\"Shipped live, several steps verified directly with Richard (screenshots during the session)\"},\nt146:{t:\"📦 The 16 Jul evening 8-point batch: true personal-data privacy, team join codes, Kitchen Reports, the AI subscription, the Privacy consent gate\", d:\"(1) \u003cb style=\\\"color:var(--gold);\\\">db/97\u003c/b> — recipes and ingredients got `is_personal` + rewritten RLS: personal data was until now ONLY a UI filter (a colleague switched to \\\"Company\\\" genuinely saw it) — now truly invisible to anyone but the creator, permanently, even across kitchen changes. The new \\\"Ingredients\\\" entry screen (Sautero / My Ingredients). The new \\\"Create Teams\\\" admin right (join_code_hash, never plaintext in the DB) + the Create Team tile + the Team Join screen (QR scan via the existing jsQR / a manual code) + a confirmation dialog when switching Personal/Company with \\\"don't ask again\\\". (2) \u003cb>db/99\u003c/b> — Kitchen Reports (the same 📊 icon as Internal Docs but per kitchen, for every Kitchen Admin with the new right) — recipe/Check List counts always, hours by name ONLY for employees who consented (Settings → Share My Hours, default OFF). (3) \u003cb>db/98\u003c/b> — Send Feedback (Settings) + the admin Feedback tile. (4) Verified: Check List \\\"Development\\\" is kitchen-scoped — as Richard is his kitchen's only member the effect is \\\"just me\\\", but the mechanism is per kitchen, not per account. (5) Branded Print (a second printer icon on the recipe) — one fixed Sautero template, not per-kitchen logos yet. (6) The \\\"Add to Check List\\\" button on the recipe detail. (7) \u003cb>db/97\u003c/b> — `is_subscribed` on profiles, a manual switch in the Admin Directory, the gate in `callClaudeAPI()` AND directly in the `claude-proxy` edge function (client-side alone could be bypassed). (8) \u003cb style=\\\"color:var(--gold);\\\">db/100\u003c/b> — the new mandatory Privacy & Data Protection gate (the same mechanism as the 13 Jul Confidentiality) before EVERY entry, for already-signed-in users too; `legal.html` rewritten with GDPR/Swiss nDSG sections; the new `/security/` folder with a technical security review for the lawyer. Deliberately EVERY new gate/RLS is fail-open on a query error.\", r:\"Shipped, the db/97–100 migrations and the edge-function redeploy confirmed run (a 17-point check ✅)\"},\nt145:{t:\"📦 The 16 Jul afternoon batch — live tests (t144)\", d:\"The Custom Ingredients icon is now inside Ingredients, not on Home — verify the admin sees it there and others don't. Preview as Normal User (Settings, admin) — verify the bottom banner truly restores even after clicking through other screens. The \\\"Coming soon\\\" wall — open the app in a private window WITHOUT any URL parameter (after running db/96 and enabling) and verify it shows; then try with ?invite= and verify it doesn't. Working Time → open a month → a day where you ordered or printed a label, verify it displays. The Settings reorder icon (top right) — verify the order saves and survives a reload.\", r:\"A live test, admin and regular account\"},\nt143:{t:\"👋 The Add Friend QR as an invite (db/95) + the password \\\"already set\\\" state\", d:\"Run db/95. A new (non-admin) team member opens Add Friend, shows the QR — verify the QR generates at all (the kitchen_invites insert is no longer admin-only). A stranger without an account scans with the native camera (not via the app) → signs in → must land in THE SAME kitchen AND be auto-connected as a friend. An existing chef in another kitchen scans via the app's Scan QR → must ONLY connect as a friend, never be moved into a foreign kitchen. Separately: My Profile → Account & Security, verify that with a password already set the app shows \\\"Password is set\\\" + Change Password instead of the raw field.\", r:\"A live test, 2+ accounts incl. a fresh one\"},\nt142:{t:\"📋 Check List projects — the picker, the \\\"Development\\\" bucket, hidden hotel stations (db/94)\", d:\"Run db/94 (STAGING FIRST — it writes into all existing tasks/prep_dishes rows). As admin: the Check List opens on a tile screen; \\\"Development\\\" must contain exactly what was there before (SKY, Garde Manger, Lobby, Hot Line…). As another account: an empty screen, just \\\"+ Add Project\\\" — after creating a new project only the 5 base stations show (Hot Line, Entremetier, BQT, Desserts, Extra), never SKY/Garde Manger/Lobby. Also verify the \\\"All stations\\\" overview in a new empty project.\", r:\"The migration + a live test, 2 accounts\"},\nt141:{t:\"📖 The Personal/Company account — a sign-in gate + the recipe filter (db/93)\", d:\"Run db/93. Sign in with an existing account — the \\\"Personal or Company Account?\\\" gate must appear (once, for old accounts too, not only new). Pick Personal → Recipes shows only Mine + Sautero (no Company). Pick Company → only Sautero + Company (no Mine). Also verify switching later via Settings → Account Type, and that the filter buttons redraw immediately.\", r:\"A live test, 2 accounts\"},\nt139:{t:\"🛒 db/76 polished and confirmed live — the last remaining 15 Jul migration caught up\", d:\"The first db/76 attempt failed on `operator does not exist: name[] = text[]` — \u003ccode style=\\\"background:rgba(0,0,0,0.25); padding:1px 6px; border-radius:4px;\\\">pg_attribute.attname\u003c/code> is type \u003ccode style=\\\"background:rgba(0,0,0,0.25); padding:1px 6px; border-radius:4px;\\\">name\u003c/code>, not \u003ccode style=\\\"background:rgba(0,0,0,0.25); padding:1px 6px; border-radius:4px;\\\">text\u003c/code> — single values cast automatically, ARRAYS don't. Fix: \u003ccode style=\\\"background:rgba(0,0,0,0.25); padding:1px 6px; border-radius:4px;\\\">array_agg(attname::text …)\u003c/code>. Since the Supabase SQL Editor runs a pasted script as one transaction, the DO-block failure rolled everything back — no partial state, no risk. Fixed, run live, the CHECK now shows 15/15. All 11 of this week's migrations (76, 80-90) are confirmed running on production.\", r:\"Deployed and verified\"},\nt144:{t:\"📦 The 11-point afternoon batch (16 Jul): the coming-soon wall, admin preview, Check List projects in practice, the Working Time detail, the tutorial\", d:\"(1) Custom Ingredients moved from Home into Ingredients (it belongs there, not on the main screen). (2) 🛡️ Admin → Settings → \\\"Preview as Normal User\\\" — temporarily experience the app as a regular account, a permanent bottom banner to return (independent of currentIsAdmin, precisely because that switches off during preview). (3) Access Requests got a refresh button. (4) The Android bug reported, awaiting the error_logs dump for diagnosis. (5) \u003cb style=\\\"color:var(--gold);\\\">The \\\"Coming soon\\\" wall (db/96)\u003c/b> — anyone arriving WITHOUT an invite/join/friend link OR QR and no session sees \\\"launching soon\\\" instead of the login; anyone with a real link/QR or an existing session passes normally. Controlled via app_config.coming_soon_enabled — can be switched off straight in SQL without a deploy. Deliberately fail-open (a missing migration must never lock out the pilot kitchen). (6) Settings got the same reorder mechanism as Home (the top-right icon). (7) The current account type (Personal/Company) visible right in the Settings tile name. (8) Working Time → month → day now also shows orders (Order List touched that day) and printed labels (print_label_log, an exact historical record) — deliberately WITHOUT a \\\"completed tasks\\\" count, since neither tasks nor prep_items record who completed what and when, only who created it. (9) Chef Friends already covers the \\\"Friends tile\\\" from Connections — nothing new needed. (10) The 👋 Add Friend QR now also works as a kitchen invite for EVERY member (db/95, a conscious partial rollback of db/81 after direct confirmation). (11) The Tutorial got 3 new sections (HACCP, Connections, Admin) and updated Check List/Recipes — without screenshots; the app never used them, and invented screenshots without a live sign-in could be inaccurate.\", r:\"Shipped (db/96 straight to production)\"},\nt118:{t:\"🛡️ The Admin tile rebuilt as a hub: Add Admin, the Admin Directory, Access Requests, Email Contacts (point 1, 16 Jul)\", d:\"Settles the admin hierarchy from t107 (#5). Two admin levels, not one: \u003cb style=\\\"color:var(--accent);\\\">Kitchen Admin\u003c/b> — the new profiles.admin_perms column (db/85), rights delegable one by one (manage_invites, manage_team, language_audit, view_email_contacts, approve_access), stays a completely ordinary profile, no \\\"Admin\\\" label, no super-admin reach — exactly per Richard's brief (\\\"the same profile as a regular one\\\"). \u003cb style=\\\"color:var(--accent);\\\">Head Admin\u003c/b> — the unchanged is_admin (Richard), full reach. The Admin tile on Home is now a hub in the Home design with 4 tiles instead of a direct Access Requests link: ➕ Add Admin (find a profile by name/mail → pick the level), 📋 the Admin Directory (Richard only — everyone listed, search, Edit with an on/off switch per right + a separate Head Admin switch), 📨 Access Requests (moved here, visible to approve_access too), 📧 Email Contacts (moved from Settings here, visible to view_email_contacts too). A real bug found while building: the email_contacts INSERT policy required is_admin, but the app writes access-request contacts at EVERY new signup, almost never as an admin — silently failing since db/82 (swallowed in .then()), fixed in db/86 alongside. db/86 also adds the missing \\\"super-admin reads all profiles\\\" policy (the Admin Directory needs it for cross-kitchen search).\", r:\"Shipped (db/85 straight to production, db/86 STAGING FIRST — it rewrites RLS)\"},\nt117:{t:\"The 15 Jul late-night eight-point batch: logout, invite-only, a mandatory password, Connections, the email database (points 4/9/10 see note)\", d:\"(1) Working Time/Check List for new users: verified, NO code change needed — a new kitchen never inherited prep/attendance data (only db/74 copies ingredients, nothing else) — already correct, now documented. (2) 🚪 Sign Out in Settings — the app had no real way to sign out on a shared device. (3) The +CHF 97.73 cost written into three documents (purpose then unspecified). (4) The company mail — Claude must not create accounts; the recommendation given to Richard directly in chat. (5) The invite-only lockdown: db/81 (STAGING FIRST) — creating/revoking invite QRs/links is now admin-only (RLS + app), self-serve \\\"create your own kitchen\\\" stays only for the founder's iCloud; the new-access-request notification (notify-access-request) already existed, just verify the deploy. (6) 🔗 Connections (formerly My Team) — a new page in the Home design: Scan QR (camera + jsQR, a new CDN dependency), Share QR Code (3 check questions exactly per the brief — Add friend is a real feature via the new chef_connections table db/84, Share My Recipes honestly marked \\\"coming soon\\\" until the scope is clear, Invite New Chef = the existing flow, admin-only), My Team (unchanged content, just moved). (7) The mandatory password: db/83 (safe straight to production) — a new gate right after the confidentiality consent, unskippable, the email code keeps working in parallel. (8) The email database: the new email_contacts table (db/82) + an admin-only overview in Settings, capturing access requests AND (newly) who was sent an invite mail — previously recorded nowhere. Point 9 (push the plan forward) = this whole batch. Point 10 (check the app) = the auditors (audit_db.py/audit_app.py) passed clean after every change + a logic check of the new flows (invite scan, connection uniqueness, gate order); the live phone test still missing.\", r:\"Shipped (db/81+82+83+84 awaiting runs, 81 staging first)\"},\nt116:{t:\"🔐 The 15 Jul night six-point batch: filters, shelves, the admin lockdown, Settings, the install guide, the gamify proposal\", d:\"(1) Active-filter visibility = THE STANDARD: an active chip is always full teal + dark text, unified across 4 chip families (recipes, prep, scale, general) — Check List statuses keep their own semantic colours deliberately. (2) Recipe shelves by author: Sautero = the whole built-in library (authorless recipes incl. the 173 migrated), Mine = mine, Company = colleagues'; AI-generated stays only a tag; the default shelf = Sautero. (3) The gamify proposal for non-payers = model 14 in monetization.html (the data flywheel: points for Yield %/prices/HACCP → tokens for AI; unifying t44+t71+Chef Challenge; build after the trial). (4) The admin lockdown: db/80 (STAGING FIRST) — is_admin only for the founder's iCloud, a trigger blocks column changes by anyone else; the check found a REAL escalation hole (a db/34 policy let anyone set is_admin=true) — open since db/34, now closed; the app no longer grants admin to a kitchen's creator. (5) The ⚙️ Settings hub on Home — profile+security, AI/scan, language (a new picker), currency (admin), icon order, section visibility, the guide, install, legal. (6) The 📲 \\\"Add to Phone\\\" guide (iOS Safari + Android Chrome) — Richard's photo never arrived, the standard procedure built.\", r:\"Shipped (db/80 awaits staging)\"},\nt115:{t:\"🕒 /visual data/: current content + a last-updated stamp + the SK/EN toggle everywhere (15 Jul)\", d:\"Richard's three-part request. (1) Content brought up to date: planning (a fresh TOP3 + the whole 15 Jul diary entry), tasklist (9 new Done rows, stale P1 items annotated, the 15 Jul timeline), features (a new HACCP card, Fridge Temp relabelled live-in-HACCP), VISUAL_GUIDE (cover numbers ~1,300/6 AI, section 11 \\\"delivered, not yet illustrated\\\", spend ~CHF 141). (2) Each of the 13 documents carries a fixed \\\"🔄 Sautero state as of [date, time]\\\" stamp bottom left — archive documents (the 13 Jul review, the 9 Jul snapshot) get the honest variant \\\"assessed/snapshotted as of X · updated Y\\\". (3) The SK/EN toggle everywhere — 6 documents already had it, the remaining 7 got a floating bottom-left button with the shared sautero_doc_lang key (one language choice applies across all documents). The investor deck newly fully bilingual in static content (Slovak by default); for monetization/reviews the chrome is translated while card bodies stay in the original language — the same boundary as backlog tasks, honestly admitted.\", r:\"Shipped\"},\nt114:{t:\"🧼 The HACCP module, wave 2 (15 Jul)\", d:\"Fryer Oil and Pests needed no new code beyond enabling the tiles — the wave-1 engines (haccp_measurement_log / haccp_checklist_items) had them pre-wired incl. the db/77 check constraints. The real novelty: Label Expiry — printing now remembers what was printed (print_label_log, db/78, incl. the computed use-by date; a log failure never blocks the print itself) and the new HACCP → Label Expiry screen groups by urgency (expired / today-tomorrow / fine / no date) with a \\\"Used / discarded\\\" button — the list shows what's physically in the kitchen, not print history. db/78 = a purely new table, safe straight to production. Wave 3 remains: Staff Training + the admin Report.\", r:\"Shipped, wave 2\"},\nt113:{t:\"🎨 Visual Data Standards — all 13 documents redesigned + moved into /visual data/ (15 Jul)\", d:\"Richard's new standing bar: every infographic/dashboard at world-class level, the brand identity untouched, everything in /visual data/. Done in one day: the investor deck (a hero with 3 key numbers, sticky navigation, a hand-built Gantt + an SVG revenue chart instead of Chart.js — no external dependency anymore), status (a pulse strip with live column counts, the Done column with its own scroll), backlog (search + open/critical/v2 filters, a per-phase progress bar — all 112 tasks and ticks preserved), monetization (a clickable overview matrix of 13 models), tasklist (search + ME/YOU filters, group counters), planning (diary stats, search), features (search, expand/collapse), automation (numbers aligned with status.html: ~CHF 141), both Critical Reviews (weekly navigation — partly fulfilling t85), VISUAL_GUIDE + Manifesto + the old 9 Jul Status (the last 3 documents on the old warm palette retuned to navy/teal). Old paths = redirect stubs, so bookmarks keep working. All 4 scheduled automations (health check, the ingredient agent, the snapshot, the deadline check) repointed to the new paths.\", r:\"Shipped\"},\nt112:{t:\"🧼 The HACCP module, wave 1 (15 Jul)\", d:\"Richard wanted a new HACCP page identical in design to the main menu (same tiles, same size), with the features he named plus Fridge Temp moved in from the main menu. At his explicit request (\\\"think like a HACCP expert… add other functions too\\\") extended with the standard checkpoints of the Swiss Selbstkontrollkonzept the app entirely lacked: goods receiving, core cooking temperature, the cooling protocol, pests, staff training, an admin overview. Wave 1 (shipped): Fridge Temp (revived — showFridges() was merely disconnected), Goods Receiving, Core Temperature, the Cooling Protocol, the Cleaning checklist, the Personal Hygiene checklist. Waves 2-3 (tiles visible, \\\"coming soon\\\" banner for now): Fryer Oil, Pests, Label Expiry, Training, the Report. db/77 adds two reusable tables instead of one per module — haccp_measurement_log (a reading + OK/Problem, used 3× now + fryer oil later) and haccp_checklist_items/_log (a recurring task, used 2× now + pests later).\", r:\"Shipped, wave 1\"},\nt108:{t:\"Order List: teammates no longer delete/overwrite each other's orders (15 Jul)\", d:\"Richard: shared across the team, quantities add up on a repeated ingredient, the admin sees who ordered what. The check surfaced two real bugs: the same ingredient from two people overwrote instead of adding, and the Save button in the station picker wiped the WHOLE station for the whole kitchen before saving — one person could silently delete another's order. db/76 changes the unique constraint to (kitchen, station, ingredient, author) — everyone gets their own row. \u003cb style=\\\"color:var(--accent);\\\">Run live 16 Jul\u003c/b> — along the way a bug in the migration itself was found and fixed (array_agg(name) couldn't compare to a text[] array without a cast; Supabase runs pasted SQL as one transaction, so the original attempt rolled back entirely, nothing ran partially).\", r:\"Deployed and confirmed on production\"},\nt109:{t:\"🧠 Mental health / burnout prevention — PARKED (15 Jul)\", d:\"Richard wanted continuous/hidden facial-expression monitoring via the front camera throughout the workday to collect data on employees' mental state. Declined for legal and ethical reasons: the EU AI Act explicitly bans workplace emotion recognition as unacceptable risk; the Swiss Art. 328 OR (personality protection) and the nDSG class mental state as sensitive data requiring free consent, which an employee facing their own employer's app doesn't genuinely have. The proposed alternative instead: (1) a voluntary daily \\\"how are you feeling\\\" check-in, one tap, never mandatory, (2) using objective signals the app already collects (Working Time — overtime, missing days off) as burnout risk factors, (3) the admin seeing only aggregated/anonymised team trends, never individual real-time \\\"moods\\\". Richard agreed to park it — the app waits until Claude returns to the topic.\", r:\"Parked, awaiting a return to the topic\"},\nt110:{t:\"Menu scan straight from a website (URL), not just photo/PDF (15 Jul)\", d:\"Richard: wants to scan a restaurant's menu straight from its website, not only from a photographed page. The new \\\"A menu website\\\" entry in the scan-type picker — the app asks for a link and instead of sending Claude a photo uses his own server-side web_fetch tool, which fetches the page on Anthropic's side. Requires no claude-proxy change (it's a pure JSON pass-through). The rest of the pipeline is identical to the existing whole-menu photo scan — one dish = one full recipe for review before saving.\", r:\"Shipped\"},\nt111:{t:\"🔓 Password + Face ID sign-in (15 Jul)\", d:\"A second sign-in method alongside the email code. The password: standard Supabase email+password (set in My Profile → Account &amp; Security). Face ID: a real WebAuthn platform authenticator (Face ID/Touch ID/Windows Hello) as a PER-DEVICE unlock, not a new server-verified factor — the app has no backend of its own to verify WebAuthn signatures, so the biometric gate protects the locally stored refresh token instead. No biometric data ever leaves the app or Supabase. Safe on shared kitchen tablets too — a stranger's fingerprint/face simply can't produce a valid signature for someone else's key.\", r:\"Shipped\"},\nt119:{t:\"🔗 The Connections hub — navigation between Scan QR / Share QR Code / My Team\", d:\"Open from Home, walk into all three sub-screens and back, verify the design matches the Home tiles.\", r:\"A live phone test\"},\nt120:{t:\"📷 Scan QR — the camera + jsQR\", d:\"A real phone camera, not just the desktop simulator — jsQR is a new CDN dependency never verified outside local development.\", r:\"A live phone test\"},\nt121:{t:\"🤝 The Add Friend flow (chef_connections)\", d:\"Two real people, two devices — scan, confirm, verify the connection appears for both sides and doesn't duplicate the second time.\", r:\"A live test, 2 devices\"},\nt122:{t:\"🔒 The invite-only lockdown (db/81)\", d:\"A non-admin must not see/create/revoke an invite QR or link; an admin can. Self-serve \\\"create your kitchen\\\" works only for the founder's iCloud.\", r:\"A live test, 2 accounts\"},\nt123:{t:\"🔓 The mandatory password gate (db/83)\", d:\"Appears right after the confidentiality consent, can't be skipped/back-buttoned around, the email code keeps working as an alternative.\", r:\"A live test, a new account\"},\nt124:{t:\"😊 Face ID / Touch ID (WebAuthn)\", d:\"A real platform authenticator, not a mock — verify the setup in My Profile and the unlock itself at the next sign-in, and that a stranger's fingerprint/face doesn't pass on a shared tablet.\", r:\"A live test on a Face/Touch ID phone\"},\nt125:{t:\"🧼 HACCP wave 1 — Fridge Temp, Goods Receiving, Core Temperature, Cooling, Cleaning, Hygiene\", d:\"Six screens, each writing to haccp_measurement_log/haccp_checklist_items — verify the data really saves and shows in the history.\", r:\"A live test in the kitchen\"},\nt126:{t:\"🏷️ HACCP wave 2 — Fryer Oil, Pests, Label Expiry\", d:\"Label Expiry is new logic (print_label_log, db/78) — print a label, verify it appears in Label Expiry grouped by urgency, test \\\"Used/discarded\\\".\", r:\"A live test with the label printer\"},\nt127:{t:\"🚪 Sign Out\", d:\"Signs out, the app returns to the sign-in screen, the next person can sign in on the same shared device with no residue of the previous session.\", r:\"A live test on a shared tablet\"},\nt128:{t:\"📲 The PWA icon + localStorage session\", d:\"The app added to the home
