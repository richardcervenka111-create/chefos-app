 screen (Add to Phone), sign-in via an email link opened in Safari — verify the sign-in state syncs into the installed PWA icon too, not just the browser.\", r:\"A live phone test\"},\nt129:{t:\"📖 The recipe scale bar — the Custom×N indicator, the 3-way Sautero/Mine/Company filter\", d:\"A custom portion multiple shows the right \\\"×N\\\", the recipe shelf filters correctly by author incl. the default Sautero shelf.\", r:\"A live test\"},\nt130:{t:\"📋 Check List — the empty state/tutorial, smooth background scanning\", d:\"A new kitchen with an empty Check List shows the guide; a menu scan runs in the background with progress (the pill) while the app stays usable.\", r:\"A live test\"},\nt131:{t:\"⏱️ Working Time — the \\\"Change contract\\\" layout recalculation\", d:\"Changing the workload mid-month recalculates and redraws the charts/summaries correctly, nothing breaks visually.\", r:\"A live test\"},\nt132:{t:\"🛒 Order List — several people's orders add up, never delete (db/76)\", d:\"db/76 has been confirmed live on production since 16 Jul (the per-person unique constraint runs). Only the live test itself remains: two people, the same ingredient, verify the quantities add up and that Save in the station picker doesn't wipe the other person's row.\", r:\"The migration done, only the live test remains, 2 accounts\"},\nt133:{t:\"🛡️ The Admin hub — Add Admin, the Admin Directory, on/off switches, the moved Email Contacts (t118)\", d:\"Create a real Kitchen Admin via Add Admin, sign in with their account and verify they see exactly the buttons enabled for them (and no \\\"Admin\\\" label anywhere) — and conversely that switching a right off in the Admin Directory really hides the button. Also verify the Head Admin switch on a second test account.\", r:\"A live test, 2 accounts\"},\nt136:{t:\"🏷️ Custom Ingredients — file upload, review, save, delete (t135)\", d:\"Run db/88 first. As admin: the new Home top-bar icon → Upload file → a photographed/PDF price list → verify the extraction, ticking items, saving and deleting. As a non-admin: the icon must not be visible.\", r:\"A live test with a real price list\"},\nt137:{t:\"📖 Share My Recipes + 👨‍🍳 Chef Friends — two people, two kitchens (t135)\", d:\"Run db/89 first. Account A enables Sharing (Share QR Code → Share my recipes), account B (connected via Add Friend, a DIFFERENT kitchen) opens Connections → Chef Friends → sees A's own recipes read-only; verify B does NOT see A's kitchen's Company/Sautero recipes, that the detail has no edit/scale/order buttons, and that switching sharing off closes access immediately.\", r:\"A live test, 2 accounts, 2 kitchens\"},\nt138:{t:\"📚 db/87 on staging — a new kitchen gets the Sautero recipes, \\\"Mine\\\" never leaks\", d:\"On staging create a new kitchen and verify: it received the complete Sautero shelf (173+), it did NOT receive anyone's personal \\\"Mine\\\" recipes, and the backfill filled existing empty kitchens. Only then production.\", r:\"A staging test before production\"},\nt140:{t:\"🔒 → ✅ The access-request approval gate confirmed live (15 Jul)\", d:\"Richard sent a real person an invite — the app correctly held her at \\\"Waiting for approval\\\" and let nobody through until he approved her manually in Access Requests. Confirms the db/34 gate applies to invitees too (an invite grants access to a SPECIFIC kitchen, not around approval). A side find during the check: her email_contacts record (source=access_request) was missing — the last victim of the old db/82 policy (fixed in db/86) just before the fix; the only gap among all access_requests, filled by a manual backfill.\", r:\"Confirmed live\"},\n};\nfunction applyTaskLang(){\n  document.querySelectorAll('.task').forEach(el=>{\n    const inp = el.querySelector('input[id]'); if(!inp) return;\n    const tr = TASKS_EN[inp.id];\n    const tt = el.querySelector('.task-title'), dd = el.querySelector('.task-desc'), rr = el.querySelector('.role');\n    [tt,dd,rr].forEach(x=>{ if(x && !x.dataset.skHtml) x.dataset.skHtml = x.innerHTML; });\n    if(_lang === 'sk' || !tr){\n      if(tt) tt.innerHTML = tt.dataset.skHtml;\n      if(dd) dd.innerHTML = dd.dataset.skHtml;\n      if(rr) rr.innerHTML = rr.dataset.skHtml;\n    } else {\n      if(tt && tr.t) tt.innerHTML = tr.t;\n      if(dd && tr.d) dd.innerHTML = tr.d;\n      if(rr && tr.r) rr.innerHTML = tr.r;\n    }\n  });\n}\napplyTaskLang();\nfunction L(sk, en){ return _lang === 'sk' ? sk : en; }\n\n/* ---------- Checkbox persistence — SAME localStorage keys as the original app/backlog.html\n   (sautero_backlog_\u003cid>), so every box Richard already ticked stays ticked after the move\n   to /visual data/. ---------- */\nconst b=[...document.querySelectorAll('.task-check')];\nfunction upd(){\n  let d=0;\n  b.forEach(x=>{localStorage.setItem('sautero_backlog_'+x.id,x.checked);if(x.checked)d++;});\n  const p=Math.round(d/b.length*100);\n  document.getElementById('done').textContent='✅ '+d+' '+L('hotových','done');\n  document.getElementById('left').textContent='⏳ '+(b.length-d)+' '+L('zostáva','left');\n  document.getElementById('fill').style.width=p+'%';\n  document.getElementById('pie').style.background='conic-gradient(#34F7D7 '+(p*3.6)+'deg, #223d57 0deg)';\n  document.getElementById('pieLabel').textContent=p+'%';\n  renderPhaseProgress();\n  applyFilters();\n}\nb.forEach(x=>{\n  const saved=localStorage.getItem('sautero_backlog_'+x.id);\n  x.checked = saved===null ? x.checked : (saved==='true');\n  x.onchange=upd;\n});\n\n/* ---------- Per-phase progress bars — injected under each phase heading, computed from the\n   checkboxes in that phase's own tasklist so they can never drift from reality. ---------- */\nfunction renderPhaseProgress(){\n  document.querySelectorAll('.phase-head').forEach(head=>{\n    let list = head.nextElementSibling;\n    while(list && !list.classList.contains('tasklist')) list = list.nextElementSibling;\n    if(!list) return;\n    const checks = list.querySelectorAll('.task-check');\n    if(!checks.length) return;\n    const done = [...checks].filter(c=>c.checked).length;\n    let prog = head.querySelector('.phase-progress');\n    if(!prog){\n      prog = document.createElement('div');\n      prog.className = 'phase-progress';\n      prog.innerHTML = '\u003cdiv class=\"pbar\">\u003cdiv class=\"pfill\">\u003c/div>\u003c/div>\u003cspan class=\"pcount\">\u003c/span>';\n      head.appendChild(prog);\n    }\n    prog.querySelector('.pfill').style.width = Math.round(done/checks.length*100) + '%';\n    prog.querySelector('.pcount').textContent = done + '/' + checks.length;\n  });\n}\n\n/* ---------- Search + filters — with ~110 tasks, finding the one you mean is the main job\n   of this page. Status filter (open only), tag filters (critical / v2), and free-text search\n   combine; phases whose every task is filtered out hide entirely. ---------- */\nconst _filters = { open:false, crit:false, v2:false };\nfunction toggleFilter(key){\n  _filters[key] = !_filters[key];\n  document.getElementById('fOpen').classList.toggle('on', _filters.open);\n  document.getElementById('fCrit').classList.toggle('on', _filters.crit);\n  document.getElementById('fV2').classList.toggle('on', _filters.v2);\n  applyFilters();\n}\nfunction applyFilters(){\n  const q = document.getElementById('taskSearch').value.trim().toLowerCase();\n  let shown = 0, total = 0;\n  document.querySelectorAll('.task').forEach(task=>{\n    total++;\n    const check = task.querySelector('.task-check');\n    let visible = true;\n    if(_filters.open && check && check.checked) visible = false;\n    if(_filters.crit && !task.querySelector('.tag-crit')) visible = false;\n    if(_filters.v2 && !task.classList.contains('v2')) visible = false;\n    if(visible && q && task.textContent.toLowerCase().indexOf(q) === -1) visible = false;\n    task.classList.toggle('filtered-out', !visible);\n    if(visible) shown++;\n  });\n  // Hide phases that end up completely empty\n  document.querySelectorAll('.phase-head').forEach(head=>{\n    let list = head.nextElementSibling;\n    let rule = null;\n    if(list && list.classList.contains('phase-rule')){ rule = list; list = list.nextElementSibling; }\n    if(!list || !list.classList.contains('tasklist')) return;\n    const any = list.querySelector('.task:not(.filtered-out)');\n    head.style.display = any ? '' : 'none';\n    if(rule) rule.style.display = any ? '' : 'none';\n    list.style.display = any ? '' : 'none';\n  });\n  const hits = document.getElementById('filterHits');\n  const filtering = q || _filters.open || _filters.crit || _filters.v2;\n  hits.textContent = filtering ? ('🔍 ' + shown + '/' + total) : '';\n}\n/* Phase overview (Richard, 17.7.) — overall donut + done-vs-open bar per phase (click jumps),\n   plus the sticky phase-jump nav and collapsible phases. */\nfunction collectPhases(){\n  const rows = [];\n  document.querySelectorAll('.phase-head').forEach((head, idx)=>{\n    let list = head.nextElementSibling;\n    while(list && !list.classList.contains('tasklist')) list = list.nextElementSibling;\n    if(!list) return;\n    const checks = [...list.querySelectorAll('.task-check')];\n    if(!checks.length) return;\n    const done = checks.filter(c=>c.checked).length;\n    const num = head.querySelector('.phase-num')?.textContent || '';\n    const name = (num + ' ' + (head.querySelector('h2')?.textContent || '')).trim();\n    head.id = head.id || ('phaseHead' + idx);\n    rows.push({ num, name, done, total: checks.length, id: head.id, head, list });\n  });\n  return rows;\n}\nfunction renderPhaseOverview(){\n  const wrap = document.getElementById('phaseOverview');\n  if(!wrap) return;\n  const rows = collectPhases();\n  const done = rows.reduce((s,r)=>s+r.done,0), total = rows.reduce((s,r)=>s+r.total,0);\n  const R = 40, C = 2*Math.PI*R, frac = total ? done/total : 0;\n  const donut = `\u003csvg id=\"overallDonut\" viewBox=\"0 0 110 110\" style=\"width:120px; height:120px; flex:none;\">\n    \u003ccircle cx=\"55\" cy=\"55\" r=\"${R}\" fill=\"none\" stroke=\"var(--rule)\" stroke-width=\"13\"/>\n    \u003ccircle cx=\"55\" cy=\"55\" r=\"${R}\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\"13\"\n      stroke-dasharray=\"${(frac*C).toFixed(2)} ${(C-frac*C).toFixed(2)}\" stroke-linecap=\"round\"\n      transform=\"rotate(-90 55 55)\"/>\n    \u003ctext x=\"55\" y=\"53\" text-anchor=\"middle\" font-size=\"20\" font-weight=\"700\">${Math.round(frac*100)}%\u003c/text>\n    \u003ctext x=\"55\" y=\"68\" text-anchor=\"middle\" font-size=\"7\" fill=\"var(--ink-dim)\">${done}/${total}\u003c/text>\n  \u003c/svg>`;\n  wrap.innerHTML = '\u003cdiv class=\"po-title\">' + (_lang==='sk' ? 'Prehľad fáz — hotové vs. otvorené (klikni pre skok)' : 'Phase overview — done vs. open (click to jump)') + '\u003c/div>' +\n    `\u003cdiv class=\"po-flex\">${donut}\u003cdiv class=\"po-rows\">` +\n    rows.map(r=>`\n      \u003cdiv class=\"po-row\" onclick=\"jumpToPhase('${r.id}')\">\n        \u003cspan class=\"po-name\" title=\"${r.name.replace(/\"/g,'&quot;')}\">${r.name}\u003c/span>\n        \u003cspan class=\"po-bar\">\u003cspan class=\"po-fill\" style=\"width:${r.total ? Math.round(r.done/r.total*100) : 0}%\">\u003c/span>\u003c/span>\n        \u003cspan class=\"po-count\">${r.done}/${r.total}\u003c/span>\n      \u003c/div>`).join('') + '\u003c/div>\u003c/div>';\n  const nav = document.getElementById('phaseNav');\n  if(nav) nav.innerHTML = rows.map(r=>`\u003cbutton onclick=\"jumpToPhase('${r.id}')\" title=\"${r.name.replace(/\"/g,'&quot;')}\">${r.num} · ${r.done}/${r.total}\u003c/button>`).join('');\n}\nfunction jumpToPhase(id){\n  const head = document.getElementById(id);\n  if(!head) return;\n  head.classList.remove('collapsed');\n  const list = collectPhases().find(r=>r.id===id)?.list;\n  if(list) list.classList.remove('collapsed');\n  head.scrollIntoView({ behavior:'smooth', block:'start' });\n}\n/* Collapsible phases — tap a phase header to roll its task list up/down. */\nfunction initPhaseCollapse(){\n  collectPhases().forEach(r=>{\n    if(r.head.querySelector('.collapse-chev')) return;\n    const chev = document.createElement('span');\n    chev.className = 'collapse-chev';\n    chev.textContent = '▼';\n    r.head.appendChild(chev);\n    r.head.addEventListener('click', (e)=>{\n      if(e.target.closest('a, button, input')) return;\n      r.head.classList.toggle('collapsed');\n      r.list.classList.toggle('collapsed');\n    });\n  });\n}\napplyLang();\nrenderPhaseOverview();\ninitPhaseCollapse();\n\u003c/script>\n\n\u003cdiv class=\"sautero-stamp\" data-sk=\"🔄 Stav Sautero k 21. 7. 2026, 20:13\" data-en=\"🔄 Sautero state as of Jul 21, 2026, 20:13\">🔄 Stav Sautero k 21. 7. 2026, 20:13\u003c/div>\n\u003c/body>\n\u003c/html>\n"];
const frames = [];
/* Anchor links inside an embedded doc MUST be intercepted (Richard's 19.7. phone video — every
   tap on the inner jump-nav stacked another copy of this shell's banner): a srcdoc iframe
   inherits its base URL from THIS page, so a plain href="#timeline" resolves to plan.html#…
   and NAVIGATES the iframe to the whole shell — recursively nesting banner inside banner.
   Same-origin srcdoc means we can reach in: hash links become in-iframe smooth scrolls, real
   links (automation.html, …) escape to the top window instead of loading inside the tab. */
function patchInnerLinks(f){
  try{
    const doc = f.contentDocument;
    doc.addEventListener('click', (e)=>{
      const a = e.target.closest ? e.target.closest('a[href]') : null;
      if(!a) return;
      const href = a.getAttribute('href');
      if(href.startsWith('#')){
        e.preventDefault();
        const el = href.length > 1 ? doc.getElementById(href.slice(1)) : null;
        // Instant, not behavior:'smooth' — smooth scrolling inside a srcdoc iframe silently
        // no-ops in some engines (verified live 19.7.); a guaranteed jump beats a pretty maybe.
        if(el) el.scrollIntoView();
      } else if(!a.target){
        a.target = '_top';
      }
    }, true);
  } catch(err){}
}
let currentTab = 0;
function openTab(n){
  currentTab = n;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active', i===n));
  frames.forEach(f=>f && f.classList.remove('show'));
  if(!frames[n]){
    const f = document.createElement('iframe');
    f.addEventListener('load', ()=>patchInnerLinks(f));
    f.srcdoc = DOCS[n];
    document.getElementById('frames').appendChild(f);
    frames[n] = f;
  }
  frames[n].classList.add('show');
}
openTab(0);
/* Shell language: the ONE EN/SK toggle lives in this top bar (Richard, 21.7. — "prepínač vždy
   vo vrchnej lište pre všetky dokumenty"). It flips the shared sautero_doc_lang key, re-applies
   the shell chrome, and RELOADS the loaded inner iframes so each embedded doc re-renders in the
   new language (they read the key on load, whatever their own mechanism). The inner docs' own
   toggles still work and write the same key, so the two never disagree. */
function applyShellLang(){
  const lang = localStorage.getItem('sautero_doc_lang') || 'sk';
  document.querySelectorAll('[data-sk]').forEach(el=>{
    el.textContent = lang === 'sk' ? el.getAttribute('data-sk') : (el.getAttribute('data-en') || el.getAttribute('data-sk'));
  });
  const en = document.getElementById('lcEn'), sk = document.getElementById('lcSk');
  if(en && sk){ en.className = lang==='en'?'on':'off'; sk.className = lang==='sk'?'on':'off'; }
  document.documentElement.lang = lang;
}
function toggleShellLang(){
  const cur = localStorage.getItem('sautero_doc_lang') === 'en' ? 'en' : 'sk';
  localStorage.setItem('sautero_doc_lang', cur === 'en' ? 'sk' : 'en');
  applyShellLang();
  frames.forEach(f=>{ if(f){ const s = f.srcdoc; f.srcdoc = s; } });  // reload inner docs into the new language
}
window.addEventListener('storage', e=>{ if(!e || !e.key || e.key === 'sautero_doc_lang') applyShellLang(); });
setInterval(applyShellLang, 1500);
applyShellLang();
</script>
