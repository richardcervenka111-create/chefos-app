dy\">\u003cdiv class=\"task-title\">Cookies vysvetlenie — appka žiadne nepoužíva, len localStorage (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard sa pýtal na cookies pri mlčanlivostnej obrazovke. Overené priamo v kóde: appka nepoužíva žiadne cookies, len localStorage (prihlásenie, jazyk, ID zariadenia, tutorial-seen, tlačová fronta) — nič sledovacie/reklamné. Namiesto zaškrtávacích políčok (zavádzajúca \"voľba\" bez reálnej možnosti) pridané poctivé rozkliknuteľné vysvetlenie priamo do mlčanlivostnej obrazovky.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t95\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">My Team znova zapnuté naživo + pozvánka emailom (bod 5, 15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Keďže email login už funguje aj pre cudzie adresy, My Team dlaždica vrátená na skutočnú obrazovku. Pridané nové pole \"Send invite email\" — pošle skutočný prihlasovací email (cez signInWithOtp + emailRedirectTo) s pozvánkou do kuchyne zabudovanou priamo v odkaze. Ešte nikdy netestované naživo end-to-end.\u003c/div>\u003cspan class=\"role\">Nasadené, čaká na živý test\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t96\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Zrozumiteľná hláška pri prekročení emailového limitu (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard narazil na \"rate limit exceeded\" aj na nezrozumiteľné \"{}\" pri dvoch po sebe idúcich pokusoch — obe rovnaká príčina (2 emaily/hodinu limit vstavaného mailera). Appka teraz oba prípady rozpozná a ukáže jednu jasnú, akčnú hlášku namiesto surovej chyby.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t97\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Doména chefos.ch kúpená + DNS záznamy pre Resend pridané (bod 5, 15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard kúpil chefos.ch na Hostpointe (CHF 5/prvý rok, bez Domain Shield doplnku). Pridané 3 DNS záznamy (DKIM TXT, SPF MX+TXT na send.chefos.ch) cez Resend Add Domain flow. Resend momentálne overuje (status \"Pending\") — môže trvať pár hodín.\u003c/div>\u003cspan class=\"role\">Čaká na overenie\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Skontrolovať Resend status\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t98\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">\"AI Playground\" prepínač na Recepty (15.7., predbehnuté)\u003c/div>\u003cdiv class=\"task-desc\">AI-generované jedlá (Ask Chef's Assistant, Chef Challenge, sken menu) mali doteraz tag \"AI-generated\", ale zobrazovali sa pomiešané so skutočnými 173 receptami. Nový prepínač \"Moje recepty / AI Playground\" nad zoznamom ich oddeľuje — predvolene vidno len skutočné recepty. Logika overená simuláciou, ešte nekliknuté naživo v prehliadači (v pláne pri manuálnom teste pred trialom).\u003c/div>\u003cspan class=\"role\">Nasadené, čaká na živý test\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t99\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Doména appky presunutá na app.chefos.ch (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard nechcel mať svoje meno verejne viditeľné v adrese appky (predtým richardcervenka111-create.github.io). CNAME súbor v repozitári + DNS na Hostpointe + custom domain a HTTPS certifikát v GitHub Pages + Supabase Site URL/Redirect URLs prepnuté na https://app.chefos.ch/. Otestované naživo Richardom — email login cez app.chefos.ch funguje end-to-end, link aj automatické prihlásenie.\u003c/div>\u003cspan class=\"role\">Nasadené, otestované naživo\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t100\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Michelin-chef prepis, dávka 3: Bakery &amp; Bread 12/12 (15.7., predbehnuté)\u003c/div>\u003cdiv class=\"task-desc\">Draft migrácia db/72 (equipment/chef_notes/storage/shelf_life/plating_suggestions pre všetkých 12 receptov v kategórii — bageta, sourdough, brioška, pizza cesto, toastový chlieb, croissanty, babka, focaccia, žemle, panettone, no-knead chlieb, švajčiarsky vrkoč). Bez ázijských výnimiek, čisto západná pekáreň. Ešte nespustené na staging.\u003c/div>\u003cspan class=\"role\">Draft, čaká na staging test\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t101\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔴 → ✅ Kritický bug: registrácia nových users vôbec nefungovala (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard testom novej gmail adresy narazil na \"Database error saving new user\". Skutočná príčina (nájdená v Postgres logoch): handle_new_user() trigger nemal nastavený search_path, takže nevedel nájsť tabuľku profiles v kontexte interného auth procesu — blokovalo to ÚPLNE VŠETKÝCH nových users vrátane tímových pozvánok. db/73 opravené, spustené naživo Richardom. Bonus: appka si to predtým mylne vysvetľovala ako \"rate limit\" — friendlyAuthErrorMessage() opravená, aby nezhŕňala neznáme chyby pod jednu nálepku.\u003c/div>\u003cspan class=\"role\">Opravené, otestované naživo\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Kritické\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t102\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Odstránené Richardovo meno zo všetkých viditeľných obrazoviek (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Access-gate obrazovka (\"Richard needs to approve...\") a príklad mena v Schedule uploade (\"Cervenka Richard\") boli viditeľné pre každého nového užívateľa appky. Prepísané na neosobný text (\"An admin needs to approve...\", príklad \"Smith John\").\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t103\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Odhlásenie len pri zatvorení appky, nie pri prepnutí tabu (bod 5, 15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Supabase klient prepnutý na sessionStorage namiesto localStorage — session prežije bežné prepínanie tabov/appiek (napr. skok na fotoaparát), ale skutočné zavretie appky/prehliadača vyžaduje nové prihlásenie. Dôležité pre zdieľané kuchynské telefóny.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t104\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Nahrávanie .md/.html/.txt dokumentov všade, nielen foto/PDF (bod 9, 15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Všetkých 5 AI-sken miest (recept, menu, prep sheet, zmluva, rozpis) teraz zdieľa jeden readFileForScan/claudeScanSourceBlock helper. Textové formáty sa dekódujú a pošlú Claude ako čistý text namiesto toho, aby prešli cez vision pipeline.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t105\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Nové kuchyne dostanú ingrediencie, nezačínajú prázdne (bod 6, 15.7.)\u003c/div>\u003cdiv class=\"task-desc\">ingredients je viazaná na kitchen_id — 2000-položková databáza bola naseedovaná len do Richardovej kuchyne. Kto si vytvoril vlastnú novú kuchyňu (namiesto pripojenia cez pozvánku), dostal nulu ingrediencií. db/74: trigger skopíruje najväčšiu existujúcu sadu do každej novej kuchyne + jednorazový backfill pre existujúce prázdne kuchyne. TEST ON STAGING FIRST — zapisuje reálne dáta.\u003c/div>\u003cspan class=\"role\">Draft, čaká na staging test\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Kritické, čaká na staging\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t106\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Profil je plne voliteľný, žiadne pole nie je povinné (bod 4, 15.7.)\u003c/div>\u003cdiv class=\"task-desc\">My Profile brána predtým vyžadovala meno+vek+pohlavie, inak nešlo vojsť do appky. Teraz každé pole voliteľné + tlačidlo \"Skip for now\". db/75 pridáva profile_gate_skipped, aby sa brána znova neukazovala pri každom prihlásení.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t107\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Veľký zoznam 11 nových bodov (15.7.) — čaká na plán\u003c/div>\u003cdiv class=\"task-desc\">Richard poslal 11 nových požiadaviek naraz: kontextová pomoc/feedback všade (#1), čas na tvorbu nových jedál (#2), sken menu z URL (#7 — hotovo, viď t110), plynulé nerušené skenovanie s progresom (#8 — hotovo), nový HACCP megamodul + reálne Settings (#9 — vlna 1 hotová, viď t112), order list evidovaný vo všetkých profiloch (#10 — vyriešené, viď t108), 3-cestný filter receptov Moje/Sautero/firemné (#11 — hotovo), viacúrovňová admin hierarchia s vlastnými QR pozvánkami a viditeľnosťou dokumentov (#5), heslo + rozpoznávanie tváre ako prihlasovacia metóda (hotovo, viď t111). Zvyšný bod (admin hierarchia) a HACCP vlny 2-3 potrebujú samostatný plán/potvrdenie smeru pred stavaním.\u003c/div>\u003cspan class=\"role\">Čaká na Richardovo potvrdenie smeru\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Čaká na plán\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t134\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔴 → ✅ Incident 16.7.: super-admin lockout po db/85+86 — opravené db/90 + trvalý strážca v auditore\u003c/div>\u003cdiv class=\"task-desc\">Richard sa hodiny po spustení db/85+86 nevedel prihlásiť do vlastného admin účtu (\"Waiting for approval\"). Dve navrstvené chyby, obe Claudove, obe neviditeľné v SQL editore (ten beží ako superuser a obchádza RLS aj column granty): (1) db/86 zopakovalo presne ten istý rekurzívny RLS anti-pattern ako db/53 z 13.7. — politika NA tabuľke profiles sa pýta profiles vo vlastnom tele → Postgres 42P17, otrávi to KAŽDÝ dotaz na profiles pre každého; (2) db/85 pridalo stĺpce admin_perms/email, ale nerozšírilo column-level GRANT zoznam z db/62 → základný \"kto som\" dotaz pri logine padal pre všetkých. Oprava: db/90 (SECURITY DEFINER helpery + grant, spustené naživo 16.7., potvrdene funkčné). Raz a navždy: audit_db.py kontrola #6 — politika, ktorá sa pýta vlastnej tabuľky = tvrdý fail pred commitom (overené, že spätne chytá db/53 AJ db/86); nová lekcia v HEALTH_LOG: migrácie na profiles sa testujú cez authenticated rolu, nikdy nie úspechom v SQL editore.\u003c/div>\u003cspan class=\"role\">Vyriešené naživo, strážca aktívny\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Incident · Opravené\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t135\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Popoludňajšia dávka 16.7.: recepty pre nové kuchyne, Custom Ingredients, prísnejší access gate, Share My Recipes + Chef Friends\u003c/div>\u003cdiv class=\"task-desc\">(1) \u003cb>db/87\u003c/b> — nové kuchyne dostanú Sautero knižnicu receptov (len created_by IS NULL — osobné \"Moje\" recepty nikdy nepretečú do cudzej kuchyne ako \"Firemné\") + backfill; rovnaký dynamický vzor ako db/74. \u003cb>STAGING FIRST\u003c/b>. (2) \u003cb>db/88 + UI\u003c/b> — 🏷️ Custom Ingredients: nová admin-only ikonka vo vrchnej lište Home, upload súboru (foto/PDF/text/CSV) cez zdieľanú scan pipeline, Claude vytiahne položky, kontrola pred uložením, separátna tabuľka custom_ingredients (zámerne oddelená od kurátorovaného katalógu). Bezpečné rovno na produkciu. (3) Access gate: 'denied' status sa odteraz kontroluje pri KAŽDOM prihlásení, nie len pri prvom signupe — zamietnutie po pripojení predtým nemalo žiadny účinok. (4) \u003cb>db/89 + UI\u003c/b> — 📖 Share My Recipes presne podľa dohody: opt-in prepínač (default OFF), read-only, len vlastné recepty, len pre chef_connections priateľov; nová dlaždica 👨‍🍳 Chef Friends v Connections (prvý zoznam prepojení vôbec) + read-only detail receptu bez edit/scale/order tlačidiel. Bezpečné rovno na produkciu — vrátane column GRANTu pre recipes_shared (presne trieda chyby z dnešného incidentu, tentokrát nezabudnutá).\u003c/div>\u003cspan class=\"role\">Nasadené (db/87 staging first; db/88+89 rovno na produkciu; db/90 už beží)\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t148\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📦 12-bodová dávka + opravy 16.7. neskoro v noci: recepty policy/sekcie/projekty, Admin Team Members, RLS bug pri Remove\u003c/div>\u003cdiv class=\"task-desc\">(1) \"What's New\" — nová notifikačná ikona oddelená od Tutorialu, rastúci zoznam jednej obrazovky na jednu funkciu, odteraz sa pred pridaním pýtam vopred. (2) Tlač: starý obyčajný print button preč, branded print dostal teal akcenty aj \"Used In\". (3) Overil som Add Company flow a našiel 2 zvyšné diery — existujúci-užívateľ `?invite=` cesta kontrolovala revoked/expired PRED zavolaním opravnej db/118 logiky (obišla ju úplne), `joinKitchenViaLink` nemala hlasný alert pri zlyhaní — obe opravené. (4) feature_status.html dostal nový filter \"🛡️ Iba Kitchen Admin\" s počtom. (5) Home button teraz vynúti scroll na vrch (viacnásobne + `history.scrollRestoration='manual'`). (6) \u003cb style=\"color:var(--gold);\">Skutočná oprava:\u003c/b> Sautero komentáre boli neviditeľné naprieč kuchyňami, lebo každá kuchyňa má vlastnú fyzickú kópiu receptu (iné id) — nový `chefos_master_id` (db/119) zdieľaný všetkými kópiami rieši to natrvalo, aj pre budúce recepty. (7) Recepty: \"Add Project\" — vlastné pomenované zbierky (db/120, zrkadlí ingredient_lists) + odstránený duplicitný malý prepínač políc v zozname (prepínanie je teraz iba cez veľké dlaždice). (8) Send to Supplier dostal branded \"coming soon\" namiesto holého alertu. (9) Light/Dark mode — prepínač v Settings, appka zostáva tmavá defaultne. \u003cb style=\"color:var(--gold);\">Bug nájdený a opravený:\u003c/b> `showList()` natvrdo resetovala policu na 'sautero' pri KAŽDOM otvorení — po odstránení malého prepínača (bod 7) sa to prejavilo naplno (Sautero recepty \"všade a vždy\"), opravené odstránením toho riadku. \u003cb style=\"color:var(--gold);\">Ďalší bug:\u003c/b> Sekcie (Bakery &amp; Bread, Sushi Basics…) sa počítali zo VŠETKÝCH receptov v kuchyni bez ohľadu na policu — db/122 pridáva `shelf_scope` do recipe_category_icons, každá polica (aj každý nový projekt) má teraz vlastný nezávislý zoznam sekcií, štartuje len s Favorites/All. Nové projekty dostali aj výber z 8 farebných kníh namiesto vždy rovnakej ikony (db/123). \u003cb style=\"color:var(--gold);\">Bezpečnostný bug:\u003c/b> \"Remove\" člena z tímu (Admin/My Team) vždy zlyhával s \"new row violates row-level security policy\" — db/90-tka UPDATE politika nemala explicitný WITH CHECK, Postgres defaultne použil rovnaký výraz ako USING, ktorý vyžadoval kitchen_id NOT NULL — presný opak toho, čo Remove robí. Kým to zlyhávalo, odstránený člen si reálne PONECHAL plný prístup ku všetkým dátam kuchyne (RLS je založené na kitchen_id, nie na \"not in any team\" hláške) — db/121 pridáva správny WITH CHECK. Pridaný aj nový \"👥 Team Members\" tile priamo v Admin hube (Make Assistant/Remove), zdieľa rovnakú funkciu ako Connections &gt; My Team. Všetkých 5 migrácií (119–123) potvrdených spustených Richardom.\u003c/div>\u003cspan class=\"role\">Nasadené naživo, RLS fix pri Remove potvrdený po spustení db/121\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t147\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📦 Neskorá večerná dávka 16.7.: skutočné členstvo v tíme, dlhé podržanie všade, zdieľanie zoznamov, branding, opravy\u003c/div>\u003cdiv class=\"task-desc\">(1) \u003cb style=\"color:var(--gold);\">db/116–118\u003c/b> — Company režim je odteraz zamknutý na skutočných členov tímu (`profiles.in_team`, nastavuje sa serverovo pri joine cez kód/pozvánku, nikdy pri prepnutí typu účtu) alebo kitchen adminov — kto nie je, dostane rovnaké \"not in any team yet\" okno ako My Team, s placeholder tlačidlom \"Create a team of friends\". Sken tímového QR v appke sa teraz vždy pýta \"Do you want to become a member of team X?\" namiesto ticha. Company Admin dostal plné pozvánkové ovládanie (QR, email, revoke) vo svojom My Team. \u003cb style=\"color:var(--gold);\">Incident:\u003c/b> sautero@protonmail.com prijal Add Company pozvánku, dostal sa do kuchyne, ale admin rola sa neudelila ticho (spálená jednorazová pozvánka) — db/117 jednorazová oprava, db/118 trvalá poistka (spálená admin-pozvánka sa dá uplatniť, KÝM je stolička ešte prázdna a volajúci je už v tej kuchyni), appka odteraz na zlyhanie hlasno upozorní namiesto tichého console.error. (2) Dlhé podržanie (alebo pravý klik) na Check List jedlách AJ ingredienciách → Rename/Hide/Delete, pre každého — ingrediencie dostali vlastný `hidden` stĺpec (db/107). (3) Vlastné zoznamy ingrediencií (db/112) popri pevných Sautero/My Ingredients — dlhé podržanie DLAŽDICE zoznamu (nie položky) ponúkne Rename/Hide/Delete/Share; zdieľané zoznamy (db/114) vidia chef friends read-only. (4) Recepty dostali rovnaký úvodný výber ako Ingrediencie (My Recipes/Sautero personal, Sautero/Company Recipes company). (5) Branded Print v2 — dvojstĺpcový dizajn, čísla krokov, opravená zablokovaná tlač (synchrónny `window.print()`, meno kuchyne cachované vopred), netlačí navigáciu/feedback bublinu. (6) Nová plávajúca Sautero hlavička (Späť + Home) hore na každej obrazovke okrem Home namiesto prekrývajúcich sa ikoniek. (7) HACCP + Team Meetings skryté pre bežné personal účty (Head Admin a Company účty ich majú stále). (8) \"Add to Check List\" sa pýta na projekt AJ stanicu namiesto tichého hodenia do Extra. (9) Sken ingrediencií vie čítať aj .xlsx (vlastný ZIP/XML parser, žiadna knižnica) + \"✨ AI Details\" doplní kategórie/sezóny/sklad cez kreditový systém. (10) Kitchen Reports: adminom sa najprv ukáže zoznam všetkých kuchýň s ich menom/adminom (db/113) + rozklikávateľné recepty (police → sekcie → recept → View Recipe). (11) Feedback bug opravený (duplicitné ID medzi starým a novým systémom si navzájom prepisovali polia) + email_contacts trigger na access_requests namiesto krehkého best-effort insertu (db/106). (12) Centrálny Anthropic API kľúč (vlastný Claude Console workspace) namiesto \"každý nech si nosí svoj\" — 12 client-side \"add your API key\" hlášok odstránených. (13) Sautero-brandovaná Supabase emailová šablóna (navy/tyrkys, zachovaný `{{ .Token }}` pre ručné zadanie kódu) nastavená naživo v Authentication → Emails.\u003c/div>\u003cspan class=\"role\">Nasadené naživo, viaceré kroky overené priamo s Richardom (screenshoty počas session)\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t146\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📦 Večerná 8-bodová dávka 16.7.: skutočné súkromie osobných dát, tímové join kódy, Kitchen Reports, AI subscription, Privacy consent gate\u003c/div>\u003cdiv class=\"task-desc\">(1) \u003cb style=\"color:var(--gold);\">db/97\u003c/b> — recepty aj ingrediencie dostali `is_personal` + prepísané RLS: osobné dáta boli doteraz LEN UI filter (kolega prepnutý na \"Firemné\" ich reálne videl) — teraz skutočne neviditeľné pre kohokoľvek okrem tvorcu, natrvalo, aj pri zmene kuchyne. Nová \"Ingrediencie\" úvodná plocha (Sautero / My Ingredients). Nová admin rola \"Create Teams\" (join_code_hash, nikdy plaintext v DB) + Create Team dlaždica + Team Join obrazovka (sken QR cez existujúci jsQR / ručný kód) + potvrdzovací dialóg pri zmene Personal/Company s \"už sa nepýtať\". (2) \u003cb>db/99\u003c/b> — Kitchen Reports (rovnaká 📊 ikonka ako Internal Docs, ale per-kuchyňa, pre každého Kitchen Admina s novým právom) — recepty/Check List počty vždy, hodiny podľa mena LEN pre zamestnancov čo dali súhlas (Settings → Share My Hours, default OFF). (3) \u003cb>db/98\u003c/b> — Send Feedback (Settings) + admin Feedback dlaždica. (4) Overené: Check List \"Development\" je scoped na kuchyňu — keďže Richard je jediný člen svojej, efekt je \"len ja\", ale mechanizmus je per-kuchyňa nie per-účet. (5) Branded Print (druhá tlačiareň ikonka na recepte) — jeden pevný Sautero vzor, nie zatiaľ per-kuchyňa logo. (6) \"Add to Check List\" tlačidlo na detaile receptu. (7) \u003cb>db/97\u003c/b> — `is_subscribed` na profiles, ručný prepínač v Admin Directory, gate v `callClaudeAPI()` AJ priamo v `claude-proxy` edge funkcii (klientská strana sama osebe by sa dala obísť). (8) \u003cb style=\"color:var(--gold);\">db/100\u003c/b> — nová povinná Privacy & Data Protection brána (rovnaký mechanizmus ako Confidentiality z 13.7.) pred KAŽDÝM vstupom, aj pre už prihlásených; `legal.html` prepísaný s GDPR/švajčiarsky nDSG sekciami; nový `/security/` priečinok s technickým security review pre právnika. Zámerne KAŽDÝ nový gate/RLS je fail-open pri chybe dopytu.\u003c/div>\u003cspan class=\"role\">Nasadené, migrácie db/97–100 aj edge function redeploy potvrdené spustené (kontrolný skript, 17 bodov ✅)\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t145\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📦 Popoludňajšia dávka 16.7. — živé testy (t144)\u003c/div>\u003cdiv class=\"task-desc\">Custom Ingredients ikonka je teraz v Ingredients, nie na Home — over že admin ju tam vidí a ostatní nie. Preview as Normal User (Settings, admin) — over že banner dole naozaj vráti späť aj po prekliknutí na iné obrazovky. \"Coming soon\" stena — otvor appku v anonymnom okne BEZ akéhokoľvek parametra v URL (po spustení db/96 a zapnutí) a over že sa ukáže; potom skús s ?invite= parametrom a over že sa neukáže. Working Time → rozklikni mesiac → deň, kde si niečo objednal alebo vytlačil štítok, over že sa to zobrazí. Settings reorder ikonka (vpravo hore) — over že poradie sa uloží a drží aj po reloade.\u003c/div>\u003cspan class=\"role\">Živý test, admin aj bežný účet\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t143\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">👋 Add Friend QR ako pozvánka (db/95) + heslo \"already set\" stav\u003c/div>\u003cdiv class=\"task-desc\">Spustiť db/95. Nový (nie admin) člen tímu otvorí Add Friend, ukáže QR — over že sa QR vôbec vygeneruje (kitchen_invites insert už nie je admin-only). Cudzí človek bez účtu naskenuje natívnou kamerou (nie cez appku) → prihlási sa → musí skončiť v TEJ istej kuchyni AJ spojený ako priateľ automaticky. Existujúci chef v inej kuchyni naskenuje cez appkové Scan QR → musí sa LEN spojiť ako priateľ, nesmie sa presunúť do cudzej kuchyne. Zvlášť: My Profile → Account & Security, over že s už nastaveným heslom appka ukáže \"Password is set\" + Change Password namiesto rovno poľa.\u003c/div>\u003cspan class=\"role\">Živý test, 2+ účty vrátane nového bez účtu\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t142\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📋 Check List projekty — picker, \"Development\" bucket, skryté hotelové stanice (db/94)\u003c/div>\u003cdiv class=\"task-desc\">Spustiť db/94 (STAGING FIRST — píše do všetkých existujúcich tasks/prep_dishes riadkov). Ako admin: Check List sa otvorí na obrazovke s dlaždicami, \"Development\" musí obsahovať presne to, čo tam bolo predtým (SKY, Garde Manger, Lobby, Hot Line...). Ako iný účet: prázdna obrazovka, len \"+ Add Project\" — po vytvorení nového projektu vidieť LEN 5 základných staníc (Hot Line, Entremetier, BQT, Desserts, Extra), nikdy nie SKY/Garde Manger/Lobby. Overiť aj \"All stations\" prehľad v novom prázdnom projekte.\u003c/div>\u003cspan class=\"role\">Migrácia + živý test, 2 účty\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Migrácia čaká\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t141\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📖 Personal/Company účet — brána pri prihlásení + filter receptov (db/93)\u003c/div>\u003cdiv class=\"task-desc\">Spustiť db/93. Prihlásiť sa existujúcim účtom — musí sa zobraziť brána \"Personal or Company Account?\" (jednorazovo, aj starým účtom, nielen novým). Vybrať Personal → v Recipes sekcii vidieť len Moje + Sautero (žiadne Firemné). Vybrať Company → len Sautero + Firemné (žiadne Moje). Overiť aj prepnutie neskôr cez Settings → Account Type, a že sa filter tlačidiel okamžite prekreslí.\u003c/div>\u003cspan class=\"role\">Živý test, 2 účty\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t139\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🛒 db/76 doladené a potvrdené naživo — posledná zvyšná migrácia z 15.7. dobehnutá\u003c/div>\u003cdiv class=\"task-desc\">Prvý pokus o db/76 padol na `operator does not exist: name[] = text[]` — \u003ccode style=\"background:rgba(0,0,0,0.25); padding:1px 6px; border-radius:4px;\">pg_attribute.attname\u003c/code> je typ \u003ccode style=\"background:rgba(0,0,0,0.25); padding:1px 6px; border-radius:4px;\">name\u003c/code>, nie \u003ccode style=\"background:rgba(0,0,0,0.25); padding:1px 6px; border-radius:4px;\">text\u003c/code> — porovnanie jednotlivých hodnôt sa castuje automaticky, porovnanie POLÍ nie. Oprava: \u003ccode style=\"background:rgba(0,0,0,0.25); padding:1px 6px; border-radius:4px;\">array_agg(attname::text ...)\u003c/code>. Keďže Supabase SQL Editor spúšťa vložený skript ako jednu transakciu, chyba v DO bloku vrátila späť úplne všetko — žiadny čiastočný stav, žiadne riziko. Opravené, spustené naživo, KONTROLA teraz ukazuje 15/15. Všetkých 11 migrácií z tohto týždňa (76, 80-90) je potvrdených bežiacich na produkcii.\u003c/div>\u003cspan class=\"role\">Nasadené a overené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t144\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📦 Popoludňajšia 11-bodová dávka (16.7.): coming soon stena, admin preview, Check List projekty do praxe, Working Time detail, tutorial\u003c/div>\u003cdiv class=\"task-desc\">(1) Custom Ingredients presunuté z Home do Ingredients (patrí tam, nie na hlavnú plochu). (2) 🛡️ Admin → Settings → \"Preview as Normal User\" — dočasne si vyskúšaš appku očami bežného účtu, trvalý banner dole na návrat (nezávislý od currentIsAdmin, presne preto že ten sa počas preview vypne). (3) Access Requests dostal refresh tlačidlo. (4) Android bug nahlásený, čaká sa na error_logs výpis na diagnózu. (5) \u003cb style=\"color:var(--gold);\">\"Coming soon\" stena (db/96)\u003c/b> — kto príde na stránku BEZ invite/join/friend odkazu ALEBO QR a nemá ešte session, uvidí \"čoskoro spúšťame\" namiesto loginu; každý s reálnym odkazom/QR alebo existujúcou session prejde normálne. Ovládané cez app_config.coming_soon_enabled — dá sa vypnúť priamo v SQL bez nasadenia. Zámerne fail-open (chýbajúca migrácia nesmie zamknúť pilotnú kuchyňu). (6) Settings dostal rovnaký reorder mechanizmus ako Home (ikonka vpravo hore). (7) Aktuálny typ účtu (Personal/Company) vidieť priamo v názve dlaždice Settings. (8) Working Time → mesiac → deň teraz ukazuje aj objednávky (Order List, dotknuté ten deň) a vytlačené štítky (print_label_log, presný historický záznam) — vedome BEZ počtu \"splnených úloh\", keďže ani tasks ani prep_items nezaznamenávajú kto a kedy niečo dokončil, len kto to vytvoril. (9) Chef Friends už rieši \"Friends dlaždicu\" z Connections — nič nové netreba. (10) 👋 Add Friend QR teraz funguje aj ako pozvánka do kuchyne pre KAŽDÉHO člena (db/95, vedomé zrušenie časti db/81 po priamom potvrdení). (11) Tutorial dostal 3 nové sekcie (HACCP, Connections, Admin) a aktualizované Check List/Recipes — bez screenshotov, appka ich nikdy nepoužívala a vymyslené screenshoty bez živého prihlásenia by mohli byť nepresné.\u003c/div>\u003cspan class=\"role\">Nasadené (db/96 rovno na produkciu)\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t118\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🛡️ Admin dlaždica prerobená na hub: Add Admin, Admin Directory, Access Requests, Email Contacts (bod 1, 16.7.)\u003c/div>\u003cdiv class=\"task-desc\">Doriešuje admin hierarchiu z t107 (#5). Dve úrovne admina, nie jedna: \u003cb style=\"color:var(--accent);\">Kitchen Admin\u003c/b> — nová stĺpec profiles.admin_perms (db/85), delegovateľné oprávnenia po jednom (manage_invites, manage_team, language_audit, view_email_contacts, approve_access), zostáva úplne obyčajný profil, žiadny \"Admin\" štítok, žiadny super-admin dosah — presne podľa Richardovho zadania (\"rovnaký profil ako obyčajný\"). \u003cb style=\"color:var(--accent);\">Head Admin\u003c/b> — nezmenený is_admin (Richard), plný dosah. Admin dlaždica na Home je teraz hub v dizajne Home s 4 dlaždicami namiesto priameho odkazu na Access Requests: ➕ Add Admin (vyhľadanie profilu podľa mena/mailu → výber úrovne), 📋 Admin Directory (iba Richard — zoznam všetkých, vyhľadávanie, Edit s on/off prepínačom pre každé oprávnenie + samostatný Head Admin prepínač), 📨 Access Requests (presunuté sem, viditeľné aj pre approve_access), 📧 Email Contacts (presunuté zo Settings sem, viditeľné aj pre view_email_contacts). Pri stavaní nájdený reálny bug: email_contacts INSERT politika vyžadovala is_admin, appka ale zapisuje access-request kontakty pri KAŽDOM novom signupe, takmer nikdy nie od admina — ticho zlyhávalo od db/82 (prehltnuté v .then()), opravené v db/86 zároveň. db/86 tiež pridáva chýbajúcu \"super-admin číta všetky profily\" politiku (Admin Directory ju potrebuje na vyhľadávanie naprieč kuchyňami).\u003c/div>\u003cspan class=\"role\">Nasadené (db/85 rovno na produkciu, db/86 STAGING FIRST — prepisuje RLS)\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Bezpečnostná oprava\u003c/span>\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t117\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Osembodová dávka 15.7. neskoro v noci: logout, invite-only, heslo povinné, Connections, email databáza (bod 4/9/10 pozri poznámku)\u003c/div>\u003cdiv class=\"task-desc\">(1) Working Time/Check List pre nových users: overené, ŽIADNA zmena kódu potrebná — nová kuchyňa nikdy nededila prep/dochádzkové dáta (len db/74 kopíruje ingrediencie, nič iné) — už bolo správne, len teraz zdokumentované. (2) 🚪 Sign Out v Settings — appka doteraz nemala spôsob sa reálne odhlásiť na zdieľanom zariadení. (3) Náklady +CHF 97.73 zapísané do troch dokumentov (účel zatiaľ neupresnený). (4) @chefos.ch mail — Claude nesmie vytvárať účty; odporúčanie dané Richardovi priamo v chate. (5) Invite-only lockdown: db/81 (STAGING FIRST) — vytváranie/rušenie invite QR/linkov je teraz len pre admina (RLS + appka), self-serve \"vytvor si vlastnú kuchyňu\" zostáva len pre richard.cervenka@icloud.com; upozornenie na nový access request (notify-access-request) už existovalo, len treba overiť deploy. (6) 🔗 Connections (bývalé My Team) — nová stránka v dizajne Home: Scan QR (kamera + jsQR, nová CDN závislosť), Share QR Code (3 kontrolné otázky presne podľa zadania — Add friend je reálna funkcia cez novú chef_connections tabuľku db/84, Share My Recipes je poctivo označená ako \"coming soon\" kým sa nevyjasní rozsah, Invite New Chef = existujúci tok, len admin-only), My Team (nezmenený obsah, len presunutý). (7) Heslo povinné: db/83 (bezpečné rovno na produkciu) — nová brána hneď po súhlase s mlčanlivosťou, nedá sa preskočiť, emailový kód funguje ďalej paralelne. (8) Email databáza: nová email_contacts tabuľka (db/82) + admin-only prehľad v Settings, zachytáva access requesty AJ (po novom) komu sa poslal invite mail — predtým sa to nikde nezapisovalo. Bod 9 (posunúť plán vpred) = táto celá dávka. Bod 10 (skontrolovať appku) = auditory (audit_db.py/audit_app.py) prešli čisto po každej zmene + logická kontrola nových tokov (invite scan, connection unikátnosť, gate poradie); živý test na telefóne stále chýba.\u003c/div>\u003cspan class=\"role\">Nasadené (db/81+82+83+84 čakajú na spustenie, 81 staging first)\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Bezpečnostná oprava\u003c/span>\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t116\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔐 Šesťbodová dávka 15.7. v noci: filtre, poličky, admin lockdown, Settings, install návod, gamify návrh\u003c/div>\u003cdiv class=\"task-desc\">(1) Viditeľnosť označených filtrov = ŠTANDARD: aktívny chip je vždy plný teal + tmavý text, zjednotené 4 rodiny chipov (recepty, prep, scale, všeobecné) — Check List statusy si nechávajú vlastné sémantické farby zámerne. (2) Poličky receptov podľa autora: Sautero = celá zabudovaná knižnica (recepty bez autora, vrátane 173 migrovaných), Moje = moje, Firemné = od kolegov; AI-generated ostáva len ako štítok; predvolená polička = Sautero. (3) Gamify návrh pre neplatiacich = model 14 v monetization.html (dátový flywheel: body za Yield %/ceny/HACCP → tokeny na AI; zjednocuje t44+t71+Chef Challenge; stavať po triale). (4) Admin lockdown: db/80 (STAGING FIRST) — is_admin len richard.cervenka@icloud.com, trigger blokuje zmeny stĺpca kýmkoľvek iným; pri kontrole nájdená REÁLNA eskalačná diera (politika z db/34 dovoľovala komukoľvek nastaviť si is_admin=true) — od db/34 otvorená, teraz zavretá; appka už nedáva admin zakladateľovi kuchyne. (5) ⚙️ Settings hub na Home — profil+bezpečnosť, AI/scan, jazyk (nový picker), mena (admin), poradie ikon, viditeľnosť sekcií, návod, install, právne. (6) 📲 \"Add to Phone\" návod (iOS Safari + Android Chrome) — fotka od Richarda nedorazila, postavený štandardný postup.\u003c/div>\u003cspan class=\"role\">Nasadené (db/80 čaká na staging)\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Bezpečnostná oprava\u003c/span>\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t115\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🕒 /visual data/: aktuálny obsah + štítok poslednej aktualizácie + SK/EN prepínač všade (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richardova požiadavka v troch bodoch. (1) Obsah dotiahnutý na dnešný stav: planning (čerstvé TOP3 + celý denníkový zápis 15.7.), tasklist (9 nových Hotovo riadkov, zastarané P1 položky anotované, časová os 15.7.), features (nová HACCP karta, Fridge Temp preznačený na naživo-v-HACCP), VISUAL_GUIDE (čísla na obálke ~1300/6 AI, sekcia 11 \"dodané, ešte neilustrované\", spend ~CHF 141). (2) Každý z 13 dokumentov má fixný štítok \"🔄 Stav Sautero k [dátum, čas]\" vpravo dole — archívne dokumenty (review 13.7., snapshot 9.7.) majú čestnú variantu \"hodnotenie/snapshot k X · aktualizované Y\". (3) SK/EN prepínač všade — 6 dokumentov ho už malo, zvyšných 7 dostalo plávajúce tlačidlo vľavo dole so zdieľaným sautero_doc_lang kľúčom (jeden prepnutý jazyk platí naprieč všetkými dokumentmi). Investor deck po novom kompletne dvojjazyčný v statickom obsahu (predvolene po slovensky); pri monetization/reviews je preložený chrome, telá kariet ostávajú v pôvodnom jazyku — rovnaká hranica ako pri backlog úlohách, poctivo priznaná.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t114\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🧼 HACCP modul, vlna 2 (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Fritézový olej a Škodcovia nepotrebovali žiadny nový kód okrem zapnutia dlaždíc — enginy z vlny 1 (haccp_measurement_log / haccp_checklist_items) ich mali pripravené vopred vrátane check constraintov v db/77. Skutočná novinka: Expirácia štítkov — tlač štítkov si teraz pamätá, čo sa vytlačilo (print_label_log, db/78, aj s vypočítaným use-by dátumom; zlyhanie logu nikdy nezablokuje samotnú tlač) a nová obrazovka HACCP → Label Expiry zoskupuje podľa naliehavosti (po dátume / dnes-zajtra / v poriadku / bez dátumu) s tlačidlom \"Used / discarded\" — zoznam ukazuje, čo je fyzicky v kuchyni, nie históriu tlače. db/78 = čisto nová tabuľka, bezpečná rovno na produkciu. Vlna 3 zostáva: Školenia personálu + admin Report.\u003c/div>\u003cspan class=\"role\">Nasadené, vlna 2\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo · vlna 2\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t113\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🎨 Visual Data Standards — redizajn všetkých 13 dokumentov + presun do /visual data/ (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richardov nový standing štandard: každá infografika/dashboard na world-class úroveň, brand identita nedotknutá, všetko v /visual data/. Hotové v jeden deň: investor deck (hero s 3 kľúčovými číslami, sticky navigácia, vlastná Gantt časová os + SVG revenue graf namiesto Chart.js — už žiadna externá závislosť), status (pulse strip so živými počtami stĺpcov, Hotovo stĺpec s vlastným scrollom), backlog (vyhľadávanie + filtre otvorené/kritické/v2, progress bar per fáza — všetkých 112 úloh aj zaškrtnutia zachované), monetization (klikateľná prehľadová matica 13 modelov), tasklist (vyhľadávanie + filtre JA/TY, počítadlá skupín), planning (štatistiky denníka, vyhľadávanie), features (vyhľadávanie, rozbaliť/zbaliť), automation (zosúladené čísla so status.html: ~CHF 141), oba Critical Reviews (týždenná navigácia — čiastočne plní t85), VISUAL_GUIDE + Manifesto + starý Status 9.7. (posledné 3 dokumenty na starej teplej palete preladené na navy/teal). Staré cesty = redirect stuby, takže záložky fungujú. Všetky 4 naplánované automatizácie (health check, ingredient agent, snapshot, deadline check) presmerované na nové cesty.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t112\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🧼 HACCP modul, vlna 1 (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard chcel novú HACCP stránku, dizajnovo totožnú s hlavným menu (rovnaké dlaždice, rovnaká veľkosť), s funkciami ktoré spomenul plus Fridge Temp presunuté z hlavného menu sem. Na jeho výslovnú žiadosť (\"rozmýšľaj ako HACCP odborník... dopln aj iné funkcie\") doplnené o štandardné kontrolné body zo švajčiarskeho Selbstkontrollkonzeptu, ktoré appke úplne chýbali: príjem tovaru, jadrová teplota pri varení, protokol chladenia, škodcovia, školenia personálu, admin prehľad. Vlna 1 (nasadené): Fridge Temp (oživené — showFridges() bol len odpojený), Príjem tovaru, Jadrová teplota, Protokol chladenia, Cleaning checklist, Osobná hygiena checklist. Vlna 2-3 (dlaždice viditeľné, zatiaľ \"pripravujeme\" baner): Fritézový olej, Škodcovia, Expirácia štítkov, Školenia, Report. db/77 pridáva dve znovupoužiteľné tabuľky namiesto jednej na modul — haccp_measurement_log (odčítanie + OK/Problém, použité 3x teraz + fritézový olej neskôr) a haccp_checklist_items/_log (opakujúca sa úloha, použité 2x teraz + škodcovia neskôr).\u003c/div>\u003cspan class=\"role\">Nasadené, vlna 1\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo · vlna 1\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t111\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔓 Heslo + Face ID prihlásenie (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Druhý spôsob prihlásenia popri emailovom kóde. Heslo: štandardné Supabase email+heslo (nastaví sa v My Profile → Account &amp; Security). Face ID: skutočný WebAuthn platform authenticator (Face ID/Touch ID/Windows Hello) ako odomknutie PER ZARIADENIE, nie nový server-overený faktor — appka nemá vlastný backend na overovanie WebAuthn podpisov, takže biometrický gate chráni lokálne uložený refresh token namiesto toho. Žiadne biometrické dáta appku ani Supabase nikdy neopustia. Bezpečné aj na zdieľaných kuchynských tabletoch — cudzí odtlačok/tvár jednoducho nevytvorí platný podpis pre cudzí kľúč.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t110\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Sken menu priamo z webstránky (URL), nielen z fotky/PDF (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard: chce vedieť naskenovať menu reštaurácie priamo z jej webu, nie len z odfotenej stránky. Nový vstupný bod \"A menu website\" vo výbere typu skenu — appka si vypýta link a namiesto poslania fotky Claude-mu použije jeho vlastný server-side web_fetch nástroj (web_fetch_20260209), ktorý si stránku stiahne sám na strane Anthropicu. Nevyžaduje žiadnu zmenu v claude-proxy edge funkcii (tá je čisté prepošlenie JSON tela). Zvyšok pipeline je identický s existujúcim skenom celého menu z fotky — jedno jedlo = jeden plný recept na kontrolu pred uložením.\u003c/div>\u003cspan class=\"role\">Nasadené\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t108\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">Order List: teammates si navzájom nemažú/neprepisujú objednávky (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard: zdieľané naprieč tímom, sčítava sa pri opakovanej surovine, admin vidí kto čo objednal. Kontrolou vyšli najavo dva reálne bugy: rovnaká surovina od dvoch ľudí sa prepísala namiesto sčítania, a Save tlačidlo v stanicovom pickeri mazalo CELÚ stanicu za celú kuchyňu pred uložením — jeden človek mohol ticho zmazať objednávku druhého. db/76 mení unikátne obmedzenie na (kuchyňa, stanica, ingrediencia, autor) — každý má svoj vlastný riadok. \u003cb style=\"color:var(--accent);\">Spustené naživo 16.7.\u003c/b> — cestou sa našla a opravila aj chyba v samotnej migrácii (array_agg(name) sa nedal porovnať s text[] poľom bez castu; Supabase spúšťa vložený SQL ako jednu transakciu, takže pôvodný pokus sa celý bezpečne vrátil späť, nič sa nespustilo čiastočne).\u003c/div>\u003cspan class=\"role\">Nasadené a potvrdené na produkcii\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t109\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🧠 Mentálne zdravie/prevencia vyhorenia — ODLOŽENÉ (15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard chcel priebežné/skryté sledovanie výrazu tváre cez prednú kameru počas celej pracovnej doby na zber dát o psychickom stave zamestnancov. Odmietnuté z právnych a etických dôvodov: EU AI Act výslovne zakazuje emotion recognition na pracovisku ako neprijateľné riziko; švajčiarsky Art. 328 OR (ochrana osobnosti) a nDSG radia psychický stav medzi citlivé údaje vyžadujúce slobodný súhlas, ktorý zamestnanec voči appke vlastného zamestnávateľa reálne nemá. Navrhnutá alternatíva namiesto toho: (1) dobrovoľný denný \"ako sa cítiš\" check-in, jedno kliknutie, nikdy nepovinný, (2) využiť objektívne signály, ktoré appka už zbiera (Working Time — nadčasy, chýbajúce voľno) ako rizikové faktory vyhorenia, (3) admin vidí len agregované/anonymizované trendy tímu, nie individuálne \"nálady\" v reálnom čase. Richard súhlasil s odložením — appka na to čaká, kým sa k tomu Claude vráti.\u003c/div>\u003cspan class=\"role\">Odložené, čaká na návrat k téme\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Mental health · Odložené\u003c/span>\u003c/div>\u003c/div>\n  \u003c/div>\n\n  \u003c!-- LIVE TESTING CHECKLIST -->\n  \u003cdiv class=\"phase-head\">\n    \u003cdiv class=\"phase-num\">🧪\u003c/div>\n    \u003cdiv class=\"phase-title-wrap\">\u003ch2 data-sk=\"Živé testovanie na zariadení — ešte nikdy neoverené\" data-en=\"Live device testing — never yet verified\">\u003c/h2>\u003cdiv class=\"sub\" data-sk=\"Všetko postavené a auditormi prešlo čisto, no žiadny z týchto tokov ešte nešiel naživo na reálnom telefóne (bod 2, 16.7.)\" data-en=\"Everything is built and passes the auditors clean, but none of these flows has run live on a real phone yet\">\u003c/div>\u003c/div>\n    \u003cspan class=\"phase-status st-active\">Pred trialom\u003c/span>\n  \u003c/div>\n  \u003cdiv class=\"phase-rule\">\u003c/div>\n  \u003cdiv class=\"tasklist\">\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t119\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔗 Connections hub — navigácia medzi Scan QR / Share QR Code / My Team\u003c/div>\u003cdiv class=\"task-desc\">Otvoriť z Home, prejsť do všetkých troch podobrazoviek a späť, overiť že dizajn sedí s Home dlaždicami.\u003c/div>\u003cspan class=\"role\">Živý test na telefóne\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t120\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📷 Scan QR — kamera + jsQR\u003c/div>\u003cdiv class=\"task-desc\">Reálna kamera na telefóne, nie len desktop simulátor — jsQR je nová CDN závislosť, nikdy neoverená mimo lokálneho vývoja.\u003c/div>\u003cspan class=\"role\">Živý test na telefóne\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t121\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🤝 Add Friend flow (chef_connections)\u003c/div>\u003cdiv class=\"task-desc\">Dvaja skutoční ľudia, dve zariadenia — naskenovať, potvrdiť, overiť že spojenie vznikne obom stranám a druhýkrát sa nezduplikuje.\u003c/div>\u003cspan class=\"role\">Živý test, 2 zariadenia\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t122\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔒 Invite-only lockdown (db/81)\u003c/div>\u003cdiv class=\"task-desc\">Neadmin nesmie vidieť/vytvoriť/zrušiť invite QR ani link; admin áno. Self-serve \"vytvor si kuchyňu\" funguje len pre richard.cervenka@icloud.com.\u003c/div>\u003cspan class=\"role\">Živý test, 2 účty\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t140\" checked>\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔒 → ✅ Access-request schvaľovacia brána potvrdená naživo (paulapanizzon@gmail.com, 15.7.)\u003c/div>\u003cdiv class=\"task-desc\">Richard poslal reálnej osobe pozvánku — appka ju korektne zablokovala na \"Waiting for approval\" a nepustila ďalej, kým ju ručne neschválil v Access Requests. Potvrdzuje, že brána z db/34 platí aj pre pozvaných (invite dá prístup ku KONKRÉTNEJ kuchyni, nie okolo schválenia). Vedľajší nález pri kontrole: jej email_contacts záznam (source=access_request) chýbal — posledná obeť starej db/82 politiky (opravenej v db/86) tesne pred opravou; jediná diera zo všetkých access_requests, doplnená ručným backfillom.\u003c/div>\u003cspan class=\"role\">Potvrdené naživo\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-v2\">Hotovo\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t123\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🔓 Povinná brána na heslo (db/83)\u003c/div>\u003cdiv class=\"task-desc\">Objaví sa hneď po súhlase s mlčanlivosťou, nedá sa preskočiť/obísť späť tlačidlom, emailový kód naďalej funguje ako alternatíva.\u003c/div>\u003cspan class=\"role\">Živý test, nový účet\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t124\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">😊 Face ID / Touch ID (WebAuthn)\u003c/div>\u003cdiv class=\"task-desc\">Skutočný platform authenticator, nie mock — overiť nastavenie v My Profile aj samotné odomknutie pri ďalšom prihlásení, aj že cudzí odtlačok/tvár na zdieľanom tablete neprejde.\u003c/div>\u003cspan class=\"role\">Živý test na telefóne s Face/Touch ID\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t125\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🧼 HACCP vlna 1 — Fridge Temp, Príjem tovaru, Jadrová teplota, Chladenie, Cleaning, Hygiena\u003c/div>\u003cdiv class=\"task-desc\">Šesť obrazoviek, každá zapisuje do haccp_measurement_log/haccp_checklist_items — overiť že sa dáta reálne uložia a zobrazia v histórii.\u003c/div>\u003cspan class=\"role\">Živý test v kuchyni\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t126\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🏷️ HACCP vlna 2 — Fritézový olej, Škodcovia, Expirácia štítkov\u003c/div>\u003cdiv class=\"task-desc\">Expirácia štítkov je nová logika (print_label_log, db/78) — vytlačiť štítok, overiť že sa objaví v Label Expiry zoskupený podľa naliehavosti, otestovať \"Used/discarded\".\u003c/div>\u003cspan class=\"role\">Živý test s tlačiarňou štítkov\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t127\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🚪 Sign Out\u003c/div>\u003cdiv class=\"task-desc\">Odhlási, appka sa vráti na prihlasovaciu obrazovku, ďalší človek sa vie prihlásiť na to isté zdieľané zariadenie bez zvyškov predošlej session.\u003c/div>\u003cspan class=\"role\">Živý test na zdieľanom tablete\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t128\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📲 PWA ikonka + localStorage session\u003c/div>\u003cdiv class=\"task-desc\">Appka pridaná na plochu (Add to Phone), prihlásenie cez emailový link otvorený v Safari — overiť že sa stav prihlásenia zosynchronizuje aj v nainštalovanej PWA ikonke, nie len v prehliadači.\u003c/div>\u003cspan class=\"role\">Živý test na telefóne\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t129\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📖 Recipe scale bar — Custom×N indikátor, 3-cestný filter Sautero/Moje/Firemné\u003c/div>\u003cdiv class=\"task-desc\">Vlastné násobenie porcie ukáže správne \"×N\", polička receptov filtruje správne podľa autora vrátane predvolenej Sautero police.\u003c/div>\u003cspan class=\"role\">Živý test\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t130\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📋 Check List — prázdny stav/tutorial, plynulé skenovanie na pozadí\u003c/div>\u003cdiv class=\"task-desc\">Nová kuchyňa s prázdnym Check Listom ukáže návod; sken menu beží na pozadí s progresom (pill), appka sa medzitým dá normálne používať.\u003c/div>\u003cspan class=\"role\">Živý test\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t131\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">⏱️ Working Time — \"Zmeniť zmluvu\" preklad rozloženia\u003c/div>\u003cdiv class=\"task-desc\">Zmena úväzku uprostred mesiaca prepočíta a prekreslí grafy/súhrny správne, nič sa nerozbije vizuálne.\u003c/div>\u003cspan class=\"role\">Živý test\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t132\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🛒 Order List — objednávky viacerých ľudí sa sčítavajú, nemažú (db/76)\u003c/div>\u003cdiv class=\"task-desc\">db/76 je od 16.7. potvrdené naživo na produkcii (unikátne obmedzenie per osoba beží). Zostáva už len samotný živý test: dvaja ľudia, tá istá surovina, overiť že sa množstvá sčítajú a že Save v stanicovom pickeri nezmaže cudzí riadok.\u003c/div>\u003cspan class=\"role\">Migrácia hotová, čaká už len živý test, 2 účty\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t133\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🛡️ Admin hub — Add Admin, Admin Directory, on/off prepínače, presunutý Email Contacts (t118)\u003c/div>\u003cdiv class=\"task-desc\">Vytvoriť skutočného Kitchen Admina cez Add Admin, prihlásiť sa jeho účtom a overiť, že vidí presne tie tlačidlá, ktoré mu boli zapnuté (a žiadny \"Admin\" štítok nikde) — a naopak, že vypnutie oprávnenia v Admin Directory tlačidlo naozaj schová. Overiť aj Head Admin prepínač na druhom testovacom účte.\u003c/div>\u003cspan class=\"role\">Živý test, 2 účty\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t136\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">🏷️ Custom Ingredients — upload súboru, kontrola, uloženie, mazanie (t135)\u003c/div>\u003cdiv class=\"task-desc\">Najprv spustiť db/88. Ako admin: nová ikonka vo vrchnej lište Home → Upload file → odfotený/PDF cenník → overiť extrakciu, odškrtnutie položiek, uloženie a mazanie. Ako nečlen-admin: ikonka nesmie byť viditeľná.\u003c/div>\u003cspan class=\"role\">Živý test s reálnym cenníkom\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t137\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📖 Share My Recipes + 👨‍🍳 Chef Friends — dvaja ľudia, dve kuchyne (t135)\u003c/div>\u003cdiv class=\"task-desc\">Najprv spustiť db/89. Účet A zapne Sharing (Share QR Code → Share my recipes), účet B (prepojený cez Add Friend, INÁ kuchyňa) otvorí Connections → Chef Friends → vidí A-čkove vlastné recepty read-only; overiť že NEvidí Firemné/Sautero recepty A-čkovej kuchyne, že detail nemá edit/scale/order tlačidlá, a že vypnutie prepínača prístup okamžite zavrie.\u003c/div>\u003cspan class=\"role\">Živý test, 2 účty, 2 kuchyne\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-plan\">Netestované\u003c/span>\u003c/div>\u003c/div>\n    \u003cdiv class=\"task v2\">\u003cinput type=\"checkbox\" class=\"task-check\" id=\"t138\">\u003cdiv class=\"task-body\">\u003cdiv class=\"task-title\">📚 db/87 na stagingu — nová kuchyňa dostane Sautero recepty, \"Moje\" nepretečú\u003c/div>\u003cdiv class=\"task-desc\">Na stagingu vytvoriť novú kuchyňu a overiť: dostala kompletnú Sautero poličku (173+), NEdostala nikoho osobné \"Moje\" recepty, a backfill naplnil existujúce prázdne kuchyne. Až potom produkcia.\u003c/div>\u003cspan class=\"role\">Staging test pred produkciou\u003c/span>\u003c/div>\u003cdiv class=\"tags\">\u003cspan class=\"tag tag-crit\">Migrácia čaká\u003c/span>\u003c/div>\u003c/div>\n  \u003c/div>\n\n  \u003cdiv class=\"callout\">\n    \u003cdiv class=\"k\">Najdôležitejší záver expert review\u003c/div>\n    \u003cp>v1 zoznam bol o produkte. Chýbali v ňom tri kategórie, ktoré potápajú startupy častejšie než chýbajúce funkcie: \u003cb style=\"color:var(--ink);\">(1) právne základy\u003c/b> — IP voči zamestnávateľovi, s ktorým máš zároveň spor, je najvážnejšie jediné riziko v celom projekte; \u003cb style=\"color:var(--ink);\">(2) inžinierska disciplína\u003c/b> — žiadny Git, žiadny staging, SQL rovno na produkciu, jeden súbor bez zálohy; \u003cb style=\"color:var(--ink);\">(3) validácia peniazmi\u003c/b> — trial bez vopred definovaného úspechu a bez otázky „zaplatil by si?\" je len demo pre kamarátov.\u003c/p>\n  \u003c/div>\n\n  \u003cdiv class=\"callout ok\">\n    \u003cdiv class=\"k\">Poradie na najbližších 14 dní\u003c/div>\n    \u003cp>0. db/57 na produkcii ✅ (13.7. ráno) →\n    1. Zálohy DB + test obnovy → 2. IP kontrola novej pracovnej zmluvy + \u003cb style=\"color:var(--gold);\">poslať Nebenerwerb žiadosť (t47 — 10 min, odblokuje príjem)\u003c/b> → 3. \u003cb style=\"color:var(--gold);\">Kúpiť doménu (t50 — rieši Resend blokátor AJ firemný email naraz)\u003c/b> → 4. Staging projekt ✅ → 5. Deploy claude-proxy + spustiť zvyšné SQL 46–54 → 6. Regresný checklist naživo na reálnom zariadení → 7. Kritériá úspechu trialu ✅ → 8. \u003cb style=\"color:var(--gold);\">Einzelfirma registrácia (t48)\u003c/b> → potom trial + founding-member ponuka (draft hotový: docs/FOUNDING_OFFER.md). Celý monetizačný plán: app/monetization.html. Veľký blok v poradí: dodávateľské dáta (t51 — čaká na stiahnutie PDF z iCloudu).\u003c/p>\n  \u003c/div>\n\n  \u003cfooter data-sk=\"Sautero — kompletný zoznam úloh v2 · expert review: PM / CTO / Solution Architect / UX Lead / QA Lead / SaaS Founder · aktualizuje sa denne · 15. 7. 2026\" data-en=\"Sautero — complete task list v2 · expert review: PM / CTO / Solution Architect / UX Lead / QA Lead / SaaS Founder · updated daily · Jul 15, 2026\">\u003c/footer>\n\u003c/div>\n\n\u003cscript>\n/* ---------- Language toggle — same pattern as tasklist.html/status.html: translates\n   structural chrome (headings, section labels, legend, filter buttons) only, not the ~110\n   individual task titles/descriptions or the 14-day-order callout, which stay Slovak in both\n   modes (a separate, deliberately-not-rushed translation job). ---------- */\nlet _lang = localStorage.getItem('sautero_doc_lang') || 'sk';\nfunction applyLang(){\n  document.querySelectorAll('[data-sk]').forEach(el=>{\n    el.textContent = _lang === 'sk' ? el.getAttribute('data-sk') : (el.getAttribute('data-en') || el.getAttribute('data-sk'));\n  });\n  document.getElementById('langBtn').textContent = _lang === 'sk' ? 'EN' : 'SK';\n  document.getElementById('taskSearch').placeholder = _lang === 'sk' ? 'Hľadať v úlohách…' : 'Search tasks…';\n  document.documentElement.lang = _lang;\n  upd();\n}\nfunction toggleLang(){\n  _lang = _lang === 'sk' ? 'en' : 'sk';\n  localStorage.setItem('sautero_doc_lang', _lang);\n  applyLang();\n  applyTaskLang();\n}\n/* t174 (18.7.): every roadmap task is bilingual. TASKS_EN is keyed by the task checkbox id\n   (t1…t174) with {t: title, d: description, r: role} — the walker stashes the Slovak\n   innerHTML on first run and swaps. New tasks MUST be added here too. */\nconst TASKS_EN = {\n t1:{t:\"Clarify IP ownership vs. the employer (Hotel Schweizerhof)\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Resolved 13 Jul:\u003c/b> the Schweizerhof data (schedule, prep sheets built on its menu) leaves the app entirely — the pilot runs on Burrito Bandito &amp; Lido instead, so this specific IP risk falls away. The general advice (check IP clauses in the employment contract) still applies to the new employer too — see below.\", r:\"Resolved\"},\n t2:{t:\"Decide what the pilot kitchen becomes after leaving Schweizerhof\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Resolved 13 Jul:\u003c/b> the pilot kitchen is Burrito Bandito &amp; Lido — one company, two venues. The IP clauses in the new contract are still worth checking, but that's ordinary caution, not an acute blocker.\", r:\"Resolved\"},\n t3:{t:\"Reassess capacity realistically: a new full-time job + Sautero + RC Studio\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Resolved 13 Jul:\u003c/b> RC Studio goes aside — capacity splits only between the new job and Sautero. Deadlines (incl. the 1 Aug trial) still need continuous checking against genuinely available hours.\", r:\"Resolved\"},\n t4:{t:\"A written pilot agreement with every test kitchen\", d:\"\u003cb style=\\\"color:var(--v2);\\\">First draft done 13 Jul\u003c/b> — saved as docs/PILOT_AGREEMENT.md. Still needed: translate/adapt to each venue's language and get it confirmed as legally sound before relying on it.\", r:\"Founder + legal\"},\n t5:{t:\"Verify the sending domain in Resend / switch to the Supabase mailer\", d:\"A hard public-trial blocker — external addresses can't sign in.\"},\n t6:{t:\"Put all code in Git (GitHub, private repo) — immediately\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Fully resolved 13 Jul:\u003c/b> the local git repo connected to Richard's existing chefos-app repository (it was managed on GitHub by manual drag-and-drop uploads). A GitHub Actions workflow added that deploys app/ automatically on every push.\", r:\"Resolved\"},\n t7:{t:\"Enable/verify automatic Supabase database backups + test a restore\", d:\"The free tier has limited backups. The DB already holds real pilot data (173 recipes, prep data, attendance). A backup you've never restored isn't a backup.\", r:\"CTO\"},\n t8:{t:\"Create a staging environment (a second Supabase project) — stop running SQL straight on production\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Resolved 13 Jul:\u003c/b> the \\\"chefos-staging\\\" project created, the whole schema + data (173 recipes, 1,315 ingredients, the whole Check List) loaded via db/_staging_bootstrap.sql, verified live (no RLS error). From now on: every new SQL change goes here first, then to production.\", r:\"Resolved\"},\n t9:{t:\"Move the Anthropic API key server-side (a Supabase Edge Function)\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Resolved 13 Jul:\u003c/b> supabase/functions/claude-proxy done, all 9 call sites in the app rewired through it. You still need to run \u003ccode style=\\\"background:rgba(0,0,0,0.25); padding:1px 6px; border-radius:4px;\\\">supabase functions deploy claude-proxy\u003c/code>.\", r:\"Resolved (awaiting deploy)\"},\n t10:{t:\"A cost cap + alert on the Anthropic account\", d:\"Know about an overrun before the invoice arrives.\"},\n t11:{t:\"Check the Supabase free-tier limits before the trial\", d:\"Free projects pause after 7 days of inactivity and carry DB size/request limits. With 25 users consider the Pro tier (~USD 25/mo) at least for the trial — cheap insurance against the \\\"app is gone\\\" embarrassment.\", r:\"CTO\"},\n t12:{t:\"Run the pending SQL migrations (46–53: supplier prices, currency, RLS fixes, realtime, error/usage logs, invite expiry)\", d:\"After staging exists — there first, then prod.\"},\n t13:{t:\"Define trial success criteria IN ADVANCE — what \\\"it works\\\" means\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Resolved 13 Jul — agreed with Richard:\u003c/b>\u003cbr>• Active use: 40%+ of invited teams open the Check List at least 3× in week two\u003cbr>• Retention: at least half of the teams that started are active in week 2 (not just day 1)\u003cbr>• Willingness to pay: at least 5 of 25 say yes to \\\"would you pay X CHF/month\\\"\u003cbr>• Reliability: fewer than 10 critical errors logged during the trial\u003cbr>• Feedback: at least 3 unprompted positive + 3 critical pieces collected\", r:\"Resolved\"},\n t14:{t:\"Add basic usage analytics (at least: who signed in, which module they opened)\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Resolved 13 Jul:\u003c/b> db/52_usage_events.sql, logs login + every main module open. The admin can read it directly in the Supabase Table Editor, no UI needed yet.\", r:\"Resolved\"},\n t15:{t:\"Error tracking — capture users' JS errors\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Resolved 13 Jul:\u003c/b> db/51_error_logs.sql + a window.onerror/unhandledrejection handler, capped at 20 logs/session.\", r:\"Resolved\"},\n t16:{t:\"Write a regression-test checklist and walk it before every bigger deploy\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Resolved 13 Jul:\u003c/b> docs/REGRESSION_CHECKLIST.md. You must walk it yourself on a real device before the trial — I can't do that for you.\", r:\"Resolved (document), the test awaits you\"},\n t17:{t:\"Test on a device matrix: an older iPhone, Android, a tablet — not just your phone\", d:\"25 strangers = 25 different devices. At minimum: iOS Safari (2 versions), Android Chrome, one tablet. Kitchen reality: wet fingers, gloves, glare — verify touch-target sizes.\", r:\"QA + UX Lead\"},\n t18:{t:\"Decide the language strategy: the app is English, Bern kitchens speak German\", d:\"The UI was deliberately translated into English — but the target market is canton Bern. At minimum verify during the trial whether English is a barrier for a commis/casserolier; German localisation may matter more than another feature.\", r:\"UX Lead + PM\"},\n t19:{t:\"A manual live test of the whole app + the \\\"create a kitchen → QR → a stranger joins\\\" flow\", d:\"From v1 — with a real second person, not yourself.\"},\n t20:{t:\"Onboarding copy + a feedback channel + the Terms/Privacy page\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Resolved 13 Jul (autonomously, overnight):\u003c/b> app/legal.html — a Privacy &amp; Terms page in the app's style, covers Working Time attendance data (nDSG), AI data, error/usage logs, explicitly marked as not yet lawyer-verified. Linked from the sign-in screen.\", r:\"Resolved\"},\nt21:{t:\"Label printer + a paper fallback plan for service\", d:\"From v1 — the Brother QL-820NWB, plus a recommendation for kitchens on what to do during an outage.\"},\n t22:{t:\"Verify/wire real realtime\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Confirmed and resolved 13 Jul:\u003c/b> realtime genuinely wasn't wired anywhere — the app only ever loaded once. The Check List (prep_items/prep_dishes) now pushes changes live to all devices. You still need to run db/50_enable_realtime.sql.\", r:\"Resolved\"},\n t23:{t:\"Plan the split of the single-file architecture — per your own ARCHITECTURE.md\", d:\"Your own document says the single-file structure \\\"does NOT carry forward\\\" — yet the app is still one huge index.html growing by dozens of features a day. No need to rewrite now, but set the point where it splits (e.g. after the trial), otherwise every further change gets riskier (the script-order bug was the first warning).\", r:\"Solution Architect + CTO\"},\n t24:{t:\"An audit log — who ticked/changed an item and when\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Resolved 13 Jul:\u003c/b> the new check_list_audit_log table records every status/on-hand/priority/note change (who, what, when), visible to the whole kitchen in the item's Info panel (\\\"Recent activity\\\"). You still need to run db/54_check_list_audit_log.sql.\", r:\"Resolved\"},\n t25:{t:\"Roles and permissions · real times instead of placeholders · a test in live service · recipe-format validation · overload-threshold calibration\", d:\"All from v1 — remains in full.\"},\n t26:{t:\"Resolve the multi-tenant conflict of the shared ingredient table\", d:\"If the ingredients table is shared by all kitchens, then when one kitchen changes the price of butter it changes it for everyone — yet supplier prices differ per kitchen. Decide: a global catalogue + per-kitchen prices (the right solution), or a table copy per kitchen. This must be decided BEFORE more teams with their own prices arrive — a retro-migration will hurt.\", r:\"Solution Architect\"},\n t27:{t:\"A yield/waste factor in the food-cost calculation\", d:\"\u003cb style=\\\"color:var(--accent);\\\">Fully resolved 13 Jul:\u003c/b> a \\\"Yield %\\\" field on ingredients, food cost accounts for waste (trimmed vs. bought weight, effective price = price / yield), the breakdown shows an \\\"X% yield\\\" note. Tested on staging, deployed, and Richard ran db/57 on production in the morning.\", r:\"Resolved\"},\n t28:{t:\"The Inventory module · recipes→consumption→stock · Shopping Lists · price verification · the Master-DB decision\", d:\"All from v1 — remains.\"},\n t29:{t:\"Service planning · prep forecasting · reports · data export · AI recommendations · a schedule-coverage assistant · AI monetisation\", d:\"All from v1 — remains unchanged.\"},\n t30:{t:\"A data-retention policy + anonymisation for AI learning\", d:\"Phase 5 is meant to learn from \\\"real usage data\\\" — which belongs to the kitchens. Define in advance (and write into the terms) whether and how one kitchen's data improves the product. An enterprise customer asks this first.\", r:\"CTO + Founder\"},\n t31:{t:\"Native apps · desktop · offline mode (higher priority!) · multi-location · App Store · pricing · onboarding without you · go-to-market · the Nooch contact · the GmbH trigger · HACCP liability/insurance\", d:\"All from v1 — remains. I still recommend pulling offline mode forward.\"},\n t32:{t:\"Billing: use an off-the-shelf solution (Stripe Billing / Paddle / Lemon Squeezy), don't build your own\", d:\"v1 rightly named \\\"billing is missing\\\" but not how: for a solo founder a Merchant-of-Record (Paddle/Lemon Squeezy handles EU and CH VAT for you) is a huge saving over Stripe + your own tax filings in every country.\", r:\"Founder + CTO\"},\n t33:{t:\"Validate willingness to pay DURING the trial — not in Phase 7\", d:\"\u003cb style=\\\"color:var(--accent);\\\">In progress 13 Jul:\u003c/b> the whole monetisation plan now lives in monetization.html (models, legal blockers, launch order) and the founding-member offer is drafted in docs/FOUNDING_OFFER.md — the trial question \\\"would you pay?\\\" becomes a concrete CHF 490/yr offer.\", r:\"Founder + PM\"},\n t34:{t:\"Refresh the competitive analysis before selling\", d:\"The deck has a competitive-landscape section, but the kitchen-management SaaS market (Apicbase, MarketMan, Flipdish etc.) moves fast — before the first sales conversation check what competitors shipped in the meantime and at what price.\", r:\"PM\"},\n t160:{t:\"🔴 → ✅ A security review of the whole project (17 Jul) — two real holes closed + permanent guards\", d:\"Richard asked for a complete security check. \u003cb style=\\\"color:var(--gold);\\\">(1) The contracts leak:\u003c/b> the \\\"working-time-notes\\\" storage bucket (uploaded employment contracts — wages, hours) was PUBLIC and readable by anyone signed in — it slipped through because it was created via the Supabase UI, not a migration, so the audit never saw it. \u003cb>db/134\u003c/b>: the bucket private + all operations owner-only, the app reads via short-lived signed URLs. \u003cb style=\\\"color:var(--gold);\\\">(2) Stored XSS:\u003c/b> the public recipe shelf (db/131) shows foreign content in everyone's session for the first time → a foreign recipe with `&lt;img onerror&gt;` in its name would run a script. Fix: escaping at the data boundary (foreign recipes and ingredients are stripped of dangerous characters on load, read-only and outside the price book). \u003cb>Permanent guards in the audits:\u003c/b> a public bucket / a storage SELECT policy without an owner check / removing the XSS escaper now fail the commit. The live DB health check: 0 tables without RLS, all triggers + policies in place. Recorded in HEALTH_LOG + memory.\", r:\"Deployed live (db/134), guards active\"},\n t161:{t:\"🌍 Public shelves + sharing (recipes and ingredients), read-only foreign content (17 Jul)\", d:\"A new \u003cb>Public\u003c/b> shelf next to Sautero for recipes and ingredients — across kitchens, read-only, like the Sautero library. Publishing via the globe with a confirmation question (\u003cb>db/131–133\u003c/b> recipes, \u003cb>db/136\u003c/b> ingredients). Sharing offers 🌍 publicly / 🤝 with friends: recipes per recipe (\u003cb>db/138\u003c/b>), ingredients per item with \\\"all at once\\\" + one by one; friend-shared content shows in \u003cb>Chef Friends → the friend's profile\u003c/b>. NOTHING can be shared from a Company profile (app + DB trigger, account_type=personal). Foreign recipes/ingredients are strictly read-only — scale/read/comment only, no editing (Edit hidden), escaped and never entering your own price book. Fixed shelves can only be HIDDEN, not deleted/renamed; new ingredient lists offer 8 coloured books (\u003cb>db/135\u003c/b>). Commenting on foreign public recipes fixed (\u003cb>db/132\u003c/b>).\", r:\"Deployed live (db/131–138)\"},\n t162:{t:\"🧾 Invoice Scan v2 + supplier + translating/multilingual scans (17 Jul)\", d:\"Invoice scanning: recognises the \u003cb>SUPPLIER\u003c/b> from the letterhead and sets it on all items, updates prices + date, skips dates/numbers/totals/VAT/deposits (it used to turn a date into an item). The new \u003cb>Supplier\u003c/b> field on ingredients (\u003cb>db/137\u003c/b>) — the basis for future one-tap ordering by supplier. Both scans (invoice and price list/document/xlsx) now \u003cb>TRANSLATE\u003c/b> names into the Scan Settings language (default English), storing the original as an alias for matching and recognition. Ingredient icons split into two rows (no squeezing). A scan crash fixed (aliases NOT NULL → an empty array).\", r:\"Deployed live\"},\n t163:{t:\"💬 Shared comments + 🎓 tutorials for every screen + the personal shelf fixed (17 Jul)\", d:\"Comments on Sautero recipes finally visible across kitchens (\u003cb>db/129\u003c/b> master-id denormalisation) + a counter on the button and a bubble right in the recipe list (1–9, then 9+). Every main screen has its own detailed tutorial — opens on first visit, ❓ in the top bar to replay; the intro guide slimmed to just the welcome + Home; the What's New heart deleted as duplicate. A company recipe NEVER shows on the personal My Recipes shelf again, even after switching modes (\u003cb>db/130\u003c/b>, the old exception rule replaced by a data fix).\", r:\"Deployed live\"},\n t164:{t:\"📧 Email Contacts numbered + detail · Feedback Main-Admin only (17 Jul)\", d:\"Email contacts got numbering (#1 oldest at the bottom, newest on top) and tapping opens the full contact detail for the main admin including the linked Sautero account (name, role, type, kitchen) if one exists. The Feedback inbox confirmed as exclusively Main-Admin (DB `is_super_admin()` and the UI — the doc corrected, it previously wrongly said Kitchen Admin). AI Details now explains where its data comes from (typical AI reference values, not lab measurements). Verified: HACCP correctly hidden from personal accounts, visible to a company admin.\", r:\"Deployed live\"},\n t165:{t:\"🔴 legal.html — add passwords and GPS to the legal texts (an audit finding)\", d:\"The privacy/legal texts don't cover password sign-in (db/83) or the GPS snapshots at Working Time check-in/out — both features already run live. The critical review's top finding, still open. Mandatory before the public trial.\", r:\"Claude — ready on your word\"},\nt166:{t:\"Switch AI testing mode OFF before the public trial\", d:\"app_config.ai_unlimited_testing_mode is still ON — every account gets unlimited free AI on the central key. Deliberate for testing; before letting strangers in it must be switched off (one SQL line) and the credit system left to do its job.\", r:\"1 SQL line, the day before the trial\"},\n
