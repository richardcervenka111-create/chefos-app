<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sautero — Aare Ventures (investori Bern)</title>
<style>
  /* Sautero standing visual identity — dark navy + teal. */
  :root{
    --bg:#0A1A2F; --paper:#122845; --paper2:#0E2138; --ink:#FFFFFF; --ink-dim:#9C949E;
    --ink-faint:rgba(156,148,158,0.6); --rule:#223d57; --accent:#34F7D7; --gold:#E8C468;
    --danger:#FF7A68; --ok:#4ADE80; --mono:'SF Mono',SFMono-Regular,ui-monospace,Menlo,monospace;
  }
  *{ box-sizing:border-box; min-width:0; }
  html,body{ overflow-x:hidden; }
  body{ margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif; padding:24px 16px 80px 16px; line-height:1.5; }
  .wrap{ max-width:920px; margin:0 auto; }
  .kicker{ color:var(--accent); font-size:12px; letter-spacing:0.16em; text-transform:uppercase; font-weight:700; margin-bottom:8px; }
  h1{ font-size:26px; margin:0 0 6px 0; }
  .lede{ font-size:13.5px; color:var(--ink-dim); margin:0 0 20px 0; max-width:70ch; }
  .section-label{ display:flex; align-items:center; gap:10px; margin:26px 0 12px 0; }
  .section-label .n{ font-family:var(--mono); font-size:11px; color:var(--accent); }
  .section-label h2{ font-size:15px; margin:0; }
  .section-label .rule{ flex:1; height:1px; background:var(--rule); }
  .stats{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  @media (max-width:640px){ .stats{ grid-template-columns:repeat(2,1fr); } }
  .stat{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:14px; }
  .stat .num{ font-family:var(--mono); font-size:20px; font-weight:700; color:var(--accent); }
  .stat .lbl{ font-size:11px; color:var(--ink-dim); margin-top:4px; }
  .card{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:14px 16px; margin:10px 0; display:flex; gap:12px; align-items:flex-start; cursor:pointer; transition:border-color .15s, transform .1s; }
  .card:hover{ border-color:rgba(52,247,215,.5); }
  .card:active{ transform:scale(.99); }
  .card .ico{ flex:none; font-size:18px; }
  .card .t{ font-size:14px; font-weight:700; }
  .card .m{ font-size:12px; color:var(--ink-dim); margin-top:2px; }
  .card .tap-hint{ font-family:var(--mono); font-size:10px; color:var(--ink-faint); flex:none; align-self:center; }
  .pill{ font-family:var(--mono); font-size:10px; font-weight:700; border-radius:999px; padding:2px 9px; flex:none; align-self:center; }
  .pill.yes{ background:var(--ok); color:#0A1A2F; }
  .pill.no{ background:var(--danger); color:#0A1A2F; }
  .pill.part{ background:var(--gold); color:#0A1A2F; }
  .verdict{ background:linear-gradient(135deg, rgba(232,196,104,.10), transparent); border:1px solid rgba(232,196,104,.4); border-radius:14px; padding:16px; font-size:13.5px; color:var(--ink-dim); }
  .verdict b{ color:var(--ink); }
  .chefos-stamp{ position:fixed; bottom:12px; left:12px; z-index:50; background:var(--paper); border:1px solid var(--rule); color:var(--ink-dim); font-size:10.5px; padding:5px 10px; border-radius:999px; }
  .lang-toggle{ position:fixed; top:12px; right:12px; z-index:50; background:var(--paper); border:1px solid var(--rule); color:var(--ink); font-size:12px; font-weight:700; padding:6px 12px; border-radius:999px; cursor:pointer; }
  .modal-backdrop{ position:fixed; inset:0; background:rgba(4,10,20,.78); display:none; align-items:flex-end; justify-content:center; z-index:100; }
  .modal-backdrop.open{ display:flex; }
  .modal{ background:var(--paper); border:1px solid var(--rule); border-bottom:none; border-radius:20px 20px 0 0; width:100%; max-width:560px; max-height:82vh; overflow-y:auto; padding:14px 20px calc(24px + env(safe-area-inset-bottom,0px)) 20px; }
  .modal .handle{ width:44px; height:4px; border-radius:999px; background:var(--rule); margin:0 auto 12px auto; }
  .modal h3{ font-size:19px; margin:0 0 4px 0; }
  .modal .sub{ font-size:12px; color:var(--accent); font-family:var(--mono); margin-bottom:10px; }
  .modal .body{ font-size:13.5px; color:var(--ink-dim); line-height:1.65; }
  .modal .body b{ color:var(--ink); }
  .modal .close{ width:100%; margin-top:14px; min-height:46px; border-radius:12px; border:1px solid var(--rule); background:none; color:var(--ink); font-size:14px; font-weight:700; cursor:pointer; }
  @media print{ .chefos-stamp, .lang-toggle{ display:none; } }
</style>
</head>

let _lang = localStorage.getItem('chefos_doc_lang') || 'sk';
function applyLangAttrs(){
  document.querySelectorAll('[data-sk]').forEach(el => { el.innerHTML = el.dataset[_lang] || el.dataset.sk; });
  document.getElementById('langBtn').textContent = _lang === 'sk' ? 'EN' : 'SK';
}
function toggleLang(){
  _lang = _lang === 'sk' ? 'en' : 'sk';
  localStorage.setItem('chefos_doc_lang', _lang);
  applyLangAttrs(); renderCards(); closeAv();
}
function L(x){ return x[_lang] || x.sk; }
const PILL_LABELS = { yes:{sk:'ÁNO',en:'YES'}, no:{sk:'ZATIAĽ NIE',en:'NOT YET'}, part:{sk:'ČIASTOČNE',en:'PARTLY'} };

function renderCards(){
  const secs = { help:'secHelp', fit:'secFit', facts:'secFacts' };
  Object.entries(secs).forEach(([k,id])=>{
    document.getElementById(id).innerHTML = CARDS.filter(c=>c.sec===k).map(c=>`
      <div class="card" onclick="openAv(${CARDS.indexOf(c)})">
        <span class="ico">${c.icon}</span>
        <span style="flex:1;"><span class="t">${L(c.t)}</span><div class="m">${L(c.m)}</div></span>
        ${c.pill ? `<span class="pill ${c.pill}">${L(PILL_LABELS[c.pill])}</span>` : ''}
        <span class="tap-hint">${_lang==='sk' ? 'ťukni ›' : 'tap ›'}</span>
      </div>`).join('');
  });
}
function openAv(i){
  const c = CARDS[i];
  document.getElementById('av_t').textContent = c.icon + ' ' + L(c.t);
  document.getElementById('av_s').textContent = L(c.s);
  document.getElementById('av_b').innerHTML = L(c.b);
  document.getElementById('avModal').classList.add('open');
}
function closeAv(){ document.getElementById('avModal').classList.remove('open'); }
