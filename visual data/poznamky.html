<style>
  :root{ --bg:#0A1A2F; --paper:#122845; --ink:#fff; --ink-dim:#9C949E; --rule:#223d57; --accent:#34F7D7; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; height:100%; }
  body{ background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif; display:flex; flex-direction:column; }
  header{ flex:none; border-bottom:1px solid var(--rule); background:var(--bg); }
  .docnav{ display:flex; gap:2px; overflow-x:auto; padding:8px 10px 0 10px; scrollbar-width:none; }
  .docnav::-webkit-scrollbar{ display:none; }
  .doc-link{ flex:none; font-size:11.5px; font-weight:700; color:var(--ink-dim); text-decoration:none; padding:7px 12px; border-radius:8px 8px 0 0; letter-spacing:0.02em; }
  .doc-link:hover{ color:var(--ink); }
  .doc-link.current{ color:#0A1A2F; background:var(--accent); }
  .titlebar{ display:flex; align-items:baseline; gap:12px; padding:10px 16px 2px 16px; flex-wrap:wrap; }
  .titlebar h1{ margin:0; font-size:18px; }
  .titlebar .sub{ font-size:11.5px; color:var(--ink-dim); }
  .tabs{ display:flex; gap:6px; padding:8px 16px 10px 16px; overflow-x:auto; scrollbar-width:none; }
  .tabs::-webkit-scrollbar{ display:none; }
  .tab{ flex:none; background:var(--paper); border:1px solid var(--rule); color:var(--ink-dim); font-size:12.5px; font-weight:700; padding:7px 16px; border-radius:999px; cursor:pointer; }
  .tab.active{ background:var(--accent); border-color:var(--accent); color:#0A1A2F; }
  main{ flex:1; min-height:0; position:relative; }
  main iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; display:none; background:var(--bg); }
  main iframe.show{ display:block; }
</style>

<script>
/* Each source document is embedded whole and rendered into its own iframe on first open —
   their CSS/JS/lang-toggles stay fully isolated from each other and from this shell. */
const DOCS = ["\u003c!DOCTYPE html>\n\u003chtml lang=\"sk\">\n\u003chead>\n\u003cmeta charset=\"UTF-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n\u003ctitle>Sautero — Poznámky\u003c/title>\n\u003cstyle>\n  /* Sautero standing visual identity — dark navy + teal, same tokens as every doc. */\n  :root{\n    --bg:#0A1A2F; --paper:#122845; --paper2:#0E2138; --ink:#FFFFFF; --ink-dim:#9C949E;\n    --ink-faint:rgba(156,148,158,0.6); --rule:#223d57; --accent:#34F7D7; --gold:#E8C468;\n    --danger:#FF7A68; --ok:#4ADE80; --mono:'SF Mono',SFMono-Regular,ui-monospace,Menlo,monospace;\n  }\n  *{ box-sizing:border-box; min-width:0; }\n  html,body{ overflow-x:hidden; }\n  body{ margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif; padding:24px 16px 80px 16px; line-height:1.5; }\n  .wrap{ max-width:920px; margin:0 auto; }\n  .kicker{ color:var(--accent); font-size:12px; letter-spacing:0.16em; text-transform:uppercase; font-weight:700; margin-bottom:8px; }\n  h1{ font-size:26px; margin:0 0 6px 0; }\n  .lede{ font-size:13.5px; color:var(--ink-dim); margin:0 0 20px 0; max-width:70ch; }\n  .section-label{ display:flex; align-items:center; gap:10px; margin:26px 0 12px 0; }\n  .section-label .n{ font-family:var(--mono); font-size:11px; color:var(--accent); }\n  .section-label h2{ font-size:15px; margin:0; }\n  .section-label .rule{ flex:1; height:1px; background:var(--rule); }\n  .note{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:14px 16px; margin:10px 0; display:flex; gap:12px; align-items:flex-start; cursor:pointer; transition:border-color .15s, transform .1s; }\n  .note:hover{ border-color:rgba(52,247,215,.5); }\n  .note:active{ transform:scale(.99); }\n  .note .ico{ flex:none; font-size:18px; }\n  .note .t{ font-size:14px; font-weight:700; }\n  .note .m{ font-size:12px; color:var(--ink-dim); margin-top:2px; }\n  .note .tap-hint{ font-family:var(--mono); font-size:10px; color:var(--ink-faint); flex:none; align-self:center; }\n  .badge{ font-family:var(--mono); font-size:10px; font-weight:700; border-radius:999px; padding:2px 9px; flex:none; align-self:center; }\n  .badge.do{ background:var(--gold); color:#0A1A2F; }\n  .badge.idea{ border:1px solid var(--rule); color:var(--ink-dim); }\n  .badge.you{ background:var(--danger); color:#0A1A2F; }\n  .badge.done{ background:var(--ok); color:#0A1A2F; }\n  .chefos-stamp{ position:fixed; bottom:12px; left:12px; z-index:50; background:var(--paper); border:1px solid var(--rule); color:var(--ink-dim); font-size:10.5px; padding:5px 10px; border-radius:999px; }\n  .modal-backdrop{ position:fixed; inset:0; background:rgba(4,10,20,.78); display:none; align-items:flex-end; justify-content:center; z-index:100; }\n  .modal-backdrop.open{ display:flex; }\n  .modal{ background:var(--paper); border:1px solid var(--rule); border-bottom:none; border-radius:20px 20px 0 0; width:100%; max-width:560px; max-height:82vh; overflow-y:auto; padding:14px 20px calc(24px + env(safe-area-inset-bottom,0px)) 20px; }\n  .modal .handle{ width:44px; height:4px; border-radius:999px; background:var(--rule); margin:0 auto 12px auto; }\n  .modal h3{ font-size:19px; margin:0 0 4px 0; }\n  .modal .sub{ font-size:12px; color:var(--accent); font-family:var(--mono); margin-bottom:10px; }\n  .modal .body{ font-size:13.5px; color:var(--ink-dim); line-height:1.65; }\n  .modal .body b{ color:var(--ink); }\n  .modal .close{ width:100%; margin-top:14px; min-height:46px; border-radius:12px; border:1px solid var(--rule); background:none; color:var(--ink); font-size:14px; font-weight:700; cursor:pointer; }\n  @media print{ .chefos-stamp{ display:none; } }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\u003cdiv class=\"wrap\">\n\n  \u003cdiv class=\"kicker\">Poznámky · živý zápisník\u003c/div>\n  \u003ch1>📝 Poznámky\u003c/h1>\n  \u003cp class=\"lede\">Všetky Richardove poznámky, nápady a veci „na dokončenie\" na jednom mieste — Claude ich sem priebežne zapisuje a aktualizuje pri každej zmene. Ťukni na poznámku pre podrobnosti. Technické zadania žijú aj v Pláne → Roadmapa (t-čísla).\u003c/p>\n\n  \u003cdiv class=\"section-label\">\u003cspan class=\"n\">01\u003c/span>\u003ch2>🔨 Na dokončenie\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n  \u003cdiv id=\"secDo\">\u003c/div>\n\n  \u003cdiv class=\"section-label\">\u003cspan class=\"n\">02\u003c/span>\u003ch2>💡 Nápady / poznámky\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n  \u003cdiv id=\"secIdea\">\u003c/div>\n\n  \u003cdiv class=\"section-label\">\u003cspan class=\"n\">03\u003c/span>\u003ch2>🧑‍🍳 Len Richard (nikto iný to nemôže)\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n  \u003cdiv id=\"secYou\">\u003c/div>\n\n\u003c/div>\n\n\u003cdiv class=\"modal-backdrop\" id=\"noteModal\" onclick=\"if(event.target===this) closeNote()\">\n  \u003cdiv class=\"modal\">\n    \u003cdiv class=\"handle\">\u003c/div>\n    \u003ch3 id=\"nm_t\">\u003c/h3>\n    \u003cdiv class=\"sub\" id=\"nm_s\">\u003c/div>\n    \u003cdiv class=\"body\" id=\"nm_b\">\u003c/div>\n    \u003cbutton class=\"close\" onclick=\"closeNote()\">Zavrieť\u003c/button>\n  \u003c/div>\n\u003c/div>\n\n\u003cdiv class=\"chefos-stamp\">🔄 Stav Sautero k 18. 7. 2026, 11:14\u003c/div>\n\n\u003cscript>\n/* Every note: {sec, icon, badge, t (title), m (one-liner), s (modal subtitle), b (modal body html)}.\n   KEEP THIS CURRENT — standing rule (Richard, 18.7., bod 5): all his notes live here and get\n   updated whenever anything changes. Newest first inside each section. */\nconst NOTES = [\n  { sec:'do', icon:'🎪', badge:'DOKONČIŤ', t:'Dlaždica Events (bankety, akcie)', m:'zapísané 18.7. — New Event manuálne alebo scanom, dnešné + zajtrajšie vedľa seba',\n    s:'t172 · Plán → Roadmapa · zapísané 18.7.2026',\n    b:'Nová dlaždica \u003cb>Events\u003c/b>: všetky udalosti, ktoré sa ešte len majú stať — napr. \u003cb>banket, 35 ľudí, trojchodové menu\u003c/b>.\u003cbr>\u003cbr>· Hore tlačidlo \u003cb>New Event\u003c/b>: manuálny zápis (čo je to za akciu, pre koho, koľko ľudí, aké menu, cena, dátum/čas) \u003cb>alebo Scan\u003c/b> — odfotíš objednávku/e-mail a AI rozpozná typ akcie, klienta, počet ľudí, menu, cenu a pridá do zoznamu (rovnaký vision vzor ako Invoice Scan).\u003cbr>· Pod tým dva stĺpce vedľa seba: \u003cb>Dnešné eventy | Zajtrajšie eventy\u003c/b>, ďalšie dni nižšie v zozname.' },\n  { sec:'do', icon:'🖨️', badge:'DOKONČIŤ', t:'Tlač receptov v identite reštaurácie', m:'t170 — každá reštaurácia tlačí vo VLASTNÝCH farbách/logu',\n    s:'t170 · Plán → Roadmapa · zapísané 18.7.2026',\n    b:'Každá nová reštaurácia dostane tlač receptov vo \u003cb>vlastnej identite\u003c/b> — farby, font, logo — tak ako dnes naša brandovaná tlač. Návrh: kitchens tabuľka dostane brand polia, print template ich načíta; nastavenie v Admin. Súčasť onboardingu novej reštaurácie.' },\n  { sec:'do', icon:'🌦️', badge:'DOKONČIŤ', t:'Kontext dňa vs. tržby (počasie, deň, sviatky)', m:'t171 — „daždivé utorky = −18 % obedov\", po triali',\n    s:'t171 · Plán → Roadmapa · zapísané 18.7.2026',\n    b:'Zbierať denný kontext (počasie z API pre lokalitu kuchyne, deň v týždni, švajčiarske sviatky) a korelovať s tržbami v Kitchen Reports. Predpoklad: tržbové dáta — prídu s POS integráciou alebo ručným denným zápisom tržby. Fáza po triali 1.8.' },\n  { sec:'do', icon:'🧪', badge:'DOKONČIŤ', t:'AI Testing Mode vypnúť pred trialom', m:'t166 — teraz ON (neobmedzené AI pre všetkých), vypnúť pred 1.8.',\n    s:'t166 · Admin → AI Testing Mode',\n    b:'Kým je ON, každé zariadenie má neobmedzené AI bez ohľadu na kredit. Pred verejným trialom 1.8. treba prepnúť OFF, aby platilo normálne kreditovanie (inak 25 cudzích ľudí míňa centrálny kľúč bez limitu).' },\n  { sec:'idea', icon:'🎙️', badge:'POZNÁMKA', t:'Hlasové ovládanie, aj pri zamknutom telefóne', m:'zapísané 18.7. — pri zamknutom = až natívna appka + Siri',\n    s:'t173 · zapísané 18.7.2026 · Fáza 6',\n    b:'Richardova požiadavka: ovládať appku hlasom, ideálne aj so zamknutým displejom.\u003cbr>\u003cbr>\u003cb>Technická realita:\u003c/b> web appka na iOS \u003cb>nemôže\u003c/b> počúvať pri zamknutom telefóne (mikrofón beží len s otvorenou stránkou). Reálna cesta:\u003cbr>· \u003cb>pri odomknutom\u003c/b> — Web Speech API na diktovanie a príkazy priamo v appke (dá sa spraviť už teraz),\u003cbr>· \u003cb>pri zamknutom\u003c/b> — natívna appka + Siri Shortcuts/App Intents („Hey Siri, Sautero pridaj…\") — patrí do Fázy 6 (natívna mobilná appka, 2027).' },\n  { sec:'idea', icon:'🌡️', badge:'POZNÁMKA', t:'Chladničkové senzory + tlačiareň štítkov', m:'SensorPush ~CHF 125 · Brother QL-820NWB ~CHF 130 — plánované nákupy',\n    s:'research hotový · docs/LABEL_PRINTER_RESEARCH.md',\n    b:'\u003cb>SensorPush\u003c/b> (~$55 senzor + ~$100 WiFi brána, bez mesačných poplatkov) je jediná budget možnosť s cloud API pre automatický zápis teplôt do HACCP. \u003cb>Brother QL-820NWB\u003c/b> (~CHF 130, bez zmluvy) na tlač štítkov. Oba čakajú na nákup — sú v Nákladoch ako plánované.' },\n  { sec:'idea', icon:'🎓', badge:'PARKOVANÉ', t:'Študentská bakalárka na module Inventory', m:'parkované 17.7. — ohraničený modul, nikdy produkčné dáta',\n    s:'parkované · 17.7.2026',\n    b:'Nápad: študent si vezme \u003cb>ohraničený izolovaný modul\u003c/b> (kandidát: Inventory) ako bakalárku. Podmienky: nikdy produkčné dáta ani AI kľúč, IP dohoda vopred. Parkované, kým nie je kapacita.' },\n  { sec:'you', icon:'🌐', badge:'RICHARD', t:'Kúpiť sautero.ch + sautero.com', m:'Hostpoint, ~25 CHF prvý rok — potom presun domény',\n    s:'od 18.7.2026 · blokuje migráciu domény',\n    b:'Obe domény sú voľné (overené cez nic.ch whois). Kúpiť na \u003cb>Hostpoint\u003c/b>: sautero.ch ~5 CHF prvý rok (obnova ~15), sautero.com ~20 CHF/rok. Po kúpe Claude presunie appku, e-maily a technické identifikátory z chefos.ch na sautero.ch.' },\n  { sec:'you', icon:'📄', badge:'RICHARD', t:'Nebenerwerb súhlas + Einzelfirma', m:'deadline 20.7. — obe blokujú prvý príjem, drafty v docs/',\n    s:'deadline 20.7.2026 · blokátory monetizácie',\n    b:'Dva právne blokátory prvého príjmu (founding pre-sale CHF 490/rok + onboarding CHF 990):\u003cbr>· \u003cb>písomný súhlas zamestnávateľa\u003c/b> s vedľajším zárobkom — list je nadraftovaný v docs/, stačí poslať,\u003cbr>· \u003cb>registrácia Einzelfirmy\u003c/b> (AHV) — draft podkladov tiež v docs/.' },\n  { sec:'you', icon:'🤝', badge:'RICHARD', t:'Aare Ventures — pitch pre investorov v Berne', m:'prihláška do 23.8., event 14.9. Eventfabrik Bern — detail v Internal Docs',\n    s:'aare.html · zapísané 18.7.2026',\n    b:'Bernský spolok prepájajúci startupy s business angelmi (4 eventy ročne, >CHF 20 mil. preinvestovaných). Najbližší event \u003cb>AV29: pondelok 14.9.2026, Eventfabrik Bern\u003c/b>, prihláška do \u003cb>23.8.\u003c/b> — pitch deck max 20 slidov na contact@aareventures.ch. Plný rozbor + či sa tam hodíme: dokument Aare Ventures v Internal Docs.' },\n];\n\nfunction renderNotes(){\n  const secs = { do:'secDo', idea:'secIdea', you:'secYou' };\n  const badgeCls = { 'DOKONČIŤ':'do', 'POZNÁMKA':'idea', 'PARKOVANÉ':'idea', 'RICHARD':'you', 'HOTOVÉ':'done' };\n  Object.entries(secs).forEach(([k, id])=>{\n    document.getElementById(id).innerHTML = NOTES.filter(n=>n.sec===k).map((n)=>`\n      \u003cdiv class=\"note\" onclick=\"openNote(${NOTES.indexOf(n)})\">\n        \u003cspan class=\"ico\">${n.icon}\u003c/span>\n        \u003cspan style=\"flex:1;\">\u003cspan class=\"t\">${n.t}\u003c/span>\u003cdiv class=\"m\">${n.m}\u003c/div>\u003c/span>\n        \u003cspan class=\"badge ${badgeCls[n.badge]||'idea'}\">${n.badge}\u003c/span>\n        \u003cspan class=\"tap-hint\">ťukni ›\u003c/span>\n      \u003c/div>`).join('');\n  });\n}\nfunction openNote(i){\n  const n = NOTES[i];\n  document.getElementById('nm_t').textContent = n.icon + ' ' + n.t;\n  document.getElementById('nm_s').textContent = n.s;\n  document.getElementById('nm_b').innerHTML = n.b;\n  document.getElementById('noteModal').classList.add('open');\n}\nfunction closeNote(){ document.getElementById('noteModal').classList.remove('open'); }\nrenderNotes();\n\u003c/script>\n\u003c/body>\n\u003c/html>\n"];
const frames = [];
function openTab(n){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active', i===n));
  frames.forEach(f=>f && f.classList.remove('show'));
  if(!frames[n]){
    const f = document.createElement('iframe');
    f.srcdoc = DOCS[n];
    document.getElementById('frames').appendChild(f);
    frames[n] = f;
  }
  frames[n].classList.add('show');
}
openTab(0);
</script>
