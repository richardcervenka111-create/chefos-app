const DOCS = ["\u003c!DOCTYPE html>\n\u003chtml lang=\"sk\">\n\u003chead>\n\u003cmeta charset=\"UTF-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n\u003ctitle>Sautero — Poznámky\u003c/title>\n\u003cstyle>\n  /* Sautero standing visual identity — dark navy + teal, same tokens as every doc. */\n  :root{\n    --bg:#0A1A2F; --paper:#122845; --paper2:#0E2138; --ink:#FFFFFF; --ink-dim:#9C949E;\n    --ink-faint:rgba(156,148,158,0.6); --rule:#223d57; --accent:#34F7D7; --gold:#E8C468;\n    --danger:#FF7A68; --ok:#4ADE80; --mono:'SF Mono',SFMono-Regular,ui-monospace,Menlo,monospace;\n  }\n  *{ box-sizing:border-box; min-width:0; }\n  html,body{ overflow-x:hidden; }\n  body{ margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif; padding:24px 16px 80px 16px; line-height:1.5; }\n  .wrap{ max-width:920px; margin:0 auto; }\n  .kicker{ color:var(--accent); font-size:12px; letter-spacing:0.16em; text-transform:uppercase; font-weight:700; margin-bottom:8px; }\n  h1{ font-size:26px; margin:0 0 6px 0; }\n  .lede{ font-size:13.5px; color:var(--ink-dim); margin:0 0 20px 0; max-width:70ch; }\n  .lang-toggle{ position:fixed; top:12px; right:12px; z-index:50; background:var(--paper); border:1px solid var(--rule); color:var(--ink); font-size:12px; font-weight:700; padding:6px 12px; border-radius:999px; cursor:pointer; }\n  .section-label{ display:flex; align-items:center; gap:10px; margin:26px 0 12px 0; }\n  .section-label .n{ font-family:var(--mono); font-size:11px; color:var(--accent); }\n  .section-label h2{ font-size:15px; margin:0; }\n  .section-label .rule{ flex:1; height:1px; background:var(--rule); }\n  .note{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:14px 16px; margin:10px 0; display:flex; gap:12px; align-items:flex-start; cursor:pointer; transition:border-color .15s, transform .1s; }\n  .note:hover{ border-color:rgba(52,247,215,.5); }\n  .note:active{ transform:scale(.99); }\n  .note .ico{ flex:none; font-size:18px; }\n  .note .t{ font-size:14px; font-weight:700; }\n  .note .m{ font-size:12px; color:var(--ink-dim); margin-top:2px; }\n  .note .tap-hint{ font-family:var(--mono); font-size:10px; color:var(--ink-faint); flex:none; align-self:center; }\n  .badge{ font-family:var(--mono); font-size:10px; font-weight:700; border-radius:999px; padding:2px 9px; flex:none; align-self:center; }\n  .badge.do{ background:var(--gold); color:#0A1A2F; }\n  .badge.idea{ border:1px solid var(--rule); color:var(--ink-dim); }\n  .badge.you{ background:var(--danger); color:#0A1A2F; }\n  .badge.done{ background:var(--ok); color:#0A1A2F; }\n  .badge.lesson{ background:var(--danger); color:#0A1A2F; }\n  .chefos-stamp{ position:fixed; bottom:12px; left:12px; z-index:50; background:var(--paper); border:1px solid var(--rule); color:var(--ink-dim); font-size:10.5px; padding:5px 10px; border-radius:999px; }\n  .modal-backdrop{ position:fixed; inset:0; background:rgba(4,10,20,.78); display:none; align-items:flex-end; justify-content:center; z-index:100; }\n  .modal-backdrop.open{ display:flex; }\n  .modal{ background:var(--paper); border:1px solid var(--rule); border-bottom:none; border-radius:20px 20px 0 0; width:100%; max-width:560px; max-height:82vh; overflow-y:auto; padding:14px 20px calc(24px + env(safe-area-inset-bottom,0px)) 20px; }\n  .modal .handle{ width:44px; height:4px; border-radius:999px; background:var(--rule); margin:0 auto 12px auto; }\n  .modal h3{ font-size:19px; margin:0 0 4px 0; }\n  .modal .sub{ font-size:12px; color:var(--accent); font-family:var(--mono); margin-bottom:10px; }\n  .modal .body{ font-size:13.5px; color:var(--ink-dim); line-height:1.65; }\n  .modal .body b{ color:var(--ink); }\n  .modal .close{ width:100%; margin-top:14px; min-height:46px; border-radius:12px; border:1px solid var(--rule); background:none; color:var(--ink); font-size:14px; font-weight:700; cursor:pointer; }\n  @media print{ .chefos-stamp, .lang-toggle{ display:none; } }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\u003cbutton class=\"lang-toggle\" id=\"langBtn\" onclick=\"toggleLang()\">EN\u003c/button>\n\u003cdiv class=\"wrap\">\n\n  \u003cdiv class=\"kicker\" data-sk=\"Poznámky · živý zápisník\" data-en=\"Notes · live notebook\">\u003c/div>\n  \u003ch1>📝 \u003cspan data-sk=\"Poznámky\" data-en=\"Notes\">\u003c/span>\u003c/h1>\n  \u003cp class=\"lede\" data-sk=\"Všetky Richardove poznámky, nápady a veci „na dokončenie&quot; na jednom mieste — Claude ich sem priebežne zapisuje a aktualizuje pri každej zmene. Ťukni na poznámku pre podrobnosti. Technické zadania žijú aj v Pláne → Roadmapa (t-čísla).\" data-en=\"All of Richard's notes, ideas and &quot;to finish&quot; items in one place — Claude writes them here and keeps them updated as things change. Tap a note for details. Technical specs also live in Plan → Roadmap (t-numbers).\">\u003c/p>\n\n  \u003cdiv class=\"section-label\">\u003cspan class=\"n\">01\u003c/span>\u003ch2 data-sk=\"🔨 Na dokončenie\" data-en=\"🔨 To finish\">\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n  \u003cdiv id=\"secDo\">\u003c/div>\n\n  \u003cdiv class=\"section-label\">\u003cspan class=\"n\">02\u003c/span>\u003ch2 data-sk=\"💡 Nápady / poznámky\" data-en=\"💡 Ideas / notes\">\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n  \u003cdiv id=\"secIdea\">\u003c/div>\n\n  \u003cdiv class=\"section-label\">\u003cspan class=\"n\">03\u003c/span>\u003ch2 data-sk=\"🧑‍🍳 Len Richard (nikto iný to nemôže)\" data-en=\"🧑‍🍳 Richard only (nobody else can)\">\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n  \u003cdiv id=\"secYou\">\u003c/div>\n\n  \u003cdiv class=\"section-label\">\u003cspan class=\"n\">04\u003c/span>\u003ch2 data-sk=\"🎓 Poučenia (nikdy viac)\" data-en=\"🎓 Lessons (never again)\">\u003c/h2>\u003cdiv class=\"rule\">\u003c/div>\u003c/div>\n  \u003cdiv id=\"secLesson\">\u003c/div>\n\n\u003c/div>\n\n\u003cdiv class=\"modal-backdrop\" id=\"noteModal\" onclick=\"if(event.target===this) closeNote()\">\n  \u003cdiv class=\"modal\">\n    \u003cdiv class=\"handle\">\u003c/div>\n    \u003ch3 id=\"nm_t\">\u003c/h3>\n    \u003cdiv class=\"sub\" id=\"nm_s\">\u003c/div>\n    \u003cdiv class=\"body\" id=\"nm_b\">\u003c/div>\n    \u003cbutton class=\"close\" onclick=\"closeNote()\" data-sk=\"Zavrieť\" data-en=\"Close\">\u003c/button>\n  \u003c/div>\n\u003c/div>\n\n\u003cdiv class=\"chefos-stamp\" data-sk=\"🔄 Stav Sautero k 18. 7. 2026, 13:39\" data-en=\"🔄 Sautero state as of Jul 18, 2026, 13:39\">\u003c/div>\n\n\u003cscript>\n/* Every note: {sec, icon, badge:{sk,en}, badgeCls, t:{sk,en}, m:{sk,en}, s:{sk,en}, b:{sk,en}}.\n   KEEP THIS CURRENT — standing rule (Richard, 18.7., bod 5): all his notes live here and get\n   updated whenever anything changes. FULLY BILINGUAL — standing rule (Richard, 18.7. večer):\n   every doc has the SK/EN toggle and BOTH views must be complete, modals included. */\nconst NOTES = [\n  { sec:'do', icon:'🌐', badge:{sk:'DOKONČIŤ',en:'TO FINISH'}, badgeCls:'do',\n    t:{sk:'Preklady: dotiahnuť plné SK/EN pokrytie 4 dokumentov', en:'Translations: finish full SK/EN coverage of 4 documents'},\n    m:{sk:'t174 — mapa funkcií (SK popisy → EN), Denník (SK → EN), Manifesto + Visual Guide (EN → SK), deck dáta (EN → SK)', en:'t174 — feature map (SK descriptions → EN), Diary (SK → EN), Manifesto + Visual Guide (EN → SK), deck data (EN → SK)'},\n    s:{sk:'t174 · zapísané 18.7.2026 · pravidlo: nový obsah sa už rodí dvojjazyčne', en:'t174 · logged 18 Jul 2026 · rule: new content is born bilingual'},\n    b:{sk:'Audit 18.7. ukázal: všetky dokumenty majú SK/EN prepínač a preložené statické texty, ale JS-renderovaný obsah je v štyroch miestach jednojazyčný:\u003cbr>· \u003cb>Mapa funkcií\u003c/b> — 112 kariet má SK názvy/popisy aj v EN pohľade,\u003cbr>· \u003cb>Denník (Plán)\u003c/b> — denné záznamy sú len SK,\u003cbr>· \u003cb>Manifesto + Visual Guide\u003c/b> — celé len EN,\u003cbr>· \u003cb>Investor deck\u003c/b> — KPI/roadmapa/proces len EN.\u003cbr>\u003cbr>Rozsah ~30 000 slov — prekladá sa systematicky po dokumentoch (poradie: mapa funkcií → deck → Denník → Manifesto/Guide). \u003cb>Trvalé pravidlo od 18.7.:\u003c/b> každý nový alebo upravený obsah vzniká rovno dvojjazyčne — tento dlh sa už nesmie zväčšovať.',\n       en:'The 18 Jul audit showed: every document has the SK/EN toggle and translated static texts, but JS-rendered content is single-language in four places:\u003cbr>· \u003cb>Feature map\u003c/b> — 112 cards show SK names/descriptions in the EN view too,\u003cbr>· \u003cb>Diary (Plan)\u003c/b> — daily entries are SK only,\u003cbr>· \u003cb>Manifesto + Visual Guide\u003c/b> — entirely EN,\u003cbr>· \u003cb>Investor deck\u003c/b> — KPIs/roadmap/process EN only.\u003cbr>\u003cbr>Scope ~30,000 words — translated systematically doc by doc (order: feature map → deck → Diary → Manifesto/Guide). \u003cb>Standing rule since 18 Jul:\u003c/b> all new or edited content is born bilingual — this debt must never grow again.'} },\n  { sec:'do', icon:'🎪', badge:{sk:'DOKONČIŤ',en:'TO FINISH'}, badgeCls:'do',\n    t:{sk:'Dlaždica Events (bankety, akcie)', en:'Events tile (banquets, functions)'},\n    m:{sk:'zapísané 18.7. — New Event manuálne alebo scanom, dnešné + zajtrajšie vedľa seba', en:'logged 18 Jul — New Event manually or by scan, today + tomorrow side by side'},\n    s:{sk:'t172 · Plán → Roadmapa · zapísané 18.7.2026', en:'t172 · Plan → Roadmap · logged 18 Jul 2026'},\n    b:{sk:'Nová dlaždica \u003cb>Events\u003c/b>: všetky udalosti, ktoré sa ešte len majú stať — napr. \u003cb>banket, 35 ľudí, trojchodové menu\u003c/b>.\u003cbr>\u003cbr>· Hore tlačidlo \u003cb>New Event\u003c/b>: manuálny zápis (čo je to za akciu, pre koho, koľko ľudí, aké menu, cena, dátum/čas) \u003cb>alebo Scan\u003c/b> — odfotíš objednávku/e-mail a AI rozpozná typ akcie, klienta, počet ľudí, menu, cenu a pridá do zoznamu (rovnaký vision vzor ako Invoice Scan).\u003cbr>· Pod tým dva stĺpce vedľa seba: \u003cb>Dnešné eventy | Zajtrajšie eventy\u003c/b>, ďalšie dni nižšie v zozname.',\n       en:'A new \u003cb>Events\u003c/b> tile: everything that is yet to happen — e.g. \u003cb>a banquet, 35 people, three-course menu\u003c/b>.\u003cbr>\u003cbr>· At the top a \u003cb>New Event\u003c/b> button: manual entry (what kind of event, for whom, how many people, which menu, price, date/time) \u003cb>or Scan\u003c/b> — photograph the order/e-mail and AI recognises the event type, client, headcount, menu and price and adds it to the list (same vision pattern as Invoice Scan).\u003cbr>· Below it two columns side by side: \u003cb>Today\\'s events | Tomorrow\\'s events\u003c/b>, further days in a list underneath.'} },\n  { sec:'do', icon:'🖨️', badge:{sk:'DOKONČIŤ',en:'TO FINISH'}, badgeCls:'do',\n    t:{sk:'Tlač receptov v identite reštaurácie', en:'Recipe printing in each restaurant\\'s identity'},\n    m:{sk:'t170 — každá reštaurácia tlačí vo VLASTNÝCH farbách/logu', en:'t170 — every restaurant prints in its OWN colours/logo'},\n    s:{sk:'t170 · Plán → Roadmapa · zapísané 18.7.2026', en:'t170 · Plan → Roadmap · logged 18 Jul 2026'},\n    b:{sk:'Každá nová reštaurácia dostane tlač receptov vo \u003cb>vlastnej identite\u003c/b> — farby, font, logo — tak ako dnes naša brandovaná tlač. Návrh: kitchens tabuľka dostane brand polia, print template ich načíta; nastavenie v Admin. Súčasť onboardingu novej reštaurácie.',\n       en:'Every new restaurant gets recipe printing in \u003cb>its own identity\u003c/b> — colours, font, logo — just like our branded print today. Design: the kitchens table gets brand fields, the print template reads them; configured in Admin. Part of onboarding a new restaurant.'} },\n  { sec:'do', icon:'🌦️', badge:{sk:'DOKONČIŤ',en:'TO FINISH'}, badgeCls:'do',\n    t:{sk:'Kontext dňa vs. tržby (počasie, deň, sviatky)', en:'Day context vs. revenue (weather, weekday, holidays)'},\n    m:{sk:'t171 — „daždivé utorky = −18 % obedov\", po triali', en:'t171 — \"rainy Tuesdays = −18% lunches\", after the trial'},\n    s:{sk:'t171 · Plán → Roadmapa · zapísané 18.7.2026', en:'t171 · Plan → Roadmap · logged 18 Jul 2026'},\n    b:{sk:'Zbierať denný kontext (počasie z API pre lokalitu kuchyne, deň v týždni, švajčiarske sviatky) a korelovať s tržbami v Kitchen Reports. Predpoklad: tržbové dáta — prídu s POS integráciou alebo ručným denným zápisom tržby. Fáza po triali 1.8.',\n       en:'Collect daily context (weather from an API for the kitchen\\'s location, weekday, Swiss holidays) and correlate it with revenue in Kitchen Reports. Prerequisite: revenue data — comes with a POS integration or a manual daily revenue entry. Phase after the 1 Aug trial.'} },\n  { sec:'do', icon:'🧪', badge:{sk:'DOKONČIŤ',en:'TO FINISH'}, badgeCls:'do',\n    t:{sk:'AI Testing Mode vypnúť pred trialom', en:'Turn AI Testing Mode OFF before the trial'},\n    m:{sk:'t166 — teraz ON (neobmedzené AI pre všetkých), vypnúť pred 1.8.', en:'t166 — currently ON (unlimited AI for everyone), switch off before 1 Aug'},\n    s:{sk:'t166 · Admin → AI Testing Mode', en:'t166 · Admin → AI Testing Mode'},\n    b:{sk:'Kým je ON, každé zariadenie má neobmedzené AI bez ohľadu na kredit. Pred verejným trialom 1.8. treba prepnúť OFF, aby platilo normálne kreditovanie (inak 25 cudzích ľudí míňa centrálny kľúč bez limitu).',\n       en:'While it is ON, every device gets unlimited AI regardless of credit. Before the public trial on 1 Aug it must be switched OFF so normal credit gating applies (otherwise 25 strangers spend the central key without any limit).'} },\n  { sec:'idea', icon:'🎙️', badge:{sk:'POZNÁMKA',en:'NOTE'}, badgeCls:'idea',\n    t:{sk:'Hlasové ovládanie, aj pri zamknutom telefóne', en:'Voice control, even with the phone locked'},\n    m:{sk:'zapísané 18.7. — pri zamknutom = až natívna appka + Siri', en:'logged 18 Jul — locked-phone control needs the native app + Siri'},\n    s:{sk:'t173 · zapísané 18.7.2026 · Fáza 6', en:'t173 · logged 18 Jul 2026 · Phase 6'},\n    b:{sk:'Richardova požiadavka: ovládať appku hlasom, ideálne aj so zamknutým displejom.\u003cbr>\u003cbr>\u003cb>Technická realita:\u003c/b> web appka na iOS \u003cb>nemôže\u003c/b> počúvať pri zamknutom telefóne (mikrofón beží len s otvorenou stránkou). Reálna cesta:\u003cbr>· \u003cb>pri odomknutom\u003c/b> — Web Speech API na diktovanie a príkazy priamo v appke (dá sa spraviť už teraz),\u003cbr>· \u003cb>pri zamknutom\u003c/b> — natívna appka + Siri Shortcuts/App Intents („Hey Siri, Sautero pridaj…\") — patrí do Fázy 6 (natívna mobilná appka, 2027).',\n       en:'Richard\\'s request: control the app by voice, ideally even with the display locked.\u003cbr>\u003cbr>\u003cb>Technical reality:\u003c/b> a web app on iOS \u003cb>cannot\u003c/b> listen while the phone is locked (the microphone only runs with the page open). The real path:\u003cbr>· \u003cb>unlocked\u003c/b> — Web Speech API for dictation and commands directly in the app (possible today),\u003cbr>· \u003cb>locked\u003c/b> — native app + Siri Shortcuts/App Intents (\"Hey Siri, Sautero add…\") — belongs to Phase 6 (native mobile app, 2027).'} },\n  { sec:'idea', icon:'🌡️', badge:{sk:'POZNÁMKA',en:'NOTE'}, badgeCls:'idea',\n    t:{sk:'Chladničkové senzory + tlačiareň štítkov', en:'Fridge sensors + label printer'},\n    m:{sk:'SensorPush ~CHF 125 · Brother QL-820NWB ~CHF 130 — plánované nákupy', en:'SensorPush ~CHF 125 · Brother QL-820NWB ~CHF 130 — planned purchases'},\n    s:{sk:'research hotový · docs/LABEL_PRINTER_RESEARCH.md', en:'research done · docs/LABEL_PRINTER_RESEARCH.md'},\n    b:{sk:'\u003cb>SensorPush\u003c/b> (~$55 senzor + ~$100 WiFi brána, bez mesačných poplatkov) je jediná budget možnosť s cloud API pre automatický zápis teplôt do HACCP. \u003cb>Brother QL-820NWB\u003c/b> (~CHF 130, bez zmluvy) na tlač štítkov. Oba čakajú na nákup — sú v Nákladoch ako plánované.',\n       en:'\u003cb>SensorPush\u003c/b> (~$55 sensor + ~$100 WiFi gateway, no monthly fees) is the only budget option with a cloud API for automatic temperature logging into HACCP. \u003cb>Brother QL-820NWB\u003c/b> (~CHF 130, no contract) for label printing. Both awaiting purchase — listed under Costs as planned.'} },\n  { sec:'idea', icon:'🎓', badge:{sk:'PARKOVANÉ',en:'PARKED'}, badgeCls:'idea',\n    t:{sk:'Študentská bakalárka na module Inventory', en:'Student thesis on the Inventory module'},\n    m:{sk:'parkované 17.7. — ohraničený modul, nikdy produkčné dáta', en:'parked 17 Jul — a bounded module, never production data'},\n    s:{sk:'parkované · 17.7.2026', en:'parked · 17 Jul 2026'},\n    b:{sk:'Nápad: študent si vezme \u003cb>ohraničený izolovaný modul\u003c/b> (kandidát: Inventory) ako bakalárku. Podmienky: nikdy produkčné dáta ani AI kľúč, IP dohoda vopred. Parkované, kým nie je kapacita.',\n       en:'Idea: a student takes a \u003cb>bounded, isolated module\u003c/b> (candidate: Inventory) as their bachelor thesis. Conditions: never production data or the AI key, IP agreement up front. Parked until there is capacity.'} },\n  { sec:'you', icon:'📧', badge:{sk:'RICHARD',en:'RICHARD'}, badgeCls:'you',\n    t:{sk:'E-mailová adresa odosielateľa → @sautero.ch', en:'Sender e-mail address → @sautero.ch'},\n    m:{sk:'maily už chodia ako „Sautero\", adresa je ešte noreply@chefos.ch — treba overiť doménu v Resende', en:'mails already arrive as \"Sautero\", the address is still noreply@chefos.ch — verify the domain in Resend'},\n    s:{sk:'e-mail migrácia · od 18.7.2026', en:'e-mail migration · since 18 Jul 2026'},\n    b:{sk:'Šablóny aj meno odosielateľa sú už Sautero. Posledný krok: overiť doménu \u003cb>sautero.ch v Resende\u003c/b> (pridať ich DNS záznamy v Hostpointe — Claude pripraví presné hodnoty) a prepnúť adresu odosielateľa na \u003cb>noreply@sautero.ch\u003c/b> v Supabase SMTP. Dovtedy maily chodia z noreply@chefos.ch, čo funguje, len adresa nesie starú doménu.',\n       en:'Templates and the sender name are already Sautero. Last step: verify the \u003cb>sautero.ch domain in Resend\u003c/b> (add their DNS records in Hostpoint — Claude will prepare exact values) and switch the sender address to \u003cb>noreply@sautero.ch\u003c/b> in Supabase SMTP. Until then mails come from noreply@chefos.ch, which works — the address just carries the old domain.'} },\n  { sec:'you', icon:'📄', badge:{sk:'RICHARD',en:'RICHARD'}, badgeCls:'you',\n    t:{sk:'Nebenerwerb súhlas + Einzelfirma', en:'Side-business consent + sole proprietorship'},\n    m:{sk:'deadline 20.7. — obe blokujú prvý príjem, drafty v docs/', en:'deadline 20 Jul — both block first revenue, drafts in docs/'},\n    s:{sk:'deadline 20.7.2026 · blokátory monetizácie', en:'deadline 20 Jul 2026 · monetisation blockers'},\n    b:{sk:'Dva právne blokátory prvého príjmu (founding pre-sale CHF 490/rok + onboarding CHF 990):\u003cbr>· \u003cb>písomný súhlas zamestnávateľa\u003c/b> s vedľajším zárobkom — list je nadraftovaný v docs/, stačí poslať,\u003cbr>· \u003cb>registrácia Einzelfirmy\u003c/b> (AHV) — draft podkladov tiež v docs/.',\n       en:'Two legal blockers of first revenue (founding pre-sale CHF 490/year + onboarding CHF 990):\u003cbr>· \u003cb>written employer consent\u003c/b> for side-business income — the letter is drafted in docs/, just send it,\u003cbr>· \u003cb>sole-proprietorship registration\u003c/b> (AHV) — draft materials also in docs/.'} },\n  { sec:'you', icon:'🤝', badge:{sk:'RICHARD',en:'RICHARD'}, badgeCls:'you',\n    t:{sk:'Aare Ventures — pitch pre investorov v Berne', en:'Aare Ventures — pitching Bern investors'},\n    m:{sk:'prihláška do 23.8., event 14.9. Eventfabrik Bern — detail v Internal Docs', en:'application by 23 Aug, event 14 Sep at Eventfabrik Bern — details in Internal Docs'},\n    s:{sk:'aare.html · zapísané 18.7.2026', en:'aare.html · logged 18 Jul 2026'},\n    b:{sk:'Bernský spolok prepájajúci startupy s business angelmi (4 eventy ročne, >CHF 20 mil. preinvestovaných). Najbližší event \u003cb>AV29: pondelok 14.9.2026, Eventfabrik Bern\u003c/b>, prihláška do \u003cb>23.8.\u003c/b> — pitch deck max 20 slidov na contact@aareventures.ch. Plný rozbor + či sa tam hodíme: dokument Aare Ventures v Internal Docs.',\n       en:'A Bern association connecting startups with business angels (4 events a year, >CHF 20m invested). Next event \u003cb>AV29: Monday 14 Sep 2026, Eventfabrik Bern\u003c/b>, application by \u003cb>23 Aug\u003c/b> — pitch deck max 20 slides to contact@aareventures.ch. Full analysis + whether we fit: the Aare Ventures document in Internal Docs.'} },\n  { sec:'lesson', icon:'🏷️', badge:{sk:'POUČENIE',en:'LESSON'}, badgeCls:'lesson',\n    t:{sk:'Prípad ChefOS — meno nikdy bez preverenia, rebrand nikdy bez inventúry', en:'The ChefOS case — never a name without checks, never a rebrand without an inventory'},\n    m:{sk:'18.7.2026 — 10 dní budovania značky na kolidujúcom mene + e-maily so starou značkou po rebrande', en:'18 Jul 2026 — 10 days of brand-building on a colliding name + old-brand e-mails after the rebrand'},\n    s:{sk:'trvalé pravidlo · nikdy viac', en:'standing rule · never again'},\n    b:{sk:'\u003cb>Čo sa stalo:\u003c/b> 10 dní sme stavali značku „ChefOS\" — potom sa ukázalo, že v App Store existuje hotová appka „ChefOS Mobile\" (Counter Labs, USA, ™) a ďalší „ChefOS\" na chefos.pro. Nasledoval rebrand na Sautero — a aj po ňom odišli užívateľom prihlasovacie e-maily so starou značkou, lebo šablóny e-mailov boli samostatný povrch, na ktorý sa pri hromadnom nahradení zabudlo.\u003cbr>\u003cbr>\u003cb>Pravidlo 1 — nové meno:\u003c/b> pred akýmkoľvek budúcim menom (produkt, funkcia, doména) VŽDY najprv: App Store (iTunes API), globálny web, whois domén, ochranné známky (Swissreg/EUIPO). Nikdy nestavať značku na nepreverenom mene.\u003cbr>\u003cbr>\u003cb>Pravidlo 2 — rebrand = inventúra:\u003c/b> premenovanie nie je jedno hromadné nahradenie. Vždy prejsť KOMPLETNÝ zoznam povrchov: appka, PWA manifest, ikony/logo, všetky dokumenty (aj rozkliknutia), e-mailové šablóny v Supabase, SMTP meno odosielateľa, edge funkcie, tlač, QR/inštalačné návody, titulky generovaných dokumentov.\u003cbr>\u003cbr>\u003cb>Pravidlo 3 — jazyky:\u003c/b> každý dokument má SK/EN prepínač a OBE verzie musia byť úplné vrátane všetkých modalov. Kontroluje sa pri každej aktualizácii.',\n       en:'\u003cb>What happened:\u003c/b> we spent 10 days building the \"ChefOS\" brand — then it turned out a finished \"ChefOS Mobile\" app existed on the App Store (Counter Labs, USA, ™) plus another \"ChefOS\" at chefos.pro. A rebrand to Sautero followed — and even after it, users received sign-in e-mails carrying the old brand, because the e-mail templates were a separate surface forgotten during the bulk replace.\u003cbr>\u003cbr>\u003cb>Rule 1 — a new name:\u003c/b> before ANY future name (product, feature, domain) ALWAYS check first: App Store (iTunes API), the global web, domain whois, trademarks (Swissreg/EUIPO). Never build a brand on an unchecked name.\u003cbr>\u003cbr>\u003cb>Rule 2 — a rebrand = an inventory:\u003c/b> renaming is not one bulk replace. Always walk the COMPLETE list of surfaces: app, PWA manifest, icons/logo, all documents (tap-details included), Supabase e-mail templates, SMTP sender name, edge functions, print, QR/install instructions, generated doc titles.\u003cbr>\u003cbr>\u003cb>Rule 3 — languages:\u003c/b> every document has the SK/EN toggle and BOTH versions must be complete, all modals included. Checked on every update.'} },\n];\n\nlet _lang = localStorage.getItem('chefos_doc_lang') || 'sk';\nfunction applyLangAttrs(){\n  document.querySelectorAll('[data-sk]').forEach(el => { el.innerHTML = el.dataset[_lang] || el.dataset.sk; });\n  document.getElementById('langBtn').textContent = _lang === 'sk' ? 'EN' : 'SK';\n}\nfunction toggleLang(){\n  _lang = _lang === 'sk' ? 'en' : 'sk';\n  localStorage.setItem('chefos_doc_lang', _lang);\n  applyLangAttrs();\n  renderNotes();\n  closeNote();\n}\nfunction L(x){ return x[_lang] || x.sk; }\n\nfunction renderNotes(){\n  const secs = { do:'secDo', idea:'secIdea', you:'secYou', lesson:'secLesson' };\n  Object.entries(secs).forEach(([k, id])=>{\n    document.getElementById(id).innerHTML = NOTES.filter(n=>n.sec===k).map((n)=>`\n      \u003cdiv class=\"note\" onclick=\"openNote(${NOTES.indexOf(n)})\">\n        \u003cspan class=\"ico\">${n.icon}\u003c/span>\n        \u003cspan style=\"flex:1;\">\u003cspan class=\"t\">${L(n.t)}\u003c/span>\u003cdiv class=\"m\">${L(n.m)}\u003c/div>\u003c/span>\n        \u003cspan class=\"badge ${n.badgeCls}\">${L(n.badge)}\u003c/span>\n        \u003cspan class=\"tap-hint\">${_lang==='sk' ? 'ťukni ›' : 'tap ›'}\u003c/span>\n      \u003c/div>`).join('');\n  });\n}\nfunction openNote(i){\n  const n = NOTES[i];\n  document.getElementById('nm_t').textContent = n.icon + ' ' + L(n.t);\n  document.getElementById('nm_s').textContent = L(n.s);\n  document.getElementById('nm_b').innerHTML = L(n.b);\n  document.getElementById('noteModal').classList.add('open');\n}\nfunction closeNote(){ document.getElementById('noteModal').classList.remove('open'); }\napplyLangAttrs();\nrenderNotes();\n\u003c/script>\n\u003c/body>\n\u003c/html>\n"];
const frames = [];
function openTab(n){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active', i===n));
  frames.forEach(f=>f && f.classList.remove('show'));
  if(!frames[n]){
    const f = document.createElement('iframe');
    f.srcdoc = DOCS[n];
    document.getElementById('frames').appendChild(f);
    frames[n] = f;
  }
  frames[n].classList.add('show');
}
openTab(0);
</script>
