<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Sautero — Náklady</title>
<style>
  /* Sautero visual identity (standing rule): dark navy + teal, mono for numbers. */
  :root{
    --bg:#0A1A2F; --paper:#122845; --paper2:#0E2138; --ink:#FFFFFF; --ink-dim:#9C949E;
    --ink-faint:#5E6B7A; --rule:#223d57; --accent:#34F7D7; --gold:#E8C468; --danger:#FF7A68;
    --mono:'SF Mono',SFMono-Regular,ui-monospace,Menlo,monospace;
  }
  *{ box-sizing:border-box; min-width:0; }
  html,body{ overflow-x:hidden; }
  body{ margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif; padding:20px 16px 80px 16px; }
  .wrap{ max-width:860px; margin:0 auto; }
  h1{ font-size:24px; margin:0 0 4px 0; }
  .lede{ font-size:13px; color:var(--ink-dim); line-height:1.55; margin:0 0 18px 0; }
  .lang-toggle{ position:fixed; top:12px; right:12px; z-index:50; background:var(--paper); border:1px solid var(--rule); color:var(--ink); font-size:12px; font-weight:700; padding:6px 12px; border-radius:999px; cursor:pointer; }
  .section-label{ display:flex; align-items:center; gap:10px; margin:26px 0 10px 0; }
  .section-label .n{ font-family:var(--mono); font-size:11px; color:var(--accent); }
  .section-label h2{ font-size:15px; margin:0; }
  .section-label .rule{ flex:1; height:1px; background:var(--rule); }
  .card{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:16px; }
  .spend-legend{ display:flex; flex-direction:column; gap:7px; font-size:12px; color:var(--ink-dim); }
  .spend-legend span.item{ display:inline-flex; align-items:center; gap:8px; cursor:pointer; border-radius:8px; padding:2px 6px; margin:-2px -6px; }
  .spend-legend span.item:hover{ background:var(--paper2); }
  .spend-legend i{ width:10px; height:10px; border-radius:3px; display:inline-block; flex:none; }
  .spend-row{ display:flex; justify-content:space-between; align-items:baseline; padding:10px 0; border-top:1px solid var(--rule); gap:12px; flex-wrap:wrap; cursor:pointer; }
  .spend-row:first-child{ border-top:none; }
  .spend-row:hover{ background:var(--paper2); border-radius:8px; }
  .spend-row.active{ outline:1px solid var(--accent); border-radius:10px; padding-left:8px; padding-right:8px; }
  .spend-what{ font-size:13px; color:var(--ink); flex:1 1 240px; }
  .spend-what .meta{ display:block; font-size:11px; color:var(--ink-dim); margin-top:2px; line-height:1.5; }
  .spend-amount{ font-family:var(--mono); font-size:13.5px; font-weight:700; color:var(--ink); flex:none; font-variant-numeric:tabular-nums; }
  .spend-total{ display:flex; justify-content:space-between; padding:12px 0 0 0; border-top:2px solid var(--accent); margin-top:6px; font-weight:700; font-size:13px; gap:12px; flex-wrap:wrap; }
  .gran-chips{ display:flex; gap:6px; flex-wrap:wrap; }
  .gran-chips button{ background:var(--paper2); border:1px solid var(--rule); color:var(--ink-dim); font-size:11.5px; font-weight:700; padding:5px 12px; border-radius:999px; cursor:pointer; font-family:inherit; }
  .gran-chips button.active{ background:var(--accent); border-color:var(--accent); color:#0A1A2F; }
  .tl-scroll{ overflow-x:auto; margin-top:10px; -webkit-overflow-scrolling:touch; }
  .tl-note{ font-size:11px; color:var(--ink-dim); margin:8px 0 0 0; line-height:1.5; }
  #timelineCard{ display:none; border-color:var(--accent); }
  .tl-head{ display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:4px; }
  .tl-title{ font-size:13.5px; font-weight:700; }
  .tl-close{ background:none; border:none; color:var(--ink-dim); font-size:16px; cursor:pointer; padding:2px 6px; }
  .sautero-stamp{ position:fixed; bottom:14px; right:14px; z-index:90; background:rgba(15,35,64,0.92); border:1px solid rgba(52,247,215,0.4); color:#34F7D7; font-size:10.5px; font-weight:700; font-family:'SF Mono',Menlo,Consolas,monospace; padding:6px 12px; border-radius:999px; pointer-events:none; }
  @media print{ .sautero-stamp, .lang-toggle{ display:none; } }
</style>
</head>
<body>
<button class="lang-toggle" id="langBtn" onclick="toggleLang()">EN</button>
<div class="wrap">

  <h1 data-sk="💸 Náklady" data-en="💸 Costs"></h1>
  <p class="lede" data-sk="Všetky peniaze a čas, ktoré Sautero doteraz stál, aj to, čo je naplánované. Klikni na ktorúkoľvek položku (v koláči, legende alebo zozname) a otvorí sa jej časová línia od začiatku projektu — s prepínačom deň / týždeň / mesiac / rok. Self-reported, nie auditované; čas zakladateľa = 45 CHF/h z merača hodín." data-en="All the money and time Sautero has cost so far, plus what's planned. Click any item (pie, legend or list) to open its timeline since project start — with a day / week / month / year toggle. Self-reported, not audited; founder time = CHF 45/h from the hours meter."></p>

  <div class="section-label"><span class="n">01</span><h2 data-sk="Koláč — všetky doterajšie aj budúce náklady" data-en="Pie — all costs to date and upcoming"></h2><div class="rule"></div></div>
  <div class="card" style="display:flex; flex-wrap:wrap; gap:20px; align-items:center;">
    <svg id="spendDonut" width="170" height="170" viewBox="0 0 120 120" style="flex:none;"></svg>
    <div id="spendDonutLegend" class="spend-legend" style="flex:1 1 230px;"></div>
  </div>

  <div class="card" id="timelineCard" style="margin-top:12px;">
    <div class="tl-head">
      <div class="tl-title" id="tlTitle"></div>
      <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
        <div class="gran-chips" id="granChips"></div>
        <button class="tl-close" onclick="closeSpendTimeline()" title="Close">✕</button>
      </div>
    </div>
    <div class="tl-scroll"><div id="tlChart"></div></div>
    <p class="tl-note" id="tlNote"></p>
  </div>

  <div class="section-label"><span class="n">02</span><h2 data-sk="Položky — klikni pre časovú líniu" data-en="Line items — click for the timeline"></h2><div class="rule"></div></div>
  <div class="card" id="spendRows"></div>

  <div class="section-label"><span class="n">03</span><h2 data-sk="AI spotreba — kto koľko minie" data-en="AI spend — who spends what"></h2><div class="rule"></div></div>
  <div class="card">
    <p class="lede" style="margin:0 0 10px 0;" data-sk="Claude Platform dashboard vidí len jeden spoločný Sautero kľúč — rozdelenie per užívateľ nikdy ukázať nevie. Preto od 17. 7. 2026 server (claude-proxy) zapisuje každé AI volanie: kto, ktorá funkcia, koľko tokenov a vypočítaná cena. Živý prehľad: Admin → 📈 AI Usage v appke — Head Admin vidí všetkých, Kitchen Admin svoj tím; rozklik na užívateľa ukáže koláč jeho AI funkcií. Do tohto dokumentu sa súhrn prenáša pri každom doc-synce." data-en="The Claude Platform dashboard only sees Sautero's one shared key — it can never show a per-user split. So since Jul 17, 2026 the server (claude-proxy) logs every AI call: who, which feature, token counts and computed cost. Live view: Admin → 📈 AI Usage in the app — Head Admin sees everyone, a Kitchen Admin their own team; tapping a user opens a pie of their AI functions. A summary lands in this document with every doc-sync."></p>
    <div class="spend-row" style="cursor:default;">
      <div class="spend-what"><span data-sk="Celkové AI výdavky tento mesiac (celá organizácia)" data-en="Total AI spend this month (whole org)"></span><span class="meta" data-sk="z Claude Platform dashboardu 17.7.: $2.22 minutých, $2.79 kreditov zostáva, 388K tokenov za 7 dní. Čerpá z už zaplatených kreditov v položkách vyššie — nezapočítava sa druhýkrát." data-en="from the Claude Platform dashboard Jul 17: $2.22 spent, $2.79 credits left, 388K tokens in 7 days. Draws on the already-paid credits above — not double-counted."></span></div>
      <div class="spend-amount">$2.22</div>
    </div>
    <div class="spend-row" style="cursor:default;">
      <div class="spend-what"><span data-sk="Per užívateľ (z ai_usage tabuľky)" data-en="Per user (from the ai_usage table)"></span><span class="meta" data-sk="meranie beží od 17. 7. — prvé volania sa objavia pri najbližšom použití AI funkcie" data-en="metering live since Jul 17 — the first calls will appear the next time anyone uses an AI feature"></span></div>
      <div class="spend-amount">—</div>
    </div>
  </div>

</div>
<div class="sautero-stamp" data-sk="🔄 Stav Sautero k 22. 7. 2026, 00:10" data-en="🔄 Sautero state as of Jul 22, 2026, 00:10"></div>
<script>
/* Shared doc-language key — same as every other visual data document. */
let _lang = localStorage.getItem('sautero_doc_lang') || 'sk';
function applyLang(){
  document.querySelectorAll('[data-sk]').forEach(el=>{
    const val = el.getAttribute(_lang === 'sk' ? 'data-sk' : 'data-en');
    if(val === null) return;
    if(val.indexOf('<') !== -1) el.innerHTML = val; else el.textContent = val;
  });
  const btn = document.getElementById('langBtn');
  if(btn) btn.textContent = _lang === 'sk' ? 'EN' : 'SK';
  document.documentElement.lang = _lang;
}
function L(sk,en){ return _lang==='sk' ? sk : en; }
function toggleLang(){
  _lang = _lang === 'sk' ? 'en' : 'sk';
  localStorage.setItem('sautero_doc_lang', _lang);
  applyLang();
  renderSpendDonut();
  renderSpendRows();
  if(_tlKey) renderSpendTimeline();
}

/* ---------- Data (Richard, 17.7.: every item clickable → timeline since project start).
   One place to update: SPEND_ITEMS. Founder time events come from the work-hours meter
   (WORK_HOURS × 45 CHF/h) — refresh with every doc-sync. Payment dates for the early
   API/subscription spends were reported as a running total, not itemized — those event
   dates are honest estimates and say so in the item note. ---------- */
const PROJECT_START = '2026-07-08';
const SPEND_RATE = 45;
const WORK_HOURS = { '2026-07-08':8.0 /*odhad*/, '2026-07-09':8.0 /*odhad*/, '2026-07-10':8.0 /*odhad*/, '2026-07-11':8.0 /*odhad*/, '2026-07-12':8.0 /*odhad*/, '2026-07-13':7.7, '2026-07-14':7.4, '2026-07-15':11.6, '2026-07-16':14.8, '2026-07-17':6.4, '2026-07-18':12.4, '2026-07-19':3.9, '2026-07-20':17.3, '2026-07-21':10.0 };
/* Founder time is COMPUTED from WORK_HOURS (which work_hours.py rewrites from git on every
   commit) — the label/amount/total can never drift from the История hours again (22.7. fix:
   the hand-written "120,0 h" and "~CHF 4 976" had gone stale vs the live 126.5 h). */
const FOUNDER_H = Object.values(WORK_HOURS).reduce((a,h)=>a+h,0);
const FOUNDER_MEASURED_H = FOUNDER_H - 40;  // minus the ~8h/day pre-git estimates (8.-12.7.)
const FOUNDER_CHF = Math.round(FOUNDER_H * SPEND_RATE);
const fmtHsk = h => h.toFixed(1).replace('.', ',');
const fmtChf = v => v.toLocaleString('de-CH');
const SPEND_ITEMS = [
  { key:'time', color:'#8B93FF',
    sk:`⏱️ Čas zakladateľa — ${fmtHsk(FOUNDER_H)} h × 45 CHF/h`, en:`⏱️ Founder time — ${FOUNDER_H.toFixed(1)} h × CHF 45/h`,
    meta_sk:`${fmtHsk(FOUNDER_MEASURED_H)} h presne z git histórie (od 13.7.) + ~40 h odhad za 8.–12.7.; počíta sa živo z merača hodín, ručne sa neudržiava. Hodnota času, nie hotovosť.`,
    meta_en:`${FOUNDER_MEASURED_H.toFixed(1)} h measured from git history (since Jul 13) + ~40 h estimate for Jul 8–12; computed live from the hours meter, never hand-maintained. Value of time, not cash.`,

    events: Object.entries(WORK_HOURS).map(([d,h])=>({ date:d, chf: h*SPEND_RATE })),
    note_sk:'Denné hodiny × 45 CHF. Dni 8.–12.7. sú odhad ~8 h/deň (pred gitom), od 13.7. presne z git histórie.',
    note_en:'Daily hours × CHF 45. Jul 8–12 are ~8 h/day estimates (pre-git); measured from git history since Jul 13.' },
  { key:'api', color:'var(--accent)',
    sk:'API kredity + Claude predplatné', en:'API credits + Claude subscriptions',
    meta_sk:'8.7.–14.7.2026, self-reported (~$45 kredity+Pro, $5 dobitie, $80 ďalšie predplatné)',
    meta_en:'Jul 8–14, 2026, self-reported (~$45 credits+Pro, $5 top-up, $80 another subscription)',
    amount:'~CHF 135',
    events:[ { date:'2026-07-08', chf:45 }, { date:'2026-07-10', chf:5 }, { date:'2026-07-12', chf:85 } ],
    note_sk:'Nahlásené súhrnne, presné dátumy jednotlivých platieb sa neevidovali — rozloženie na 8./10./12.7. je poctivý odhad, súčet ~135 CHF sedí.',
    note_en:'Reported as a running total; exact payment dates were not recorded — the 8/10/12 Jul split is an honest estimate, the ~CHF 135 total is right.' },
  { key:'new15', color:'#2BB8A3',
    sk:'Claude predplatné (platba 15.7.)', en:'Claude subscription (Jul 15 payment)',
    meta_sk:'upresnené Richardom 17.7. — platba za Claude predplatné; spolu s položkou vyššie je celkovo v Claude/API ~CHF 233',
    meta_en:'clarified by Richard Jul 17 — a Claude subscription payment; together with the item above, total Claude/API spend is ~CHF 233',

    events:[ { date:'2026-07-15', chf:97.73 } ],
    note_sk:'Platba za Claude predplatné, 15.7.2026.', note_en:'Claude subscription payment, Jul 15, 2026.' },
  { key:'gamma', color:'#1E7F73',
    sk:'Gamma (prezentačný nástroj)', en:'Gamma (presentation tool)',

    events:[ { date:'2026-07-17', chf:20 } ],
    note_sk:'Jednorazovo, 17.7.2026.', note_en:'One-off, Jul 17, 2026.' },
  { key:'domain', color:'#6EE7D0',
    sk:'Doména chefos.ch (Hostpoint, 1. rok)', en:'Domain chefos.ch (Hostpoint, year 1)',
    meta_sk:'15.7.2026 — zľava na prvý rok, obnova ~CHF 15/rok od druhého roka',
    meta_en:'Jul 15, 2026 — first-year discount, renews at ~CHF 15/year from year 2',
    amount:'CHF 5.00',
    events:[ { date:'2026-07-15', chf:5 } ],
    note_sk:'Jednorazovo 15.7.2026; ďalší výdavok príde pri obnove (~15 CHF/rok).',
    note_en:'One-off Jul 15, 2026; next spend at renewal (~CHF 15/year).' },
  { key:'domain_sautero', color:'#4FD1B8',
    sk:'Domény sautero.ch + sautero.com (Hostpoint, 1. rok)', en:'Domains sautero.ch + sautero.com (Hostpoint, year 1)',
    meta_sk:'18.7.2026 — kúpené Richardom pri rebrande na Sautero',
    meta_en:'Jul 18, 2026 — bought by Richard for the Sautero rebrand',
    amount:'CHF 15.00',
    events:[ { date:'2026-07-18', chf:15 } ],
    note_sk:'Jednorazovo 18.7.2026, obe domény spolu; obnova nasledujúci rok.',
    note_en:'One-off Jul 18, 2026, both domains together; renews next year.' },
  { key:'agent', color:'var(--danger)',
    sk:'Denný ingredient agent', en:'Daily ingredient agent',

    events:[],
    note_sk:'Plánovaný nákup — zatiaľ žiadne výdavky.', note_en:'Planned purchase — no spend yet.' },
  { key:'supabase', color:'#7FB3FF', recurring:true,
    sk:'🔁 Supabase Pro (mesačne, beží)', en:'🔁 Supabase Pro (monthly, ongoing)',

    amount:'~USD 25/mes',
    events:[ { date:'2026-07-13', chf:22 } ],
    note_sk:'Mesačné predplatné ~25 USD (~22 CHF); prvá platba priradená k 13.7. (upgrade na Pro), presný fakturačný deň neevidovaný.',
    note_en:'Monthly ~USD 25 (~CHF 22); first charge shown on Jul 13 (Pro upgrade), exact billing day not recorded.' },
];

function renderSpendRows(){
  const el = document.getElementById('spendRows');
  el.innerHTML = SPEND_ITEMS.map(it=>`
    <div class="spend-row" id="row_${it.key}" onclick="openSpendTimeline('${it.key}')">
      <div class="spend-what"><span>${L(it.sk, it.en)}</span><span class="meta">${L(it.meta_sk, it.meta_en)} · <b style="color:var(--accent);">${L('📈 časová línia','📈 timeline')}</b></span></div>
      <div class="spend-amount">${it.amount}</div>
    </div>`).join('') + `
    <div class="spend-total">
      <div class="spend-what" style="cursor:default;">${L('Hotovosť doteraz ~CHF 296 (vrátane 1. mesiaca Supabase + domén sautero.ch/.com) · s časom zakladateľa ~CHF ' + fmtChf(FOUNDER_CHF) + ' · plánované nákupy ~CHF 255','Cash to date ~CHF 296 (incl. first Supabase month + sautero.ch/.com domains) · incl. founder time ~CHF ' + fmtChf(FOUNDER_CHF) + ' · planned purchases ~CHF 255')}</div>
    </div>`;
}

/* ---------- Donut with include/exclude filter (Richard, 17.7. večer: "kliknutím na položku
   ju odrátať/prirátať k tomu koláču — celkové náklady s filtrom"). Legend click toggles the
   item in/out of the pie and the centre total recomputes; excluded items go dim with a
   strikethrough (filter-visibility standard: never opacity-only — they also lose their color
   chip to a hollow outline). Donut arcs and the section-02 rows still open the timeline. */
let _spendExcluded = new Set();
function toggleSpendFilter(key){
  if(_spendExcluded.has(key)) _spendExcluded.delete(key); else _spendExcluded.add(key);
  renderSpendDonut();
}
function renderSpendDonut(){
  const svg = document.getElementById('spendDonut');
  const valOf = s => s.future ? parseFloat(s.amount.replace(/[^0-9.]/g,'')) : s.events.reduce((a,e)=>a+e.chf,0);
  const included = SPEND_ITEMS.filter(s=>!_spendExcluded.has(s.key));
  const total = included.reduce((s,x)=>s + valOf(x), 0);
  const R = 44, C = 2 * Math.PI * R;
  let off = 0;
  svg.innerHTML = included.map(s=>{
    const val = valOf(s);
    const frac = total ? val / total : 0;
    const label = L(s.sk, s.en);
    const c = `<circle cx="60" cy="60" r="${R}" fill="none" stroke="${s.color}" stroke-width="17" style="cursor:pointer;"
      stroke-dasharray="${(frac*C).toFixed(2)} ${(C-frac*C).toFixed(2)}" stroke-dashoffset="${(-off*C).toFixed(2)}"
      transform="rotate(-90 60 60)" onclick="openSpendTimeline('${s.key}')"><title>${label}: ~CHF ${Math.round(val).toLocaleString('de-CH')}</title></circle>`;
    off += frac;
    return c;
  }).join('') +
    `<text x="60" y="56" text-anchor="middle" font-size="15" font-weight="700" fill="var(--ink)">~${Math.round(total).toLocaleString('de-CH')}</text>` +
    `<text x="60" y="70" text-anchor="middle" font-size="7" fill="var(--ink-dim)">${_spendExcluded.size
      ? L(`CHF s filtrom (${included.length}/${SPEND_ITEMS.length} položiek)`, `CHF filtered (${included.length}/${SPEND_ITEMS.length} items)`)
      : L('CHF spolu, vrátane času a plánu','CHF total, incl. time and planned')}</text>`;
  document.getElementById('spendDonutLegend').innerHTML = SPEND_ITEMS.map(s=>{
    const val = valOf(s);
    const excluded = _spendExcluded.has(s.key);
    const amt = '~CHF ' + val.toLocaleString('de-CH',{maximumFractionDigits: val < 10 ? 2 : 0});
    return `<span class="item" onclick="toggleSpendFilter('${s.key}')" title="${L('Klik = odrátať/prirátať ku koláču','Click = subtract/add to the pie')}" style="${excluded ? 'opacity:.45; text-decoration:line-through;' : ''}">
      <i style="${excluded ? `background:none; border:1.5px solid ${s.color};` : `background:${s.color};`}"></i>
      <span>${L(s.sk,s.en)} — <b style="font-family:var(--mono);">${amt}</b></span></span>`;
  }).join('') + `<span style="font-size:11px; color:var(--ink-dim); margin-top:4px;">${L('Klik v legende = filter koláča · klik na výsek alebo riadok nižšie = časová línia','Legend click = pie filter · arc or row below = timeline')}</span>`;
}

/* ---------- Timeline with day/week/month/year granularity (Richard, 17.7.) ---------- */
let _tlKey = null, _tlGran = 'day';
const GRANS = [ ['day','Deň','Day'], ['week','Týždeň','Week'], ['month','Mesiac','Month'], ['year','Rok','Year'] ];
function bernToday(){ return new Intl.DateTimeFormat('en-CA', { timeZone:'Europe/Zurich' }).format(new Date()); }
function dateRange(){
  const out = []; const end = bernToday();
  let d = new Date(PROJECT_START + 'T12:00:00');
  while(true){
    const s = d.toISOString().slice(0,10);
    out.push(s);
    if(s >= end) break;
    d.setDate(d.getDate()+1);
  }
  return out;
}
function bucketOf(dateStr, gran){
  if(gran === 'day') return dateStr;
  const d = new Date(dateStr + 'T12:00:00');
  if(gran === 'year') return dateStr.slice(0,4);
  if(gran === 'month') return dateStr.slice(0,7);
  const day = (d.getDay()+6)%7; const mon = new Date(d); mon.setDate(d.getDate()-day);
  return mon.toISOString().slice(0,10);
}
function bucketLabel(b, gran){
  if(gran === 'day'){ const p = b.split('-'); return String(Number(p[2])) + '.' + String(Number(p[1])) + '.'; }
  if(gran === 'week'){ const p = b.split('-'); return L('týž. od ','wk of ') + String(Number(p[2])) + '.' + String(Number(p[1])) + '.'; }
  if(gran === 'month'){ const m = Number(b.split('-')[1]); return (_lang==='sk' ? ['jan','feb','mar','apr','máj','jún','júl','aug','sep','okt','nov','dec'] : ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'])[m-1] + ' ' + b.slice(0,4); }
  return b;
}
function setGran(g){ _tlGran = g; renderSpendTimeline(); }
function openSpendTimeline(key){
  _tlKey = key;
  document.querySelectorAll('.spend-row').forEach(r=>r.classList.remove('active'));
  const row = document.getElementById('row_' + key);
  if(row) row.classList.add('active');
  document.getElementById('timelineCard').style.display = 'block';
  renderSpendTimeline();
  document.getElementById('timelineCard').scrollIntoView({ behavior:'smooth', block:'nearest' });
}
function closeSpendTimeline(){
  _tlKey = null;
  document.getElementById('timelineCard').style.display = 'none';
  document.querySelectorAll('.spend-row').forEach(r=>r.classList.remove('active'));
}
function renderSpendTimeline(){
  const it = SPEND_ITEMS.find(x=>x.key === _tlKey);
  if(!it) return;
  document.getElementById('tlTitle').textContent = L(it.sk, it.en) + ' — ' + L('od začiatku projektu (8.7.2026)','since project start (Jul 8, 2026)');
  document.getElementById('granChips').innerHTML = GRANS.map(([g,sk,en])=>
    `<button class="${_tlGran===g?'active':''}" onclick="setGran('${g}')">${L(sk,en)}</button>`).join('');
  document.getElementById('tlNote').textContent = L(it.note_sk, it.note_en);
  // zero-filled buckets over the whole project range, events summed into their bucket
  const buckets = [];
  const seen = {};
  dateRange().forEach(d=>{ const b = bucketOf(d, _tlGran); if(!seen[b]){ seen[b] = { label: bucketLabel(b, _tlGran), chf: 0 }; buckets.push(seen[b]); } });
  it.events.forEach(e=>{ const b = bucketOf(e.date, _tlGran); if(seen[b]) seen[b].chf += e.chf; });
  const max = Math.max(1, ...buckets.map(b=>b.chf));
  let cum = 0;
  const BW = 44, GAP = 14, H = 150, TOP = 24, LBL = 34;
  const W = Math.max(buckets.length * (BW + GAP) + GAP, 300);
  const bars = buckets.map((b,i)=>{
    cum += b.chf;
    const h = b.chf > 0 ? Math.max(3, Math.round(b.chf / max * H)) : 0;
    const y = TOP + H - h;
    const x = GAP + i * (BW + GAP);
    return `<g>${h ? `<rect x="${x}" y="${y}" width="${BW}" height="${h}" rx="3" fill="${it.color}"><title>${b.label}: CHF ${b.chf.toFixed(2)} · ${L('spolu dovtedy','running total')} CHF ${cum.toFixed(2)}</title></rect>
      <text x="${x+BW/2}" y="${y-6}" text-anchor="middle" font-size="10" font-weight="700" fill="var(--ink)">${b.chf < 10 ? b.chf.toFixed(1) : Math.round(b.chf)}</text>` : `<rect x="${x}" y="${TOP+H-1}" width="${BW}" height="1" fill="var(--rule)"/>`}
      <text x="${x+BW/2}" y="${TOP+H+16}" text-anchor="middle" font-size="9" fill="var(--ink-dim)">${b.label}</text></g>`;
  }).join('');
  const totalLine = `<text x="${GAP}" y="14" font-size="10.5" fill="var(--ink-dim)">${L('Spolu doteraz','Total to date')}: <tspan font-weight="700" fill="var(--ink)">CHF ${cum.toLocaleString('de-CH',{maximumFractionDigits:2})}</tspan>${it.future ? ' · ' + L('plánované','planned') + ': ' + it.amount : ''}</text>`;
  document.getElementById('tlChart').innerHTML = `<svg width="${W}" height="${TOP+H+LBL}" viewBox="0 0 ${W} ${TOP+H+LBL}">${totalLine}${bars}</svg>`;
}

applyLang();
renderSpendDonut();
renderSpendRows();
</script>
</body>
