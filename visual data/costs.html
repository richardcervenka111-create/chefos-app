<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChefOS — Náklady</title>
<style>
  /* ChefOS visual identity (standing rule): dark navy + teal, mono for numbers. */
  :root{
    --bg:#0A1A2F; --paper:#122845; --paper2:#0E2138; --ink:#FFFFFF; --ink-dim:#9C949E;
    --ink-faint:#5E6B7A; --rule:#223d57; --accent:#34F7D7; --gold:#E8C468; --danger:#FF7A68;
    --mono:'SF Mono',SFMono-Regular,ui-monospace,Menlo,monospace;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif; padding:20px 16px 80px 16px; }
  .wrap{ max-width:860px; margin:0 auto; }
  h1{ font-size:24px; margin:0 0 4px 0; }
  .lede{ font-size:13px; color:var(--ink-dim); line-height:1.55; margin:0 0 18px 0; }
  .lang-toggle{ position:fixed; top:12px; right:12px; z-index:50; background:var(--paper); border:1px solid var(--rule); color:var(--ink); font-size:12px; font-weight:700; padding:6px 12px; border-radius:999px; cursor:pointer; }
  .section-label{ display:flex; align-items:center; gap:10px; margin:26px 0 10px 0; }
  .section-label .n{ font-family:var(--mono); font-size:11px; color:var(--accent); }
  .section-label h2{ font-size:15px; margin:0; }
  .section-label .rule{ flex:1; height:1px; background:var(--rule); }
  .card{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:16px; }
  .spend-legend{ display:flex; flex-direction:column; gap:7px; font-size:12px; color:var(--ink-dim); }
  .spend-legend span{ display:inline-flex; align-items:center; gap:8px; }
  .spend-legend i{ width:10px; height:10px; border-radius:3px; display:inline-block; flex:none; }
  .spend-row{ display:flex; justify-content:space-between; align-items:baseline; padding:10px 0; border-top:1px solid var(--rule); gap:12px; }
  .spend-row:first-child{ border-top:none; }
  .spend-what{ font-size:13px; color:var(--ink); }
  .spend-what .meta{ display:block; font-size:11px; color:var(--ink-dim); margin-top:2px; line-height:1.5; }
  .spend-amount{ font-family:var(--mono); font-size:13.5px; font-weight:700; color:var(--ink); flex:none; font-variant-numeric:tabular-nums; }
  .spend-total{ display:flex; justify-content:space-between; padding:12px 0 0 0; border-top:2px solid var(--accent); margin-top:6px; font-weight:700; font-size:13px; gap:12px; flex-wrap:wrap; }
  .chefos-stamp{ position:fixed; bottom:12px; left:12px; z-index:50; background:var(--paper); border:1px solid var(--rule); color:var(--ink-dim); font-size:10.5px; padding:5px 10px; border-radius:999px; }
  @media print{ .chefos-stamp, .lang-toggle{ display:none; } }
</style>
</head>
<body>
<button class="lang-toggle" id="langBtn" onclick="toggleLang()">EN</button>
<div class="wrap">

  <h1 data-sk="💸 Náklady" data-en="💸 Costs"></h1>
  <p class="lede" data-sk="Všetky peniaze a čas, ktoré ChefOS doteraz stál, aj to, čo je naplánované. Self-reported, nie auditované — presné čísla vždy v Claude Platform / bankovom výpise. Čas zakladateľa sa počíta sadzbou 45 CHF/h z merača hodín (scripts/work_hours.py). AI spotreba per užívateľ sa od 17. 7. meria naživo — Admin → AI Usage v appke." data-en="All the money and time ChefOS has cost so far, plus what's planned. Self-reported, not audited — exact figures always in Claude Platform / the bank statement. Founder time is valued at CHF 45/h from the hours meter (scripts/work_hours.py). Per-user AI spend is metered live since Jul 17 — Admin → AI Usage in the app."></p>

  <div class="section-label"><span class="n">01</span><h2 data-sk="Koláč — všetky doterajšie aj budúce náklady" data-en="Pie — all costs to date and upcoming"></h2><div class="rule"></div></div>
  <div class="card" style="display:flex; flex-wrap:wrap; gap:20px; align-items:center;">
    <svg id="spendDonut" width="170" height="170" viewBox="0 0 120 120" style="flex:none;"></svg>
    <div id="spendDonutLegend" class="spend-legend" style="flex:1; min-width:230px;"></div>
  </div>

  <div class="section-label"><span class="n">02</span><h2 data-sk="Položky" data-en="Line items"></h2><div class="rule"></div></div>
  <div class="card">
    <div class="spend-row">
      <div class="spend-what"><span data-sk="⏱️ Čas zakladateľa — 83,9 h × 45 CHF/h" data-en="⏱️ Founder time — 83.9 h × CHF 45/h"></span><span class="meta" data-sk="43,9 h presne z git histórie (od 13.7.) + ~40 h odhad za 8.–12.7.; aktualizuje sa denne s meračom hodín. Hodnota času, nie hotovosť." data-en="43.9 h measured from git history (since Jul 13) + ~40 h estimate for Jul 8–12; updated daily with the hours meter. Value of time, not cash."></span></div>
      <div class="spend-amount">~CHF 3 776</div>
    </div>
    <div class="spend-row">
      <div class="spend-what"><span data-sk="API kredity + Claude predplatné (od začiatku projektu)" data-en="API credits + Claude subscriptions (since project start)"></span><span class="meta" data-sk="8.7.–14.7.2026, self-reported (~$45 kredity+Pro, $5 dobitie, $80 ďalšie predplatné)" data-en="Jul 8–14, 2026, self-reported (~$45 credits+Pro, $5 top-up, $80 another subscription)"></span></div>
      <div class="spend-amount">~CHF 135</div>
    </div>
    <div class="spend-row">
      <div class="spend-what"><span data-sk="Nové náklady na projekt" data-en="New project costs"></span><span class="meta" data-sk="nahlásené Richardom 15.7. v noci — presné zaradenie/účel zatiaľ neupresnené" data-en="reported by Richard late on Jul 15 — exact category/purpose not yet specified"></span></div>
      <div class="spend-amount">CHF 97.73</div>
    </div>
    <div class="spend-row">
      <div class="spend-what"><span data-sk="Gamma (prezentačný nástroj)" data-en="Gamma (presentation tool)"></span><span class="meta" data-sk="nahlásené Richardom 17.7." data-en="reported by Richard Jul 17"></span></div>
      <div class="spend-amount">CHF 20.00</div>
    </div>
    <div class="spend-row">
      <div class="spend-what"><span data-sk="Doména chefos.ch (Hostpoint, 1. rok)" data-en="Domain chefos.ch (Hostpoint, year 1)"></span><span class="meta" data-sk="15.7.2026 — zľava na prvý rok, obnova ~CHF 15/rok od druhého roka" data-en="Jul 15, 2026 — first-year discount, renews at ~CHF 15/year from year 2"></span></div>
      <div class="spend-amount">CHF 5.00</div>
    </div>
    <div class="spend-row">
      <div class="spend-what"><span data-sk="Denný ingredient agent" data-en="Daily ingredient agent"></span><span class="meta" data-sk="strop CHF 30/mesiac, denný log: docs/ingredient_agent_log.md" data-en="cap CHF 30/month, daily log: docs/ingredient_agent_log.md"></span></div>
      <div class="spend-amount" data-sk="~CHF 1.20 (1 beh, samo-nahlásené)" data-en="~CHF 1.20 (1 run, self-reported)"></div>
    </div>
    <div class="spend-total">
      <div data-sk="Hotovosť doteraz" data-en="Cash to date"></div>
      <div class="spend-amount" data-sk="~CHF 259 + Supabase Pro mesačne" data-en="~CHF 259 + Supabase Pro monthly"></div>
    </div>
    <div class="spend-total" style="border-top:1px solid var(--rule);">
      <div data-sk="S časom zakladateľa" data-en="Incl. founder time"></div>
      <div class="spend-amount">~CHF 4 034</div>
    </div>
  </div>

  <div class="section-label"><span class="n">03</span><h2 data-sk="AI spotreba — kto koľko minie" data-en="AI spend — who spends what"></h2><div class="rule"></div></div>
  <div class="card">
    <p class="lede" style="margin:0 0 10px 0;" data-sk="Claude Platform dashboard vidí len jeden spoločný ChefOS kľúč — rozdelenie per užívateľ nikdy ukázať nevie. Preto od 17. 7. 2026 server (claude-proxy) zapisuje každé AI volanie: kto, ktorá funkcia, koľko tokenov a vypočítaná cena. Živý prehľad: Admin → 📈 AI Usage v appke (len Head Admin) — zakladateľove 3 testovacie účty sú tam označené. Do tohto dokumentu sa súhrn prenáša pri každom doc-synce." data-en="The Claude Platform dashboard only sees ChefOS's one shared key — it can never show a per-user split. So since Jul 17, 2026 the server (claude-proxy) logs every AI call: who, which feature, token counts and computed cost. Live view: Admin → 📈 AI Usage in the app (Head Admin only) — the founder's 3 test accounts are flagged there. A summary lands in this document with every doc-sync."></p>
    <div class="spend-row">
      <div class="spend-what"><span data-sk="Celkové AI výdavky tento mesiac (celá organizácia)" data-en="Total AI spend this month (whole org)"></span><span class="meta" data-sk="z Claude Platform dashboardu 17.7.: $2.22 minutých, $2.79 kreditov zostáva, 388K tokenov za 7 dní. Čerpá z už zaplatených kreditov v položkách vyššie — nezapočítava sa druhýkrát." data-en="from the Claude Platform dashboard Jul 17: $2.22 spent, $2.79 credits left, 388K tokens in 7 days. Draws on the already-paid credits above — not double-counted."></span></div>
      <div class="spend-amount">$2.22</div>
    </div>
    <div class="spend-row">
      <div class="spend-what"><span data-sk="Per užívateľ (z ai_usage tabuľky)" data-en="Per user (from the ai_usage table)"></span><span class="meta" id="aiUsageSyncNote" data-sk="meranie beží od 17. 7. 15:28 — zatiaľ žiadne zaznamenané volania; prvé sa objavia pri najbližšom použití AI funkcie" data-en="metering live since Jul 17, 15:28 — no calls logged yet; the first will appear the next time anyone uses an AI feature"></span></div>
      <div class="spend-amount">—</div>
    </div>
  </div>

  <div class="section-label"><span class="n">04</span><h2 data-sk="Budúce a opakované" data-en="Upcoming and recurring"></h2><div class="rule"></div></div>
  <div class="card">
    <div class="spend-row">
      <div class="spend-what"><span data-sk="🔜 Tlačiareň štítkov Brother QL-820NWB" data-en="🔜 Brother QL-820NWB label printer"></span><span class="meta" data-sk="odporúčanie hotové (docs/LABEL_PRINTER_RESEARCH.md), zatiaľ nekúpená" data-en="recommendation ready (docs/LABEL_PRINTER_RESEARCH.md), not yet purchased"></span></div>
      <div class="spend-amount">~CHF 130</div>
    </div>
    <div class="spend-row">
      <div class="spend-what"><span data-sk="🔜 SensorPush senzor + WiFi brána (chladnička)" data-en="🔜 SensorPush sensor + WiFi gateway (fridge)"></span><span class="meta" data-sk="~$55 senzor + ~$100 brána, bez mesačných poplatkov — jediná budget možnosť s cloud API" data-en="~$55 sensor + ~$100 gateway, no monthly fee — the only budget option with a cloud API"></span></div>
      <div class="spend-amount">~CHF 125</div>
    </div>
    <div class="spend-row">
      <div class="spend-what"><span data-sk="🔁 Supabase Pro (mesačne, beží)" data-en="🔁 Supabase Pro (monthly, ongoing)"></span><span class="meta" data-sk="potvrdené Richardom 15.7. — denné zálohy v cene; samo-nahlásené, začiatok predplatného neevidovaný" data-en="confirmed by Richard Jul 15 — daily backups included; self-reported, subscription start date not recorded"></span></div>
      <div class="spend-amount">~USD 25/mes</div>
    </div>
    <div class="spend-row">
      <div class="spend-what"><span data-sk="🔁 Doména chefos.ch — obnova" data-en="🔁 Domain chefos.ch — renewal"></span><span class="meta" data-sk="od druhého roka" data-en="from year 2"></span></div>
      <div class="spend-amount">~CHF 15/rok</div>
    </div>
    <div class="spend-total">
      <div data-sk="Plánované jednorazové nákupy" data-en="Planned one-off purchases"></div>
      <div class="spend-amount">~CHF 255</div>
    </div>
  </div>

</div>
<div class="chefos-stamp" data-sk="🔄 Stav ChefOS k 17. 7. 2026, 16:40" data-en="🔄 ChefOS state as of Jul 17, 2026, 16:40"></div>
<script>
/* Shared doc-language key — same as every other visual data document. */
let _lang = localStorage.getItem('chefos_doc_lang') || 'sk';
function applyLang(){
  document.querySelectorAll('[data-sk]').forEach(el=>{
    const val = el.getAttribute(_lang === 'sk' ? 'data-sk' : 'data-en');
    if(val === null) return;
    if(val.indexOf('<') !== -1) el.innerHTML = val; else el.textContent = val;
  });
  const btn = document.getElementById('langBtn');
  if(btn) btn.textContent = _lang === 'sk' ? 'EN' : 'SK';
  document.documentElement.lang = _lang;
}
function toggleLang(){
  _lang = _lang === 'sk' ? 'en' : 'sk';
  localStorage.setItem('chefos_doc_lang', _lang);
  applyLang();
  renderSpendDonut();
}

/* Spend donut (Richard, 17.7.: "koláčový graf ktorý zobrazuje všetky tieto a budúce
   náklady"). One place to update: SPEND_SEGS amounts in CHF. Founder time = hours from
   the work-hours meter × 45 CHF/h — refresh SPEND_HOURS with every doc-sync. */
const SPEND_HOURS = 83.9, SPEND_RATE = 45;
const SPEND_SEGS = [
  { sk:'Čas zakladateľa (83,9 h × 45 CHF)', en:'Founder time (83.9 h × CHF 45)', chf: SPEND_HOURS * SPEND_RATE, color:'#8B93FF' },
  { sk:'API + Claude predplatné', en:'API + Claude subscriptions', chf: 135, color:'var(--accent)' },
  { sk:'Nové náklady 15.7.', en:'New costs, Jul 15', chf: 97.73, color:'#2BB8A3' },
  { sk:'Gamma', en:'Gamma', chf: 20, color:'#1E7F73' },
  { sk:'Doména chefos.ch', en:'Domain chefos.ch', chf: 5, color:'#6EE7D0' },
  { sk:'Ingredient agent', en:'Ingredient agent', chf: 1.2, color:'var(--danger)' },
  { sk:'Budúce: tlačiareň štítkov', en:'Upcoming: label printer', chf: 130, color:'var(--gold)', future:true },
  { sk:'Budúce: senzor chladničky', en:'Upcoming: fridge sensor', chf: 125, color:'#C9A24B', future:true },
];
function renderSpendDonut(){
  const svg = document.getElementById('spendDonut');
  if(!svg) return;
  const total = SPEND_SEGS.reduce((s,x)=>s + x.chf, 0);
  const R = 44, C = 2 * Math.PI * R;
  let off = 0;
  svg.innerHTML = SPEND_SEGS.map(s=>{
    const frac = s.chf / total;
    const label = _lang==='sk' ? s.sk : s.en;
    const c = `<circle cx="60" cy="60" r="${R}" fill="none" stroke="${s.color}" stroke-width="17"
      stroke-dasharray="${(frac*C).toFixed(2)} ${(C-frac*C).toFixed(2)}" stroke-dashoffset="${(-off*C).toFixed(2)}"
      transform="rotate(-90 60 60)"><title>${label}: ~CHF ${s.chf.toLocaleString('de-CH',{maximumFractionDigits:0})}</title></circle>`;
    off += frac;
    return c;
  }).join('') +
    `<text x="60" y="56" text-anchor="middle" font-size="15" font-weight="700" fill="var(--ink)">~${Math.round(total).toLocaleString('de-CH')}</text>` +
    `<text x="60" y="70" text-anchor="middle" font-size="7" fill="var(--ink-dim)">${_lang==='sk'?'CHF spolu, vrátane času a plánu':'CHF total, incl. time and planned'}</text>`;
  document.getElementById('spendDonutLegend').innerHTML = SPEND_SEGS.map(s=>{
    const label = _lang==='sk' ? s.sk : s.en;
    const amt = '~CHF ' + s.chf.toLocaleString('de-CH',{maximumFractionDigits: s.chf < 10 ? 2 : 0});
    return `<span><i style="background:${s.color};"></i><span>${label} — <b style="font-family:var(--mono);">${amt}</b></span></span>`;
  }).join('');
}
applyLang();
renderSpendDonut();
</script>
</body>
</html>
