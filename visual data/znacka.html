const DOCS = ["\u003c!doctype html>\n\u003chtml lang=\"en\" data-theme=\"dark\">\n\u003chead>\n\u003cmeta charset=\"utf-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n\u003ctitle>Sautero — Swiss Market Overview\u003c/title>\n\u003cstyle>\n  /* Sautero standing visual identity — exact tokens, unchanged from every other Sautero\n     document and the live app itself. This redesign (2026-07-15, \"Visual Data Standards\")\n     is about information architecture and craft, never about the palette or type. */\n  :root{\n    --bg:#0A1A2F; --bg-2:#0d2036; --paper:#122845; --paper-raised:#0f2340; --paper-hi:#16304f;\n    --ink:#fff; --ink-dim:#9C949E; --ink-faint:rgba(156,148,158,0.6);\n    --rule:#223d57; --rule-soft:#1a3149;\n    --accent:#34F7D7; --accent-dim:rgba(52,247,215,0.4); --accent-wash:rgba(52,247,215,0.08);\n    --gold:#F7C948; --gold-dim:rgba(247,201,72,0.4); --gold-wash:rgba(247,201,72,0.08);\n    --shadow:0 8px 28px rgba(0,0,0,0.45);\n    --mono:\"SF Mono\",Menlo,Consolas,monospace;\n  }\n  *{ box-sizing:border-box; }\n  html,body{ margin:0; padding:0; }\n  body{\n    background:var(--bg); color:var(--ink);\n    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;\n    -webkit-font-smoothing:antialiased; line-height:1.5;\n  }\n  .wrap{ max-width:1100px; margin:0 auto; padding:0 24px 100px 24px; }\n  a{ color:var(--accent); }\n  ::selection{ background:var(--accent); color:#0A1A2F; }\n  h1,h2,h3,p,ul{ text-wrap:balance; }\n\n  /* ---------- Hero ---------- */\n  header.hero{\n    position:relative; padding:60px 0 40px 0; border-bottom:1px solid var(--rule); overflow:hidden;\n  }\n  header.hero::before{\n    content:''; position:absolute; top:-160px; left:50%; transform:translateX(-50%);\n    width:900px; height:500px; pointer-events:none;\n    background:radial-gradient(ellipse at center, var(--accent-wash), transparent 70%);\n  }\n  .hero-inner{ position:relative; }\n  .kicker{ color:var(--accent); font-size:12px; letter-spacing:0.18em; text-transform:uppercase; font-weight:700; margin-bottom:12px; }\n  h1.title{ font-size:44px; font-weight:800; margin:0 0 14px 0; letter-spacing:-0.01em; }\n  h1.title b{ color:var(--accent); font-weight:800; }\n  .lede{ color:var(--ink-dim); font-size:15.5px; max-width:64ch; line-height:1.65; }\n  .status-pill{\n    display:inline-flex; align-items:center; gap:8px; margin-top:22px;\n    padding:7px 14px; border-radius:999px; border:1px solid var(--accent-dim);\n    background:var(--accent-wash); font-size:12.5px; color:var(--accent);\n    font-family:var(--mono);\n  }\n  .status-pill::before{ content:''; width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 3px var(--accent-wash); }\n\n  /* Headline proof strip — the 3 numbers that matter most, right in the hero */\n  .headline-stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:1px; margin-top:34px; background:var(--rule); border:1px solid var(--rule); border-radius:16px; overflow:hidden; }\n  .headline-stat{ background:var(--paper); padding:20px 20px 18px 20px; }\n  .headline-stat .num{ font-family:var(--mono); font-size:30px; font-weight:700; color:var(--accent); font-variant-numeric:tabular-nums; line-height:1; }\n  .headline-stat .lbl{ font-size:12px; color:var(--ink-dim); margin-top:8px; }\n  @media (max-width:680px){ .headline-stats{ grid-template-columns:1fr; } }\n\n  /* ---------- Sticky section nav ---------- */\n  nav.pagenav{\n    position:sticky; top:0; z-index:20;\n    background:rgba(10,26,47,0.92); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);\n    border-bottom:1px solid var(--rule);\n    display:flex; gap:2px; overflow-x:auto; scrollbar-width:none;\n  }\n  nav.pagenav::-webkit-scrollbar{ display:none; }\n  nav.pagenav a{\n    flex:none; padding:13px 18px; font-size:12.5px; font-weight:600; color:var(--ink-dim);\n    text-decoration:none; border-bottom:2px solid transparent; white-space:nowrap;\n    transition:color 0.15s ease, border-color 0.15s ease;\n  }\n  nav.pagenav a:hover{ color:var(--ink); }\n  nav.pagenav a.active{ color:var(--accent); border-bottom-color:var(--accent); }\n\n  /* ---------- Sections ---------- */\n  section{ padding:50px 0; border-bottom:1px solid var(--rule); scroll-margin-top:52px; }\n  section:last-of-type{ border-bottom:none; }\n  .eyebrow{ color:var(--accent); font-size:11px; letter-spacing:0.14em; text-transform:uppercase; font-weight:700; margin-bottom:8px; }\n  h2.section-title{ font-weight:800; font-size:25px; margin:0 0 8px 0; letter-spacing:-0.005em; }\n  .section-desc{ color:var(--ink-dim); font-size:14px; max-width:68ch; margin-bottom:28px; line-height:1.65; }\n  .group-label{ font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:var(--ink-faint); font-weight:700; margin:26px 0 10px 0; }\n  .group-label:first-child{ margin-top:0; }\n\n  /* ---------- KPI cards ---------- */\n  .maturity-row{ display:flex; align-items:center; gap:26px; margin-top:22px; flex-wrap:wrap; background:var(--paper); border:1px solid var(--rule); border-radius:16px; padding:16px 20px; }\n  .maturity-legend{ display:flex; flex-direction:column; gap:8px; }\n  .maturity-legend .mrow{ display:flex; align-items:center; gap:9px; font-size:13px; color:var(--ink-dim); }\n  .maturity-legend .mdot{ width:10px; height:10px; border-radius:50%; flex:none; }\n  .maturity-legend b{ color:var(--ink); font-family:var(--mono); }\n  #maturityDonut text{ fill:var(--ink); font-family:var(--mono); }\n  .kpi-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }\n  @media (max-width:820px){ .kpi-grid{ grid-template-columns:repeat(2,1fr); } }\n  .kpi-card{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:18px 16px; transition:border-color 0.15s ease, transform 0.15s ease; }\n  .kpi-card:hover{ border-color:var(--accent-dim); transform:translateY(-1px); }\n  .kpi-num{ font-family:var(--mono); font-size:26px; font-weight:700; color:var(--ink); font-variant-numeric:tabular-nums; }\n  .kpi-label{ font-size:11.5px; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-dim); margin-top:5px; }\n  .kpi-note{ font-size:11px; color:var(--ink-faint); margin-top:6px; line-height:1.4; }\n\n  /* ---------- Market ---------- */\n  .market-row{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }\n  @media (max-width:820px){ .market-row{ grid-template-columns:repeat(2,1fr); } }\n  .target-callout{\n    margin-top:20px; display:flex; gap:14px; align-items:flex-start;\n    background:linear-gradient(135deg, var(--gold-wash), transparent); border:1px solid var(--gold-dim);\n    border-radius:14px; padding:18px 20px;\n  }\n  .target-callout .badge{\n    flex:none; font-family:var(--mono); font-size:10.5px; font-weight:700; letter-spacing:0.04em;\n    color:#0A1A2F; background:var(--gold); border-radius:999px; padding:4px 10px; text-transform:uppercase;\n  }\n  .target-callout p{ margin:0; font-size:13.5px; color:var(--ink-dim); line-height:1.6; }\n  .target-callout b{ color:var(--ink); }\n\n  .disclaimer{\n    background:var(--gold-wash); border:1px solid var(--gold-dim); border-radius:10px;\n    padding:12px 16px; font-size:12.5px; color:var(--ink-dim); margin-top:16px; max-width:74ch; line-height:1.55;\n  }\n  .disclaimer b{ color:var(--gold); }\n\n  /* ---------- Process (Why Sautero) ---------- */\n  .process{ position:relative; }\n  .process-track{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; position:relative; }\n  @media (max-width:820px){ .process-track{ grid-template-columns:1fr; } }\n  .process-track::before{\n    content:''; position:absolute; top:38px; left:calc(100%/6); right:calc(100%/6);\n    height:1px; background:repeating-linear-gradient(90deg, var(--rule) 0 6px, transparent 6px 12px);\n  }\n  @media (max-width:820px){ .process-track::before{ display:none; } }\n  .process-card{ position:relative; background:var(--paper); border:1px solid var(--rule); border-radius:16px; padding:24px 20px 22px 20px; }\n  .process-step{\n    width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center;\n    font-family:var(--mono); font-size:12px; font-weight:700; margin-bottom:14px;\n    background:var(--paper-hi); border:1px solid var(--rule); color:var(--ink-dim);\n  }\n  .process-card.live .process-step{ background:var(--accent-wash); border-color:var(--accent-dim); color:var(--accent); }\n  .process-icon{ font-size:24px; margin-bottom:10px; }\n  .process-title{ font-size:15.5px; font-weight:700; margin-bottom:8px; }\n  .process-desc{ font-size:13.5px; color:var(--ink-dim); line-height:1.6; }\n  .process-status{\n    display:inline-flex; align-items:center; gap:6px; margin-top:14px; padding:3px 10px; border-radius:999px;\n    font-size:10px; text-transform:uppercase; letter-spacing:0.06em; font-family:var(--mono); font-weight:700;\n  }\n  .process-status::before{ content:''; width:5px; height:5px; border-radius:50%; background:currentColor; }\n  .process-status.live{ background:var(--accent-wash); color:var(--accent); }\n  .process-status.vision{ background:rgba(156,148,158,0.14); color:var(--ink-dim); }\n\n  /* ---------- Roadmap / Gantt ---------- */\n  .chart-card{ background:var(--paper); border:1px solid var(--rule); border-radius:16px; padding:22px 20px; }\n  .chart-legend{ display:flex; gap:18px; flex-wrap:wrap; margin-bottom:16px; font-size:12px; color:var(--ink-dim); }\n  .chart-legend span{ display:inline-flex; align-items:center; gap:6px; }\n  .legend-dot{ width:9px; height:9px; border-radius:3px; display:inline-block; }\n  .legend-line{ width:14px; height:0; border-top:2px dashed var(--gold); display:inline-block; }\n\n  .gantt-scroll{ overflow-x:auto; margin:0 -4px; padding:0 4px; }\n  .gantt{ min-width:920px; position:relative; }\n  .gantt-axis{ display:grid; grid-template-columns:260px 1fr; margin-bottom:4px; }\n  .gantt-axis-spacer{}\n  .gantt-axis-track{ position:relative; height:22px; }\n  .gantt-axis-tick{ position:absolute; top:0; bottom:0; font-family:var(--mono); font-size:10.5px; color:var(--ink-faint); border-left:1px solid var(--rule-soft); padding-left:5px; }\n  .gantt-rows{ position:relative; }\n  .gantt-row{ display:grid; grid-template-columns:260px 1fr; align-items:center; min-height:30px; }\n  .gantt-label{\n    position:sticky; left:0; z-index:2; background:var(--paper);\n    font-size:12px; color:var(--ink-dim); padding:4px 14px 4px 0; line-height:1.35;\n    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\n  }\n  .gantt-row:hover .gantt-label{ color:var(--ink); }\n  .gantt-track{ position:relative; height:30px; border-top:1px solid var(--rule-soft); }\n  .gantt-row:first-child .gantt-track{ border-top:none; }\n  .gantt-bar{\n    position:absolute; top:6px; height:18px; border-radius:5px; min-width:8px;\n    display:flex; align-items:center; padding:0 7px; font-size:9.5px; font-family:var(--mono); font-weight:700;\n    white-space:nowrap; overflow:hidden; color:#0A1A2F;\n  }\n  .gantt-bar.shipped{ background:var(--accent); }\n  .gantt-bar.vision{\n    background:repeating-linear-gradient(45deg, rgba(156,148,158,0.55) 0 5px, rgba(156,148,158,0.3) 5px 10px);\n    color:var(--ink); border:1px solid var(--rule-soft);\n  }\n  .gantt-today{ position:absolute; top:0; bottom:0; width:0; border-left:2px dashed var(--gold); z-index:3; }\n  .gantt-today-label{\n    position:absolute; top:-20px; left:4px; font-family:var(--mono); font-size:9.5px; color:var(--gold);\n    white-space:nowrap; font-weight:700;\n  }\n\n  /* ---------- Financials ---------- */\n  .tier-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:22px; }\n  @media (max-width:820px){ .tier-grid{ grid-template-columns:1fr; } }\n  .tier-card{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:22px 20px; position:relative; }\n  .tier-card.featured{ border-color:var(--accent); box-shadow:var(--shadow); }\n  .tier-card.featured::before{\n    content:'MOST COMMON'; position:absolute; top:-10px; left:20px; font-family:var(--mono); font-size:9px; font-weight:700;\n    letter-spacing:0.06em; background:var(--accent); color:#0A1A2F; padding:3px 8px; border-radius:999px;\n  }\n  .tier-name{ font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-dim); }\n  .tier-price{ font-family:var(--mono); font-size:26px; color:var(--accent); margin:10px 0 2px 0; font-weight:700; }\n  .tier-price span{ font-size:12px; color:var(--ink-faint); font-weight:400; }\n  .tier-list{ list-style:none; padding:0; margin:16px 0 0 0; font-size:12.5px; color:var(--ink-dim); }\n  .tier-list li{ padding:7px 0; border-top:1px solid var(--rule); padding-left:16px; position:relative; }\n  .tier-list li::before{ content:'—'; position:absolute; left:0; color:var(--ink-faint); }\n  .tier-list li:first-child{ border-top:none; }\n\n  .money-callouts{ display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-bottom:24px; }\n  @media (max-width:720px){ .money-callouts{ grid-template-columns:1fr; } }\n  .money-callout{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:18px 20px; }\n  .money-callout .tag{ font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:0.06em; color:var(--accent); font-weight:700; }\n  .money-callout p{ margin:8px 0 0 0; font-size:13px; color:var(--ink-dim); line-height:1.6; }\n  .money-callout p b{ color:var(--ink); }\n\n  .revenue-layout{ display:grid; grid-template-columns:1.6fr 1fr; gap:22px; align-items:start; }\n  @media (max-width:820px){ .revenue-layout{ grid-template-columns:1fr; } }\n  .revenue-callout .big{ font-family:var(--mono); font-size:34px; font-weight:700; color:var(--gold); line-height:1; font-variant-numeric:tabular-nums; }\n  .revenue-callout .cap{ font-size:12.5px; color:var(--ink-dim); margin-top:10px; line-height:1.6; }\n\n  .assumptions-table-wrap{ overflow-x:auto; margin-top:18px; }\n  .assumptions-table{ width:100%; border-collapse:collapse; font-size:12.5px; min-width:520px; }\n  .assumptions-table th, .assumptions-table td{ text-align:left; padding:9px 12px; border-bottom:1px solid var(--rule); white-space:nowrap; }\n  .assumptions-table th{ color:var(--ink-dim); font-weight:700; font-size:10.5px; text-transform:uppercase; letter-spacing:0.05em; }\n  .assumptions-table td{ color:var(--ink); font-family:var(--mono); font-variant-numeric:tabular-nums; }\n  .assumptions-table td.region{ font-family:inherit; color:var(--ink-dim); }\n  .assumptions-table tbody tr:hover{ background:var(--paper-hi); }\n  .assumptions-table tbody tr:last-child td{ color:var(--gold); font-weight:700; }\n\n  footer.foot{ text-align:center; font-size:11.5px; color:var(--ink-faint); padding:44px 0 20px 0; }\n  footer.foot a{ color:var(--ink-faint); text-decoration:underline; }\n\n  /* ---------- Sautero stamp + language fab (Richard, 15.7.: every /visual data/ document\n     carries a last-updated-to-Sautero-state badge and an SK/EN toggle) ---------- */\n  .chefos-stamp{\n    position:fixed; bottom:14px; right:14px; z-index:90;\n    background:rgba(15,35,64,0.92); border:1px solid rgba(52,247,215,0.4); color:#34F7D7;\n    font-size:10.5px; font-weight:700; font-family:\"SF Mono\",Menlo,Consolas,monospace;\n    padding:6px 12px; border-radius:999px;\n    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); pointer-events:none;\n  }\n  .chefos-lang-fab{\n    position:fixed; top:14px; right:14px; z-index:90;\n    background:rgba(15,35,64,0.92); border:1px solid #223d57; color:#9C949E;\n    font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;\n    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;\n    padding:7px 14px; border-radius:999px; cursor:pointer;\n    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);\n    transition:border-color .15s, color .15s;\n  }\n  .chefos-lang-fab:hover{ border-color:rgba(52,247,215,0.4); color:#34F7D7; }\n  @media print{ .chefos-stamp, .chefos-lang-fab{ display:none; } }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\u003cdiv class=\"wrap\">\n\n  \u003cheader class=\"hero\">\n    \u003cdiv class=\"hero-inner\">\n      \u003cdiv class=\"kicker\" data-sk=\"Sautero — Prehľad švajčiarskeho trhu\" data-en=\"Sautero — Swiss Market Overview\">Sautero — Prehľad švajčiarskeho trhu\u003c/div>\n      \u003ch1 class=\"title\">Sau\u003cb>tero\u003c/b>\u003c/h1>\n      \u003cp class=\"lede\" data-sk=\"Operačný systém pre profesionálne kuchyne, postavený pre švajčiarsky trh pohostinstva. Go-to-market je zámerne úzky: najprv dokázať v kantóne Bern, potom expandovať — nie plán globálneho launchu. Postavené sólo, v produkcii, overované na skutočnej pilotnej kuchyni (Burrito Bandito &amp; Lido).\" data-en=\"An operating system for professional kitchens, built for the Swiss hospitality market. Go-to-market is deliberately narrow: prove it in canton Bern first, then expand — not a global launch plan. Built solo, in production, validated against a real pilot kitchen (Burrito Bandito &amp; Lido).\">\u003c/p>\n      \u003cdiv class=\"status-pill\" id=\"statusPill\" data-sk=\"Naživo v produkcii · pilot v kantóne Bern\" data-en=\"Live in production · Canton Bern pilot\">Naživo v produkcii · pilot v kantóne Bern\u003c/div>\n      \u003cdiv class=\"headline-stats\" id=\"headlineStats\">\u003c/div>\n    \u003c/div>\n  \u003c/header>\n\n  \u003cnav class=\"pagenav\" id=\"pageNav\">\n    \u003ca href=\"#product\" class=\"active\" data-sk=\"Produkt\" data-en=\"Product\">Produkt\u003c/a>\n    \u003ca href=\"#market\" data-sk=\"Trh\" data-en=\"Market\">Trh\u003c/a>\n    \u003ca href=\"#why\" data-sk=\"Prečo Sautero\" data-en=\"Why Sautero\">Prečo Sautero\u003c/a>\n    \u003ca href=\"#roadmap\" data-sk=\"Roadmapa\" data-en=\"Roadmap\">Roadmapa\u003c/a>\n    \u003ca href=\"#financials\" data-sk=\"Financie\" data-en=\"Financials\">Financie\u003c/a>\n  \u003c/nav>\n\n  \u003csection id=\"product\">\n    \u003cdiv class=\"eyebrow\" data-sk=\"Produkt\" data-en=\"Product\">Produkt\u003c/div>\n    \u003ch2 class=\"section-title\" data-sk=\"Kde sme dnes\" data-en=\"Where we are today\">Kde sme dnes\u003c/h2>\n    \u003cp class=\"section-desc\" data-sk=\"Skutočné počty zo živého systému, nie projekcie — zoskupené podľa toho, čo dokazujú.\" data-en=\"Real counts from the live system, not projections — grouped by what they prove.\">\u003c/p>\n    \u003cdiv id=\"kpiGroups\">\u003c/div>\n    \u003c!-- Product-maturity donut (Richard, 17.7.): the live feature map's own counts — working /\n         awaiting live test / planned. Update MATURITY below whenever feature_status changes. -->\n    \u003cdiv class=\"maturity-row\">\n      \u003csvg id=\"maturityDonut\" viewBox=\"0 0 120 120\" style=\"width:150px; height:150px; flex:none;\">\u003c/svg>\n      \u003cdiv class=\"maturity-legend\" id=\"maturityLegend\">\u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003csection id=\"market\">\n    \u003cdiv class=\"eyebrow\" data-sk=\"Trh\" data-en=\"Market\">Trh\u003c/div>\n    \u003ch2 class=\"section-title\" data-sk=\"Švajčiarsko, začíname v kantóne Bern\" data-en=\"Switzerland, starting in canton Bern\">Švajčiarsko, začíname v kantóne Bern\u003c/h2>\n    \u003cp class=\"section-desc\" data-sk=\"Zámerne úzky predmostie: dokázať model v jednom kantóne, na skutočnej pilotnej kuchyni, až potom expandovať — nie plán &quot;spustiť všade naraz&quot;.\" data-en=\"Deliberately narrow beachhead: prove the model in one canton, on a real pilot kitchen, before expanding — not a &quot;launch everywhere&quot; plan.\">\u003c/p>\n    \u003cdiv class=\"market-row\" id=\"marketGrid\">\u003c/div>\n    \u003cdiv class=\"disclaimer\" data-sk='\u003cb>Číslo pre kantón Bern je odhad\u003c/b>, nie oficiálny kantonálny údaj GastroSuisse — odvodené z celoštátnych ~32 000 podnikov podľa ~12% podielu kantónu Bern na populácii. Zdroj: GastroSuisse Branchenspiegel 2025.' data-en='\u003cb>Canton Bern figure is an estimate\u003c/b>, not an official GastroSuisse cantonal count — apportioned from the national ~32,000 figure by canton Bern&#39;s ~12% share of Swiss population. Source: GastroSuisse Branchenspiegel 2025.'>\u003c/div>\n    \u003cdiv class=\"target-callout\">\n      \u003cspan class=\"badge\" data-sk=\"Menovaný cieľ\" data-en=\"Named target\">Menovaný cieľ\u003c/span>\n      \u003cp data-sk='\u003cb>Nooch Asian Kitchen\u003c/b> (skupina FWG Gastronomie) — reálny švajčiarsky reťazec s 10+ pobočkami, z toho tri už v kantóne Bern (Aarbergergasse, Viktoriaplatz, Westside) — priamo sedí na stratégiu kantón-najprv. Identifikovaný 13.7.2026 ako prvý účet na oslovenie, keď pilot potvrdí produkt — zatiaľ žiadny kontakt, nie je to podpísaný ani rozbehnutý obchod.' data-en='\u003cb>Nooch Asian Kitchen\u003c/b> (FWG Gastronomie group) — a real 10+-location Swiss chain with three restaurants already in canton Bern (Aarbergergasse, Viktoriaplatz, Westside), a direct fit for the canton-first strategy above. Identified 2026-07-13 as the first account to approach once the pilot validates the product — no contact made yet, not a signed or in-progress deal.'>\u003c/p>\n    \u003c/div>\n  \u003c/section>\n\n  \u003csection id=\"why\">\n    \u003cdiv class=\"eyebrow\" data-sk=\"Prečo Sautero\" data-en=\"Why Sautero\">Prečo Sautero\u003c/div>\n    \u003ch2 class=\"section-title\" data-sk=\"Jeden pracovný tok, tri piliere\" data-en=\"One workflow, three pillars\">Jeden pracovný tok, tri piliere\u003c/h2>\n    \u003cp class=\"section-desc\" data-sk=\"Skutočný prevádzkový cyklus kuchyne — sprav prep, vedz čo máš na sklade, doobjednaj u dodávateľov. Dva piliere sú naživo a v dennom používaní; tretí je najbližší build cieľ.\" data-en=\"The real kitchen operating loop — execute prep, know what's on hand, reorder from suppliers. Two pillars are live and in daily use; the third is the near-term build target.\">\u003c/p>\n    \u003cdiv class=\"process\" id=\"processTrack\">\u003c/div>\n  \u003c/section>\n\n  \u003csection id=\"roadmap\">\n    \u003cdiv class=\"eyebrow\" data-sk=\"Roadmapa\" data-en=\"Roadmap\">Roadmapa\u003c/div>\n    \u003ch2 class=\"section-title\" data-sk=\"Od začiatku do 2030\" data-en=\"Inception to 2030\">Od začiatku do 2030\u003c/h2>\n    \u003cp class=\"section-desc\" data-sk=\"Plné tyrkysové pruhy sú dodané a datované. Šrafované pruhy sú výhľad, nie záväzné dátumy — len ilustračné kvartály. Posúvaj vodorovne pre celú časovú os.\" data-en=\"Solid teal bars are shipped and dated. Hatched bars are forward vision, not committed dates — illustrative quarters only. Scroll horizontally to see the full timeline.\">\u003c/p>\n    \u003cdiv class=\"chart-card\">\n      \u003cdiv class=\"chart-legend\">\n        \u003cspan>\u003ci class=\"legend-dot\" style=\"background:var(--accent);\">\u003c/i>\u003cspan data-sk=\"Dodané\" data-en=\"Shipped\">Dodané\u003c/span>\u003c/span>\n        \u003cspan>\u003ci class=\"legend-dot\" style=\"background:repeating-linear-gradient(45deg, rgba(156,148,158,0.7) 0 3px, rgba(156,148,158,0.3) 3px 6px);\">\u003c/i>\u003cspan data-sk=\"Vízia (ilustračné termíny)\" data-en=\"Vision (illustrative timing)\">Vízia (ilustračné termíny)\u003c/span>\u003c/span>\n        \u003cspan>\u003ci class=\"legend-line\">\u003c/i>\u003cspan data-sk=\"Dnes\" data-en=\"Today\">Dnes\u003c/span>\u003c/span>\n      \u003c/div>\n      \u003cdiv class=\"gantt-scroll\">\u003cdiv class=\"gantt\" id=\"ganttChart\">\u003c/div>\u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003csection id=\"financials\">\n    \u003cdiv class=\"eyebrow\" data-sk=\"Financie\" data-en=\"Financials\">Financie\u003c/div>\n    \u003ch2 class=\"section-title\" data-sk=\"Monetizácia\" data-en=\"Monetization\">Monetizácia\u003c/h2>\n    \u003cp class=\"section-desc\" data-sk=\"Predplatné úrovne priamo kopírujú užívateľské tiery produktu (Home Cook / Chef Pro / Restaurant), v CHF pre švajčiarsky trh. Go-to-market začína v kantóne Bern — domovskom kantóne pilotnej kuchyne — potom susedné kantóny a časom nemecky hovoriace Švajčiarsko. Budúca B2B vrstva — švajčiarski dodávatelia obchodujúci cez platformu — je vo fáze vízie, nie postavená.\" data-en=\"Subscription tiers map directly to the product's own user tiers (Home Cook / Chef Pro / Restaurant), priced in CHF for the Swiss market. Go-to-market starts in canton Bern — the pilot kitchen's own canton — before expanding to neighbouring cantons and eventually German-speaking Switzerland. A future B2B layer — Swiss suppliers transacting through the platform — is vision-stage, not built.\">\u003c/p>\n\n    \u003cdiv class=\"money-callouts\">\n      \u003cdiv class=\"money-callout\">\n        \u003cdiv class=\"tag\" data-sk=\"Cesta k prvému príjmu\" data-en=\"Path to first revenue\">Cesta k prvému príjmu\u003c/div>\n        \u003cp>\u003cb>Monetization plan formalized 2026-07-13\u003c/b> (full expert-panel analysis of 13 models: \u003ci>\u003ca href=\"monetization.html\">monetization.html\u003c/a>\u003c/i>): a \u003cb>founding-member pre-sale\u003c/b> (first 10 kitchens at CHF 490/year, offered during the August trial) combined with a \u003cb>paid onboarding service\u003c/b> (~CHF 990 — the founder, a working chef, personally digitizes the kitchen's recipes and prep sheets). The two blockers to first revenue are legal, not product: written employer consent for side-business income (letter drafted, ready to send), and sole-proprietorship registration — neither yet complete.\u003c/p>\n      \u003c/div>\n      \u003cdiv class=\"money-callout\">\n        \u003cdiv class=\"tag\" data-sk=\"Náklady na build doteraz\" data-en=\"Build cost to date\">Náklady na build doteraz\u003c/div>\n        \u003cp data-sk='\u003cb>~CHF 281 hotovosť\u003c/b> (API kredity + Claude predplatné ~233, Gamma 20, doména 5, Supabase Pro ~22/mes) + \u003cb>~93 h času zakladateľa\u003c/b> (×45 CHF/h ≈ CHF 4 185; od 13.7. merané z git histórie). Funkčný multi-feature produkt pre jednu pilotnú kuchynskú skupinu, postavený sólo šéfkuchárom-founderom s AI agentom, žiadne iné inžinierske výdavky. Self-reported, neauditované — detail: costs.html.' data-en='\u003cb>~CHF 281 cash\u003c/b> (API credits + Claude subscriptions ~233, Gamma 20, domain 5, Supabase Pro ~22/mo) + \u003cb>~93 h founder time\u003c/b> (× CHF 45/h ≈ CHF 4,185; measured from git history since Jul 13). A working multi-feature product for one pilot kitchen group, built by a solo chef-founder with an AI agent, no other engineering spend. Self-reported, not audited — detail: costs.html.'>\u003c/p>\n      \u003c/div>\n    \u003c/div>\n\n    \u003cdiv class=\"chart-card\" style=\"margin-top:24px;\">\n      \u003cdiv class=\"chart-legend\">\u003cspan>\u003ci class=\"legend-dot\" style=\"background:var(--accent);\">\u003c/i>\u003cspan data-sk=\"Hodiny buildu za deň (od 13.7. merané z git histórie, predtým odhad ~8 h) — ťukni na stĺpec pre detail\" data-en=\"Build hours per day (measured from git history since Jul 13, ~8 h estimates before) — tap a bar for detail\">Hodiny buildu za deň — ťukni na stĺpec pre detail\u003c/span>\u003c/span>\u003c/div>\n      \u003cdiv id=\"hoursBarWrap\" style=\"overflow-x:auto;\">\u003c/div>\n      \u003cdiv id=\"hoursBarDetail\" style=\"font-family:var(--mono); font-size:12.5px; color:var(--accent); min-height:18px; margin-top:8px;\">\u003c/div>\n    \u003c/div>\n\n    \u003cdiv class=\"tier-grid\">\n      \u003cdiv class=\"tier-card\">\n        \u003cdiv class=\"tier-name\">Home Cook\u003c/div>\n        \u003cdiv class=\"tier-price\">Free\u003c/div>\n        \u003cul class=\"tier-list\">\u003cli>Recipes, scaling, shopping lists\u003c/li>\u003cli>Not the current focus — deferred\u003c/li>\u003c/ul>\n      \u003c/div>\n      \u003cdiv class=\"tier-card featured\">\n        \u003cdiv class=\"tier-name\">Chef Pro\u003c/div>\n        \u003cdiv class=\"tier-price\">CHF 49\u003cspan>/month/kitchen\u003c/span>\u003c/div>\n        \u003cul class=\"tier-list\">\u003cli>Full recipe engine + AI import\u003c/li>\u003cli>Cost &amp; nutrition engine\u003c/li>\u003cli>Check List, Order List, Ingredients\u003c/li>\u003c/ul>\n      \u003c/div>\n      \u003cdiv class=\"tier-card\">\n        \u003cdiv class=\"tier-name\">Restaurant\u003c/div>\n        \u003cdiv class=\"tier-price\">CHF 149\u003cspan>/month/kitchen\u003c/span>\u003c/div>\n        \u003cul class=\"tier-list\">\u003cli>Everything in Chef Pro\u003c/li>\u003cli>Multi-user roles, Schedule, live cross-station view\u003c/li>\u003cli>Chef's Assistant\u003c/li>\u003c/ul>\n      \u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"disclaimer\" data-sk='\u003cb>Zobrazené ceny sú ilustračné\u003c/b>, nie finálne ani schválené investormi. Zatiaľ neexistujú žiadni platiaci zákazníci — produkt je overovaný na jednej pilotnej kuchyni, zatiaľ nemonetizovaný.' data-en='\u003cb>Pricing shown is illustrative\u003c/b>, not finalized or investor-approved. No paying customers exist yet — the product is validated against one pilot kitchen, not yet monetized.'>\u003c/div>\n\n    \u003cdiv class=\"chart-card\" style=\"margin-top:24px;\">\n      \u003cdiv class=\"chart-legend\">\u003cspan>\u003ci class=\"legend-dot\" style=\"background:var(--gold);\">\u003c/i>\u003cspan data-sk=\"Ilustračné ARR (CHF), 2026–2030 — najprv kantón Bern\" data-en=\"Illustrative ARR (CHF), 2026–2030 — canton Bern first\">\u003c/span>\u003c/span>\u003c/div>\n      \u003cdiv class=\"revenue-layout\">\n        \u003cdiv id=\"revenueChartWrap\">\u003c/div>\n        \u003cdiv class=\"revenue-callout\">\n          \u003cdiv class=\"big\" id=\"revenueBigNum\">\u003c/div>\n          \u003cdiv class=\"cap\" data-sk=\"Ilustračné ARR 2030, ak sa kantón Bern potvrdí a bude nasledovať expanzia do nemecky hovoriaceho Švajčiarska — nie prognóza ani záväzok. Dnes nula platiacich zákazníkov.\" data-en=\"Illustrative 2030 ARR if canton Bern proves out and expansion into German-speaking Switzerland follows — not a forecast or commitment. Zero live paying customers today.\">\u003c/div>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"assumptions-table-wrap\">\n        \u003ctable class=\"assumptions-table\" id=\"assumptionsTable\">\u003c/table>\n      \u003c/div>\n      \u003cdiv class=\"disclaimer\" data-sk='\u003cb>Len ilustračná projekcia — nie skutočný ani prisľúbený príjem.\u003c/b> Zdola-nahor, nie rastová krivka: počty platiacich kuchýň vyššie sú hypotetický predpoklad adopcie (od ~3 500 podnikov kantónu Bern, ~12% odhad švajčiarskeho celku) × blended CHF 89/mesiac/kuchyňa (60 % Chef Pro CHF 49, 40 % Restaurant CHF 149).' data-en=\"\u003cb>Illustrative projection only — not actual or committed revenue.\u003c/b> Bottom-up, not a top-line growth curve: paying-kitchen counts above are a hypothetical adoption assumption (starting with canton Bern's ~3,500 establishments, ~12% estimate of the Swiss total) × a blended CHF 89/month/kitchen (60% Chef Pro CHF 49, 40% Restaurant CHF 149).\">\u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003cfooter class=\"foot\" id=\"footNote\">\u003c/footer>\n\u003c/div>\n\n\u003cscript>\n/* ============================================================\n   DATA — the only part of this file that should need editing when the project changes.\n   Keep KPIS / MARKET / PROCESS / ROADMAP / REVENUE in sync with docs/ROADMAP.md after any\n   shipped feature. File lives in /visual data/ per the 2026-07-15 Visual Data Standards —\n   see the redirect stub left at the old app/presentation.html path.\n   ============================================================ */\nconst GENERATED = '2026-07-18';\n\nconst MARKET = [\n  { num:'~32,000', label:'F&B establishments, Switzerland', label_sk:'F&B podnikov, Švajčiarsko', note:'GastroSuisse Branchenspiegel 2025', note_sk:'GastroSuisse Branchenspiegel 2025' },\n  { num:'CHF 25–28bn', label:'Swiss foodservice revenue / year', label_sk:'tržby švajčiarskej gastronómie / rok', note:'GastroSuisse Branchenspiegel 2025', note_sk:'GastroSuisse Branchenspiegel 2025' },\n  { num:'~3,500', label:'F&B establishments, canton Bern', label_sk:'F&B podnikov, kantón Bern', note:'population-share estimate, not official', note_sk:'odhad podľa podielu populácie, nie oficiálne číslo' },\n  { num:'1', label:'Pilot kitchen live today', label_sk:'pilotná kuchyňa naživo dnes', note:'Burrito Bandito & Lido (one group, two venues)', note_sk:'Burrito Bandito & Lido (jedna skupina, dve prevádzky)' },\n];\n\n/* Same 10 facts as before, now grouped by what each one proves — content depth, AI\n   capability, real-world traction, infrastructure — instead of one flat, undifferentiated wall. */\nconst KPI_GROUPS = [\n  { group:'Content depth', group_sk:'Hĺbka obsahu', items:[\n    { num:'183', label:'Library recipes', label_sk:'receptov v knižnici', note:'full 20-field format, every one enriched to Michelin depth (equipment, chef notes, storage, plating)', note_sk:'plný 20-poľový formát, každý obohatený do Michelin hĺbky (vybavenie, poznámky šéfkuchára, skladovanie, plating)' },\n    { num:'2,005', label:'Ingredients priced', label_sk:'nacenených ingrediencií', note:'Sautero price book live in production, cost-matching engine (prices estimated, not yet market-verified)', note_sk:'Sautero cenník naživo v produkcii, cost-matching engine (ceny odhadované, zatiaľ neoverené trhom)' },\n    { num:'8', label:'Kitchen stations', label_sk:'kuchynských staníc', note:'dish-grouped prep sheets', note_sk:'prep sheety zoskupené podľa jedál' },\n  ]},\n  { group:'AI & reach', group_sk:'AI a dosah', items:[\n    { num:'7', label:'AI features live', label_sk:'AI funkcií naživo', note:'photo/HTML/PDF recipe scan · method generation · Chef\\'s Assistant · translate · invoice scan · menu-from-URL · duplicate check', note_sk:'sken receptu z fotky/HTML/PDF · generovanie postupu · Chef\\'s Assistant · preklad · sken faktúry · menu z URL · kontrola duplicít' },\n    { num:'5', label:'UI languages', label_sk:'jazykov rozhrania', note:'EN/DE/FR/IT/SK, partial coverage', note_sk:'EN/DE/FR/IT/SK, čiastočné pokrytie' },\n    { num:'Live', label:'Per-user AI metering', label_sk:'AI meranie per užívateľ', note:'every AI call logged per user & feature, admin dashboard with cost split', note_sk:'každé AI volanie logované per užívateľ a funkcia, admin prehľad s rozdelením nákladov' },\n  ]},\n  { group:'Traction', group_sk:'Trakcia', items:[\n    { num:'1', label:'Pilot kitchen', label_sk:'pilotná kuchyňa', note:'Burrito Bandito & Lido (one group, two venues)', note_sk:'Burrito Bandito & Lido (jedna skupina, dve prevádzky)' },\n    { num:'13', label:'Accounts on the platform', label_sk:'účtov na platforme', note:'10 real external users + 3 founder test accounts, invite-only', note_sk:'10 reálnych externých + 3 zakladateľské testovacie účty, len na pozvánku' },\n    { num:'0', label:'Paying customers', label_sk:'platiacich zákazníkov', note:'pre-monetization', note_sk:'pred monetizáciou' },\n    { num:'Aug 1', label:'Public trial target', label_sk:'cieľ verejného trialu', note:'25 users, multi-team via QR invite', note_sk:'25 užívateľov, multi-team cez QR pozvánku' },\n  ]},\n  { group:'Infrastructure', group_sk:'Infraštruktúra', items:[\n    { num:'app.sautero.ch', label:'Own domain live', label_sk:'vlastná doména naživo', note:'custom SMTP, no third-party branding — migrated to app.sautero.ch on 18 Jul (rebrand day)', note_sk:'vlastný SMTP, žiadny cudzí branding — 18.7. zmigrované na app.sautero.ch (deň rebrandu)' },\n  ]},\n];\n/* Flat view for the hero's 3 headline numbers — most convincing \"this is real\" proof at a glance. */\nconst HEADLINE_STATS = [\n  { num:'183', label:'Library recipes, Michelin-enriched', label_sk:'receptov v knižnici, Michelin-obohatené' },\n  { num:'2,005', label:'Ingredients priced in production', label_sk:'nacenených ingrediencií v produkcii' },\n  { num:'7', label:'AI features live today', label_sk:'AI funkcií naživo dnes' },\n];\n\n/* The 3 pillars are a real operational sequence (execute prep → know stock → reorder), so a\n   numbered process makes sense here — not decoration. */\nconst PROCESS = [\n  {\n    icon:'📋', title:'Line-cook workflow (Check List)', title_sk:'Workflow kuchára na linke (Check List)', status:'live',\n    desc:'Dish-grouped prep sheets per station (TO DO / CHECK / FINISH / DON\\'T DO), a live cross-station \"All\" view, and an overload flag once a station exceeds 3.5h of outstanding work. Not a ticket/KDS system — cross-team visibility into shared prep state.', desc_sk:'Prep sheety zoskupené podľa jedál per stanica (TO DO / CHECK / FINISH / DON\\'T DO), živý pohľad „All\" naprieč stanicami a overload vlajka, keď stanica prekročí 3,5 h nevybavenej práce. Nie je to ticket/KDS systém — je to tímová viditeľnosť zdieľaného stavu prípravy.'\n  },\n  {\n    icon:'📦', title:'Inventory awareness', title_sk:'Prehľad o zásobách', status:'live',\n    desc:'Per-item on-hand counts, minimum-required thresholds with an automatic shortfall flag, and a station-by-station Order List built off the same priced ingredient table used for recipe costing.', desc_sk:'Skladové počty per položka, minimálne prahy s automatickou vlajkou nedostatku a Order List po staniciach postavený nad tou istou nacenenou tabuľkou ingrediencií, z ktorej sa počíta food cost receptov.'\n  },\n  {\n    icon:'🤝', title:'Supplier collaboration', title_sk:'Spolupráca s dodávateľmi', status:'vision',\n    desc:'Not built. Vision: connect the Ingredients/Order List data to real Swiss foodservice supplier feeds (e.g. Transgourmet, Prodega) and order submission — the monetizable B2B layer referenced in Financials below.', desc_sk:'Nepostavené. Vízia: prepojiť dáta Ingrediencií/Order Listu na reálne feedy švajčiarskych gastro dodávateľov (napr. Transgourmet, Prodega) a odosielanie objednávok — monetizovateľná B2B vrstva spomínaná nižšie vo Financiách.'\n  },\n];\n\n/* Roadmap: each row is a real dated fact (shipped) or an illustrative-quarter placeholder\n   (vision). Rendered as a hand-built timeline below, not a generic chart-library bar. */\nconst ROADMAP_START = new Date('2026-07-01');\nconst TODAY = new Date();\nfunction monthsBetween(dateStr){\n  const d = new Date(dateStr);\n  return (d.getFullYear()-ROADMAP_START.getFullYear())*12 + (d.getMonth()-ROADMAP_START.getMonth()) + (d.getDate()-1)/30;\n}\nconst ROADMAP = [\n  { label:'Phase 0 — Foundation & Validation', label_sk:'Fáza 0 — Základy & validácia', start:'2026-07-08', end:'2026-07-08', shipped:true },\n  { label:'Phase 1a — Recipe engine + data foundation', label_sk:'Fáza 1a — Receptový engine + dátový základ', start:'2026-07-09', end:'2026-07-09', shipped:true },\n  { label:'Phase 1b — AI recipe import', label_sk:'Fáza 1b — AI import receptov', start:'2026-07-09', end:'2026-07-09', shipped:true },\n  { label:'Ingredients, nutrition, Order List, Schedule, Fridge Temp', label_sk:'Ingrediencie, nutrície, Order List, Schedule, Fridge Temp', start:'2026-07-09', end:'2026-07-09', shipped:true },\n  { label:'Check List (8-station prep sheets) + Kitchen Flow v1', label_sk:'Check List (prep sheety 8 staníc) + Kitchen Flow v1', start:'2026-07-09', end:'2026-07-10', shipped:true },\n  { label:'Multi-language UI v1 + Ingredients expansion (1,263)', label_sk:'Viacjazyčné UI v1 + rozšírenie ingrediencií (1 263)', start:'2026-07-10', end:'2026-07-10', shipped:true },\n  { label:'Check List polish: cross-station \"All\" view, swipe-back, per-item notes, busiest-first sort', label_sk:'Check List polish: pohľad „All\" naprieč stanicami, swipe-back, poznámky per položka, triedenie od najvyťaženejších', start:'2026-07-10', end:'2026-07-10', shipped:true },\n  { label:'Multi-team access gate, soft-delete, Order List redesign, Print Labels, Working Time (check-in/out + contract scan)', label_sk:'Multi-team prístupová brána, soft-delete, redesign Order Listu, Print Labels, Working Time (check-in/out + sken zmluvy)', start:'2026-07-11', end:'2026-07-12', shipped:true },\n  { label:'Engineering discipline: Git, staging environment, RLS audit + critical fix, error/usage tracking, audit log, trial success criteria', label_sk:'Inžinierska disciplína: Git, staging prostredie, RLS audit + kritická oprava, error/usage tracking, audit log, kritériá úspechu trialu', start:'2026-07-12', end:'2026-07-13', shipped:true },\n  { label:'Ingredients expanded to 2,000 (staging) + production reliability fixes: AI features restored, Check List delete silent-failure fixed', label_sk:'Ingrediencie rozšírené na 2 000 (staging) + opravy spoľahlivosti produkcie: AI funkcie obnovené, tiché zlyhanie mazania v Check Liste opravené', start:'2026-07-13', end:'2026-07-13', shipped:true },\n  { label:'Own domain live, critical signup-bug fix, Order List data-loss fix, 3-way recipe filter, background AI scanning, menu scan from URL, password + Face ID login, HACCP module waves 1+2, invite-only lockdown, mandatory password, Connections rebuild', label_sk:'Vlastná doména naživo, oprava kritického signup bugu, oprava straty dát Order Listu, 3-cestný filter receptov, AI skenovanie na pozadí, sken menu z URL, heslo + Face ID login, HACCP vlny 1+2, invite-only lockdown, povinné heslo, prestavba Connections', start:'2026-07-14', end:'2026-07-15', shipped:true },\n  { label:'Real data privacy + team join codes + Kitchen Reports + AI subscription gate + Privacy consent gate, then real team membership enforcement, role-based admin, long-press content management, custom ingredient lists, branded print v2 + always-on nav header, HACCP/Team Meetings gated to company accounts, central AI billing key, branded auth emails', label_sk:'Skutočné súkromie dát + tímové join kódy + Kitchen Reports + AI predplatné brána + Privacy consent, potom vynútené reálne členstvo v tíme, rolový admin, long-press správa obsahu, vlastné zoznamy ingrediencií, branded print v2 + stály nav header, HACCP/Team Meetings len pre firemné účty, centrálny AI kľúč, brandované auth e-maily', start:'2026-07-16', end:'2026-07-16', shipped:true },\n  { label:'Community layer: Public shelves for recipes & ingredients across every kitchen, per-item sharing (publicly / with chef friends), cross-kitchen comments with counts, supplier field + Invoice Scan v2 (reads vendor, translates any language), per-screen tutorials — plus a full security review (private contract storage, XSS hardening, permanent auditor guards)', label_sk:'Komunitná vrstva: verejné police receptov a ingrediencií naprieč kuchyňami, zdieľanie po položkách (verejne / chef-priateľom), komentáre naprieč kuchyňami s počítadlami, pole dodávateľa + Invoice Scan v2 (číta dodávateľa, prekladá akýkoľvek jazyk), tutoriály per obrazovka — plus plná bezpečnostná revízia (privátne úložisko zmlúv, XSS hardening, trvalé auditorské stráže)', start:'2026-07-17', end:'2026-07-17', shipped:true },\n  { label:'Rebrand to Sautero (clean name, .ch + .com free) + per-friend recipe sharing, per-user AI usage metering with admin dashboard, Michelin enrichment of all 183 library recipes, Company Ingredients shelf + scan-target fix, HTML/text invoice & recipe scanning, new UI theme (founder beta)', label_sk:'Rebrand na Sautero (čisté meno, .ch + .com voľné) + zdieľanie receptov per priateľ, AI meranie per užívateľ s admin prehľadom, Michelin obohatenie všetkých 183 receptov knižnice, polica Company Ingredients + oprava cieľa skenu, HTML/text sken faktúr aj receptov, nová UI téma (beta pre zakladateľa)', start:'2026-07-18', end:'2026-07-18', shipped:true },\n  { label:'Public trial prep — polish Check List, Chef\\'s Assistant, Ingredients, Recipes; multi-team QR invites; email login for any address', label_sk:'Príprava verejného trialu — polish Check Listu, Chef\\'s Assistanta, Ingrediencií, Receptov; multi-team QR pozvánky; email login pre každú adresu', start:'2026-07-11', end:'2026-07-31', shipped:false },\n  { label:'Public trial — 25 users, multiple restaurants, own team per kitchen', label_sk:'Verejný trial — 25 užívateľov, viac reštaurácií, vlastný tím per kuchyňa', start:'2026-08-01', end:'2026-08-01', shipped:false },\n  { label:'Phase 2 — Kitchen Flow full (multi-user roles, pilot live test)', label_sk:'Fáza 2 — Kitchen Flow naplno (multi-user roly, živý test pilotu)', start:'2026-09-01', end:'2026-11-30', shipped:false },\n  { label:'Phase 3 — Inventory & food cost (real stock, Swiss supplier feeds)', label_sk:'Fáza 3 — Sklad & food cost (reálne zásoby, švajčiarski dodávatelia)', start:'2026-11-01', end:'2027-02-28', shipped:false },\n  { label:'Phase 4 — Production planning & reports', label_sk:'Fáza 4 — Plánovanie výroby & reporty', start:'2027-02-01', end:'2027-05-31', shipped:false },\n  { label:'Phase 5 — Intelligence layer (AI prep recommendations)', label_sk:'Fáza 5 — Inteligentná vrstva (AI odporúčania prípravy)', start:'2027-05-01', end:'2027-09-30', shipped:false },\n  { label:'Phase 6 — Native mobile + offline mode', label_sk:'Fáza 6 — Natívny mobil + offline režim', start:'2027-09-01', end:'2028-03-31', shipped:false },\n  { label:'Phase 7 — Go-to-market: canton Bern (first paying kitchens)', label_sk:'Fáza 7 — Go-to-market: kantón Bern (prvé platiace kuchyne)', start:'2028-03-01', end:'2028-12-31', shipped:false },\n  { label:'Expansion — neighbouring cantons (Fribourg, Solothurn, Vaud, Neuchâtel)', label_sk:'Expanzia — susedné kantóny (Fribourg, Solothurn, Vaud, Neuchâtel)', start:'2029-01-01', end:'2029-12-31', shipped:false },\n  { label:'Expansion — German-speaking Switzerland (Zürich, Basel, Lucerne, Aargau)', label_sk:'Expanzia — nemecky hovoriace Švajčiarsko (Zürich, Basel, Luzern, Aargau)', start:'2030-01-01', end:'2030-12-31', shipped:false },\n];\n\n/* Illustrative only — see disclaimer in the page. Bottom-up: hypothetical paying-kitchen\n   count per year (canton Bern first, then adjacent cantons, then German-speaking CH) ×\n   a blended CHF 89/month/kitchen (60% Chef Pro @49 + 40% Restaurant @149). Not a committed\n   or actual figure — zero paying customers exist today. */\nconst REVENUE_YEARS = ['2026','2027','2028','2029','2030'];\nconst REVENUE_REGION = ['Pilot only', 'Canton Bern', 'Canton Bern', 'Bern + neighbours', 'German-speaking CH'];\nconst REVENUE_REGION_SK = ['Len pilot', 'Kantón Bern', 'Kantón Bern', 'Bern + susedia', 'Nemecky hovoriace CH'];\nconst REVENUE_KITCHENS = [0, 20, 80, 250, 600];\nconst BLENDED_ARPU_MONTHLY_CHF = 89; // 60% Chef Pro (49) + 40% Restaurant (149)\nconst REVENUE_ILLUSTRATIVE_CHF = REVENUE_KITCHENS.map(k => k * BLENDED_ARPU_MONTHLY_CHF * 12);\n\n/* Founder build hours per day — mirrors tasklist.html WORK_HOURS (doc-sync duty).\n   Days before Jul 13 predate git and are ~8 h/day estimates; measured from git since. */\nconst DECK_HOURS = [\n  ['2026-07-08',8.0],['2026-07-09',8.0],['2026-07-10',8.0],['2026-07-11',8.0],['2026-07-12',8.0],\n  ['2026-07-13',7.7],['2026-07-14',7.4],['2026-07-15',11.6],['2026-07-16',14.8],['2026-07-17',6.4],['2026-07-18',5.1],\n];\nconst DECK_HOURS_MEASURED_FROM = '2026-07-13';\n\nfunction renderHoursBars(){\n  const el = document.getElementById('hoursBarWrap');\n  if(!el) return;\n  const W = 640, H = 170, pad = 26, bw = (W - pad*2) / DECK_HOURS.length;\n  const max = Math.max(...DECK_HOURS.map(d=>d[1]));\n  const total = DECK_HOURS.reduce((a,d)=>a+d[1],0);\n  const bars = DECK_HOURS.map((d,i)=>{\n    const est = d[0] \u003c DECK_HOURS_MEASURED_FROM;\n    const h = (d[1]/max) * (H - 52);\n    const x = pad + i*bw + bw*0.14, y = H - 26 - h;\n    const day = parseInt(d[0].slice(8),10) + '.' + parseInt(d[0].slice(5,7),10) + '.';\n    return `\u003cg style=\"cursor:pointer;\" onclick=\"hoursBarDetail(${i})\">\n      \u003crect x=\"${x.toFixed(1)}\" y=\"${y.toFixed(1)}\" width=\"${(bw*0.72).toFixed(1)}\" height=\"${h.toFixed(1)}\" rx=\"3\"\n        fill=\"${est ? 'rgba(52,247,215,0.35)' : 'var(--accent)'}\">\u003ctitle>${day} — ${d[1]} h\u003c/title>\u003c/rect>\n      \u003ctext x=\"${(x + bw*0.36).toFixed(1)}\" y=\"${H-10}\" text-anchor=\"middle\" font-size=\"9\" fill=\"var(--ink-dim)\">${day}\u003c/text>\n      \u003ctext x=\"${(x + bw*0.36).toFixed(1)}\" y=\"${(y-5).toFixed(1)}\" text-anchor=\"middle\" font-size=\"9.5\" font-family=\"var(--mono)\" fill=\"var(--ink)\">${String(d[1]).replace('.',',')}\u003c/text>\n    \u003c/g>`;\n  }).join('');\n  el.innerHTML = `\u003csvg viewBox=\"0 0 ${W} ${H}\" style=\"width:100%; min-width:520px; display:block;\">${bars}\n    \u003ctext x=\"${W-2}\" y=\"14\" text-anchor=\"end\" font-size=\"11\" font-family=\"var(--mono)\" fill=\"var(--accent)\">Σ ~${total.toFixed(1).replace('.',',')} h ≈ CHF ${Math.round(total*45).toLocaleString('de-CH')}\u003c/text>\u003c/svg>`;\n}\nfunction hoursBarDetail(i){\n  const d = DECK_HOURS[i];\n  const est = d[0] \u003c DECK_HOURS_MEASURED_FROM;\n  const day = parseInt(d[0].slice(8),10) + '.' + parseInt(d[0].slice(5,7),10) + '.2026';\n  const t = document.documentElement.lang === 'sk' || true;\n  document.getElementById('hoursBarDetail').textContent =\n    day + ' — ' + String(d[1]).replace('.',',') + ' h · CHF ' + Math.round(d[1]*45) +\n    (est ? ' · odhad ~8 h/deň (pred git históriou) / estimate, pre-git' : ' · merané z git histórie / measured from git history');\n}\n\n/* ============================================================ RENDER ============================================================ */\n\n/* t174 (18.7.): deck data bilingual — every JS-rendered item may carry *_sk fields; the SK\n   view uses them with the EN base as fallback. New data must land with both languages. */\nlet _lang = localStorage.getItem('chefos_doc_lang') || 'sk';\nfunction DL(en, sk){ return (_lang==='sk' && sk) ? sk : en; }\nfunction rerenderDeck(){\n  renderHeadlineStats(); renderMarket(); renderKPIGroups(); renderMaturity(); renderHoursBars();\n  renderProcess(); renderGantt(); renderRevenueChart(); renderAssumptionsTable();\n}\nfunction renderHeadlineStats(){\n  document.getElementById('headlineStats').innerHTML = HEADLINE_STATS.map(s=>`\n    \u003cdiv class=\"headline-stat\">\u003cdiv class=\"num\">${s.num}\u003c/div>\u003cdiv class=\"lbl\">${DL(s.label, s.label_sk)}\u003c/div>\u003c/div>\n  `).join('');\n}\n\nfunction renderMarket(){\n  document.getElementById('marketGrid').innerHTML = MARKET.map(k=>`\n    \u003cdiv class=\"kpi-card\">\n      \u003cdiv class=\"kpi-num\">${k.num}\u003c/div>\n      \u003cdiv class=\"kpi-label\">${DL(k.label, k.label_sk)}\u003c/div>\n      \u003cdiv class=\"kpi-note\">${DL(k.note, k.note_sk)}\u003c/div>\n    \u003c/div>\n  `).join('');\n}\n\nfunction renderKPIGroups(){\n  document.getElementById('kpiGroups').innerHTML = KPI_GROUPS.map(g => `\n    \u003cdiv class=\"group-label\">${DL(g.group, g.group_sk)}\u003c/div>\n    \u003cdiv class=\"kpi-grid\">\n      ${g.items.map(k=>`\n        \u003cdiv class=\"kpi-card\">\n          \u003cdiv class=\"kpi-num\">${k.num}\u003c/div>\n          \u003cdiv class=\"kpi-label\">${DL(k.label, k.label_sk)}\u003c/div>\n          \u003cdiv class=\"kpi-note\">${DL(k.note, k.note_sk)}\u003c/div>\n        \u003c/div>\n      `).join('')}\n    \u003c/div>\n  `).join('');\n}\n\n/* Product-maturity donut (17.7.) — counts mirror visual data/feature_status.html; update this\n   MATURITY constant as part of the doc-sync routine whenever those counts move. */\nconst MATURITY = { working: 77, testing: 26, planned: 8 };\nfunction renderMaturity(){\n  const svg = document.getElementById('maturityDonut');\n  const legend = document.getElementById('maturityLegend');\n  if(!svg || !legend) return;\n  const SEGS = [\n    { key:'working', label:'Working, verified live', label_sk:'Funkčné, overené naživo', color:'#4ADE80' },\n    { key:'testing', label:'Built, awaiting live test', label_sk:'Postavené, čaká na živý test', color:'#FB923C' },\n    { key:'planned', label:'Planned, not built yet', label_sk:'Naplánované, nepostavené', color:'#FF7A68' },\n  ];\n  const total = SEGS.reduce((s,x)=>s + MATURITY[x.key], 0);\n  const R = 44, C = 2 * Math.PI * R;\n  let off = 0;\n  svg.innerHTML = SEGS.map(s=>{\n    const frac = MATURITY[s.key] / total;\n    const c = `\u003ccircle cx=\"60\" cy=\"60\" r=\"${R}\" fill=\"none\" stroke=\"${s.color}\" stroke-width=\"16\"\n      stroke-dasharray=\"${(frac*C).toFixed(2)} ${(C-frac*C).toFixed(2)}\" stroke-dashoffset=\"${(-off*C).toFixed(2)}\"\n      transform=\"rotate(-90 60 60)\">\u003ctitle>${DL(s.label, s.label_sk)}: ${MATURITY[s.key]}\u003c/title>\u003c/circle>`;\n    off += frac;\n    return c;\n  }).join('') +\n    `\u003ctext x=\"60\" y=\"58\" text-anchor=\"middle\" font-size=\"24\" font-weight=\"700\">${total}\u003c/text>` +\n    `\u003ctext x=\"60\" y=\"72\" text-anchor=\"middle\" font-size=\"6.5\" fill=\"var(--ink-dim)\">${_lang==='sk' ? 'FUNKCIÍ SPOLU' : 'FEATURES TOTAL'}\u003c/text>`;\n  legend.innerHTML = SEGS.map(s=>`\u003cdiv class=\"mrow\">\u003cspan class=\"mdot\" style=\"background:${s.color};\">\u003c/span>${DL(s.label, s.label_sk)} — \u003cb>${MATURITY[s.key]}\u003c/b>\u003c/div>`).join('') +\n    `\u003cdiv class=\"mrow\" style=\"font-size:11px; color:var(--ink-faint);\">${_lang==='sk' ? 'Živé počty z internej mapy funkcií (feature_status), nie odhady.' : 'Live counts from the internal feature map (feature_status), not estimates.'}\u003c/div>`;\n}\n\nfunction renderProcess(){\n  document.getElementById('processTrack').innerHTML = `\u003cdiv class=\"process-track\">${\n    PROCESS.map((b,i)=>`\n      \u003cdiv class=\"process-card ${b.status}\">\n        \u003cdiv class=\"process-step\">${i+1}\u003c/div>\n        \u003cdiv class=\"process-icon\">${b.icon}\u003c/div>\n        \u003cdiv class=\"process-title\">${DL(b.title, b.title_sk)}\u003c/div>\n        \u003cdiv class=\"process-desc\">${DL(b.desc, b.desc_sk)}\u003c/div>\n        \u003cspan class=\"process-status ${b.status}\">${b.status === 'live' ? (_lang==='sk'?'Naživo':'Live') : (_lang==='sk'?'Vízia':'Vision')}\u003c/span>\n      \u003c/div>\n    `).join('')\n  }\u003c/div>`;\n}\n\nfunction renderGantt(){\n  const monthWidth = 30;\n  const totalMonths = Math.ceil(monthsBetween('2031-01-01'));\n  const trackWidth = totalMonths * monthWidth;\n\n  // Year gridlines/ticks\n  let ticks = '';\n  for(let y = 2026; y \u003c= 2031; y++){\n    const offset = monthsBetween(y + '-01-01') * monthWidth;\n    if(offset \u003c 0 || offset > trackWidth) continue;\n    ticks += `\u003cdiv class=\"gantt-axis-tick\" style=\"left:${offset}px;\">${y}\u003c/div>`;\n  }\n\n  const rows = ROADMAP.map((r,i) => {\n    const left = monthsBetween(r.start) * monthWidth;\n    const width = Math.max((monthsBetween(r.end) - monthsBetween(r.start)) * monthWidth, 10);\n    const cls = r.shipped ? 'shipped' : 'vision';\n    const dateText = r.start === r.end ? r.start : `${r.start} → ${r.end}`;\n    return `\n      \u003cdiv class=\"gantt-row\">\n        \u003cdiv class=\"gantt-label\" title=\"${DL(r.label, r.label_sk).replace(/\"/g,'&quot;')}\">${DL(r.label, r.label_sk)}\u003c/div>\n        \u003cdiv class=\"gantt-track\" style=\"width:${trackWidth}px;\">\n          \u003cdiv class=\"gantt-bar ${cls}\" style=\"left:${left}px; width:${width}px;\" title=\"${DL(r.label, r.label_sk).replace(/\"/g,'&quot;')} (${dateText})\">\u003c/div>\n        \u003c/div>\n      \u003c/div>\n    `;\n  }).join('');\n\n  const todayOffset = monthsBetween(TODAY.toISOString().slice(0,10)) * monthWidth;\n\n  document.getElementById('ganttChart').innerHTML = `\n    \u003cdiv class=\"gantt-axis\">\n      \u003cdiv class=\"gantt-axis-spacer\">\u003c/div>\n      \u003cdiv class=\"gantt-axis-track\" style=\"width:${trackWidth}px;\">${ticks}\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"gantt-rows\" style=\"position:relative;\">\n      ${rows}\n      \u003cdiv class=\"gantt-today\" style=\"left:${260 + todayOffset}px;\">\n        \u003cdiv class=\"gantt-today-label\">Today\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  `;\n}\n\nfunction niceMax(v){\n  const magnitude = Math.pow(10, Math.floor(Math.log10(Math.max(v,1))));\n  return Math.ceil(v / magnitude) * magnitude;\n}\n\nfunction renderRevenueChart(){\n  const w = 460, h = 220, padL = 46, padB = 26, padT = 12, padR = 10;\n  const plotW = w - padL - padR, plotH = h - padT - padB;\n  const maxVal = niceMax(Math.max(...REVENUE_ILLUSTRATIVE_CHF) * 1.08);\n  const stepX = plotW / (REVENUE_YEARS.length - 1);\n  const pts = REVENUE_ILLUSTRATIVE_CHF.map((v,i) => {\n    const x = padL + i * stepX;\n    const y = padT + plotH - (v / maxVal) * plotH;\n    return [x,y];\n  });\n  const linePath = pts.map((p,i) => (i===0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');\n  const areaPath = linePath + ` L${pts[pts.length-1][0].toFixed(1)},${(padT+plotH).toFixed(1)} L${pts[0][0].toFixed(1)},${(padT+plotH).toFixed(1)} Z`;\n\n  const gridLines = [0,0.25,0.5,0.75,1].map(f => {\n    const y = padT + plotH - f*plotH;\n    const val = maxVal * f;\n    const label = val >= 1000 ? Math.round(val/1000) + 'k' : Math.round(val);\n    return `\u003cline x1=\"${padL}\" y1=\"${y}\" x2=\"${w-padR}\" y2=\"${y}\" stroke=\"var(--rule-soft)\" stroke-width=\"1\"/>\n            \u003ctext x=\"${padL-8}\" y=\"${y+3}\" text-anchor=\"end\" font-family=\"var(--mono)\" font-size=\"9\" fill=\"var(--ink-faint)\">${label}\u003c/text>`;\n  }).join('');\n\n  const xLabels = REVENUE_YEARS.map((yr,i) => `\u003ctext x=\"${pts[i][0]}\" y=\"${h-6}\" text-anchor=\"middle\" font-family=\"var(--mono)\" font-size=\"10\" fill=\"var(--ink-dim)\">${yr}\u003c/text>`).join('');\n  const dots = pts.map((p,i) => `\u003ccircle cx=\"${p[0]}\" cy=\"${p[1]}\" r=\"${i===pts.length-1?4.5:3}\" fill=\"var(--gold)\" stroke=\"var(--bg)\" stroke-width=\"1.5\"/>`).join('');\n\n  document.getElementById('revenueChartWrap').innerHTML = `\n    \u003csvg viewBox=\"0 0 ${w} ${h}\" style=\"width:100%; height:auto; display:block;\">\n      \u003cdefs>\n        \u003clinearGradient id=\"revGrad\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n          \u003cstop offset=\"0%\" stop-color=\"var(--gold)\" stop-opacity=\"0.35\"/>\n          \u003cstop offset=\"100%\" stop-color=\"var(--gold)\" stop-opacity=\"0\"/>\n        \u003c/linearGradient>\n      \u003c/defs>\n      ${gridLines}\n      \u003cpath d=\"${areaPath}\" fill=\"url(#revGrad)\" stroke=\"none\"/>\n      \u003cpath d=\"${linePath}\" fill=\"none\" stroke=\"var(--gold)\" stroke-width=\"2.5\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n      ${dots}\n      ${xLabels}\n    \u003c/svg>\n  `;\n  document.getElementById('revenueBigNum').textContent = 'CHF ' + REVENUE_ILLUSTRATIVE_CHF[REVENUE_ILLUSTRATIVE_CHF.length-1].toLocaleString('en-CH');\n}\n\nfunction renderAssumptionsTable(){\n  const rows = REVENUE_YEARS.map((y,i)=> `\n    \u003ctr>\n      \u003ctd>${y}\u003c/td>\n      \u003ctd class=\"region\">${DL(REVENUE_REGION[i], REVENUE_REGION_SK[i])}\u003c/td>\n      \u003ctd>${REVENUE_KITCHENS[i].toLocaleString('en-CH')}\u003c/td>\n      \u003ctd>CHF ${BLENDED_ARPU_MONTHLY_CHF}/mo\u003c/td>\n      \u003ctd>CHF ${REVENUE_ILLUSTRATIVE_CHF[i].toLocaleString('en-CH')}\u003c/td>\n    \u003c/tr>\n  `).join('');\n  document.getElementById('assumptionsTable').innerHTML = `\n    \u003cthead>\u003ctr>\u003cth>${DL('Year','Rok')}\u003c/th>\u003cth>${DL('Region','Región')}\u003c/th>\u003cth>${DL('Paying kitchens','Platiace kuchyne')}\u003c/th>\u003cth>${DL('Blended ARPU','Blended ARPU')}\u003c/th>\u003cth>ARR\u003c/th>\u003c/tr>\u003c/thead>\n    \u003ctbody>${rows}\u003c/tbody>\n  `;\n}\n\n/* Active-section highlight in the sticky nav via IntersectionObserver — no dependency needed. */\nfunction initPageNav(){\n  const links = Array.from(document.querySelectorAll('#pageNav a'));\n  const sections = links.map(a => document.getElementById(a.getAttribute('href').slice(1)));\n  const observer = new IntersectionObserver((entries)=>{\n    entries.forEach(entry=>{\n      if(!entry.isIntersecting) return;\n      const id = entry.target.id;\n      links.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + id));\n    });\n  }, { rootMargin: '-30% 0px -60% 0px', threshold: 0 });\n  sections.forEach(s => s && observer.observe(s));\n}\n\ndocument.getElementById('footNote').innerHTML = `Sautero · generated ${GENERATED} · kept in sync with docs/ROADMAP.md · \u003ca href=\"monetization.html\">monetization.html\u003c/a>`;\nrenderHeadlineStats();\nrenderMarket();\nrenderKPIGroups();\nrenderMaturity();\n  renderHoursBars();\nrenderProcess();\nrenderGantt();\nrenderRevenueChart();\nrenderAssumptionsTable();\ninitPageNav();\n\u003c/script>\n\n\u003cdiv class=\"chefos-stamp\" data-sk=\"🔄 Stav Sautero k 18. 7. 2026, 14:20\" data-en=\"🔄 Sautero state as of Jul 18, 2026, 14:20\">🔄 Stav Sautero k 18. 7. 2026, 14:20\u003c/div>\n\u003cbutton class=\"chefos-lang-fab\" id=\"chefosLangFab\" onclick=\"chefosToggleLang()\">EN\u003c/button>\n\n\u003cscript>\n/* Shared SK/EN toggle for /visual data/ docs without their own — same chefos_doc_lang key as\n   the rest, so one switch follows you across every document. Translates [data-sk]/[data-en]\n   pairs (chrome + stamp); untagged content stays in its original language. */\n(function(){\n  let lang = localStorage.getItem('chefos_doc_lang') || 'sk';\n  function apply(){\n    document.querySelectorAll('[data-sk]').forEach(el=>{\n      const val = lang === 'sk' ? el.getAttribute('data-sk') : (el.getAttribute('data-en') || el.getAttribute('data-sk'));\n      if(val.indexOf('\u003c') !== -1) el.innerHTML = val; else el.textContent = val;\n    });\n    const b = document.getElementById('chefosLangFab');\n    if(b) b.textContent = lang === 'sk' ? 'EN' : 'SK';\n    document.documentElement.lang = lang;\n  }\n  window.chefosToggleLang = function(){\n    lang = lang === 'sk' ? 'en' : 'sk';\n    localStorage.setItem('chefos_doc_lang', lang);\n    if(typeof _lang !== 'undefined'){ _lang = lang; }\n    apply();\n    if(typeof rerenderDeck === 'function') rerenderDeck();\n  };\n  apply();\n})();\n\u003c/script>\n\u003c/body>\n\u003c/html>\n", "\u003c!DOCTYPE html>\n\u003chtml lang=\"en\">\n\u003chead>\n\u003cmeta charset=\"UTF-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n\u003ctitle>Sautero — Chaos Is Optional\u003c/title>\n\u003cstyle>\n  :root{\n    --bg: #0A1A2F;\n    --surface: #122845;\n    --surface-raised: #0f2340;\n    --ink: #fff;\n    --ink-dim: #9C949E;\n    --ink-faint: rgba(156,148,158,0.6);\n    --rule: #223d57;\n    --copper: #34F7D7;\n    --copper-dim: rgba(52,247,215,0.4);\n    --copper-wash: rgba(52,247,215,0.08);\n    --sage: #F7C948;\n    --sage-wash: rgba(247,201,72,0.08);\n    --rust: #FF7A68;\n  }\n  @media (prefers-color-scheme: light){\n    :root{\n      --bg: #0A1A2F;\n      --surface: #122845;\n      --surface-raised: #0f2340;\n      --ink: #fff;\n      --ink-dim: #9C949E;\n      --ink-faint: rgba(156,148,158,0.6);\n      --rule: #223d57;\n      --copper: #34F7D7;\n      --copper-dim: rgba(52,247,215,0.4);\n      --copper-wash: rgba(52,247,215,0.08);\n      --sage: #F7C948;\n      --sage-wash: rgba(247,201,72,0.08);\n      --rust: #FF7A68;\n    }\n  }\n  :root[data-theme=\"dark\"]{\n    --bg: #0A1A2F; --surface: #122845; --surface-raised: #0f2340;\n    --ink: #fff; --ink-dim: #9C949E; --ink-faint: rgba(156,148,158,0.6); --rule: #223d57;\n    --copper: #34F7D7; --copper-dim: rgba(52,247,215,0.4); --copper-wash: rgba(52,247,215,0.08);\n    --sage: #F7C948; --sage-wash: rgba(247,201,72,0.08); --rust: #FF7A68;\n  }\n  :root[data-theme=\"light\"]{\n    --bg: #0A1A2F; --surface: #122845; --surface-raised: #0f2340;\n    --ink: #fff; --ink-dim: #9C949E; --ink-faint: rgba(156,148,158,0.6); --rule: #223d57;\n    --copper: #34F7D7; --copper-dim: rgba(52,247,215,0.4); --copper-wash: rgba(52,247,215,0.08);\n    --sage: #F7C948; --sage-wash: rgba(247,201,72,0.08); --rust: #FF7A68;\n  }\n\n  *{ box-sizing:border-box; }\n  html{ scroll-behavior:smooth; }\n  html,body{ margin:0; padding:0; background:var(--bg); overflow-x:hidden; }\n  body{\n    color: var(--ink);\n    font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;\n    line-height: 1.6;\n    -webkit-font-smoothing: antialiased;\n  }\n  ::selection{ background: var(--copper); color: var(--bg); }\n  .serif{ font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; font-weight: 700; }\n  .mono{ font-family: \"SF Mono\", Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }\n  a{ color:inherit; }\n\n  .wrap{ max-width: 1040px; margin: 0 auto; padding: 0 28px; }\n  .prose{ max-width: 640px; }\n\n  .eyebrow{\n    font-family: \"SF Mono\", Menlo, monospace;\n    font-size: 11.5px; letter-spacing: 0.22em; text-transform: uppercase;\n    color: var(--copper); font-weight:600;\n    display:flex; align-items:center; gap:10px;\n    margin-bottom: 22px;\n  }\n  .eyebrow::before{ content:''; width:22px; height:1px; background:var(--copper); }\n\n  h2.head{\n    font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; font-weight: 700;\n    font-size: clamp(30px, 4.4vw, 46px);\n    font-weight: 500;\n    line-height: 1.14;\n    letter-spacing: -0.01em;\n    text-wrap: balance;\n    margin: 0 0 26px 0;\n  }\n\n  section{ padding: 118px 0; border-bottom: 1px solid var(--rule); }\n  section:last-of-type{ border-bottom:none; }\n\n  .reveal{ opacity:0; transform: translateY(18px); transition: opacity 0.7s ease, transform 0.7s ease; }\n  .reveal.visible{ opacity:1; transform: translateY(0); }\n  @media (prefers-reduced-motion: reduce){\n    .reveal{ opacity:1; transform:none; transition:none; }\n  }\n\n  /* ================= HERO ================= */\n  .hero{\n    min-height: 92vh;\n    display:flex; flex-direction:column; justify-content:center;\n    padding: 140px 0 90px 0;\n    border-bottom: 1px solid var(--rule);\n    position:relative;\n  }\n  .hero-mark{\n    font-family: \"SF Mono\", Menlo, monospace;\n    font-size: 12px; letter-spacing: 0.3em; text-transform:uppercase;\n    color: var(--ink-faint); margin-bottom: 46px;\n    display:flex; align-items:center; gap:12px;\n  }\n  .hero-mark .pulse{\n    width:7px; height:7px; border-radius:50%; background:var(--copper);\n    animation: pulse 2.4s ease-in-out infinite;\n  }\n  @keyframes pulse{ 0%,100%{ opacity:1; } 50%{ opacity:0.25; } }\n  h1.hero-head{\n    font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; font-weight: 700;\n    font-size: clamp(40px, 7.4vw, 84px);\n    font-weight: 500;\n    line-height: 1.06;\n    letter-spacing: -0.015em;\n    max-width: 15ch;\n    margin: 0 0 34px 0;\n  }\n  h1.hero-head .ln{ display:block; overflow:hidden; }\n  h1.hero-head .ln span{\n    display:inline-block;\n    opacity:0; transform: translateY(100%);\n    animation: riseIn 0.85s cubic-bezier(.2,.8,.2,1) forwards;\n  }\n  @keyframes riseIn{ to{ opacity:1; transform:translateY(0); } }\n  @media (prefers-reduced-motion: reduce){\n    h1.hero-head .ln span{ animation:none; opacity:1; transform:none; }\n  }\n  .hero-sub{\n    font-size: 19px; color: var(--ink-dim);\n    max-width: 46ch; margin: 0 0 40px 0;\n    opacity:0; animation: fadeUp 0.8s ease 1.05s forwards;\n  }\n  @media (prefers-reduced-motion: reduce){ .hero-sub{ opacity:1; animation:none; } }\n  @keyframes fadeUp{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }\n  .hero-foot{\n    display:flex; flex-wrap:wrap; gap: 10px 24px;\n    font-size: 12.5px; color: var(--ink-faint);\n    padding-top: 22px; border-top:1px solid var(--rule); max-width:520px;\n    opacity:0; animation: fadeUp 0.8s ease 1.3s forwards;\n  }\n  @media (prefers-reduced-motion: reduce){ .hero-foot{ opacity:1; animation:none; } }\n  .hero-foot b{ color:var(--ink-dim); font-weight:600; }\n\n  /* ================= PROBLEM ================= */\n  .problem-lines{ font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; }\n  .problem-lines p{\n    font-size: clamp(19px, 2.6vw, 25px);\n    line-height: 1.55;\n    color: var(--ink-dim);\n    margin: 0 0 20px 0;\n    max-width: 30ch;\n  }\n  .problem-lines p.final{\n    color: var(--ink);\n    margin-top: 44px;\n    padding-top: 30px;\n    border-top: 1px solid var(--rule);\n    max-width: none;\n  }\n  .problem-lines p.final b{ color: var(--copper); font-weight:600; font-style:normal; }\n\n  /* ================= VISION ================= */\n  .vision-quote{\n    font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;\n    font-style: italic;\n    font-size: clamp(22px, 3vw, 30px);\n    line-height: 1.4;\n    color: var(--ink);\n    max-width: 20ch;\n    margin: 46px 0 0 0;\n    padding-left: 24px;\n    border-left: 2px solid var(--copper-dim);\n  }\n  .vision-body p{ font-size:17px; color:var(--ink-dim); margin:0 0 16px 0; }\n\n  /* ================= TRANSFORM (before/after) ================= */\n  .xform{ border-top: 1px solid var(--rule); }\n  .xform-row{\n    display:grid;\n    grid-template-columns: 1fr 30px 1.15fr;\n    align-items: center;\n    gap: 22px;\n    padding: 34px 0;\n    border-bottom: 1px solid var(--rule);\n  }\n  .xform-before{\n    font-size: 14.5px;\n    color: var(--ink-faint);\n    line-height:1.5;\n  }\n  .xform-before .lbl{ display:block; font-family:\"SF Mono\",monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:6px; }\n  .xform-arrow{ color: var(--copper-dim); font-size:18px; text-align:center; }\n  .xform-after .lbl{ display:block; font-family:\"SF Mono\",monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:var(--sage); margin-bottom:6px; }\n  .xform-after .headline{\n    font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;\n    font-size: 21px; font-weight:500; color:var(--ink); margin-bottom:6px; line-height:1.3;\n  }\n  .xform-after .detail{ font-size:14px; color:var(--ink-dim); line-height:1.5; }\n  @media (max-width: 640px){\n    .xform-row{ grid-template-columns: 1fr; gap:10px; }\n    .xform-arrow{ text-align:left; transform:rotate(90deg); width:18px; }\n  }\n\n  /* ================= ROADMAP (spine) ================= */\n  .spine{ position:relative; margin-top: 50px; }\n  .spine::before{\n    content:''; position:absolute; left:9px; top:8px; bottom:8px; width:1px;\n    background: linear-gradient(to bottom, var(--copper-dim), var(--rule) 70%);\n  }\n  .stage{ position:relative; padding: 0 0 46px 46px; }\n  .stage:last-child{ padding-bottom:0; }\n  .stage-dot{\n    position:absolute; left:0; top:3px;\n    width:19px; height:19px; border-radius:50%;\n    background: var(--bg); border: 2px solid var(--rule);\n    display:flex; align-items:center; justify-content:center;\n  }\n  .stage-dot::after{ content:''; width:7px; height:7px; border-radius:50%; }\n  .stage.live .stage-dot{ border-color: var(--sage); }\n  .stage.live .stage-dot::after{ background: var(--sage); }\n  .stage.emerging .stage-dot{ border-color: var(--copper); }\n  .stage.emerging .stage-dot::after{ background: var(--copper); }\n  .stage.ahead .stage-dot::after{ background: transparent; }\n  .stage-top{ display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; margin-bottom:6px; }\n  .stage-name{ font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; font-size:22px; font-weight:500; }\n  .stage-tag{\n    font-family:\"SF Mono\",monospace; font-size:10px; letter-spacing:0.12em; text-transform:uppercase;\n    padding:2px 8px; border-radius:999px; border:1px solid var(--rule); color:var(--ink-faint);\n  }\n  .stage.live .stage-tag{ color:var(--sage); border-color:var(--sage); background:var(--sage-wash); }\n  .stage.emerging .stage-tag{ color:var(--copper); border-color:var(--copper-dim); background:var(--copper-wash); }\n  .stage-desc{ font-size:15px; color:var(--ink-dim); max-width:52ch; }\n\n  /* ================= PROGRESS ================= */\n  .progress-body p{ font-size:18px; color:var(--ink-dim); max-width:64ch; line-height:1.65; }\n  .progress-body strong{ color:var(--ink); font-weight:600; }\n  .progress-stats{\n    display:flex; flex-wrap:wrap; gap: 40px;\n    margin-top: 54px; padding-top: 34px; border-top:1px solid var(--rule);\n  }\n  .pstat .n{ font-family:\"SF Mono\",monospace; font-size:34px; font-weight:600; color:var(--copper); font-variant-numeric:tabular-nums; }\n  .pstat .l{ font-size:12px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-faint); margin-top:4px; max-width:16ch; }\n\n  /* ================= FOOTER ================= */\n  footer{ padding: 60px 0 70px 0; }\n  footer .wrap{ display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; font-size:12.5px; color:var(--ink-faint); }\n\n  /* ---------- Sautero stamp + language fab (Richard, 15.7.: every /visual data/ document\n     carries a last-updated-to-Sautero-state badge and an SK/EN toggle) ---------- */\n  .chefos-stamp{\n    position:fixed; bottom:14px; right:14px; z-index:90;\n    background:rgba(15,35,64,0.92); border:1px solid rgba(52,247,215,0.4); color:#34F7D7;\n    font-size:10.5px; font-weight:700; font-family:\"SF Mono\",Menlo,Consolas,monospace;\n    padding:6px 12px; border-radius:999px;\n    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); pointer-events:none;\n  }\n  .chefos-lang-fab{\n    position:fixed; top:14px; right:14px; z-index:90;\n    background:rgba(15,35,64,0.92); border:1px solid #223d57; color:#9C949E;\n    font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;\n    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;\n    padding:7px 14px; border-radius:999px; cursor:pointer;\n    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);\n    transition:border-color .15s, color .15s;\n  }\n  .chefos-lang-fab:hover{ border-color:rgba(52,247,215,0.4); color:#34F7D7; }\n  @media print{ .chefos-stamp, .chefos-lang-fab{ display:none; } }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\u003cdiv class=\"hero\">\n  \u003cdiv class=\"wrap\">\n    \u003cdiv class=\"hero-mark\">\u003cspan class=\"pulse\">\u003c/span>Sautero — an operating system for professional kitchens\u003c/div>\n    \u003ch1 class=\"hero-head\">\n      \u003cspan class=\"ln\">\u003cspan style=\"animation-delay:.05s\">Kitchens have run\u003c/span>\u003c/span>\n      \u003cspan class=\"ln\">\u003cspan style=\"animation-delay:.20s\">on chaos for a\u003c/span>\u003c/span>\n      \u003cspan class=\"ln\">\u003cspan style=\"animation-delay:.35s\">hundred years.\u003c/span>\u003c/span>\n      \u003cspan class=\"ln\">\u003cspan style=\"animation-delay:.55s; color:var(--copper);\">We think that's optional.\u003c/span>\u003c/span>\n    \u003c/h1>\n    \u003cp class=\"hero-sub\">Built inside a real kitchen, not around one. One shared place for what a kitchen knows, what's happening right now, and what tomorrow needs — instead of twelve notebooks and somebody's memory.\u003c/p>\n    \u003cdiv class=\"hero-foot\">\n      \u003cspan>\u003cb>Status\u003c/b> Working build, in daily use\u003c/span>\n      \u003cspan>\u003cb>Built by\u003c/b> Richard Červenka\u003c/span>\n      \u003cspan>\u003cb>Where\u003c/b> Bern\u003c/span>\n    \u003c/div>\n  \u003c/div>\n\u003c/div>\n\n\u003csection>\n  \u003cdiv class=\"wrap\">\n    \u003cdiv class=\"eyebrow reveal\">The Problem\u003c/div>\n    \u003ch2 class=\"head reveal\">Every kitchen has accepted the same chaos.\u003c/h2>\n    \u003cdiv class=\"problem-lines reveal\">\n      \u003cp>The head chef's technique lives in her head, and nowhere else.\u003c/p>\n      \u003cp>A note gets passed at the pass, and half of it never reaches the line.\u003c/p>\n      \u003cp>Prep gets forgotten until the first ticket's already up.\u003c/p>\n      \u003cp>A tray goes in the bin, and nobody can say what it actually cost.\u003c/p>\n      \u003cp>Something goes wrong — and the question becomes \u003cem>who\u003c/em>, never \u003cem>why\u003c/em>.\u003c/p>\n      \u003cp class=\"final\">Every kitchen has learned to live with this. \u003cb>Sautero hasn't.\u003c/b>\u003c/p>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003csection>\n  \u003cdiv class=\"wrap\">\n    \u003cdiv style=\"display:grid; grid-template-columns: 1.1fr 0.9fr; gap:60px; align-items:start;\">\n      \u003cdiv>\n        \u003cdiv class=\"eyebrow reveal\">The Vision\u003c/div>\n        \u003ch2 class=\"head reveal\">A kitchen that remembers.\u003c/h2>\n        \u003cdiv class=\"vision-body prose reveal\">\n          \u003cp>Software changed how companies keep the truth — one record everyone trusts, instead of a dozen private ones. Kitchens never got that.\u003c/p>\n          \u003cp>Sautero treats a kitchen the same way. What one cook knows, every cook can know. What's happening on the line right now is visible to whoever needs to see it — not just whoever's shouting loudest.\u003c/p>\n          \u003cp>Nothing depends on being remembered, because nothing has to be.\u003c/p>\n        \u003c/div>\n      \u003c/div>\n      \u003cblockquote class=\"vision-quote reveal\">Chaos isn't a kitchen tradition. It's just the oldest bug nobody's fixed.\u003c/blockquote>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003csection class=\"xform\">\n  \u003cdiv class=\"wrap\">\n    \u003cdiv class=\"eyebrow reveal\">What It Does Today\u003c/div>\n    \u003ch2 class=\"head reveal\">Not features. A different kitchen.\u003c/h2>\n\n    \u003cdiv class=\"xform-row reveal\">\n      \u003cdiv class=\"xform-before\">\u003cspan class=\"lbl\">Before\u003c/span>Recipes live in binders, sticky notes, and one chef's memory.\u003c/div>\n      \u003cdiv class=\"xform-arrow\">→\u003c/div>\n      \u003cdiv class=\"xform-after\">\n        \u003cspan class=\"lbl\">After\u003c/span>\n        \u003cdiv class=\"headline\">Shared kitchen knowledge.\u003c/div>\n        \u003cdiv class=\"detail\">Every recipe, in one place, built for a working line — not a cookbook shelf.\u003c/div>\n      \u003c/div>\n    \u003c/div>\n\n    \u003cdiv class=\"xform-row reveal\">\n      \u003cdiv class=\"xform-before\">\u003cspan class=\"lbl\">Before\u003c/span>Nobody knows what a dish costs until the invoices land.\u003c/div>\n      \u003cdiv class=\"xform-arrow\">→\u003c/div>\n      \u003cdiv class=\"xform-after\">\n        \u003cspan class=\"lbl\">After\u003c/span>\n        \u003cdiv class=\"headline\">Know exactly what every plate costs.\u003c/div>\n        \u003cdiv class=\"detail\">Calculated automatically, ingredient by ingredient, the moment the recipe is written.\u003c/div>\n      \u003c/div>\n    \u003c/div>\n\n    \u003cdiv class=\"xform-row reveal\">\n      \u003cdiv class=\"xform-before\">\u003cspan class=\"lbl\">Before\u003c/span>Substitutions and seasonality live in someone's memory, if anywhere.\u003c/div>\n      \u003cdiv class=\"xform-arrow\">→\u003c/div>\n      \u003cdiv class=\"xform-after\">\n        \u003cspan class=\"lbl\">After\u003c/span>\n        \u003cdiv class=\"headline\">Every ingredient carries its own knowledge.\u003c/div>\n        \u003cdiv class=\"detail\">Where it's from, when it's in season, what replaces it — one tap from any recipe.\u003c/div>\n      \u003c/div>\n    \u003c/div>\n\n    \u003cdiv class=\"xform-row reveal\">\n      \u003cdiv class=\"xform-before\">\u003cspan class=\"lbl\">Before\u003c/span>Tomorrow's prep list gets handwritten tonight, half-followed tomorrow.\u003c/div>\n      \u003cdiv class=\"xform-arrow\">→\u003c/div>\n      \u003cdiv class=\"xform-after\">\n        \u003cspan class=\"lbl\">After\u003c/span>\n        \u003cdiv class=\"headline\">Everyone knows what's finished. No shouting. No guessing.\u003c/div>\n        \u003cdiv class=\"detail\">Write the list once, in seconds. Everyone on tomorrow's shift reads the same one.\u003c/div>\n      \u003c/div>\n    \u003c/div>\n\n    \u003cdiv class=\"xform-row reveal\" style=\"border-bottom:none;\">\n      \u003cdiv class=\"xform-before\">\u003cspan class=\"lbl\">Before\u003c/span>Ordering happens from memory, station by station.\u003c/div>\n      \u003cdiv class=\"xform-ar
