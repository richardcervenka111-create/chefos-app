_sk:'Skutočné súkromie dát + tímové join kódy + Kitchen Reports + AI predplatné brána + Privacy consent, potom vynútené reálne členstvo v tíme, rolový admin, long-press správa obsahu, vlastné zoznamy ingrediencií, branded print v2 + stály nav header, HACCP/Team Meetings len pre firemné účty, centrálny AI kľúč, brandované auth e-maily', start:'2026-07-16', end:'2026-07-16', shipped:true },\n  { label:'Community layer: Public shelves for recipes & ingredients across every kitchen, per-item sharing (publicly / with chef friends), cross-kitchen comments with counts, supplier field + Invoice Scan v2 (reads vendor, translates any language), per-screen tutorials — plus a full security review (private contract storage, XSS hardening, permanent auditor guards)', label_sk:'Komunitná vrstva: verejné police receptov a ingrediencií naprieč kuchyňami, zdieľanie po položkách (verejne / chef-priateľom), komentáre naprieč kuchyňami s počítadlami, pole dodávateľa + Invoice Scan v2 (číta dodávateľa, prekladá akýkoľvek jazyk), tutoriály per obrazovka — plus plná bezpečnostná revízia (privátne úložisko zmlúv, XSS hardening, trvalé auditorské stráže)', start:'2026-07-17', end:'2026-07-17', shipped:true },\n  { label:'Rebrand to Sautero (clean name, .ch + .com free) + per-friend recipe sharing, per-user AI usage metering with admin dashboard, Michelin enrichment of all 183 library recipes, Company Ingredients shelf + scan-target fix, HTML/text invoice & recipe scanning, new UI theme (founder beta)', label_sk:'Rebrand na Sautero (čisté meno, .ch + .com voľné) + zdieľanie receptov per priateľ, AI meranie per užívateľ s admin prehľadom, Michelin obohatenie všetkých 183 receptov knižnice, polica Company Ingredients + oprava cieľa skenu, HTML/text sken faktúr aj receptov, nová UI téma (beta pre zakladateľa)', start:'2026-07-18', end:'2026-07-18', shipped:true },\n  { label:'Company-admin onboarding (offer→accept→name your restaurant), branded email, general audit + internal-docs sync', label_sk:'Onboarding company admina (ponuka→prijatie→pomenuj si reštauráciu), značkový e-mail, general audit + sync interných dokumentov', start:'2026-07-20', end:'2026-07-21', shipped:true },\n  { label:'Public trial prep — polish Check List, Chef\\'s Assistant, Ingredients, Recipes; multi-team QR invites; email login for any address', label_sk:'Príprava verejného trialu — polish Check Listu, Chef\\'s Assistanta, Ingrediencií, Receptov; multi-team QR pozvánky; email login pre každú adresu', start:'2026-07-11', end:'2026-07-31', shipped:false },\n  { label:'Public trial — 25 users, multiple restaurants, own team per kitchen', label_sk:'Verejný trial — 25 užívateľov, viac reštaurácií, vlastný tím per kuchyňa', start:'2026-08-01', end:'2026-08-01', shipped:false },\n  { label:'Phase 2 — Kitchen Flow full (multi-user roles, pilot live test)', label_sk:'Fáza 2 — Kitchen Flow naplno (multi-user roly, živý test pilotu)', start:'2026-09-01', end:'2026-11-30', shipped:false },\n  { label:'Phase 3 — Inventory & food cost (real stock, Swiss supplier feeds)', label_sk:'Fáza 3 — Sklad & food cost (reálne zásoby, švajčiarski dodávatelia)', start:'2026-11-01', end:'2027-02-28', shipped:false },\n  { label:'Phase 4 — Production planning & reports', label_sk:'Fáza 4 — Plánovanie výroby & reporty', start:'2027-02-01', end:'2027-05-31', shipped:false },\n  { label:'Phase 5 — Intelligence layer (AI prep recommendations)', label_sk:'Fáza 5 — Inteligentná vrstva (AI odporúčania prípravy)', start:'2027-05-01', end:'2027-09-30', shipped:false },\n  { label:'Phase 6 — Native mobile + offline mode', label_sk:'Fáza 6 — Natívny mobil + offline režim', start:'2027-09-01', end:'2028-03-31', shipped:false },\n  { label:'Phase 7 — Go-to-market: canton Bern (first paying kitchens)', label_sk:'Fáza 7 — Go-to-market: kantón Bern (prvé platiace kuchyne)', start:'2028-03-01', end:'2028-12-31', shipped:false },\n  { label:'Expansion — neighbouring cantons (Fribourg, Solothurn, Vaud, Neuchâtel)', label_sk:'Expanzia — susedné kantóny (Fribourg, Solothurn, Vaud, Neuchâtel)', start:'2029-01-01', end:'2029-12-31', shipped:false },\n  { label:'Expansion — German-speaking Switzerland (Zürich, Basel, Lucerne, Aargau)', label_sk:'Expanzia — nemecky hovoriace Švajčiarsko (Zürich, Basel, Luzern, Aargau)', start:'2030-01-01', end:'2030-12-31', shipped:false },\n];\n\nconst REVENUE_YEARS = ['2026','2027','2028','2029','2030'];\nconst REVENUE_REGION = ['Pilot only', 'Canton Bern', 'Canton Bern', 'Bern + neighbours', 'German-speaking CH'];\nconst REVENUE_REGION_SK = ['Len pilot', 'Kantón Bern', 'Kantón Bern', 'Bern + susedia', 'Nemecky hovoriace CH'];\nconst REVENUE_KITCHENS = [0, 20, 80, 250, 600];\nconst BLENDED_ARPU_MONTHLY_CHF = 89; // 60% Chef Pro (49) + 40% Restaurant (149)\nconst REVENUE_ILLUSTRATIVE_CHF = REVENUE_KITCHENS.map(k => k * BLENDED_ARPU_MONTHLY_CHF * 12);\n\n// Hours = the REAL time the Claude Code app was open on this project — auto-written from the\n// session logs by scripts/work_hours.py (kept identical to costs.html / tasklist.html). No estimates,\n// never hand-edited; the deck chart derives straight from it so it can't drift or fall behind.\nconst WORK_HOURS = { '2026-07-08':6.1, '2026-07-09':4.7, '2026-07-10':5.6, '2026-07-11':0.2, '2026-07-12':16.3, '2026-07-13':2.6, '2026-07-14':11.0, '2026-07-15':12.7, '2026-07-16':17.0, '2026-07-17':7.4, '2026-07-18':13.9, '2026-07-19':5.0, '2026-07-20':17.6, '2026-07-21':11.4, '2026-07-22':3.6 };\nconst DECK_HOURS = Object.entries(WORK_HOURS).sort((a,b)=> a[0] \u003c b[0] ? -1 : 1);\nconst DECK_HOURS_MEASURED_FROM = '2026-07-08';  // transcripts cover the whole project — every day measured\n\nfunction renderHoursBars(){\n  const el = document.getElementById('hoursBarWrap');\n  if(!el) return;\n  const W = 640, H = 170, pad = 26, bw = (W - pad*2) / DECK_HOURS.length;\n  const max = Math.max(...DECK_HOURS.map(d=>d[1]));\n  const total = DECK_HOURS.reduce((a,d)=>a+d[1],0);\n  const bars = DECK_HOURS.map((d,i)=>{\n    const est = d[0] \u003c DECK_HOURS_MEASURED_FROM;\n    const h = (d[1]/max) * (H - 52);\n    const x = pad + i*bw + bw*0.14, y = H - 26 - h;\n    const day = parseInt(d[0].slice(8),10) + '.' + parseInt(d[0].slice(5,7),10) + '.';\n    return `\u003cg style=\"cursor:pointer;\" onclick=\"hoursBarDetail(${i})\">\n      \u003crect x=\"${x.toFixed(1)}\" y=\"${y.toFixed(1)}\" width=\"${(bw*0.72).toFixed(1)}\" height=\"${h.toFixed(1)}\" rx=\"3\"\n        fill=\"${est ? 'rgba(52,247,215,0.35)' : 'var(--accent)'}\">\u003ctitle>${day} — ${d[1]} h\u003c/title>\u003c/rect>\n      \u003ctext x=\"${(x + bw*0.36).toFixed(1)}\" y=\"${H-10}\" text-anchor=\"middle\" font-size=\"9\" fill=\"var(--ink-dim)\">${day}\u003c/text>\n      \u003ctext x=\"${(x + bw*0.36).toFixed(1)}\" y=\"${(y-5).toFixed(1)}\" text-anchor=\"middle\" font-size=\"9.5\" font-family=\"var(--mono)\" fill=\"var(--ink)\">${String(d[1]).replace('.',',')}\u003c/text>\n    \u003c/g>`;\n  }).join('');\n  el.innerHTML = `\u003csvg viewBox=\"0 0 ${W} ${H}\" style=\"width:100%; min-width:520px; display:block;\">${bars}\n    \u003ctext x=\"${W-2}\" y=\"14\" text-anchor=\"end\" font-size=\"11\" font-family=\"var(--mono)\" fill=\"var(--accent)\">Σ ~${total.toFixed(1).replace('.',',')} h ≈ CHF ${Math.round(total*45).toLocaleString('de-CH')}\u003c/text>\u003c/svg>`;\n}\nfunction hoursBarDetail(i){\n  const d = DECK_HOURS[i];\n  const est = d[0] \u003c DECK_HOURS_MEASURED_FROM;\n  const day = parseInt(d[0].slice(8),10) + '.' + parseInt(d[0].slice(5,7),10) + '.2026';\n  document.getElementById('hoursBarDetail').textContent =\n    day + ' — ' + String(d[1]).replace('.',',') + ' h · CHF ' + Math.round(d[1]*45) +\n    ' · reálny čas otvorenej appky, z Claude Code session logov / real app-open time, from the Claude Code session logs';\n}\n\n/* ============================================================ RENDER ============================================================ */\nlet _lang = localStorage.getItem('sautero_doc_lang') || 'sk';\nfunction DL(en, sk){ return (_lang==='sk' && sk) ? sk : en; }\nfunction rerenderDeck(){\n  renderHeadlineStats(); renderMarket(); renderKPIGroups(); renderMaturity(); renderHoursBars();\n  renderProcess(); renderGantt(); renderRevenueChart(); renderAssumptionsTable(); renderStreamMatrix();\n}\nfunction renderHeadlineStats(){\n  document.getElementById('headlineStats').innerHTML = HEADLINE_STATS.map(s=>`\n    \u003cdiv class=\"headline-stat\">\u003cdiv class=\"num\">${s.num}\u003c/div>\u003cdiv class=\"lbl\">${DL(s.label, s.label_sk)}\u003c/div>\u003c/div>\n  `).join('');\n}\nfunction renderMarket(){\n  document.getElementById('marketGrid').innerHTML = MARKET.map(k=>`\n    \u003cdiv class=\"kpi-card\">\n      \u003cdiv class=\"kpi-num\">${k.num}\u003c/div>\n      \u003cdiv class=\"kpi-label\">${DL(k.label, k.label_sk)}\u003c/div>\n      \u003cdiv class=\"kpi-note\">${DL(k.note, k.note_sk)}\u003c/div>\n    \u003c/div>\n  `).join('');\n}\nfunction renderKPIGroups(){\n  document.getElementById('kpiGroups').innerHTML = KPI_GROUPS.map(g => `\n    \u003cdiv class=\"group-label\">${DL(g.group, g.group_sk)}\u003c/div>\n    \u003cdiv class=\"kpi-grid\">\n      ${g.items.map(k=>`\n        \u003cdiv class=\"kpi-card\">\n          \u003cdiv class=\"kpi-num\">${k.num}\u003c/div>\n          \u003cdiv class=\"kpi-label\">${DL(k.label, k.label_sk)}\u003c/div>\n          \u003cdiv class=\"kpi-note\">${DL(k.note, k.note_sk)}\u003c/div>\n        \u003c/div>\n      `).join('')}\n    \u003c/div>\n  `).join('');\n}\n\nconst MATURITY = { working: 87, testing: 29, planned: 8 };\nfunction renderMaturity(){\n  const svg = document.getElementById('maturityDonut');\n  const legend = document.getElementById('maturityLegend');\n  if(!svg || !legend) return;\n  const SEGS = [\n    { key:'working', label:'Working, verified live', label_sk:'Funkčné, overené naživo', color:'#4ADE80' },\n    { key:'testing', label:'Built, awaiting live test', label_sk:'Postavené, čaká na živý test', color:'#FB923C' },\n    { key:'planned', label:'Planned, not built yet', label_sk:'Naplánované, nepostavené', color:'#FF7A68' },\n  ];\n  const total = SEGS.reduce((s,x)=>s + MATURITY[x.key], 0);\n  const R = 44, C = 2 * Math.PI * R;\n  let off = 0;\n  svg.innerHTML = SEGS.map(s=>{\n    const frac = MATURITY[s.key] / total;\n    const c = `\u003ccircle cx=\"60\" cy=\"60\" r=\"${R}\" fill=\"none\" stroke=\"${s.color}\" stroke-width=\"16\"\n      stroke-dasharray=\"${(frac*C).toFixed(2)} ${(C-frac*C).toFixed(2)}\" stroke-dashoffset=\"${(-off*C).toFixed(2)}\"\n      transform=\"rotate(-90 60 60)\">\u003ctitle>${DL(s.label, s.label_sk)}: ${MATURITY[s.key]}\u003c/title>\u003c/circle>`;\n    off += frac;\n    return c;\n  }).join('') +\n    `\u003ctext x=\"60\" y=\"58\" text-anchor=\"middle\" font-size=\"24\" font-weight=\"700\">${total}\u003c/text>` +\n    `\u003ctext x=\"60\" y=\"72\" text-anchor=\"middle\" font-size=\"6.5\" fill=\"var(--ink-dim)\">${_lang==='sk' ? 'FUNKCIÍ SPOLU' : 'FEATURES TOTAL'}\u003c/text>`;\n  legend.innerHTML = SEGS.map(s=>`\u003cdiv class=\"mrow\">\u003cspan class=\"mdot\" style=\"background:${s.color};\">\u003c/span>${DL(s.label, s.label_sk)} — \u003cb>${MATURITY[s.key]}\u003c/b>\u003c/div>`).join('') +\n    `\u003cdiv class=\"mrow\" style=\"font-size:11px; color:var(--ink-faint);\">${_lang==='sk' ? 'Živé počty z internej mapy funkcií (feature_status), nie odhady.' : 'Live counts from the internal feature map (feature_status), not estimates.'}\u003c/div>`;\n}\n\nfunction renderProcess(){\n  document.getElementById('processTrack').innerHTML = `\u003cdiv class=\"process-track\">${\n    PROCESS.map((b,i)=>`\n      \u003cdiv class=\"process-card ${b.status}\">\n        \u003cdiv class=\"process-step\">${i+1}\u003c/div>\n        \u003cdiv class=\"process-icon\">${b.icon}\u003c/div>\n        \u003cdiv class=\"process-title\">${DL(b.title, b.title_sk)}\u003c/div>\n        \u003cdiv class=\"process-desc\">${DL(b.desc, b.desc_sk)}\u003c/div>\n        \u003cspan class=\"process-status ${b.status}\">${b.status === 'live' ? (_lang==='sk'?'Naživo':'Live') : (_lang==='sk'?'Vízia':'Vision')}\u003c/span>\n      \u003c/div>\n    `).join('')\n  }\u003c/div>`;\n}\n\nfunction renderGantt(){\n  const monthWidth = 30;\n  const totalMonths = Math.ceil(monthsBetween('2031-01-01'));\n  const trackWidth = totalMonths * monthWidth;\n  let ticks = '';\n  for(let y = 2026; y \u003c= 2031; y++){\n    const offset = monthsBetween(y + '-01-01') * monthWidth;\n    if(offset \u003c 0 || offset > trackWidth) continue;\n    ticks += `\u003cdiv class=\"gantt-axis-tick\" style=\"left:${offset}px;\">${y}\u003c/div>`;\n  }\n  const rows = ROADMAP.map((r,i) => {\n    const left = monthsBetween(r.start) * monthWidth;\n    const width = Math.max((monthsBetween(r.end) - monthsBetween(r.start)) * monthWidth, 10);\n    const cls = r.shipped ? 'shipped' : 'vision';\n    const dateText = r.start === r.end ? r.start : `${r.start} → ${r.end}`;\n    return `\n      \u003cdiv class=\"gantt-row\">\n        \u003cdiv class=\"gantt-label\" title=\"${DL(r.label, r.label_sk).replace(/\"/g,'&quot;')}\">${DL(r.label, r.label_sk)}\u003c/div>\n        \u003cdiv class=\"gantt-track\" style=\"width:${trackWidth}px;\">\n          \u003cdiv class=\"gantt-bar ${cls}\" style=\"left:${left}px; width:${width}px;\" title=\"${DL(r.label, r.label_sk).replace(/\"/g,'&quot;')} (${dateText})\">\u003c/div>\n        \u003c/div>\n      \u003c/div>\n    `;\n  }).join('');\n  const todayOffset = monthsBetween(TODAY.toISOString().slice(0,10)) * monthWidth;\n  document.getElementById('ganttChart').innerHTML = `\n    \u003cdiv class=\"gantt-axis\">\n      \u003cdiv class=\"gantt-axis-spacer\">\u003c/div>\n      \u003cdiv class=\"gantt-axis-track\" style=\"width:${trackWidth}px;\">${ticks}\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"gantt-rows\" style=\"position:relative;\">\n      ${rows}\n      \u003cdiv class=\"gantt-today\" style=\"left:${260 + todayOffset}px;\">\n        \u003cdiv class=\"gantt-today-label\">Today\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  `;\n}\n\nfunction niceMax(v){\n  const magnitude = Math.pow(10, Math.floor(Math.log10(Math.max(v,1))));\n  return Math.ceil(v / magnitude) * magnitude;\n}\n\nfunction renderRevenueChart(){\n  const w = 460, h = 220, padL = 46, padB = 26, padT = 12, padR = 10;\n  const plotW = w - padL - padR, plotH = h - padT - padB;\n  const maxVal = niceMax(Math.max(...REVENUE_ILLUSTRATIVE_CHF) * 1.08);\n  const stepX = plotW / (REVENUE_YEARS.length - 1);\n  const pts = REVENUE_ILLUSTRATIVE_CHF.map((v,i) => {\n    const x = padL + i * stepX;\n    const y = padT + plotH - (v / maxVal) * plotH;\n    return [x,y];\n  });\n  const linePath = pts.map((p,i) => (i===0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');\n  const areaPath = linePath + ` L${pts[pts.length-1][0].toFixed(1)},${(padT+plotH).toFixed(1)} L${pts[0][0].toFixed(1)},${(padT+plotH).toFixed(1)} Z`;\n  const gridLines = [0,0.25,0.5,0.75,1].map(f => {\n    const y = padT + plotH - f*plotH;\n    const val = maxVal * f;\n    const label = val >= 1000 ? Math.round(val/1000) + 'k' : Math.round(val);\n    return `\u003cline x1=\"${padL}\" y1=\"${y}\" x2=\"${w-padR}\" y2=\"${y}\" stroke=\"var(--rule-soft)\" stroke-width=\"1\"/>\n            \u003ctext x=\"${padL-8}\" y=\"${y+3}\" text-anchor=\"end\" font-family=\"var(--mono)\" font-size=\"9\" fill=\"var(--ink-faint)\">${label}\u003c/text>`;\n  }).join('');\n  const xLabels = REVENUE_YEARS.map((yr,i) => `\u003ctext x=\"${pts[i][0]}\" y=\"${h-6}\" text-anchor=\"middle\" font-family=\"var(--mono)\" font-size=\"10\" fill=\"var(--ink-dim)\">${yr}\u003c/text>`).join('');\n  const dots = pts.map((p,i) => `\u003ccircle cx=\"${p[0]}\" cy=\"${p[1]}\" r=\"${i===pts.length-1?4.5:3}\" fill=\"var(--gold)\" stroke=\"var(--bg)\" stroke-width=\"1.5\"/>`).join('');\n  document.getElementById('revenueChartWrap').innerHTML = `\n    \u003csvg viewBox=\"0 0 ${w} ${h}\" style=\"width:100%; height:auto; display:block;\">\n      \u003cdefs>\n        \u003clinearGradient id=\"revGrad\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n          \u003cstop offset=\"0%\" stop-color=\"var(--gold)\" stop-opacity=\"0.35\"/>\n          \u003cstop offset=\"100%\" stop-color=\"var(--gold)\" stop-opacity=\"0\"/>\n        \u003c/linearGradient>\n      \u003c/defs>\n      ${gridLines}\n      \u003cpath d=\"${areaPath}\" fill=\"url(#revGrad)\" stroke=\"none\"/>\n      \u003cpath d=\"${linePath}\" fill=\"none\" stroke=\"var(--gold)\" stroke-width=\"2.5\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n      ${dots}\n      ${xLabels}\n    \u003c/svg>\n  `;\n  document.getElementById('revenueBigNum').textContent = 'CHF ' + REVENUE_ILLUSTRATIVE_CHF[REVENUE_ILLUSTRATIVE_CHF.length-1].toLocaleString('en-CH');\n}\n\nfunction renderAssumptionsTable(){\n  const rows = REVENUE_YEARS.map((y,i)=> `\n    \u003ctr>\n      \u003ctd>${y}\u003c/td>\n      \u003ctd class=\"region\">${DL(REVENUE_REGION[i], REVENUE_REGION_SK[i])}\u003c/td>\n      \u003ctd>${REVENUE_KITCHENS[i].toLocaleString('en-CH')}\u003c/td>\n      \u003ctd>CHF ${BLENDED_ARPU_MONTHLY_CHF}/mo\u003c/td>\n      \u003ctd>CHF ${REVENUE_ILLUSTRATIVE_CHF[i].toLocaleString('en-CH')}\u003c/td>\n    \u003c/tr>\n  `).join('');\n  document.getElementById('assumptionsTable').innerHTML = `\n    \u003cthead>\u003ctr>\u003cth>${DL('Year','Rok')}\u003c/th>\u003cth>${DL('Region','Región')}\u003c/th>\u003cth>${DL('Paying kitchens','Platiace kuchyne')}\u003c/th>\u003cth>${DL('Blended ARPU','Blended ARPU')}\u003c/th>\u003cth>ARR\u003c/th>\u003c/tr>\u003c/thead>\n    \u003ctbody>${rows}\u003c/tbody>\n  `;\n}\n\n/* Revenue-stream map — qualitative positioning (readiness × potential), the panel's verdict,\n   not revenue numbers. Colours match the three staged columns above. */\nconst STREAMS = [\n  {x:.95,y:.80,s:'now',   l:'Subscription',        l_sk:'Predplatné'},\n  {x:.90,y:.45,s:'now',   l:'Founding pre-sale',   l_sk:'Founding pre-sale'},\n  {x:.84,y:.57,s:'now',   l:'Onboarding',          l_sk:'Onboarding'},\n  {x:.55,y:.87,s:'after', l:'Enterprise / chains', l_sk:'Enterprise / reťazce'},\n  {x:.26,y:.70,s:'vision',l:'AI & data flywheel',  l_sk:'AI + dátový flywheel'},\n  {x:.13,y:.96,s:'vision',l:'Supplier marketplace',l_sk:'Dodávateľský marketplace'},\n];\nconst STREAM_COLORS = { now:'#34F7D7', after:'#F7C948', vision:'#8B93FF' };\nfunction renderStreamMatrix(){\n  const wrap = document.getElementById('streamMatrixWrap');\n  if(!wrap) return;\n  const W=640,H=320,padL=44,padR=150,padT=22,padB=40;\n  const plotW=W-padL-padR, plotH=H-padT-padB;\n  let grid='';\n  for(let i=0;i\u003c=4;i++){\n    const gx=padL+(i/4)*plotW, gy=padT+(i/4)*plotH;\n    grid+=`\u003cline x1=\"${gx.toFixed(1)}\" y1=\"${padT}\" x2=\"${gx.toFixed(1)}\" y2=\"${padT+plotH}\" stroke=\"var(--rule-soft)\" stroke-width=\"1\"/>`;\n    grid+=`\u003cline x1=\"${padL}\" y1=\"${gy.toFixed(1)}\" x2=\"${padL+plotW}\" y2=\"${gy.toFixed(1)}\" stroke=\"var(--rule-soft)\" stroke-width=\"1\"/>`;\n  }\n  const dots = STREAMS.map(s=>{\n    const cx=padL+s.x*plotW, cy=padT+(1-s.y)*plotH;\n    const col=STREAM_COLORS[s.s];\n    const label=DL(s.l,s.l_sk);\n    const right = cx \u003c padL+plotW-70;\n    const tx = right ? cx+9 : cx-9;\n    const anchor = right ? 'start' : 'end';\n    return `\u003ccircle cx=\"${cx.toFixed(1)}\" cy=\"${cy.toFixed(1)}\" r=\"6\" fill=\"${col}\" stroke=\"var(--bg)\" stroke-width=\"1.5\">\u003ctitle>${label}\u003c/title>\u003c/circle>\n      \u003ctext x=\"${tx.toFixed(1)}\" y=\"${(cy+3.5).toFixed(1)}\" text-anchor=\"${anchor}\" font-size=\"10.5\" fill=\"var(--ink-dim)\">${label}\u003c/text>`;\n  }).join('');\n  const midY = padT+plotH/2;\n  const axisLabels = `\n    \u003ctext x=\"${padL}\" y=\"${H-8}\" text-anchor=\"start\" font-size=\"10\" fill=\"var(--ink-faint)\">${_lang==='sk'?'← vízia / dlhodobé':'← vision / long-term'}\u003c/text>\n    \u003ctext x=\"${padL+plotW}\" y=\"${H-8}\" text-anchor=\"end\" font-size=\"10\" fill=\"var(--ink-faint)\">${_lang==='sk'?'spustiteľné teraz →':'launchable now →'}\u003c/text>\n    \u003ctext x=\"14\" y=\"${midY.toFixed(1)}\" font-size=\"10\" fill=\"var(--ink-faint)\" transform=\"rotate(-90 14 ${midY.toFixed(1)})\" text-anchor=\"middle\">${_lang==='sk'?'← nižší    potenciál toku    vyšší →':'← lower    stream potential    higher →'}\u003c/text>`;\n  wrap.innerHTML = `\u003csvg viewBox=\"0 0 ${W} ${H}\" style=\"width:100%; min-width:520px; height:auto; display:block;\">\n    ${grid}\n    \u003cline x1=\"${padL}\" y1=\"${padT+plotH}\" x2=\"${padL+plotW}\" y2=\"${padT+plotH}\" stroke=\"var(--rule)\" stroke-width=\"1.5\"/>\n    \u003cline x1=\"${padL}\" y1=\"${padT}\" x2=\"${padL}\" y2=\"${padT+plotH}\" stroke=\"var(--rule)\" stroke-width=\"1.5\"/>\n    ${dots}\n    ${axisLabels}\n  \u003c/svg>`;\n  const legend=document.getElementById('streamLegend');\n  if(legend){\n    const L=[['now', _lang==='sk'?'Teraz':'Now'],['after',_lang==='sk'?'Po triale':'After trial'],['vision',_lang==='sk'?'Vízia':'Vision']];\n    legend.innerHTML = L.map(([k,lab])=>`\u003cspan>\u003ci class=\"legend-dot\" style=\"border-radius:50%; background:${STREAM_COLORS[k]};\">\u003c/i>${lab}\u003c/span>`).join('');\n  }\n}\n\n/* Active-section highlight in the sticky nav via IntersectionObserver. */\nfunction initPageNav(){\n  const links = Array.from(document.querySelectorAll('#pageNav a'));\n  const sections = links.map(a => document.getElementById(a.getAttribute('href').slice(1)));\n  const observer = new IntersectionObserver((entries)=>{\n    entries.forEach(entry=>{\n      if(!entry.isIntersecting) return;\n      const id = entry.target.id;\n      links.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + id));\n    });\n  }, { rootMargin: '-30% 0px -60% 0px', threshold: 0 });\n  sections.forEach(s => s && observer.observe(s));\n}\n\n/* Reveal-on-scroll + reading progress (additive; gated on the .js class so nothing hides without JS). */\nfunction initReveal(){\n  document.documentElement.classList.add('js');\n  const els = Array.from(document.querySelectorAll('.reveal'));\n  if(!('IntersectionObserver' in window)){ els.forEach(e=>e.classList.add('in')); return; }\n  const io = new IntersectionObserver((entries)=>{\n    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });\n  }, { rootMargin:'0px 0px -8% 0px', threshold:0.06 });\n  els.forEach(e=>io.observe(e));\n}\nfunction initProgress(){\n  const bar = document.getElementById('progress');\n  if(!bar) return;\n  const onScroll = ()=>{\n    const h = document.documentElement;\n    const max = h.scrollHeight - h.clientHeight;\n    bar.style.width = (max > 0 ? (h.scrollTop / max) * 100 : 0) + '%';\n  };\n  window.addEventListener('scroll', onScroll, { passive:true });\n  onScroll();\n}\n\ndocument.getElementById('footNote').innerHTML = `Sautero · generated ${GENERATED} · kept in sync with docs/ROADMAP.md · \u003ca href=\"monetization.html\">monetization.html\u003c/a>`;\nrenderHeadlineStats();\nrenderMarket();\nrenderKPIGroups();\nrenderMaturity();\nrenderHoursBars();\nrenderProcess();\nrenderGantt();\nrenderRevenueChart();\nrenderAssumptionsTable();\nrenderStreamMatrix();\ninitPageNav();\ninitReveal();\ninitProgress();\n\u003c/script>\n\n\u003cdiv class=\"sautero-stamp\" data-sk=\"🔄 Stav Sautero k 22. 7. 2026, 15:54\" data-en=\"🔄 Sautero state as of Jul 22, 2026, 15:54\">🔄 Stav Sautero k 22. 7. 2026, 15:54\u003c/div>\n\u003cbutton class=\"sautero-lang-fab\" id=\"sauteroLangFab\" onclick=\"sauteroToggleLang()\">EN\u003c/button>\n\n\u003cscript>\n/* Shared SK/EN toggle for /visual data/ docs — same sautero_doc_lang key as the rest, so one\n   switch follows you across every document. Translates [data-sk]/[data-en] pairs (chrome,\n   stamp, and every static narrative section); JS-rendered parts re-render via rerenderDeck(). */\n(function(){\n  let lang = localStorage.getItem('sautero_doc_lang') || 'sk';\n  function apply(){\n    document.querySelectorAll('[data-sk]').forEach(el=>{\n      const val = lang === 'sk' ? el.getAttribute('data-sk') : (el.getAttribute('data-en') || el.getAttribute('data-sk'));\n      if(val.indexOf('\u003c') !== -1) el.innerHTML = val; else el.textContent = val;\n    });\n    const b = document.getElementById('sauteroLangFab');\n    if(b) b.textContent = lang === 'sk' ? 'EN' : 'SK';\n    document.documentElement.lang = lang;\n  }\n  window.sauteroToggleLang = function(){\n    lang = lang === 'sk' ? 'en' : 'sk';\n    localStorage.setItem('sautero_doc_lang', lang);\n    if(typeof _lang !== 'undefined'){ _lang = lang; }\n    apply();\n    if(typeof rerenderDeck === 'function') rerenderDeck();\n  };\n  apply();\n})();\n\u003c/script>\n\u003c/body>\n\u003c/html>\n", "\u003c!DOCTYPE html>\n\u003chtml lang=\"en\">\n\u003chead>\n\u003cmeta charset=\"UTF-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n\u003cmeta http-equiv=\"Cache-Control\" content=\"no-cache, no-store, must-revalidate\">\n\u003cmeta http-equiv=\"Pragma\" content=\"no-cache\">\n\u003cmeta http-equiv=\"Expires\" content=\"0\">\n\u003ctitle>Sautero — Chaos Is Optional\u003c/title>\n\u003cstyle>\n  :root{\n    --bg: #0A1A2F;\n    --surface: #122845;\n    --surface-raised: #0f2340;\n    --ink: #fff;\n    --ink-dim: #9C949E;\n    --ink-faint: rgba(156,148,158,0.6);\n    --rule: #223d57;\n    --copper: #34F7D7;\n    --copper-dim: rgba(52,247,215,0.4);\n    --copper-wash: rgba(52,247,215,0.08);\n    --sage: #F7C948;\n    --sage-wash: rgba(247,201,72,0.08);\n    --rust: #FF7A68;\n  }\n  @media (prefers-color-scheme: light){\n    :root{\n      --bg: #0A1A2F;\n      --surface: #122845;\n      --surface-raised: #0f2340;\n      --ink: #fff;\n      --ink-dim: #9C949E;\n      --ink-faint: rgba(156,148,158,0.6);\n      --rule: #223d57;\n      --copper: #34F7D7;\n      --copper-dim: rgba(52,247,215,0.4);\n      --copper-wash: rgba(52,247,215,0.08);\n      --sage: #F7C948;\n      --sage-wash: rgba(247,201,72,0.08);\n      --rust: #FF7A68;\n    }\n  }\n  :root[data-theme=\"dark\"]{\n    --bg: #0A1A2F; --surface: #122845; --surface-raised: #0f2340;\n    --ink: #fff; --ink-dim: #9C949E; --ink-faint: rgba(156,148,158,0.6); --rule: #223d57;\n    --copper: #34F7D7; --copper-dim: rgba(52,247,215,0.4); --copper-wash: rgba(52,247,215,0.08);\n    --sage: #F7C948; --sage-wash: rgba(247,201,72,0.08); --rust: #FF7A68;\n  }\n  :root[data-theme=\"light\"]{\n    --bg: #0A1A2F; --surface: #122845; --surface-raised: #0f2340;\n    --ink: #fff; --ink-dim: #9C949E; --ink-faint: rgba(156,148,158,0.6); --rule: #223d57;\n    --copper: #34F7D7; --copper-dim: rgba(52,247,215,0.4); --copper-wash: rgba(52,247,215,0.08);\n    --sage: #F7C948; --sage-wash: rgba(247,201,72,0.08); --rust: #FF7A68;\n  }\n\n  *{ box-sizing:border-box; }\n  html{ scroll-behavior:smooth; }\n  html,body{ margin:0; padding:0; background:var(--bg); overflow-x:hidden; }\n  body{\n    color: var(--ink);\n    font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;\n    line-height: 1.6;\n    -webkit-font-smoothing: antialiased;\n  }\n  ::selection{ background: var(--copper); color: var(--bg); }\n  .serif{ font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; font-weight: 700; }\n  .mono{ font-family: \"SF Mono\", Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }\n  a{ color:inherit; }\n\n  .wrap{ max-width: 1040px; margin: 0 auto; padding: 0 28px; }\n  .prose{ max-width: 640px; }\n\n  .eyebrow{\n    font-family: \"SF Mono\", Menlo, monospace;\n    font-size: 11.5px; letter-spacing: 0.22em; text-transform: uppercase;\n    color: var(--copper); font-weight:600;\n    display:flex; align-items:center; gap:10px;\n    margin-bottom: 22px;\n  }\n  .eyebrow::before{ content:''; width:22px; height:1px; background:var(--copper); }\n\n  h2.head{\n    font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; font-weight: 700;\n    font-size: clamp(30px, 4.4vw, 46px);\n    font-weight: 500;\n    line-height: 1.14;\n    letter-spacing: -0.01em;\n    text-wrap: balance;\n    margin: 0 0 26px 0;\n  }\n\n  section{ padding: 118px 0; border-bottom: 1px solid var(--rule); }\n  section:last-of-type{ border-bottom:none; }\n\n  .reveal{ opacity:0; transform: translateY(18px); transition: opacity 0.7s ease, transform 0.7s ease; }\n  .reveal.visible{ opacity:1; transform: translateY(0); }\n  @media (prefers-reduced-motion: reduce){\n    .reveal{ opacity:1; transform:none; transition:none; }\n  }\n\n  /* ================= HERO ================= */\n  .hero{\n    min-height: 92vh;\n    display:flex; flex-direction:column; justify-content:center;\n    padding: 140px 0 90px 0;\n    border-bottom: 1px solid var(--rule);\n    position:relative;\n  }\n  .hero-mark{\n    font-family: \"SF Mono\", Menlo, monospace;\n    font-size: 12px; letter-spacing: 0.3em; text-transform:uppercase;\n    color: var(--ink-faint); margin-bottom: 46px;\n    display:flex; align-items:center; gap:12px;\n  }\n  .hero-mark .pulse{\n    width:7px; height:7px; border-radius:50%; background:var(--copper);\n    animation: pulse 2.4s ease-in-out infinite;\n  }\n  @keyframes pulse{ 0%,100%{ opacity:1; } 50%{ opacity:0.25; } }\n  h1.hero-head{\n    font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; font-weight: 700;\n    font-size: clamp(40px, 7.4vw, 84px);\n    font-weight: 500;\n    line-height: 1.06;\n    letter-spacing: -0.015em;\n    max-width: 15ch;\n    margin: 0 0 34px 0;\n  }\n  h1.hero-head .ln{ display:block; overflow:hidden; }\n  h1.hero-head .ln span{\n    display:inline-block;\n    opacity:0; transform: translateY(100%);\n    animation: riseIn 0.85s cubic-bezier(.2,.8,.2,1) forwards;\n  }\n  @keyframes riseIn{ to{ opacity:1; transform:translateY(0); } }\n  @media (prefers-reduced-motion: reduce){\n    h1.hero-head .ln span{ animation:none; opacity:1; transform:none; }\n  }\n  .hero-sub{\n    font-size: 19px; color: var(--ink-dim);\n    max-width: 46ch; margin: 0 0 40px 0;\n    opacity:0; animation: fadeUp 0.8s ease 1.05s forwards;\n  }\n  @media (prefers-reduced-motion: reduce){ .hero-sub{ opacity:1; animation:none; } }\n  @keyframes fadeUp{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }\n  .hero-foot{\n    display:flex; flex-wrap:wrap; gap: 10px 24px;\n    font-size: 12.5px; color: var(--ink-faint);\n    padding-top: 22px; border-top:1px solid var(--rule); max-width:520px;\n    opacity:0; animation: fadeUp 0.8s ease 1.3s forwards;\n  }\n  @media (prefers-reduced-motion: reduce){ .hero-foot{ opacity:1; animation:none; } }\n  .hero-foot b{ color:var(--ink-dim); font-weight:600; }\n\n  /* ================= PROBLEM ================= */\n  .problem-lines{ font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; }\n  .problem-lines p{\n    font-size: clamp(19px, 2.6vw, 25px);\n    line-height: 1.55;\n    color: var(--ink-dim);\n    margin: 0 0 20px 0;\n    max-width: 30ch;\n  }\n  .problem-lines p.final{\n    color: var(--ink);\n    margin-top: 44px;\n    padding-top: 30px;\n    border-top: 1px solid var(--rule);\n    max-width: none;\n  }\n  .problem-lines p.final b{ color: var(--copper); font-weight:600; font-style:normal; }\n\n  /* ================= VISION ================= */\n  .vision-quote{\n    font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;\n    font-style: italic;\n    font-size: clamp(22px, 3vw, 30px);\n    line-height: 1.4;\n    color: var(--ink);\n    max-width: 20ch;\n    margin: 46px 0 0 0;\n    padding-left: 24px;\n    border-left: 2px solid var(--copper-dim);\n  }\n  .vision-body p{ font-size:17px; color:var(--ink-dim); margin:0 0 16px 0; }\n\n  /* ================= TRANSFORM (before/after) ================= */\n  .xform{ border-top: 1px solid var(--rule); }\n  .xform-row{\n    display:grid;\n    grid-template-columns: 1fr 30px 1.15fr;\n    align-items: center;\n    gap: 22px;\n    padding: 34px 0;\n    border-bottom: 1px solid var(--rule);\n  }\n  .xform-before{\n    font-size: 14.5px;\n    color: var(--ink-faint);\n    line-height:1.5;\n  }\n  .xform-before .lbl{ display:block; font-family:\"SF Mono\",monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:6px; }\n  .xform-arrow{ color: var(--copper-dim); font-size:18px; text-align:center; }\n  .xform-after .lbl{ display:block; font-family:\"SF Mono\",monospace; font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:var(--sage); margin-bottom:6px; }\n  .xform-after .headline{\n    font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;\n    font-size: 21px; font-weight:500; color:var(--ink); margin-bottom:6px; line-height:1.3;\n  }\n  .xform-after .detail{ font-size:14px; color:var(--ink-dim); line-height:1.5; }\n  @media (max-width: 640px){\n    .xform-row{ grid-template-columns: 1fr; gap:10px; }\n    .xform-arrow{ text-align:left; transform:rotate(90deg); width:18px; }\n  }\n\n  /* ================= ROADMAP (spine) ================= */\n  .spine{ position:relative; margin-top: 50px; }\n  .spine::before{\n    content:''; position:absolute; left:9px; top:8px; bottom:8px; width:1px;\n    background: linear-gradient(to bottom, var(--copper-dim), var(--rule) 70%);\n  }\n  .stage{ position:relative; padding: 0 0 46px 46px; }\n  .stage:last-child{ padding-bottom:0; }\n  .stage-dot{\n    position:absolute; left:0; top:3px;\n    width:19px; height:19px; border-radius:50%;\n    background: var(--bg); border: 2px solid var(--rule);\n    display:flex; align-items:center; justify-content:center;\n  }\n  .stage-dot::after{ content:''; width:7px; height:7px; border-radius:50%; }\n  .stage.live .stage-dot{ border-color: var(--sage); }\n  .stage.live .stage-dot::after{ background: var(--sage); }\n  .stage.emerging .stage-dot{ border-color: var(--copper); }\n  .stage.emerging .stage-dot::after{ background: var(--copper); }\n  .stage.ahead .stage-dot::after{ background: transparent; }\n  .stage-top{ display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; margin-bottom:6px; }\n  .stage-name{ font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; font-size:22px; font-weight:500; }\n  .stage-tag{\n    font-family:\"SF Mono\",monospace; font-size:10px; letter-spacing:0.12em; text-transform:uppercase;\n    padding:2px 8px; border-radius:999px; border:1px solid var(--rule); color:var(--ink-faint);\n  }\n  .stage.live .stage-tag{ color:var(--sage); border-color:var(--sage); background:var(--sage-wash); }\n  .stage.emerging .stage-tag{ color:var(--copper); border-color:var(--copper-dim); background:var(--copper-wash); }\n  .stage-desc{ font-size:15px; color:var(--ink-dim); max-width:52ch; }\n\n  /* ================= PROGRESS ================= */\n  .progress-body p{ font-size:18px; color:var(--ink-dim); max-width:64ch; line-height:1.65; }\n  .progress-body strong{ color:var(--ink); font-weight:600; }\n  .progress-stats{\n    display:flex; flex-wrap:wrap; gap: 40px;\n    margin-top: 54px; padding-top: 34px; border-top:1px solid var(--rule);\n  }\n  .pstat .n{ font-family:\"SF Mono\",monospace; font-size:34px; font-weight:600; color:var(--copper); font-variant-numeric:tabular-nums; }\n  .pstat .l{ font-size:12px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-faint); margin-top:4px; max-width:16ch; }\n\n  /* ================= FOOTER ================= */\n  footer{ padding: 60px 0 70px 0; }\n  footer .wrap{ display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; font-size:12.5px; color:var(--ink-faint); }\n\n  /* ================= SPARK — kinetic energy pass (21.7.) ================= */\n  .hero{ overflow:hidden; }\n  .hero::before{\n    content:''; position:absolute; inset:-12% -18% auto -18%; height:72%; z-index:-1;\n    background:radial-gradient(58% 60% at 28% 18%, rgba(52,247,215,0.11), transparent 62%),\n               radial-gradient(48% 50% at 82% 8%, rgba(247,201,72,0.06), transparent 60%);\n    pointer-events:none; filter:blur(4px); animation:heat 15s ease-in-out infinite alternate;\n  }\n  @keyframes heat{ 0%{ transform:translate3d(0,0,0) scale(1); } 100%{ transform:translate3d(2%,-3%,0) scale(1.09); } }\n  h1.hero-head .ln:last-child span{ position:relative; }\n  h1.hero-head .ln:last-child span::after{\n    content:''; position:absolute; left:0; bottom:-6px; height:3px; width:100%;\n    background:var(--copper); border-radius:2px; transform:scaleX(0); transform-origin:left;\n    animation:drawU .7s cubic-bezier(.2,.8,.2,1) 1.15s forwards;\n  }\n  @keyframes drawU{ to{ transform:scaleX(1); } }\n  .chaos-ticker{\n    font-family:\"SF Mono\",Menlo,monospace; font-size:13px; color:var(--ink-faint);\n    margin:0 0 40px 0; display:flex; align-items:center; gap:12px; flex-wrap:wrap;\n    opacity:0; animation:fadeUp .8s ease 1.2s forwards;\n  }\n  .chaos-ticker b{ color:var(--copper); font-weight:600; }\n  .scroll-cue{ position:absolute; left:28px; bottom:26px; font-family:\"SF Mono\",monospace; font-size:10.5px;\n    letter-spacing:0.2em; text-transform:uppercase; color:var(--ink-faint); display:flex; align-items:center; gap:9px;\n    opacity:0; animation:fadeUp 1s ease 1.6s forwards; }\n  .scroll-cue .arr{ display:inline-block; width:1px; height:26px; background:linear-gradient(var(--copper),transparent); animation:cue 1.8s ease-in-out infinite; }\n  @keyframes cue{ 0%,100%{ transform:translateY(0); opacity:.4; } 50%{ transform:translateY(6px); opacity:1; } }\n\n  .problem-lines.chaos p:not(.final){\n    display:inline-block; background:var(--surface-raised); border:1px solid var(--rule);\n    border-radius:4px; padding:14px 18px; margin:0 16px 18px 0; max-width:34ch; color:var(--ink-dim);\n    box-shadow:0 8px 22px rgba(0,0,0,0.30); transition:transform .22s ease, border-color .22s ease;\n  }\n  .problem-lines.chaos p:nth-of-type(1){ transform:rotate(-1.6deg); }\n  .problem-lines.chaos p:nth-of-type(2){ transform:rotate(1.2deg); }\n  .problem-lines.chaos p:nth-of-type(3){ transform:rotate(-0.7deg); }\n  .problem-lines.chaos p:nth-of-type(4){ transform:rotate(1.9deg); }\n  .problem-lines.chaos p:nth-of-type(5){ transform:rotate(-1.2deg); }\n  .problem-lines.chaos p:not(.final):hover{ transform:rotate(0) translateY(-3px); border-color:var(--copper-dim); }\n  .problem-lines.chaos p.final{ display:block; font-size:clamp(23px,3.2vw,32px); }\n\n  .vision-quote{ position:relative; }\n  .vision-quote::before{ content:'\\201C'; position:absolute; left:-6px; top:-0.55em; font-family:Georgia,\"Times New Roman\",serif;\n    font-size:86px; line-height:1; color:var(--copper-dim); pointer-events:none; }\n\n  .spine::before{ transform:scaleY(0); transform-origin:top; transition:transform 1.3s cubic-bezier(.2,.8,.2,1); }\n  .spine.visible::before{ transform:scaleY(1); }\n  .stage.live .stage-dot{ animation:dotpulse 2.6s ease-in-out infinite; }\n  @keyframes dotpulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(247,201,72,0.5);} 50%{ box-shadow:0 0 0 6px rgba(247,201,72,0);} }\n\n  .closing{ text-align:center; padding:118px 0; border-bottom:none; }\n  .closing .big{\n    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif; font-weight:600;\n    font-size:clamp(40px,8vw,92px); line-height:1.03; letter-spacing:-0.02em; margin:0; text-wrap:balance;\n  }\n  .closing .big em{ color:var(--copper); font-style:normal; }\n  .closing .sub{ color:var(--ink-dim); font-size:15px; margin-top:26px; font-family:\"SF Mono\",Menlo,monospace; letter-spacing:0.04em; }\n\n  @media (prefers-reduced-motion:reduce){\n    .hero::before, .scroll-cue .arr, .stage.live .stage-dot{ animation:none; }\n    h1.hero-head .ln:last-child span::after{ transform:scaleX(1); animation:none; }\n    .chaos-ticker, .scroll-cue{ opacity:1; animation:none; }\n    .spine::before{ transform:scaleY(1); transition:none; }\n  }\n\n  /* Reading-progress bar — consistency with the elevated Investor Deck (21.7.). */\n  #mprogress{ position:fixed; top:0; left:0; height:3px; width:0; z-index:100;\n    background:linear-gradient(90deg, #0F6E56, #34F7D7); box-shadow:0 0 12px rgba(52,247,215,0.4); transition:width .08s linear; }\n  @media print{ #mprogress{ display:none; } }\n\n  /* ---------- Sautero stamp + language fab (Richard, 15.7.: every /visual data/ document\n     carries a last-updated-to-Sautero-state badge and an SK/EN toggle) ---------- */\n  .sautero-stamp{\n    position:fixed; bottom:14px; right:14px; z-index:90;\n    background:rgba(15,35,64,0.92); border:1px solid rgba(52,247,215,0.4); color:#34F7D7;\n    font-size:10.5px; font-weight:700; font-family:\"SF Mono\",Menlo,Consolas,monospace;\n    padding:6px 12px; border-radius:999px;\n    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); pointer-events:none;\n  }\n  .sautero-lang-fab{\n    position:fixed; top:14px; right:14px; z-index:90;\n    background:rgba(15,35,64,0.92); border:1px solid #223d57; color:#9C949E;\n    font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;\n    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;\n    padding:7px 14px; border-radius:999px; cursor:pointer;\n    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);\n    transition:border-color .15s, color .15s;\n  }\n  .sautero-lang-fab:hover{ border-color:rgba(52,247,215,0.4); color:#34F7D7; }\n  @media print{ .sautero-stamp, .sautero-lang-fab{ display:none; } }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\u003cdiv id=\"mprogress\">\u003c/div>\n\u003cdiv class=\"hero\">\n  \u003cdiv class=\"wrap\">\n    \u003cdiv class=\"hero-mark\">\u003cspan class=\"pulse\">\u003c/span>Sautero — an operating system for professional kitchens\u003c/div>\n    \u003ch1 class=\"hero-head\">\n      \u003cspan class=\"ln\">\u003cspan style=\"animation-delay:.05s\">Kitchens have run\u003c/span>\u003c/span>\n      \u003cspan class=\"ln\">\u003cspan style=\"animation-delay:.20s\">on chaos for a\u003c/span>\u003c/span>\n      \u003cspan class=\"ln\">\u003cspan style=\"animation-delay:.35s\">hundred years.\u003c/span>\u003c/span>\n      \u003cspan class=\"ln\">\u003cspan style=\"animation-delay:.55s; color:var(--copper);\">We think that's optional.\u003c/span>\u003c/span>\n    \u003c/h1>\n    \u003cp class=\"hero-sub\">Built inside a real kitchen, not around one. One shared place for what a kitchen knows, what's happening right now, and what tomorrow needs — instead of twelve notebooks and somebody's memory.\u003c/p>\n    \u003cdiv class=\"chaos-ticker\" data-sk='\u003cspan>12 zošitov · 1 pamäť šéfkuchára · 0 záloh\u003c/span> \u003cb>→ 1 spoločný mozog\u003c/b>' data-en='\u003cspan>12 notebooks · 1 chef&#39;s memory · 0 backups\u003c/span> \u003cb>→ 1 shared brain\u003c/b>'>\u003cspan>12 notebooks · 1 chef's memory · 0 backups\u003c/span> \u003cb>→ 1 shared brain\u003c/b>\u003c/div>\n    \u003cdiv class=\"hero-foot\">\n      \u003cspan>\u003cb>Status\u003c/b> Working build, in daily use\u003c/span>\n      \u003cspan>\u003cb>Built by\u003c/b> Richard Červenka\u003c/span>\n      \u003cspan>\u003cb>Where\u003c/b> Bern\u003c/span>\n    \u003c/div>\n  \u003c/div>\n  \u003cdiv class=\"scroll-cue\">\u003cspan class=\"arr\">\u003c/span>\u003cspan data-sk=\"Čítaj ďalej\" data-en=\"Read on\">Read on\u003c/span>\u003c/div>\n\u003c/div>\n\n\u003csection>\n  \u003cdiv class=\"wrap\">\n    \u003cdiv class=\"eyebrow reveal\">The Problem\u003c/div>\n    \u003ch2 class=\"head reveal\">Every kitchen has accepted the same chaos.\u003c/h2>\n    \u003cdiv class=\"problem-lines chaos reveal\">\n      \u003cp>The head chef's technique lives in her head, and nowhere else.\u003c/p>\n      \u003cp>A note gets passed at the pass, and half of it never reaches the line.\u003c/p>\n      \u003cp>Prep gets forgotten until the first ticket's already up.\u003c/p>\n      \u003cp>A tray goes in the bin, and nobody can say what it actually cost.\u003c/p>\n      \u003cp>Something goes wrong — and the question becomes \u003cem>who\u003c/em>, never \u003cem>why\u003c/em>.\u003c/p>\n      \u003cp class=\"final\">Every kitchen has learned to live with this. \u003cb>Sautero hasn't.\u003c/b>\u003c/p>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003csection>\n  \u003cdiv class=\"wrap\">\n    \u003cdiv style=\"display:grid; grid-template-columns: 1.1fr 0.9fr; gap:60px; align-items:start;\">\n      \u003cdiv>\n        \u003cdiv class=\"eyebrow reveal\">The Vision\u003c/div>\n        \u003ch2 class=\"head reveal\">A kitchen that remembers.\u003c/h2>\n        \u003cdiv class=\"vision-body prose reveal\">\n          \u003cp>Software changed how companies keep the truth — one record everyone trusts, instead of a dozen private ones. Kitchens never got that.\u003c/p>\n          \u003cp>Sautero treats a kitchen the same way. What one cook knows, every cook can know. What's happening on the line right now is visible to whoever needs to see it — not just whoever's shouting loudest.\u003c/p>\n          \u003cp>Nothing depends on being remembered, because nothing has to be.\u003c/p>\n        \u003c/div>\n      \u003c/div>\n      \u003cblockquote class=\"vision-quote reveal\">Chaos isn't a kitchen tradition. It's just the oldest bug nobody's fixed.\u003c/blockquote>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003csection class=\"xform\">\n  \u003cdiv class=\"wrap\">\n    \u003cdiv class=\"eyebrow reveal\">What It Does Today\u003c/div>\n    \u003ch2 class=\"head reveal\">Not features. A different kitchen.\u003c/h2>\n\n    \u003cdiv class=\"xform-row reveal\">\n      \u003cdiv class=\"xform-before\">\u003cspan class=\"lbl\">Before\u003c/span>Recipes live in binders, sticky notes, and one chef's memory.\u003c/div>\n      \u003cdiv class=\"xform-arrow\">→\u003c/div>\n      \u003cdiv class=\"xform-after\">\n        \u003cspan class=\"lbl\">After\u003c/span>\n        \u003cdiv class=\"headline\">Shared kitchen knowledge.\u003c/div>\n        \u003cdiv class=\"detail\">Every recipe, in one place, built for a working line — not a cookbook shelf.\u003c/div>\n      \u003c/div>\n    \u003c/div>\n\n    \u003cdiv class=\"xform-row reveal\">\n      \u003cdiv class=\"xform-before\">\u003cspan class=\"lbl\">Before\u003c/span>Nobody knows what a dish costs until the invoices land.\u003c/div>\n      \u003cdiv class=\"xform-arrow\">→\u003c/div>\n      \u003cdiv class=\"xform-after\">\n        \u003cspan class=\"lbl\">After\u003c/span>\n        \u003cdiv class=\"headline\">Know exactly what every plate costs.\u003c/div>\n        \u003cdiv class=\"detail\">Calculated automatically, ingredient by ingredient, the moment the recipe is written.\u003c/div>\n      \u003c/div>\n    \u003c/div>\n\n    \u003cdiv class=\"xform-row reveal\">\n      \u003cdiv class=\"xform-before\">\u003cspan class=\"lbl\">Before\u003c/span>Substitutions and seasonality live in someone's memory, if anywhere.\u003c/div>\n      \u003cdiv class=\"xform-arrow\">→\u003c/div>\n      \u003cdiv class=\"xform-after\">\n        \u003cspan class=\"lbl\">After\u003c/span>\n        \u003cdiv class=\"headline\">Every ingredient carries its own knowledge.\u003c/div>\n        \u003cdiv class=\"detail\">Where it's from, when it's in season, what replaces it — one tap from any recipe.\u003c/div>\n      \u003c/div>\n    \u003c/div>\n\n    \u003cdiv class=\"xform-row reveal\">\n      \u003cdiv class=\"xform-before\">\u003cspan class=\"lbl\">Before\u003c/span>Tomorrow's prep list gets handwritten tonight, half-followed tomorrow.\u003c/div>\n      \u003cdiv class=\"xform-arrow\">→\u003c/div>\n      \u003cdiv class=\"xform-after\">\n        \u003cspan class=\"lbl\">After\u003c/span>\n        \u003cdiv class=\"headline\">Everyone knows what's finished. No shouting. No guessing.\u003c/div>\n        \u003cdiv class=\"detail\">Write the list once, in seconds. Everyone on tomorrow's shift reads the same one.\u003c/div>\n      \u003c/div>\n    \u003c/div>\n\n    \u003cdiv class=\"xform-row reveal\" style=\"border-bottom:none;\">\n      \u003cdiv class=\"xform-before\">\u003cspan class=\"lbl\">Before\u003c/span>Ordering happens from memory, station by station.\u003c/div>\n      \u003cdiv class=\"xform-arrow\">→\u003c/div>\n      \u003cdiv class=\"xform-after\">\n        \u003cspan class=\"lbl\">After\u003c/span>\n        \u003cdiv class=\"headline\">Nobody forgets what needs ordering.\u003c/div>\n        \u003cdiv class=\"detail\">One list, organized the way the kitchen actually works — not the way a spreadsheet does.\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003csection>\n  \u003cdiv class=\"wrap\">\n    \u003cdiv class=\"eyebrow reveal\">Where This Goes\u003c/div>\n    \u003ch2 class=\"head reveal\">Eight ideas, one at a time.\u003c/h2>\n    \u003cp class=\"prose reveal\" style=\"color:var(--ink-dim); font-size:16px; margin-top:-10px;\">Built in the order a real kitchen would ask for them — not the order that's easiest to code.\u003c/p>\n\n    \u003cdiv class=\"spine reveal\">\n      \u003cdiv class=\"stage live\">\n        \u003cdiv class=\"stage-dot\">\u003c/div>\n        \u003cdiv class=\"stage-top\">\u003cdiv class=\"stage-name\">Knowledge\u003c/div>\u003cdiv class=\"stage-tag\">Live\u003c/div>\u003c/div>\n        \u003cdiv class=\"stage-desc\">Get everything out of people's heads and onto one page everyone can read.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"stage live\">\n        \u003cdiv class=\"stage-dot\">\u003c/div>\n        \u003cdiv class=\"stage-top\">\u003cdiv class=\"stage-name\">Execution\u003c/div>\u003cdiv class=\"stage-tag\">Live\u003c/div>\u003c/div>\n        \u003cdiv class=\"stage-desc\">Turn that knowledge into what actually happens on the line, today.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"stage live\">\n        \u003cdiv class=\"stage-dot\">\u003c/div>\n        \u003cdiv class=\"stage-top\">\u003cdiv class=\"stage-name\">Communication\u003c/div>\u003cdiv class=\"stage-tag\">Live\u003c/div>\u003c/div>\n        \u003cdiv class=\"stage-desc\">Let the whole team see the same truth, in real time — and since July&nbsp;17, kitchens talk to each other too: public recipe &amp; ingredient shelves, sharing with chef friends, comments that cross kitchen walls.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"stage live\">\n        \u003cdiv class=\"stage-dot\">\u003c/div>\n        \u003cdiv class=\"stage-top\">\u003cdiv class=\"stage-name\">Inventory\u003c/div>\u003cdiv class=\"stage-tag\">Live\u003c/div>\u003c/div>\n        \u003cdiv class=\"stage-desc\">Know what you have before you run out of it.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"stage ahead\">\n        \u003cdiv class=\"stage-dot\">\u003c/div>\n        \u003cdiv class=\"stage-top\">\u003cdiv class=\"stage-name\">Production\u003c/div>\u003cdiv class=\"stage-tag\">Ahead\u003c/div>\u003c/div>\n        \u003cdiv class=\"stage-desc\">Plan a whole service, not one dish at a time.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"stage ahead\">\n        \u003cdiv class=\"stage-dot\">\u003c/div>\n        \u003cdiv class=\"stage-top\">\u003cdiv class=\"stage-name\">Intelligence\u003c/div>\u003cdiv class=\"stage-tag\">Ahead\u003c/div>\u003c/div>\n        \u003cdiv class=\"stage-desc\">Let the kitchen learn from its own patterns, instead of relying on gut alone.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"stage ahead\">\n        \u003cdiv class=\"stage-dot\">\u003c/div>\n        \u003cdiv class=\"stage-top\">\u003cdiv class=\"stage-name\">Multi-location\u003c/div>\u003cdiv class=\"stage-tag\">Ahead\u003c/div>\u003c/div>\n        \u003cdiv class=\"stage-desc\">One kitchen's knowledge becomes every kitchen's advantage.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"stage ahead\">\n        \u003cdiv class=\"stage-dot\">\u003c/div>\n        \u003cdiv class=\"stage-top\">\u003cdiv class=\"stage-name\">Platform\u003c/div>\u003cdiv class=\"stage-tag\">Ahead\u003c/div>\u003c/div>\n        \u003cdiv class=\"stage-desc\">In every pocket, on every line — whether or not the wifi is any good.\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003csection>\n  \u003cdiv class=\"wrap\">\n    \u003cdiv class=\"eyebrow reveal\">Right Now\u003c/div>\n    \u003ch2 class=\"head reveal\">This isn't a deck. It's running.\u003c/h2>\n    \u003cdiv class=\"progress-body reveal\">\n      \u003cp>\u003cstrong>183 real recipes\u003c/strong> carry real technique, not filler — every one enriched to Michelin depth. \u003cstrong>2,005 ingredients\u003c/strong> already know their own price, their season, and what stands in for them when they're out. Every plate already knows roughly what it costs, before it's ever been plated. None of this is a mockup — it's the build, in a working kitchen's hands, tonight.\u003c/p>\n    \u003c/div>\n    \u003cdiv class=\"progress-stats reveal\">\n      \u003cdiv class=\"pstat\">\u003cdiv class=\"n mono\">183\u003c/div>\u003cdiv class=\"l\">Recipes carrying real technique\u003c/div>\u003c/div>\n      \u003cdiv class=\"pstat\">\u003cdiv class=\"n mono\">2,005\u003c/div>\u003cdiv class=\"l\">Ingredients, priced &amp; seasoned\u003c/div>\u003c/div>\n      \u003cdiv class=\"pstat\">\u003cdiv class=\"n mono\">8\u003c/div>\u003cdiv class=\"l\">Stages on the way to done\u003c/div>\u003c/div>\n      \u003cdiv class=\"pstat\">\u003cdiv class=\"n mono\">1\u003c/div>\u003cdiv class=\"l\">Kitchen already using it\u003c/div>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003csection class=\"closing\">\n  \u003cdiv class=\"wrap\">\n    \u003cp class=\"big reveal\" data-sk=\"Chaos nie je nutnosť. \u003cem>Je to voľba.\u003c/em>\" data-en=\"Chaos isn't inevitable. \u003cem>It's a choice.\u003c/em>\">Chaos isn't inevitable. \u003cem>It's a choice.\u003c/em>\u003c/p>\n    \u003cp class=\"sub reveal\" data-sk=\"Postavené z kuchyne von. Bern, 2026.\" data-en=\"Built from the kitchen out. Bern, 2026.\">Built from the kitchen out. Bern, 2026.\u003c/p>\n  \u003c/div>\n\u003c/section>\n\n\u003cfooter>\n  \u003cdiv class=\"wrap\">\n    \u003cspan>\u003cspan data-sk=\"Sautero — stavané z kuchyne von.\" data-en=\"Sautero — built kitchen-side out.\">Sautero — built kitchen-side out.\u003c/span>\u003c/span>\n    \u003cspan>\u003cspan data-sk=\"Bern, 2026.\" data-en=\"Bern, 2026.\">Bern, 2026.\u003c/span>\u003c/span>\n  \u003c/div>\n\u003c/footer>\n\n\u003cscript>\n  if(!window.matchMedia('(prefers-reduced-motion: reduce)').matches){\n    const io = new IntersectionObserver((entries)=>{\n      entries.forEach(e=>{\n        if(e.isIntersecting){ e.target.classList.add('visible'); io.unobserve(e.target); }\n      });\n    }, { threshold: 0.15 });\n    document.querySelectorAll('.reveal').forEach(el=>io.observe(el));\n  } else {\n    document.querySelectorAll('.reveal').forEach(el=>el.classList.add('visible'));\n  }\n  (function(){\n    if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;\n    const stats = document.querySelector('.progress-stats');\n    if(!stats || !('IntersectionObserver' in window)) return;\n    const io2 = new IntersectionObserver((es)=>{\n      es.forEach(e=>{\n        if(!e.isIntersecting) return; io2.unobserve(e.target);\n        e.target.querySelectorAll('.pstat .n').forEach(el=>{\n          const target = parseInt(el.textContent.replace(/[^0-9]/g,''),10);\n          if(!target) return;\n          const t0 = performance.now(), dur = 1100;\n          (function tick(now){\n            const p = Math.min(1,(now-t0)/dur);\n            el.textContent = Math.round(target*(1-Math.pow(1-p,3))).toLocaleString('en-CH');\n            if(p\u003c1) requestAnimationFrame(tick);\n          })(t0);\n        });\n      });\n    }, { threshold:0.4 });\n    io2.observe(stats);\n  })();\n  (function(){\n    const bar = document.getElementById('mprogress');\n    if(!bar) return;\n    const onScroll = ()=>{ const h=document.documentElement; const max=h.scrollHeight-h.clientHeight;\n      bar.style.width = (max>0 ? (h.scrollTop/max)*100 : 0) + '%'; };\n    window.addEventListener('scroll', onScroll, { passive:true }); onScroll();\n  })();\n\u003c/script>\n\n\u003cdiv class=\"sautero-stamp\" data-sk=\"🔄 Stav Sautero k 21. 7. 2026\" data-en=\"🔄 Sautero state as of Jul 21, 2026\">🔄 Stav Sautero k 21. 7. 2026\u003c/div>\n\u003cbutton class=\"sautero-lang-fab\" id=\"sauteroLangFab\" onclick=\"sauteroToggleLang()\">EN\u003c/button>\n\n\u003cscript>\n/* Shared SK/EN toggle for /visual data/ docs without their own — same sautero_doc_lang key as\n   the rest, so one switch follows you across every document. Translates [data-sk]/[data-en]\n   pairs (chrome + stamp); untagged content stays in its original language. */\n(function(){\n  let lang = localStorage.getItem('sautero_doc_lang') || 'sk';\n  function apply(){\n    document.querySelectorAll('[data-sk]').forEach(el=>{\n      const val = lang === 'sk' ? el.getAttribute('data-sk') : (el.getAttribute('data-en') || el.getAttribute('data-sk'));\n      if(val.indexOf('\u003c') !== -1) el.innerHTML = val; else el.textContent = val;\n    });\n    const b = document.getElementById('sauteroLangFab');\n    if(b) b.textContent = lang === 'sk' ? 'EN' : 'SK';\n    document.documentElement.lang = lang;\n  }\n  window.sauteroToggleLang = function(){\n    lang = lang === 'sk' ? 'en' : 'sk';\n    localStorage.setItem('sautero_doc_lang', lang);\n    apply();\n  };\n  apply();\n})();\n\u003c/script>\n\u003cscript>\n/* t174 (18.7.): the Manifesto is bilingual — the HTML stays the EN original, MSK carries the\n   Slovak per selector index; the walker stashes EN innerHTML and swaps. Keep MSK in sync\n   with any content edit. */\n(function(){\n  const MSK = {\n    heroMark: 'Sautero — operačný systém pre profesionálne kuchyne',\n    heroLines: ['Kuchyne bežia', 'na chaose už', 'sto rokov.', 'Myslíme si, že to netreba.'],\n    heroSub: 'Stavané vnútri skutočnej kuchyne, nie okolo nej. Jedno spoločné miesto pre to, čo kuchyňa vie, čo sa deje práve teraz a čo bude treba zajtra — namiesto dvanástich zošitov a niečej pamäti.',\n    heroFoot: ['\u003cb>Stav\u003c/b> Funkčný build, v dennom používaní', '\u003cb>Postavil\u003c/b> Richard Červenka', '\u003cb>Kde\u003c/b> Bern'],\n    eyebrows: ['Problém', 'Vízia', 'Čo robí dnes', 'Kam to smeruje', 'Práve teraz'],\n    heads: ['Každá kuchyňa prijala ten istý chaos.', 'Kuchyňa, ktorá si pamätá.', 'Nie funkcie. Iná kuchyňa.', 'Osem myšlienok, jedna za druhou.', 'Toto nie je prezentácia. Toto beží.'],\n    problem: [\n      'Technika šéfkuchárky žije v jej hlave — a nikde inde.',\n      'Odkaz sa podá na passe a polovica sa na linku nikdy nedostane.',\n      'Na prípravu sa zabudne, kým už nie je hore prvý bon.',\n      'Tácka letí do koša a nikto nevie povedať, koľko naozaj stála.',\n      'Niečo sa pokazí — a otázka znie \u003ci>kto\u003c/i>, nikdy \u003ci>prečo\u003c/i>.'\n    ],\n    problemFinal: 'Každá kuchyňa sa s tým naučila žiť. \u003cb>Sautero nie.\u003c/b>',\n    visionBody: [\n      'Softvér zmenil, ako si firmy držia pravdu — jeden záznam, ktorému veria všetci, namiesto tuctu súkromných. Kuchyne to nikdy nedostali.',\n      'Sautero pristupuje ku kuchyni rovnako. Čo vie jeden kuchár, môže vedieť každý. Čo sa práve deje na linke, vidí ten, kto to vidieť potrebuje — nie ten, kto kričí najhlasnejšie.',\n      'Nič nezávisí od toho, či si to niekto zapamätá — lebo nič sa pamätať nemusí.'\n    ],\n    visionQuote: 'Chaos nie je kuchynská tradícia. Je to len najstarší bug, ktorý nikto neopravil.',\n    lblBefore: 'Predtým', lblAfter: 'Potom',\n    xformBefore: [\n      'Recepty žijú v šanónoch, na lepiacich papierikoch a v pamäti jedného šéfkuchára.',\n      'Nikto nevie, koľko jedlo stojí, kým neprídu faktúry.',\n      'Náhrady a sezónnosť žijú v niečej pamäti — ak vôbec.',\n      'Zajtrajší prep list sa dnes večer píše rukou a zajtra sa polovične dodrží.',\n      'Objednáva sa z pamäti, stanica po stanici.'\n    ],\n    headlines: [\n      'Spoločné poznanie kuchyne.',\n      'Presne vieš, koľko stojí každý tanier.',\n      'Každá ingrediencia nesie svoje vlastné poznanie.',\n      'Každý vie, čo je hotové. Žiadne kričanie. Žiadne hádanie.',\n      'Na objednávku sa nezabúda.'\n    ],\n    details: [\n      'Každý recept na jednom mieste, stavaný pre pracovnú linku — nie pre policu s kuchárskymi knihami.',\n      'Počíta sa automaticky, ingrediencia po ingrediencii, v momente napísania receptu.',\n      'Odkiaľ je, kedy má sezónu, čo ju nahradí — jedno ťuknutie z ktoréhokoľvek receptu.',\n      'Zoznam napíšeš raz, za pár sekúnd. Celá zajtrajšia zmena číta ten istý.',\n      'Jeden zoznam, usporiadaný tak, ako kuchyňa naozaj funguje — nie ako tabuľka.'\n    ],\n    stageNames: ['Poznanie', 'Exekúcia', 'Komunikácia', 'Sklad', 'Produkcia', 'Inteligencia', 'Multi-prevádzka', 'Platforma'],\n    stageTags: { 'Live':'Naživo', 'Ahead':'Pred nami' },\n    stageDescs: [\n      'Dostať všetko z hláv ľudí na jednu stránku, ktorú vie čítať každý.',\n      'Premeniť to poznanie na to, čo sa dnes reálne deje na linke.',\n      'Nech celý tím vidí tú istú pravdu v reálnom čase — a od 17. júla sa rozprávajú aj kuchyne medzi sebou: verejné police receptov a ingrediencií, zdieľanie s chef-priateľmi, komentáre naprieč kuchyňami.',\n      'Vedieť, čo máš, skôr než sa to minie.',\n      'Plánovať celý servis, nie jedno jedlo naraz.',\n      'Nech sa kuchyňa učí z vlastných vzorcov namiesto spoliehania len na cit.',\n      'Poznanie jednej kuchyne sa stáva výhodou každej.',\n      'V každom vrecku, na každej linke — či wifi stojí za niečo, alebo nie.'\n    ],\n    progressBody: '\u003cstrong>183 skutočných receptov\u003c/strong> nesie skutočnú techniku, nie výplň — každý obohatený do Michelin hĺbky. \u003cstrong>2 005 ingrediencií\u003c/strong> už pozná svoju cenu, sezónu aj to, čo ich zastúpi, keď dôjdu. Každý tanier už zhruba vie, koľko stojí, skôr než sa vôbec naservíruje. Nič z toho nie je mockup — je to build, dnes večer v rukách fungujúcej kuchyne.',\n    pstatLabels: ['Receptov so skutočnou technikou', 'Ingrediencií, nacenených a so sezónou', 'Fáz na ceste k hotovému', 'Kuchyňa, ktorá to už používa'],\n  };\n  function setEl(el, val){\n    if(!el) return;\n    if(!el.dataset.enHtml) el.dataset.enHtml = el.innerHTML;\n    el.innerHTML = (window.__manifLang === 'sk' && val) ? val : el.dataset.enHtml;\n  }\n  window.applyManifContent = function(lang){\n    window.__manifLang = lang;\n    const q = sel => Array.from(document.querySelectorAll(sel));\n    setEl(document.querySelector('.hero-mark'), '\u003cspan class=\"pulse\">\u003c/span>' + MSK.heroMark);\n    q('h1.hero-head .ln span').forEach((el,i)=>setEl(el, MSK.heroLines[i]));\n    setEl(document.querySelector('.hero-sub'), MSK.heroSub);\n    q('.hero-foot > span').forEach((el,i)=>setEl(el, MSK.heroFoot[i]));\n    q('.eyebrow').forEach((el,i)=>setEl(el, MSK.eyebrows[i]));\n    q('.head').forEach((el,i)=>setEl(el, MSK.heads[i]));\n    q('.problem-lines p:not(.final)').forEach((el,i)=>setEl(el, MSK.problem[i]));\n    setEl(document.querySelector('.problem-lines p.final') || document.querySelector('p.final'), MSK.problemFinal);\n    q('.vision-body p').forEach((el,i)=>setEl(el, MSK.visionBody[i]));\n    setEl(document.querySelector('.vision-quote'), MSK.visionQuote);\n    q('.xform-before').forEach((el,i)=>setEl(el, '\u003cspan class=\"lbl\">' + MSK.lblBefore + '\u003c/span>' + MSK.xformBefore[i]));\n    q('.xform-after .lbl').forEach(el=>setEl(el, MSK.lblAfter));\n    q('.headline').forEach((el,i)=>setEl(el, MSK.headlines[i]));\n    q('.detail').forEach((el,i)=>setEl(el, MSK.details[i]));\n    q('.stage-name').forEach((el,i)=>setEl(el, MSK.stageNames[i]));\n    q('.stage-tag').forEach(el=>{\n      if(!el.dataset.enHtml) el.dataset.enHtml = el.innerHTML;\n      el.innerHTML = lang === 'sk' ? (MSK.stageTags[el.dataset.enHtml.trim()] || el.dataset.enHtml) : el.dataset.enHtml;\n    });\n    q('.progress-body p').forEach((el,i)=>setEl(el, i===0 ? MSK.progressBody : null));\n    q('.pstat .l').forEach((el,i)=>setEl(el, MSK.pstatLabels[i]));\n  };\n  const orig = window.sauteroToggleLang;\n  function hook(){\n    const lang = localStorage.getItem('sautero_doc_lang') || 'sk';\n    window.applyManifContent(lang);\n  }\n  if(typeof orig === 'function'){\n    window.sauteroToggleLang = function(){ orig(); hook(); };\n  }\n  hook();\n})();\n\u003c/script>\n\u003c/body>\n\u003c/html>\n", "\u003c!doctype html>\n\u003chtml data-theme=\"dark\">\n\u003chead>\n\u003cmeta charset=\"utf-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n\u003cmeta http-equiv=\"Cache-Control\" content=\"no-cache, no-store, must-revalidate\">\n\u003cmeta http-equiv=\"Pragma\" content=\"no-cache\">\n\u003cmeta http-equiv=\"Expires\" content=\"0\">\n\u003ctitle>Sautero — Visual Product Guide\u003c/title>\n\u003cstyle>\n  :root{\n    --bg: #0A1A2F;\n    --paper: #122845;\n    --paper-raised: #0f2340;\n    --ink: #fff;\n    --ink-dim: #9C949E;\n    --ink-faint: rgba(156,148,158,0.6);\n    --rule: #223d57;\n    --copper: #34F7D7;\n    --copper-dim: rgba(52,247,215,0.4);\n    --sage: #F7C948;\n    --shadow: 0 8px 28px rgba(0,0,0,0.35);\n  }\n  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}\n  html,body{margin:0; padding:0; height:100%; max-width:100vw; overflow-x:hidden;}\n  body{\n    background: var(--bg);\n    background-image: radial-gradient(ellipse 900px 500px at 50% -120px, rgba(52,247,215,0.06), transparent);\n    color: var(--ink);\n    font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;\n    overscroll-behavior-y: contain;\n    -webkit-font-smoothing: antialiased;\n  }\n  ::selection{ background: var(--copper); color: #0A1A2F; }\n  button, input, select, textarea{ font: inherit; }\n  button{ cursor:pointer; transition: background-color 0.15s ease, border-color 0.15s ease, opacity 0.15s ease, transform 0.1s ease; }\n  a{ transition: color 0.15s ease; }\n  input, select, textarea{ transition: border-color 0.15s ease, box-shadow 0.15s ease; }\n  input:focus-visible, select:focus-visible, textarea:focus-visible, button:focus-visible, a:focus-visible{\n    outline: none;\n    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--copper);\n    border-radius: 4px;\n  }\n  .display{\n    font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; font-weight: 700;\n  }\n  .mono{\n    font-family: \"SF Mono\", \"Menlo\", \"Consolas\", monospace;\n  }\n\n  /* ---------- Login ---------- */\n  #loginView{\n    min-height: 100vh;\n    display:flex; align-items:center; justify-content:center;\n    padding: 24px;\n  }\n  #loginView .box{\n    width:100%; max-width:380px;\n    background: var(--paper);\n    border: 1px solid var(--rule);\n    border-radius: 20px;\n    padding: 40px 32px 32px 32px;\n    box-shadow: var(--shadow);\n    animation: loginRise 0.5s cubic-bezier(.2,.8,.2,1);\n  }\n  @keyframes loginRise{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }\n  .login-mark{ font-size:34px; text-align:center; margin-bottom:14px; }\n  #loginView .kicker, #loginView h1{ text-align:center; }\n  #loginView h1.title{ margin-bottom:6px; }\n  .login-tagline{\n    text-align:center; color:var(--ink-dim); font-size:14px;\n    margin: 0 0 30px 0; line-height:1.5;\n  }\n  .form-status{ font-size:12px; color:var(--sage); min-height:16px; margin: 8px 0 4px 0; }\n  .form-status.error{ color:#FF7A68; }\n\n  /* ---------- Top bar ---------- */\n  .topbar{\n    position: sticky; top:0; z-index: 10;\n    background: var(--bg);\n    padding: 22px 18px 12px 18px;\n  }\n  .kicker{\n    color: var(--copper);\n    font-size: 11px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    margin: 0 0 4px 0;\n    font-weight: 600;\n  }\n  .sync-status{\n    font-size: 11px;\n    letter-spacing: 0.04em;\n    color: var(--ink-dim);\n    opacity: 0;\n    transition: opacity 0.2s;\n    display:flex; align-items:center; gap:5px;\n  }\n  .sync-status::before{ content:''; width:5px; height:5px; border-radius:50%; background:currentColor; }\n  .sync-status.saving, .sync-status.offline{ opacity: 1; }\n  .sync-status.saved{ opacity: 0; }\n  .sync-status.offline{ color: #34F7D7; }\n  h1.title{\n    font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; font-weight: 700;\n    font-size: 30px;\n    margin: 0 0 16px 0;\n    font-weight: 500;\n    letter-spacing: -0.015em;\n  }\n  .search-wrap{\n    display:flex;\n    align-items:center;\n    gap:8px;\n    background: var(--paper-raised);\n    border: 1px solid var(--rule);\n    border-radius: 12px;\n    padding: 11px 14px;\n    transition: border-color 0.15s ease, box-shadow 0.15s ease;\n  }\n  .search-wrap:focus-within{ border-color: var(--copper-dim); box-shadow: 0 0 0 3px var(--copper-wash, rgba(205,143,95,0.12)); }\n  .search-wrap svg{ flex:none; opacity:0.55; }\n  #search{\n    flex:1;\n    background:none; border:none; outline:none;\n    color: var(--ink);\n    font-size: 16px;\n    font-family: inherit;\n  }\n  #search::placeholder{ color: var(--ink-dim); }\n  .nav-row{ display:flex; gap:8px; margin-top:12px; }\n  .ingredients-nav-btn{\n    display:flex; flex-direction:column; align-items:center; gap:5px;\n    flex:1;\n    background: var(--paper-raised); border: 1px solid var(--rule);\n    color: var(--ink-dim);\n    font-family: inherit; font-size: 11.5px; font-weight:500;\n    padding: 12px 6px 10px 6px; border-radius: 12px;\n    text-align:center;\n  }\n  .ingredients-nav-btn svg{ display:none; }\n  .ingredients-nav-btn:active{ background: var(--surface-raised, var(--paper-raised)); transform: scale(0.97); }\n  .ingredients-nav-btn:hover{ border-color: var(--copper-dim); color: var(--ink); }\n  .nav-icon{ font-size: 18px; line-height:1; }\n\n  /* ---------- Home dashboard ---------- */\n  .home-grid{\n    display:grid; grid-template-columns: repeat(2, 1fr);\n    gap: 14px;\n    padding: 10px 18px 40px 18px;\n  }\n  .home-tile{\n    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;\n    aspect-ratio: 1;\n    background: var(--paper-raised);\n    border: 1px solid var(--rule);\n    border-radius: 18px;\n    color: var(--ink);\n    font-family: inherit; font-size: 14.5px; font-weight:600;\n    padding: 16px;\n  }\n  .home-tile:hover{ border-color: var(--copper-dim); background: var(--surface, var(--paper-raised)); transform: translateY(-2px); }\n  .home-tile:active{ transform: scale(0.97); }\n  .home-tile-icon{\n    font-size: 32px; line-height:1;\n    width:56px; height:56px;\n    display:flex; align-items:center; justify-content:center;\n    background: var(--paper); border:1px solid var(--rule); border-radius:14px;\n  }\n  @media (min-width: 560px){\n    .home-grid{ grid-template-columns: repeat(3, 1fr); max-width:640px; margin:0 auto; }\n  }\n\n  /* ---------- Schedule: week nav + grid ---------- */\n  .date-nav{ display:flex; align-items:center; justify-content:space-between; gap:8px; }\n  .week-label{ font-family:\"SF Mono\",Menlo,monospace; font-size:13px; color:var(--ink-dim); text-align:center; flex:1; }\n  .schedule-grid-wrap{ overflow-x:auto; padding: 4px 0 8px 0; -webkit-overflow-scrolling:touch; }\n  table.schedule-grid{ border-collapse:collapse; width:100%; min-width:640px; }\n  table.schedule-grid th, table.schedule-grid td{ border-bottom:1px solid var(--rule); padding:0; }\n  table.schedule-grid thead th{\n    font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-faint);\n    font-weight:600; padding:8px 6px; text-align:center; background:var(--bg);\n    position:sticky; top:0; z-index:2;\n  }\n  table.schedule-grid thead th.name-col{ text-align:left; padding-left:18px; }\n  table.schedule-grid .name-col{\n    position:sticky; left:0; z-index:1;\n    background:var(--bg);\n    padding: 10px 12px 10px 18px;\n    font-size:13.5px; white-space:nowrap;\n    box-shadow: 1px 0 0 var(--rule);\n  }\n  table.schedule-grid .section-row td{\n    background: var(--paper-raised);\n    font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:var(--sage); font-weight:600;\n    padding: 8px 12px 8px 18px;\n  }\n  table.schedule-grid .cell-btn{\n    width:100%; min-width:60px; height:44px;\n    background:none; border:none; border-left:1px solid var(--rule);\n    color: var(--ink); font-family:\"SF Mono\",Menlo,monospace; font-size:12px; font-weight:600;\n    cursor:pointer;\n  }\n  table.schedule-grid .cell-btn:hover{ background: var(--paper-raised); }\n  table.schedule-grid .cell-btn.absence{ color: var(--ink-faint); font-weight:400; }\n  table.schedule-grid .cell-btn.empty{ color: var(--rule); }\n  .staff-add-row{ display:flex; gap:8px; margin-top:10px; }\n  .staff-add-row input{ flex:1; }\n\n  /* ---------- Fridge temperature ---------- */\n  .fridge-card{\n    display:flex; align-items:center; gap:14px;\n    background: var(--paper-raised); border:1px solid var(--rule); border-radius:12px;\n    padding:14px 16px; margin-bottom:12px; cursor:pointer;\n    transition: border-color 0.15s ease;\n  }\n  .fridge-card:hover{ border-color: var(--copper-dim); }\n  .fridge-status-dot{ width:12px; height:12px; border-radius:50%; flex:none; }\n  .fridge-status-dot.ok{ background: var(--sage); }\n  .fridge-status-dot.warn{ background: #FF7A68; }\n  .fridge-status-dot.none{ background: var(--rule); }\n  .fridge-card .info{ flex:1; }\n  .fridge-card .name{ font-size:15.5px; font-weight:600; }\n  .fridge-card .meta{ font-size:12.5px; color:var(--ink-dim); margin-top:2px; }\n  .fridge-card .reading{ font-family:\"SF Mono\",Menlo,monospace; font-size:20px; color:var(--copper); font-weight:600; }\n  .fridge-log-row{ display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--rule); font-size:14px; }\n  .fridge-log-row .temp{ font-family:\"SF Mono\",Menlo,monospace; color:var(--copper); font-weight:600; }\n  .fridge-log-row .temp.warn{ color:#FF7A68; }\n\n  /* ---------- Bottom action sheet (used by the ingredient info panel) ---------- */\n  .sheet-overlay{\n    position:fixed; inset:0;\n    background: rgba(10,9,7,0.6);\n    display:none;\n    align-items:flex-end;\n    justify-content:center;\n    z-index: 50;\n  }\n  .sheet-overlay.open{ display:flex; }\n  .sheet{\n    background: var(--paper-raised);\n    border: 1px solid var(--rule);\n    border-bottom: none;\n    border-radius: 18px 18px 0 0;\n    padding: 10px 20px calc(20px + env(safe-area-inset-bottom, 0px)) 20px;\n    width: 100%;\n    max-width: 480px;\n    box-sizing: border-box;\n    max-height: 80vh;\n    overflow-y: auto;\n  }\n  .sheet-handle{\n    width: 36px; height: 4px; border-radius: 999px;\n    background: var(--rule);\n    margin: 8px auto 14px auto;\n  }\n  .sheet-cancel{\n    width:100%;\n    margin-top:14px;\n    background:none;\n    border:1px solid var(--rule);\n    color: var(--ink-dim);\n    padding:12px;\n    border-radius:10px;\n    font-family:inherit;\n    font-size:14px;\n  }\n  .ingredient-info-title{ font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; font-size:19px; margin:4px 0 4px 0; }\n  .ingredient-info-row{ margin: 12px 0; }\n  .ingredient-info-row .label{ font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--sage); margin-bottom:3px; }\n  .ingredient-info-row .value{ font-size:14px; line-height:1.5; }\n\n  /* ---------- Add-choice sheet options + API key settings ---------- */\n  .sheet-option{\n    display:flex; align-items:center; gap:14px;\n    width:100%;\n    background:none; border:none;\n    border-top: 1px solid var(--rule);\n    padding: 14px 4px;\n    color: var(--ink);\n    text-align:left;\n    font-family: inherit;\n  }\n  .sheet-option:first-of-type{ border-top:none; }\n  .sheet-option svg{ flex:none; color: var(--copper); }\n  .sheet-option-title{ font-size:15px; font-weight:600; }\n  .sheet-option-sub{ font-size:12px; color:var(--ink-dim); margin-top:2px; }\n  .sheet-title{ font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; font-size:19px; margin:4px 0 10px 0; }\n  .sheet-text{ font-size:13px; color:var(--ink-dim); line-height:1.5; margin:0 0 16px 0; }\n  .sheet-link{ color:var(--copper); }\n  .sheet-row{ display:flex; gap:10px; margin-bottom: 8px; }\n  .sheet-row .save-btn, .sheet-row .danger-btn{ flex:1; margin-top:0; text-align:center; }\n  .sheet-status{ font-size:12px; color:var(--sage); min-height:16px; margin: 8px 0 4px 0; }\n\n  /* ---------- Photo scan progress overlay ---------- */\n  .scan-overlay{\n    position:fixed; inset:0;\n    background: rgba(23,21,18,0.94);\n    display:none;\n    align-items:center; justify-content:center;\n    z-index: 60;\n  }\n  .scan-overlay.open{ display:flex; }\n  .scan-box{ text-align:center; padding: 20px; max-width:320px; }\n  .scan-spinner{\n    width:40px; height:40px;\n    border-radius:50%;\n    border: 3px solid var(--rule);\n    border-top-color: var(--copper);\n    margin: 0 auto 18px auto;\n    animation: scan-spin 0.8s linear infinite;\n  }\n  @keyframes scan-spin{ to{ transform: rotate(360deg); } }\n  .scan-status{ font-size:14px; color:var(--ink-dim); }\n  .scan-error{ font-size:13px; color:#FF7A68; margin-top:14px; }\n\n  /* ---------- Task rows (Mise en Place) ---------- */\n  .task-row{ padding:14px 18px; border-bottom:1px solid var(--rule); }\n  .task-row.status-finish .task-text{ text-decoration:line-through; color:var(--ink-dim); }\n  .task-row-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }\n  .task-status-group{ display:flex; gap:6px; margin-top:9px; }\n  .task-col-header{\n    display:flex; justify-content:space-between;\n    padding: 10px 18px 6px 18px;\n    font-size: 11px; text-transform:uppercase; letter-spacing:0.1em;\n    color: var(--ink-dim);\n    border-bottom: 1px solid var(--rule);\n  }\n  .task-status-btn{\n    flex:none;\n    font-family: inherit; font-size: 11px; font-weight:700; letter-spacing:0.04em;\n    padding: 6px 10px; border-radius: 6px;\n    border: 1px solid var(--rule); background: var(--paper);\n    color: var(--ink-dim);\n    opacity: 0.85;\n  }\n  .task-status-btn.active{ opacity: 1; }\n  .task-status-btn.status-todo{ color: var(--ink-dim); border-color: var(--rule); }\n  .task-status-btn.status-todo.active{ color: var(--ink); border-color: var(--ink-dim); background: rgba(236,229,216,0.14); }\n  .task-status-btn.status-check{ color: var(--copper); border-color: var(--copper-dim); }\n  .task-status-btn.status-check.active{ background: rgba(205,143,95,0.15); }\n  .task-status-btn.status-finish{ color: var(--sage); border-color: var(--sage); }\n  .task-status-btn.status-finish.active{ background: rgba(150,165,134,0.15); }\n  .task-status-btn.status-dontdo{ color:#FF7A68; border-color:#b3453a; }\n  .task-status-btn.status-dontdo.active{ background: rgba(217,122,111,0.15); }\n  .task-priority-badge{\n    flex:none; width:22px; height:22px; border-radius:50%;\n    display:flex; align-items:center; justify-content:center;\n    font-family:\"SF Mono\",Menlo,monospace; font-size:11px; font-weight:600;\n    border: 1px solid var(--rule);\n  }\n  .priority-1, .priority-2{ color:#FF7A68; border-color:#b3453a; }\n  .priority-3{ color: var(--copper); border-color: var(--copper-dim); }\n  .priority-4, .priority-5{ color: var(--sage); border-color: var(--sage); }\n\n  /* ---------- Prep sheet (dish-grouped, e.g. SKY) ---------- */\n  .prep-section-summary{\n    display:flex; gap:8px; flex-wrap:wrap;\n    padding: 10px 18px;\n    font-size: 13px; color: var(--ink);\n  }\n  .prep-section-summary b{ color: var(--ink); font-family:\"SF Mono\",Menlo,monospace; }\n  .prep-section-summary > span:not(.prep-filter-toggle){ padding:5px 10px; }\n  .prep-filter-toggle{\n    cursor:pointer; padding:5px 10px; border-radius:999px;\n    border:1px solid var(--rule); background: var(--paper-raised, var(--paper));\n  }\n  .prep-fil
