{ max-width:var(--maxw); margin:0 auto; padding:0 24px 120px 24px; }\n  a{ color:var(--accent); }\n  ::selection{ background:var(--accent); color:#0A1A2F; }\n  h1,h2,h3,p,ul{ text-wrap:balance; }\n\n  /* Reading-progress bar (Richard's brief: progress indicator) */\n  #progress{ position:fixed; top:0; left:0; height:3px; width:0; z-index:100;\n    background:linear-gradient(90deg, var(--accent-deep), var(--accent)); box-shadow:0 0 12px var(--accent-dim); transition:width .08s linear; }\n\n  /* Reveal DISABLED 21.7. (Richard: the deck \"flies / isn't anchored\") — content is solid and\n     static, no scroll-in motion. The .reveal class is now inert; initReveal() is a harmless\n     no-op that only adds the .js class. Nothing translates or fades on scroll anymore. */\n  .reveal{ opacity:1 !important; transform:none !important; }\n  @media (prefers-reduced-motion:reduce){ html{ scroll-behavior:auto; } }\n\n  /* ---------- Hero ---------- */\n  header.hero{ position:relative; padding:78px 0 46px 0; border-bottom:1px solid var(--rule); overflow:hidden; max-width:100%; }\n  header.hero::before{\n    content:''; position:absolute; top:-200px; left:50%; transform:translateX(-50%);\n    width:1000px; height:560px; pointer-events:none;\n    background:radial-gradient(ellipse at center, var(--accent-wash), transparent 70%);\n  }\n  .hero-inner{ position:relative; }\n  .kicker{ color:var(--accent); font-size:12px; letter-spacing:0.2em; text-transform:uppercase; font-weight:700; margin-bottom:20px; }\n  h1.title{ font-family:var(--serif); font-size:64px; font-weight:600; margin:0 0 6px 0; letter-spacing:-0.015em; line-height:1; }\n  h1.title b{ color:var(--accent); font-weight:600; }\n  .hero-tag{ font-family:var(--serif); font-style:italic; font-size:20px; color:var(--accent-2); margin:0 0 22px 0; letter-spacing:0.01em; }\n  .lede{ color:var(--ink-dim); font-size:16.5px; max-width:60ch; line-height:1.7; }\n  .status-pill{\n    display:inline-flex; align-items:center; gap:8px; margin-top:24px;\n    padding:8px 15px; border-radius:999px; border:1px solid var(--accent-dim);\n    background:var(--accent-wash); font-size:12.5px; color:var(--accent); font-family:var(--mono);\n  }\n  .status-pill::before{ content:''; width:7px; height:7px; border-radius:50%; background:var(--accent);\n    box-shadow:0 0 0 0 var(--accent-dim); animation:pulse 2.4s infinite; }\n  @keyframes pulse{ 0%{ box-shadow:0 0 0 0 rgba(52,247,215,0.5);} 70%{ box-shadow:0 0 0 8px rgba(52,247,215,0);} 100%{ box-shadow:0 0 0 0 rgba(52,247,215,0);} }\n  @media (prefers-reduced-motion:reduce){ .status-pill::before{ animation:none; } }\n\n  .headline-stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:1px; margin-top:38px; background:var(--rule); border:1px solid var(--rule); border-radius:18px; overflow:hidden; }\n  .headline-stat{ background:var(--paper); padding:22px 22px 20px 22px; }\n  .headline-stat .num{ font-family:var(--mono); font-size:32px; font-weight:700; color:var(--accent); font-variant-numeric:tabular-nums; line-height:1; }\n  .headline-stat .lbl{ font-size:12px; color:var(--ink-dim); margin-top:9px; line-height:1.45; }\n  @media (max-width:680px){ .headline-stats{ grid-template-columns:1fr; } h1.title{ font-size:46px; } }\n\n  /* ---------- Sticky section nav ---------- */\n  nav.pagenav{\n    position:sticky; top:0; z-index:20;\n    background:var(--bg); border-bottom:1px solid var(--rule);\n    display:flex; gap:2px; overflow-x:auto; scrollbar-width:none;\n  }\n  nav.pagenav::-webkit-scrollbar{ display:none; }\n  nav.pagenav a{\n    flex:none; padding:14px 16px; font-size:12.5px; font-weight:600; color:var(--ink-dim);\n    text-decoration:none; border-bottom:2px solid transparent; white-space:nowrap;\n    transition:color 0.15s ease, border-color 0.15s ease;\n  }\n  nav.pagenav a:hover{ color:var(--ink); }\n  nav.pagenav a.active{ color:var(--accent); border-bottom-color:var(--accent); }\n\n  /* ---------- Sections ---------- */\n  section{ padding:60px 0; border-bottom:1px solid var(--rule); scroll-margin-top:54px; }\n  section:last-of-type{ border-bottom:none; }\n  .eyebrow{ color:var(--accent); font-size:11px; letter-spacing:0.16em; text-transform:uppercase; font-weight:700; margin-bottom:10px; }\n  h2.section-title{ font-weight:800; font-size:29px; margin:0 0 10px 0; letter-spacing:-0.01em; }\n  .section-desc{ color:var(--ink-dim); font-size:14.5px; max-width:66ch; margin-bottom:30px; line-height:1.7; }\n  .group-label{ font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:var(--ink-faint); font-weight:700; margin:28px 0 12px 0; }\n  .group-label:first-child{ margin-top:0; }\n  .statement{ font-family:var(--serif); font-size:26px; line-height:1.5; color:var(--ink); max-width:26ch; font-weight:500; }\n  .statement em{ color:var(--accent); font-style:italic; }\n\n  /* ---------- KPI cards ---------- */\n  .maturity-row{ display:flex; align-items:center; gap:26px; margin-top:24px; flex-wrap:wrap; background:var(--paper); border:1px solid var(--rule); border-radius:18px; padding:18px 22px; }\n  .maturity-legend{ display:flex; flex-direction:column; gap:8px; }\n  .maturity-legend .mrow{ display:flex; align-items:center; gap:9px; font-size:13px; color:var(--ink-dim); }\n  .maturity-legend .mdot{ width:10px; height:10px; border-radius:50%; flex:none; }\n  .maturity-legend b{ color:var(--ink); font-family:var(--mono); }\n  #maturityDonut text{ fill:var(--ink); font-family:var(--mono); }\n  .kpi-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }\n  @media (max-width:820px){ .kpi-grid{ grid-template-columns:repeat(2,1fr); } }\n  .kpi-card{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:18px 16px; transition:border-color 0.15s ease, transform 0.15s ease, box-shadow .15s ease; }\n  .kpi-card:hover{ border-color:var(--accent-dim); transform:translateY(-2px); box-shadow:var(--shadow); }\n  .kpi-num{ font-family:var(--mono); font-size:26px; font-weight:700; color:var(--ink); font-variant-numeric:tabular-nums; }\n  .kpi-label{ font-size:11.5px; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-dim); margin-top:5px; }\n  .kpi-note{ font-size:11px; color:var(--ink-faint); margin-top:6px; line-height:1.4; }\n\n  /* ---------- Golden Circle (Why / How / What) ---------- */\n  .golden-layout{ display:grid; grid-template-columns:300px 1fr; gap:34px; align-items:center; }\n  @media (max-width:760px){ .golden-layout{ grid-template-columns:1fr; } }\n  #goldenCircle text{ font-family:var(--serif); }\n  .golden-rows{ display:flex; flex-direction:column; gap:14px; }\n  .golden-item{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:16px 18px; border-left:3px solid var(--accent); }\n  .golden-item .gk{ font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--accent); font-weight:700; }\n  .golden-item h4{ margin:6px 0 5px 0; font-size:16px; }\n  .golden-item p{ margin:0; font-size:13.5px; color:var(--ink-dim); line-height:1.6; }\n\n  /* ---------- Before / After transformation ---------- */\n  .ba-grid{ display:grid; grid-template-columns:1fr 54px 1fr; gap:0; align-items:stretch; }\n  @media (max-width:760px){ .ba-grid{ grid-template-columns:1fr; gap:14px; } }\n  .ba-col{ border-radius:18px; padding:24px 22px; border:1px solid var(--rule); }\n  .ba-before{ background:linear-gradient(160deg, rgba(255,122,104,0.06), transparent); }\n  .ba-after{ background:linear-gradient(160deg, var(--accent-wash), transparent); border-color:var(--accent-dim); }\n  .ba-col .bh{ font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:0.08em; font-weight:700; margin-bottom:14px; }\n  .ba-before .bh{ color:#FF9C8C; } .ba-after .bh{ color:var(--accent); }\n  .ba-col ul{ list-style:none; padding:0; margin:0; }\n  .ba-col li{ font-size:13.5px; color:var(--ink-dim); padding:9px 0 9px 24px; position:relative; border-top:1px solid var(--rule-soft); line-height:1.5; }\n  .ba-col li:first-child{ border-top:none; }\n  .ba-before li::before{ content:'✕'; position:absolute; left:0; color:#FF7A68; font-size:12px; }\n  .ba-after li::before{ content:'✓'; position:absolute; left:0; color:var(--accent); font-size:12px; }\n  .ba-arrow{ display:flex; align-items:center; justify-content:center; color:var(--accent); font-size:24px; }\n  @media (max-width:760px){ .ba-arrow{ transform:rotate(90deg); height:20px; } }\n\n  /* ---------- Generic feature / tailwind / persona / moat cards ---------- */\n  .card-grid-3{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }\n  .card-grid-2{ display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }\n  @media (max-width:820px){ .card-grid-3, .card-grid-2{ grid-template-columns:1fr; } }\n  .vcard{ background:var(--paper); border:1px solid var(--rule); border-radius:16px; padding:22px 20px; transition:border-color .15s, transform .15s, box-shadow .15s; }\n  .vcard:hover{ border-color:var(--accent-dim); transform:translateY(-2px); box-shadow:var(--shadow); }\n  .vcard .vi{ font-size:26px; margin-bottom:12px; }\n  .vcard h4{ margin:0 0 8px 0; font-size:16px; }\n  .vcard p{ margin:0; font-size:13.5px; color:var(--ink-dim); line-height:1.62; }\n  .vcard .tagline{ font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--accent); font-weight:700; margin-bottom:9px; }\n  .persona-role{ font-family:var(--mono); font-size:11px; color:var(--accent); text-transform:uppercase; letter-spacing:0.05em; font-weight:700; }\n  .persona-quote{ font-family:var(--serif); font-style:italic; font-size:14.5px; color:var(--ink); margin:10px 0 12px 0; line-height:1.5; }\n\n  /* ---------- Moat layers ---------- */\n  .moat-stack{ display:flex; flex-direction:column; gap:8px; }\n  .moat-layer{ display:grid; grid-template-columns:34px 1fr; gap:14px; align-items:center; background:var(--paper); border:1px solid var(--rule); border-radius:12px; padding:15px 18px; position:relative; overflow:hidden; }\n  .moat-layer::after{ content:''; position:absolute; inset:0 auto 0 0; width:var(--fill,40%); background:linear-gradient(90deg, var(--accent-wash), transparent); pointer-events:none; }\n  .moat-layer > *{ position:relative; }\n  .moat-n{ font-family:var(--mono); font-weight:700; color:var(--accent); font-size:15px; }\n  .moat-layer h4{ margin:0 0 3px 0; font-size:15px; }\n  .moat-layer p{ margin:0; font-size:12.5px; color:var(--ink-dim); line-height:1.55; }\n\n  /* ---------- Market ---------- */\n  .market-row{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }\n  @media (max-width:820px){ .market-row{ grid-template-columns:repeat(2,1fr); } }\n  .target-callout{\n    margin-top:22px; display:flex; gap:14px; align-items:flex-start;\n    background:linear-gradient(135deg, var(--gold-wash), transparent); border:1px solid var(--gold-dim);\n    border-radius:14px; padding:18px 20px;\n  }\n  .target-callout .badge{\n    flex:none; font-family:var(--mono); font-size:10.5px; font-weight:700; letter-spacing:0.04em;\n    color:#0A1A2F; background:var(--gold); border-radius:999px; padding:4px 10px; text-transform:uppercase;\n  }\n  .target-callout p{ margin:0; font-size:13.5px; color:var(--ink-dim); line-height:1.6; }\n  .target-callout b{ color:var(--ink); }\n\n  .disclaimer{\n    background:var(--gold-wash); border:1px solid var(--gold-dim); border-radius:10px;\n    padding:12px 16px; font-size:12.5px; color:var(--ink-dim); margin-top:16px; max-width:74ch; line-height:1.55;\n  }\n  .disclaimer b{ color:var(--gold); }\n\n  /* ---------- Process (pillars) ---------- */\n  .process{ position:relative; }\n  .process-track{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; position:relative; }\n  @media (max-width:820px){ .process-track{ grid-template-columns:1fr; } }\n  .process-track::before{\n    content:''; position:absolute; top:38px; left:calc(100%/6); right:calc(100%/6);\n    height:1px; background:repeating-linear-gradient(90deg, var(--rule) 0 6px, transparent 6px 12px);\n  }\n  @media (max-width:820px){ .process-track::before{ display:none; } }\n  .process-card{ position:relative; background:var(--paper); border:1px solid var(--rule); border-radius:16px; padding:24px 20px 22px 20px; transition:border-color .15s, transform .15s, box-shadow .15s; }\n  .process-card:hover{ border-color:var(--accent-dim); transform:translateY(-2px); box-shadow:var(--shadow); }\n  .process-step{\n    width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center;\n    font-family:var(--mono); font-size:12px; font-weight:700; margin-bottom:14px;\n    background:var(--paper-hi); border:1px solid var(--rule); color:var(--ink-dim);\n  }\n  .process-card.live .process-step{ background:var(--accent-wash); border-color:var(--accent-dim); color:var(--accent); }\n  .process-icon{ font-size:24px; margin-bottom:10px; }\n  .process-title{ font-size:15.5px; font-weight:700; margin-bottom:8px; }\n  .process-desc{ font-size:13.5px; color:var(--ink-dim); line-height:1.6; }\n  .process-status{\n    display:inline-flex; align-items:center; gap:6px; margin-top:14px; padding:3px 10px; border-radius:999px;\n    font-size:10px; text-transform:uppercase; letter-spacing:0.06em; font-family:var(--mono); font-weight:700;\n  }\n  .process-status::before{ content:''; width:5px; height:5px; border-radius:50%; background:currentColor; }\n  .process-status.live{ background:var(--accent-wash); color:var(--accent); }\n  .process-status.vision{ background:rgba(156,148,158,0.14); color:var(--ink-dim); }\n\n  /* ---------- Roadmap / Gantt ---------- */\n  .chart-card{ background:var(--paper); border:1px solid var(--rule); border-radius:18px; padding:24px 22px; }\n  .chart-legend{ display:flex; gap:18px; flex-wrap:wrap; margin-bottom:16px; font-size:12px; color:var(--ink-dim); }\n  .chart-legend span{ display:inline-flex; align-items:center; gap:6px; }\n  .legend-dot{ width:9px; height:9px; border-radius:3px; display:inline-block; }\n  .legend-line{ width:14px; height:0; border-top:2px dashed var(--gold); display:inline-block; }\n  .gantt-scroll{ overflow-x:auto; margin:0 -4px; padding:0 4px; }\n  .gantt{ min-width:920px; position:relative; }\n  .gantt-axis{ display:grid; grid-template-columns:260px 1fr; margin-bottom:4px; }\n  .gantt-axis-track{ position:relative; height:22px; }\n  .gantt-axis-tick{ position:absolute; top:0; bottom:0; font-family:var(--mono); font-size:10.5px; color:var(--ink-faint); border-left:1px solid var(--rule-soft); padding-left:5px; }\n  .gantt-rows{ position:relative; }\n  .gantt-row{ display:grid; grid-template-columns:260px 1fr; align-items:center; min-height:30px; }\n  .gantt-label{\n    position:sticky; left:0; z-index:2; background:var(--paper);\n    font-size:12px; color:var(--ink-dim); padding:4px 14px 4px 0; line-height:1.35;\n    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\n  }\n  .gantt-row:hover .gantt-label{ color:var(--ink); }\n  .gantt-track{ position:relative; height:30px; border-top:1px solid var(--rule-soft); }\n  .gantt-row:first-child .gantt-track{ border-top:none; }\n  .gantt-bar{\n    position:absolute; top:6px; height:18px; border-radius:5px; min-width:8px;\n    display:flex; align-items:center; padding:0 7px; font-size:9.5px; font-family:var(--mono); font-weight:700;\n    white-space:nowrap; overflow:hidden; color:#0A1A2F;\n  }\n  .gantt-bar.shipped{ background:var(--accent); }\n  .gantt-bar.vision{\n    background:repeating-linear-gradient(45deg, rgba(156,148,158,0.55) 0 5px, rgba(156,148,158,0.3) 5px 10px);\n    color:var(--ink); border:1px solid var(--rule-soft);\n  }\n  .gantt-today{ position:absolute; top:0; bottom:0; width:0; border-left:2px dashed var(--gold); z-index:3; }\n  .gantt-today-label{ position:absolute; top:-20px; left:4px; font-family:var(--mono); font-size:9.5px; color:var(--gold); white-space:nowrap; font-weight:700; }\n\n  /* ---------- Financials ---------- */\n  .tier-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:22px; }\n  @media (max-width:820px){ .tier-grid{ grid-template-columns:1fr; } }\n  .tier-card{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:22px 20px; position:relative; transition:transform .15s, box-shadow .15s; }\n  .tier-card:hover{ transform:translateY(-2px); box-shadow:var(--shadow); }\n  .tier-card.featured{ border-color:var(--accent); box-shadow:var(--shadow); }\n  .tier-card.featured::before{\n    content:'MOST COMMON'; position:absolute; top:-10px; left:20px; font-family:var(--mono); font-size:9px; font-weight:700;\n    letter-spacing:0.06em; background:var(--accent); color:#0A1A2F; padding:3px 8px; border-radius:999px;\n  }\n  .tier-name{ font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-dim); }\n  .tier-price{ font-family:var(--mono); font-size:26px; color:var(--accent); margin:10px 0 2px 0; font-weight:700; }\n  .tier-price span{ font-size:12px; color:var(--ink-faint); font-weight:400; }\n  .tier-list{ list-style:none; padding:0; margin:16px 0 0 0; font-size:12.5px; color:var(--ink-dim); }\n  .tier-list li{ padding:7px 0; border-top:1px solid var(--rule); padding-left:16px; position:relative; }\n  .tier-list li::before{ content:'—'; position:absolute; left:0; color:var(--ink-faint); }\n  .tier-list li:first-child{ border-top:none; }\n\n  .money-callouts{ display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-bottom:24px; }\n  @media (max-width:720px){ .money-callouts{ grid-template-columns:1fr; } }\n  .money-callout{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:18px 20px; }\n  .money-callout .tag{ font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:0.06em; color:var(--accent); font-weight:700; }\n  .money-callout p{ margin:8px 0 0 0; font-size:13px; color:var(--ink-dim); line-height:1.6; }\n  .money-callout p b{ color:var(--ink); }\n\n  .revenue-layout{ display:grid; grid-template-columns:1.6fr 1fr; gap:22px; align-items:start; }\n  @media (max-width:820px){ .revenue-layout{ grid-template-columns:1fr; } }\n  .revenue-callout .big{ font-family:var(--mono); font-size:34px; font-weight:700; color:var(--gold); line-height:1; font-variant-numeric:tabular-nums; }\n  .revenue-callout .cap{ font-size:12.5px; color:var(--ink-dim); margin-top:10px; line-height:1.6; }\n\n  .assumptions-table-wrap{ overflow-x:auto; margin-top:18px; }\n  .assumptions-table{ width:100%; border-collapse:collapse; font-size:12.5px; min-width:520px; }\n  .assumptions-table th, .assumptions-table td{ text-align:left; padding:9px 12px; border-bottom:1px solid var(--rule); white-space:nowrap; }\n  .assumptions-table th{ color:var(--ink-dim); font-weight:700; font-size:10.5px; text-transform:uppercase; letter-spacing:0.05em; }\n  .assumptions-table td{ color:var(--ink); font-family:var(--mono); font-variant-numeric:tabular-nums; }\n  .assumptions-table td.region{ font-family:inherit; color:var(--ink-dim); }\n  .assumptions-table tbody tr:hover{ background:var(--paper-hi); }\n  .assumptions-table tbody tr:last-child td{ color:var(--gold); font-weight:700; }\n\n  /* ---------- Brand DNA / values / close ---------- */\n  .values-grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-top:8px; }\n  @media (max-width:820px){ .values-grid{ grid-template-columns:repeat(2,1fr); } }\n  .value-cell{ background:var(--paper); border:1px solid var(--rule); border-radius:14px; padding:18px 14px; text-align:center; transition:border-color .15s, transform .15s; }\n  .value-cell:hover{ border-color:var(--accent-dim); transform:translateY(-2px); }\n  .value-cell .ve{ font-size:24px; margin-bottom:9px; }\n  .value-cell h4{ margin:0 0 5px 0; font-size:13.5px; }\n  .value-cell p{ margin:0; font-size:11.5px; color:var(--ink-dim); line-height:1.5; }\n  .northstar{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:22px; }\n  @media (max-width:720px){ .northstar{ grid-template-columns:1fr; } }\n  .ns-card{ background:linear-gradient(150deg, var(--accent-wash), transparent); border:1px solid var(--accent-dim); border-radius:16px; padding:22px 20px; }\n  .ns-card .nsk{ font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; color:var(--accent); font-weight:700; }\n  .ns-card .nsv{ font-family:var(--serif); font-size:20px; color:var(--ink); margin:8px 0 6px 0; line-height:1.35; }\n  .ns-card p{ margin:0; font-size:12.5px; color:var(--ink-dim); line-height:1.6; }\n  .close-cta{ background:linear-gradient(150deg, var(--paper-hi), var(--paper)); border:1px solid var(--rule); border-radius:20px; padding:34px 30px; text-align:center; box-shadow:var(--shadow-lg); }\n  .close-cta .statement{ margin:0 auto 16px auto; max-width:30ch; }\n  .close-cta p{ color:var(--ink-dim); font-size:14px; max-width:56ch; margin:0 auto; line-height:1.7; }\n  .close-meta{ display:flex; gap:22px; justify-content:center; flex-wrap:wrap; margin-top:22px; font-size:12.5px; color:var(--ink-dim); }\n  .close-meta b{ color:var(--accent); font-family:var(--mono); }\n\n  footer.foot{ text-align:center; font-size:11.5px; color:var(--ink-faint); padding:44px 0 20px 0; }\n  footer.foot a{ color:var(--ink-faint); text-decoration:underline; }\n\n  /* ---------- Revenue streams (staged pipeline + matrix) ---------- */\n  .stream-stages{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:8px; }\n  @media (max-width:900px){ .stream-stages{ grid-template-columns:1fr; } }\n  .stream-stage{ display:flex; flex-direction:column; gap:10px; }\n  .stage-head{ font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:0.06em; font-weight:700; padding:9px 13px; border-radius:11px; border:1px solid var(--rule); }\n  .stage-head.now{ color:var(--accent); background:var(--accent-wash); border-color:var(--accent-dim); }\n  .stage-head.after{ color:var(--gold); background:var(--gold-wash); border-color:var(--gold-dim); }\n  .stage-head.vision{ color:#AEB4FF; background:rgba(139,147,255,0.08); border-color:rgba(139,147,255,0.35); }\n  .stream-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:6px; }\n  @media (max-width:900px){ .stream-grid{ grid-template-columns:repeat(2,1fr); } }\n  @media (max-width:560px){ .stream-grid{ grid-template-columns:1fr; } }\n  .stage-pill{ display:inline-block; font-family:var(--mono); font-size:9.5px; text-transform:uppercase; letter-spacing:0.05em; font-weight:700; padding:3px 8px; border-radius:999px; margin-left:auto; flex:none; }\n  .stage-pill.now{ color:var(--accent); background:var(--accent-wash); border:1px solid var(--accent-dim); }\n  .stage-pill.after{ color:var(--gold); background:var(--gold-wash); border:1px solid var(--gold-dim); }\n  .stage-pill.vision{ color:#AEB4FF; background:rgba(139,147,255,0.08); border:1px solid rgba(139,147,255,0.35); }\n  .scard{ background:var(--paper); border:1px solid var(--rule); border-radius:12px; padding:14px 15px; transition:border-color .15s, transform .15s, box-shadow .15s; }\n  .scard:hover{ border-color:var(--accent-dim); transform:translateY(-2px); box-shadow:var(--shadow); }\n  .scard .sh{ display:flex; align-items:center; gap:9px; }\n  .scard .si{ font-size:20px; flex:none; }\n  .scard h5{ margin:0; font-size:13.5px; line-height:1.25; }\n  .scard .sm{ margin:9px 0 0 0; font-size:12px; color:var(--ink-dim); line-height:1.5; }\n  .scard .sstars{ font-size:11px; color:var(--gold); letter-spacing:2px; margin-top:9px; }\n  #streamMatrix text{ font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif; }\n  #streamMatrixWrap{ overflow-x:auto; }\n\n  /* ---------- Sautero stamp + language fab ---------- */\n  .sautero-stamp{\n    position:fixed; bottom:14px; right:14px; z-index:90;\n    background:#0f2340; border:1px solid rgba(52,247,215,0.4); color:#34F7D7;\n    font-size:10.5px; font-weight:700; font-family:\"SF Mono\",Menlo,Consolas,monospace;\n    padding:6px 12px; border-radius:999px; pointer-events:none;\n  }\n  .sautero-lang-fab{\n    position:fixed; top:14px; right:14px; z-index:90;\n    background:#0f2340; border:1px solid #223d57; color:#9C949E;\n    font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;\n    font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;\n    padding:7px 14px; border-radius:999px; cursor:pointer;\n    transition:border-color .15s, color .15s;\n  }\n  .sautero-lang-fab:hover{ border-color:rgba(52,247,215,0.4); color:#34F7D7; }\n  @media print{ .sautero-stamp, .sautero-lang-fab, #progress{ display:none; } .js .reveal{ opacity:1 !important; transform:none !important; } }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\u003cdiv id=\"progress\">\u003c/div>\n\u003cdiv class=\"wrap\">\n\n  \u003cheader class=\"hero\">\n    \u003cdiv class=\"hero-inner\">\n      \u003cdiv class=\"kicker\" data-sk=\"Sautero — Prehľad švajčiarskeho trhu\" data-en=\"Sautero — Swiss Market Overview\">Sautero — Prehľad švajčiarskeho trhu\u003c/div>\n      \u003ch1 class=\"title\">Sau\u003cb>tero\u003c/b>\u003c/h1>\n      \u003cp class=\"hero-tag\" data-sk=\"Kuchyňa, ktorá si pamätá.\" data-en=\"A kitchen that remembers.\">Kuchyňa, ktorá si pamätá.\u003c/p>\n      \u003cp class=\"lede\" data-sk=\"Operačný systém pre profesionálne kuchyne, postavený pre švajčiarsky trh pohostinstva. Postavený sólo — pracujúcim šéfkuchárom s AI agentom — zvnútra reálnej kuchyne von. Go-to-market je zámerne úzky: najprv dokázať v kantóne Bern, potom expandovať.\" data-en=\"An operating system for professional kitchens, built for the Swiss hospitality market. Built solo — by a working chef with an AI agent — from inside a real kitchen out. Go-to-market is deliberately narrow: prove it in canton Bern first, then expand.\">\u003c/p>\n      \u003cdiv class=\"status-pill\" id=\"statusPill\" data-sk=\"Naživo v produkcii · pilot v kantóne Bern\" data-en=\"Live in production · Canton Bern pilot\">Naživo v produkcii · pilot v kantóne Bern\u003c/div>\n      \u003cdiv class=\"headline-stats\" id=\"headlineStats\">\u003c/div>\n    \u003c/div>\n  \u003c/header>\n\n  \u003cnav class=\"pagenav\" id=\"pageNav\">\n    \u003ca href=\"#purpose\" class=\"active\" data-sk=\"Prečo\" data-en=\"Why\">Prečo\u003c/a>\n    \u003ca href=\"#problem\" data-sk=\"Problém\" data-en=\"Problem\">Problém\u003c/a>\n    \u003ca href=\"#product\" data-sk=\"Produkt\" data-en=\"Product\">Produkt\u003c/a>\n    \u003ca href=\"#why\" data-sk=\"Piliere\" data-en=\"Pillars\">Piliere\u003c/a>\n    \u003ca href=\"#moat\" data-sk=\"Moat\" data-en=\"Moat\">Moat\u003c/a>\n    \u003ca href=\"#market\" data-sk=\"Trh\" data-en=\"Market\">Trh\u003c/a>\n    \u003ca href=\"#roadmap\" data-sk=\"Roadmapa\" data-en=\"Roadmap\">Roadmapa\u003c/a>\n    \u003ca href=\"#financials\" data-sk=\"Financie\" data-en=\"Financials\">Financie\u003c/a>\n    \u003ca href=\"#brand\" data-sk=\"Značka\" data-en=\"Brand\">Značka\u003c/a>\n  \u003c/nav>\n\n  \u003c!-- ============ PURPOSE / GOLDEN CIRCLE ============ -->\n  \u003csection id=\"purpose\">\n    \u003cdiv class=\"eyebrow reveal\" data-sk=\"Prečo existujeme\" data-en=\"Why we exist\">Prečo existujeme\u003c/div>\n    \u003ch2 class=\"section-title reveal\" data-sk=\"Začíname pri „prečo“\" data-en=\"We start with why\">Začíname pri „prečo“\u003c/h2>\n    \u003cp class=\"section-desc reveal\" data-sk=\"Profesionálne kuchyne bežia na pamäti a papieri. Keď odíde jeden šéfkuchár, odíde s ním polovica prevádzky. Sautero existuje, aby si kuchyňa pamätala sama za seba.\" data-en=\"Professional kitchens run on memory and paper. When one chef leaves, half the operation leaves with them. Sautero exists so the kitchen can remember for itself.\">\u003c/p>\n    \u003cdiv class=\"golden-layout reveal\">\n      \u003csvg id=\"goldenCircle\" viewBox=\"0 0 240 240\" style=\"width:100%; max-width:280px; height:auto; margin:0 auto; display:block;\" aria-hidden=\"true\">\n        \u003ccircle cx=\"120\" cy=\"120\" r=\"112\" fill=\"none\" stroke=\"var(--rule)\" stroke-width=\"1\"/>\n        \u003ccircle cx=\"120\" cy=\"120\" r=\"112\" fill=\"rgba(52,247,215,0.03)\"/>\n        \u003ccircle cx=\"120\" cy=\"120\" r=\"74\" fill=\"none\" stroke=\"var(--rule)\" stroke-width=\"1\"/>\n        \u003ccircle cx=\"120\" cy=\"120\" r=\"74\" fill=\"rgba(52,247,215,0.05)\"/>\n        \u003ccircle cx=\"120\" cy=\"120\" r=\"38\" fill=\"none\" stroke=\"var(--accent-dim)\" stroke-width=\"1.5\"/>\n        \u003ccircle cx=\"120\" cy=\"120\" r=\"38\" fill=\"rgba(52,247,215,0.12)\"/>\n        \u003ctext x=\"120\" y=\"124\" text-anchor=\"middle\" font-size=\"15\" fill=\"var(--accent)\" font-weight=\"600\" data-sk=\"Prečo\" data-en=\"Why\">Prečo\u003c/text>\n        \u003ctext x=\"120\" y=\"72\" text-anchor=\"middle\" font-size=\"12\" fill=\"var(--ink)\" data-sk=\"Ako\" data-en=\"How\">Ako\u003c/text>\n        \u003ctext x=\"120\" y=\"26\" text-anchor=\"middle\" font-size=\"12\" fill=\"var(--ink-dim)\" data-sk=\"Čo\" data-en=\"What\">Čo\u003c/text>\n      \u003c/svg>\n      \u003cdiv class=\"golden-rows\">\n        \u003cdiv class=\"golden-item\">\n          \u003cdiv class=\"gk\" data-sk=\"Prečo\" data-en=\"Why\">Prečo\u003c/div>\n          \u003ch4 data-sk=\"Znalosť kuchyne nesmie žiť len v jednej hlave.\" data-en=\"Kitchen knowledge shouldn't live in one head.\">Znalosť kuchyne nesmie žiť len v jednej hlave.\u003c/h4>\n          \u003cp data-sk=\"Recepty, gramáže, prep postupy, dodávatelia — dnes to drží pokope pamäť personálu a stoh papierov. Krehké, nekopírovateľné, stratené pri každej výmene.\" data-en=\"Recipes, grammages, prep methods, suppliers — today it's held together by staff memory and a stack of paper. Fragile, uncopyable, lost with every turnover.\">\u003c/p>\n        \u003c/div>\n        \u003cdiv class=\"golden-item\">\n          \u003cdiv class=\"gk\" data-sk=\"Ako\" data-en=\"How\">Ako\u003c/div>\n          \u003ch4 data-sk=\"Jeden pracovný tok kuchyne, nie desať odpojených appiek.\" data-en=\"One kitchen workflow, not ten disconnected apps.\">Jeden pracovný tok kuchyne, nie desať odpojených appiek.\u003c/h4>\n          \u003cp data-sk=\"Prep → sklad → objednávka na jednom mieste, v jazyku kuchyne, na mobile pri linke. Postavené kuchárom, ktorý ten tok žije každý deň — nie softvérovou firmou zvonku.\" data-en=\"Prep → stock → reorder in one place, in the kitchen's own language, on a phone at the line. Built by a chef who lives that loop daily — not an outside software company.\">\u003c/p>\n        \u003c/div>\n        \u003cdiv class=\"golden-item\">\n          \u003cdiv class=\"gk\" data-sk=\"Čo\" data-en=\"What\">Čo\u003c/div>\n          \u003ch4 data-sk=\"Operačný systém pre profesionálnu kuchyňu.\" data-en=\"An operating system for the professional kitchen.\">Operačný systém pre profesionálnu kuchyňu.\u003c/h4>\n          \u003cp data-sk=\"Check List, Ingrediencie & ceny, Order List, Working Time, HACCP, Chef's Assistant — naživo v produkcii, denne používané pilotnou kuchyňou.\" data-en=\"Check List, Ingredients & pricing, Order List, Working Time, HACCP, Chef's Assistant — live in production, used daily by the pilot kitchen.\">\u003c/p>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003c!-- ============ PROBLEM → TRANSFORMATION ============ -->\n  \u003csection id=\"problem\">\n    \u003cdiv class=\"eyebrow reveal\" data-sk=\"Problém → premena\" data-en=\"Problem → transformation\">Problém → premena\u003c/div>\n    \u003ch2 class=\"section-title reveal\" data-sk=\"Každá kuchyňa prijala ten istý chaos\" data-en=\"Every kitchen accepted the same chaos\">Každá kuchyňa prijala ten istý chaos\u003c/h2>\n    \u003cp class=\"section-desc reveal\" data-sk=\"Nie preto, že by chceli — ale preto, že nikto nepostavil nástroj v jazyku kuchyne. Toto je posun, ktorý Sautero robí každý deň.\" data-en=\"Not because they wanted to — but because nobody built a tool in the kitchen's language. This is the shift Sautero makes, every day.\">\u003c/p>\n    \u003cdiv class=\"ba-grid reveal\">\n      \u003cdiv class=\"ba-col ba-before\">\n        \u003cdiv class=\"bh\" data-sk=\"Bez systému\" data-en=\"Without a system\">Bez systému\u003c/div>\n        \u003cul>\n          \u003cli data-sk=\"Recept žije v hlave jedného šéfkuchára\" data-en=\"A recipe lives in one chef's head\">Recept žije v hlave jedného šéfkuchára\u003c/li>\n          \u003cli data-sk=\"Prep na papieri, ktorý sa stráca a prepisuje\" data-en=\"Prep on paper that gets lost and rewritten\">Prep na papieri, ktorý sa stráca a prepisuje\u003c/li>\n          \u003cli data-sk=\"Nikto presne nevie, čo treba doobjednať\" data-en=\"Nobody knows exactly what to reorder\">Nikto presne nevie, čo treba doobjednať\u003c/li>\n          \u003cli data-sk=\"Food cost = odhad, nie číslo\" data-en=\"Food cost is a guess, not a number\">Food cost = odhad, nie číslo\u003c/li>\n          \u003cli data-sk=\"Nový človek sa učí týždne „cez plece“\" data-en=\"A new hire learns for weeks by watching\">Nový človek sa učí týždne „cez plece“\u003c/li>\n        \u003c/ul>\n      \u003c/div>\n      \u003cdiv class=\"ba-arrow\">→\u003c/div>\n      \u003cdiv class=\"ba-col ba-after\">\n        \u003cdiv class=\"bh\" data-sk=\"So Sautero\" data-en=\"With Sautero\">So Sautero\u003c/div>\n        \u003cul>\n          \u003cli data-sk=\"Recept, gramáže a postup sú v systéme, škálovateľné\" data-en=\"Recipe, grammages and method live in the system, scalable\">Recept, gramáže a postup sú v systéme, škálovateľné\u003c/li>\n          \u003cli data-sk=\"Prep sheety po staniciach, živý pohľad „All“\" data-en=\"Prep sheets per station, a live cross-station view\">Prep sheety po staniciach, živý pohľad „All“\u003c/li>\n          \u003cli data-sk=\"Automatická vlajka nedostatku + Order List\" data-en=\"Automatic shortfall flag + Order List\">Automatická vlajka nedostatku + Order List\u003c/li>\n          \u003cli data-sk=\"Food cost počítaný z nacenených ingrediencií\" data-en=\"Food cost computed from priced ingredients\">Food cost počítaný z nacenených ingrediencií\u003c/li>\n          \u003cli data-sk=\"Nový človek otvorí appku a vie, čo robiť\" data-en=\"A new hire opens the app and knows what to do\">Nový človek otvorí appku a vie, čo robiť\u003c/li>\n        \u003c/ul>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003c!-- ============ PRODUCT ============ -->\n  \u003csection id=\"product\">\n    \u003cdiv class=\"eyebrow reveal\" data-sk=\"Produkt\" data-en=\"Product\">Produkt\u003c/div>\n    \u003ch2 class=\"section-title reveal\" data-sk=\"Kde sme dnes\" data-en=\"Where we are today\">Kde sme dnes\u003c/h2>\n    \u003cp class=\"section-desc reveal\" data-sk=\"Skutočné počty zo živého systému, nie projekcie — zoskupené podľa toho, čo dokazujú.\" data-en=\"Real counts from the live system, not projections — grouped by what they prove.\">\u003c/p>\n    \u003cdiv id=\"kpiGroups\" class=\"reveal\">\u003c/div>\n    \u003cdiv class=\"maturity-row reveal\">\n      \u003csvg id=\"maturityDonut\" viewBox=\"0 0 120 120\" style=\"width:150px; height:150px; flex:none;\">\u003c/svg>\n      \u003cdiv class=\"maturity-legend\" id=\"maturityLegend\">\u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003c!-- ============ WHY / PILLARS ============ -->\n  \u003csection id=\"why\">\n    \u003cdiv class=\"eyebrow reveal\" data-sk=\"Prečo Sautero\" data-en=\"Why Sautero\">Prečo Sautero\u003c/div>\n    \u003ch2 class=\"section-title reveal\" data-sk=\"Jeden pracovný tok, tri piliere\" data-en=\"One workflow, three pillars\">Jeden pracovný tok, tri piliere\u003c/h2>\n    \u003cp class=\"section-desc reveal\" data-sk=\"Skutočný prevádzkový cyklus kuchyne — sprav prep, vedz čo máš na sklade, doobjednaj u dodávateľov. Dva piliere sú naživo a v dennom používaní; tretí je najbližší build cieľ.\" data-en=\"The real kitchen operating loop — execute prep, know what's on hand, reorder from suppliers. Two pillars are live and in daily use; the third is the near-term build target.\">\u003c/p>\n    \u003cdiv class=\"process reveal\" id=\"processTrack\">\u003c/div>\n  \u003c/section>\n\n  \u003c!-- ============ MOAT + WHY NOW ============ -->\n  \u003csection id=\"moat\">\n    \u003cdiv class=\"eyebrow reveal\" data-sk=\"Prečo teraz & prečo ťažké skopírovať\" data-en=\"Why now & why hard to copy\">Prečo teraz & prečo ťažké skopírovať\u003c/div>\n    \u003ch2 class=\"section-title reveal\" data-sk=\"Načasovanie aj obrana\" data-en=\"Timing and defensibility\">Načasovanie aj obrana\u003c/h2>\n    \u003cp class=\"section-desc reveal\" data-sk=\"Tri vetry v chrbte robia tento produkt možným práve teraz — a štyri vrstvy robia z neho niečo, čo sa nedá ľahko skopírovať softvérovou firmou zvonku.\" data-en=\"Three tailwinds make this product possible right now — and four layers make it something an outside software company can't easily copy.\">\u003c/p>\n\n    \u003cdiv class=\"group-label reveal\" data-sk=\"Prečo teraz\" data-en=\"Why now\">Prečo teraz\u003c/div>\n    \u003cdiv class=\"card-grid-3 reveal\">\n      \u003cdiv class=\"vcard\">\n        \u003cdiv class=\"vi\">🤖\u003c/div>\n        \u003cdiv class=\"tagline\" data-sk=\"AI dozrelo\" data-en=\"AI matured\">AI dozrelo\u003c/div>\n        \u003ch4 data-sk=\"Digitalizácia receptov je konečne lacná\" data-en=\"Recipe digitization is finally cheap\">Digitalizácia receptov je konečne lacná\u003c/h4>\n        \u003cp data-sk=\"Odfotíš papierový prep sheet alebo faktúru a AI z nej spraví štruktúrované dáta. To, čo bolo pred dvomi rokmi mesiac ručnej práce, je dnes sekundy.\" data-en=\"Photograph a paper prep sheet or an invoice and AI turns it into structured data. What was a month of manual work two years ago is seconds today.\">\u003c/p>\n      \u003c/div>\n      \u003cdiv class=\"vcard\">\n        \u003cdiv class=\"vi\">🇨🇭\u003c/div>\n        \u003cdiv class=\"tagline\" data-sk=\"Trh bez obsluhy\" data-en=\"Underserved market\">Trh bez obsluhy\u003c/div>\n        \u003ch4 data-sk=\"Švajčiarske kuchyne nemajú svoj nástroj\" data-en=\"Swiss kitchens have no tool of their own\">Švajčiarske kuchyne nemajú svoj nástroj\u003c/h4>\n        \u003cp data-sk=\"Globálne KDS/POS systémy nesedia na švajčiarsku prevádzku, jazyky ani dodávateľov. Lokálny, viacjazyčný, kuchynský nástroj tu chýba.\" data-en=\"Global KDS/POS systems don't fit Swiss operations, languages or suppliers. A local, multilingual, kitchen-native tool is missing.\">\u003c/p>\n      \u003c/div>\n      \u003cdiv class=\"vcard\">\n        \u003cdiv class=\"vi\">📉\u003c/div>\n        \u003cdiv class=\"tagline\" data-sk=\"Tlak na prácu\" data-en=\"Labour pressure\">Tlak na prácu\u003c/div>\n        \u003ch4 data-sk=\"Menej rúk, vyššie nároky\" data-en=\"Fewer hands, higher stakes\">Menej rúk, vyššie nároky\u003c/h4>\n        \u003cp data-sk=\"Nedostatok personálu a rastúce náklady tlačia kuchyne k efektivite a k udržaniu know-how, keď ľudia odchádzajú. Systém, ktorý si pamätá, je zrazu nutnosť.\" data-en=\"Staff shortages and rising costs push kitchens toward efficiency and toward keeping know-how when people leave. A system that remembers becomes a necessity.\">\u003c/p>\n      \u003c/div>\n    \u003c/div>\n\n    \u003cdiv class=\"group-label reveal\" data-sk=\"Prečo ťažké skopírovať — štyri vrstvy\" data-en=\"Why hard to copy — four layers\">Prečo ťažké skopírovať — štyri vrstvy\u003c/div>\n    \u003cdiv class=\"moat-stack reveal\">\n      \u003cdiv class=\"moat-layer\" style=\"--fill:88%;\">\n        \u003cdiv class=\"moat-n\">01\u003c/div>\n        \u003cdiv>\n          \u003ch4 data-sk=\"Postavené kuchárom, ktorý ten tok žije\" data-en=\"Built by a chef who lives the loop\">Postavené kuchárom, ktorý ten tok žije\u003c/h4>\n          \u003cp data-sk=\"Produkt navrhuje pracujúci šéfkuchár, nie produktový manažér cez rozhovory. Detaily prep sheetov, staníc a HACCP sedia, lebo pochádzajú z reálnej služby.\" data-en=\"The product is designed by a working chef, not a PM through interviews. The prep-sheet, station and HACCP details are right because they come from real service.\">\u003c/p>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"moat-layer\" style=\"--fill:70%;\">\n        \u003cdiv class=\"moat-n\">02\u003c/div>\n        \u003cdiv>\n          \u003ch4 data-sk=\"Onboarding ako dátový zámok\" data-en=\"Onboarding as a data moat\">Onboarding ako dátový zámok\u003c/h4>\n          \u003cp data-sk=\"Zakladateľ osobne digitalizuje recepty a prep sheety kuchyne (platená služba ~CHF 990). Výsledné dáta žijú v Sautero — prechod inam znamená začať odznova.\" data-en=\"The founder personally digitizes a kitchen's recipes and prep sheets (a paid ~CHF 990 service). The resulting data lives in Sautero — switching away means starting over.\">\u003c/p>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"moat-layer\" style=\"--fill:55%;\">\n        \u003cdiv class=\"moat-n\">03\u003c/div>\n        \u003cdiv>\n          \u003ch4 data-sk=\"Švajčiarsky fit: jazyky, dodávatelia, HACCP\" data-en=\"Swiss fit: languages, suppliers, HACCP\">Švajčiarsky fit: jazyky, dodávatelia, HACCP\u003c/h4>\n          \u003cp data-sk=\"Viacjazyčné rozhranie (EN/DE/FR/IT/SK), HACCP moduly a cesta k feedom švajčiarskych dodávateľov — lokálne detaily, ktoré globálny hráč nerieši.\" data-en=\"A multilingual interface (EN/DE/FR/IT/SK), HACCP modules and a path to Swiss supplier feeds — local details a global player won't bother with.\">\u003c/p>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"moat-layer\" style=\"--fill:42%;\">\n        \u003cdiv class=\"moat-n\">04\u003c/div>\n        \u003cdiv>\n          \u003ch4 data-sk=\"Integrovaný pracovný tok, nie jedna funkcia\" data-en=\"Integrated workflow, not one feature\">Integrovaný pracovný tok, nie jedna funkcia\u003c/h4>\n          \u003cp data-sk=\"Prep, sklad, ceny, čas, HACCP a AI asistent zdieľajú jeden dátový model. Skopírovať jednu obrazovku je ľahké; skopírovať prepojený cyklus nie.\" data-en=\"Prep, stock, pricing, time, HACCP and the AI assistant share one data model. Copying one screen is easy; copying the connected loop is not.\">\u003c/p>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003c!-- ============ MARKET + PERSONAS ============ -->\n  \u003csection id=\"market\">\n    \u003cdiv class=\"eyebrow reveal\" data-sk=\"Trh\" data-en=\"Market\">Trh\u003c/div>\n    \u003ch2 class=\"section-title reveal\" data-sk=\"Švajčiarsko, začíname v kantóne Bern\" data-en=\"Switzerland, starting in canton Bern\">Švajčiarsko, začíname v kantóne Bern\u003c/h2>\n    \u003cp class=\"section-desc reveal\" data-sk=\"Zámerne úzky predmostie: dokázať model v jednom kantóne, na skutočnej pilotnej kuchyni, až potom expandovať — nie plán &quot;spustiť všade naraz&quot;.\" data-en=\"Deliberately narrow beachhead: prove the model in one canton, on a real pilot kitchen, before expanding — not a &quot;launch everywhere&quot; plan.\">\u003c/p>\n    \u003cdiv class=\"market-row reveal\" id=\"marketGrid\">\u003c/div>\n    \u003cdiv class=\"disclaimer reveal\" data-sk='\u003cb>Číslo pre kantón Bern je odhad\u003c/b>, nie oficiálny kantonálny údaj GastroSuisse — odvodené z celoštátnych ~32 000 podnikov podľa ~12% podielu kantónu Bern na populácii. Zdroj: GastroSuisse Branchenspiegel 2025.' data-en='\u003cb>Canton Bern figure is an estimate\u003c/b>, not an official GastroSuisse cantonal count — apportioned from the national ~32,000 figure by canton Bern&#39;s ~12% share of Swiss population. Source: GastroSuisse Branchenspiegel 2025.'>\u003c/div>\n    \u003cdiv class=\"target-callout reveal\">\n      \u003cspan class=\"badge\" data-sk=\"Vstupný klin\" data-en=\"Go-to-market wedge\">Vstupný klin\u003c/span>\n      \u003cp data-sk='\u003cb>Trójsky kôň do reťazca:\u003c/b> keď pilot potvrdí produkt, získať \u003cb>jednu pobočku\u003c/b> viacpobočkovej bernskej skupiny ako bežného Restaurant zákazníka — nie hneď enterprise zmluvu. Jedna prevádzka dokáže štandard, centrálne zdieľané recepty sú presne bolesť reťazcov, a expanzia na ďalšie pobočky prichádza prirodzene. Zatiaľ ide o stratégiu, nie o rozbehnutý obchod.' data-en='\u003cb>Trojan horse into a chain:\u003c/b> once the pilot validates the product, land \u003cb>one venue\u003c/b> of a Bern multi-location group as a normal Restaurant customer — not an enterprise contract up front. One venue proves the standard, centrally shared recipes are exactly a chain&#39;s pain, and expansion to further venues follows naturally. This is a strategy, not an in-progress deal.'>\u003c/p>\n    \u003c/div>\n\n    \u003cdiv class=\"group-label reveal\" data-sk=\"Pre koho to je\" data-en=\"Who it's for\">Pre koho to je\u003c/div>\n    \u003cdiv class=\"card-grid-3 reveal\">\n      \u003cdiv class=\"vcard\">\n        \u003cdiv class=\"persona-role\" data-sk=\"Kuchár na linke\" data-en=\"Line cook\">Kuchár na linke\u003c/div>\n        \u003cp class=\"persona-quote\" data-sk=\"„Čo mám dnes na svojej stanici spraviť ako prvé?“\" data-en=\"&quot;What do I prep first on my station today?&quot;\">„Čo mám dnes na svojej stanici spraviť ako prvé?“\u003c/p>\n        \u003cp data-sk=\"Otvorí Check List, vidí prep sheet svojej stanice s prioritami TO DO / CHECK / FINISH. Žiadne hádanie, žiadny stratený papier.\" data-en=\"Opens the Check List, sees their station's prep sheet with TO DO / CHECK / FINISH priorities. No guessing, no lost paper.\">\u003c/p>\n      \u003c/div>\n      \u003cdiv class=\"vcard\">\n        \u003cdiv class=\"persona-role\" data-sk=\"Šéfkuchár / majiteľ\" data-en=\"Head chef / owner\">Šéfkuchár / majiteľ\u003c/div>\n        \u003cp class=\"persona-quote\" data-sk=\"„Beží prep? Aký mám food cost? Kto čo objednal?“\" data-en=\"&quot;Is prep on track? What's my food cost? Who ordered what?&quot;\">„Beží prep? Aký mám food cost? Kto čo objednal?“\u003c/p>\n        \u003cp data-sk=\"Živý pohľad naprieč stanicami, food cost z nacenených ingrediencií, Order List a Working Time. Know-how kuchyne prežije aj výmenu personálu.\" data-en=\"A live cross-station view, food cost from priced ingredients, Order List and Working Time. The kitchen's know-how survives staff turnover.\">\u003c/p>\n      \u003c/div>\n      \u003cdiv class=\"vcard\">\n        \u003cdiv class=\"persona-role\" data-sk=\"Prevádzkovateľ viacerých podnikov\" data-en=\"Multi-venue operator\">Prevádzkovateľ viacerých podnikov\u003c/div>\n        \u003cp class=\"persona-quote\" data-sk=\"„Ako udržím rovnaký štandard na piatich miestach?“\" data-en=\"&quot;How do I hold the same standard across five venues?&quot;\">„Ako udržím rovnaký štandard na piatich miestach?“\u003c/p>\n        \u003cp data-sk=\"Tímy, roly a zdieľané recepty naprieč prevádzkami — jeden štandard, replikovateľný. Presne profil viacpobočkovej bernskej skupiny — vstupný klin go-to-market vyššie.\" data-en=\"Teams, roles and shared recipes across venues — one standard, replicable. Exactly the multi-venue Bern group profile — the go-to-market wedge above.\">\u003c/p>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003c!-- ============ ROADMAP ============ -->\n  \u003csection id=\"roadmap\">\n    \u003cdiv class=\"eyebrow reveal\" data-sk=\"Roadmapa\" data-en=\"Roadmap\">Roadmapa\u003c/div>\n    \u003ch2 class=\"section-title reveal\" data-sk=\"Od začiatku do 2030\" data-en=\"Inception to 2030\">Od začiatku do 2030\u003c/h2>\n    \u003cp class=\"section-desc reveal\" data-sk=\"Plné tyrkysové pruhy sú dodané a datované. Šrafované pruhy sú výhľad, nie záväzné dátumy — len ilustračné kvartály. Posúvaj vodorovne pre celú časovú os.\" data-en=\"Solid teal bars are shipped and dated. Hatched bars are forward vision, not committed dates — illustrative quarters only. Scroll horizontally to see the full timeline.\">\u003c/p>\n    \u003cdiv class=\"chart-card reveal\">\n      \u003cdiv class=\"chart-legend\">\n        \u003cspan>\u003ci class=\"legend-dot\" style=\"background:var(--accent);\">\u003c/i>\u003cspan data-sk=\"Dodané\" data-en=\"Shipped\">Dodané\u003c/span>\u003c/span>\n        \u003cspan>\u003ci class=\"legend-dot\" style=\"background:repeating-linear-gradient(45deg, rgba(156,148,158,0.7) 0 3px, rgba(156,148,158,0.3) 3px 6px);\">\u003c/i>\u003cspan data-sk=\"Vízia (ilustračné termíny)\" data-en=\"Vision (illustrative timing)\">Vízia (ilustračné termíny)\u003c/span>\u003c/span>\n        \u003cspan>\u003ci class=\"legend-line\">\u003c/i>\u003cspan data-sk=\"Dnes\" data-en=\"Today\">Dnes\u003c/span>\u003c/span>\n      \u003c/div>\n      \u003cdiv class=\"gantt-scroll\">\u003cdiv class=\"gantt\" id=\"ganttChart\">\u003c/div>\u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003c!-- ============ FINANCIALS ============ -->\n  \u003csection id=\"financials\">\n    \u003cdiv class=\"eyebrow reveal\" data-sk=\"Financie\" data-en=\"Financials\">Financie\u003c/div>\n    \u003ch2 class=\"section-title reveal\" data-sk=\"Monetizácia\" data-en=\"Monetization\">Monetizácia\u003c/h2>\n    \u003cp class=\"section-desc reveal\" data-sk=\"Predplatné úrovne priamo kopírujú užívateľské tiery produktu (Home Cook / Chef Pro / Restaurant), v CHF pre švajčiarsky trh. Go-to-market začína v kantóne Bern — domovskom kantóne pilotnej kuchyne — potom susedné kantóny a časom nemecky hovoriace Švajčiarsko. Budúca B2B vrstva — švajčiarski dodávatelia obchodujúci cez platformu — je vo fáze vízie, nie postavená.\" data-en=\"Subscription tiers map directly to the product's own user tiers (Home Cook / Chef Pro / Restaurant), priced in CHF for the Swiss market. Go-to-market starts in canton Bern — the pilot kitchen's own canton — before expanding to neighbouring cantons and eventually German-speaking Switzerland. A future B2B layer — Swiss suppliers transacting through the platform — is vision-stage, not built.\">\u003c/p>\n\n    \u003cdiv class=\"money-callouts reveal\">\n      \u003cdiv class=\"money-callout\">\n        \u003cdiv class=\"tag\" data-sk=\"Cesta k prvému príjmu\" data-en=\"Path to first revenue\">Cesta k prvému príjmu\u003c/div>\n        \u003cp data-sk='\u003cb>Plán monetizácie formalizovaný 13.7.2026\u003c/b> (plná expertná analýza 13 modelov: \u003ci>\u003ca href=\"monetization.html\">monetization.html\u003c/a>\u003c/i>): \u003cb>predaj zakladajúcim členom\u003c/b> (prvých 10 kuchýň za CHF 490/rok, ponúkané počas augustového trialu) v kombinácii s \u003cb>platenou onboarding službou\u003c/b> (~CHF 990 — zakladateľ, pracujúci šéfkuchár, osobne zdigitalizuje recepty a prep sheety kuchyne). Dva blokátory prvého príjmu sú právne, nie produktové: písomný súhlas zamestnávateľa s vedľajším zárobkom (list nadraftovaný, pripravený poslať) a registrácia Einzelfirmy — ani jedno zatiaľ hotové.' data-en='\u003cb>Monetization plan formalized 2026-07-13\u003c/b> (full expert-panel analysis of 13 models: \u003ci>\u003ca href=\"monetization.html\">monetization.html\u003c/a>\u003c/i>): a \u003cb>founding-member pre-sale\u003c/b> (first 10 kitchens at CHF 490/year, offered during the August trial) combined with a \u003cb>paid onboarding service\u003c/b> (~CHF 990 — the founder, a working chef, personally digitizes the kitchen&#39;s recipes and prep sheets). The two blockers to first revenue are legal, not product: written employer consent for side-business income (letter drafted, ready to send), and sole-proprietorship registration — neither yet complete.'>\u003c/p>\n      \u003c/div>\n      \u003cdiv class=\"money-callout\">\n        \u003cdiv class=\"tag\" data-sk=\"Náklady na build doteraz\" data-en=\"Build cost to date\">Náklady na build doteraz\u003c/div>\n        \u003cp data-sk='\u003cb>~CHF 274 hotovosť\u003c/b> (Claude/API predplatné ~233, Gamma 20, domény chefos.ch 5 + sautero.ch/.com 15, denný ingredient agent ~1) + \u003cb>~134 h času zakladateľa\u003c/b> (×45 CHF/h ≈ CHF 6 050) — reálny čas, kedy bola Claude Code appka otvorená pri projekte, z jej session logov (od 8.7.), bez odhadov. Funkčný multi-feature produkt pre jednu pilotnú kuchynskú skupinu, postavený sólo šéfkuchárom-founderom s AI agentom, žiadne iné inžinierske výdavky. Self-reported, neauditované — detail: costs.html.' data-en='\u003cb>~CHF 274 cash\u003c/b> (Claude/API subscriptions ~233, Gamma 20, domains chefos.ch 5 + sautero.ch/.com 15, daily ingredient agent ~1) + \u003cb>~134 h founder time\u003c/b> (× CHF 45/h ≈ CHF 6,050) — the real time the Claude Code app was open on the project, from its session logs (since Jul 8), no estimates. A working multi-feature product for one pilot kitchen group, built by a solo chef-founder with an AI agent, no other engineering spend. Self-reported, not audited — detail: costs.html.'>\u003c/p>\n      \u003c/div>\n    \u003c/div>\n\n    \u003cdiv class=\"chart-card reveal\" style=\"margin-top:24px;\">\n      \u003cdiv class=\"chart-legend\">\u003cspan>\u003ci class=\"legend-dot\" style=\"background:var(--accent);\">\u003c/i>\u003cspan data-sk=\"Hodiny buildu za deň — reálny čas otvorenej appky z Claude Code session logov, ťukni na stĺpec pre detail\" data-en=\"Build hours per day — real app-open time from the Claude Code session logs, tap a bar for detail\">Hodiny buildu za deň — ťukni na stĺpec pre detail\u003c/span>\u003c/span>\u003c/div>\n      \u003cdiv id=\"hoursBarWrap\" style=\"overflow-x:auto;\">\u003c/div>\n      \u003cdiv id=\"hoursBarDetail\" style=\"font-family:var(--mono); font-size:12.5px; color:var(--accent); min-height:18px; margin-top:8px;\">\u003c/div>\n    \u003c/div>\n\n    \u003cdiv class=\"tier-grid reveal\">\n      \u003cdiv class=\"tier-card\">\n        \u003cdiv class=\"tier-name\">Home Cook\u003c/div>\n        \u003cdiv class=\"tier-price\">Free\u003c/div>\n        \u003cul class=\"tier-list\">\u003cli>Recipes, scaling, shopping lists\u003c/li>\u003cli>Earns AI tokens by contributing verified data\u003c/li>\u003cli>Not the current focus — deferred\u003c/li>\u003c/ul>\n      \u003c/div>\n      \u003cdiv class=\"tier-card featured\">\n        \u003cdiv class=\"tier-name\">Chef Pro\u003c/div>\n        \u003cdiv class=\"tier-price\">CHF 49\u003cspan>/month/kitchen\u003c/span>\u003c/div>\n        \u003cul class=\"tier-list\">\u003cli>Full recipe engine + AI import\u003c/li>\u003cli>Cost &amp; nutrition engine\u003c/li>\u003cli>Check List, Order List, Ingredients\u003c/li>\u003c/ul>\n      \u003c/div>\n      \u003cdiv class=\"tier-card\">\n        \u003cdiv class=\"tier-name\">Restaurant\u003c/div>\n        \u003cdiv class=\"tier-price\">CHF 149\u003cspan>/month/kitchen\u003c/span>\u003c/div>\n        \u003cul class=\"tier-list\">\u003cli>Everything in Chef Pro\u003c/li>\u003cli>Multi-user roles, Schedule, live cross-station view\u003c/li>\u003cli>Chef's Assistant\u003c/li>\u003c/ul>\n      \u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"disclaimer reveal\" data-sk='\u003cb>Zobrazené ceny sú ilustračné\u003c/b>, nie finálne ani schválené investormi. Zatiaľ neexistujú žiadni platiaci zákazníci — produkt je overovaný na jednej pilotnej kuchyni, zatiaľ nemonetizovaný.' data-en='\u003cb>Pricing shown is illustrative\u003c/b>, not finalized or investor-approved. No paying customers exist yet — the product is validated against one pilot kitchen, not yet monetized.'>\u003c/div>\n\n    \u003cdiv class=\"chart-card reveal\" style=\"margin-top:24px;\">\n      \u003cdiv class=\"chart-legend\">\u003cspan>\u003ci class=\"legend-dot\" style=\"background:var(--gold);\">\u003c/i>\u003cspan data-sk=\"Ilustračné ARR (CHF), 2026–2030 — najprv kantón Bern\" data-en=\"Illustrative ARR (CHF), 2026–2030 — canton Bern first\">\u003c/span>\u003c/span>\u003c/div>\n      \u003cdiv class=\"revenue-layout\">\n        \u003cdiv id=\"revenueChartWrap\">\u003c/div>\n        \u003cdiv class=\"revenue-callout\">\n          \u003cdiv class=\"big\" id=\"revenueBigNum\">\u003c/div>\n          \u003cdiv class=\"cap\" data-sk=\"Ilustračné ARR 2030, ak sa kantón Bern potvrdí a bude nasledovať expanzia do nemecky hovoriaceho Švajčiarska — nie prognóza ani záväzok. Dnes nula platiacich zákazníkov.\" data-en=\"Illustrative 2030 ARR if canton Bern proves out and expansion into German-speaking Switzerland follows — not a forecast or commitment. Zero live paying customers today.\">\u003c/div>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"assumptions-table-wrap\">\n        \u003ctable class=\"assumptions-table\" id=\"assumptionsTable\">\u003c/table>\n      \u003c/div>\n      \u003cdiv class=\"disclaimer\" data-sk='\u003cb>Len ilustračná projekcia — nie skutočný ani prisľúbený príjem.\u003c/b> Zdola-nahor, nie rastová krivka: počty platiacich kuchýň vyššie sú hypotetický predpoklad adopcie (od ~3 500 podnikov kantónu Bern, ~12% odhad švajčiarskeho celku) × blended CHF 89/mesiac/kuchyňa (60 % Chef Pro CHF 49, 40 % Restaurant CHF 149).' data-en=\"\u003cb>Illustrative projection only — not actual or committed revenue.\u003c/b> Bottom-up, not a top-line growth curve: paying-kitchen counts above are a hypothetical adoption assumption (starting with canton Bern's ~3,500 establishments, ~12% estimate of the Swiss total) × a blended CHF 89/month/kitchen (60% Chef Pro CHF 49, 40% Restaurant CHF 149).\">\u003c/div>\n    \u003c/div>\n\n    \u003c!-- Revenue streams beyond the subscription backbone (models from monetization.html) -->\n    \u003cdiv class=\"group-label reveal\" data-sk=\"Príjmové toky za hranicou predplatného\" data-en=\"Revenue streams beyond the subscription\">Príjmové toky za hranicou predplatného\u003c/div>\n    \u003cp class=\"section-desc reveal\" style=\"margin-bottom:20px;\" data-sk=\"Predplatné je chrbtica. Okolo neho stojí 6 investorsky najsilnejších tokov (vybrané z plnej analýzy 14 modelov). Nič z „neskôr“ sa netvári ako dnešný príjem; hviezdičky sú verdikt expertného panelu, nie prísľub.\" data-en=\"Subscriptions are the backbone. Around it sit the 6 investor-strongest streams (picked from the full 14-model analysis). Nothing in &quot;later&quot; pretends to be today's revenue; the stars are the expert panel's verdict, not a promise.\">\u003c/p>\n\n    \u003cdiv class=\"stream-grid reveal\">\n      \u003cdiv class=\"scard\">\u003cdiv class=\"sh\">\u003cspan class=\"si\">🏛️\u003c/span>\u003ch5 data-sk=\"Predplatné na kuchyňu\" data-en=\"Subscription per kitchen\">Predplatné na kuchyňu\u003c/h5>\u003cspan class=\"stage-pill now\" data-sk=\"Teraz\" data-en=\"Now\">Teraz\u003c/span>\u003c/div>\u003cp class=\"sm\" data-sk=\"CHF 49 Chef Pro · 149 Restaurant/mes. Chrbtica — predvídateľný recurring MRR, multi-tenant architektúra už hotová.\" data-en=\"CHF 49 Chef Pro · 149 Restaurant/mo. The backbone — predictable recurring MRR, the multi-tenant architecture already built.\">\u003c/p>\u003cdiv class=\"sstars\">★★★★★\u003c/div>\u003c/div>\n      \u003cdiv class=\"scard\">\u003cdiv class=\"sh\">\u003cspan class=\"si\">🎟️\u003c/span>\u003ch5 data-sk=\"Founding pre-sale\" data-en=\"Founding pre-sale\">Founding pre-sale\u003c/h5>\u003cspan class=\"stage-pill now\" data-sk=\"Teraz\" data-en=\"Now\">Teraz\u003c/span>\u003c/div>\u003cp class=\"sm\" data-sk=\"Prvých 10 kuchýň CHF 490/rok vopred počas augustového trialu. Cash bez dilúcie, najtvrdšia validácia — kto zaplatí rok vopred, je skutočný zákazník.\" data-en=\"First 10 kitchens at CHF 490/year up front during the August trial. Cash with no dilution, the hardest validation — paying a year ahead makes you a real customer.\">\u003c/p>\u003cdiv class=\"sstars\">★★★★★\u003c/div>\u003c/div>\n      \u003cdiv class=\"scard\">\u003cdiv class=\"sh\">\u003cspan class=\"si\">🧑‍🍳\u003c/span>\u003ch5 data-sk=\"Platený onboarding\" data-en=\"Paid onboarding\">Platený onboarding\u003c/h5>\u003cspan class=\"stage-pill now\" data-sk=\"Teraz\" data-en=\"Now\">Teraz\u003c/span>\u003c/div>\u003cp class=\"sm\" data-sk=\"~CHF 990: zakladateľ osobne zdigitalizuje kuchyňu. Vysoká marža (AI robí väčšinu), chef-only výhoda + dátový zámok proti churnu.\" data-en=\"~CHF 990: the founder personally digitizes the kitchen. High margin (AI does most), a chef-only edge + a data moat against churn.\">\u003c/p>\u003cdiv class=\"sstars\">★★★★☆\u003c/div>\u003c/div>\n      \u003cdiv class=\"scard\">\u003cdiv class=\"sh\">\u003cspan class=\"si\">🏢\u003c/span>\u003ch5 data-sk=\"Enterprise / reťazce\" data-en=\"Enterprise / chains\">Enterprise / reťazce\u003c/h5>\u003cspan class=\"stage-pill after\" data-sk=\"2027+\" data-en=\"2027+\">2027+\u003c/span>\u003c/div>\u003cp class=\"sm\" data-sk=\"Multi-location licencia, centrálne recepty na pobočky, per-location cena. Jeden podpis = 10× MRR; land-and-expand cez „trójskeho koňa“ jednej pobočky.\" data-en=\"Multi-location licence, central recipes pushed to venues, per-location pricing. One signature = 10× MRR; land-and-expand via the one-venue trojan horse.\">\u003c/p>\u003cdiv class=\"sstars\">★★★★☆\u003c/div>\u003c/div>\n      \u003cdiv class=\"scard\">\u003cdiv class=\"sh\">\u003cspan class=\"si\">🤝\u003c/span>\u003ch5 data-sk=\"Dodávateľský marketplace\" data-en=\"Supplier marketplace\">Dodávateľský marketplace\u003c/h5>\u003cspan class=\"stage-pill vision\" data-sk=\"Vízia\" data-en=\"Vision\">Vízia\u003c/span>\u003c/div>\u003cp class=\"sm\" data-sk=\"% z objednávok cez Order List napojený na švajčiarskych dodávateľov (Transgourmet, Prodega). Potenciálne najväčší tok — rádovo nad predplatné, expanzia TAM.\" data-en=\"A % of orders via an Order List wired to Swiss suppliers (Transgourmet, Prodega). Potentially the biggest stream — an order of magnitude above subscriptions, a TAM expansion.\">\u003c/p>\u003cdiv class=\"sstars\">★★★☆☆\u003c/div>\u003c/div>\n      \u003cdiv class=\"scard\">\u003cdiv class=\"sh\">\u003cspan class=\"si\">🤖\u003c/span>\u003ch5 data-sk=\"AI, tokeny & dátová inteligencia\" data-en=\"AI, tokens & data intelligence\">AI, tokeny & dátová inteligencia\u003c/h5>\u003cspan class=\"stage-pill vision\" data-sk=\"Vízia\" data-en=\"Vision\">Vízia\u003c/span>\u003c/div>\u003cp class=\"sm\" data-sk=\"Tokeny za AI naprieč tiermi: heavy-use kredity aj free-tier flywheel — free užívatelia si tokeny ZARÁBAJÚ prispievaním overených dát (ceny, yieldy, HACCP) a míňajú na AI, takže free tier nikdy nespáli viac, než „odpracoval“, a zároveň buduje dátové aktívum. To poháňa benchmarking, AI prep odporúčania a predikciu dopytu. Len opt-in, 2028+.\" data-en=\"AI tokens across tiers: heavy-use credits AND a free-tier flywheel — free users EARN tokens by contributing verified data (prices, yields, HACCP) and spend them on AI, so the free tier never burns more than it 'earned' while building a data asset. That powers benchmarking, AI prep recommendations and demand prediction. Opt-in only, 2028+.\">\u003c/p>\u003cdiv class=\"sstars\">★★★★☆\u003c/div>\u003c/div>\n    \u003c/div>\n    \u003cp class=\"section-desc reveal\" style=\"margin:14px 0 0 0; font-size:12.5px;\" data-sk=\"Zvyšných 8 modelov (workshopy, modulárne add-ony, dokumenty v identite klienta, sponzorované umiestnenie dodávateľov, hardware, obsahová knižnica…) je s verdiktmi v plnej analýze: \u003ca href='monetization.html'>monetization.html\u003c/a>.\" data-en=\"The other 8 models (workshops, modular add-ons, client-identity documents, sponsored supplier placement, hardware, a content library…) are in the full analysis with verdicts: \u003ca href='monetization.html'>monetization.html\u003c/a>.\">\u003c/p>\n\n    \u003cdiv class=\"chart-card reveal\" style=\"margin-top:22px;\">\n      \u003cdiv class=\"chart-legend\" id=\"streamLegend\">\u003c/div>\n      \u003cdiv id=\"streamMatrixWrap\">\u003c/div>\n      \u003cdiv class=\"disclaimer\" data-sk=\"\u003cb>Kvalitatívna mapa, nie čísla príjmu.\u003c/b> Poloha je verdikt panelu — vodorovne pripravenosť (dnes → vízia), zvisle potenciál toku. Chrbtica (predplatné) je hore-vpravo: vysoký potenciál, spustiteľné hneď. Najväčší potenciál (marketplace, dáta) leží zámerne ďaleko vo vízii.\" data-en=\"\u003cb>A qualitative map, not revenue numbers.\u003c/b> Position is the panel's verdict — horizontally readiness (today → vision), vertically the stream's potential. The backbone (subscription) sits top-right: high potential, launchable now. The biggest potential (marketplace, data) sits deliberately far out in vision.\">\u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003c!-- ============ BRAND DNA / NORTH STAR / CLOSE ============ -->\n  \u003csection id=\"brand\">\n    \u003cdiv class=\"eyebrow reveal\" data-sk=\"Značka & vízia\" data-en=\"Brand & vision\">Značka & vízia\u003c/div>\n    \u003ch2 class=\"section-title reveal\" data-sk=\"Z čoho je Sautero\" data-en=\"What Sautero is made of\">Z čoho je Sautero\u003c/h2>\n    \u003cp class=\"section-desc reveal\" data-sk=\"Meno Sautero pochádza z „sauté“ — od pohybu na panvici. Značka stojí na jednej myšlienke a piatich hodnotách, ktoré rozhodujú, čo staviame a ako o tom hovoríme.\" data-en=\"The name Sautero comes from &quot;sauté&quot; — from the motion at the pan. The brand stands on one idea and five values that decide what we build and how we speak.\">\u003c/p>\n\n    \u003cdiv class=\"statement reveal\" data-sk=\"Staviame kuchyňu, ktorá si \u003cem>pamätá\u003c/em> — aby na šéfkuchárov zostal čas variť.\" data-en=\"We build a kitchen that \u003cem>remembers\u003c/em> — so chefs get their time back to cook.\">Staviame kuchyňu, ktorá si \u003cem>pamätá\u003c/em> — aby na šéfkuchárov zostal čas variť.\u003c/div>\n\n    \u003cdiv class=\"group-label reveal\" data-sk=\"Hodnoty značky\" data-en=\"Brand values\">Hodnoty značky\u003c/div>\n    \u003cdiv class=\"values-grid reveal\">\n      \u003cdiv class=\"value-cell\">\u003cdiv class=\"ve\">🔪\u003c/div>\u003ch4 data-sk=\"Z kuchyne von\" data-en=\"Kitchen-out\">Z kuchyne von\u003c/h4>\u003cp data-sk=\"Každé rozhodnutie prejde testom reálnej služby.\" data-en=\"Every decision passes the real-service test.\">\u003c/p>\u003c/div>\n      \u003cdiv class=\"value-cell\">\u003cdiv class=\"ve\">🧠\u003c/div>\u003ch4 data-sk=\"Pamäť\" data-en=\"Memory\">Pamäť\u003c/h4>\u003cp data-sk=\"Know-how patrí kuchyni, nie jednej hlave.\" data-en=\"Know-how belongs to the kitchen, not one head.\">\u003c/p>\u003c/div>\n      \u003cdiv class=\"value-cell\">\u003cdiv class=\"ve\">🎯\u003c/div>\u003ch4 data-sk=\"Poctivosť\" data-en=\"Honesty\">Poctivosť\u003c/h4>\u003cp data-sk=\"Čísla sú reálne alebo označené ako odhad.\" data-en=\"Numbers are real or labelled as estimates.\">\u003c/p>\u003c/div>\n      \u003cdiv class=\"value-cell\">\u003cdiv class=\"ve\">⚡\u003c/div>\u003ch4 data-sk=\"Jednoduchosť\" data-en=\"Simplicity\">Jednoduchosť\u003c/h4>\u003cp data-sk=\"Rýchle pri linke, na mobile, v jazyku kuchyne.\" data-en=\"Fast at the line, on a phone, in the kitchen's language.\">\u003c/p>\u003c/div>\n      \u003cdiv class=\"value-cell\">\u003cdiv class=\"ve\">🤝\u003c/div>\u003ch4 data-sk=\"Blízko pri zákazníkovi\" data-en=\"Close to the customer\">Blízko pri zákazníkovi\u003c/h4>\u003cp data-sk=\"Onboarding robí zakladateľ osobne, ruka v ruke.\" data-en=\"Onboarding is done by the founder, hand in hand.\">\u003c/p>\u003c/div>\n    \u003c/div>\n\n    \u003cdiv class=\"northstar reveal\">\n      \u003cdiv class=\"ns-card\">\n        \u003cdiv class=\"nsk\" data-sk=\"Severka\" data-en=\"North star\">Severka\u003c/div>\n        \u003cdiv class=\"nsv\" data-sk=\"Kuchyne, ktoré Sautero používajú v každodennom prepe.\" data-en=\"Kitchens using Sautero in their daily prep.\">Kuchyne, ktoré Sautero používajú v každodennom prepe.\u003c/div>\n        \u003cp data-sk=\"Nie stiahnutia ani registrácie — návyk. Úspech = kuchyňa, ktorá bez appky už nechce fungovať. Dnes: 1 pilotná skupina, cieľ trialu 1.8.: 25 užívateľov.\" data-en=\"Not downloads or signups — habit. Success = a kitchen that no longer wants to run without it. Today: 1 pilot group; trial target Aug 1: 25 users.\">\u003c/p>\n      \u003c/div>\n      \u003cdiv class=\"ns-card\">\n        \u003cdiv class=\"nsk\" data-sk=\"Archetyp značky\" data-en=\"Brand archetype\">Archetyp značky\u003c/div>\n        \u003cdiv class=\"nsv\" data-sk=\"Majster remesla + sprievodca.\" data-en=\"The craftsman-guide.\">Majster remesla + sprievodca.\u003c/div>\n        \u003cp data-sk=\"Sautero nie je „disruptor“, ktorý kuchárom hovorí, že to robia zle. Je to skúsený kolega, ktorý im drží chrbát — presný, pokojný, spoľahlivý. Tón: jasný, ľudský, bez korporátneho žargónu.\" data-en=\"Sautero isn't a &quot;disruptor&quot; telling chefs they're doing it wrong. It's the experienced colleague who has their back — precise, calm, dependable. Tone: clear, human, no corporate jargon.\">\u003c/p>\n      \u003c/div>\n    \u003c/div>\n\n    \u003cdiv style=\"margin-top:34px;\" class=\"reveal\">\n      \u003cdiv class=\"close-cta\">\n        \u003cdiv class=\"statement\" data-sk=\"Naživo. Poctivé. \u003cem>Postavené z kuchyne von.\u003c/em>\" data-en=\"Live. Honest. \u003cem>Built from the kitchen out.\u003c/em>\">Naživo. Poctivé. \u003cem>Postavené z kuchyne von.\u003c/em>\u003c/div>\n        \u003cp data-sk=\"Sautero už beží v produkcii, používané reálnou pilotnou kuchyňou, postavené sólo za zlomok bežných nákladov. Ďalší krok: verejný trial (1.8.), prvé platiace kuchyne v kantóne Bern a partneri, ktorí veria v lokálne remeslo s globálnym štandardom.\" data-en=\"Sautero is already running in production, used by a real pilot kitchen, built solo at a fraction of typical cost. Next: the public trial (Aug 1), the first paying kitchens in canton Bern, and partners who believe in local craft at a global standard.\">\u003c/p>\n        \u003cdiv class=\"close-meta\">\n          \u003cspan data-sk=\"Domov\" data-en=\"Home\">Domov: \u003cb>app.sautero.ch\u003c/b>\u003c/span>\n          \u003cspan data-sk=\"Sídlo\" data-en=\"Based in\">Sídlo: \u003cb>Bern, CH\u003c/b>\u003c/span>\n          \u003cspan data-sk=\"Investičný kontext\" data-en=\"Investor context\">Investičný kontext: \u003cb>Aare Ventures\u003c/b>\u003c/span>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  \u003cfooter class=\"foot\" id=\"footNote\">\u003c/footer>\n\u003c/div>\n\n\u003cscript>\n/* ============================================================\n   DATA — the only part of this file that should need editing when the project changes.\n   Keep KPIS / MARKET / PROCESS / ROADMAP / REVENUE in sync with docs/ROADMAP.md after any\n   shipped feature. File lives in /visual data/ per the 2026-07-15 Visual Data Standards.\n   ============================================================ */\nconst GENERATED = '2026-07-21';\n\nconst MARKET = [\n  { num:'~32,000', label:'F&B establishments, Switzerland', label_sk:'F&B podnikov, Švajčiarsko', note:'GastroSuisse Branchenspiegel 2025', note_sk:'GastroSuisse Branchenspiegel 2025' },\n  { num:'CHF 25–28bn', label:'Swiss foodservice revenue / year', label_sk:'tržby švajčiarskej gastronómie / rok', note:'GastroSuisse Branchenspiegel 2025', note_sk:'GastroSuisse Branchenspiegel 2025' },\n  { num:'~3,500', label:'F&B establishments, canton Bern', label_sk:'F&B podnikov, kantón Bern', note:'population-share estimate, not official', note_sk:'odhad podľa podielu populácie, nie oficiálne číslo' },\n  { num:'1', label:'Pilot kitchen live today', label_sk:'pilotná kuchyňa naživo dnes', note:'Burrito Bandito & Lido (one group, two venues)', note_sk:'Burrito Bandito & Lido (jedna skupina, dve prevádzky)' },\n];\n\nconst KPI_GROUPS = [\n  { group:'Content depth', group_sk:'Hĺbka obsahu', items:[\n    { num:'183', label:'Library recipes', label_sk:'receptov v knižnici', note:'full 20-field format, every one enriched to Michelin depth (equipment, chef notes, storage, plating)', note_sk:'plný 20-poľový formát, každý obohatený do Michelin hĺbky (vybavenie, poznámky šéfkuchára, skladovanie, plating)' },\n    { num:'2,005', label:'Ingredients priced', label_sk:'nacenených ingrediencií', note:'Sautero price book live in production, cost-matching engine (prices estimated, not yet market-verified)', note_sk:'Sautero cenník naživo v produkcii, cost-matching engine (ceny odhadované, zatiaľ neoverené trhom)' },\n    { num:'8', label:'Kitchen stations', label_sk:'kuchynských staníc', note:'dish-grouped prep sheets', note_sk:'prep sheety zoskupené podľa jedál' },\n  ]},\n  { group:'AI & reach', group_sk:'AI a dosah', items:[\n    { num:'7', label:'AI features live', label_sk:'AI funkcií naživo', note:'photo/HTML/PDF recipe scan · method generation · Chef\\'s Assistant · translate · invoice scan · menu-from-URL · duplicate check', note_sk:'sken receptu z fotky/HTML/PDF · generovanie postupu · Chef\\'s Assistant · preklad · sken faktúry · menu z URL · kontrola duplicít' },\n    { num:'5', label:'UI languages', label_sk:'jazykov rozhrania', note:'EN/DE/FR/IT/SK, partial coverage', note_sk:'EN/DE/FR/IT/SK, čiastočné pokrytie' },\n    { num:'Live', label:'Per-user AI metering', label_sk:'AI meranie per užívateľ', note:'every AI call logged per user & feature, admin dashboard with cost split', note_sk:'každé AI volanie logované per užívateľ a funkcia, admin prehľad s rozdelením nákladov' },\n  ]},\n  { group:'Traction', group_sk:'Trakcia', items:[\n    { num:'1', label:'Pilot kitchen', label_sk:'pilotná kuchyňa', note:'Burrito Bandito & Lido (one group, two venues)', note_sk:'Burrito Bandito & Lido (jedna skupina, dve prevádzky)' },\n    { num:'13', label:'Accounts on the platform', label_sk:'účtov na platforme', note:'10 real external users + 3 founder test accounts, invite-only', note_sk:'10 reálnych externých + 3 zakladateľské testovacie účty, len na pozvánku' },\n    { num:'0', label:'Paying customers', label_sk:'platiacich zákazníkov', note:'pre-monetization', note_sk:'pred monetizáciou' },\n    { num:'Aug 1', label:'Public trial target', label_sk:'cieľ verejného trialu', note:'25 users, multi-team via QR invite', note_sk:'25 užívateľov, multi-team cez QR pozvánku' },\n  ]},\n  { group:'Infrastructure', group_sk:'Infraštruktúra', items:[\n    { num:'app.sautero.ch', label:'Own domain live', label_sk:'vlastná doména naživo', note:'custom SMTP, no third-party branding — migrated to app.sautero.ch on 18 Jul (rebrand day)', note_sk:'vlastný SMTP, žiadny cudzí branding — 18.7. zmigrované na app.sautero.ch (deň rebrandu)' },\n  ]},\n];\nconst HEADLINE_STATS = [\n  { num:'183', label:'Library recipes, Michelin-enriched', label_sk:'receptov v knižnici, Michelin-obohatené' },\n  { num:'2,005', label:'Ingredients priced in production', label_sk:'nacenených ingrediencií v produkcii' },\n  { num:'7', label:'AI features live today', label_sk:'AI funkcií naživo dnes' },\n];\n\nconst PROCESS = [\n  {\n    icon:'📋', title:'Line-cook workflow (Check List)', title_sk:'Workflow kuchára na linke (Check List)', status:'live',\n    desc:'Dish-grouped prep sheets per station (TO DO / CHECK / FINISH / DON\\'T DO), a live cross-station \"All\" view, and an overload flag once a station exceeds 3.5h of outstanding work. Not a ticket/KDS system — cross-team visibility into shared prep state.', desc_sk:'Prep sheety zoskupené podľa jedál per stanica (TO DO / CHECK / FINISH / DON\\'T DO), živý pohľad „All\" naprieč stanicami a overload vlajka, keď stanica prekročí 3,5 h nevybavenej práce. Nie je to ticket/KDS systém — je to tímová viditeľnosť zdieľaného stavu prípravy.'\n  },\n  {\n    icon:'📦', title:'Inventory awareness', title_sk:'Prehľad o zásobách', status:'live',\n    desc:'Per-item on-hand counts, minimum-required thresholds with an automatic shortfall flag, and a station-by-station Order List built off the same priced ingredient table used for recipe costing.', desc_sk:'Skladové počty per položka, minimálne prahy s automatickou vlajkou nedostatku a Order List po staniciach postavený nad tou istou nacenenou tabuľkou ingrediencií, z ktorej sa počíta food cost receptov.'\n  },\n  {\n    icon:'🤝', title:'Supplier collaboration', title_sk:'Spolupráca s dodávateľmi', status:'vision',\n    desc:'Not built. Vision: connect the Ingredients/Order List data to real Swiss foodservice supplier feeds (e.g. Transgourmet, Prodega) and order submission — the monetizable B2B layer referenced in Financials below.', desc_sk:'Nepostavené. Vízia: prepojiť dáta Ingrediencií/Order Listu na reálne feedy švajčiarskych gastro dodávateľov (napr. Transgourmet, Prodega) a odosielanie objednávok — monetizovateľná B2B vrstva spomínaná nižšie vo Financiách.'\n  },\n];\n\nconst ROADMAP_START = new Date('2026-07-01');\nconst TODAY = new Date();\nfunction monthsBetween(dateStr){\n  const d = new Date(dateStr);\n  return (d.getFullYear()-ROADMAP_START.getFullYear())*12 + (d.getMonth()-ROADMAP_START.getMonth()) + (d.getDate()-1)/30;\n}\nconst ROADMAP = [\n  { label:'Phase 0 — Foundation & Validation', label_sk:'Fáza 0 — Základy & validácia', start:'2026-07-08', end:'2026-07-08', shipped:true },\n  { label:'Phase 1a — Recipe engine + data foundation', label_sk:'Fáza 1a — Receptový engine + dátový základ', start:'2026-07-09', end:'2026-07-09', shipped:true },\n  { label:'Phase 1b — AI recipe import', label_sk:'Fáza 1b — AI import receptov', start:'2026-07-09', end:'2026-07-09', shipped:true },\n  { label:'Ingredients, nutrition, Order List, Schedule, Fridge Temp', label_sk:'Ingrediencie, nutrície, Order List, Schedule, Fridge Temp', start:'2026-07-09', end:'2026-07-09', shipped:true },\n  { label:'Check List (8-station prep sheets) + Kitchen Flow v1', label_sk:'Check List (prep sheety 8 staníc) + Kitchen Flow v1', start:'2026-07-09', end:'2026-07-10', shipped:true },\n  { label:'Multi-language UI v1 + Ingredients expansion (1,263)', label_sk:'Viacjazyčné UI v1 + rozšírenie ingrediencií (1 263)', start:'2026-07-10', end:'2026-07-10', shipped:true },\n  { label:'Check List polish: cross-station \"All\" view, swipe-back, per-item notes, busiest-first sort', label_sk:'Check List polish: pohľad „All\" naprieč stanicami, swipe-back, poznámky per položka, triedenie od najvyťaženejších', start:'2026-07-10', end:'2026-07-10', shipped:true },\n  { label:'Multi-team access gate, soft-delete, Order List redesign, Print Labels, Working Time (check-in/out + contract scan)', label_sk:'Multi-team prístupová brána, soft-delete, redesign Order Listu, Print Labels, Working Time (check-in/out + sken zmluvy)', start:'2026-07-11', end:'2026-07-12', shipped:true },\n  { label:'Engineering discipline: Git, staging environment, RLS audit + critical fix, error/usage tracking, audit log, trial success criteria', label_sk:'Inžinierska disciplína: Git, staging prostredie, RLS audit + kritická oprava, error/usage tracking, audit log, kritériá úspechu trialu', start:'2026-07-12', end:'2026-07-13', shipped:true },\n  { label:'Ingredients expanded to 2,000 (staging) + production reliability fixes: AI features restored, Check List delete silent-failure fixed', label_sk:'Ingrediencie rozšírené na 2 000 (staging) + opravy spoľahlivosti produkcie: AI funkcie obnovené, tiché zlyhanie mazania v Check Liste opravené', start:'2026-07-13', end:'2026-07-13', shipped:true },\n  { label:'Own domain live, critical signup-bug fix, Order List data-loss fix, 3-way recipe filter, background AI scanning, menu scan from URL, password + Face ID login, HACCP module waves 1+2, invite-only lockdown, mandatory password, Connections rebuild', label_sk:'Vlastná doména naživo, oprava kritického signup bugu, oprava straty dát Order Listu, 3-cestný filter receptov, AI skenovanie na pozadí, sken menu z URL, heslo + Face ID login, HACCP vlny 1+2, invite-only lockdown, povinné heslo, prestavba Connections', start:'2026-07-14', end:'2026-07-15', shipped:true },\n  { label:'Real data privacy + team join codes + Kitchen Reports + AI subscription gate + Privacy consent gate, then real team membership enforcement, role-based admin, long-press content management, custom ingredient lists, branded print v2 + always-on nav header, HACCP/Team Meetings gated to company accounts, central AI billing key, branded auth emails', label
