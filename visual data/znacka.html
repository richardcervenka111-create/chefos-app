row\">→\u003c/div>\n      \u003cdiv class=\"xform-after\">\n        \u003cspan class=\"lbl\">After\u003c/span>\n        \u003cdiv class=\"headline\">Nobody forgets what needs ordering.\u003c/div>\n        \u003cdiv class=\"detail\">One list, organized the way the kitchen actually works — not the way a spreadsheet does.\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003csection>\n  \u003cdiv class=\"wrap\">\n    \u003cdiv class=\"eyebrow reveal\">Where This Goes\u003c/div>\n    \u003ch2 class=\"head reveal\">Eight ideas, one at a time.\u003c/h2>\n    \u003cp class=\"prose reveal\" style=\"color:var(--ink-dim); font-size:16px; margin-top:-10px;\">Built in the order a real kitchen would ask for them — not the order that's easiest to code.\u003c/p>\n\n    \u003cdiv class=\"spine reveal\">\n      \u003cdiv class=\"stage live\">\n        \u003cdiv class=\"stage-dot\">\u003c/div>\n        \u003cdiv class=\"stage-top\">\u003cdiv class=\"stage-name\">Knowledge\u003c/div>\u003cdiv class=\"stage-tag\">Live\u003c/div>\u003c/div>\n        \u003cdiv class=\"stage-desc\">Get everything out of people's heads and onto one page everyone can read.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"stage live\">\n        \u003cdiv class=\"stage-dot\">\u003c/div>\n        \u003cdiv class=\"stage-top\">\u003cdiv class=\"stage-name\">Execution\u003c/div>\u003cdiv class=\"stage-tag\">Live\u003c/div>\u003c/div>\n        \u003cdiv class=\"stage-desc\">Turn that knowledge into what actually happens on the line, today.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"stage live\">\n        \u003cdiv class=\"stage-dot\">\u003c/div>\n        \u003cdiv class=\"stage-top\">\u003cdiv class=\"stage-name\">Communication\u003c/div>\u003cdiv class=\"stage-tag\">Live\u003c/div>\u003c/div>\n        \u003cdiv class=\"stage-desc\">Let the whole team see the same truth, in real time — and since July&nbsp;17, kitchens talk to each other too: public recipe &amp; ingredient shelves, sharing with chef friends, comments that cross kitchen walls.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"stage live\">\n        \u003cdiv class=\"stage-dot\">\u003c/div>\n        \u003cdiv class=\"stage-top\">\u003cdiv class=\"stage-name\">Inventory\u003c/div>\u003cdiv class=\"stage-tag\">Live\u003c/div>\u003c/div>\n        \u003cdiv class=\"stage-desc\">Know what you have before you run out of it.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"stage ahead\">\n        \u003cdiv class=\"stage-dot\">\u003c/div>\n        \u003cdiv class=\"stage-top\">\u003cdiv class=\"stage-name\">Production\u003c/div>\u003cdiv class=\"stage-tag\">Ahead\u003c/div>\u003c/div>\n        \u003cdiv class=\"stage-desc\">Plan a whole service, not one dish at a time.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"stage ahead\">\n        \u003cdiv class=\"stage-dot\">\u003c/div>\n        \u003cdiv class=\"stage-top\">\u003cdiv class=\"stage-name\">Intelligence\u003c/div>\u003cdiv class=\"stage-tag\">Ahead\u003c/div>\u003c/div>\n        \u003cdiv class=\"stage-desc\">Let the kitchen learn from its own patterns, instead of relying on gut alone.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"stage ahead\">\n        \u003cdiv class=\"stage-dot\">\u003c/div>\n        \u003cdiv class=\"stage-top\">\u003cdiv class=\"stage-name\">Multi-location\u003c/div>\u003cdiv class=\"stage-tag\">Ahead\u003c/div>\u003c/div>\n        \u003cdiv class=\"stage-desc\">One kitchen's knowledge becomes every kitchen's advantage.\u003c/div>\n      \u003c/div>\n      \u003cdiv class=\"stage ahead\">\n        \u003cdiv class=\"stage-dot\">\u003c/div>\n        \u003cdiv class=\"stage-top\">\u003cdiv class=\"stage-name\">Platform\u003c/div>\u003cdiv class=\"stage-tag\">Ahead\u003c/div>\u003c/div>\n        \u003cdiv class=\"stage-desc\">In every pocket, on every line — whether or not the wifi is any good.\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003csection>\n  \u003cdiv class=\"wrap\">\n    \u003cdiv class=\"eyebrow reveal\">Right Now\u003c/div>\n    \u003ch2 class=\"head reveal\">This isn't a deck. It's running.\u003c/h2>\n    \u003cdiv class=\"progress-body reveal\">\n      \u003cp>\u003cstrong>183 real recipes\u003c/strong> carry real technique, not filler — every one enriched to Michelin depth. \u003cstrong>2,005 ingredients\u003c/strong> already know their own price, their season, and what stands in for them when they're out. Every plate already knows roughly what it costs, before it's ever been plated. None of this is a mockup — it's the build, in a working kitchen's hands, tonight.\u003c/p>\n    \u003c/div>\n    \u003cdiv class=\"progress-stats reveal\">\n      \u003cdiv class=\"pstat\">\u003cdiv class=\"n mono\">183\u003c/div>\u003cdiv class=\"l\">Recipes carrying real technique\u003c/div>\u003c/div>\n      \u003cdiv class=\"pstat\">\u003cdiv class=\"n mono\">2,005\u003c/div>\u003cdiv class=\"l\">Ingredients, priced &amp; seasoned\u003c/div>\u003c/div>\n      \u003cdiv class=\"pstat\">\u003cdiv class=\"n mono\">8\u003c/div>\u003cdiv class=\"l\">Stages on the way to done\u003c/div>\u003c/div>\n      \u003cdiv class=\"pstat\">\u003cdiv class=\"n mono\">1\u003c/div>\u003cdiv class=\"l\">Kitchen already using it\u003c/div>\u003c/div>\n    \u003c/div>\n  \u003c/div>\n\u003c/section>\n\n\u003cfooter>\n  \u003cdiv class=\"wrap\">\n    \u003cspan>\u003cspan data-sk=\"Sautero — stavané z kuchyne von.\" data-en=\"Sautero — built kitchen-side out.\">Sautero — built kitchen-side out.\u003c/span>\u003c/span>\n    \u003cspan>\u003cspan data-sk=\"Bern, 2026.\" data-en=\"Bern, 2026.\">Bern, 2026.\u003c/span>\u003c/span>\n  \u003c/div>\n\u003c/footer>\n\n\u003cscript>\n  if(!window.matchMedia('(prefers-reduced-motion: reduce)').matches){\n    const io = new IntersectionObserver((entries)=>{\n      entries.forEach(e=>{\n        if(e.isIntersecting){ e.target.classList.add('visible'); io.unobserve(e.target); }\n      });\n    }, { threshold: 0.15 });\n    document.querySelectorAll('.reveal').forEach(el=>io.observe(el));\n  } else {\n    document.querySelectorAll('.reveal').forEach(el=>el.classList.add('visible'));\n  }\n\u003c/script>\n\n\u003cdiv class=\"chefos-stamp\" data-sk=\"🔄 Stav Sautero k 18. 7. 2026, 14:20\" data-en=\"🔄 Sautero state as of Jul 18, 2026, 14:20\">🔄 Stav Sautero k 18. 7. 2026, 14:20\u003c/div>\n\u003cbutton class=\"chefos-lang-fab\" id=\"chefosLangFab\" onclick=\"chefosToggleLang()\">EN\u003c/button>\n\n\u003cscript>\n/* Shared SK/EN toggle for /visual data/ docs without their own — same chefos_doc_lang key as\n   the rest, so one switch follows you across every document. Translates [data-sk]/[data-en]\n   pairs (chrome + stamp); untagged content stays in its original language. */\n(function(){\n  let lang = localStorage.getItem('chefos_doc_lang') || 'sk';\n  function apply(){\n    document.querySelectorAll('[data-sk]').forEach(el=>{\n      const val = lang === 'sk' ? el.getAttribute('data-sk') : (el.getAttribute('data-en') || el.getAttribute('data-sk'));\n      if(val.indexOf('\u003c') !== -1) el.innerHTML = val; else el.textContent = val;\n    });\n    const b = document.getElementById('chefosLangFab');\n    if(b) b.textContent = lang === 'sk' ? 'EN' : 'SK';\n    document.documentElement.lang = lang;\n  }\n  window.chefosToggleLang = function(){\n    lang = lang === 'sk' ? 'en' : 'sk';\n    localStorage.setItem('chefos_doc_lang', lang);\n    apply();\n  };\n  apply();\n})();\n\u003c/script>\n\u003cscript>\n/* t174 (18.7.): the Manifesto is bilingual — the HTML stays the EN original, MSK carries the\n   Slovak per selector index; the walker stashes EN innerHTML and swaps. Keep MSK in sync\n   with any content edit. */\n(function(){\n  const MSK = {\n    heroMark: 'Sautero — operačný systém pre profesionálne kuchyne',\n    heroLines: ['Kuchyne bežia', 'na chaose už', 'sto rokov.', 'Myslíme si, že to netreba.'],\n    heroSub: 'Stavané vnútri skutočnej kuchyne, nie okolo nej. Jedno spoločné miesto pre to, čo kuchyňa vie, čo sa deje práve teraz a čo bude treba zajtra — namiesto dvanástich zošitov a niečej pamäti.',\n    heroFoot: ['\u003cb>Stav\u003c/b> Funkčný build, v dennom používaní', '\u003cb>Postavil\u003c/b> Richard Červenka', '\u003cb>Kde\u003c/b> Bern'],\n    eyebrows: ['Problém', 'Vízia', 'Čo robí dnes', 'Kam to smeruje', 'Práve teraz'],\n    heads: ['Každá kuchyňa prijala ten istý chaos.', 'Kuchyňa, ktorá si pamätá.', 'Nie funkcie. Iná kuchyňa.', 'Osem myšlienok, jedna za druhou.', 'Toto nie je prezentácia. Toto beží.'],\n    problem: [\n      'Technika šéfkuchárky žije v jej hlave — a nikde inde.',\n      'Odkaz sa podá na passe a polovica sa na linku nikdy nedostane.',\n      'Na prípravu sa zabudne, kým už nie je hore prvý bon.',\n      'Tácka letí do koša a nikto nevie povedať, koľko naozaj stála.',\n      'Niečo sa pokazí — a otázka znie \u003ci>kto\u003c/i>, nikdy \u003ci>prečo\u003c/i>.'\n    ],\n    problemFinal: 'Každá kuchyňa sa s tým naučila žiť. \u003cb>Sautero nie.\u003c/b>',\n    visionBody: [\n      'Softvér zmenil, ako si firmy držia pravdu — jeden záznam, ktorému veria všetci, namiesto tuctu súkromných. Kuchyne to nikdy nedostali.',\n      'Sautero pristupuje ku kuchyni rovnako. Čo vie jeden kuchár, môže vedieť každý. Čo sa práve deje na linke, vidí ten, kto to vidieť potrebuje — nie ten, kto kričí najhlasnejšie.',\n      'Nič nezávisí od toho, či si to niekto zapamätá — lebo nič sa pamätať nemusí.'\n    ],\n    visionQuote: 'Chaos nie je kuchynská tradícia. Je to len najstarší bug, ktorý nikto neopravil.',\n    lblBefore: 'Predtým', lblAfter: 'Potom',\n    xformBefore: [\n      'Recepty žijú v šanónoch, na lepiacich papierikoch a v pamäti jedného šéfkuchára.',\n      'Nikto nevie, koľko jedlo stojí, kým neprídu faktúry.',\n      'Náhrady a sezónnosť žijú v niečej pamäti — ak vôbec.',\n      'Zajtrajší prep list sa dnes večer píše rukou a zajtra sa polovične dodrží.',\n      'Objednáva sa z pamäti, stanica po stanici.'\n    ],\n    headlines: [\n      'Spoločné poznanie kuchyne.',\n      'Presne vieš, koľko stojí každý tanier.',\n      'Každá ingrediencia nesie svoje vlastné poznanie.',\n      'Každý vie, čo je hotové. Žiadne kričanie. Žiadne hádanie.',\n      'Na objednávku sa nezabúda.'\n    ],\n    details: [\n      'Každý recept na jednom mieste, stavaný pre pracovnú linku — nie pre policu s kuchárskymi knihami.',\n      'Počíta sa automaticky, ingrediencia po ingrediencii, v momente napísania receptu.',\n      'Odkiaľ je, kedy má sezónu, čo ju nahradí — jedno ťuknutie z ktoréhokoľvek receptu.',\n      'Zoznam napíšeš raz, za pár sekúnd. Celá zajtrajšia zmena číta ten istý.',\n      'Jeden zoznam, usporiadaný tak, ako kuchyňa naozaj funguje — nie ako tabuľka.'\n    ],\n    stageNames: ['Poznanie', 'Exekúcia', 'Komunikácia', 'Sklad', 'Produkcia', 'Inteligencia', 'Multi-prevádzka', 'Platforma'],\n    stageTags: { 'Live':'Naživo', 'Ahead':'Pred nami' },\n    stageDescs: [\n      'Dostať všetko z hláv ľudí na jednu stránku, ktorú vie čítať každý.',\n      'Premeniť to poznanie na to, čo sa dnes reálne deje na linke.',\n      'Nech celý tím vidí tú istú pravdu v reálnom čase — a od 17. júla sa rozprávajú aj kuchyne medzi sebou: verejné police receptov a ingrediencií, zdieľanie s chef-priateľmi, komentáre naprieč kuchyňami.',\n      'Vedieť, čo máš, skôr než sa to minie.',\n      'Plánovať celý servis, nie jedno jedlo naraz.',\n      'Nech sa kuchyňa učí z vlastných vzorcov namiesto spoliehania len na cit.',\n      'Poznanie jednej kuchyne sa stáva výhodou každej.',\n      'V každom vrecku, na každej linke — či wifi stojí za niečo, alebo nie.'\n    ],\n    progressBody: '\u003cstrong>183 skutočných receptov\u003c/strong> nesie skutočnú techniku, nie výplň — každý obohatený do Michelin hĺbky. \u003cstrong>2 005 ingrediencií\u003c/strong> už pozná svoju cenu, sezónu aj to, čo ich zastúpi, keď dôjdu. Každý tanier už zhruba vie, koľko stojí, skôr než sa vôbec naservíruje. Nič z toho nie je mockup — je to build, dnes večer v rukách fungujúcej kuchyne.',\n    pstatLabels: ['Receptov so skutočnou technikou', 'Ingrediencií, nacenených a so sezónou', 'Fáz na ceste k hotovému', 'Kuchyňa, ktorá to už používa'],\n  };\n  function setEl(el, val){\n    if(!el) return;\n    if(!el.dataset.enHtml) el.dataset.enHtml = el.innerHTML;\n    el.innerHTML = (window.__manifLang === 'sk' && val) ? val : el.dataset.enHtml;\n  }\n  window.applyManifContent = function(lang){\n    window.__manifLang = lang;\n    const q = sel => Array.from(document.querySelectorAll(sel));\n    setEl(document.querySelector('.hero-mark'), '\u003cspan class=\"pulse\">\u003c/span>' + MSK.heroMark);\n    q('h1.hero-head .ln span').forEach((el,i)=>setEl(el, MSK.heroLines[i]));\n    setEl(document.querySelector('.hero-sub'), MSK.heroSub);\n    q('.hero-foot > span').forEach((el,i)=>setEl(el, MSK.heroFoot[i]));\n    q('.eyebrow').forEach((el,i)=>setEl(el, MSK.eyebrows[i]));\n    q('.head').forEach((el,i)=>setEl(el, MSK.heads[i]));\n    q('.problem-lines p:not(.final)').forEach((el,i)=>setEl(el, MSK.problem[i]));\n    setEl(document.querySelector('.problem-lines p.final') || document.querySelector('p.final'), MSK.problemFinal);\n    q('.vision-body p').forEach((el,i)=>setEl(el, MSK.visionBody[i]));\n    setEl(document.querySelector('.vision-quote'), MSK.visionQuote);\n    q('.xform-before').forEach((el,i)=>setEl(el, '\u003cspan class=\"lbl\">' + MSK.lblBefore + '\u003c/span>' + MSK.xformBefore[i]));\n    q('.xform-after .lbl').forEach(el=>setEl(el, MSK.lblAfter));\n    q('.headline').forEach((el,i)=>setEl(el, MSK.headlines[i]));\n    q('.detail').forEach((el,i)=>setEl(el, MSK.details[i]));\n    q('.stage-name').forEach((el,i)=>setEl(el, MSK.stageNames[i]));\n    q('.stage-tag').forEach(el=>{\n      if(!el.dataset.enHtml) el.dataset.enHtml = el.innerHTML;\n      el.innerHTML = lang === 'sk' ? (MSK.stageTags[el.dataset.enHtml.trim()] || el.dataset.enHtml) : el.dataset.enHtml;\n    });\n    q('.progress-body p').forEach((el,i)=>setEl(el, i===0 ? MSK.progressBody : null));\n    q('.pstat .l').forEach((el,i)=>setEl(el, MSK.pstatLabels[i]));\n  };\n  const orig = window.chefosToggleLang;\n  function hook(){\n    const lang = localStorage.getItem('chefos_doc_lang') || 'sk';\n    window.applyManifContent(lang);\n  }\n  if(typeof orig === 'function'){\n    window.chefosToggleLang = function(){ orig(); hook(); };\n  }\n  hook();\n})();\n\u003c/script>\n\u003c/body>\n\u003c/html>\n", "\u003c!doctype html>\n\u003chtml data-theme=\"dark\">\n\u003chead>\n\u003cmeta charset=\"utf-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n\u003ctitle>Sautero — Visual Product Guide\u003c/title>\n\u003cstyle>\n  :root{\n    --bg: #0A1A2F;\n    --paper: #122845;\n    --paper-raised: #0f2340;\n    --ink: #fff;\n    --ink-dim: #9C949E;\n    --ink-faint: rgba(156,148,158,0.6);\n    --rule: #223d57;\n    --copper: #34F7D7;\n    --copper-dim: rgba(52,247,215,0.4);\n    --sage: #F7C948;\n    --shadow: 0 8px 28px rgba(0,0,0,0.35);\n  }\n  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}\n  html,body{margin:0; padding:0; height:100%; max-width:100vw; overflow-x:hidden;}\n  body{\n    background: var(--bg);\n    background-image: radial-gradient(ellipse 900px 500px at 50% -120px, rgba(52,247,215,0.06), transparent);\n    color: var(--ink);\n    font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;\n    overscroll-behavior-y: contain;\n    -webkit-font-smoothing: antialiased;\n  }\n  ::selection{ background: var(--copper); color: #0A1A2F; }\n  button, input, select, textarea{ font: inherit; }\n  button{ cursor:pointer; transition: background-color 0.15s ease, border-color 0.15s ease, opacity 0.15s ease, transform 0.1s ease; }\n  a{ transition: color 0.15s ease; }\n  input, select, textarea{ transition: border-color 0.15s ease, box-shadow 0.15s ease; }\n  input:focus-visible, select:focus-visible, textarea:focus-visible, button:focus-visible, a:focus-visible{\n    outline: none;\n    box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--copper);\n    border-radius: 4px;\n  }\n  .display{\n    font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; font-weight: 700;\n  }\n  .mono{\n    font-family: \"SF Mono\", \"Menlo\", \"Consolas\", monospace;\n  }\n\n  /* ---------- Login ---------- */\n  #loginView{\n    min-height: 100vh;\n    display:flex; align-items:center; justify-content:center;\n    padding: 24px;\n  }\n  #loginView .box{\n    width:100%; max-width:380px;\n    background: var(--paper);\n    border: 1px solid var(--rule);\n    border-radius: 20px;\n    padding: 40px 32px 32px 32px;\n    box-shadow: var(--shadow);\n    animation: loginRise 0.5s cubic-bezier(.2,.8,.2,1);\n  }\n  @keyframes loginRise{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }\n  .login-mark{ font-size:34px; text-align:center; margin-bottom:14px; }\n  #loginView .kicker, #loginView h1{ text-align:center; }\n  #loginView h1.title{ margin-bottom:6px; }\n  .login-tagline{\n    text-align:center; color:var(--ink-dim); font-size:14px;\n    margin: 0 0 30px 0; line-height:1.5;\n  }\n  .form-status{ font-size:12px; color:var(--sage); min-height:16px; margin: 8px 0 4px 0; }\n  .form-status.error{ color:#FF7A68; }\n\n  /* ---------- Top bar ---------- */\n  .topbar{\n    position: sticky; top:0; z-index: 10;\n    background: var(--bg);\n    padding: 22px 18px 12px 18px;\n  }\n  .kicker{\n    color: var(--copper);\n    font-size: 11px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    margin: 0 0 4px 0;\n    font-weight: 600;\n  }\n  .sync-status{\n    font-size: 11px;\n    letter-spacing: 0.04em;\n    color: var(--ink-dim);\n    opacity: 0;\n    transition: opacity 0.2s;\n    display:flex; align-items:center; gap:5px;\n  }\n  .sync-status::before{ content:''; width:5px; height:5px; border-radius:50%; background:currentColor; }\n  .sync-status.saving, .sync-status.offline{ opacity: 1; }\n  .sync-status.saved{ opacity: 0; }\n  .sync-status.offline{ color: #34F7D7; }\n  h1.title{\n    font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; font-weight: 700;\n    font-size: 30px;\n    margin: 0 0 16px 0;\n    font-weight: 500;\n    letter-spacing: -0.015em;\n  }\n  .search-wrap{\n    display:flex;\n    align-items:center;\n    gap:8px;\n    background: var(--paper-raised);\n    border: 1px solid var(--rule);\n    border-radius: 12px;\n    padding: 11px 14px;\n    transition: border-color 0.15s ease, box-shadow 0.15s ease;\n  }\n  .search-wrap:focus-within{ border-color: var(--copper-dim); box-shadow: 0 0 0 3px var(--copper-wash, rgba(205,143,95,0.12)); }\n  .search-wrap svg{ flex:none; opacity:0.55; }\n  #search{\n    flex:1;\n    background:none; border:none; outline:none;\n    color: var(--ink);\n    font-size: 16px;\n    font-family: inherit;\n  }\n  #search::placeholder{ color: var(--ink-dim); }\n  .nav-row{ display:flex; gap:8px; margin-top:12px; }\n  .ingredients-nav-btn{\n    display:flex; flex-direction:column; align-items:center; gap:5px;\n    flex:1;\n    background: var(--paper-raised); border: 1px solid var(--rule);\n    color: var(--ink-dim);\n    font-family: inherit; font-size: 11.5px; font-weight:500;\n    padding: 12px 6px 10px 6px; border-radius: 12px;\n    text-align:center;\n  }\n  .ingredients-nav-btn svg{ display:none; }\n  .ingredients-nav-btn:active{ background: var(--surface-raised, var(--paper-raised)); transform: scale(0.97); }\n  .ingredients-nav-btn:hover{ border-color: var(--copper-dim); color: var(--ink); }\n  .nav-icon{ font-size: 18px; line-height:1; }\n\n  /* ---------- Home dashboard ---------- */\n  .home-grid{\n    display:grid; grid-template-columns: repeat(2, 1fr);\n    gap: 14px;\n    padding: 10px 18px 40px 18px;\n  }\n  .home-tile{\n    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;\n    aspect-ratio: 1;\n    background: var(--paper-raised);\n    border: 1px solid var(--rule);\n    border-radius: 18px;\n    color: var(--ink);\n    font-family: inherit; font-size: 14.5px; font-weight:600;\n    padding: 16px;\n  }\n  .home-tile:hover{ border-color: var(--copper-dim); background: var(--surface, var(--paper-raised)); transform: translateY(-2px); }\n  .home-tile:active{ transform: scale(0.97); }\n  .home-tile-icon{\n    font-size: 32px; line-height:1;\n    width:56px; height:56px;\n    display:flex; align-items:center; justify-content:center;\n    background: var(--paper); border:1px solid var(--rule); border-radius:14px;\n  }\n  @media (min-width: 560px){\n    .home-grid{ grid-template-columns: repeat(3, 1fr); max-width:640px; margin:0 auto; }\n  }\n\n  /* ---------- Schedule: week nav + grid ---------- */\n  .date-nav{ display:flex; align-items:center; justify-content:space-between; gap:8px; }\n  .week-label{ font-family:\"SF Mono\",Menlo,monospace; font-size:13px; color:var(--ink-dim); text-align:center; flex:1; }\n  .schedule-grid-wrap{ overflow-x:auto; padding: 4px 0 8px 0; -webkit-overflow-scrolling:touch; }\n  table.schedule-grid{ border-collapse:collapse; width:100%; min-width:640px; }\n  table.schedule-grid th, table.schedule-grid td{ border-bottom:1px solid var(--rule); padding:0; }\n  table.schedule-grid thead th{\n    font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-faint);\n    font-weight:600; padding:8px 6px; text-align:center; background:var(--bg);\n    position:sticky; top:0; z-index:2;\n  }\n  table.schedule-grid thead th.name-col{ text-align:left; padding-left:18px; }\n  table.schedule-grid .name-col{\n    position:sticky; left:0; z-index:1;\n    background:var(--bg);\n    padding: 10px 12px 10px 18px;\n    font-size:13.5px; white-space:nowrap;\n    box-shadow: 1px 0 0 var(--rule);\n  }\n  table.schedule-grid .section-row td{\n    background: var(--paper-raised);\n    font-size:11px; */\n  .sheet-overlay{\n    position:fixed; inset:0;\n    background: rgba(10,9,7,0.6);\n    display:none;\n    align-items:flex-end;\n    justify-content:center;\n    z-index: 50;\n  }\n  .sheet-overlay.open{ display:flex; }\n  .sheet{\n    background: var(--paper-raised);\n    border: 1px solid var(--rule);\n    border-bottom: none;\n    border-radius: 18px 18px 0 0;\n    padding: 10px 20px calc(20px + env(safe-area-inset-bottom, 0px)) 20px;\n    width: 100%;\n    max-width: 480px;\n    box-sizing: border-box;\n    max-height: 80vh;\n    overflow-y: auto;\n  }\n  .sheet-handle{\n    width: 36px; height: 4px; border-radius: 999px;\n    background: var(--rule);\n    margin: 8px auto 14px auto;\n  }\n  .sheet-cancel{\n    width:100%;\n    margin-top:14px;\n    background:none;\n    border:1px solid var(--rule);\n    color: var(--ink-dim);\n    padding:12px;\n    border-radius:10px;\n    font-family:inherit;\n    font-size:14px;\n  }\n  .ingredient-info-title{ font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; font-size:19px; margin:4px 0 4px 0; }\n  .ingredient-info-row{ margin: 12px 0; }\n  .ingredient-info-row .label{ font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--sage); margin-bottom:3px; }\n  .ingredient-info-row .value{ font-size:14px; line-height:1.5; }\n\n  /* ---------- Add-choice sheet options + API key settings ---------- */\n  .sheet-option{\n    display:flex; align-items:center; gap:14px;\n    width:100%;\n    background:none; border:none;\n    border-top: 1px solid var(--rule);\n    padding: 14px 4px;\n    color: var(--ink);\n    text-align:left;\n    font-family: inherit;\n  }\n  .sheet-option:first-of-type{ border-top:none; }\n  .sheet-option svg{ flex:none; color: var(--copper); }\n  .sheet-option-title{ font-size:15px; font-weight:600; }\n  .sheet-option-sub{ font-size:12px; color:var(--ink-dim); margin-top:2px; }\n  .sheet-title{ font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; font-size:19px; margin:4px 0 10px 0; }\n  .sheet-text{ font-size:13px; color:var(--ink-dim); line-height:1.5; margin:0 0 16px 0; }\n  .sheet-link{ color:var(--copper); }\n  .sheet-row{ display:flex; gap:10px; margin-bottom: 8px; }\n  .sheet-row .save-btn, .sheet-row .danger-btn{ flex:1; margin-top:0; text-align:center; }\n  .sheet-status{ font-size:12px; color:var(--sage); min-height:16px; margin: 8px 0 4px 0; }\n\n  /* ---------- Photo scan progress overlay ---------- */\n  .scan-overlay{\n    position:fixed; inset:0;\n    background: rgba(23,21,18,0.94);\n    display:none;\n    align-items:center; justify-content:center;\n    z-index: 60;\n  }\n  .scan-overlay.open{ display:flex; }\n  .scan-box{ text-align:center; padding: 20px; max-width:320px; }\n  .scan-spinner{\n    width:40px; height:40px;\n    border-radius:50%;\n    border: 3px solid var(--rule);\n    border-top-color: var(--copper);\n    margin: 0 auto 18px auto;\n    animation: scan-spin 0.8s linear infinite;\n  }\n  @keyframes scan-spin{ to{ transform: rotate(360deg); } }\n  .scan-status{ font-size:14px; color:var(--ink-dim); }\n  .scan-error{ font-size:13px; color:#FF7A68; margin-top:14px; }\n\n  /* ---------- Task rows (Mise en Place) ---------- */\n  .task-row{ padding:14px 18px; border-bottom:1px solid var(--rule); }\n  .task-row.status-finish .task-text{ text-decoration:line-through; color:var(--ink-dim); }\n  .task-row-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }\n  .task-status-group{ display:flex; gap:6px; margin-top:9px; }\n  .task-col-header{\n    display:flex; justify-content:space-between;\n    padding: 10px 18px 6px 18px;\n    font-size: 11px; text-transform:uppercase; letter-spacing:0.1em;\n    color: var(--ink-dim);\n    border-bottom: 1px solid var(--rule);\n  }\n  .task-status-btn{\n    flex:none;\n    font-family: inherit; font-size: 11px; font-weight:700; letter-spacing:0.04em;\n    padding: 6px 10px; border-radius: 6px;\n    border: 1px solid var(--rule
